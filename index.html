<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleverbot Terminal</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #00ff41;
            --text: #00ff41;
            --panel: rgba(15, 15, 15, 0.95);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', 'Consolas', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #111;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 2px 10px rgba(0, 255, 65, 0.2);
        }

        #container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 2px solid var(--accent);
            background: #111;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.25);
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--panel);
            padding: 16px 20px;
            font-size: 14px;
            color: #aaffaa;
            border: 1px solid var(--accent);
            border-radius: 6px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .how-to {
            line-height: 1.6;
        }

        .how-to strong {
            color: var(--accent);
        }

        .instructions {
            background: rgba(0, 255, 65, 0.1);
            border-left: 4px solid var(--accent);
            padding: 12px 14px;
            margin-top: 8px;
            font-size: 13.8px;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .btn {
            background: transparent;
            color: #88ff88;
            border: 1px solid var(--accent);
            padding: 9px 16px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            border-radius: 4px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn:hover {
            background: var(--accent);
            color: #000;
            transform: translateY(-1px);
        }

        a {
            color: #88ff88;
            text-decoration: underline;
        }

        a:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="header">CLEVERBOT OFFICIAL TERMINAL</div>
    
    <div id="container">
        <iframe 
            src="https://www.cleverbot.com/cleverbotif" 
            allowtransparency="true" 
            frameborder="0" 
            scrolling="yes"
            sandbox="allow-scripts allow-same-origin allow-popups allow-forms">
        </iframe>
        
        <div class="controls">
            <div class="how-to">
                <strong>✅ Connected to official Cleverbot</strong><br><br>
                
                <strong>How to type to Cleverbot:</strong>
                <div class="instructions">
                    • Click anywhere inside the white chat box below<br>
                    • Type your message<br>
                    • Press <strong>Enter</strong> on your keyboard<br>
                    <span style="color:#88ff88;">or</span> click the <strong>Send</strong> button in the chat
                </div>
            </div>
            
            <div class="btn-group">
                <button class="btn" onclick="saveAndShare()">💾 Save &amp; Share Conversation</button>
                <button class="btn" onclick="window.location.reload()">⟳ Reset Terminal</button>
                <a href="https://www.cleverbot.com" target="_blank">Open Full Site →</a>
            </div>
        </div>
    </div>

    <script>
        function saveAndShare() {
            alert("💾 Save & Share is currently a placeholder.\n\n" + 
                  "The iframe prevents automatic message capture.\n\n" +
                  "Tip: You can manually copy-paste important parts of the conversation if needed.");
        }

        console.log("%c✅ Cleverbot Terminal loaded successfully", 
                   "color: #00ff41; font-family: monospace; font-size: 14px;");
    </script>
</body>
</html>
