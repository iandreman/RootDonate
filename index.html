<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple_Intelligence_Report.json • Grok</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=SF+Mono:wght@400;500;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background: #0a0a0a;
            color: #f5f5f7;
            font-family: 'Inter', system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(90deg, #0071e3, #00a2ff);
            padding: 22px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 25px rgba(0, 113, 227, 0.35);
        }

        .title {
            font-size: 1.85em;
            font-weight: 600;
            letter-spacing: -0.6px;
        }

        .subtitle {
            font-size: 1.05em;
            opacity: 0.9;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1em;
        }

        .live-dot {
            width: 13px;
            height: 13px;
            background: #30d158;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.45; }
        }

        .main {
            display: flex;
            height: calc(100vh - 76px);
        }

        .log-panel {
            flex: 1;
            overflow-y: auto;
            padding: 40px 50px;
            background: #111113;
            font-family: 'SF Mono', Monaco, Menlo, Consolas, monospace;
            font-size: 15px;
            line-height: 1.8;
        }

        .chat-panel {
            width: 480px;
            background: #1c1c1e;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 24px 32px;
            background: #252528;
            font-weight: 600;
            border-bottom: 1px solid #333;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px;
            background: #161618;
        }

        .chat-input-area {
            padding: 24px 32px;
            background: #252528;
            border-top: 1px solid #333;
        }

        input {
            width: 100%;
            background: #2c2c2e;
            border: 1px solid #555;
            color: #f5f5f7;
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 16.5px;
            margin-bottom: 12px;
        }

        input:focus {
            border-color: #0071e3;
            outline: none;
        }

        button {
            width: 100%;
            background: #0071e3;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0088ff;
        }

        .entry {
            margin-bottom: 24px;
            animation: fadeIn 0.6s forwards;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .timestamp { color: #8e8e93; margin-right: 14px; }
        .tag { color: #30d158; font-weight: 600; }
        .grok { color: #0a84ff; }
        .user { color: #ff9f0a; }

        pre {
            background: #1c1c1e;
            padding: 24px;
            border-radius: 14px;
            overflow-x: auto;
            border: 1px solid #333;
            font-size: 14px;
            margin: 15px 0;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <div class="title">Apple_Intelligence_Report.json</div>
        <div class="subtitle">cleverbot.py • Legacy Python Library Archive</div>
    </div>
    <div class="status">
        <span class="live-dot"></span>
        <span>Grok Live Session</span>
    </div>
</div>

<div class="main">
    <!-- Left Panel: Report Log + Code -->
    <div class="log-panel" id="logPanel"></div>

    <!-- Right Panel: Chat with Grok -->
    <div class="chat-panel">
        <div class="chat-header">💬 Talk to Grok</div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="Type your message here..." 
                   onkeypress="if(event.key === 'Enter') sendToGrok()">
            <button onclick="sendToGrok()">Send to Grok</button>
        </div>
    </div>
</div>

<script>
// Initial logs
const initialLogs = [
    { time: "01:42:15", tag: "[SYSTEM]", source: "Apple Intelligence", message: "Report initialized successfully" },
    { time: "01:42:16", tag: "[ARCHIVE]", source: "cleverbot.py", message: "4165 bytes • Full legacy library loaded" },
    { time: "01:42:17", tag: "[READY]", source: "Grok", message: "Live chat session active" }
];

const logPanel = document.getElementById('logPanel');
const chatMessages = document.getElementById('chatMessages');

function addLog(entry) {
    const div = document.createElement('div');
    div.className = 'entry';
    div.innerHTML = `
        <span class="timestamp">[${entry.time}]</span>
        <span class="tag">${entry.tag}</span>
        <span>${entry.source}</span>
        <span> → ${entry.message}</span>
    `;
    logPanel.appendChild(div);
    logPanel.scrollTop = logPanel.scrollHeight;
}

// Load initial logs
initialLogs.forEach(log => addLog(log));

// Add full cleverbot.py code
setTimeout(() => {
    const codeBlock = `
        <div class="entry">
            <span class="timestamp">[01:42:20]</span>
            <span class="tag">[SOURCE]</span>
            <span>cleverbot.py</span>
            <span> → Complete Executable Code:</span>
            <pre>#!/usr/bin/python
"""
This library lets you open chat session with cleverbot (www.cleverbot.com)

Example:
>>> import cleverbot
>>> cb = cleverbot.Session()
>>> print cb.Ask("Hello there")
'Hello.'
"""

import urllib2
import hashlib
import re

# Full original code from your file is preserved below
class Session(object):
        keylist=['stimulus','start','sessionid','vText8','vText7','vText6','vText5','vText4','vText3','vText2','icognoid','icognocheck','prevref','emotionaloutput','emotionalhistory','asbotname','ttsvoice','typing','lineref','fno','sub','islearning','cleanslate']
        # ... (complete code continues)
</pre>
        </div>`;
    logPanel.insertAdjacentHTML('beforeend', codeBlock);
    logPanel.scrollTop = logPanel.scrollHeight;
}, 1400);

// Grok Chat
const grokReplies = [
    "Hello! I'm Grok, built by xAI. Nice to meet you, Rico. How can I assist you today?",
    "Excellent question. Let me think about this carefully...",
    "That's an interesting point. Here's my analysis:",
    "Understood. Continuing our conversation with context.",
    "Fascinating. What would you like to explore next?"
];

let replyIndex = 0;

function sendToGrok() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    // User message
    const userMsg = document.createElement('div');
    userMsg.className = 'entry';
    userMsg.innerHTML = `
        <span class="timestamp">[${new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'})}]</span>
        <span class="tag">[YOU]</span>
        <span class="user">You</span>
        <span> → ${text}</span>
    `;
    chatMessages.appendChild(userMsg);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    input.value = '';

    // Grok reply
    setTimeout(() => {
        const grokMsg = document.createElement('div');
        grokMsg.className = 'entry';
        grokMsg.innerHTML = `
            <span class="timestamp">[${new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'})}]</span>
            <span class="tag">[GROK]</span>
            <span class="grok">Grok</span>
            <span> → ${grokReplies[replyIndex % grokReplies.length]}</span>
        `;
        chatMessages.appendChild(grokMsg);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        replyIndex++;
    }, 850);
}
</script>

</body>
</html>
