<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleverbot Chat - No CORS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f0f0f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: white;
        }
        .message {
            margin: 12px 0;
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 75%;
            line-height: 1.4;
        }
        .user {
            background: #007bff;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }
        .bot {
            background: #e9ecef;
            color: black;
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }
        #input-area {
            display: flex;
            padding: 12px;
            background: #fff;
            border-top: 1px solid #ddd;
        }
        #input {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 25px;
            outline: none;
        }
        button {
            margin-left: 10px;
            padding: 0 24px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #0056b3; }
        button:disabled { background: #888; cursor: not-allowed; }
        .thinking {
            font-style: italic;
            color: #666;
            margin-right: auto;
        }
        .note {
            font-size: 12px;
            color: #666;
            text-align: center;
            padding: 8px;
            background: #fff3cd;
        }
    </style>
</head>
<body>

    <div class="note">
        Using a public CORS proxy to talk to Cleverbot (free method). It may be slow or stop working if the proxy is overloaded.
    </div>

    <div id="chat"></div>

    <div id="input-area">
        <input type="text" id="input" placeholder="Type a message to Cleverbot..." autocomplete="off">
        <button id="sendBtn">Send</button>
    </div>

<script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');

    // Public CORS proxy (you can change to another if this one is down)
    const CORS_PROXY = "https://cleverbot.com/cleverbotif";

    function addMessage(text, isUser) {
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user' : 'bot'}`;
        div.textContent = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    async function sendToCleverbot(message) {
        sendBtn.disabled = true;
        addMessage(message, true);

        const thinking = document.createElement('div');
        thinking.className = 'message bot thinking';
        thinking.textContent = 'Cleverbot is thinking...';
        chat.appendChild(thinking);
        chat.scrollTop = chat.scrollHeight;

        try {
            // Build the form data like the old Python script
            const formData = new URLSearchParams({
                'stimulus': message,
                'cb_settings_language': 'en',
                'cb_settings_scripting': 'no',
                'islearning': '1',
                'icognoid': 'wsf',
                'icognocheck': ''   // many proxies handle the session lightly
            });

            const response = await fetch(CORS_PROXY + encodeURIComponent('https://www.cleverbot.com/webservicemin'), {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                },
                body: formData
            });

            if (!response.ok) throw new Error('Request failed');

            const text = await response.text();

            // Parse the reply (first part before \r or |)
            let reply = text.split('\r')[0] || text.split('|')[0] || "I didn't catch that. Can you say it again?";

            reply = reply.trim().replace(/^Cleverbot:\s*/i, '');

            thinking.remove();
            addMessage(reply || "Hmm, interesting point.", false);

        } catch (err) {
            console.error(err);
            thinking.remove();
            addMessage("Sorry, couldn't reach Cleverbot right now. The proxy might be busy or blocked. Try again later.", false);
        }

        sendBtn.disabled = false;
        input.focus();
    }

    function sendMessage() {
        const text = input.value.trim();
        if (!text || sendBtn.disabled) return;

        input.value = '';
        sendToCleverbot(text);
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Welcome
    window.onload = () => {
        addMessage("Connected via CORS proxy! Type something to start chatting with Cleverbot.", false);
        input.focus();
    };
</script>

</body>
</html>
