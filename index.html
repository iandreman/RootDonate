<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleverbot Chat</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        #chat { height: 400px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
        .user { text-align: right; color: blue; }
        .bot  { text-align: left; color: green; }
        input { width: 80%; padding: 8px; }
        button { padding: 8px 16px; }
    </style>
</head>
<body>
    <h1>Cleverbot Chat (unofficial)</h1>
    <div id="chat"></div>
    <input type="text" id="input" placeholder="Type a message..." autocomplete="off">
    <button onclick="sendMessage()">Send</button>

    <script>
        // Simple MD5 implementation (for icognocheck)
        function md5(str) {
            return CryptoJS.MD5(str).toString();
        }

        // URL-encode helper (like Python's quote)
        function quote(str) {
            return encodeURIComponent(str).replace(/'/g, '%27');
        }

        const keylist = [
            'stimulus','start','sessionid','vText8','vText7','vText6','vText5','vText4',
            'vText3','vText2','icognoid','icognocheck','prevref','emotionaloutput',
            'emotionalhistory','asbotname','ttsvoice','typing','lineref','fno',
            'sub','islearning','cleanslate'
        ];

        let arglist = [
            '','y','','','','','','','','','wsf','','','','','','','','','0','Say','1','false'
        ];

        let msgList = [];

        function encodeData() {
            let text = '';
            for (let i = 0; i < keylist.length; i++) {
                text += '&' + keylist[i] + '=' + quote(arglist[i]);
            }
            return text.substring(1);
        }

        async function sendToCleverbot(stimulus) {
            // Set the new message
            arglist[0] = stimulus; // stimulus

            if (msgList.length > 0) {
                arglist[keylist.indexOf('lineref')] = '!0' + Math.floor(msgList.length / 2);
            }

            // Compute icognocheck
            const dataForHash = encodeData();
            const digest = dataForHash.substring(9, 29);
            arglist[keylist.indexOf('icognocheck')] = md5(digest);

            const finalData = encodeData();

            try {
                const response = await fetch('https://corsproxy.io/?' + encodeURIComponent('http://www.cleverbot.com/webservicemin'), {
                    method: 'POST',
                    headers: {
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Referer': 'http://www.cleverbot.com'
                    },
                    body: finalData
                });

                if (!response.ok) throw new Error('Network error');

                const reply = await response.text();

                // Parse the response (same as the Python version)
                const values = reply.split('\r');
                const keys = ["text", "sessionid", "logurl", "vText8", "vText7", "vText6", "vText5", "vText4", "vText3",
                              "vText2", "prevref", "foo", "emotionalhistory", "ttsLocMP3", "ttsLocTXT",
                              "ttsLocTXT3", "ttsText", "lineRef", "lineURL", "linePOST", "lineChoices",
                              "lineChoicesAbbrev", "typingData", "divert"];

                const answer = {};
                for (let i = 0; i < keys.length && i < values.length; i++) {
                    answer[keys[i]] = values[i];
                }

                // Update internal state
                for (const [k, v] of Object.entries(answer)) {
                    const idx = keylist.indexOf(k);
                    if (idx !== -1) arglist[idx] = v;
                }
                arglist[keylist.indexOf('emotionaloutput')] = '';

                const botText = answer['ttsText'] || answer['text'] || "Sorry, I didn't understand.";

                msgList.push(stimulus);
                msgList.push(botText);

                return botText;
            } catch (err) {
                console.error(err);
                return "Error connecting to Cleverbot. (CORS or service issue)";
            }
        }

        async function sendMessage() {
            const input = document.getElementById('input');
            const chat = document.getElementById('chat');
            const text = input.value.trim();

            if (!text) return;

            // Add user message
            chat.innerHTML += `<div class="user"><strong>You:</strong> ${text}</div>`;
            input.value = '';

            // Get bot reply
            const reply = await sendToCleverbot(text);

            // Add bot message
            chat.innerHTML += `<div class="bot"><strong>Cleverbot:</strong> ${reply}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        // Allow pressing Enter to send
        document.getElementById('input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        // Include CryptoJS for MD5 (via CDN)
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
</body>
</html>
