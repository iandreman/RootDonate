<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Terminal - Accounts & Nodes Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
  <style>
    body {
      margin: 0;
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #terminal {
      width: 100vw;
      height: 100vh;
    }
    .header {
      position: absolute;
      top: 10px;
      left: 15px;
      z-index: 10;
      font-size: 14px;
      color: #58a6ff;
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="header">Smart Terminal v1.5 — Accounts & Nodes Manager + IP Tools</div>
  <div id="terminal"></div>

  <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
  <script>
    const term = new Terminal({
      cursorBlink: true,
      theme: {
        background: '#0d1117',
        foreground: '#c9d1d9',
        cursor: '#58a6ff'
      },
      fontFamily: 'Courier New, monospace',
      fontSize: 15,
      scrollback: 1000,
      convertEol: true
    });

    term.open(document.getElementById('terminal'));

    // Welcome message
    term.writeln('\x1b[1;32mSmart Terminal v1.5 initialized\x1b[0m');
    term.writeln('Dynamically manage accounts, nodes, and IP lookups');
    term.writeln('Type \x1b[1;34mhelp\x1b[0m for commands\r\n');

    let commandHistory = [];
    let historyIndex = -1;
    let currentLine = '';

    // Existing data
    let accounts = [
      'user1@example.com',
      'admin@company.com',
      'test@demo.local',
      'support@internal.net'
    ];

    let nodes = [
      { name: 'node-01', ip: '192.168.1.101', status: 'online' },
      { name: 'node-02', ip: '192.168.1.102', status: 'online' },
      { name: 'k8s-worker-3', ip: '10.0.0.45', status: 'maintenance' },
      { name: 'db-node-prod', ip: '172.16.0.10', status: 'online' },
      { name: 'edge-node-7', ip: '203.0.113.45', status: 'online' }
    ];

    const prompt = () => {
      term.write('\r\n\x1b[1;34madmin@smart-terminal\x1b[0m:\x1b[1;32m~\x1b[0m$ ');
    };

    const findNode = (identifier) => {
      if (!identifier) return null;
      const lower = identifier.toLowerCase();
      return nodes.find(n => n.name.toLowerCase() === lower || n.ip === identifier);
    };

    // New IP lookup functions
    async function dnsLookup(domain) {
      try {
        const res = await fetch(`https://dns.google/resolve?name=${encodeURIComponent(domain)}&type=A`);
        const data = await res.json();
        if (data.Answer && data.Answer.length > 0) {
          return data.Answer.map(ans => ans.data);
        }
        return null;
      } catch (e) {
        return null;
      }
    }

    async function ipGeoLookup(ip) {
      try {
        const res = await fetch(`https://ip-api.com/json/${encodeURIComponent(ip)}?fields=status,message,country,countryCode,regionName,city,isp,org,as,query`);
        const data = await res.json();
        if (data.status === 'success') {
          return data;
        }
        return null;
      } catch (e) {
        return null;
      }
    }

    async function lookupCommand(arg) {
      if (!arg) {
        term.writeln('\r\nUsage: lookup <domain or IP>');
        term.writeln('Example: lookup google.com   or   lookup 8.8.8.8');
        return;
      }

      term.writeln(`\r\n\x1b[33mLooking up ${arg}...\x1b[0m`);

      const isIp = /^\d{1,3}(\.\d{1,3}){3}$/.test(arg) || /^[0-9a-fA-F:]+$/.test(arg);

      let ips = [];
      let geo = null;

      if (isIp) {
        ips = [arg];
      } else {
        ips = await dnsLookup(arg);
      }

      if (!ips || ips.length === 0) {
        term.writeln(`\x1b[31mFailed to resolve ${arg}\x1b[0m`);
        return;
      }

      term.writeln(`\x1b[32mResolved IP(s):\x1b[0m`);
      ips.forEach(ip => term.writeln(`  • ${ip}`));

      // Get geo for the first IP (usually sufficient)
      geo = await ipGeoLookup(ips[0]);

      if (geo) {
        term.writeln(`\r\n\x1b[32mGeolocation for ${ips[0]}:\x1b[0m`);
        term.writeln(`  Country     : ${geo.country || 'N/A'} (${geo.countryCode || ''})`);
        term.writeln(`  City/Region : ${geo.city || 'N/A'}, ${geo.regionName || 'N/A'}`);
        term.writeln(`  ISP         : ${geo.isp || 'N/A'}`);
        term.writeln(`  Org         : ${geo.org || 'N/A'}`);
        term.writeln(`  AS          : ${geo.as || 'N/A'}`);
      } else {
        term.writeln(`\r\n\x1b[33mCould not fetch geolocation (rate limit or error)\x1b[0m`);
      }
    }

    async function myIpCommand() {
      term.writeln('\r\n\x1b[33mFetching your public IP...\x1b[0m');
      const geo = await ipGeoLookup('');
      if (geo && geo.query) {
        term.writeln(`\x1b[32mYour IP: ${geo.query}\x1b[0m`);
        term.writeln(`  Country     : ${geo.country || 'N/A'} (${geo.countryCode || ''})`);
        term.writeln(`  City/Region : ${geo.city || 'N/A'}, ${geo.regionName || 'N/A'}`);
        term.writeln(`  ISP         : ${geo.isp || 'N/A'}`);
      } else {
        term.writeln(`\x1b[31mFailed to fetch your IP (try again later)\x1b[0m`);
      }
    }

    const commands = {
      help: () => {
        term.writeln('\r\nAvailable Commands:');
        term.writeln('  help                          - Show this help');
        term.writeln('  clear                         - Clear screen');
        term.writeln('  list accounts                 - List all accounts');
        term.writeln('  add account <email>           - Add new account');
        term.writeln('  remove account <email>        - Remove an account');
        term.writeln('  reset account <email>         - Reset account password');
        term.writeln('  list nodes                    - List all nodes');
        term.writeln('  add node <name> <ip>          - Add new node');
        term.writeln('  remove node <name|ip>         - Remove a node');
        term.writeln('  reset node <name|ip>          - Factory reset node (DANGEROUS)');
        term.writeln('  status                        - Show system status');
        term.writeln('  lookup <domain or IP>         - DNS + IP geolocation lookup');
        term.writeln('  myip                          - Show your current public IP + location');
        term.writeln('  exit                          - Close terminal\r\n');

        term.writeln('Examples:');
        term.writeln('  lookup google.com');
        term.writeln('  lookup 8.8.8.8');
        term.writeln('  myip');
      },

      // ... (keep all your original commands: add account, remove account, list accounts, etc.)

      'add account': (email) => { /* your original code */ },
      'remove account': (email) => { /* your original code */ },
      'list accounts': () => { /* your original code */ },
      'reset account': (email) => { /* your original code */ },
      'add node': (args) => { /* your original code */ },
      'remove node': (identifier) => { /* your original code */ },
      'list nodes': () => { /* your original code */ },
      'reset node': (identifier) => { /* your original code */ },
      status: () => { /* your original code */ },
      clear: () => term.clear(),
      exit: () => {
        term.writeln('\r\nGoodbye! Closing terminal...');
        setTimeout(() => window.close(), 800);
      },

      // New commands
      lookup: (arg) => { lookupCommand(arg); },
      myip: () => { myIpCommand(); }
    };

    // Input handler (same as before, but now supports async commands)
    term.onData(async (data) => {   // Note: made async
      switch (data) {
        case '\r': // Enter
          term.writeln('');
          if (currentLine.trim()) {
            commandHistory.unshift(currentLine);
            historyIndex = -1;

            const parts = currentLine.trim().split(/\s+/);
            const mainCmd = parts[0].toLowerCase();
            const subCmd = parts[1] ? `${mainCmd} ${parts[1]}`.toLowerCase() : mainCmd;
            const argument = parts.slice(2).join(' ');

            if (commands[subCmd]) {
              await commands[subCmd](argument);   // await for async
            } else if (commands[mainCmd]) {
              await commands[mainCmd](argument || ''); // await
            } else {
              term.writeln(`\x1b[31mUnknown command: ${mainCmd}\x1b[0m`);
            }
          }
          currentLine = '';
          prompt();
          break;

        case '\u007f': // Backspace
          if (currentLine.length > 0) {
            currentLine = currentLine.slice(0, -1);
            term.write('\b \b');
          }
          break;

        case '\u001b[A': // Up arrow (same)
          if (historyIndex < commandHistory.length - 1) {
            historyIndex++;
            term.write('\r' + ' '.repeat(80) + '\r');
            prompt();
            currentLine = commandHistory[historyIndex];
            term.write(currentLine);
          }
          break;

        case '\u001b[B': // Down arrow (same)
          if (historyIndex > 0) {
            historyIndex--;
            term.write('\r' + ' '.repeat(80) + '\r');
            prompt();
            currentLine = commandHistory[historyIndex];
            term.write(currentLine);
          } else if (historyIndex === 0) {
            historyIndex = -1;
            term.write('\r' + ' '.repeat(80) + '\r');
            prompt();
            currentLine = '';
          }
          break;

        default:
          if (data.length === 1 && data >= ' ') {
            currentLine += data;
            term.write(data);
          }
      }
    });

    prompt();
    setTimeout(() => term.focus(), 100);
  </script>
</body>
</html>
