<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPS Pins – Private Markers & Share Links</title>
  <meta name="description" content="Save GPS locations and URLs privately — 100% local, works offline."/>

  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #79c0ff;
      --purple: #bc8cff;
      --danger: #f85149;
      --border: rgba(88,166,255,0.18);
      --shadow: 0 6px 24px rgba(0,0,0,0.55);
    }
    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --text: #1f2328;
      --muted: #57606a;
      --accent: #0969da;
      --accent-dim: #1f6feb;
      --purple: #8250df;
      --danger: #d1242f;
      --border: rgba(9,105,218,0.2);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.1rem 1.5rem;
      background: color-mix(in srgb, var(--bg) 92%, black);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    h1 {
      font-size: clamp(2.2rem, 8vw, 3rem);
      background: linear-gradient(90deg, var(--purple), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
    }

    .subtitle { color: var(--muted); text-align: center; font-size: 0.96rem; margin-top: 0.4rem; }

    .controls {
      display: flex;
      justify-content: center;
      gap: 0.9rem;
      margin: 1.2rem 0;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.68rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      color: var(--accent);
      transition: all 0.22s ease;
    }
    .btn:hover    { background: color-mix(in srgb, var(--accent) 24%, transparent); }
    .btn.active   { background: var(--accent); color: #000; }

    /* New: Monzo support button style */
    .monzo-btn {
      padding: 0.6rem 1.4rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--purple);
      background: color-mix(in srgb, var(--purple) 15%, transparent);
      color: var(--purple);
      transition: all 0.22s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .monzo-btn:hover {
      background: color-mix(in srgb, var(--purple) 28%, transparent);
    }

    .tab-content { display: none; flex: 1; flex-direction: column; }
    .tab-content.active { display: flex; }

    #terminal-tab { flex: 1; display: flex; flex-direction: column; }

    #terminal {
      flex: 1;
      padding: 1.6rem 1.8rem;
      overflow-y: auto;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: clamp(1.02rem, 3.2vw, 1.12rem);
      line-height: 1.65;
    }

    .line { margin: 0.48rem 0; white-space: pre-wrap; word-break: break-word; }

    .prompt       { color: var(--accent-dim); font-weight: bold; }
    .info         { color: var(--accent-dim); }
    .success      { color: #56d364; font-weight: 600; }
    .error        { color: var(--danger); font-weight: 600; }
    .system       { color: var(--muted); font-style: italic; }

    .input-line {
      display: flex;
      align-items: center;
      padding: 1.1rem 1.8rem;
      background: rgba(0,0,0,0.35);
      border-top: 1px solid var(--border);
      gap: 0.9rem;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--accent-dim);
      font: inherit;
      outline: none;
      caret-color: var(--accent);
    }

    #pins-tab { padding: 1.6rem; overflow-y: auto; }

    #search {
      width: 100%;
      max-width: 720px;
      margin: 0 auto 1.8rem;
      padding: 1.1rem 1.5rem;
      background: color-mix(in srgb, var(--surface) 70%, var(--bg));
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1.05rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.6rem;
      margin: 1.4rem 0;
      box-shadow: var(--shadow);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    }

    .pin-title {
      font-size: 1.38rem;
      margin-bottom: 0.7rem;
      color: var(--accent);
      word-break: break-all;
    }
    .url-pin .pin-title { color: var(--purple); }

    .share-line {
      margin-top: 1.1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
      font-size: 0.97rem;
      color: var(--muted);
    }

    .copy-share, .email-pin {
      padding: 0.5rem 1.1rem;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-share {
      background: color-mix(in srgb, var(--purple) 18%, transparent);
      border: 1px solid var(--purple);
      color: var(--purple);
    }
    .email-pin {
      background: color-mix(in srgb, var(--accent) 18%, transparent);
      border: 1px solid var(--accent);
      color: var(--accent);
    }
    .copy-share:hover, .email-pin:hover { opacity: 0.92; }
    .copy-share.copied {
      background: rgba(86,212,100,0.28) !important;
      color: #56d364 !important;
      border-color: #56d364 !important;
    }

    #fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, var(--purple), var(--accent));
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 2.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      cursor: pointer;
      z-index: 999;
      transition: all 0.24s ease;
    }
    #fab:hover  { transform: scale(1.14); }
    #fab:active { transform: scale(0.92); }

    #no-pins-message {
      text-align: center;
      padding: 5rem 1rem;
      color: var(--muted);
      font-size: 1.1rem;
    }
    #no-pins-message strong { color: var(--text); }

    /* Optional footer */
    footer {
      padding: 1.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
  </style>
</head>
<body data-theme="dark">

<header>
  <h1>GPS Pins</h1>
  <div class="subtitle">private offline locations • URLs • share links • email single pin</div>

  <!-- Optional Monzo support text link -->
  <div style="text-align:center; margin:0.8rem 0; font-size:0.95rem; color:var(--muted);">
    Made with ❤️ • 
    <a href="https://monzo.me/iandreman" target="_blank" rel="noopener noreferrer" 
       style="color:var(--purple); text-decoration:none; font-weight:500;">
      Support via Monzo ☕
    </a>
  </div>

  <div class="controls">
    <button class="btn active" data-tab="terminal">Terminal</button>
    <button class="btn" data-tab="pins">My Pins <span id="pins-count">0</span></button>
    <button class="btn" id="theme-toggle">☀️ Light</button>
    <!-- Optional Monzo button in controls -->
    <a href="https://monzo.me/iandreman" target="_blank" rel="noopener noreferrer" 
       class="monzo-btn">
      ☕ Monzo Support
    </a>
  </div>
</header>

<div id="terminal-tab" class="tab-content active">
  <div id="terminal" role="log" aria-live="polite"></div>
  <div class="input-line">
    <span class="prompt">></span>
    <input id="input" type="text" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off" autofocus placeholder="paste url or share link…"/>
  </div>
</div>

<div id="pins-tab" class="tab-content">
  <input type="search" id="search" placeholder="Search name, url, coordinates, share links…" aria-label="Search saved pins"/>
  <div id="pins-container" role="list" aria-live="polite"></div>
  <div id="no-pins-message" style="display:none;">
    <div style="font-size:4rem; margin-bottom:1.2rem;">📍</div>
    <p><strong>No pins saved yet.</strong></p>
    <p>Use the Terminal to paste URLs/share links,<br>or tap + to save current location.</p>
  </div>
</div>

<!-- Optional footer with Monzo link -->
<footer>
  GPS Pins — 100% local & private<br>
  <a href="https://monzo.me/iandreman" target="_blank" rel="noopener noreferrer" 
     style="color:var(--purple); font-weight:500; text-decoration:none;">
    Support development via Monzo ☕
  </a>
</footer>

<button id="fab" title="Save current location">+</button>

<script>
const STORAGE_KEY = 'gps-pins-v21';
let pins = loadPins();
let lastUsedName = localStorage.getItem('gps-pins-lastname') || '';

const terminal   = document.getElementById('terminal');
const input      = document.getElementById('input');
const pinsList   = document.getElementById('pins-container');
const noPinsMsg  = document.getElementById('no-pins-message');
const searchEl   = document.getElementById('search');
const count      = document.getElementById('pins-count');
const themeBtn   = document.getElementById('theme-toggle');
const fab        = document.getElementById('fab');
const body       = document.body;

function loadPins() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function savePins() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(pins));
    count.textContent = pins.length;
    return true;
  } catch {
    alert("Save failed — storage may be full or blocked.");
    return false;
  }
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,10);
}

function escape(s = '') {
  return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
}

function getShareUrl(pin) {
  const data = {n: pin.name, u: pin.url||null, la: pin.lat??null, lo: pin.lng??null, acc: pin.accuracy??null, t: pin.time};
  return `${location.origin}${location.pathname}#p=${btoa(JSON.stringify(data))}`;
}

function emailSinglePin(pin) {
  const shareUrl = getShareUrl(pin);
  let subject = pin.lat != null ? `GPS Pin: ${pin.name}` : `URL Pin: ${pin.name}`;
  let content = `Name: ${pin.name}\n`;
  if (pin.url) content += `URL: ${pin.url}\n`;
  if (pin.lat != null) {
    content += `Coordinates: ${pin.lat.toFixed(6)}, ${pin.lng.toFixed(6)}` +
               (pin.accuracy ? ` (±${Math.round(pin.accuracy)} m)` : '') + '\n';
  }
  content += `Saved: ${new Date(pin.time).toLocaleString()}\n\nShare link:\n${shareUrl}\n\n---\nCreated with GPS Pins`;
  window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(content)}`;
  println(`<span class="success">Opening email for "${escape(pin.name)}"…</span>`);
}

async function copyToClipboard(text, btn = null) {
  try {
    await navigator.clipboard.writeText(text);
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = orig;
        btn.classList.remove('copied');
      }, 1600);
    }
  } catch {
    println('<span class="error">Clipboard copy failed</span>');
  }
}

function handleInput(txt) {
  if (!txt) return;

  println(`<span class="prompt">></span> ${escape(txt)}`);

  let data = null;
  let isShareLink = false;

  if (txt.includes('#p=')) {
    try {
      const hashPart = txt.split('#p=')[1].split(/[&#?]/)[0];
      data = JSON.parse(atob(hashPart));
      isShareLink = !!(data && (data.n || data.u || (data.la != null && data.lo != null)));
    } catch {}
  }

  let savedCount = 0;

  if (isShareLink && data) {
    const baseName = data.n ||
                     (data.u ? (new URL(data.u).hostname || 'Link').replace(/^www\./, '') : 'Location');

    if (data.u && !pins.some(p => p.url === data.u)) {
      pins.push({
        id: generateId(),
        name: baseName + (data.la != null && data.lo != null ? ' (link)' : ''),
        url: data.u,
        time: Date.now()
      });
      savedCount++;
    }

    if (data.la != null && data.lo != null) {
      const exists = pins.some(p =>
        p.lat === data.la && p.lng === data.lo &&
        Math.abs((p.accuracy || 0) - (data.acc || 0)) < 2
      );
      if (!exists) {
        pins.push({
          id: generateId(),
          name: baseName + (data.u ? ' (location)' : ''),
          lat: data.la,
          lng: data.lo,
          accuracy: data.acc,
          time: Date.now()
        });
        savedCount++;
      }
    }

    if (savedCount > 0) {
      if (savePins()) {
        println(`<span class="success">Imported ${savedCount} new pin${savedCount > 1 ? 's' : ''} from share link!</span>`);
        refreshPinsIfVisible();
      }
    } else {
      println('<span class="info">Share link content already saved or empty.</span>');
    }
  } else {
    try {
      const urlObj = new URL(txt);
      const fullUrl = urlObj.href;
      if (pins.some(p => p.url === fullUrl)) {
        println('<span class="info">This URL is already saved.</span>');
        return;
      }

      const suggestedName = (urlObj.hostname || 'Link').replace(/^www\./, '');
      if (confirm(`Save this URL pin?\n\nName: ${suggestedName}\nURL: ${fullUrl.slice(0, 100)}${fullUrl.length > 100 ? '…' : ''}`)) {
        pins.push({
          id: generateId(),
          name: suggestedName,
          url: fullUrl,
          time: Date.now()
        });
        if (savePins()) {
          println(`<span class="success">Saved URL pin: ${escape(suggestedName)}</span>`);
          refreshPinsIfVisible();
        }
      }
    } catch {
      println('<span class="error">Not a valid URL or share link format.</span>');
    }
  }
}

function println(html, cls = 'line') {
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

const print = {
  success: m => println(`<span class="success">${m}</span>`),
  error:   m => println(`<span class="error">${m}</span>`),
  info:    m => println(`<span class="info">${m}</span>`),
  system:  m => println(`<span class="system">${m}</span>`)
};

function refreshPinsIfVisible() {
  if (document.querySelector('[data-tab="pins"].active')) renderPins(searchEl.value);
}

function toggleTheme() {
  const next = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  body.setAttribute('data-theme', next);
  themeBtn.textContent = next === 'light' ? '🌙 Dark' : '☀️ Light';
  localStorage.setItem('gps-pins-theme', next);
}

themeBtn.addEventListener('click', toggleTheme);
if (localStorage.getItem('gps-pins-theme')) {
  const th = localStorage.getItem('gps-pins-theme');
  body.setAttribute('data-theme', th);
  themeBtn.textContent = th === 'light' ? '🌙 Dark' : '☀️ Light';
}

input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const txt = input.value.trim();
    if (txt) {
      handleInput(txt);
    }
    input.value = '';
  }
});

input.addEventListener('paste', () => {
  setTimeout(() => {
    const txt = input.value.trim();
    if (txt) handleInput(txt);
  }, 80);
});

fab.addEventListener('click', () => {
  if (!navigator.geolocation) return print.error('Geolocation not supported');
  print.system('Requesting location…');
  navigator.geolocation.getCurrentPosition(
    pos => {
      const {latitude:lat, longitude:lng, accuracy} = pos.coords;
      const name = lastUsedName || `Location ${new Date().toLocaleTimeString()}`;
      pins.push({id:generateId(), name, lat, lng, accuracy, time:Date.now()});
      if (savePins()) {
        print.success(`Saved GPS: ${lat.toFixed(6)}, ${lng.toFixed(6)} (±${Math.round(accuracy)}m)`);
        refreshPinsIfVisible();
      }
      lastUsedName = name;
      localStorage.setItem('gps-pins-lastname', name);
    },
    err => print.error(`Location error: ${err.message}`),
    {enableHighAccuracy: true, timeout: 10000, maximumAge: 0}
  );
});

document.querySelectorAll('[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
    if (btn.dataset.tab === 'pins') renderPins(searchEl.value);
  });
});

function renderPins(q = '') {
  pinsList.innerHTML = '';
  q = q.toLowerCase().trim();

  const filtered = pins.filter(p =>
    !q ||
    (p.name   && p.name.toLowerCase().includes(q)) ||
    (p.url    && p.url.toLowerCase().includes(q)) ||
    (p.lat != null && `${p.lat.toFixed(6)},${p.lng.toFixed(6)}`.includes(q)) ||
    getShareUrl(p).toLowerCase().includes(q)
  );

  count.textContent = pins.length;

  if (!filtered.length) {
    noPinsMsg.style.display = pins.length === 0 ? 'block' : 'none';
    if (pins.length > 0) {
      pinsList.innerHTML = '<div style="text-align:center; padding:4rem; color:var(--muted);">No matching pins found.</div>';
    }
    return;
  }

  noPinsMsg.style.display = 'none';

  filtered.forEach(p => {
    const card = document.createElement('div');
    card.className = `card ${p.url && p.lat == null ? 'url-pin' : ''}`;
    card.setAttribute('role', 'listitem');

    let html = `<div class="pin-title">${escape(p.name)}</div>`;

    if (p.url) {
      html += `<a href="${escape(p.url)}" target="_blank" rel="noopener noreferrer" style="color:var(--purple); display:block; margin:0.6rem 0; word-break:break-all;">${escape(p.url)}</a>`;
    } else if (p.lat != null) {
      html += `
        <div style="font-family:monospace; margin:0.6rem 0; color:var(--accent-dim);">
          ${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}${p.accuracy ? ` (±${Math.round(p.accuracy)} m)` : ''}
        </div>
        <div style="color:var(--muted); font-size:0.95rem; margin-bottom:0.8rem;">
          ${new Date(p.time).toLocaleString([], {dateStyle:'medium', timeStyle:'short'})}
        </div>`;
    }

    const share = getShareUrl(p);
    html += `
      <div class="share-line">
        <span style="flex:1; word-break:break-all;">Share: ${escape(share.slice(0,60))}${share.length>60?'…':''}</span>
        <button class="copy-share" data-url="${escape(share)}">Copy</button>
        <button class="email-pin" data-pin-id="${p.id}">Email</button>
      </div>`;

    card.innerHTML = html;
    pinsList.appendChild(card);
  });

  pinsList.querySelectorAll('.copy-share:not([data-listener])').forEach(btn => {
    btn.addEventListener('click', () => copyToClipboard(btn.dataset.url, btn));
    btn.dataset.listener = 'true';
  });

  pinsList.querySelectorAll('.email-pin:not([data-listener])').forEach(btn => {
    btn.addEventListener('click', () => {
      const pin = pins.find(p => p.id === btn.dataset.pinId);
      if (pin) emailSinglePin(pin);
    });
    btn.dataset.listener = 'true';
  });
}

// Boot
terminal.innerHTML = '';
print.system('<span style="font-size:1.25rem; font-weight:700;">GPS Pins</span>');
print.system('100% local • offline • private');
println('─'.repeat(60), 'system');
println('');
print.info('Paste URL or share link → auto-import share links, confirm normal URLs');
print.info('"Copy" → copy share link');
print.info('"Email" → send single pin');
print.info('+ → save current location');
// Optional: tiny Monzo note in terminal
println('<span class="system">Like the tool? You can support via Monzo: <a href="https://monzo.me/iandreman" target="_blank" style="color:var(--accent);">Monzo</a> ☕</span>');
println('');
print.info('Ready.');
println('');

count.textContent = pins.length;
renderPins();
input.focus();
searchEl.addEventListener('input', () => renderPins(searchEl.value));
</script>
</body>
</html>
