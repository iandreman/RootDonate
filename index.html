<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Terminal – CleverBot</title>
  <style>
    :root {
      --bg: #0a0e14;
      --surface: #11151c;
      --text: #c5d0e0;
      --muted: #6c7989;
      --accent: #5ab0ff;
      --purple: #c39eff;
      --green: #4fd68a;
      --border: #1f2a3a;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Consolas', 'Courier New', monospace;
      margin: 0;
      padding: 0;
      min-height: 100dvh;
      line-height: 1.45;
    }
    header {
      padding: 1rem 1.5rem;
      background: rgba(10,14,20,0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    h1 {
      margin: 0;
      font-size: 2.1rem;
      text-align: center;
      color: var(--purple);
      letter-spacing: -0.5px;
    }
    .tabs {
      text-align: center;
      margin: 0.9rem 0 0.4rem;
    }
    .tab-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 0.5rem 1.2rem;
      margin: 0 0.4rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.18s;
    }
    .tab-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(90,176,255,0.08);
    }
    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 1.2rem;
    }
    .terminal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      min-height: 60vh;
      display: flex;
      flex-direction: column;
    }
    #output {
      flex: 1;
      padding: 1.3rem 1.5rem;
      overflow-y: auto;
      font-size: 1.02rem;
    }
    .line {
      margin: 0.35rem 0;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .prompt { color: var(--accent); font-weight: bold; }
    .bot    { color: var(--purple); }
    .success { color: var(--green); }
    .error   { color: #ff6b6b; }
    .input-area {
      display: flex;
      align-items: center;
      padding: 0.9rem 1.5rem;
      background: rgba(0,0,0,0.35);
      border-top: 1px solid var(--border);
      gap: 0.6rem;
    }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font: inherit;
      outline: none;
      caret-color: var(--accent);
    }
    .history-item {
      background: rgba(20,25,35,0.6);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.1rem 1.3rem;
      margin: 1.1rem 0;
    }
    .history-item.user   { border-left: 3px solid var(--accent); }
    .history-item.bot    { border-left: 3px solid var(--purple); }
    .sender-tag {
      font-weight: bold;
      margin-bottom: 0.4rem;
      display: inline-block;
    }
    .msg-text {
      margin: 0.5rem 0 0.9rem;
      white-space: pre-wrap;
    }
    .timestamp {
      color: var(--muted);
      font-size: 0.88rem;
    }
    .actions {
      margin-top: 1rem;
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.45rem 1rem;
      border-radius: 5px;
      border: 1px solid;
      background: transparent;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.16s;
    }
    .btn-import {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-import:hover { background: rgba(90,176,255,0.12); }
    .btn-email {
      border-color: var(--green);
      color: var(--green);
    }
    .btn-email:hover { background: rgba(79,214,138,0.12); }
    .link-preview {
      margin: 0.9rem 0;
      padding: 0.6rem;
      background: rgba(0,0,0,0.4);
      border-radius: 5px;
      font-size: 0.9rem;
      color: #8899aa;
      word-break: break-all;
      font-family: monospace;
    }
  </style>
</head>
<body>

<header>
  <h1>Smart Terminal</h1>
  <div class="tabs">
    <button class="tab-btn active" data-tab="terminal">Terminal</button>
    <button class="tab-btn" data-tab="history">History</button>
  </div>
</header>

<main>

  <div id="terminal" class="terminal">
    <div id="output">
      <div class="line success">┌────────────────────────────────────────────┐</div>
      <div class="line success">│  Smart Terminal – CleverBot 2026 edition   │</div>
      <div class="line success">└────────────────────────────────────────────┘</div>
      <div class="line">Type messages or paste import links</div>
      <div class="line muted">Commands: clear, help, exit</div>
      <div class="line"></div>
    </div>

    <div class="input-area">
      <span class="prompt">></span>
      <input id="input" autocomplete="off" autofocus placeholder="..." />
    </div>
  </div>

  <div id="history" class="terminal" style="display:none;">
    <div id="history-content" style="padding:1.3rem 1.5rem;">
      <!-- cards go here -->
    </div>
  </div>

</main>

<script>
let messages = JSON.parse(localStorage.getItem('smart_terminal_msgs') || '[]');

const output = document.getElementById('output');
const input  = document.getElementById('input');
const historyContent = document.getElementById('history-content');

function println(html = '', cls = 'line') {
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function shortHash(msg) {
  let h = 0;
  const str = msg.text + msg.time + msg.from;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  }
  return Math.abs(h).toString(36).slice(0, 10);
}

function makeImportLink(msg) {
  const pair = [msg];
  const idx = messages.indexOf(msg);
  if (idx >= 0 && idx + 1 < messages.length && messages[idx+1].from === 'bot') {
    pair.push(messages[idx+1]);
  }
  const json = JSON.stringify(pair);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  return `data:text/json;base64,${b64}`;
}

function makeEmailText(msg) {
  const who = msg.from === 'user' ? 'You' : 'CleverBot';
  const dt = new Date(msg.time).toLocaleString([], {
    weekday: 'short', month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
  return `${who}  •  ${dt}\n${msg.text}\n`;
}

function renderHistory() {
  historyContent.innerHTML = '';
  if (messages.length === 0) {
    historyContent.innerHTML = '<div class="line muted" style="text-align:center; padding:4rem 0;">No messages yet...</div>';
    return;
  }

  messages.forEach(m => {
    const importUrl = makeImportLink(m);
    const emailTxt  = makeEmailText(m);
    const pretty    = `cb-pin://${shortHash(m)}`;
    const timeShort = new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    const div = document.createElement('div');
    div.className = `history-item ${m.from}`;
    div.innerHTML = `
      <div class="sender-tag">${m.from === 'user' ? 'YOU' : 'BOT'}</div>
      <div class="msg-text">${m.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>
      <div class="timestamp">[${timeShort}]</div>

      <div class="link-preview">Import: ${pretty}</div>

      <div class="actions">
        <button class="btn btn-import" data-url="${importUrl}">Copy Import Link</button>
        <button class="btn btn-email" data-email="${encodeURIComponent(emailTxt)}">Copy for Email</button>
      </div>
    `;
    historyContent.appendChild(div);
  });
}

// Tab switching
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    document.getElementById('terminal').style.display = btn.dataset.tab === 'terminal' ? 'flex' : 'none';
    document.getElementById('history').style.display   = btn.dataset.tab === 'history'  ? 'block' : 'none';

    if (btn.dataset.tab === 'history') renderHistory();
  });
});

// Input handling
input.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  let txt = input.value.trim();
  if (!txt) return;

  println(`<span class="prompt">></span> ${txt.replace(/</g,'&lt;')}`);

  if (txt.toLowerCase() === 'clear') {
    output.innerHTML = '';
    println('<span class="success">Terminal cleared.</span>');
  } else if (txt.toLowerCase() === 'help') {
    println('<span class="muted">Commands: clear, help, exit</span>');
    println('<span class="muted">Paste cb-pin://... or data:text/... to import</span>');
  } else if (['exit','quit','bye'].includes(txt.toLowerCase())) {
    println('<span class="muted">Goodbye. Refresh to restart.</span>');
    input.disabled = true;
  } else if (txt.startsWith('data:text/json;base64,')) {
    try {
      const [,b64] = txt.split(',');
      const json = decodeURIComponent(escape(atob(b64)));
      const arr = JSON.parse(json);
      if (Array.isArray(arr)) {
        messages.push(...arr);
        localStorage.setItem('smart_terminal_msgs', JSON.stringify(messages));
        println(`<span class="success">Imported ${arr.length} message(s)</span>`);
      }
    } catch (err) {
      println(`<span class="error">Invalid import data</span>`);
    }
  } else {
    const userEntry = {from:'user', text:txt, time:Date.now()};
    messages.push(userEntry);

    const replies = ['ok', 'got it', 'interesting...', 'nice', '👀', 'haha true'];
    const botText = replies[Math.floor(Math.random()*replies.length)];
    const botEntry = {from:'bot', text:botText, time:Date.now()+80};
    messages.push(botEntry);

    localStorage.setItem('smart_terminal_msgs', JSON.stringify(messages));

    println(`<span class="bot">CleverBot:</span> ${botText}`);
  }

  input.value = '';
  input.focus();
});

// Button clicks (copy)
document.addEventListener('click', e => {
  const t = e.target;
  if (!t.matches('.btn')) return;

  if (t.matches('.btn-import')) {
    navigator.clipboard.writeText(t.dataset.url).then(() => {
      const orig = t.textContent;
      t.textContent = 'Copied!';
      setTimeout(() => t.textContent = orig, 1600);
    }).catch(() => alert('Copy failed\n\n' + t.dataset.url));
  }

  if (t.matches('.btn-email')) {
    const text = decodeURIComponent(t.dataset.email);
    navigator.clipboard.writeText(text).then(() => {
      const orig = t.textContent;
      t.textContent = 'Email text copied!';
      setTimeout(() => t.textContent = orig, 1800);
    }).catch(() => alert('Copy failed\n\n' + text));
  }
});

// Start
input.focus();
</script>
</body>
</html>
