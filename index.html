<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Root • Live Time</title>
    <style>
        :root {
            --primary: #00ffaa;
            --bg: #0a0a0a;
            --card: #111111;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--primary);
            text-align: center;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }
        
        h1 {
            font-size: 2.1rem;
            margin: 20px 0 8px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        
        #time {
            font-size: 6.8rem;
            font-weight: 700;
            letter-spacing: 6px;
            margin: 10px 0 20px;
            text-shadow: 0 0 40px rgba(0, 255, 170, 0.5);
        }
        
        .status {
            margin: 15px 0;
            font-size: 1.05rem;
            min-height: 32px;
        }
        
        .log {
            width: 100%;
            max-width: 620px;
            background: var(--card);
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
            text-align: left;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 0.9rem;
            max-height: 420px;
            overflow-y: auto;
            border: 1px solid rgba(0, 255, 170, 0.15);
        }
        
        .log div {
            margin: 4px 0;
            opacity: 0.9;
            white-space: pre-wrap;
        }
        
        .success { color: #00ffaa; }
        .error   { color: #ff4444; }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.65; }
        }
    </style>
</head>
<body>
    <h1>🌐 ROOT LIVE SYNC</h1>
    <div id="time">00:00:00</div>
    <p>Syncing real-time data • Every 5 seconds</p>
    
    <div class="status" id="status">Initializing connection...</div>
    <div class="log" id="log"></div>

    <script>
        const LOG_LIMIT = 30;
        let sendInterval = null;
        
        // ← Change this to your actual working endpoint
        const AI_ENDPOINT = "https://www.rootdonate.co.uk"; 

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('en-US', { 
                hour12: false, 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            document.getElementById('time').textContent = timeStr;
        }

        function logMessage(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            const ts = new Date().toLocaleTimeString('en-GB', { hour12: false });
            
            entry.className = type;
            entry.textContent = `[${ts}] ${msg}`;
            
            logDiv.appendChild(entry);
            
            if (logDiv.children.length > LOG_LIMIT) {
                logDiv.removeChild(logDiv.children[0]);
            }
            
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function sendToAI() {
            const now = new Date();
            const payload = {
                timestamp: now.toISOString(),
                local_time: now.toLocaleString(),
                unix: Math.floor(now.getTime() / 1000),
                device: "iOS WebApp",
                source: "root-live-sync"
            };

            try {
                const response = await fetch(AI_ENDPOINT, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} ${response.statusText}`);
                }

                document.getElementById('status').innerHTML = 
                    `✅ Synced successfully <strong>${now.toLocaleTimeString()}</strong>`;
                document.getElementById('status').classList.add('pulse');
                
                logMessage(`✓ Sent → ${payload.timestamp}`, 'success');

            } catch (err) {
                document.getElementById('status').innerHTML = 
                    `❌ Connection failed: ${err.message}`;
                document.getElementById('status').classList.remove('pulse');
                logMessage(`Send failed: ${err.message}`, 'error');
                
                console.error("Sync error:", err);
            }
        }

        function startSync() {
            updateClock();
            setInterval(updateClock, 1000);

            logMessage("🌐 Root Live Sync initialized", 'success');
            
            // First send immediately
            sendToAI();
            
            // Then every 5 seconds
            sendInterval = setInterval(sendToAI, 5000);
        }

        // Auto-start
        window.onload = startSync;
    </script>
</body>
</html>
