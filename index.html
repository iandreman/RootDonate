<script>
// ==================== Firebase Config ====================
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyAJpd9btTi5DEq5B7NsDLD4G_pddVQi43Q",
  authDomain: "rootdonate.firebaseapp.com",
  projectId: "rootdonate",
  storageBucket: "rootdonate.firebasestorage.app",
  messagingSenderId: "838665513781",
  appId: "1:838665513781:web:308983a5b2713f20977a7c"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ==================== Auth Functions ====================
async function signInWithEmail() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
        alert("Please enter email and password");
        return;
    }

    try {
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        showMainApp(userCredential.user);
    } catch (error) {
        console.error(error);
        alert(getErrorMessage(error.code));
    }
}

async function signInWithGoogle() {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
        const result = await auth.signInWithPopup(provider);
        showMainApp(result.user);
    } catch (error) {
        alert(getErrorMessage(error.code));
    }
}

function forgotPassword() {
    const email = document.getElementById('email').value.trim();
    if (!email) {
        alert("Enter your email first");
        return;
    }
    auth.sendPasswordResetEmail(email)
        .then(() => alert("Password reset link sent to your email!"))
        .catch(err => alert(getErrorMessage(err.code)));
}

function getErrorMessage(code) {
    switch(code) {
        case 'auth/user-not-found':
        case 'auth/wrong-password': return "Invalid email or password";
        case 'auth/invalid-email': return "Invalid email address";
        case 'auth/too-many-requests': return "Too many attempts. Try again later";
        default: return "Sign in failed. Please try again.";
    }
}

function showMainApp(user) {
    document.getElementById('signinScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');

    // Show user info
    document.getElementById('userName').textContent = user.displayName || "User";
    document.getElementById('userEmail').textContent = user.email;

    // Initialize your app
    renderBankAccounts();
    calculate();
}

// Logout
function logout() {
    if (confirm("Sign out of RootDonate?")) {
        auth.signOut().then(() => {
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('signinScreen').classList.remove('hidden');
        });
    }
}

function updateDashboard() { /* your code */ }
function addBankAccount() { /* your code */ }
function formatAmount(input) { /* your code */ }
function makePayment() { /* your code */ }
function calculate() { /* your code */ }

// Auto check if already logged in
auth.onAuthStateChanged(user => {
    if (user) {
        showMainApp(user);
    }
});
</script>
