<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RootDonate</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Mono:wght@400;500&family=SF+Pro+Display:wght@400;500;600&display=swap');

        :root {
            --bg-body: #0a0a0a;
            --bg-container: #1c1c1e;
            --bg-chat: #161618;
            --accent-blue: #0a84ff;
            --accent-green: #30d158;
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'SF Pro Display', system-ui, -apple-system, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
            background: var(--bg-container);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.75);
        }

        .header {
            background: linear-gradient(135deg, #1f1f23, #0f0f11);
            padding: 40px 40px 32px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        .logo { font-size: 48px; margin-bottom: 10px; }
        h1 { margin: 0; font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }

        .subtitle {
            color: var(--text-secondary);
            margin-top: 8px;
            font-size: 17px;
        }

        .chat-area {
            min-height: 560px;
            padding: 32px;
            overflow-y: auto;
            background: var(--bg-chat);
            font-family: 'SF Mono', monospace;
            font-size: 15.5px;
            line-height: 1.65;
        }

        .message {
            margin-bottom: 36px;
            scroll-margin-top: 80px;
        }

        .user { color: var(--accent-blue); }
        .grok { color: var(--accent-green); }

        .action-links {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            font-size: 14px;
        }

        .action-link {
            color: var(--accent-blue);
            cursor: pointer;
            text-decoration: none;
        }

        .action-link:hover {
            text-decoration: underline;
        }

        .reply-to-btn {
            margin-top: 12px;
            background: rgba(48, 209, 88, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(48, 209, 88, 0.3);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reply-to-btn:hover {
            background: var(--accent-green);
            color: #000;
        }

        .input-area {
            padding: 24px 32px;
            background: var(--bg-container);
            border-top: 1px solid #333;
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            background: #2c2c2e;
            border: none;
            color: var(--text-primary);
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 16px;
            font-family: 'SF Mono', monospace;
            outline: none;
        }

        button {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0 32px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-green);
            color: #000;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 10000;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">🌐</div>
        <h1>RootDonate</h1>
        <p class="subtitle">Inspired by cleverbot.py • Apple Intelligence style</p>
    </div>

    <div class="chat-area" id="chat"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');
    let conversationHistory = [];

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;

        let html = `<div>${text}</div>`;

        if (type === 'grok') {
            const replyId = 'reply-' + Date.now();
            div.id = replyId;

            const shareUrl = generateShareLink(replyId);

            html += `
                <div class="action-links">
                    <span class="action-link" onclick="copyShareLink('${shareUrl}')">🔗 Share Link</span>
                    <span class="action-link" onclick="emailThisReply('${replyId}')">✉️ Email This Reply</span>
                </div>
                <button class="reply-to-btn" onclick="replyToThis('${replyId}')">
                    ↩️ Reply to this conversation
                </button>
            `;

            conversationHistory.push({ type: 'grok', text: text, id: replyId });
        } else {
            conversationHistory.push({ type: 'user', text: text });
        }

        div.innerHTML = html;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    // Generate shareable URL with conversation data
    function generateShareLink(replyId) {
        const data = {
            history: conversationHistory,
            highlight: replyId
        };
        const encoded = btoa(JSON.stringify(data));
        return `${window.location.origin}${window.location.pathname}#${encoded}`;
    }

    function copyShareLink(url) {
        navigator.clipboard.writeText(url).then(() => {
            showNotification("Share link copied to clipboard!");
        }).catch(() => {
            prompt("Copy this link:", url);
        });
    }

    function emailThisReply(replyId) {
        const shareUrl = generateShareLink(replyId);
        const lastReply = conversationHistory.find(m => m.id === replyId) || 
                         conversationHistory[conversationHistory.length - 1];

        let body = `Grok replied:\n\n${lastReply.text}\n\n`;
        body += `🔗 View this reply: ${shareUrl}\n\n`;
        body += `────────────────────────────\n\nFull conversation:\n\n`;

        conversationHistory.forEach(msg => {
            const prefix = msg.type === 'user' ? "You" : "Grok";
            body += `${prefix}: ${msg.text}\n\n`;
        });

        const subject = encodeURIComponent("RootDonate • Grok Conversation");
        window.location.href = `mailto:?subject=${subject}&body=${encodeURIComponent(body)}`;
    }

    function replyToThis(replyId) {
        const grokMsg = conversationHistory.find(m => m.id === replyId);
        if (!grokMsg) return;

        const quoted = grokMsg.text.length > 120 
            ? grokMsg.text.substring(0, 117) + "..." 
            : grokMsg.text;

        input.value = `> ${quoted}\n\n`;
        input.focus();
    }

    function showNotification(message) {
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.textContent = message;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 2800);
    }

    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        input.value = '';

        setTimeout(() => {
            let reply = "Interesting point. Tell me more.";

            const lower = text.toLowerCase();
            if (lower.includes("hello") || lower.includes("hi")) reply = "Hello! Good to see you.";
            else if (lower.includes("how are you")) reply = "I'm running perfectly, thanks for asking!";
            else if (lower.includes("cleverbot")) reply = "Ah yes, the legendary cleverbot.py... those were the days.";

            addMessage(reply, 'grok');
        }, 600);
    }

    // Handle deep links (shared URLs)
    function handleDeepLink() {
        const hash = window.location.hash.substring(1);
        if (!hash) return;

        try {
            const data = JSON.parse(atob(hash));
            conversationHistory = data.history || [];

            // Rebuild chat
            chat.innerHTML = '';
            conversationHistory.forEach(msg => {
                addMessage(msg.text, msg.type);
            });

            // Scroll to highlighted reply
            if (data.highlight) {
                setTimeout(() => {
                    const target = document.getElementById(data.highlight);
                    if (target) target.scrollIntoView({ behavior: "smooth", block: "center" });
                }, 300);
            }
        } catch (e) {
            console.warn("Invalid share link");
        }
    }

    // Event Listeners
    input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    window.onload = () => {
        setTimeout(() => {
            addMessage(
                "Hello! I'm Grok.<br><br>" +
                "Welcome to RootDonate — a clean Apple Intelligence inspired chat.<br><br>" +
                "Try sharing a reply or using \"Reply to this conversation\".", 
                'grok'
            );
        }, 400);

        handleDeepLink();
        window.addEventListener('hashchange', handleDeepLink);
    };
</script>

</body>
</html>
