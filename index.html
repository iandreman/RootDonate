<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RootDonate AI • Realm of Words</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Cinzel:wght@400;700&display=swap');

    body {
      background: linear-gradient(135deg, #1a0f08, #3a2a1f);
      font-family: 'Cinzel', serif;
      color: #e6d5b8;
    }

    .chat-container {
      max-width: 860px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat;
      box-shadow: 0 0 60px rgba(139, 69, 19, 0.6);
      border: 12px solid #4a2c0f;
      border-image: linear-gradient(#d4af37, #8b5a2b) 1;
    }

    .header {
      background: linear-gradient(to right, #3a2a1f, #5c4033);
      border-bottom: 6px solid #d4af37;
      padding: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.7);
    }

    .message {
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .scroll-bg {
      background: rgba(26, 15, 8, 0.85);
      backdrop-filter: blur(4px);
    }

    .user-bubble {
      background: linear-gradient(#4a2c0f, #3a2210);
      border: 3px solid #d4af37;
      box-shadow: 0 0 15px #d4af37;
    }

    .bot-bubble {
      background: linear-gradient(#2c1f14, #1f150f);
      border: 3px solid #8b5a2b;
      position: relative;
    }

    .bot-bubble::before {
      content: '✦';
      position: absolute;
      top: -12px;
      left: 20px;
      background: #3a2a1f;
      padding: 0 10px;
      color: #d4af37;
      font-size: 20px;
    }

    .input-area {
      background: linear-gradient(#3a2a1f, #2c1f14);
      border-top: 6px solid #d4af37;
    }

    .rune {
      font-family: 'UnifrakturCook', cursive;
      color: #ffd700;
      text-shadow: 0 0 10px #ffd700;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="chat-container rounded-3xl overflow-hidden flex flex-col">

  <!-- Header - Epic Title -->
  <div class="header flex items-center gap-4">
    <div class="w-14 h-14 bg-gradient-to-br from-amber-400 via-yellow-600 to-amber-800 rounded-full flex items-center justify-center text-4xl border-4 border-amber-300 shadow-inner">🛡️</div>
    <div>
      <h1 class="text-3xl font-bold tracking-wider rune">ROOTDONATE AI</h1>
      <p class="text-amber-300 text-sm flex items-center gap-2">
        <span class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></span>
        Realm of Words • Level 42 Sage Online
      </p>
    </div>
    
    <div class="ml-auto flex gap-3">
      <button id="share-btn" class="flex items-center gap-2 bg-amber-900 hover:bg-amber-800 px-5 py-2 rounded-xl text-sm font-medium border border-amber-400 transition-all">
        <i class="fa-solid fa-share-nodes"></i> Share Quest
      </button>
      <button id="new-btn" class="flex items-center gap-2 bg-amber-900 hover:bg-amber-800 px-5 py-2 rounded-xl text-sm font-medium border border-amber-400 transition-all">
        <i class="fa-solid fa-dungeon"></i> New Adventure
      </button>
    </div>
  </div>

  <!-- Chat Area - Ancient Scroll -->
  <div id="chat" class="flex-1 overflow-y-auto p-8 space-y-8 custom-scroll scroll-bg"></div>

  <!-- Input Area - Hero's Command -->
  <div class="input-area p-6">
    <div class="max-w-3xl mx-auto">
      <form id="chat-form" class="relative">
        <textarea id="user-input" rows="1"
          class="w-full bg-[#2c1f14] border-4 border-amber-700 rounded-2xl px-7 py-5 pr-20 text-[#e6d5b8] placeholder-amber-400 focus:outline-none focus:border-amber-400 resize-none text-lg leading-relaxed font-medium"
          placeholder="Speak thy query, adventurer... (e.g. What is the meaning of quantum?)"></textarea>
        
        <button type="submit"
          class="absolute right-5 bottom-5 w-12 h-12 bg-gradient-to-br from-amber-500 to-yellow-600 rounded-2xl flex items-center justify-center hover:scale-110 transition-all border-2 border-amber-300">
          <i class="fa-solid fa-scroll text-2xl text-[#1a0f08]"></i>
        </button>
      </form>
      
      <p class="text-center text-amber-400 text-xs mt-4 tracking-widest">
        Powered by Ancient Knowledge • Dictionary Runes • Grok Spirit
      </p>
    </div>
  </div>
</div>

<script>
  // (The entire JavaScript from your original code remains almost identical)
  // I only changed the welcome message and some response styling for flavor

  let conversation = [];
  let isOnline = true;

  const offlineDictionary = { /* same as your original */ 
    "hello": "A sacred greeting among wanderers of the realm.",
    "ai": "Artificial Intelligence — forged by mortals to mimic the gods' wisdom.",
    "grok": "To understand deeply, as if the knowledge flows through thy veins.",
    // ... add more if you want
  };

  const wittyResponses = { /* same as original */ };

  async function fetchOnlineDefinition(word) { /* same as original */ }
  function updateStatus() { /* same */ }
  function getOfflineResponse(word) { /* same */ }
  function getWittyResponse(msg) { /* same */ }
  async function getAIResponse(userMessage) { /* same logic */ }

  const chat = document.getElementById('chat');

  function renderConversation() {
    chat.innerHTML = '';
    conversation.forEach(msg => {
      const div = document.createElement('div');
      div.className = `message max-w-3xl mx-auto ${msg.role === 'user' ? 'ml-auto' : ''}`;

      if (msg.role === 'user') {
        div.innerHTML = `
          <div class="flex justify-end">
            <div class="user-bubble text-amber-100 rounded-3xl rounded-tr-none px-7 py-5 max-w-[85%] border-2">
              <p class="whitespace-pre-wrap">${msg.content}</p>
            </div>
          </div>`;
      } else {
        div.innerHTML = `
          <div class="flex gap-5">
            <div class="w-12 h-12 bg-gradient-to-br from-amber-400 to-yellow-700 rounded-2xl flex items-center justify-center text-3xl flex-shrink-0 border-4 border-amber-300">📜</div>
            <div class="bot-bubble text-[#e6d5b8] rounded-3xl rounded-tl-none px-7 py-5 max-w-[85%] definition">
              <p class="whitespace-pre-wrap">${msg.content}</p>
            </div>
          </div>`;
      }
      chat.appendChild(div);
    });
    chat.scrollTop = chat.scrollHeight;
  }

  function addMessage(content, role) {
    if (!content?.trim()) return;
    conversation.push({ role, content: content.trim() });
    renderConversation();
  }

  function showWelcome() {
    if (conversation.length > 0) return;
    chat.innerHTML = `
      <div class="message max-w-3xl mx-auto">
        <div class="flex gap-5">
          <div class="w-12 h-12 bg-gradient-to-br from-amber-400 to-yellow-700 rounded-2xl flex items-center justify-center text-4xl flex-shrink-0 border-4 border-amber-300">🛡️</div>
          <div class="bot-bubble rounded-3xl rounded-tl-none px-8 py-6 max-w-[85%]">
            <p class="text-2xl">Hail, brave adventurer!</p>
            <p class="text-amber-300 mt-3">I am RootDonate, Keeper of the Eternal Dictionary. Speak thy query and I shall consult the ancient tomes.</p>
            <p class="text-amber-400 text-sm mt-6">Try: "What is love?" • "Define quantum" • "Tell me a tale of the gods"</p>
          </div>
        </div>
      </div>
    `;
  }

  // Event listeners (same as your original, just keep them)
  const form = document.getElementById('chat-form');
  const input = document.getElementById('user-input');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const question = input.value.trim();
    if (!question) return;

    addMessage(question, 'user');
    input.value = '';
    input.style.height = 'auto';

    const thinkingDiv = document.createElement('div');
    thinkingDiv.className = 'message max-w-3xl mx-auto';
    thinkingDiv.innerHTML = `
      <div class="flex gap-5">
        <div class="w-12 h-12 bg-gradient-to-br from-amber-400 to-yellow-700 rounded-2xl flex items-center justify-center text-3xl flex-shrink-0 border-4 border-amber-300">📜</div>
        <div class="bot-bubble rounded-3xl rounded-tl-none px-7 py-5">
          <div class="flex items-center gap-3 text-amber-300">
            <i class="fa-solid fa-circle animate-pulse"></i>
            <span>Consulting the ancient scrolls...</span>
          </div>
        </div>
      </div>
    `;
    chat.appendChild(thinkingDiv);
    chat.scrollTop = chat.scrollHeight;

    const reply = await getAIResponse(question);
    thinkingDiv.remove();
    addMessage(reply, 'bot');
  });

  // Auto-resize, Enter key, Share, New Chat (copy from your original)
  input.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 180) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.dispatchEvent(new Event('submit'));
    }
  });

  document.getElementById('share-btn').addEventListener('click', () => {
    if (conversation.length === 0) return alert("No quest logged yet!");
    navigator.clipboard.writeText(window.location.href)
      .then(() => alert("📜 Quest link copied to thy spellbook!"))
      .catch(() => alert("Copy the URL manually, adventurer."));
  });

  document.getElementById('new-btn').addEventListener('click', () => {
    if (confirm("Begin a new adventure?")) {
      conversation = [];
      chat.innerHTML = '';
      showWelcome();
      input.focus();
    }
  });

  // Initialize
  window.addEventListener('load', () => {
    showWelcome();
    input.focus();
  });
</script>
</body>
</html>
