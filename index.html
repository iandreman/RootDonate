<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPS Pins – Private Markers & URLs</title>
  <meta name="description" content="Save GPS locations & URLs privately. 100% local, offline."/>

  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #79c0ff;
      --purple: #bc8cff;
      --danger: #f85149;
      --border: rgba(88,166,255,0.2);
      --shadow: 0 6px 24px rgba(0,0,0,0.5);
    }
    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --text: #24292f;
      --muted: #57606a;
      --accent: #0969da;
      --accent-dim: #1f6feb;
      --purple: #8250df;
      --danger: #cf222e;
      --border: rgba(9,105,218,0.15);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.2rem 1.6rem;
      background: rgba(13,17,23,0.9);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    h1 {
      font-size: clamp(2.1rem, 7.5vw, 2.8rem);
      background: linear-gradient(90deg, var(--purple), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
    }

    .subtitle {
      color: var(--muted);
      text-align: center;
      font-size: 1rem;
      margin-top: 0.5rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 1.3rem 0;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.7rem 1.6rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: rgba(88,166,255,0.12);
      color: var(--accent);
      transition: all 0.2s;
    }
    .btn:hover { background: rgba(88,166,255,0.3); }
    .btn.active { background: var(--accent); color: #000; }

    .tab-content { display: none; flex: 1; flex-direction: column; }
    .tab-content.active { display: flex; }

    #terminal-tab { flex: 1; display: flex; flex-direction: column; }
    #terminal {
      flex: 1;
      padding: 1.8rem;
      overflow-y: auto;
      font-family: 'Consolas', 'Courier New', monospace;
      line-height: 1.7;
      font-size: 1.08rem;
    }

    .line { margin: 0.5rem 0; white-space: pre-wrap; word-break: break-word; }
    .prompt { color: var(--accent-dim); font-weight: bold; }
    .info    { color: #79c0ff; }
    .success { color: #56d364; font-weight: bold; }
    .error   { color: var(--danger); font-weight: bold; }
    .system  { color: var(--muted); font-style: italic; }

    .input-line {
      display: flex;
      align-items: center;
      padding: 1.2rem 1.8rem;
      background: rgba(0,0,0,0.4);
      border-top: 1px solid var(--border);
      gap: 1rem;
    }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--accent-dim);
      font: inherit;
      outline: none;
      caret-color: var(--accent);
      font-size: 1.1rem;
    }

    #pins-tab { padding: 1.8rem; overflow-y: auto; }
    #search {
      width: 100%;
      max-width: 640px;
      padding: 1.1rem 1.4rem;
      margin: 0 auto 1.8rem;
      display: block;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1.05rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.6rem;
      margin: 1.4rem 0;
      box-shadow: var(--shadow);
      transition: transform 0.18s;
    }
    .card:hover { transform: translateY(-5px); }

    .pin-title {
      font-size: 1.45rem;
      margin-bottom: 0.8rem;
      color: var(--accent);
      word-break: break-all;
    }
    .url-pin .pin-title { color: var(--purple); }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem 2.2rem;
      color: var(--muted);
      font-size: 1rem;
      margin: 0.8rem 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 1.2rem;
    }

    .small-btn {
      padding: 0.6rem 1.2rem;
      font-size: 0.95rem;
      border-radius: 8px;
      cursor: pointer;
      background: rgba(88,166,255,0.15);
      border: 1px solid var(--border);
      color: var(--accent);
    }
    .small-btn:hover { background: rgba(88,166,255,0.3); }

    .copy-btn.copied {
      background: rgba(86,212,100,0.3) !important;
      color: #56d364 !important;
      border-color: #56d364 !important;
    }

    .share-line {
      margin-top: 0.8rem;
      font-size: 0.98rem;
      color: var(--muted);
      word-break: break-all;
    }

    .share-line button {
      margin-left: 1rem;
      background: rgba(187,134,252,0.18);
      border: 1px solid var(--purple);
      color: var(--purple);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
    }

    #fab {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--purple), var(--accent));
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 2.6rem;
      box-shadow: 0 10px 32px rgba(0,0,0,0.6);
      cursor: pointer;
      z-index: 999;
      transition: all 0.22s;
    }
    #fab:hover { transform: scale(1.16); }
    #fab:active { transform: scale(0.9); }

    @media (max-width: 640px) {
      .actions { flex-direction: column; gap: 0.8rem; }
      .small-btn { width: 100%; text-align: center; }
      #fab { bottom: 24px; right: 24px; width: 64px; height: 64px; font-size: 2.4rem; }
    }
  </style>
</head>
<body data-theme="dark">

<header>
  <h1>GPS Pins</h1>
  <div class="subtitle">Save & share locations + links • 100% offline • local only</div>

  <div class="controls">
    <button class="btn active" data-tab="terminal">Terminal</button>
    <button class="btn" data-tab="pins">My Pins <span id="pins-count">0</span></button>
    <button class="btn" id="theme-toggle">☀️ Light</button>
  </div>
</header>

<div id="terminal-tab" class="tab-content active">
  <div id="terminal"></div>
  <div class="input-line">
    <span class="prompt">></span>
    <input id="input" type="text" autocomplete="off" spellcheck="false" autofocus/>
  </div>
</div>

<div id="pins-tab" class="tab-content">
  <input type="text" id="search" placeholder="Search name, url, coordinates, share links…"/>
  <div id="pins-container"></div>
</div>

<button id="fab" title="Save current location (double-tap or long-press for name)">+</button>

<script>
// ────────────────────────────────────────────────
// Core
// ────────────────────────────────────────────────
const STORAGE_KEY = 'gps-pins-v11-final';
let pins = getPins();
let lastName = localStorage.getItem('gps-pins-lastname') || '';
let trackingWatchId = null;
let lastFabClick = 0;

const terminal = document.getElementById('terminal');
const input = document.getElementById('input');
const pinsContainer = document.getElementById('pins-container');
const searchInput = document.getElementById('search');

function getPins() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function savePins() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(pins));
    document.getElementById('pins-count').textContent = pins.length;
    return true;
  } catch (e) {
    alert('Save failed — storage may be full or blocked.');
    return false;
  }
}

function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,9); }

function escape(s='') { return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }

function getShareUrl(pin) {
  const data = {
    id: pin.id,
    name: pin.name,
    url: pin.url || null,
    lat: pin.lat ?? null,
    lng: pin.lng ?? null,
    accuracy: pin.accuracy ?? null,
    time: pin.time
  };
  return `${location.origin}${location.pathname}#p=${btoa(JSON.stringify(data))}`;
}

async function copyToClipboard(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = orig;
      btn.classList.remove('copied');
    }, 1800);
  } catch {
    alert('Copy failed – please copy manually.');
  }
}

function println(html, cls='line') {
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

function printSuccess(msg) { println(msg, 'success'); }
function printError(msg)   { println(msg, 'error'); }
function printInfo(msg)    { println(msg, 'info'); }
function printSystem(msg)  { println(msg, 'system'); }

// Helper to attach copy listeners to all .copy-share buttons in a container
function attachCopyListeners(container = document) {
  container.querySelectorAll('.copy-share:not([data-listener])').forEach(btn => {
    btn.addEventListener('click', ev => {
      copyToClipboard(btn.dataset.url, btn);
    });
    btn.setAttribute('data-listener', 'attached');
  });
}

// ────────────────────────────────────────────────
// Boot screen
// ────────────────────────────────────────────────
terminal.innerHTML = '';
println('<span class="system" style="font-size:1.2rem; font-weight:bold;">Welcome to GPS Pins</span>', 'system');
println('<span class="system">Private, local, offline saving of locations & links</span>', 'system');
println('<span class="system">────────────────────────────────────────────────────</span>', 'system');
println('');
printInfo('Paste or type any URL → <b>autosaves + share link appears</b>');
printInfo('Tap + → <b>save current location</b> + share link');
printInfo('Double-tap/long-press + → choose name');
printInfo('Type <b>track on</b> / <b>track off</b> → continuous logging');
printInfo('Type <b>help</b> → all commands');
println('');
println('<span class="info">Ready. Paste something or tap + to begin.</span>', 'info');
println('');

// ────────────────────────────────────────────────
// Tab switching
// ────────────────────────────────────────────────
document.querySelectorAll('.controls .btn[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn[data-tab]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    const tabEl = document.getElementById(btn.dataset.tab + '-tab');
    tabEl.classList.add('active');

    if (btn.dataset.tab === 'pins') {
      renderPins(searchInput.value);
    }
  });
});

// ────────────────────────────────────────────────
// Render My Pins
// ────────────────────────────────────────────────
function renderPins(filter = '') {
  pinsContainer.innerHTML = '';

  const lowerFilter = filter.toLowerCase().trim();

  const filtered = pins.filter(p => {
    if (!lowerFilter) return true;
    return (
      (p.name || '').toLowerCase().includes(lowerFilter) ||
      (p.url || '').toLowerCase().includes(lowerFilter) ||
      (p.lat && p.lat.toString().includes(lowerFilter)) ||
      (p.lng && p.lng.toString().includes(lowerFilter)) ||
      getShareUrl(p).toLowerCase().includes(lowerFilter)
    );
  });

  if (filtered.length === 0) {
    pinsContainer.innerHTML = '<div style="text-align:center; padding:3rem; color:var(--muted);">No pins match your search.</div>';
  }

  filtered.forEach(pin => {
    const card = document.createElement('div');
    card.className = 'card' + (pin.url ? ' url-pin' : '');
    
    let content = `<div class="pin-title">${escape(pin.name)}</div>`;

    if (pin.url) {
      content += `<div><a href="${escape(pin.url)}" target="_blank" style="color:var(--purple);">${escape(pin.url)}</a></div>`;
    } else if (pin.lat != null && pin.lng != null) {
      content += `<div style="font-family:monospace; margin:0.5rem 0;">
        ${pin.lat.toFixed(6)}, ${pin.lng.toFixed(6)}
        ${pin.accuracy ? `<span style="color:var(--muted);"> (±${pin.accuracy}m)</span>` : ''}
      </div>`;
      content += `<div style="color:var(--muted); font-size:0.95rem;">
        ${new Date(pin.time).toLocaleString()}
      </div>`;
    }

    const shareUrl = getShareUrl(pin);
    content += `
      <div class="share-line">
        Share link: ${escape(shareUrl)}
        <button class="copy-share small-btn" data-url="${escape(shareUrl)}">Copy</button>
      </div>`;

    card.innerHTML = content;
    pinsContainer.appendChild(card);
  });

  attachCopyListeners(pinsContainer);
}

// ────────────────────────────────────────────────
// FAB – Save location
// ────────────────────────────────────────────────
document.getElementById('fab').addEventListener('click', async e => {
  const now = Date.now();
  if (now - lastFabClick < 600) return;
  lastFabClick = now;

  let name = lastName || `Pin ${pins.length + 1}`;

  // Double-click or long-press detection
  if (e.detail === 2 || (now - (window.lastFabDown || 0) > 600)) {
    const custom = prompt("Name this location?", name);
    if (custom === null) return;
    name = custom.trim() || name;
  }

  if (name && name !== lastName) {
    lastName = name;
    localStorage.setItem('gps-pins-lastname', lastName);
  }

  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, {enableHighAccuracy:true, timeout:12000})
    );

    const pin = {
      id: generateId(),
      name,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      accuracy: Math.round(pos.coords.accuracy),
      time: Date.now()
    };

    pins.push(pin);
    if (savePins()) {
      const shareUrl = getShareUrl(pin);
      printSuccess(`Location saved → ${escape(name)} @ ${pin.lat.toFixed(6)}, ${pin.lng.toFixed(6)}`);
      println(`<span class="share-line">Share link: ${escape(shareUrl)} <button class="copy-share" data-url="${escape(shareUrl)}">Copy</button></span>`, 'info');
      attachCopyListeners(terminal);

      if (document.querySelector('[data-tab="pins"].active')) renderPins(searchInput.value);
    }
  } catch (err) {
    printError("Couldn't get location: " + (err.code === 1 ? "permission denied" : err.message));
  }
});

document.getElementById('fab').addEventListener('mousedown', () => window.lastFabDown = Date.now());
document.getElementById('fab').addEventListener('touchstart', () => window.lastFabDown = Date.now());

// ────────────────────────────────────────────────
// Tracking
// ────────────────────────────────────────────────
function startTracking() {
  if (trackingWatchId) return;
  printInfo("Continuous tracking started — new points every ~15 s");
  trackingWatchId = navigator.geolocation.watchPosition(pos => {
    const name = `Track ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
    const pin = {
      id: generateId(),
      name,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      accuracy: Math.round(pos.coords.accuracy),
      time: Date.now()
    };
    pins.push(pin);
    savePins();

    const shareUrl = getShareUrl(pin);
    println(`→ ${name} @ ${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`, 'info');
    println(`<span class="share-line">Share: ${escape(shareUrl)} <button class="copy-share" data-url="${escape(shareUrl)}">Copy</button></span>`, 'info');
    attachCopyListeners(terminal);

    if (document.querySelector('[data-tab="pins"].active')) renderPins(searchInput.value);
  }, err => {
    printError("Tracking error: " + err.message);
    stopTracking();
  }, {enableHighAccuracy:true, timeout:15000, maximumAge:0});
}

function stopTracking() {
  if (trackingWatchId) {
    navigator.geolocation.clearWatch(trackingWatchId);
    trackingWatchId = null;
    printInfo("Tracking stopped.");
  }
}

// ────────────────────────────────────────────────
// Input handling (URL + commands)
// ────────────────────────────────────────────────
input.addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();

  const text = input.value.trim();
  if (!text) return;

  println(`<span class="prompt">> ${escape(text)}</span>`);

  // Try as URL
  let url;
  try {
    url = new URL(text.match(/^https?:\/\//) ? text : 'https://' + text);
  } catch {}

  if (url) {
    if (pins.some(p => p.url === url.href)) {
      printInfo("→ Already saved.");
    } else {
      let name = url.hostname.replace(/^www\./, '');
      if (url.pathname && url.pathname !== '/') {
        const seg = url.pathname.split('/')[1];
        if (seg) name += ` / ${seg}`;
      }
      name = name.slice(0, 70);

      const pin = {
        id: generateId(),
        name,
        url: url.href,
        time: Date.now()
      };
      pins.push(pin);
      if (savePins()) {
        const shareUrl = getShareUrl(pin);
        printSuccess(`URL saved → ${escape(name)}`);
        println(`<span class="share-line">Share link: ${escape(shareUrl)} <button class="copy-share" data-url="${escape(shareUrl)}">Copy</button></span>`, 'info');
        attachCopyListeners(terminal);

        if (document.querySelector('[data-tab="pins"].active')) renderPins(searchInput.value);
      }
    }
    input.value = '';
    input.focus();
    return;
  }

  // Commands
  const cmd = text.toLowerCase();
  if (cmd === 'help') {
    printInfo('Commands:');
    println('• track on       → start continuous GPS logging');
    println('• track off      → stop tracking');
    println('• clear          → clear terminal');
    println('• list           → show all pins in terminal');
    println('• clear all      → delete ALL pins (careful!)');
  } else if (cmd === 'track on') {
    startTracking();
  } else if (cmd === 'track off') {
    stopTracking();
  } else if (cmd === 'clear') {
    terminal.innerHTML = '';
    println('<span class="system">Terminal cleared.</span>');
  } else if (cmd === 'list') {
    if (pins.length === 0) {
      printInfo('No pins saved yet.');
    } else {
      pins.forEach(p => {
        let line = `→ ${escape(p.name)}`;
        if (p.url) line += `  ${escape(p.url)}`;
        else if (p.lat != null) line += `  ${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}`;
        println(line, 'info');
      });
    }
  } else if (cmd === 'clear all') {
    if (confirm('Really delete ALL pins? This cannot be undone.')) {
      pins = [];
      savePins();
      printSuccess('All pins deleted.');
      if (document.querySelector('[data-tab="pins"].active')) renderPins();
    }
  } else {
    printError(`Unknown command: ${escape(text)}`);
    printInfo('Type <b>help</b> for commands');
  }

  input.value = '';
  input.focus();
});

// Search handler
searchInput.addEventListener('input', () => {
  if (document.querySelector('[data-tab="pins"].active')) {
    renderPins(searchInput.value);
  }
});

// Theme toggle (basic)
document.getElementById('theme-toggle').addEventListener('click', () => {
  const body = document.body;
  const current = body.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  body.setAttribute('data-theme', next);
  document.getElementById('theme-toggle').textContent = next === 'dark' ? '☀️ Light' : '🌙 Dark';
});

// Init
document.getElementById('pins-count').textContent = pins.length;
attachCopyListeners(); // safety on load
input.focus();
</script>
</body>
</html>
