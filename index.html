<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RootDonate - Personal Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .card { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .tab-button.active { background-color: #eff6ff; color: #1e40af; font-weight: 600; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div class="max-w-6xl mx-auto p-6">

    <!-- Auth Screen -->
    <div id="authScreen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-bold text-blue-600">RootDonate</h1>
                <p class="text-gray-600 mt-2">Personal Finance • Real Banking</p>
            </div>

            <div id="loginForm">
                <input type="email" id="email" placeholder="Email address" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-4">
                <input type="password" id="password" placeholder="Password" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6">
                <button onclick="login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-semibold text-lg">Login</button>
                <p class="text-center mt-6 text-sm">
                    Don't have an account? <span onclick="showRegister()" class="text-blue-600 cursor-pointer font-medium">Sign up</span>
                </p>
            </div>

            <div id="registerForm" class="hidden">
                <input type="email" id="regEmail" placeholder="Email address" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-4">
                <input type="password" id="regPassword" placeholder="Create password (6+ characters)" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6">
                <button onclick="register()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-semibold text-lg">Create Free Account</button>
                <p class="text-center mt-6 text-sm">
                    Already have an account? <span onclick="showLogin()" class="text-blue-600 cursor-pointer font-medium">Login</span>
                </p>
            </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900">RootDonate</h1>
            <div class="flex items-center gap-4">
                <span id="userEmail" class="text-sm text-gray-600"></span>
                <button onclick="logout()" class="px-5 py-2 text-red-600 hover:bg-red-50 rounded-xl">Logout</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex gap-2 mb-8 border-b pb-2">
            <button onclick="showTab(0)" class="tab-button active px-6 py-3 rounded-2xl" id="tab0">🏠 Dashboard</button>
            <button onclick="showTab(1)" class="tab-button px-6 py-3 rounded-2xl" id="tab1">🏦 Online Banking</button>
            <button onclick="showTab(2)" class="tab-button px-6 py-3 rounded-2xl" id="tab2">📊 DTI / LTI</button>
        </div>

        <!-- Dashboard -->
        <div id="tabContent0" class="space-y-8">
            <div class="grid md:grid-cols-3 gap-6">
                <div class="bg-white rounded-3xl p-8 card">
                    <p class="text-gray-500">Net Worth</p>
                    <p id="netWorth" class="text-4xl font-bold text-green-600 mt-2">$0</p>
                </div>
                <div class="bg-white rounded-3xl p-8 card">
                    <p class="text-gray-500">Available Balance</p>
                    <p id="bankBalance" class="text-3xl font-semibold mt-2">$0</p>
                </div>
                <div class="bg-white rounded-3xl p-8 card">
                    <p class="text-gray-500">Total Debt</p>
                    <p id="totalDebt" class="text-3xl font-semibold text-red-600 mt-2">$0</p>
                </div>
            </div>
        </div>

        <!-- Online Banking Tab - More Realistic -->
        <div id="tabContent1" class="hidden">
            <div class="bg-white rounded-3xl p-8 card">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-semibold flex items-center gap-3"><i class="fas fa-university"></i> Online Banking</h2>
                    <button onclick="addManualAccount()" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-sm font-medium">
                        + Add Account
                    </button>
                </div>

                <div id="connectedBanks" class="space-y-4"></div>

                <div class="mt-12">
                    <h3 class="font-semibold mb-4 flex items-center gap-2"><i class="fas fa-history"></i> Recent Transactions</h3>
                    <div id="transactions" class="space-y-3"></div>
                </div>

                <button onclick="addTransaction()" class="mt-8 w-full border border-dashed border-gray-400 text-gray-600 py-6 rounded-2xl hover:bg-gray-50">
                    + Add New Transaction
                </button>
            </div>
        </div>

        <!-- DTI / LTI Tab -->
        <div id="tabContent2" class="hidden">
            <div class="grid lg:grid-cols-2 gap-8">
                <div class="bg-white rounded-3xl p-8 card">
                    <h2 class="text-2xl font-semibold mb-6">Financial Details</h2>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Gross Monthly Income ($)</label>
                            <input type="number" id="income" oninput="calculate()" class="w-full px-5 py-4 border border-gray-300 rounded-2xl text-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Total Monthly Debt Payments ($)</label>
                            <input type="number" id="debts" oninput="calculate()" class="w-full px-5 py-4 border border-gray-300 rounded-2xl text-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Total Outstanding Loans ($)</label>
                            <input type="number" id="totalLoans" oninput="calculate()" class="w-full px-5 py-4 border border-gray-300 rounded-2xl text-lg">
                        </div>
                    </div>
                    <button onclick="saveProfile()" class="mt-8 w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-semibold">💾 Save to Cloud</button>
                </div>

                <div class="bg-white rounded-3xl p-8 card">
                    <h2 class="text-2xl font-semibold mb-6">Your Ratios</h2>
                    <div id="results" class="space-y-8"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyAJpd9btTi5DEq5B7NsDLD4G_pddVQi43Q",
  authDomain: "rootdonate.firebaseapp.com",
  projectId: "rootdonate",
  storageBucket: "rootdonate.firebasestorage.app",
  messagingSenderId: "838665513781",
  appId: "1:838665513781:web:308983a5b2713f20977a7c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let accounts = [];
let transactions = [];

// Tab Control
function showTab(n) {
    document.querySelectorAll('[id^="tabContent"]').forEach(el => el.classList.add('hidden'));
    document.getElementById('tabContent' + n).classList.remove('hidden');
    document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
    document.getElementById('tab' + n).classList.add('active');
}

// Add Bank Account
function addManualAccount() {
    const name = prompt("Bank Name (e.g. Chase Checking, Wells Fargo Savings):", "Chase Checking");
    if (!name) return;
    const balance = parseFloat(prompt("Current Balance ($):", "5420.85")) || 0;

    accounts.push({ name, balance, type: "Checking" });
    renderAccounts();
    updateDashboard();
}

// Render Accounts
function renderAccounts() {
    const container = document.getElementById('connectedBanks');
    container.innerHTML = accounts.map((acc, i) => `
        <div class="bg-gray-50 p-6 rounded-2xl flex justify-between items-center">
            <div>
                <p class="font-semibold">${acc.name}</p>
                <p class="text-xs text-gray-500">${acc.type} Account</p>
            </div>
            <p class="text-3xl font-bold text-green-600">$${acc.balance.toLocaleString()}</p>
        </div>
    `).join('');
}

// Add Transaction
function addTransaction() {
    const desc = prompt("Transaction Description:");
    if (!desc) return;
    const amount = parseFloat(prompt("Amount (use - for expense):", "-45.50")) || 0;

    transactions.unshift({
        date: "Just now",
        desc: desc,
        amount: amount
    });

    renderTransactions();
    updateDashboard();
}

function renderTransactions() {
    const container = document.getElementById('transactions');
    container.innerHTML = transactions.map(tx => `
        <div class="flex justify-between items-center py-4 border-b">
            <div>
                <p class="font-medium">${tx.desc}</p>
                <p class="text-xs text-gray-500">${tx.date}</p>
            </div>
            <p class="${tx.amount >= 0 ? 'text-green-600' : 'text-red-600'} font-semibold">
                ${tx.amount >= 0 ? '+' : ''}$${Math.abs(tx.amount).toFixed(2)}
            </p>
        </div>
    `).join('');
}

function updateDashboard() {
    const totalBalance = accounts.reduce((sum, acc) => sum + acc.balance, 0);
    const totalLoans = parseFloat(document.getElementById('totalLoans').value) || 0;
    const netWorth = totalBalance - totalLoans;

    document.getElementById('bankBalance').textContent = '$' + totalBalance.toLocaleString();
    document.getElementById('totalDebt').textContent = '$' + totalLoans.toLocaleString();
    document.getElementById('netWorth').textContent = '$' + netWorth.toLocaleString();
}

// Calculator & Save / Load (same as previous)
function calculate() {
    const income = parseFloat(document.getElementById('income').value) || 0;
    const debts = parseFloat(document.getElementById('debts').value) || 0;
    const totalLoans = parseFloat(document.getElementById('totalLoans').value) || 0;

    const resultsDiv = document.getElementById('results');
    if (income === 0) {
        resultsDiv.innerHTML = `<p class="text-gray-400">Enter income to calculate ratios</p>`;
        return;
    }

    const dti = (debts / income) * 100;
    const annualIncome = income * 12;
    const lti = annualIncome > 0 ? (totalLoans / annualIncome) * 100 : 0;

    const dtiClass = dti <= 36 ? 'text-green-600' : (dti <= 43 ? 'text-amber-600' : 'text-red-600');

    resultsDiv.innerHTML = `
        <div class="space-y-8">
            <div>
                <div class="flex justify-between"><span class="text-gray-600">DTI</span><span class="font-bold text-4xl ${dtiClass}">${dti.toFixed(1)}%</span></div>
            </div>
            <div>
                <div class="flex justify-between"><span class="text-gray-600">LTI</span><span class="font-bold text-4xl">${lti.toFixed(1)}%</span></div>
            </div>
        </div>
    `;
    updateDashboard();
}

async function saveProfile() { /* same as before */ }
async function loadUserData(user) { /* same as before */ }

// Auth Functions
function showRegister() { /* same */ }
function showLogin() { /* same */ }
async function register() { /* same */ }
async function login() { /* same */ }
function logout() { auth.signOut(); }

// Auth Listener
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('userEmail').textContent = user.email;
        loadUserData(user);
        showTab(0);
    } else {
        document.getElementById('authScreen').classList.remove('hidden');
        document.getElementById('mainApp').classList.add('hidden');
    }
});
</script>
</body>
</html>
