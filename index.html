<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPS Pins – Private Markers + URLs</title>
  <meta name="description" content="Save private GPS locations & URLs. 100% local, offline, no account.">

  <style>
    :root {
      --bg:        #0a0e1a;
      --surface:   #141822;
      --text:      #e0e7ff;
      --muted:     #8899aa;
      --accent:    #00d4ff;
      --accent-dim:#00ff9d;
      --purple:    #bb86fc;
      --danger:    #ff5555;
      --border:    rgba(0,212,255,0.18);
      --shadow:    0 4px 20px rgba(0,0,0,0.4);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:var(--bg); color:var(--text);
      font-family:'Courier New',Courier,monospace;
      min-height:100vh; display:flex; flex-direction:column;
    }

    header {
      padding:1rem 1.4rem;
      background:rgba(0,0,0,0.6);
      border-bottom:1px solid var(--border);
      text-align:center;
    }

    h1 {
      font-size:2.1rem;
      background:linear-gradient(90deg,var(--purple),var(--accent));
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
    }

    .subtitle { color:var(--muted); font-size:0.95rem; margin-top:0.5rem; }

    .tabs {
      margin:1.2rem 0 0.8rem;
      display:flex; justify-content:center; gap:1rem; flex-wrap:wrap;
    }

    .tab-btn {
      padding:0.7rem 1.6rem;
      background:rgba(255,255,255,0.06);
      border:1px solid var(--border);
      border-radius:8px;
      color:var(--muted);
      cursor:pointer; font-weight:bold;
      transition:all 0.18s ease;
    }

    .tab-btn.active {
      background:linear-gradient(135deg,var(--purple),var(--accent));
      color:#000; border-color:transparent;
    }

    .tab-content { flex:1; display:none; flex-direction:column; overflow:hidden; }
    .tab-content.active { display:flex; }

    #terminal-tab .terminal {
      flex:1; padding:1.3rem 1.8rem; overflow-y:auto;
      line-height:1.55; font-size:1rem;
    }

    .line { margin:0.5rem 0; white-space:pre-wrap; word-break:break-word; }
    .prompt    { color:var(--accent-dim); }
    .info      { color:#00ffea; }
    .system    { color:#778899; }
    .error     { color:var(--danger); }
    .success   { color:var(--accent-dim); font-weight:bold; }

    .input-line {
      display:flex; align-items:flex-start;
      padding:1rem 1.8rem;
      background:rgba(0,0,0,0.4);
      border-top:1px solid var(--border);
    }

    .input-line .prompt { margin-right:1rem; flex-shrink:0; }

    #input {
      flex:1; background:transparent; border:none;
      color:var(--accent); font:inherit; outline:none;
      caret-color:var(--accent);
    }

    .cursor {
      display:inline-block; width:10px; height:1.3em;
      background:var(--accent);
      animation:blink 1.2s step-end infinite;
      margin-left:5px;
    }

    @keyframes blink { 50% { opacity:0; } }

    #pins-tab { padding:1.5rem; overflow-y:auto; }
    .collection-header { text-align:center; margin:0 0 1.6rem; color:var(--accent); font-size:1.5rem; }
    .empty-state { text-align:center; color:var(--muted); padding:6rem 1.5rem; font-size:1.15rem; line-height:1.7; }

    .card {
      background:rgba(20,24,34,0.97);
      border:1px solid var(--border);
      border-radius:12px;
      padding:1.5rem; margin:1.3rem 0;
      box-shadow:var(--shadow);
    }

    .pin-title { color:var(--accent); font-size:1.4rem; margin-bottom:0.7rem; word-break:break-all; }
    .url-pin .pin-title { color:var(--purple); }

    .meta {
      color:var(--muted); font-size:0.95rem; margin:0.8rem 0;
      display:flex; flex-wrap:wrap; gap:1.6rem;
    }

    #search {
      width:100%; max-width:500px; padding:0.9rem;
      margin:0 auto 1.8rem; display:block;
      background:rgba(255,255,255,0.05); border:1px solid var(--border);
      border-radius:10px; color:var(--text); font-family:inherit; font-size:1rem;
    }

    .share-row {
      margin-top:1.2rem; display:flex; flex-wrap:wrap; gap:0.8rem; align-items:center;
    }

    .action-btn, .copy-btn, .email-btn, .open-url-btn, .refresh-btn {
      padding:0.6rem 1.3rem; border-radius:8px;
      font-weight:bold; cursor:pointer; transition:all 0.2s ease;
      text-decoration:none; display:inline-block; border:1px solid; font-size:0.9rem;
    }

    .action-btn { background:rgba(0,212,255,0.18); border-color:var(--accent-dim); color:var(--accent); }
    .action-btn:hover { background:rgba(0,212,255,0.35); }

    .copy-btn { background:rgba(187,134,252,0.18); border-color:var(--purple); color:var(--purple); }
    .copy-btn:hover { background:rgba(187,134,252,0.35); }
    .copy-btn.copied { background:rgba(0,255,157,0.3); color:#00ff9d; border-color:#00ff9d; }

    .email-btn { background:rgba(0,212,255,0.12); border-color:var(--accent); color:var(--accent); }
    .email-btn:hover { background:rgba(0,212,255,0.28); }

    .open-url-btn { background:rgba(187,134,252,0.25); border-color:var(--purple); color:var(--purple); }
    .open-url-btn:hover { background:rgba(187,134,252,0.45); }

    .refresh-btn {
      background:rgba(0,255,157,0.18); border-color:var(--accent-dim); color:var(--accent-dim);
      margin:1rem auto; display:block;
    }
    .refresh-btn:hover { background:rgba(0,255,157,0.35); }

    #fab {
      position:fixed; bottom:24px; right:24px; width:64px; height:64px;
      background:linear-gradient(135deg,var(--purple),var(--accent));
      color:#000; border:none; border-radius:50%; font-size:2.2rem; font-weight:bold;
      box-shadow:0 6px 20px rgba(0,0,0,0.5); cursor:pointer; z-index:1000;
      display:flex; align-items:center; justify-content:center; transition:transform 0.2s ease;
    }

    #fab:hover { transform:scale(1.1); }
    #fab:active { transform:scale(0.95); }

    @media (max-width:560px) {
      .tabs { flex-direction:column; gap:0.6rem; }
      .tab-btn { width:100%; }
      .share-row { flex-direction:column; align-items:stretch; }
      .action-btn, .copy-btn, .email-btn, .open-url-btn { width:100%; text-align:center; }
      #fab { bottom:16px; right:16px; width:56px; height:56px; font-size:2rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>GPS Pins</h1>
  <div class="subtitle">Private markers + URLs • 100% offline</div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="terminal">Terminal</button>
    <button class="tab-btn" data-tab="pins">My Pins</button>
  </div>
</header>

<div id="terminal-tab" class="tab-content active">
  <div class="terminal" id="terminal"></div>
  <div class="input-line">
    <span class="prompt">></span>
    <input id="input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus>
    <span class="cursor"></span>
  </div>
</div>

<div id="pins-tab" class="tab-content">
  <div class="collection-header">My Saved Pins & URLs</div>
  <input type="text" id="search" placeholder="Search name, URL or coordinates…">
  <button class="refresh-btn">↻ Refresh Pins List</button>
  <div id="pins-container"></div>
</div>

<button id="fab" title="Drop pin at current location">+</button>

<script>
// ────────────────────────────────────────────────
// Utilities
// ────────────────────────────────────────────────
const STORAGE_KEY = 'gps-pins-v7';
let lastUsedName = localStorage.getItem('gps-pins-last-name') || '';

function escapeHTML(str = '') {
  const map = { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' };
  return str.replace(/[&<>"']/g, m => map[m]);
}

function getPins() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    return data ? JSON.parse(data) : [];
  } catch (e) {
    console.warn('Failed to parse pins:', e);
    return [];
  }
}

function savePins(pins) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(pins));
    console.log('Saved pins. Total now:', pins.length);
    return true;
  } catch (e) {
    console.error('localStorage write failed:', e);
    alert('Save failed — storage may be blocked or full.');
    return false;
  }
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

function getPinShareUrl(pin) {
  const publicPin = { id: pin.id, lat: pin.lat, lng: pin.lng, name: pin.name, url: pin.url || null, time: pin.time };
  return `${location.origin}${location.pathname}#p=${btoa(JSON.stringify(publicPin))}`;
}

async function copyToClipboard(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    const original = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = original;
      btn.classList.remove('copied');
    }, 1800);
  } catch (err) {
    console.error('Clipboard failed', err);
    alert('Copy failed — select manually.');
  }
}

// ────────────────────────────────────────────────
// Terminal output
// ────────────────────────────────────────────────
const terminal = document.getElementById('terminal');
const inputEl  = document.getElementById('input');

function println(html, cls = 'line') {
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

function printInfo(html)  { println(html, 'line info'); }
function printError(html) { println(html, 'line error'); }
function printSystem(html) { println(html, 'line system'); }
function printSuccess(html) { println(html, 'line success'); }
function clearScreen()    { terminal.innerHTML = ''; }

// ────────────────────────────────────────────────
// Tab switching
// ────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    const tab = document.getElementById(btn.dataset.tab + '-tab');
    tab.classList.add('active');
    if (btn.dataset.tab === 'pins') {
      renderPins();
      printSystem("Showing latest pins…");
    }
  });
});

// ────────────────────────────────────────────────
// Render pins
// ────────────────────────────────────────────────
const pinsContainer = document.getElementById('pins-container');
const searchInput = document.getElementById('search');

function renderPins(filter = '') {
  const pins = getPins();
  pinsContainer.innerHTML = '';

  const lower = filter.toLowerCase();
  const filtered = pins.filter(p =>
    (p.name || '').toLowerCase().includes(lower) ||
    (p.url  || '').toLowerCase().includes(lower) ||
    String(p.lat || '').includes(lower) ||
    String(p.lng || '').includes(lower)
  );

  if (!filtered.length) {
    pinsContainer.innerHTML = '<div class="empty-state">No pins found yet.<br>Paste a https:// URL or use + button.</div>';
    return;
  }

  filtered.forEach(pin => {
    const isUrl = !!pin.url;
    const shareUrl = getPinShareUrl(pin);
    const maps = pin.lat && pin.lng ? `https://www.google.com/maps/search/?api=1&query=${pin.lat},${pin.lng}` : null;

    const subject = encodeURIComponent(`Check out: ${pin.name || (isUrl ? 'Saved URL' : '(Unnamed)')}`);
    let body = `${pin.name || (isUrl ? 'Saved URL' : '(Unnamed pin)')}\n\n`;
    if (isUrl) body += `🔗 URL: ${pin.url}\n\n`;
    if (pin.lat && pin.lng) {
      body += `📍 ${pin.lat.toFixed(6)}, ${pin.lng.toFixed(6)}\nView: ${maps}\nAccuracy: ±${Math.round(pin.accuracy || 0)} m\n`;
    } else {
      body += `(No location data)\n`;
    }
    body += `Saved: ${new Date(pin.time).toLocaleString()}\n\nOpen: ${shareUrl}`;

    const email = `mailto:?subject=${subject}&body=${encodeURIComponent(body)}`;

    const card = document.createElement('div');
    card.className = `card ${isUrl ? 'url-pin' : ''}`;

    let title = escapeHTML(pin.name || (isUrl ? 'URL Pin' : '(Unnamed)'));
    if (isUrl) title = `<a href="${escapeHTML(pin.url)}" target="_blank" style="color:var(--purple);text-decoration:underline;">${title}</a>`;

    card.innerHTML = `
      <div class="pin-title">${isUrl ? '🔗 ' : '📍 '}${title}</div>
      <div class="meta">
        ${pin.lat && pin.lng ? `<span>📍 ${pin.lat.toFixed(6)}, ${pin.lng.toFixed(6)}</span>` : '<span>🌐 No location</span>'}
        ${pin.lat && pin.lng ? `<span>±${Math.round(pin.accuracy || 0)} m</span>` : ''}
        <span>${new Date(pin.time).toLocaleString()}</span>
      </div>
      ${isUrl ? `<div style="margin:1rem 0 0.8rem;">
        <a href="${escapeHTML(pin.url)}" target="_blank" class="open-url-btn">→ Open URL</a>
      </div>` : ''}
      <div class="share-row">
        <button class="action-btn copy-btn" data-copy="${shareUrl}">Copy share link</button>
        <a href="${email}" class="action-btn email-btn" target="_blank">Share via Email</a>
      </div>
    `;

    card.querySelector('.copy-btn')?.addEventListener('click', e => {
      copyToClipboard(e.target.dataset.copy, e.target);
    });

    pinsContainer.appendChild(card);
  });
}

searchInput.addEventListener('input', e => renderPins(e.target.value));
document.querySelector('.refresh-btn').addEventListener('click', () => renderPins(searchInput.value));

// ────────────────────────────────────────────────
// Save current location via FAB
// ────────────────────────────────────────────────
document.getElementById('fab').addEventListener('click', async () => {
  let name = prompt("Name for this pin?", lastUsedName || `Pin ${getPins().length + 1}`);
  if (name === null) return;

  name = name.trim();
  if (name) {
    lastUsedName = name;
    localStorage.setItem('gps-pins-last-name', lastUsedName);
  }

  try {
    const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, {
      enableHighAccuracy: true, timeout: 10000, maximumAge: 0
    }));

    const pin = {
      id: generateId(),
      name: name || `Pin ${Date.now()}`,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      accuracy: Math.round(pos.coords.accuracy),
      time: Date.now()
    };

    const pins = getPins();
    pins.push(pin);
    if (savePins(pins)) {
      printSuccess(`Pin saved → ${escapeHTML(pin.name)} @ ${pin.lat.toFixed(6)}, ${pin.lng.toFixed(6)}`);
      renderPins(searchInput.value);           // ← FIXED: refresh list
      // Optional: switch to pins tab after save
      // document.querySelector('.tab-btn[data-tab="pins"]').click();
    }
  } catch (err) {
    printError("Location failed.");
    if (err.code === 1) printError("→ Permission denied");
    if (err.code === 3) printError("→ Timeout");
  }
});

// ────────────────────────────────────────────────
// Command handler
// ────────────────────────────────────────────────
function handleCommand(input) {
  const parts = input.trim().split(/\s+/);
  const cmd = parts[0]?.toLowerCase();
  const args = parts.slice(1).join(' ').trim();

  if (cmd === 'help') {
    printInfo("Commands: help, list, clear, clear all");
    printInfo("Paste https:// URL → auto-saves it");
    printInfo("+ button → save current position");
    return;
  }

  if (cmd === 'list') {
    const pins = getPins();
    if (!pins.length) return printInfo("No pins saved yet.");
    printInfo(`Total: ${pins.length} item${pins.length === 1 ? '' : 's'}`);
    pins.forEach(p => {
      let line = `• ${escapeHTML(p.name || '(Unnamed)')} `;
      if (p.url) line += `[URL] `;
      if (p.lat && p.lng) line += `${p.lat.toFixed(6)}, ${p.lng.toFixed(6)} `;
      line += `(${new Date(p.time).toLocaleDateString()})`;
      println(line, 'line info');
    });
    return;
  }

  if (cmd === 'clear' && args === 'all') {
    if (confirm("Delete ALL saved pins/URLs?")) {
      savePins([]);
      renderPins();
      printSystem("All data cleared.");
    } else {
      printSystem("Cancelled.");
    }
    return;
  }

  if (cmd === 'clear') {
    clearScreen();
    bootMessages();
    return;
  }

  printError(`Unknown command: ${escapeHTML(cmd)}`);
  printInfo("Type <strong>help</strong> for commands.");
}

// ────────────────────────────────────────────────
// Boot messages
// ────────────────────────────────────────────────
function bootMessages() {
  printSystem("GPS Pins • local storage only");
  printSystem("----------------------------------------");
  printInfo("Paste any https:// URL → auto-saves it");
  printInfo("Use + button for current location pin");
  printInfo("Type 'help' for commands");
  println("");
  printSystem(`Last used name: ${lastUsedName || '(none)'}`);
}

bootMessages();

// ────────────────────────────────────────────────
// Input handler – QUICK URL AUTOSAVE + AUTO-SWITCH + REFRESH
// ────────────────────────────────────────────────
inputEl.addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  const text = inputEl.value.trim();
  if (!text) return;

  const urlPattern = /^https?:\/\/[^\s/$.?#].[^\s]*$/i;

  if (urlPattern.test(text)) {
    e.preventDefault();
    const url = text;

    println('> ' + escapeHTML(url), 'line prompt');

    const pin = {
      id: generateId(),
      name: url.substring(0, 80) + (url.length > 80 ? '…' : ''),
      url: url,
      lat: null,
      lng: null,
      accuracy: null,
      time: Date.now()
    };

    const pins = getPins();
    pins.push(pin);

    if (savePins(pins)) {
      printSuccess(`URL saved → ${escapeHTML(pin.name)}`);
      println(`  ${pin.url}`, 'line info');
      
      renderPins(searchInput.value);                    // ← FIXED: refresh immediately
      document.querySelector('.tab-btn[data-tab="pins"]').click();
    }

    inputEl.value = '';
    inputEl.focus();
    return;
  }

  // Normal command handling
  e.preventDefault();
  println('> ' + escapeHTML(text), 'line prompt');
  handleCommand(text);
  inputEl.value = '';
  inputEl.focus();
});
</script>
</body>
</html>
