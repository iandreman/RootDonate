<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleverbot Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #f0f0f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: white;
            border-bottom: 1px solid #ddd;
        }
        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            max-width: 80%;
        }
        .user {
            background: #007bff;
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }
        .bot {
            background: #e9e9e9;
            color: black;
        }
        #input-area {
            display: flex;
            padding: 10px;
            background: #fff;
            border-top: 1px solid #ddd;
        }
        #input {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            margin-left: 8px;
            padding: 12px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #0056b3; }
        iframe {
            display: none; /* hidden, we use it only for automation */
        }
    </style>
</head>
<body>

    <div id="chat"></div>

    <div id="input-area">
        <input type="text" id="input" placeholder="Type a message to Cleverbot..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>

    <!-- Hidden iframe to load Cleverbot -->
    <iframe id="cleverbot-frame" src="https://www.cleverbot.com" width="1" height="1"></iframe>

<script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const frame = document.getElementById('cleverbot-frame');

    let isReady = false;

    // Add message to UI
    function addMessage(text, isUser) {
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user' : 'bot'}`;
        div.textContent = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    // Send message to Cleverbot via the iframe (simplified automation)
    async function sendToCleverbot(message) {
        if (!isReady) {
            addMessage("Waiting for Cleverbot to load...", false);
            return;
        }

        try {
            // This is a best-effort automation. Cleverbot's site changes often.
            const doc = frame.contentDocument || frame.contentWindow.document;

            // Find the input box on Cleverbot site (selector may change)
            const cbInput = doc.querySelector('input[type="text"]') || 
                           doc.querySelector('#avatarform input') ||
                           doc.querySelector('textarea');

            if (cbInput) {
                cbInput.value = message;
                // Trigger input event
                cbInput.dispatchEvent(new Event('input', { bubbles: true }));

                // Find and click the Say button
                const sayButton = doc.querySelector('input[value="Say"]') || 
                                 doc.querySelector('button') ||
                                 Array.from(doc.querySelectorAll('input[type="submit"]')).find(b => b.value?.toLowerCase().includes('say'));

                if (sayButton) {
                    sayButton.click();
                } else {
                    // Fallback: press Enter
                    const enterEvent = new KeyboardEvent('keydown', { key: 'Enter', bubbles: true });
                    cbInput.dispatchEvent(enterEvent);
                }

                addMessage(message, true);

                // Wait a bit and try to read the latest reply
                setTimeout(() => {
                    try {
                        const replies = doc.querySelectorAll('.bot, .reply, div[id*="response"]');
                        if (replies.length > 0) {
                            const lastReply = replies[replies.length - 1].textContent.trim();
                            if (lastReply && lastReply.length > 2) {
                                addMessage(lastReply, false);
                            }
                        }
                    } catch(e) {}
                }, 2500);
            }
        } catch (err) {
            addMessage("Error communicating with Cleverbot. Try refreshing the page.", false);
            console.error(err);
        }
    }

    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, true);
        input.value = '';

        sendToCleverbot(text);
    }

    // Allow pressing Enter to send
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // When the iframe loads, mark as ready
    frame.onload = () => {
        isReady = true;
        addMessage("Cleverbot is ready! Type something below.", false);
    };

    // Optional: initial greeting
    window.onload = () => {
        addMessage("Hello! I'm connecting to Cleverbot...", false);
    };
</script>

</body>
</html>
