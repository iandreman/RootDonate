<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RootDonate AI • Realm of Words</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Cinzel:wght@400;700&family=VT323&display=swap');

    :root {
      --accent: #00ff9d;
      --accent-dark: #008f5a;
    }

    body {
      background: #0a0a0a;
      font-family: 'Cinzel', serif;
      color: #e6d5b8;
      margin: 0;
      padding: 0;
    }

    .chat-container {
      max-width: 860px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat;
      box-shadow: 0 0 80px rgba(139, 69, 19, 0.7);
      border: 14px solid #1a1a1a;
      border-image: linear-gradient(#00ff9d, #008f5a) 1;
      border-radius: 8px;
      overflow: hidden;
    }

    .header {
      background: #0f0f0f;
      border-bottom: 4px solid var(--accent);
      padding: 14px 20px;
    }

    .message {
      animation: fadeIn 0.4s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .scroll-bg {
      background: rgba(10, 10, 10, 0.95);
    }

    .user-bubble {
      background: #1a2a1a;
      border: 2px solid var(--accent);
    }

    .bot-bubble {
      background: #0f1a0f;
      border: 2px solid var(--accent-dark);
    }

    .rune {
      font-family: 'UnifrakturCook', cursive;
      color: var(--accent);
    }

    /* Terminal IP Nodes Overlay */
    #ip-nodes-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 1000;
      display: none;
      flex-direction: column;
      font-family: 'VT323', monospace;
      color: var(--accent);
    }

    #ip-canvas {
      flex: 1;
      background: #000;
      image-rendering: pixelated;
    }

    .terminal-header {
      background: #001a00;
      border-bottom: 3px solid var(--accent);
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.1rem;
    }

    .node-info {
      position: absolute;
      background: rgba(0, 30, 0, 0.95);
      border: 2px solid var(--accent);
      padding: 12px 18px;
      font-family: 'VT323', monospace;
      color: var(--accent);
      pointer-events: none;
      box-shadow: 0 0 20px var(--accent);
      z-index: 1010;
      max-width: 260px;
      line-height: 1.3;
    }

    .scanline {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        transparent 50%,
        rgba(0, 255, 157, 0.03) 50%
      );
      background-size: 100% 4px;
      pointer-events: none;
      animation: scan 4s linear infinite;
      z-index: 2;
    }

    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-black">

<div class="chat-container flex flex-col">
  <!-- Header -->
  <div class="header flex items-center gap-4 text-[#00ff9d]">
    <div class="w-14 h-14 bg-black border-4 border-[#00ff9d] rounded flex items-center justify-center text-3xl rune">▮</div>
    <div class="flex-1">
      <h1 class="text-3xl font-bold tracking-widest">ROOTDONATE AI</h1>
      <p class="text-sm flex items-center gap-2">
        <span id="status-dot" class="w-3 h-3 bg-[#00ff9d] rounded-full animate-pulse"></span>
        <span id="status-text">SYSTEM ONLINE • DICTIONARY RUNES ACTIVE</span>
      </p>
    </div>
    
    <div class="flex gap-3">
      <button id="ip-nodes-btn" class="flex items-center gap-2 bg-black hover:bg-[#001a00] px-6 py-2.5 rounded border border-[#00ff9d] transition-all active:scale-95">
        <i class="fa-solid fa-network-wired"></i> IP NODES
      </button>
      <button id="share-btn" class="flex items-center gap-2 bg-black hover:bg-[#001a00] px-6 py-2.5 rounded border border-[#00ff9d] transition-all active:scale-95">
        <i class="fa-solid fa-share"></i> SHARE QUEST
      </button>
      <button id="new-btn" class="flex items-center gap-2 bg-black hover:bg-[#001a00] px-6 py-2.5 rounded border border-[#00ff9d] transition-all active:scale-95">
        <i class="fa-solid fa-rotate"></i> NEW SESSION
      </button>
    </div>
  </div>

  <!-- Chat Area -->
  <div id="chat" class="flex-1 overflow-y-auto p-8 space-y-8 custom-scroll scroll-bg"></div>

  <!-- Input Area -->
  <div class="p-6 bg-black border-t-4 border-[#00ff9d]">
    <div class="max-w-3xl mx-auto">
      <form id="chat-form" class="relative">
        <textarea id="user-input" rows="1"
          class="w-full bg-black border-2 border-[#008f5a] rounded px-6 py-4 text-[#00ff9d] placeholder-[#00cc77] focus:outline-none focus:border-[#00ff9d] resize-none text-lg font-mono"
          placeholder="ENTER QUERY..."></textarea>
        
        <button type="submit"
          class="absolute right-4 bottom-4 w-11 h-11 bg-[#001a00] border border-[#00ff9d] rounded flex items-center justify-center hover:bg-[#003300] active:bg-[#004d00] transition-colors">
          <i class="fa-solid fa-arrow-right text-[#00ff9d]"></i>
        </button>
      </form>
    </div>
  </div>
</div>

<!-- Terminal IP Nodes Overlay -->
<div id="ip-nodes-overlay">
  <div class="terminal-header">
    <div class="flex items-center gap-3">
      <span class="text-2xl">◉</span>
      <div>
        <span class="text-lg tracking-widest">IP NETWORK MATRIX v0.8</span>
        <div class="text-xs text-[#00cc77]">LIVE CONNECTIONS • TRACE ACTIVE</div>
      </div>
    </div>
    <button id="close-nodes-btn" class="text-3xl hover:text-white transition-colors">✕</button>
  </div>
  
  <div class="relative flex-1">
    <canvas id="ip-canvas" class="w-full h-full"></canvas>
    <div class="scanline"></div>
  </div>
  
  <div id="node-info" class="node-info hidden"></div>
  
  <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-black border border-[#00ff9d] px-8 py-3 text-sm font-mono flex items-center gap-8">
    <div><span class="text-[#00cc77]">HOST IP:</span> <span id="user-ip-display" class="text-white"></span></div>
    <div id="user-location-display" class="text-[#00cc77]"></div>
  </div>
</div>

<script>
  // Chat System
  async function getAIResponse(msg) {
    // Placeholder - replace with your actual AI backend call
    return `ACK: ${msg} • PROCESSED VIA ROOTDONATE CORE`;
  }

  const chat = document.getElementById('chat');

  function addMessage(content, role) {
    const div = document.createElement('div');
    div.className = `message max-w-3xl mx-auto ${role === 'user' ? 'ml-auto' : ''}`;

    if (role === 'user') {
      div.innerHTML = `
        <div class="flex justify-end">
          <div class="user-bubble text-[#00ff9d] rounded-2xl px-6 py-4 max-w-[80%] font-mono">
            ${content}
          </div>
        </div>`;
    } else {
      div.innerHTML = `
        <div class="flex gap-4">
          <div class="text-2xl rune">▮</div>
          <div class="bot-bubble text-[#00ff9d] rounded-2xl px-6 py-4 max-w-[80%] font-mono">
            ${content}
          </div>
        </div>`;
    }

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  // ==================== Static IP Nodes Network ====================
  let nodes = [];
  let edges = [];
  let canvas, ctx, animationFrame;
  let hoveredNode = null;

  async function loadIPData() {
    nodes = [];
    edges = [];

    try {
      const ipRes = await fetch('https://api.ipify.org?format=json');
      const { ip } = await ipRes.json();
      const geoRes = await fetch(`https://ip-api.com/json/${ip}`);
      const geo = await geoRes.json();

      document.getElementById('user-ip-display').textContent = ip;
      document.getElementById('user-location-display').innerHTML = 
        `${geo.city || 'UNKNOWN'} • ${geo.country || 'NETWORK'}`;

      nodes.push({
        id: 0,
        ip: ip,
        label: "HOST",
        x: 0, // Will be centered in resize
        y: 0,
        size: 14,
        color: "#00ff9d",
        city: geo.city || "LOCAL",
        isUser: true
      });
    } catch (e) {
      document.getElementById('user-ip-display').textContent = "192.168.1.42";
      document.getElementById('user-location-display').innerHTML = "MYSTIC NODE • ETERNAL NET";
      
      nodes.push({
        id: 0,
        ip: "192.168.1.42",
        label: "HOST",
        x: 0,
        y: 0,
        size: 14,
        color: "#00ff9d",
        isUser: true
      });
    }

    // Generate fake nodes with fixed random positions
    for (let i = 1; i < 45; i++) {
      const fakeIP = Array.from({length: 4}, () => Math.floor(Math.random() * 256)).join('.');
      nodes.push({
        id: i,
        ip: fakeIP,
        label: `NODE-${String(i).padStart(3, '0')}`,
        x: 80 + Math.random() * (canvas.width - 160),
        y: 80 + Math.random() * (canvas.height - 160),
        size: 5.5,
        color: "#00cc77",
        isUser: false
      });
    }

    // Generate edges
    edges = [];
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        if (Math.random() < (nodes[i].isUser || nodes[j].isUser ? 0.75 : 0.18)) {
          edges.push({ from: i, to: j });
        }
      }
    }
  }

  // Removed force simulation - nodes are now static
  function drawNetwork() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Background edges
    ctx.strokeStyle = "#003300";
    ctx.lineWidth = 1;
    edges.forEach(edge => {
      const a = nodes[edge.from];
      const b = nodes[edge.to];
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    });

    // Active glowing data flow lines
    ctx.strokeStyle = "#00ff9d";
    ctx.lineWidth = 1.2;
    edges.forEach(edge => {
      if (Math.random() > 0.82) {  // Slightly less frequent than before
        const a = nodes[edge.from];
        const b = nodes[edge.to];
        ctx.globalAlpha = 0.35 + Math.sin(Date.now() / 180) * 0.35;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    });
    ctx.globalAlpha = 1;

    // Draw nodes
    nodes.forEach(node => {
      ctx.fillStyle = node.color;
      ctx.beginPath();
      ctx.arc(node.x, node.y, node.size, 0, Math.PI * 2);
      ctx.fill();

      // Highlight user node
      if (node.isUser) {
        ctx.strokeStyle = "#00ff9d";
        ctx.lineWidth = 2.8;
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.size + 9, 0, Math.PI * 2);
        ctx.stroke();
      }

      // Labels
      ctx.fillStyle = "#00ff9d";
      ctx.font = "14px VT323";
      ctx.textAlign = "center";
      ctx.fillText(node.label, node.x, node.y + node.size + 19);
    });
  }

  function animateNetwork() {
    drawNetwork();                    // Only draw, no movement
    animationFrame = requestAnimationFrame(animateNetwork);
  }

  function getNodeAt(x, y) {
    for (let node of nodes) {
      const dx = node.x - x;
      const dy = node.y - y;
      if (dx * dx + dy * dy < (node.size + 15) ** 2) return node;
    }
    return null;
  }

  function showNodeInfo(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const node = getNodeAt(mx, my);
    const info = document.getElementById('node-info');

    if (node) {
      hoveredNode = node;
      info.innerHTML = `
        <div class="text-[#00ff9d] font-bold">${node.label}</div>
        <div class="font-mono text-xs mt-1">${node.ip}</div>
        <div class="mt-2 text-[#00cc77]">${node.city || 'UNKNOWN LOCATION'}</div>
      `;
      info.style.left = `${e.clientX + 20}px`;
      info.style.top = `${e.clientY + 15}px`;
      info.classList.remove('hidden');
    } else {
      hoveredNode = null;
      info.classList.add('hidden');
    }
  }

  // Event Listeners
  document.getElementById('ip-nodes-btn').addEventListener('click', async () => {
    const overlay = document.getElementById('ip-nodes-overlay');
    overlay.style.display = 'flex';

    canvas = document.getElementById('ip-canvas');
    ctx = canvas.getContext('2d');

    const resize = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight - 110;

      // Re-center the HOST node when resized
      if (nodes.length > 0) {
        nodes[0].x = canvas.width / 2;
        nodes[0].y = canvas.height / 2;
      }
    };

    resize();
    window.addEventListener('resize', resize);

    await loadIPData();
    if (animationFrame) cancelAnimationFrame(animationFrame);
    
    animateNetwork();   // Now only draws (no physics)

    canvas.addEventListener('mousemove', showNodeInfo);
  });

  document.getElementById('close-nodes-btn').addEventListener('click', () => {
    const overlay = document.getElementById('ip-nodes-overlay');
    overlay.style.display = 'none';
    if (animationFrame) cancelAnimationFrame(animationFrame);
  });

  // Chat Form
  document.getElementById('chat-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    input.value = '';

    const reply = await getAIResponse(text);
    setTimeout(() => addMessage(reply, 'bot'), 400);
  });

  // Initialize
  window.addEventListener('load', () => {
    addMessage("SYSTEM BOOT COMPLETE. AWAITING INPUT.", 'bot');
  });
</script>
</body>
</html>
