<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CleverBot – Short Import Links</title>
  <style>
    :root {
      --bg: #0e1117;
      --card: #161b22;
      --text: #d0d7de;
      --muted: #8b949e;
      --accent: #58a6ff;
      --purple: #bc8cff;
      --border: #30363d;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100dvh;
    }
    header {
      padding: 1.2rem 1.5rem;
      background: rgba(13,17,23,0.9);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    h1 {
      margin: 0;
      font-size: 2.4rem;
      text-align: center;
      background: linear-gradient(90deg, var(--purple), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    main { padding: 1.5rem; max-width: 860px; margin: 0 auto; }
    .tab { display: none; }
    .tab.active { display: block; }
    .tabs { text-align: center; margin: 1.2rem 0; }
    button {
      padding: 0.6rem 1.4rem;
      margin: 0 0.5rem;
      border: 1px solid var(--border);
      background: rgba(88,166,255,0.08);
      color: var(--accent);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    button.active { background: var(--accent); color: black; }
    .input-line {
      display: flex;
      gap: 0.8rem;
      padding: 1rem;
      background: #0d1117;
      border-radius: 10px;
      margin-top: 1rem;
    }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--accent);
      font-size: 1.05rem;
      outline: none;
    }
    #output {
      min-height: 200px;
      padding: 1rem;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      font-family: Consolas, monospace;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.2rem;
      margin: 1.2rem 0;
    }
    .card.user   { border-left: 4px solid var(--accent); }
    .card.bot    { border-left: 4px solid var(--purple); }
    .sender { font-weight: bold; margin-bottom: 0.5rem; }
    .text { line-height: 1.55; margin: 0.6rem 0; }
    .meta { color: var(--muted); font-size: 0.9rem; }
    .import-link {
      margin: 1rem 0;
      padding: 0.7rem;
      background: rgba(0,0,0,0.35);
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.92rem;
      color: #a5b4c2;
      word-break: break-all;
    }
    .btn-copy {
      background: rgba(88,166,255,0.14);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .btn-copy:hover { background: rgba(88,166,255,0.26); }
  </style>
</head>
<body>

<header>
  <h1>CleverBot</h1>
  <div class="tabs">
    <button class="active" data-tab="chat">Chat</button>
    <button data-tab="history">History</button>
  </div>
</header>

<main>

  <div id="chat" class="tab active">
    <div id="output"></div>
    <div class="input-line">
      <span style="color:var(--accent); font-weight:bold;">></span>
      <input id="input" placeholder="message or paste import link…" autofocus />
    </div>
  </div>

  <div id="history" class="tab">
    <div id="cards"></div>
    <div id="empty" style="text-align:center; padding:6rem 1rem; color:var(--muted); display:none;">
      <div style="font-size:5rem; opacity:0.6;">💬</div>
      <p><strong>No messages yet</strong></p>
    </div>
  </div>

</main>

<script>
let messages = JSON.parse(localStorage.getItem('cb_pins_v1') || '[]');

const output = document.getElementById('output');
const input  = document.getElementById('input');
const cards  = document.getElementById('cards');
const empty  = document.getElementById('empty');

function log(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function shortId(msg) {
  const s = msg.text + msg.time + msg.from;
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  }
  return Math.abs(h).toString(36).slice(0, 11);
}

function createImportData(msg) {
  const pair = [msg];
  const idx = messages.indexOf(msg);
  if (idx >= 0 && idx + 1 < messages.length && messages[idx + 1].from === 'bot') {
    pair.push(messages[idx + 1]);
  }
  const json = JSON.stringify(pair);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  return `data:text/json;base64,${b64}`;
}

function renderHistory() {
  cards.innerHTML = '';
  if (messages.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  messages.forEach(m => {
    const real = createImportData(m);
    const pretty = `cb-pin://${shortId(m)}`;
    const time = new Date(m.time).toLocaleString([], {dateStyle:'short', timeStyle:'short'});
    const card = document.createElement('div');
    card.className = `card ${m.from}`;
    card.innerHTML = `
      <div class="sender">${m.from === 'user' ? 'You' : 'Bot'}</div>
      <div class="text">${m.text.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>
      <div class="meta">${time}</div>
      <div class="import-link" title="This is what you paste in chat">${pretty}</div>
      <button class="btn-copy" data-real="${real}">📋 Copy import link</button>
    `;
    cards.appendChild(card);
  });
}

// Tab switching
document.querySelectorAll('[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(btn.dataset.tab).classList.add('active');
    if (btn.dataset.tab === 'history') renderHistory();
  });
});

// Send / import
input.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  let val = input.value.trim();
  if (!val) return;

  log(`<span style="color:#58a6ff;">></span> ${val.replace(/</g,'&lt;')}`);

  if (val.startsWith('data:text/json;base64,')) {
    try {
      const [, b64] = val.split(',');
      const json = decodeURIComponent(escape(atob(b64)));
      const arr = JSON.parse(json);
      if (Array.isArray(arr)) {
        messages.push(...arr);
        localStorage.setItem('cb_pins_v1', JSON.stringify(messages));
        log('<span style="color:#56d364;">Imported ' + arr.length + ' message(s)</span>');
        renderHistory();
      }
    } catch (err) {
      log('<span style="color:#f85149;">Invalid import format</span>');
    }
  } else {
    // Normal message
    const userMsg = { from: 'user', text: val, time: Date.now() };
    messages.push(userMsg);
    const botMsg = { from: 'bot', text: ['ok', 'nice', 'haha', 'got it', '👀'][Math.floor(Math.random()*5)], time: Date.now() + 100 };
    messages.push(botMsg);
    localStorage.setItem('cb_pins_v1', JSON.stringify(messages));
    log(`<span style="color:#bc8cff;">Bot:</span> ${botMsg.text}`);
    renderHistory();
  }

  input.value = '';
});

// Copy button
document.addEventListener('click', e => {
  if (!e.target.matches('.btn-copy')) return;
  const real = e.target.dataset.real;
  navigator.clipboard.writeText(real).then(() => {
    const old = e.target.textContent;
    e.target.textContent = 'Copied ✓';
    setTimeout(() => { e.target.textContent = old; }, 1800);
  }).catch(() => {
    alert('Copy failed — real link:\n\n' + real);
  });
});

// Init
if (messages.length > 0) renderHistory();
input.focus();
</script>
</body>
</html>
