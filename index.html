<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Terminal v2.3 — Accounts • Nodes • Smart Lookup</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      position: absolute;
      top: 14px;
      left: 20px;
      z-index: 100;
      font-size: 15px;
      color: #58a6ff;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 0 10px rgba(88, 166, 255, 0.4);
      letter-spacing: 0.5px;
    }

    #terminal {
      flex: 1;
      width: 100%;
      height: 100%;
    }

    .footer {
      position: absolute;
      bottom: 12px;
      right: 20px;
      font-size: 12px;
      color: #586e75;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="header">Smart Terminal v2.3 — Accounts • Nodes • Smart Lookup (IP • Domain • Node • Street Address)</div>
  <div id="terminal"></div>
  <div class="footer">Tab = Autocomplete • ↑↓ = History • ESC = Clear line</div>

  <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
  <script>
    // Initialize Terminal
    const term = new Terminal({
      cursorBlink: true,
      theme: {
        background: '#0d1117',
        foreground: '#c9d1d9',
        cursor: '#58a6ff',
        selectionBackground: '#264f78',
        red: '#f85149',
        green: '#3fb950',
        yellow: '#d29922',
        blue: '#58a6ff',
        magenta: '#bc8cff',
        cyan: '#39c5cf',
        white: '#c9d1d9'
      },
      fontFamily: 'Courier New, monospace',
      fontSize: 15,
      lineHeight: 1.2,
      scrollback: 2000,
      convertEol: true
    });

    term.open(document.getElementById('terminal'));

    // ── Data ─────────────────────────────────────
    let accounts = [
      'user1@example.com',
      'admin@company.com',
      'test@demo.local',
      'support@internal.net'
    ];

    let nodes = [
      { name: 'node-01', ip: '192.168.1.101', status: 'online' },
      { name: 'node-02', ip: '192.168.1.102', status: 'online' },
      { name: 'k8s-worker-3', ip: '10.0.0.45', status: 'maintenance' },
      { name: 'db-node-prod', ip: '172.16.0.10', status: 'online' },
      { name: 'edge-node-7', ip: '203.0.113.45', status: 'online' }
    ];

    const commonTargets = [
      'google.com', 'cloudflare.com', 'github.com', 'microsoft.com', 'amazon.com',
      '8.8.8.8', '8.8.4.4', '1.1.1.1', '1.0.0.1', '9.9.9.9', 'dns.google'
    ];

    // ── State ─────────────────────────────────────
    let commandHistory = [];
    let historyIndex = -1;
    let currentLine = '';
    let currentSuggestions = [];
    let suggestionIndex = -1;

    const prompt = () => {
      term.write('\r\n\x1b[1;34madmin\x1b[0m@\x1b[1;32msmart-terminal\x1b[0m:\x1b[1;36m~\x1b[0m$ ');
    };

    // ── Safe Fetch Helper ─────────────────────────
    async function safeFetch(url, options = {}) {
      try {
        const res = await fetch(url, options);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } catch (e) {
        console.error("Fetch error:", e);
        return null;
      }
    }

    // ── Lookup Functions ─────────────────────────
    async function dnsLookup(domain) {
      const res = await safeFetch(`https://dns.google/resolve?name=${encodeURIComponent(domain)}&type=A`);
      return res?.Answer ? res.Answer.map(a => a.data) : null;
    }

    async function reverseDnsLookup(ip) {
      const res = await safeFetch(`https://dns.google/resolve?name=${encodeURIComponent(ip)}&type=PTR`);
      return res?.Answer && res.Answer.length > 0 
        ? res.Answer.map(a => a.data.replace(/\.$/, '')) 
        : null;
    }

    async function addressToCoords(address) {
      try {
        await new Promise(r => setTimeout(r, 600)); // simulate thinking time
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=3&addressdetails=1`;
        const data = await safeFetch(url, {
          headers: { 'User-Agent': 'SmartTerminal/2.3' }
        });

        if (!data || data.length === 0) return null;

        return data.map(item => ({
          lat: parseFloat(item.lat),
          lon: parseFloat(item.lon),
          displayName: item.display_name
        }));
      } catch (e) {
        return null;
      }
    }

    async function ipGeoLookup(ip = '') {
      try {
        const url = ip 
          ? `https://freeipapi.com/api/json/${encodeURIComponent(ip)}`
          : `https://freeipapi.com/api/json/`;
        
        const data = await safeFetch(url);
        if (!data || data.error) return null;

        return {
          query: data.ipAddress || ip,
          country: data.countryName,
          countryCode: data.countryCode,
          regionName: data.regionName,
          city: data.cityName,
          isp: data.isp || data.connection?.isp || 'N/A',
          org: data.organization || 'N/A'
        };
      } catch (e) {
        return null;
      }
    }

    function showGeoInfo(geo, target) {
      if (!geo) {
        term.writeln(`\x1b[33mNo geo data available for ${target}\x1b[0m`);
        return;
      }
      term.writeln(`\r\n\x1b[32m┌─ Geo & ISP Information for ${target}\x1b[0m`);
      term.writeln(`│  Country     : ${geo.country || 'N/A'} (${geo.countryCode || 'N/A'})`);
      term.writeln(`│  City        : ${geo.city || 'N/A'}`);
      term.writeln(`│  Region      : ${geo.regionName || 'N/A'}`);
      term.writeln(`│  ISP         : ${geo.isp}`);
      term.writeln(`│  Organization: ${geo.org}`);
      term.writeln(`└──────────────────────────────────────────────`);
    }

    // ── Main Lookup Command ───────────────────────
    async function lookupCommand(arg) {
      if (!arg) {
        term.writeln('\r\n\x1b[33mUsage:\x1b[0m lookup <domain | IP | node-name | "street address">');
        return;
      }

      term.writeln(`\r\n\x1b[33mResolving "${arg}"...\x1b[0m`);

      const isIp = /^(\d{1,3}\.){3}\d{1,3}$/.test(arg);
      const looksLikeAddress = (/\d+\s+[a-zA-Z]/.test(arg) || arg.length > 30 || arg.includes(',') || arg.includes('"'));

      if (isIp) {
        const hostnames = await reverseDnsLookup(arg);
        if (hostnames?.length) {
          term.writeln(`\x1b[32m✓ Hostname(s):\x1b[0m`);
          hostnames.forEach(h => term.writeln(`   • ${h}`));
        } else {
          term.writeln(`\x1b[33mNo PTR record found\x1b[0m`);
        }
        const geo = await ipGeoLookup(arg);
        showGeoInfo(geo, arg);
      } 
      else if (looksLikeAddress) {
        const results = await addressToCoords(arg);
        if (results && results.length > 0) {
          term.writeln(`\x1b[32m✓ Address resolved (${results.length} match${results.length > 1 ? 'es' : ''}):\x1b[0m`);
          results.forEach((r, i) => {
            term.writeln(`   ${i+1}. ${r.displayName}`);
            term.writeln(`      Coordinates : ${r.lat.toFixed(6)}, ${r.lon.toFixed(6)}\r\n`);
          });
        } else {
          term.writeln(`\x1b[31m✗ Could not resolve address "${arg}"\x1b[0m`);
          term.writeln(`   Tip: Try a more complete address with city/state.`);
        }
      } 
      else {
        let ips = await dnsLookup(arg);
        const node = nodes.find(n => n.name.toLowerCase() === arg.toLowerCase());
        if (node) ips = [node.ip];

        if (ips?.length) {
          term.writeln(`\x1b[32m✓ Resolved IP(s):\x1b[0m`);
          ips.forEach(ip => term.writeln(`   • ${ip}`));
          const geo = await ipGeoLookup(ips[0]);
          showGeoInfo(geo, ips[0]);
        } else {
          term.writeln(`\x1b[31m✗ Could not resolve "${arg}"\x1b[0m`);
        }
      }
    }

    async function myIpCommand() {
      term.writeln('\r\n\x1b[33mFetching your public IP and location...\x1b[0m');
      const geo = await ipGeoLookup();
      if (geo && geo.query) {
        term.writeln(`\x1b[32m✓ Your Public IP : ${geo.query}\x1b[0m`);
        showGeoInfo(geo, geo.query);
      } else {
        term.writeln(`\x1b[31mFailed to fetch public IP (check your internet connection)\x1b[0m`);
      }
    }

    // ── Account & Node Management ─────────────────
    function addAccount(email) {
      if (!email || !email.includes('@')) return term.writeln('\x1b[31mInvalid email address\x1b[0m');
      if (accounts.includes(email)) return term.writeln('\x1b[33mAccount already exists\x1b[0m');
      accounts.push(email);
      term.writeln(`\x1b[32m✓ Account added: ${email}\x1b[0m`);
    }

    function removeAccount(email) {
      const index = accounts.indexOf(email);
      if (index === -1) return term.writeln(`\x1b[31mAccount not found: ${email}\x1b[0m`);
      accounts.splice(index, 1);
      term.writeln(`\x1b[32m✓ Account removed: ${email}\x1b[0m`);
    }

    function addNode(name, ip) {
      if (!name || !ip) return term.writeln('\x1b[31mUsage: add node <name> <ip>\x1b[0m');
      if (nodes.some(n => n.name === name || n.ip === ip)) 
        return term.writeln('\x1b[33mNode already exists\x1b[0m');
      nodes.push({ name, ip, status: 'online' });
      term.writeln(`\x1b[32m✓ Node added: ${name} (${ip})\x1b[0m`);
    }

    function removeNode(identifier) {
      const index = nodes.findIndex(n => n.name === identifier || n.ip === identifier);
      if (index === -1) return term.writeln(`\x1b[31mNode not found: ${identifier}\x1b[0m`);
      const removed = nodes.splice(index, 1)[0];
      term.writeln(`\x1b[32m✓ Node removed: ${removed.name} (${removed.ip})\x1b[0m`);
    }

    // ── Suggestions ───────────────────────────────
    function getSuggestions(partial) {
      if (!partial) return [];
      const lower = partial.toLowerCase();
      const suggestions = [];

      nodes.forEach(node => {
        if (node.name.toLowerCase().startsWith(lower)) suggestions.push(node.name);
        if (node.ip.startsWith(lower)) suggestions.push(node.ip);
      });

      commonTargets.forEach(t => {
        if (t.toLowerCase().startsWith(lower)) suggestions.push(t);
      });

      return [...new Set(suggestions)].slice(0, 8);
    }

    // ── Commands ──────────────────────────────────
    const commands = {
      help: () => {
        term.writeln('\r\n\x1b[1;37mAvailable Commands:\x1b[0m');
        term.writeln('  help                    Show this help');
        term.writeln('  clear                   Clear screen');
        term.writeln('  list accounts           List all accounts');
        term.writeln('  list nodes              List all managed nodes');
        term.writeln('  lookup <target>         Smart lookup (domain/IP/node/street address)');
        term.writeln('  myip                    Show your public IP + location');
        term.writeln('  add account <email>     Add new account');
        term.writeln('  remove account <email>  Remove account');
        term.writeln('  add node <name> <ip>    Add new node');
        term.writeln('  remove node <name|ip>   Remove node');
        term.writeln('  exit                    Close terminal\r\n');

        term.writeln('\x1b[33mExamples:\x1b[0m');
        term.writeln('    lookup 8.8.8.8');
        term.writeln('    lookup google.com');
        term.writeln('    lookup "1600 Amphitheatre Parkway, Mountain View, CA"');
      },

      'list accounts': () => {
        term.writeln('\r\n\x1b[1;37mUser Accounts:\x1b[0m');
        accounts.forEach(a => term.writeln(`  • ${a}`));
        term.writeln(`\r\nTotal: ${accounts.length}`);
      },

      'list nodes': () => {
        term.writeln('\r\n\x1b[1;37mManaged Nodes:\x1b[0m');
        nodes.forEach(n => {
          const color = n.status === 'online' ? '\x1b[32m' : '\x1b[33m';
          term.writeln(`  • ${n.name.padEnd(18)} ${n.ip.padEnd(18)} ${color}[${n.status}]\x1b[0m`);
        });
      },

      'add account': (arg) => addAccount(arg),
      'remove account': (arg) => removeAccount(arg),
      'add node': (arg) => {
        const parts = arg.trim().split(/\s+/);
        if (parts.length >= 2) addNode(parts[0], parts[1]);
        else term.writeln('\x1b[31mUsage: add node <name> <ip>\x1b[0m');
      },
      'remove node': (arg) => removeNode(arg),

      lookup: (arg) => lookupCommand(arg),
      myip: () => myIpCommand(),
      clear: () => term.clear(),

      exit: () => {
        term.writeln('\r\n\x1b[33mGoodbye! Closing terminal...\x1b[0m');
        setTimeout(() => window.close(), 1000);
      }
    };

    // ── Input Handler ─────────────────────────────
    term.onData((data) => {
      if (data === '\u001b') {                    // ESC key
        if (currentLine.length > 0) {
          term.write('\r' + ' '.repeat(currentLine.length + 60) + '\r');
          prompt();
          currentLine = '';
        }
        return;
      }

      if (data === '\t') {                        // Tab = Autocomplete
        const trimmed = currentLine.trim();
        if (trimmed.toLowerCase().startsWith('lookup ')) {
          const partial = trimmed.slice(7).trim();
          currentSuggestions = getSuggestions(partial);

          if (currentSuggestions.length > 0) {
            suggestionIndex = (suggestionIndex + 1) % currentSuggestions.length;
            const suggested = currentSuggestions[suggestionIndex];
            const newLine = `lookup ${suggested}`;

            term.write('\r' + ' '.repeat(100) + '\r');
            prompt();
            term.write(newLine);
            currentLine = newLine;
          }
        }
        return;
      }

      switch (data) {
        case '\r':                                // Enter
          term.writeln('');
          const trimmed = currentLine.trim();

          if (trimmed) {
            commandHistory.unshift(trimmed);
            historyIndex = -1;

            const parts = trimmed.split(/\s+/);
            const cmdKey = parts[0].toLowerCase();
            const arg = parts.slice(1).join(' ');

            if (commands[cmdKey]) {
              commands[cmdKey](arg);
            } else {
              term.writeln(`\x1b[31mUnknown command: ${cmdKey}\x1b[0m`);
            }
          }

          currentLine = '';
          currentSuggestions = [];
          suggestionIndex = -1;
          prompt();
          break;

        case '\u007f':                            // Backspace
          if (currentLine.length > 0) {
            currentLine = currentLine.slice(0, -1);
            term.write('\b \b');
          }
          break;

        case '\u001b[A':                          // Up arrow
          if (commandHistory.length > 0 && historyIndex < commandHistory.length - 1) {
            historyIndex++;
            term.write('\r' + ' '.repeat(120) + '\r');
            prompt();
            currentLine = commandHistory[historyIndex];
            term.write(currentLine);
          }
          break;

        case '\u001b[B':                          // Down arrow
          if (historyIndex > 0) {
            historyIndex--;
            term.write('\r' + ' '.repeat(120) + '\r');
            prompt();
            currentLine = commandHistory[historyIndex];
            term.write(currentLine);
          } else if (historyIndex === 0) {
            historyIndex = -1;
            term.write('\r' + ' '.repeat(120) + '\r');
            prompt();
            currentLine = '';
          }
          break;

        default:
          if (data.length === 1 && data >= ' ') {
            currentLine += data;
            term.write(data);
          }
      }
    });

    // ── Fresh Start Message ───────────────────────
    term.writeln('\x1b[1;32mSmart Terminal v2.3 initialized successfully\x1b[0m');
    term.writeln('Accounts • Nodes • Smart Lookup ready.\r\n');
    term.writeln('Type \x1b[1;34mhelp\x1b[0m to see available commands.\r\n');
    prompt();

    setTimeout(() => term.focus(), 100);
  </script>
</body>
</html>
