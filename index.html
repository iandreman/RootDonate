<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok • Apple Intelligence Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Mono:wght@400;500&family=SF+Pro+Display:wght@400;500;600&display=swap');
        
        body {
            font-family: 'SF Pro Display', system-ui, sans-serif;
            background: #0a0a0a;
            color: #f5f5f7;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 820px;
            margin: 0 auto;
            background: #1c1c1e;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        .header {
            background: linear-gradient(135deg, #1f1f23, #0f0f11);
            padding: 35px 40px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        .logo {
            font-size: 42px;
            margin-bottom: 8px;
        }
        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
        }
        .subtitle {
            color: #86868b;
            margin-top: 8px;
            font-size: 17px;
        }
        .chat-area {
            min-height: 520px;
            padding: 30px;
            overflow-y: auto;
            background: #161618;
            font-family: 'SF Mono', monospace;
            font-size: 15.5px;
            line-height: 1.65;
        }
        .input-area {
            padding: 20px 30px;
            background: #1c1c1e;
            border-top: 1px solid #333;
            display: flex;
            gap: 12px;
        }
        input[type="text"] {
            flex: 1;
            background: #2c2c2e;
            border: none;
            color: #f5f5f7;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'SF Mono', monospace;
            outline: none;
        }
        button {
            background: #0a84ff;
            color: white;
            border: none;
            padding: 0 28px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .message {
            margin-bottom: 24px;
        }
        .user { color: #0a84ff; }
        .grok { color: #30d158; }
        
        .share-link {
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13.5px;
            color: #0a84ff;
            cursor: pointer;
            text-decoration: underline;
        }
        .share-link:hover { color: #4da3ff; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo"></div>
        <h1>Grok • Apple Intelligence</h1>
        <p class="subtitle">Type to Grok like the original cleverbot.py</p>
    </div>

    <div class="chat-area" id="chat"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="> Type your message here..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');

    let messageCounter = 0;

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        
        let html = `<div>${text}</div>`;
        
        if (type === 'grok') {
            messageCounter++;
            const replyId = `reply-${messageCounter}`;
            const shareUrl = `${window.location.origin}${window.location.pathname}#${replyId}`;
            
            html += `
                <div class="share-link" onclick="copyShareLink('${shareUrl}', '${replyId}')">
                    🔗 Share this Grok reply
                </div>
            `;
        }
        
        div.innerHTML = html;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function copyShareLink(url, replyId) {
        navigator.clipboard.writeText(url).then(() => {
            const notif = document.createElement('div');
            notif.style.cssText = `
                position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
                background: #30d158; color: #000; padding: 14px 26px; border-radius: 12px;
                font-weight: 600; z-index: 10000; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
                font-size: 15px;
            `;
            notif.textContent = "✅ Share link copied! (Links to this Grok reply)";
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2800);
        });
    }

    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        addMessage(`> ${text}`, 'user');
        input.value = '';

        setTimeout(() => {
            addMessage(> ${type}, 'grok');
        }, 650);
    }

    // Enter key support
    input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    // Initial welcome message
    window.onload = () => {
        setTimeout(() => {
            addMessage("Hello! I'm Grok.<br>Welcome to this Apple Intelligence styled chat inspired by the classic cleverbot.py.<br><br>Try typing something and then share my replies using the link below them.", 'grok');
        }, 600);
    };
</script>

</body>
</html>
