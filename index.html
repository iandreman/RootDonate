<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RootDonate - Step. Donate. Change Lives.</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e2937);
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { color: #22d3ee; margin-bottom: 10px; }
        .tagline { color: #94a3b8; font-size: 1.1rem; margin-bottom: 30px; }
        
        form { text-align: left; }
        label { display: block; margin: 15px 0 8px; font-weight: 600; color: #cbd5e1; }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #334155;
            background: #1e2937;
            color: #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
        }
        button {
            margin-top: 25px;
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #22d3ee;
            color: #0f172a;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #67e8f9; transform: translateY(-2px); }
        
        #response { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .success { background: #166534; color: #86efac; }
        .error { background: #7f1d1d; color: #fda4af; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 RootDonate</h1>
        <p class="tagline">Turn your steps into real impact</p>

        <form id="donateForm">
            <label>Donation Amount (£)</label>
            <input type="number" id="amount" step="0.01" min="1" value="10" required>

            <label>Your Name</label>
            <input type="text" id="name" placeholder="John Doe" value="Anonymous">

            <label>Email (for receipt)</label>
            <input type="email" id="email" placeholder="you@example.com">

            <label>Message (optional)</label>
            <textarea id="message" rows="3" placeholder="Thank you for making a difference!"></textarea>

            <label>Steps Walked (optional)</label>
            <input type="number" id="steps" placeholder="15420" value="0">

            <button type="submit">Donate Now</button>
        </form>

        <div id="response"></div>
    </div>

    <script>
        document.getElementById('donateForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = this.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Processing...';

            const data = {
                amount: parseFloat(document.getElementById('amount').value),
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value,
                steps: parseInt(document.getElementById('steps').value) || 0,
                currency: 'GBP'
            };

            try {
                const res = await fetch('/api/rootdonate.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await res.json();

                const responseDiv = document.getElementById('response');
                responseDiv.style.display = 'block';

                if (result.status === 'success') {
                    responseDiv.className = 'success';
                    responseDiv.innerHTML = `
                        <strong>✅ Thank you!</strong><br>
                        ${result.message}<br>
                        Donation ID: <strong>${result.donation.id}</strong>
                    `;
                    document.getElementById('donateForm').reset();
                } else {
                    responseDiv.className = 'error';
                    responseDiv.textContent = result.message || 'Something went wrong';
                }
            } catch (err) {
                const responseDiv = document.getElementById('response');
                responseDiv.style.display = 'block';
                responseDiv.className = 'error';
                responseDiv.textContent = 'Connection error. Please try again.';
            }

            btn.disabled = false;
            btn.textContent = 'Donate Now';
        });
    </script>
</body>
</html>
