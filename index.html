<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Assistant</title>
  <style>
          body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            text-align: center;
            background: #f4f4f9;
        }
        h1 { color: #333; }
        #donor-input {
            width: 80%;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #6200ea;
            border-radius: 5px;
            margin: 20px 0;
        }
        #matches {
            text-align: left;
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            white-space: pre-wrap; /* Preserves formatting from Grok */
        }
        .footer { margin-top: 20px; font-size: 14px; color: #666; }
    </style>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .chat-container {
      position: fixed;
      bottom: 0;
      right: 20px;
      width: 300px;
      background: #f1f1f1;
      border: 1px solid #ccc;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
    .chat-header {
      background: #007bff;
      color: #fff;
      padding: 10px;
      text-align: center;
      font-size: 16px;
    }
    .chat-messages {
      height: 200px;
      overflow-y: auto;
      padding: 10px;
      box-sizing: border-box;
    }
    .chat-messages .message {
      margin: 5px 0;
      padding: 8px 10px;
      border-radius: 5px;
    }
    .chat-messages .user {
      background: #007bff;
      color: #fff;
      text-align: right;
    }
    .chat-messages .assistant {
      background: #e1e1e1;
      color: #000;
    }
    .chat-input {
      display: flex;
      border-top: 1px solid #ccc;
    }
    .chat-input input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }
    .chat-input button {
      background: #007bff;
      color: #fff;
      border: none;
      padding: 10px;
      cursor: pointer;
    }
    .chat-input button:hover {
      background: #0056b3;
    }
  </style>
<script>
        function displayDateTime() {
            const now = new Date();
            document.getElementById("datetime").innerText = now.toLocaleString();
        }
</script>
</head>
<body onload="displayDateTime()">
  <div class="chat-container">
    <div class="chat-header">Assistant</div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Type a message...">
      <button onclick="sendMessage()" onload="displayDateTime()">Send</button>
    </div>
  </div>

  <script>
    const messagesContainer = document.getElementById('chat-messages');

    function sendMessage() {
      const userInput = document.getElementById('user-input');
      const message = userInput.value.trim();

      if (message) {
        // Display user message
        displayMessage(message, 'user');
        userInput.value = displayDateTime();

        // Simulate assistant response
        setTimeout(() => {
          const response = generateResponse(message);
          displayMessage(response, 'assistant');
        }, 500);
      }
    }

    function displayMessage(message, sender) {
      const messageElement = document.createElement('div');
      messageElement.className = `message ${sender}`;
      messageElement.textContent = message;
      messagesContainer.appendChild(messageElement);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function generateResponse(userMessage) {
      // Replace this with an actual API call or logic
      return `You said: "${userMessage}". How can I help you further?`;
    }
  </script>

    <div id="matches" onload="sendMessage()">Enter a cause to see AI suggestions...</div>

    <script>
        // Grok-powered donation matcher
        async function matchDonation(query) {
            const apiKey = '19e92147-4ed9-4b64-b40d-3bb0186a112a'; // Replace with your xAI API key from x.ai/api
            const prompt = `As a tech donation conductor, match this query to open-source AI/tech projects: "${query}". Suggest 3 GitHub repos with why they fit (keep it concise, fun).`;
            
            try {
                const response = await fetch('https://api.x.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${19e92147-4ed9-4b64-b40d-3bb0186a112a}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'grok-3', // Free tier model
                        messages: [{ role: 'user', content: prompt }],
                        max_tokens: 200,
                    }),
                });
                const data = await response.json();
                const suggestions = data.choices[0].message.content || 'No matches yet—try another query!';
                document.getElementById('matches').innerHTML = `<pre>${suggestions}</pre>`;
            } catch (error) {
                console.error('Conductor hiccup:', error);
                document.getElementById('matches').innerHTML = 'Oops, something broke. Check your API key or try again!';
            }
        }

        // Real-time input listener
        document.getElementById('user-input').addEventListener('input', (e) => {
            const query = e.target.value.trim();
            if (query.length > 5) { // Wait for meaningful input
                matchDonation(query);
            } else {
                document.getElementById('user-input').innerHTML = 'Enter a cause to see AI suggestions...';
            }
        });
    </script>
    <h1>Welcome to Root Donate</h1>
    <p>The current date and time is:</p>
    <p id="datetime"></p>
</body>
</html>
