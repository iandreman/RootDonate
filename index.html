<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPS Pins – Private Markers & Share Links</title>
  <meta name="description" content="Save GPS locations and URLs privately — 100% local, works offline."/>

  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #79c0ff;
      --purple: #bc8cff;
      --danger: #f85149;
      --border: rgba(88,166,255,0.18);
      --shadow: 0 6px 24px rgba(0,0,0,0.55);
    }
    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --text: #1f2328;
      --muted: #57606a;
      --accent: #0969da;
      --accent-dim: #1f6feb;
      --purple: #8250df;
      --danger: #d1242f;
      --border: rgba(9,105,218,0.2);
      --shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      transition: background-color 0.4s, color 0.3s;
    }

    header {
      padding: 1.1rem 1.5rem;
      background: color-mix(in srgb, var(--bg) 92%, black);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    h1 {
      font-size: clamp(2.2rem, 8vw, 3rem);
      background: linear-gradient(90deg, var(--purple), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--muted);
      text-align: center;
      font-size: 0.96rem;
      margin-top: 0.4rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 0.9rem;
      margin: 1.2rem 0;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.68rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      color: var(--accent);
      transition: all 0.22s ease;
    }
    .btn:hover    { background: color-mix(in srgb, var(--accent) 24%, transparent); }
    .btn.active   { background: var(--accent); color: #000; border-color: var(--accent); }

    .tab-content { display: none; flex: 1; flex-direction: column; }
    .tab-content.active { display: flex; }

    #terminal-tab { flex: 1; display: flex; flex-direction: column; }
    #terminal {
      flex: 1;
      padding: 1.6rem 1.8rem;
      overflow-y: auto;
      font-family: 'SF Mono', 'Consolas', 'Courier New', monospace;
      font-size: clamp(1.02rem, 3.2vw, 1.12rem);
      line-height: 1.65;
    }

    .line { margin: 0.48rem 0; white-space: pre-wrap; word-break: break-word; }

    .prompt       { color: var(--accent-dim); font-weight: bold; }
    .info         { color: var(--accent-dim); }
    .success      { color: #56d364; font-weight: 600; }
    .error        { color: var(--danger);   font-weight: 600; }
    .system       { color: var(--muted);    font-style: italic; }

    .input-line {
      display: flex;
      align-items: center;
      padding: 1.1rem 1.8rem;
      background: rgba(0,0,0,0.35);
      border-top: 1px solid var(--border);
      gap: 0.9rem;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--accent-dim);
      font: inherit;
      outline: none;
      caret-color: var(--accent);
      font-size: 1.08rem;
    }

    #pins-tab { padding: 1.6rem; overflow-y: auto; }

    #search {
      width: 100%;
      max-width: 680px;
      margin: 0 auto 1.6rem;
      padding: 1rem 1.4rem;
      background: color-mix(in srgb, var(--surface) 60%, var(--bg));
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1.03rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin: 1.3rem 0;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); }

    .pin-title {
      font-size: 1.38rem;
      margin-bottom: 0.7rem;
      color: var(--accent);
      word-break: break-all;
    }
    .url-pin .pin-title { color: var(--purple); }

    .share-line {
      margin-top: 0.9rem;
      font-size: 0.96rem;
      color: var(--muted);
      word-break: break-all;
    }

    .share-line button {
      margin-left: 1rem;
      background: color-mix(in srgb, var(--purple) 18%, transparent);
      border: 1px solid var(--purple);
      color: var(--purple);
      padding: 0.48rem 1rem;
      border-radius: 6px;
      cursor: pointer;
    }

    .copy-share.copied {
      background: rgba(86,212,100,0.28) !important;
      color: #56d364 !important;
      border-color: #56d364 !important;
    }

    #fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, var(--purple), var(--accent));
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 2.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      cursor: pointer;
      z-index: 999;
      transition: all 0.24s ease;
    }
    #fab:hover  { transform: scale(1.14); }
    #fab:active { transform: scale(0.92); }

    @media (max-width: 640px) {
      header { padding: 1rem 1.2rem; }
      .controls { gap: 0.7rem; }
      .btn { padding: 0.62rem 1.3rem; font-size: 0.94rem; }
      #terminal { padding: 1.3rem 1.5rem; }
      .card { padding: 1.3rem; margin: 1.1rem 0; }
      #fab { bottom: 24px; right: 24px; width: 62px; height: 62px; font-size: 2.3rem; }
    }
  </style>
</head>
<body data-theme="dark">

<header>
  <h1>GPS Pins</h1>
  <div class="subtitle">private offline locations • URLs • share links</div>

  <div class="controls">
    <button class="btn active" data-tab="terminal" aria-pressed="true">Terminal</button>
    <button class="btn" data-tab="pins">Pins <span id="pins-count">0</span></button>
    <button class="btn" id="theme-toggle" aria-label="Toggle theme">☀️ Light</button>
  </div>
</header>

<div id="terminal-tab" class="tab-content active">
  <div id="terminal" role="log" aria-live="polite"></div>
  <div class="input-line">
    <span class="prompt" aria-hidden="true">></span>
    <input id="input" type="text" autocomplete="off" spellcheck="false" autofocus placeholder="paste url or type command…" aria-label="Command input"/>
  </div>
</div>

<div id="pins-tab" class="tab-content">
  <input type="search" id="search" placeholder="Search name, url, coordinates, share links…" aria-label="Search saved pins"/>
  <div id="pins-container"></div>
</div>

<button id="fab" aria-label="Save current location (double-tap / long-press to name)">+</button>

<script>
// ────────────────────────────────────────────────
// Core
// ────────────────────────────────────────────────
const STORAGE_KEY = 'gps-pins-v13';
let pins = loadPins();
let lastUsedName = localStorage.getItem('gps-pins-lastname') || '';
let trackingWatchId = null;
let lastFabClickTime = 0;

const terminalEl   = document.getElementById('terminal');
const inputEl      = document.getElementById('input');
const pinsContainer = document.getElementById('pins-container');
const searchEl     = document.getElementById('search');
const countEl      = document.getElementById('pins-count');

function loadPins() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function savePins() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(pins));
    countEl.textContent = pins.length;
    return true;
  } catch {
    alert("Couldn't save — storage may be full or blocked.");
    return false;
  }
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,10);
}

function escapeHTML(str = '') {
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
}

function getShareUrl(pin) {
  const payload = {
    id: pin.id,
    n: pin.name,
    u: pin.url || null,
    la: pin.lat ?? null,
    lo: pin.lng ?? null,
    acc: pin.accuracy ?? null,
    t: pin.time
  };
  return `${location.origin}${location.pathname}#p=${btoa(JSON.stringify(payload))}`;
}

async function copy(text, button) {
  try {
    await navigator.clipboard.writeText(text);
    const old = button.textContent;
    button.textContent = 'Copied!';
    button.classList.add('copied');
    setTimeout(() => {
      button.textContent = old;
      button.classList.remove('copied');
    }, 1600);
  } catch {
    alert('Copy failed — please select & copy manually.');
  }
}

function println(html, className = 'line') {
  const div = document.createElement('div');
  div.className = className;
  div.innerHTML = html;
  terminalEl.appendChild(div);
  terminalEl.scrollTop = terminalEl.scrollHeight;
}

const print = {
  success: msg => println(msg, 'success'),
  error:   msg => println(msg, 'error'),
  info:    msg => println(msg, 'info'),
  system:  msg => println(msg, 'system')
};

// ────────────────────────────────────────────────
// Boot screen
// ────────────────────────────────────────────────
terminalEl.innerHTML = '';
print.system('<span style="font-size:1.25rem;font-weight:700;">GPS Pins</span>');
print.system('100% local • offline • private');
println('─'.repeat(48), 'system');
println('');
print.info('Paste any URL → <b>saves to My Pins</b> + share link appears');
print.info('Tap + → save current location (double-tap/long-press to name)');
print.info('<b>track on</b> / <b>track off</b> → continuous GPS logging');
print.info('Type <b>help</b> for commands');
println('');
print.info('Ready. Paste a link or tap + to begin.');
println('');

// ────────────────────────────────────────────────
// Tab switching
// ────────────────────────────────────────────────
document.querySelectorAll('.btn[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.btn[data-tab]').forEach(b => {
      b.classList.remove('active');
      b.setAttribute('aria-pressed', 'false');
    });
    btn.classList.add('active');
    btn.setAttribute('aria-pressed', 'true');

    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(btn.dataset.tab + '-tab').classList.add('active');

    if (btn.dataset.tab === 'pins') renderPins(searchEl.value);
  });
});

// ────────────────────────────────────────────────
// Render My Pins
// ────────────────────────────────────────────────
function renderPins(filter = '') {
  pinsContainer.innerHTML = '';
  const q = filter.toLowerCase().trim();

  const shown = pins.filter(p =>
    !q ||
    p.name?.toLowerCase().includes(q) ||
    p.url?.toLowerCase().includes(q) ||
    (p.lat && p.lat.toString().includes(q)) ||
    (p.lng && p.lng.toString().includes(q)) ||
    getShareUrl(p).toLowerCase().includes(q)
  );

  if (!shown.length) {
    pinsContainer.innerHTML = '<div style="text-align:center; padding:4rem 1rem; color:var(--muted);">No matching pins found.</div>';
    return;
  }

  shown.forEach(pin => {
    const card = document.createElement('div');
    card.className = `card${pin.url ? ' url-pin' : ''}`;

    let html = `<div class="pin-title">${escapeHTML(pin.name)}</div>`;

    if (pin.url) {
      html += `<a href="${escapeHTML(pin.url)}" target="_blank" rel="noopener noreferrer" style="color:var(--purple); word-break:break-all;">${escapeHTML(pin.url)}</a>`;
    } else if (pin.lat != null && pin.lng != null) {
      html += `<div style="font-family:monospace; margin:0.6rem 0;">
        ${pin.lat.toFixed(6)}, ${pin.lng.toFixed(6)}
        ${pin.accuracy ? `<span style="color:var(--muted);"> (±${pin.accuracy} m)</span>` : ''}
      </div>`;
      html += `<div style="color:var(--muted); font-size:0.94rem;">
        ${new Date(pin.time).toLocaleString([], {dateStyle:'medium', timeStyle:'short'})}
      </div>`;
    }

    const share = getShareUrl(pin);
    html += `
      <div class="share-line">
        Share link: ${escapeHTML(share)}
        <button class="copy-share small-btn" data-url="${escapeHTML(share)}">Copy</button>
      </div>`;

    card.innerHTML = html;
    pinsContainer.appendChild(card);
  });

  pinsContainer.querySelectorAll('.copy-share:not([data-listener])').forEach(btn => {
    btn.addEventListener('click', () => copy(btn.dataset.url, btn));
    btn.dataset.listener = '1';
  });
}

// ────────────────────────────────────────────────
// Helper: refresh pins list if visible
// ────────────────────────────────────────────────
function refreshPinsIfVisible() {
  if (document.querySelector('[data-tab="pins"].active')) {
    renderPins(searchEl.value);
  }
}

// ────────────────────────────────────────────────
// FAB – Save location
// ────────────────────────────────────────────────
document.getElementById('fab').addEventListener('click', async e => {
  const now = Date.now();
  if (now - lastFabClickTime < 500) return;
  lastFabClickTime = now;

  let name = lastUsedName || `Pin ${pins.length + 1}`;

  if (e.detail >= 2) {
    const custom = prompt("Name this location?", name);
    if (custom === null) return;
    name = custom.trim() || name;
  }

  if (name && name !== lastUsedName) {
    lastUsedName = name;
    localStorage.setItem('gps-pins-lastname', name);
  }

  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, {enableHighAccuracy:true, timeout:14000, maximumAge:0})
    );

    const pin = {
      id: generateId(),
      name,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      accuracy: Math.round(pos.coords.accuracy),
      time: Date.now()
    };

    pins.push(pin);
    if (savePins()) {
      const share = getShareUrl(pin);
      print.success(`Location saved → ${escapeHTML(name)}`);
      println(`<span class="share-line">Share link: ${escapeHTML(share)} <button class="copy-share" data-url="${escapeHTML(share)}">Copy</button></span>`, 'info');

      pinsContainer.querySelectorAll('.copy-share:not([data-listener])').forEach(b => {
        b.addEventListener('click', () => copy(b.dataset.url, b));
        b.dataset.listener = '1';
      });

      refreshPinsIfVisible();
    }
  } catch (err) {
    print.error("Location error: " + (err.code === 1 ? "permission denied" : err.message));
  }
});

// ────────────────────────────────────────────────
// Tracking
// ────────────────────────────────────────────────
function startTracking() {
  if (trackingWatchId) return;
  print.info("Tracking started — new point ~every 15s");
  trackingWatchId = navigator.geolocation.watchPosition(pos => {
    const name = `Track ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
    const pin = {
      id: generateId(),
      name,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      accuracy: Math.round(pos.coords.accuracy),
      time: Date.now()
    };
    pins.push(pin);
    savePins();

    const share = getShareUrl(pin);
    println(`→ ${name} @ ${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`, 'info');
    println(`<span class="share-line">Share link: ${escapeHTML(share)} <button class="copy-share" data-url="${escapeHTML(share)}">Copy</button></span>`, 'info');

    pinsContainer.querySelectorAll('.copy-share:not([data-listener])').forEach(b => {
      b.addEventListener('click', () => copy(b.dataset.url, b));
      b.dataset.listener = '1';
    });

    refreshPinsIfVisible();
  }, err => {
    print.error("Tracking failed: " + err.message);
    stopTracking();
  }, {enableHighAccuracy:true, timeout:16000, maximumAge:0});
}

function stopTracking() {
  if (trackingWatchId) {
    navigator.geolocation.clearWatch(trackingWatchId);
    trackingWatchId = null;
    print.info("Tracking stopped.");
  }
}

// ────────────────────────────────────────────────
// Input (URL + commands)
// ────────────────────────────────────────────────
inputEl.addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();

  const val = inputEl.value.trim();
  if (!val) return;

  println(`<span class="prompt">> ${escapeHTML(val)}</span>`);

  // ── Try as URL ─────────────────────────────────
  let urlObj;
  try {
    urlObj = new URL(val.startsWith('http') ? val : 'https://' + val);
  } catch {}

  if (urlObj) {
    const fullUrl = urlObj.href;

    if (pins.some(p => p.url === fullUrl)) {
      print.info("This URL is already saved.");
    } else {
      let name = urlObj.hostname.replace(/^www\./, '');
      if (urlObj.pathname && urlObj.pathname !== '/') {
        const segment = urlObj.pathname.split('/')[1];
        if (segment) name += ` / ${segment}`;
      }
      name = name.slice(0, 68) || 'Link';

      const pin = { id: generateId(), name, url: fullUrl, time: Date.now() };
      pins.push(pin);

      if (savePins()) {
        const share = getShareUrl(pin);
        print.success(`URL saved → ${escapeHTML(name)}`);
        println(`<span class="share-line">Share link: ${escapeHTML(share)} <button class="copy-share" data-url="${escapeHTML(share)}">Copy</button></span>`, 'info');

        pinsContainer.querySelectorAll('.copy-share:not([data-listener])').forEach(b => {
          b.addEventListener('click', () => copy(b.dataset.url, b));
          b.dataset.listener = '1';
        });

        refreshPinsIfVisible();
      }
    }
    inputEl.value = '';
    inputEl.focus();
    return;
  }

  // ── Commands ───────────────────────────────────
  const cmd = val.toLowerCase().trim();
  if (cmd === 'help') {
    print.info('Commands:');
    println('• track on       – start continuous GPS logging');
    println('• track off      – stop tracking');
    println('• clear          – clear terminal');
    println('• list           – show all pins in terminal');
    println('• clear all      – delete ALL pins (with confirmation)');
  }
  else if (cmd === 'track on')  startTracking();
  else if (cmd === 'track off') stopTracking();
  else if (cmd === 'clear') {
    terminalEl.innerHTML = '';
    print.system('Terminal cleared.');
  }
  else if (cmd === 'list') {
    if (!pins.length) print.info('No pins saved yet.');
    else pins.forEach(p => {
      let line = `→ ${escapeHTML(p.name)}`;
      if (p.url) line += `  ${escapeHTML(p.url)}`;
      else if (p.lat != null) line += `  ${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}`;
      println(line, 'info');
    });
  }
  else if (cmd === 'clear all') {
    if (confirm('Delete ALL saved pins? This cannot be undone.')) {
      pins = [];
      savePins();
      print.success('All pins deleted.');
      refreshPinsIfVisible();
    }
  }
  else {
    print.error(`Unknown command: ${escapeHTML(val)}`);
    print.info('Type <b>help</b> to see available commands');
  }

  inputEl.value = '';
  inputEl.focus();
});

// ────────────────────────────────────────────────
// Search & theme
// ────────────────────────────────────────────────
searchEl.addEventListener('input', () => {
  if (document.querySelector('[data-tab="pins"].active')) {
    renderPins(searchEl.value);
  }
});

document.getElementById('theme-toggle').addEventListener('click', () => {
  const cur = document.body.getAttribute('data-theme') || 'dark';
  const next = cur === 'dark' ? 'light' : 'dark';
  document.body.setAttribute('data-theme', next);
  document.getElementById('theme-toggle').textContent = next === 'dark' ? '☀️ Light' : '🌙 Dark';
});

// ────────────────────────────────────────────────
// Init
// ────────────────────────────────────────────────
countEl.textContent = pins.length;
renderPins();
inputEl.focus();
</script>
</body>
</html>
