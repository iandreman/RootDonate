<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOID HAVEN – Terminal Settlement</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
  <style>
    :root {
      --bg:       #05050a;
      --surface:  #0a0e14;
      --text:     #d8ffd8;
      --green:    #33ff77;
      --purple:   #c58aff;
      --accent:   #00eaff;
      --muted:    #8899aa;
      --border:   #1a2a3f;
      --shadow:   rgba(0, 220, 255, 0.07);
    }
    * { box-sizing: border-box; margin:0; padding:0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100dvh;
      line-height: 1.55;
    }
    header {
      background: rgba(5,8,15,0.96);
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 1.6rem;
      position: sticky;
      top: 0;
      z-index: 100;
      text-align: center;
    }
    h1 { margin:0; font-size: clamp(2.2rem, 7vw, 3.2rem); color: var(--purple); }
    .subtitle { color: var(--muted); font-size: 0.9rem; }
    .tab-buttons { display: flex; justify-content: center; gap: 1rem; margin: 1rem 0; flex-wrap: wrap; }
    .tab-btn {
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--muted);
      padding: 0.5rem 1.2rem;
      border-radius: 4px;
      cursor: pointer;
    }
    .tab-btn.active, .tab-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,234,255,0.06);
    }
    .view {
      max-width: 1100px;
      margin: 1.5rem auto;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 6px 35px var(--shadow);
      display: none;
      overflow: hidden;
    }
    .view.active { display: block; }
    #output, #inventory { padding: 1.6rem 2rem; min-height: 45vh; max-height: 70vh; overflow-y: auto; font-size: 1.05rem; }
    .line {
      margin: 0.9rem 0;
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
      padding-right: 240px;
    }
    .line:hover .actions { opacity: 1; }
    .actions {
      opacity: 0;
      transition: opacity 0.2s;
      position: absolute;
      right: 1rem;
      top: 0.1rem;
      display: flex;
      gap: 0.7rem;
    }
    .act-btn {
      background: rgba(0,234,255,0.04);
      border: 1px solid var(--muted);
      color: var(--muted);
      padding: 0.35rem 0.9rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.84rem;
    }
    .act-btn:hover {
      background: rgba(0,234,255,0.16);
      color: var(--accent);
      border-color: var(--accent);
    }
    .prompt { color: var(--green); font-weight: 600; min-width: 150px; flex-shrink: 0; }
    .success { color: var(--green); }
    .muted   { color: var(--muted); opacity: 0.8; }
    .input-area {
      padding: 1.1rem 2rem;
      background: rgba(0,0,0,0.4);
      border-top: 1px solid var(--border);
    }
    .input-row { display: flex; align-items: center; gap: 0.8rem; }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font: inherit;
      font-size: 1.05rem;
      outline: none;
    }
    #input::placeholder { color: var(--muted); opacity: 0.6; }
  </style>
</head>
<body>

<header>
  <h1>VOID HAVEN</h1>
  <div class="subtitle">Terminal settlement builder • March 2026</div>
  <div class="tab-buttons">
    <button class="tab-btn active" data-tab="terminal">Terminal</button>
    <button class="tab-btn" data-tab="inventory">Inventory</button>
  </div>
</header>

<main>
  <div id="terminalView" class="view active">
    <div id="output">
      <div class="line success">═══════════════════════════════════════</div>
      <div class="line success">     VOID HAVEN – Settlement Terminal    </div>
      <div class="line success">═══════════════════════════════════════</div>
      <div class="line"></div>
      <div class="line muted">Commands: status, build &lt;name&gt;, next, help, clear</div>
      <div class="line muted">Paste coords, text or links to log fragments</div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <label for="input" class="prompt">settler@haven:~$</label>
        <input id="input" type="text" autocomplete="off" autofocus placeholder="status / build hab-dome / next…" />
      </div>
    </div>
  </div>

  <div id="inventoryView" class="view">
    <div id="inventory">
      <div class="line muted">No items / buildings recorded yet.</div>
    </div>
  </div>
</main>

<script>
const els = {
  output:    document.getElementById('output'),
  input:     document.getElementById('input'),
  inventory: document.getElementById('inventory'),
  terminalView: document.getElementById('terminalView'),
  inventoryView: document.getElementById('inventoryView'),
};

let state = JSON.parse(localStorage.getItem('voidHavenState') || '{}');

if (!state.resources) {
  state = {
    day: 1,
    resources: { scrap: 12, water: 6, power: 4, population: 5 },
    buildings: { outpost: 1 },
    fragments: []
  };
}

function save() {
  localStorage.setItem('voidHavenState', JSON.stringify(state));
}

function println(html) {
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = html;
  els.output.appendChild(div);
  els.output.scrollTop = els.output.scrollHeight;
}

function updateInventory() {
  let html = `<div class="line success">Day ${state.day} – Settlement Status</div>`;
  html += `<div class="line">Population: ${state.resources.population}</div>`;
  html += `<div class="line">Resources:</div>`;
  for (let [k,v] of Object.entries(state.resources)) {
    if (k !== 'population') html += `<div class="line muted">  ${k.padEnd(10)} ${v}</div>`;
  }
  html += `<div class="line"></div><div class="line">Buildings:</div>`;
  for (let [b,c] of Object.entries(state.buildings)) {
    html += `<div class="line muted">  ${b.padEnd(12)} ×${c}</div>`;
  }
  html += `<div class="line"></div><div class="line muted">Fragments / logs: ${state.fragments.length}</div>`;
  els.inventory.innerHTML = html;
}

function produceResources() {
  // Very simple production
  state.resources.scrap += (state.buildings.scrapyard || 0) * 3;
  state.resources.water += (state.buildings['water-sieve'] || 0) * 2;
  state.resources.power += (state.buildings.generator || 0) * 2;

  // Population consumes
  const consumed = Math.floor(state.resources.population / 3);
  state.resources.water = Math.max(0, state.resources.water - consumed);
  state.resources.scrap  = Math.max(0, state.resources.scrap  - Math.floor(consumed/2));

  state.day++;
}

function tryBuild(name) {
  const costs = {
    'water-sieve': { scrap: 18, power: 5 },
    'scrapyard':   { scrap: 28, power: 8 },
    'generator':   { scrap: 35, water: 10 },
    'hab-dome':    { scrap: 40, water: 15, power: 12 }
  };

  if (!(name in costs)) {
    println(`<span class="muted">Unknown building: ${name}</span>`);
    return;
  }

  const cost = costs[name];
  let canBuild = true;
  let msg = [];

  for (let [res, amt] of Object.entries(cost)) {
    if ((state.resources[res] || 0) < amt) {
      canBuild = false;
      msg.push(`need ${amt} ${res} (have ${state.resources[res]||0})`);
    }
  }

  if (!canBuild) {
    println(`<span class="muted">Cannot build ${name}: ${msg.join(', ')}</span>`);
    return;
  }

  // deduct
  for (let [res, amt] of Object.entries(cost)) {
    state.resources[res] -= amt;
  }
  state.buildings[name] = (state.buildings[name] || 0) + 1;
  println(`<span class="success">Constructed: ${name}</span>`);
  save();
  updateInventory();
}

function handleCommand(cmd) {
  cmd = cmd.toLowerCase().trim();

  if (cmd === 'clear') {
    els.output.innerHTML = '';
    println('<span class="success">Terminal cleared.</span>');
  }
  else if (cmd === 'help') {
    println('<span class="muted">Commands: status, next, build &lt;name&gt;, clear, help</span>');
    println('<span class="muted">Buildings: water-sieve, scrapyard, generator, hab-dome</span>');
  }
  else if (cmd === 'status') {
    println(`<span class="success">Day ${state.day}</span>`);
    for (let [k,v] of Object.entries(state.resources)) {
      println(`<span class="muted">${k.padEnd(12)} ${v}</span>`);
    }
    println('<span class="muted">Buildings:</span>');
    for (let [b,c] of Object.entries(state.buildings)) {
      println(`<span class="muted">  ${b.padEnd(12)} ×${c}</span>`);
    }
  }
  else if (cmd === 'next') {
    produceResources();
    println(`<span class="success">Advanced to day ${state.day}</span>`);
    println(`<span class="muted">Water left: ${state.resources.water}</span>`);
    save();
    updateInventory();
  }
  else if (cmd.startsWith('build ')) {
    const name = cmd.slice(6).trim();
    tryBuild(name);
  }
  else {
    println(`<span class="muted">→ ${cmd}</span>`);
  }
}

function logFragment(txt) {
  txt = txt.trim();
  if (!txt) return;
  state.fragments.push(txt);
  println(`<span class="muted">Logged: ${txt.slice(0,60)}${txt.length>60?'…':''}</span>`);
  save();
  updateInventory();
}

// ── Input handler ────────────────────────────────────────
els.input.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  let txt = els.input.value.trim();
  if (!txt) return;

  const line = document.createElement('div');
  line.className = 'line';
  line.innerHTML = `<span class="prompt">settler@haven:~$</span> ${txt.replace(/&/g,'&amp;').replace(/</g,'&lt;')}`;
  els.output.appendChild(line);
  els.output.scrollTop = els.output.scrollHeight;

  if (['status','next','clear','help'].includes(txt.toLowerCase().trim()) || txt.toLowerCase().startsWith('build ')) {
    handleCommand(txt);
  } else {
    logFragment(txt);
  }

  els.input.value = '';
});

// ── Tab switching ────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const isInv = btn.dataset.tab === 'inventory';
    els.terminalView.classList.toggle('active', !isInv);
    els.inventoryView.classList.toggle('active', isInv);
    if (isInv) updateInventory();
    else els.input.focus();
  });
});

// ── Init ─────────────────────────────────────────────────
setTimeout(() => {
  println('<span class="success">Settlement online. Awaiting orders.</span>');
  updateInventory();
}, 300);
</script>
</body>
</html>
