<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RootDonate AI • Real Chat</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    body {
      background: linear-gradient(135deg, #0f0f23, #1a1a2e);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .chat-container {
      max-width: 820px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .message {
      animation: fadeIn 0.35s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .custom-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background-color: #4b5563;
      border-radius: 20px;
    }

    textarea {
      scrollbar-width: thin;
      scrollbar-color: #4b5563 transparent;
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<div class="chat-container mx-auto">
  <!-- Header -->
  <div class="bg-zinc-900 border-b border-zinc-800 p-4 flex items-center gap-3">
    <div class="w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex items-center justify-center text-2xl font-bold">✨</div>
    <div>
      <h1 class="text-2xl font-bold tracking-tight">RootDonate AI</h1>
      <p class="text-xs text-emerald-400 flex items-center gap-1.5">
        <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
        Cleverbot + Grok Style • Free
      </p>
    </div>
    
    <div class="ml-auto flex gap-3">
      <button id="share-btn" class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-2xl text-sm font-medium transition-colors">
        <i class="fa-solid fa-share-nodes"></i> Share
      </button>
      <button id="new-btn" class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-2xl text-sm font-medium transition-colors">
        <i class="fa-solid fa-plus"></i> New
      </button>
    </div>
  </div>

  <!-- Chat Area -->
  <div id="chat" class="flex-1 overflow-y-auto p-6 space-y-8 bg-zinc-950 custom-scroll"></div>

  <!-- Input Area -->
  <div class="p-6 bg-zinc-900 border-t border-zinc-800">
    <div class="max-w-3xl mx-auto">
      <form id="chat-form" class="relative">
        <textarea id="user-input" rows="1"
          class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-4 pr-16 text-white placeholder-zinc-500 focus:outline-none focus:border-pink-500 resize-none text-base leading-relaxed"
          placeholder="Ask the AI anything..."></textarea>
        
        <button type="submit"
          class="absolute right-4 bottom-4 w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex items-center justify-center hover:brightness-110 transition-all active:scale-95">
          <i class="fa-solid fa-paper-plane text-white"></i>
        </button>
      </form>
      
      <p class="text-center text-zinc-500 text-xs mt-4">
        100% Free • Powered by Cleverbot with Grok-style personality • Conversations saved in URL
      </p>
    </div>
  </div>
</div>

<script>
  let conversation = [];

  // Grok-style prompt + Cleverbot via CORS proxy
  async function getAIResponse(userMessage) {
    try {
      const history = conversation.map(msg => 
        msg.role === 'user' ? `User: ${msg.content}` : `AI: ${msg.content}`
      ).join('\n');

      const fullPrompt = `You are Grok, built by xAI. 
You are helpful, truthful, witty, and a bit sarcastic when appropriate. 
You love science, technology, and exploring the universe. 
Never be overly politically correct. Answer directly and clearly.

Previous conversation:
${history}

User: ${userMessage}

Grok:`;

      // Use corsproxy.io to bypass CORS
      const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent('https://www.cleverbot.com/getreply');

      const res = await fetch(proxyUrl, {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/x-www-form-urlencoded' 
        },
        body: new URLSearchParams({
          input: fullPrompt,
          cb_settings_language: 'en',
          cb_settings_tweak1: '0.8',
          cb_settings_tweak2: '0.7',
          cb_settings_tweak3: '0.65'
        })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const text = await res.text();
      let reply = text.match(/output=(.+?)(?:&|$)/i);
      reply = reply ? decodeURIComponent(reply[1].trim()) : text.trim();

      // Clean any leftover "Grok:" prefix
      reply = reply.replace(/^Grok:\s*/i, '').trim();

      return reply || "Interesting question. Tell me more.";
    } catch (err) {
      console.error("AI Response Error:", err);
      return "Sorry, I'm having trouble connecting right now. Please try again in a few seconds.";
    }
  }

  // Save conversation to URL
  function saveToURL() {
    if (conversation.length === 0) {
      window.location.hash = '';
      return;
    }
    try {
      const jsonStr = JSON.stringify(conversation);
      const encoded = btoa(encodeURIComponent(jsonStr));
      window.location.hash = `/c/${encoded}`;
    } catch (e) {
      console.error("Failed to save to URL:", e);
    }
  }

  // Load conversation from URL
  function loadFromURL() {
    const hash = window.location.hash.substring(1);
    if (!hash) return false;

    let encoded = null;
    if (hash.startsWith('/conversation/')) encoded = hash.substring(14);
    else if (hash.startsWith('/c/')) encoded = hash.substring(3);
    else if (hash.startsWith('conv=')) encoded = hash.substring(5);
    else if (hash.startsWith('c=')) encoded = hash.substring(2);

    if (!encoded) return false;

    try {
      const decoded = decodeURIComponent(atob(encoded));
      conversation = JSON.parse(decoded);
      return true;
    } catch (e) {
      console.error("Failed to load conversation:", e);
      window.location.hash = '';
      return false;
    }
  }

  const chat = document.getElementById('chat');

  function renderConversation() {
    chat.innerHTML = '';

    conversation.forEach(msg => {
      const div = document.createElement('div');
      div.className = `message max-w-3xl mx-auto ${msg.role === 'user' ? 'ml-auto' : ''}`;

      if (msg.role === 'user') {
        div.innerHTML = `
          <div class="flex justify-end">
            <div class="bg-violet-600 text-white rounded-3xl rounded-tr-none px-6 py-4 max-w-[85%]">
              <p class="whitespace-pre-wrap">${msg.content}</p>
            </div>
          </div>`;
      } else {
        div.innerHTML = `
          <div class="flex gap-4">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex items-center justify-center text-2xl font-bold flex-shrink-0">✨</div>
            <div class="bg-zinc-900 rounded-3xl rounded-tl-none px-6 py-4 max-w-[85%]">
              <p class="whitespace-pre-wrap">${msg.content}</p>
            </div>
          </div>`;
      }
      chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
  }

  function addMessage(content, role) {
    if (!content?.trim()) return;
    conversation.push({ role, content: content.trim() });
    renderConversation();
    saveToURL();
  }

  function showWelcome() {
    if (conversation.length > 0) return;

    chat.innerHTML = `
      <div class="message max-w-3xl mx-auto">
        <div class="flex gap-4">
          <div class="w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex items-center justify-center text-2xl font-bold flex-shrink-0">✨</div>
          <div class="bg-zinc-900 rounded-3xl rounded-tl-none px-6 py-5 max-w-[85%]">
            <p class="text-lg">Hello! I'm RootDonate AI.</p>
            <p class="text-zinc-400 mt-2">A free AI powered by Cleverbot with Grok-style personality.</p>
            <p class="text-amber-400 text-xs mt-4">I'm helpful, truthful, and occasionally witty. Ask me anything!</p>
          </div>
        </div>
      </div>
    `;
  }

  // Event Listeners
  const form = document.getElementById('chat-form');
  const input = document.getElementById('user-input');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const question = input.value.trim();
    if (!question) return;

    addMessage(question, 'user');
    input.value = '';
    input.style.height = 'auto';

    const thinking = document.createElement('div');
    thinking.className = 'message max-w-3xl mx-auto';
    thinking.innerHTML = `
      <div class="flex gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex items-center justify-center text-2xl font-bold flex-shrink-0">✨</div>
        <div class="bg-zinc-900 rounded-3xl rounded-tl-none px-6 py-4">
          <div class="flex items-center gap-3 text-zinc-400">
            <i class="fa-solid fa-circle animate-pulse"></i>
            <span>Thinking in Grok style...</span>
          </div>
        </div>
      </div>
    `;
    chat.appendChild(thinking);
    chat.scrollTop = chat.scrollHeight;

    const reply = await getAIResponse(question);
    thinking.remove();
    addMessage(reply, 'bot');
  });

  input.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 180) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.dispatchEvent(new Event('submit'));
    }
  });

  document.getElementById('share-btn').addEventListener('click', () => {
    if (conversation.length === 0) {
      alert("Nothing to share yet. Send a message first!");
      return;
    }
    saveToURL();
    navigator.clipboard.writeText(window.location.href)
      .then(() => alert("✅ Share link copied to clipboard!"))
      .catch(() => alert("Could not copy automatically. Please copy the URL from the address bar."));
  });

  document.getElementById('new-btn').addEventListener('click', () => {
    if (confirm("Start a fresh conversation?")) {
      conversation = [];
      window.location.hash = '';
      chat.innerHTML = '';
      showWelcome();
      input.focus();
    }
  });

  // Initialize
  window.addEventListener('load', () => {
    const loaded = loadFromURL();
    if (!loaded) {
      showWelcome();
    } else {
      renderConversation();
    }
    input.focus();
  });

  window.addEventListener('beforeunload', saveToURL);
</script>
</body>
</html>
