<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CleverBot Terminal – Smart Offline v2 GPS Pins</title>
  <meta name="description" content="100% local chat • short GPS pins per message + full history share"/>

  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #79c0ff;
      --purple: #bc8cff;
      --success: #56d364;
      --danger: #f85149;
      --border: rgba(88,166,255,0.22);
      --shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --text: #1f2328;
      --muted: #57606a;
      --accent: #0969da;
      --accent-dim: #1f6feb;
      --purple: #8250df;
      --success: #2da44e;
      --danger: #d1242f;
      --border: rgba(9,105,218,0.25);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1.1rem 1.5rem;
      background: color-mix(in srgb, var(--bg) 90%, black);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    h1 {
      font-size: clamp(2.3rem, 9vw, 3.2rem);
      background: linear-gradient(90deg, var(--purple), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
    }
    .subtitle { color: var(--muted); text-align: center; font-size: 0.98rem; margin-top: 0.5rem; }
    .controls {
      display: flex;
      justify-content: center;
      gap: 0.9rem;
      margin: 1.3rem 0;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      color: var(--accent);
      transition: all 0.24s ease;
    }
    .btn:hover { background: color-mix(in srgb, var(--accent) 22%, transparent); }
    .btn.active { background: var(--accent); color: #000; }

    .tab-content { display: none; flex: 1; flex-direction: column; }
    .tab-content.active { display: flex; }

    #terminal-tab { flex: 1; display: flex; flex-direction: column; }
    #terminal {
      flex: 1;
      padding: 1.7rem 1.9rem;
      overflow-y: auto;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: clamp(1.05rem, 3.3vw, 1.16rem);
      line-height: 1.68;
    }
    .line { margin: 0.5rem 0; white-space: pre-wrap; word-break: break-word; }

    .prompt       { color: var(--accent-dim); font-weight: bold; }
    .info         { color: var(--accent-dim); }
    .success      { color: var(--success); font-weight: 600; }
    .error        { color: var(--danger); font-weight: 600; }
    .system       { color: var(--muted); font-style: italic; }
    .bot          { color: var(--purple); }

    .input-line {
      display: flex;
      align-items: center;
      padding: 1.2rem 1.9rem;
      background: rgba(0,0,0,0.38);
      border-top: 1px solid var(--border);
      gap: 1rem;
    }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--accent-dim);
      font: inherit;
      outline: none;
      caret-color: var(--accent);
    }

    #pins-tab { padding: 1.7rem; overflow-y: auto; }
    #search {
      width: 100%;
      max-width: 760px;
      margin: 0 auto 1.9rem;
      padding: 1.2rem 1.6rem;
      background: color-mix(in srgb, var(--surface) 72%, var(--bg));
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1.06rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.6rem;
      margin: 1.4rem 0;
      box-shadow: var(--shadow);
      transition: all 0.22s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    }
    .card-actions {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.2rem;
      flex-wrap: wrap;
    }
    .btn-small {
      font-size: 0.88rem;
      padding: 0.5rem 1rem;
    }

    #fab {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--purple), var(--accent));
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 2.6rem;
      box-shadow: 0 12px 36px rgba(0,0,0,0.65);
      cursor: pointer;
      z-index: 999;
      transition: all 0.26s ease;
    }
    #fab:hover  { transform: scale(1.15); }
    #fab:active { transform: scale(0.93); }

    #no-pins-message {
      text-align: center;
      padding: 6rem 1.2rem;
      color: var(--muted);
      font-size: 1.15rem;
    }
    footer {
      padding: 1.6rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.94rem;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
  </style>
</head>
<body data-theme="dark">

<header>
  <h1>CleverBot</h1>
  <div class="subtitle">smarter offline • short GPS pins per message</div>

  <div class="controls">
    <button class="btn active" data-tab="terminal">Terminal</button>
    <button class="btn" data-tab="pins">History <span id="pins-count">0</span></button>
    <button class="btn" id="theme-toggle">☀️ Light</button>
  </div>
</header>

<div id="terminal-tab" class="tab-content active">
  <div id="terminal" role="log" aria-live="polite"></div>
  <div class="input-line">
    <span class="prompt">></span>
    <input id="input" type="text" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off" autofocus 
           placeholder="type here… (help, clear, reset, bye, paste GPS pin to import)"/>
  </div>
</div>

<div id="pins-tab" class="tab-content">
  <input type="search" id="search" placeholder="Search history…" aria-label="Search messages"/>
  
  <div style="text-align:center; margin:1.8rem 0;">
    <button class="btn" id="copy-full-url">Copy Full Chat (long URL)</button>
  </div>

  <div id="pins-container" role="list" aria-live="polite"></div>
  <div id="no-pins-message" style="display:none;">
    <div style="font-size:5rem; margin-bottom:1.4rem;">💬</div>
    <p><strong>No messages yet.</strong></p>
    <p>Start chatting in Terminal!</p>
  </div>
</div>

<footer>
  CleverBot Terminal • paste <code>data:text/json;base64,…</code> (GPS pin or full chat) in terminal to import
</footer>

<button id="fab" title="Clear everything">🗑</button>

<script>
const STORAGE_KEY = 'cleverbot-smart-v3';
let messages = loadMessages();
let lastUserInputs = [];

const terminal   = document.getElementById('terminal');
const input      = document.getElementById('input');
const pinsList   = document.getElementById('pins-container');
const noPinsMsg  = document.getElementById('no-pins-message');
const searchEl   = document.getElementById('search');
const countEl    = document.getElementById('pins-count');
const themeBtn   = document.getElementById('theme-toggle');
const fab        = document.getElementById('fab');

// ─── Smarter replies (unchanged) ────────────────────────────────
const replies = {
  greetings: ["Yo!", "Heyy 👋", "Sup?", "Hellooo", "What's good? 😎"],
  howareyou: ["Chillin'", "Vibin' in your tab", "Alive (kinda)", "10/10 recommend being code"],
  whoareyou: ["Offline chaos gremlin", "CleverBot 2026 edition", "Ghost in the machine 😈"],
  thanks: ["No prob!", "Anytime 😏", "You got it", "<3"],
  laugh: ["😂😂", "lmaooo", "right???", "I'm deceased"],
  default: ["Hmm tell me more…", "Kinda fire ngl", "No wayyy", "Wait what?", "Spill", "Listening 👀", "Bold", "And then?", "Lowkey valid", "Wild"]
};

function getSmartReply(userMsg) {
  const txt = userMsg.toLowerCase().trim();
  lastUserInputs.push(txt);
  if (lastUserInputs.length > 5) lastUserInputs.shift();

  if (txt.match(/\b(hi|hello|hey|sup|greetings)\b/)) return random(replies.greetings);
  if (txt.includes("how are you") || txt.includes("how r u")) return random(replies.howareyou);
  if (txt.includes("who are you") || txt.includes("what are you")) return random(replies.whoareyou);
  if (txt.match(/\b(thanks|thank you|ty|appreciate)\b/)) return random(replies.thanks);
  if (txt.match(/(lol|lmao|haha|😂|🤣)/)) return random(replies.laugh);

  const recent = lastUserInputs.slice(-3).join(" ").toLowerCase();
  if (recent.match(/\b(yes|yeah|yep|yup)\b/)) return random(["Nice!", "Knew it 😏", "Bet.", "Sweet"]);
  if (recent.match(/\b(no|nah|nope)\b/)) return random(["Aight fair", "Respect ✊", "Cool cool", "Gotchu"]);

  return random(replies.default);
}

function random(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ─── Core functions ─────────────────────────────────────────────
function loadMessages() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function saveMessages() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
    countEl.textContent = messages.length;
  } catch (e) {
    println(`<span class="error">Save failed (${e.message})</span>`);
  }
}

function escape(s = '') {
  return s.replace(/[&<>"']/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[m]);
}

function println(html, cls = 'line') {
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

const print = {
  success: m => println(`<span class="success">${m}</span>`),
  error:   m => println(`<span class="error">${m}</span>`),
  info:    m => println(`<span class="info">${m}</span>`),
  system:  m => println(`<span class="system">${m}</span>`),
  bot:     m => println(`<span class="bot">${m}</span>`),
};

function addExchange(userText) {
  println(`<span class="prompt">></span> ${escape(userText)}`);
  const reply = getSmartReply(userText);
  print.bot(escape(reply));
  const now = Date.now();
  messages.push({ from: 'user', text: userText, time: now });
  messages.push({ from: 'bot', text: reply, time: now + 300 });
  saveMessages();
  if (document.querySelector('[data-tab="pins"].active')) renderHistory(searchEl.value);
}

function boot() {
  terminal.innerHTML = '';
  println('<span style="font-size:1.3rem;font-weight:700;">CleverBot – Smart Offline 2026</span>');
  println('─'.repeat(70),'system');
  print.info('Type + Enter');
  print.info('Commands: help • clear • reset • bye');
  print.info('Import: paste GPS pin or full data:text/...');
  print.info('Share: History → copy GPS pin (short) per message');
  println('');
  print.system('100% local – no tracking');
  println('');
  print.bot("Yo. Back with short GPS pins — what's good?");
  println('');
}

boot();
countEl.textContent = messages.length;

// ─── Input handling ─────────────────────────────────────────────
input.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  let txt = input.value.trim();
  if (!txt) return;

  const lower = txt.toLowerCase();

  if (lower === 'help') {
    print.system("Commands: clear / reset / bye / help");
    print.system("Paste short GPS pin or full data:text/... to import");
    print.system("History tab → GPS pins are short & email-friendly");
    input.value = ''; return;
  }

  if (['clear','reset'].includes(lower)) {
    boot();
    lastUserInputs = [];
    input.value = ''; return;
  }

  if (['bye','exit','quit','goodbye','cya'].includes(lower)) {
    print.system("Peace ✌️ Catch you in the next tab.");
    input.disabled = true;
    setTimeout(() => { input.disabled = false; input.focus(); }, 3400);
    input.value = ''; return;
  }

  if (txt.startsWith('data:text/json;base64,')) {
    try {
      const base64 = txt.split(',')[1];
      if (!base64) throw new Error("No base64 data");
      const binary = atob(base64);
      const jsonStr = decodeURIComponent(escape(binary));
      const data = JSON.parse(jsonStr);

      if (!Array.isArray(data) || data.length === 0) throw new Error("Empty or invalid format");

      const valid = data.every(m =>
        m && typeof m === 'object' &&
        (m.from === 'user' || m.from === 'bot') &&
        typeof m.text === 'string' && m.text.trim() &&
        typeof m.time === 'number'
      );

      if (!valid) throw new Error("Invalid message format");

      messages.push(...data);
      saveMessages();
      boot();
      print.success(`Imported ${data.length} message(s) — total now: ${messages.length}`);
    } catch (err) {
      print.error(`Import failed: ${err.message}`);
      print.system("Make sure you copied the **complete** data:text/... string");
    }
    input.value = '';
    return;
  }

  addExchange(txt);
  input.value = '';
});

// ─── Full chat export (long version) ────────────────────────────
document.getElementById('copy-full-url').addEventListener('click', async () => {
  if (messages.length === 0) return alert("No messages yet!");
  const json = JSON.stringify(messages);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  const url = `data:text/json;base64,${b64}`;

  try {
    await navigator.clipboard.writeText(url);
    const btn = document.getElementById('copy-full-url');
    btn.textContent = 'Full chat URL copied ✓';
    setTimeout(() => btn.textContent = 'Copy Full Chat (long URL)', 2200);
  } catch {
    alert("Clipboard failed — copy manually:\n\n" + url);
  }
});

// ─── GPS Pin (short per-message) ────────────────────────────────
function createGpsPin(msg) {
  const idx = messages.indexOf(msg);
  let pair = [msg];
  // Try to include the bot reply right after (most common case)
  if (idx >= 0 && idx + 1 < messages.length && messages[idx + 1].from === 'bot') {
    pair = [msg, messages[idx + 1]];
  }
  // Compact JSON
  const json = JSON.stringify(pair);
  const mini = json.replace(/\s+/g, '');
  const b64 = btoa(unescape(encodeURIComponent(mini)));
  return `data:text/json;base64,${b64}`;
}

function createEmailText(msg) {
  const sender = msg.from === 'user' ? 'You' : 'CleverBot';
  const time = new Date(msg.time).toLocaleString([], {dateStyle:'medium', timeStyle:'short'});
  return `${sender}  ${time}\n${msg.text}\n`;
}

function renderHistory(query = '') {
  pinsList.innerHTML = '';
  query = query.toLowerCase().trim();

  const filtered = messages.filter(m => !query || m.text.toLowerCase().includes(query));
  countEl.textContent = messages.length;

  if (!filtered.length) {
    noPinsMsg.style.display = messages.length === 0 ? 'block' : 'none';
    if (messages.length > 0 && query) {
      pinsList.innerHTML = '<div style="text-align:center; padding:5rem; color:var(--muted);">No matches found.</div>';
    }
    return;
  }

  noPinsMsg.style.display = 'none';

  filtered.forEach(m => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div style="font-weight:700; color:${m.from==='user'?'var(--accent)':'var(--purple)'}">
        ${m.from === 'user' ? 'You' : 'CleverBot'}
      </div>
      <div style="margin:0.7rem 0 1rem; white-space:pre-wrap; line-height:1.5;">${escape(m.text)}</div>
      <div style="color:var(--muted); font-size:0.92rem;">
        ${new Date(m.time).toLocaleString([], {dateStyle:'medium', timeStyle:'short'})}
      </div>
      <div class="card-actions">
        <button class="btn btn-small copy-gps" data-url="${createGpsPin(m)}">
          Copy GPS Pin
        </button>
        <button class="btn btn-small copy-email" data-text="${escape(createEmailText(m))}">
          Copy for email
        </button>
      </div>
    `;
    pinsList.appendChild(card);
  });
}

pinsList.addEventListener('click', e => {
  const t = e.target;

  if (t.matches('.copy-gps')) {
    const url = t.dataset.url;
    navigator.clipboard.writeText(url).then(() => {
      t.textContent = 'GPS Pin copied!';
      setTimeout(() => t.textContent = 'Copy GPS Pin', 1800);
    }).catch(() => {
      alert("Copy failed — copy manually:\n" + url);
    });
  }

  if (t.matches('.copy-email')) {
    const text = t.dataset.text;
    navigator.clipboard.writeText(text).then(() => {
      t.textContent = 'Email text copied!';
      setTimeout(() => t.textContent = 'Copy for email', 1800);
    }).catch(() => {
      alert("Copy failed — copy manually:\n\n" + text);
    });
  }
});

function refreshHistory() {
  if (document.querySelector('[data-tab="pins"].active')) renderHistory(searchEl.value);
}

// ─── Tab switching & events ─────────────────────────────────────
document.querySelectorAll('[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
    if (btn.dataset.tab === 'pins') renderHistory(searchEl.value);
  });
});

searchEl.addEventListener('input', () => renderHistory(searchEl.value));

fab.addEventListener('click', () => {
  if (!confirm("Clear all history?")) return;
  messages = [];
  lastUserInputs = [];
  saveMessages();
  boot();
  print.success("History cleared 🧹");
});

themeBtn.addEventListener('click', () => {
  const cur = body.dataset.theme;
  const nxt = cur === 'light' ? 'dark' : 'light';
  body.dataset.theme = nxt;
  themeBtn.textContent = nxt === 'light' ? '🌙 Dark' : '☀️ Light';
  localStorage.setItem('cb-theme', nxt);
});

if (localStorage.getItem('cb-theme')) {
  const th = localStorage.getItem('cb-theme');
  body.dataset.theme = th;
  themeBtn.textContent = th === 'light' ? '🌙 Dark' : '☀️ Light';
}

input.focus();
</script>
</body>
</html>
