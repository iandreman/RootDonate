<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donate with Monzo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
    }
    
    .monzo-pink {
      background-color: #FF4E6C;
    }
    
    .monzo-pink:hover {
      background-color: #e63e5a;
    }
  </style>
</head>
<body class="bg-zinc-50 min-h-screen flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full">
    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
      <!-- Header -->
      <div class="h-2 bg-gradient-to-r from-pink-500 to-rose-500"></div>
      
      <div class="px-8 pt-8 pb-10 text-center">
        <div class="mx-auto w-16 h-16 bg-pink-100 rounded-2xl flex items-center justify-center mb-6">
          <span class="text-4xl">💰</span>
        </div>
        
        <h1 class="text-3xl font-semibold text-zinc-900 mb-2">Support with Monzo</h1>
        <p class="text-zinc-600">Instant • Fee-free • Secure</p>
      </div>

      <!-- Form -->
      <div class="px-8 pb-10 space-y-6">
        <div>
          <label for="username" class="block text-sm font-medium text-zinc-700 mb-2">
            Monzo Username
          </label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-400">monzo.me/</span>
            <input 
              type="text" 
              id="username" 
              placeholder="yourusername"
              class="w-full pl-24 pr-4 py-4 border border-zinc-200 rounded-2xl focus:outline-none focus:border-pink-500 transition-colors text-lg"
              autocomplete="off"
              spellcheck="false"
            >
          </div>
          <p class="mt-2 text-xs text-zinc-500">Enter any Monzo username</p>
        </div>

        <!-- Fixed Amount -->
        <div class="bg-zinc-50 rounded-2xl p-5 text-center">
          <p class="text-sm text-zinc-500 mb-1">You are donating</p>
          <p class="text-5xl font-semibold text-zinc-900">£10</p>
          <p class="text-xs text-emerald-600 mt-1">✓ Instant transfer</p>
        </div>

        <button 
          onclick="donate()"
          class="monzo-pink w-full py-4 rounded-2xl text-white font-semibold text-lg shadow-lg shadow-pink-500/30 active:scale-[0.985] transition-all flex items-center justify-center gap-2">
          <span>Donate £10 Now</span>
          <span class="text-xl">→</span>
        </button>
      </div>

      <!-- Footer -->
      <div class="border-t border-zinc-100 bg-zinc-50 px-8 py-6 text-center">
        <div class="flex items-center justify-center gap-5 text-xs text-zinc-400">
          <div class="flex items-center gap-1">
            <span>🔒</span>
            <span>Secure</span>
          </div>
          <div>•</div>
          <div>Powered by Monzo</div>
        </div>
        <p class="text-[10px] text-zinc-400 mt-4">
          This page opens Monzo.me directly. No data is stored.
        </p>
      </div>
    </div>

    <!-- Trust bar -->
    <p class="text-center text-zinc-400 text-xs mt-8">
      Works with any Monzo account • No fees for the sender
    </p>
  </div>

  <script>
    function donate() {
      const usernameInput = document.getElementById('username');
      const username = usernameInput.value.trim();
      
      if (!username) {
        usernameInput.classList.add('!border-red-500');
        setTimeout(() => usernameInput.classList.remove('!border-red-500'), 2000);
        usernameInput.focus();
        return;
      }

      // Clean username (remove any accidental monzo.me/ prefix)
      const cleanUsername = username.replace(/https?:\/\/monzo\.me\//i, '').replace(/\/.*/g, '');
      
      const url = `https://monzo.me/${cleanUsername}/10`;
      window.open(url, '_blank');
    }

    // Allow pressing Enter to donate
    document.getElementById('username').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        donate();
      }
    });
  </script>
</body>
</html>
