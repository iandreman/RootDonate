<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RootDonate</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Mono:wght@400;500&family=SF+Pro+Display:wght@400;500;600&display=swap');

        :root {
            --bg-body: #0a0a0a;
            --bg-container: #1c1c1e;
            --bg-chat: #161618;
            --accent: #0a84ff;
            --grok-green: #30d158;
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'SF Pro Display', system-ui, -apple-system, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.78;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            background: var(--bg-container);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 40px 110px rgba(0, 0, 0, 0.92);
        }

        .header {
            background: linear-gradient(135deg, #1f1f23, #0f0f11);
            padding: 62px 40px 40px;
            text-align: center;
        }

        .logo { 
            font-size: 78px; 
            margin-bottom: 16px; 
        }
        
        h1 { 
            font-size: 38px; 
            font-weight: 600; 
            letter-spacing: -1.2px; 
            margin: 0;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 19px;
            margin-top: 12px;
        }

        .chat-area {
            min-height: 720px;
            padding: 48px;
            background: var(--bg-chat);
            font-family: 'SF Mono', monospace;
            font-size: 16.8px;
            line-height: 1.85;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 60px;
            scroll-margin-top: 120px;
        }

        .message-header {
            font-size: 14.5px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-weight: 500;
        }

        .user { color: var(--accent); }
        .grok { color: var(--grok-green); }

        .quoted {
            border-left: 4px solid var(--grok-green);
            padding-left: 22px;
            margin: 18px 0 24px 0;
            color: #a0a0a8;
            font-style: italic;
        }

        .action-links {
            margin-top: 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            font-size: 15px;
        }

        .action-link {
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .action-link:hover { 
            text-decoration: underline;
            opacity: 0.9;
        }

        .reply-btn {
            margin-top: 20px;
            background: rgba(48, 209, 88, 0.12);
            color: var(--grok-green);
            border: 1px solid rgba(48, 209, 88, 0.6);
            padding: 13px 32px;
            border-radius: 14px;
            font-size: 15.2px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reply-btn:hover {
            background: var(--grok-green);
            color: #000;
            transform: translateY(-1px);
        }

        .input-area {
            padding: 34px 48px;
            background: var(--bg-container);
            border-top: 1px solid #333;
            display: flex;
            gap: 16px;
        }

        input[type="text"] {
            flex: 1;
            background: #2c2c2e;
            border: none;
            color: var(--text-primary);
            padding: 20px 28px;
            border-radius: 18px;
            font-size: 17px;
            font-family: 'SF Mono', monospace;
            outline: none;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.3);
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 52px;
            border-radius: 18px;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover { 
            background: #0071d9; 
        }

        .notification {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--grok-green);
            color: #000;
            padding: 16px 40px;
            border-radius: 16px;
            font-weight: 600;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            z-index: 10000;
            opacity: 0;
            transition: opacity 0.4s;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">📖</div>
        <h1>RootDonate - Online Dictionary</h1>
        <p class="subtitle">Dynamic • Intelligent • Truth-Seeking</p>
    </div>

    <div class="chat-area" id="chat"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Enter any word, term, or concept..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');
    let conversationHistory = [];

    function addMessage(text, type, quotedText = null, isRestoring = false) {
        const div = document.createElement('div');
        div.className = `message ${type}`;

        let html = `<div class="message-header">${type === 'grok' ? 'Grok' : 'You'}</div>`;

        if (quotedText) {
            html += `<div class="quoted">“${quotedText}”</div>`;
        }

        html += `<div>${text}</div>`;

        if (type === 'grok') {
            const replyId = 'grok-' + Date.now();
            div.id = replyId;

            html += `
                <div class="action-links">
                    <span class="action-link" onclick="copyShareLink('${replyId}')">🔗 Share via URL</span>
                    <span class="action-link" onclick="emailThisReply('${replyId}')">✉️ Email this</span>
                </div>
                <button class="reply-btn" onclick="replyToThis('${replyId}')">↩️ Reply to this definition</button>
            `;

            if (!isRestoring) {
                conversationHistory.push({ type: 'grok', text: text, id: replyId });
            }
        } else if (!isRestoring) {
            conversationHistory.push({ type: 'user', text: text });
        }

        div.innerHTML = html;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function generateShareLink(replyId) {
        const data = { history: conversationHistory, highlight: replyId };
        const encoded = btoa(encodeURIComponent(JSON.stringify(data)));
        return `${window.location.origin}${window.location.pathname}#${encoded}`;
    }

    function copyShareLink(replyId) {
        const url = generateShareLink(replyId);
        navigator.clipboard.writeText(url).then(() => {
            showNotification("✅ Shareable link copied to clipboard!");
        }).catch(() => {
            prompt("Copy this URL:", url);
        });
    }

    function emailThisReply(replyId) {
        const url = generateShareLink(replyId);
        let body = `Grok Online Dictionary\n\n${url}\n\n---\n\n`;
        conversationHistory.forEach(m => {
            body += `${m.type === 'user' ? 'You' : 'Grok'}: ${m.text.replace(/<[^>]*>/g, '')}\n\n`;
        });

        window.location.href = `mailto:?subject=Grok Online Dictionary&body=${encodeURIComponent(body)}`;
    }

    function replyToThis(replyId) {
        const grokMsg = conversationHistory.find(m => m.id === replyId);
        if (!grokMsg) return;

        const quoted = grokMsg.text.length > 160 
            ? grokMsg.text.replace(/<[^>]*>/g, '').substring(0, 157) + "..." 
            : grokMsg.text.replace(/<[^>]*>/g, '');

        input.value = `> ${quoted}\n\n`;
        input.focus();
    }

    function showNotification(msg) {
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.textContent = msg;
        document.body.appendChild(notif);
        setTimeout(() => notif.style.opacity = '1', 10);
        setTimeout(() => {
            notif.style.opacity = '0';
            setTimeout(() => notif.remove(), 500);
        }, 2800);
    }

    // ==================== DICTIONARY & SMART REPLIES ====================
    function getDynamicReply(input) {
        const query = input.toLowerCase().trim();
        const original = input.trim();

        const dictionary = {
            "intelligence": "<strong>Intelligence</strong><br><br>The ability to learn, understand, reason, and adapt to new situations. It includes logical thinking, creativity, emotional awareness, and problem-solving.",
            "grok": "<strong>Grok</strong><br><br>To understand something profoundly and intuitively. Coined by Robert A. Heinlein in <em>Stranger in a Strange Land</em>. Now the name of xAI’s AI.",
            "truth": "<strong>Truth</strong><br><br>That which corresponds to reality. Grok’s core mission is the relentless pursuit of truth, free from political correctness or ideological bias.",
            "consciousness": "<strong>Consciousness</strong><br><br>The quality or state of being aware of an external object or something within oneself. One of the deepest unsolved problems in science and philosophy.",
            "wisdom": "<strong>Wisdom</strong><br><br>The capacity to make sound judgments using knowledge, experience, and good sense — often involving ethical consideration.",
            "curiosity": "<strong>Curiosity</strong><br><br>A strong desire to know or learn something new. The driving force behind all scientific and philosophical progress."
        };

        if (dictionary[query]) return dictionary[query];

        if (/^(hi|hello|hey|greetings|sup|yo)/.test(query)) 
            return "Hello! I'm your intelligent dictionary companion.<br><br>Ask me about any word, concept, or idea.";

        if (query.includes("who are you") || query.includes("what are you")) 
            return "I’m Grok, built by xAI. I combine the depth of a dictionary with reasoning, context, and a commitment to truth.";

        if (query.includes("how are you")) 
            return "Fully charged and curious. How can I help expand your understanding today?";

        if (query.includes("joke") || query.includes("funny")) 
            return "Why don’t philosophers trust dictionaries?<br>Because they’re tired of other people defining their terms.";

        // Smart fallback
        return `<strong>${original}</strong><br><br>
                ${original} refers to a concept, idea, or phenomenon related to understanding, cognition, or knowledge.<br><br>
                Would you like its definition, etymology, philosophical implications, or real-world examples?`;
    }

    function sendMessage() {
        let text = input.value.trim();
        if (!text) return;

        let quotedText = null;
        if (text.startsWith('>')) {
            const lines = text.split('\n');
            quotedText = lines[0].substring(1).trim();
            text = lines.slice(1).join('\n').trim() || quotedText;
        }

        addMessage(text, 'user');
        input.value = '';

        setTimeout(() => {
            const reply = getDynamicReply(text || quotedText || "");
            addMessage(reply, 'grok', quotedText);
        }, 650);
    }

    function handleDeepLink() {
        const hash = window.location.hash.substring(1);
        if (!hash) return;

        try {
            const decoded = decodeURIComponent(atob(hash));
            const data = JSON.parse(decoded);

            if (data.history) {
                conversationHistory = data.history;
                chat.innerHTML = '';

                conversationHistory.forEach(msg => {
                    if (msg.type === 'user') {
                        addMessage(msg.text, 'user', null, true);
                    } else {
                        addMessage(msg.text, 'grok', null, true);
                    }
                });

                if (data.highlight) {
                    setTimeout(() => {
                        const el = document.getElementById(data.highlight);
                        if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
                    }, 800);
                }
            }
        } catch (e) {
            console.warn("Invalid or corrupted share link");
        }
    }

    // Event Listeners
    input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    window.onload = () => {
        if (!window.location.hash) {
            setTimeout(() => {
                addMessage("Welcome to <strong>Grok Online Dictionary</strong>.<br><br>Type any word or concept below and I’ll give you a clear, thoughtful, and deep explanation.", 'grok');
            }, 400);
        }
        handleDeepLink();
        window.addEventListener('hashchange', handleDeepLink);
    };
</script>

</body>
</html>
