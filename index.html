<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Import to GPS Pins</title>
  <meta name="description" content="Quickly import GPS Pins share links or URLs"/>

  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --purple: #bc8cff;
      --success: #56d364;
      --danger: #f85149;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      padding: 1.8rem 1rem 1rem;
      text-align: center;
      background: color-mix(in srgb, var(--bg) 90%, black);
      border-bottom: 1px solid rgba(88,166,255,0.2);
    }
    h1 {
      font-size: clamp(2rem, 7vw, 3.2rem);
      margin: 0;
      background: linear-gradient(90deg, var(--purple), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .subtitle {
      color: var(--muted);
      margin-top: 0.5rem;
      font-size: 1rem;
    }
    main {
      flex: 1;
      width: 100%;
      max-width: 720px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    textarea {
      width: 100%;
      min-height: 140px;
      padding: 1.2rem;
      font-size: 1.1rem;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      border: 1px solid rgba(88,166,255,0.3);
      border-radius: 12px;
      resize: vertical;
      outline: none;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
    }
    button {
      padding: 0.9rem 2rem;
      font-size: 1.1rem;
      font-weight: 600;
      background: var(--accent);
      color: black;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      background: #79c0ff;
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(0);
    }
    #log {
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      padding: 1.4rem;
      min-height: 120px;
      font-family: Consolas, monospace;
      font-size: 1rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid rgba(88,166,255,0.15);
    }
    .success { color: var(--success); font-weight: bold; }
    .error   { color: var(--danger);   font-weight: bold; }
    .info    { color: var(--accent); }
    .muted   { color: var(--muted); }
    footer {
      padding: 1.5rem;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>Import to GPS Pins</h1>
  <div class="subtitle">Paste share link (#p=…) or normal URL → auto import</div>
</header>

<main>
  <textarea id="input" placeholder="Paste share link here (e.g. https://...#p=eyJuIjoi... ) or any URL" autofocus></textarea>

  <button id="importBtn">Import Now</button>

  <div id="log">Waiting for input…</div>
</main>

<footer>
  Made for quick imports • Works offline after first load • Uses same format as GPS Pins v21
</footer>

<script>
const STORAGE_KEY = 'gps-pins-v21';
const input = document.getElementById('input');
const btn   = document.getElementById('importBtn');
const log   = document.getElementById('log');

function println(html) {
  log.innerHTML += html + '<br>';
  log.scrollTop = log.scrollHeight;
}

function clearLog() {
  log.innerHTML = '';
}

function loadPins() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  } catch {
    return [];
  }
}

function savePins(pins) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(pins));
    return true;
  } catch {
    return false;
  }
}

function escape(s = '') {
  return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
}

btn.addEventListener('click', () => {
  const text = input.value.trim();
  if (!text) {
    println('<span class="error">Nothing to import.</span>');
    return;
  }

  clearLog();
  println('<span class="muted">Processing…</span>');

  let data = null;
  let isShareLink = false;

  // Try to detect our share link format
  if (text.includes('#p=')) {
    try {
      const hashPart = text.split('#p=')[1].split(/[&#?]/)[0];
      data = JSON.parse(atob(hashPart));
      isShareLink = !!(data && (data.n || data.u || (data.la != null && data.lo != null)));
    } catch (e) {
      println('<span class="error">Invalid share link format</span>');
    }
  }

  let pins = loadPins();
  let saved = 0;
  let messages = [];

  if (isShareLink && data) {
    const baseName = data.n ||
                     (data.u ? (new URL(data.u).hostname || 'Link').replace(/^www\./, '') : 'Location');

    // URL part
    if (data.u && !pins.some(p => p.url === data.u)) {
      pins.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2,8),
        name: baseName + (data.la != null && data.lo != null ? ' (link)' : ''),
        url: data.u,
        time: Date.now()
      });
      saved++;
      messages.push(`URL: ${data.u.slice(0,70)}${data.u.length>70?'…':''}`);
    }

    // GPS part
    if (data.la != null && data.lo != null) {
      const exists = pins.some(p =>
        p.lat === data.la && p.lng === data.lo &&
        Math.abs((p.accuracy||0) - (data.acc||0)) < 2
      );
      if (!exists) {
        pins.push({
          id: Date.now().toString(36) + Math.random().toString(36).slice(2,8),
          name: baseName + (data.u ? ' (location)' : ''),
          lat: data.la,
          lng: data.lo,
          accuracy: data.acc,
          time: Date.now()
        });
        saved++;
        messages.push(`GPS: ${data.la.toFixed(6)}, ${data.lo.toFixed(6)}${data.acc ? ` (±${Math.round(data.acc)}m)` : ''}`);
      }
    }

    if (saved > 0) {
      if (savePins(pins)) {
        println(`<span class="success">Imported ${saved} new pin${saved>1?'s':''}!</span>`);
        messages.forEach(m => println(`<span class="success">→ ${escape(m)}</span>`));
      } else {
        println('<span class="error">Could not save — storage may be full.</span>');
      }
    } else {
      println('<span class="muted">Nothing new — already saved.</span>');
    }
  } else {
    // Normal URL fallback
    try {
      const url = new URL(text);
      const full = url.href;
      if (pins.some(p => p.url === full)) {
        println('<span class="muted">This URL is already saved.</span>');
      } else {
        const name = (url.hostname || 'Link').replace(/^www\./, '');
        if (confirm(`Save this URL as pin?\n\n${name}\n${full.slice(0,90)}${full.length>90?'…':''}`)) {
          pins.push({
            id: Date.now().toString(36) + Math.random().toString(36).slice(2,8),
            name,
            url: full,
            time: Date.now()
          });
          if (savePins(pins)) {
            println(`<span class="success">Saved URL pin: ${escape(name)}</span>`);
          } else {
            println('<span class="error">Save failed — storage issue.</span>');
          }
        }
      }
    } catch {
      println('<span class="error">Not a valid URL or share link.</span>');
    }
  }

  input.select();
});

input.addEventListener('paste', () => {
  setTimeout(() => btn.click(), 100); // auto-import on paste
});

println('<span class="info">Paste share link or URL above ↑</span>');
println('<span class="muted">→ auto-imports on paste • works offline</span>');
</script>
</body>
</html>
