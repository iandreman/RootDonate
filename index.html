<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donate to Monzo with Root Donate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body { font-family: 'Inter', system-ui, sans-serif; }
    
    .monzo-pink {
      background: linear-gradient(135deg, #FF4E6C, #FF6B85);
    }

    .amount-btn {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .amount-btn.active {
      background-color: #FF4E6C;
      color: white;
      border-color: #FF4E6C;
      transform: scale(1.08);
      box-shadow: 0 10px 15px -3px rgb(255 78 108 / 0.3);
    }

    .input-focus {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #share-section {
      transition: all 0.4s ease;
    }
  </style>
</head>
<body class="bg-zinc-50 min-h-screen flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full">
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-zinc-100">
      
      <!-- Header -->
      <div class="h-2 bg-gradient-to-r from-pink-500 via-rose-500 to-violet-500"></div>
      
      <div class="px-8 pt-8 pb-6 text-center">
        <div class="mx-auto w-20 h-20 bg-gradient-to-br from-pink-100 to-rose-100 rounded-3xl flex items-center justify-center mb-6 shadow-inner">
          <span class="text-5xl">💸</span>
        </div>
        <h1 class="text-3xl font-semibold tracking-tight text-zinc-900">Donate with Monzo</h1>
        <p class="text-zinc-600 mt-1">Instant • Secure • Shareable</p>
      </div>

      <div class="px-8 pb-10 space-y-8">
        <!-- Recipient -->
        <div>
          <label class="block text-sm font-semibold text-zinc-700 mb-2">Recipient Monzo Username</label>
          <div class="relative">
            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400 font-medium">monzo.me/</span>
            <input 
              type="text" 
              id="username" 
              placeholder="yourusername"
              class="input-focus w-full pl-28 pr-5 py-4 border border-zinc-200 rounded-2xl focus:outline-none focus:border-pink-500 focus:ring-4 focus:ring-pink-100 text-lg font-medium"
              autocomplete="off"
              spellcheck="false"
              oninput="generateShareLink()"
            >
          </div>
        </div>

        <!-- Amount -->
        <div>
          <label class="block text-sm font-semibold text-zinc-700 mb-3">Choose amount</label>
          <div class="grid grid-cols-4 gap-3" id="preset-amounts">
            <button data-amount="5" class="amount-btn py-4 bg-white border-2 border-zinc-200 rounded-2xl font-semibold text-lg">£5</button>
            <button data-amount="10" class="amount-btn active py-4 bg-white border-2 border-zinc-200 rounded-2xl font-semibold text-lg">£10</button>
            <button data-amount="20" class="amount-btn py-4 bg-white border-2 border-zinc-200 rounded-2xl font-semibold text-lg">£20</button>
            <button data-amount="50" class="amount-btn py-4 bg-white border-2 border-zinc-200 rounded-2xl font-semibold text-lg">£50</button>
          </div>

          <div class="mt-4 relative">
            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-2xl font-semibold text-zinc-400">£</span>
            <input 
              type="number" 
              id="custom-amount"
              placeholder="Other amount"
              class="input-focus w-full pl-12 pr-5 py-4 border border-zinc-200 rounded-2xl focus:outline-none focus:border-pink-500 focus:ring-4 focus:ring-pink-100 text-lg font-medium"
              min="1"
              oninput="generateShareLink()"
            >
          </div>
        </div>

        <!-- Optional Message -->
        <div>
          <label class="block text-sm font-semibold text-zinc-700 mb-2">Personal message <span class="text-zinc-400 font-normal">(optional)</span></label>
          <textarea id="message" rows="2" placeholder="Thank you for your amazing work ❤️" class="input-focus w-full px-5 py-4 border border-zinc-200 rounded-2xl focus:outline-none focus:border-pink-500 focus:ring-4 focus:ring-pink-100 resize-none" oninput="generateShareLink()"></textarea>
        </div>

        <!-- Donate Button -->
        <button onclick="initiateDonation()" class="monzo-pink w-full py-5 rounded-2xl text-white font-semibold text-lg shadow-xl shadow-pink-500/40 active:scale-[0.97] transition-all flex items-center justify-center gap-3">
          <span id="btn-text">Donate £10 Now</span>
          <i class="fa-solid fa-arrow-right"></i>
        </button>

        <!-- Shareable Link Section -->
        <div id="share-section" class="hidden bg-zinc-50 border border-zinc-100 rounded-2xl p-5">
          <p class="text-sm font-semibold text-zinc-700 mb-3 flex items-center gap-2">
            <i class="fa-solid fa-link"></i>
            Shareable Donation Link
          </p>
          <div class="flex gap-2">
            <input 
              id="share-url" 
              type="text" 
              readonly 
              class="flex-1 bg-white border border-zinc-200 rounded-xl px-4 py-3 text-sm font-mono text-zinc-700"
            >
            <button onclick="copyShareLink()" class="px-5 bg-white border border-zinc-200 hover:bg-zinc-50 rounded-xl font-medium text-pink-600 flex items-center gap-2">
              <i class="fa-solid fa-copy"></i>
              Copy
            </button>
          </div>
          <p class="text-[10px] text-zinc-500 mt-2">Anyone with this link can donate directly</p>
        </div>
      </div>

      <!-- Footer -->
      <div class="border-t border-zinc-100 bg-zinc-50 px-8 py-6 text-center">
        <div class="flex justify-center items-center gap-5 text-xs text-zinc-400">
          <div>🔒 Bank-level security</div>
          <div>•</div>
          <div>Powered by Root Donate</div>
        </div>
        <p class="text-[10px] text-zinc-400 mt-3">
          No data stored • Direct to official Monzo.me
        </p>
      </div>
    </div>
  </div>

  <script>
    let selectedAmount = 10;

    // Amount buttons
    document.querySelectorAll('#preset-amounts button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#preset-amounts button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedAmount = parseInt(btn.dataset.amount);
        document.getElementById('custom-amount').value = '';
        updateButtonText();
        generateShareLink();
      });
    });

    // Custom amount
    document.getElementById('custom-amount').addEventListener('input', () => {
      const val = parseFloat(document.getElementById('custom-amount').value);
      if (val) {
        document.querySelectorAll('#preset-amounts button').forEach(b => b.classList.remove('active'));
        selectedAmount = val;
        updateButtonText();
        generateShareLink();
      }
    });

    function updateButtonText() {
      document.getElementById('btn-text').textContent = `Donate £${selectedAmount} Now`;
    }

    function getCleanUsername() {
      let username = document.getElementById('username').value.trim();
      return username
        .replace(/https?:\/\/(www\.)?monzo\.me\//i, '')
        .replace(/\/.*/g, '')
        .replace(/[^a-zA-Z0-9_-]/g, '')
        .trim()
        .toLowerCase();
    }

    function generateShareLink() {
      const username = getCleanUsername();
      const message = document.getElementById('message').value.trim();
      
      if (!username) {
        document.getElementById('share-section').classList.add('hidden');
        return;
      }

      let url = `https://monzo.me/${username}/${selectedAmount}`;

      if (message) {
        url += `?message=${encodeURIComponent(message)}`;
      }

      document.getElementById('share-url').value = url;
      document.getElementById('share-section').classList.remove('hidden');
    }

    function copyShareLink() {
      const shareUrl = document.getElementById('share-url');
      shareUrl.select();
      navigator.clipboard.writeText(shareUrl.value).then(() => {
        const original = event.target.innerHTML;
        event.target.innerHTML = `<i class="fa-solid fa-check"></i> Copied!`;
        setTimeout(() => {
          event.target.innerHTML = original;
        }, 2000);
      });
    }

    function initiateDonation() {
      const username = getCleanUsername();
      if (!username) {
        const input = document.getElementById('username');
        input.classList.add('!border-red-500', 'animate-pulse');
        setTimeout(() => input.classList.remove('!border-red-500', 'animate-pulse'), 1800);
        input.focus();
        return;
      }

      const customVal = parseFloat(document.getElementById('custom-amount').value);
      if (!isNaN(customVal) && customVal > 0) selectedAmount = customVal;

      const message = document.getElementById('message').value.trim();
      let url = `https://monzo.me/${username}/${selectedAmount}`;
      if (message) url += `?message=${encodeURIComponent(message)}`;

      // Button feedback
      const btn = document.querySelector('button[onclick="initiateDonation()"]');
      const originalHTML = btn.innerHTML;
      btn.style.pointerEvents = 'none';
      btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Opening Monzo...`;

      setTimeout(() => {
        window.open(url, '_blank');
        setTimeout(() => {
          btn.style.pointerEvents = 'auto';
          btn.innerHTML = originalHTML;
        }, 1200);
      }, 500);
    }

    // Real-time share link update
    document.getElementById('username').addEventListener('input', generateShareLink);
    document.getElementById('message').addEventListener('input', generateShareLink);

    // Keyboard support
    document.getElementById('username').addEventListener('keypress', e => { if (e.key === 'Enter') initiateDonation(); });
    document.getElementById('custom-amount').addEventListener('keypress', e => { if (e.key === 'Enter') initiateDonation(); });

    // Initial setup
    updateButtonText();
  </script>
</body>
</html>
