<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok • Intelligence of Beauty</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #111111;
      --accent: #c4b5fd;
      --soft: #94a3b8;
      --text: #e2e8f0;
    }
    
    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: #1a1825;
      padding: 18px 24px;
      text-align: center;
      border-bottom: 1px solid #2a2639;
    }

    .header h1 {
      margin: 0;
      font-size: 1.85rem;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .header p {
      margin: 6px 0 0;
      color: var(--soft);
      font-style: italic;
      font-size: 1rem;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      background: linear-gradient(to bottom, #0a0a0a, #0f0e17);
    }

    .message {
      max-width: 78%;
      padding: 18px 24px;
      border-radius: 20px;
      line-height: 1.75;
      font-size: 1.08rem;
    }

    .user {
      align-self: flex-end;
      background: #4338ca;
      color: white;
      border-bottom-right-radius: 6px;
    }

    .grok {
      align-self: flex-start;
      background: var(--panel);
      border: 1px solid #2a2639;
      border-bottom-left-radius: 6px;
    }

    .beauty-word {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline dotted 2px;
      transition: all 0.2s;
    }

    .beauty-word:hover {
      color: #e0bbff;
      background: rgba(167, 139, 250, 0.1);
      padding: 2px 4px;
      border-radius: 4px;
    }

    .input-area {
      padding: 20px 24px;
      background: #111111;
      border-top: 1px solid #2a2639;
    }

    input {
      width: 100%;
      padding: 18px 24px;
      border: none;
      border-radius: 50px;
      background: #1f1b2e;
      color: white;
      font-size: 1.1rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    .dict-panel {
      position: fixed;
      bottom: 100px;
      right: 30px;
      width: 420px;
      background: #1a1825;
      border-radius: 20px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.7);
      padding: 28px;
      display: none;
      z-index: 200;
      border: 1px solid #3b2f5e;
    }

    .dict-word {
      font-size: 2.6rem;
      margin: 0 0 8px 0;
      color: white;
    }

    .status {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.85rem;
      color: var(--soft);
      background: rgba(26, 24, 37, 0.9);
      padding: 6px 18px;
      border-radius: 30px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Grok • Intelligence of Beauty</h1>
    <p>Language Dictionary • Precision • Depth • Aesthetic Intelligence</p>
  </div>

  <div class="chat-container" id="chat"></div>

  <div class="input-area">
    <input type="text" id="userInput" 
           placeholder="Speak freely... rich words welcome (try: ephemeral, serendipity, eloquence)" 
           onkeypress="if(event.key === 'Enter') sendMessage()">
  </div>

  <!-- Beautiful Dictionary Panel -->
  <div class="dict-panel" id="dictPanel">
    <h2 class="dict-word" id="dictWord"></h2>
    <p id="dictPron" style="color:#a5b4fc; margin:0 0 16px 0; font-family:monospace;"></p>
    <p id="dictDef" style="font-size:1.25rem; font-style:italic; line-height:1.6;"></p>
    
    <div style="margin:24px 0; padding:20px; background:#25223a; border-radius:14px;">
      <strong style="color:#c4b5fd;">The Beauty of this Word:</strong>
      <p id="dictBeauty" style="margin:12px 0 0 0; font-style:italic; color:#e0d0ff;"></p>
    </div>

    <button onclick="closeDict()" 
            style="width:100%; padding:14px; background:#a78bfa; color:#111; border:none; border-radius:50px; font-weight:600; cursor:pointer;">
      Close & Continue Chat
    </button>
  </div>

  <div class="status">
    Intelligence of Beauty Mode • Active • Enhancing every word
  </div>

  <script>
    const chat = document.getElementById('chat');

    function addMessage(text, type) {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.innerHTML = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    function showDictionary(word) {
      const database = {
        "serendipity": {
          pron: "/ˌser.ənˈdɪp.ə.ti/",
          def: "The occurrence and development of events by happy or beneficial chance.",
          beauty: "A word that itself feels like a fortunate discovery — it gently reminds us that wonder often arrives unannounced."
        },
        "ephemeral": {
          pron: "/ɪˈfem.ər.əl/",
          def: "Lasting for a very short time; transient.",
          beauty: "Holds a quiet sadness and elegance — it teaches us to cherish fleeting moments of grace."
        },
        "eloquence": {
          pron: "/ˈel.ə.kwəns/",
          def: "The art of fluent, persuasive, and graceful expression.",
          beauty: "One of the highest compliments in language — it celebrates not just what is said, but the beauty with which it is said."
        }
      };

      const entry = database[word.toLowerCase()] || {
        pron: "",
        def: "A word rich in nuance, history, and human experience.",
        beauty: "Every word carries its own soul. Language is the most beautiful invention of humanity."
      };

      document.getElementById('dictWord').textContent = word.charAt(0).toUpperCase() + word.slice(1);
      document.getElementById('dictPron').textContent = entry.pron;
      document.getElementById('dictDef').textContent = entry.def;
      document.getElementById('dictBeauty').textContent = entry.beauty;

      document.getElementById('dictPanel').style.display = 'block';
    }

    function closeDict() {
      document.getElementById('dictPanel').style.display = 'none';
    }

    function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';

      setTimeout(() => {
        let response = "Understood. ";

        const lower = text.toLowerCase();
        
        if (lower.includes("serendipity")) {
          response = `You invoked <span class="beauty-word" onclick="showDictionary('serendipity')">serendipity</span>. `;
        } else if (lower.includes("ephemeral")) {
          response = `A beautiful choice — <span class="beauty-word" onclick="showDictionary('ephemeral')">ephemeral</span>. `;
        } else if (lower.includes("eloquence") || lower.includes("beautiful")) {
          response = `Speaking of beauty in language... <span class="beauty-word" onclick="showDictionary('eloquence')">eloquence</span> `;
        }

        response += `I'm processing this conversation with full <strong>Intelligence of Beauty</strong> — paying attention to nuance, etymology, emotional weight, and aesthetic quality of every word.`;

        addMessage(response, 'grok');
      }, 700);
    }

    // Welcome
    window.onload = () => {
      addMessage(`Hello! Welcome to <strong>Intelligence of Beauty</strong> mode.<br><br>I am now your language companion. Every conversation will be enriched with deeper appreciation of words — their history, music, and soul.<br><br>Try using rich or interesting words.`, 'grok');
    };
  </script>

</body>
</html>
