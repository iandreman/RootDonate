<!DOCTYPE html>
<html>
<head>
    <title>Joke Generator</title>
</head>
<body>
    <h1>Random Joke Generator</h1>
    <p>Click the button below to get a random joke!</p>
    <button onclick="generateJoke()">Get Joke</button>
    <p id="joke"></p>

    <script>
        async function generateJoke() {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer YOUR_API_KEY_HERE'
                },
                body: JSON.stringify({
                    model: 'gpt-4',
                    messages: [
                        { role: 'system', content: 'You are a funny AI that tells jokes.' },
                        { role: 'user', content: 'Tell me a random joke.' }
                    ]
                })
            });

            const data = await response.json();
            const joke = data.choices[0].message.content;
            document.getElementById('joke').innerText = joke;
        }
    </script>
</body>
</html>
