<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleverbot Chat</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        header {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        .chat {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 75%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.4;
        }
        .user {
            align-self: flex-end;
            background: #4a90e2;
            border-bottom-right-radius: 4px;
        }
        .bot {
            align-self: flex-start;
            background: #2c3e50;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }
        button {
            padding: 0 28px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #357abd;
        }
        .status {
            text-align: center;
            padding: 8px;
            font-size: 14px;
            color: #aaa;
        }
        .thinking {
            font-style: italic;
            color: #bbb;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>💬 Cleverbot Chat (Standalone)</header>
        
        <div id="chat" class="chat"></div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message here..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
        
        <div class="status" id="status">Ready • Works offline in your browser</div>
    </div>

    <script>
        // Pure HTML/JS Cleverbot-style chat
        let isThinking = false;

        const chatDiv = document.getElementById('chat');
        const inputField = document.getElementById('userInput');

        // ✅ Valid function with URL parameter (as requested)
        function getBotResponse(userMessage, url = "https://www.cleverbot.com") {
            if (!userMessage || typeof userMessage !== "string") {
                return "Sorry, I didn't understand that.";
            }

            const msg = userMessage.toLowerCase().trim();

            // Basic responses
            if (["hello", "hi", "hey"].includes(msg)) {
                return "Hello there! How are you today?";
            }
            if (msg.includes("how are you")) {
                return "I'm doing great, thanks for asking! How about you?";
            }
            if (msg.includes("your name") || msg.includes("who are you")) {
                return `I'm Cleverbot! (Running from ${url})`;
            }
            if (msg.includes("bye") || msg.includes("goodbye")) {
                return "Goodbye! Come back anytime!";
            }
            if (msg.includes("joke")) {
                const jokes = [
                    "Why don't programmers prefer dark mode? Because light attracts bugs!",
                    "Why did the scarecrow win an award? Because he was outstanding in his field!",
                    "Parallel lines have so much in common... It's a shame they'll never meet."
                ];
                return jokes[Math.floor(Math.random() * jokes.length)];
            }
            if (msg.includes("weather")) {
                return "I'm just a chatbot in your browser — I don't have real-time weather. But I hope it's sunny where you are!";
            }

            // Default responses
            const responses = [
                `Interesting point about "${userMessage}". Tell me more!`,
                `Hmm... ${userMessage}. What made you say that?`,
                `That's a cool thought! My take: I agree, but maybe there's more to it.`,
                `You said "${userMessage}". Reminds me of something... but I forgot! 😂`,
                `Wow, "${userMessage}" — you're keeping me on my toes!`,
                `I like how you said "${userMessage}". What's your reason behind it?`
            ];

            return responses[Math.floor(Math.random() * responses.length)];
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.textContent = text;
            chatDiv.appendChild(messageDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        async function sendMessage() {
            const userText = inputField.value.trim();
            if (!userText || isThinking) return;

            addMessage(userText, 'user');
            inputField.value = '';
            isThinking = true;

            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message bot thinking';
            thinkingDiv.textContent = 'Cleverbot is thinking...';
            chatDiv.appendChild(thinkingDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;

            await new Promise(resolve => setTimeout(resolve, 800 + Math.random() * 700));

            chatDiv.removeChild(thinkingDiv);

            // Call with URL parameter
            const botReply = getBotResponse(userText, "https://www.cleverbot.com");
            addMessage(botReply, 'bot');

            isThinking = false;
        }

        // Enter key support
        inputField.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Welcome message
        window.onload = function() {
            setTimeout(() => {
                addMessage("Hi! I'm Cleverbot. Talk to me about anything!", 'bot');
            }, 300);
        };
    </script>
</body>
</html>
