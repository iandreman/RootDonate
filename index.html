<script>
document.getElementById('donateForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const btn = this.querySelector('button');
    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Processing...';

    const data = {
        amount: parseFloat(document.getElementById('amount').value),
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        message: document.getElementById('message').value.trim(),
        steps: parseInt(document.getElementById('steps').value) || 0,
        currency: 'GBP'
    };

    try {
        const res = await fetch('/api/rootdonate.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        // Better error handling
        let result;
        try {
            result = await res.json();
        } catch (e) {
            throw new Error(`Server returned non-JSON: ${res.status} ${res.statusText}`);
        }

        const responseDiv = document.getElementById('response');
        responseDiv.style.display = 'block';

        if (res.ok && result.status === 'success') {
            responseDiv.className = 'success';
            responseDiv.innerHTML = `
                <strong>✅ Thank you!</strong><br>
                ${result.message}<br>
                Donation ID: <strong>${result.donation?.id || 'N/A'}</strong>
            `;
            this.reset();
        } else {
            responseDiv.className = 'error';
            responseDiv.textContent = result.message || `Error ${res.status}`;
        }
    } catch (err) {
        const responseDiv = document.getElementById('response');
        responseDiv.style.display = 'block';
        responseDiv.className = 'error';
        responseDiv.textContent = err.message || 'Connection error. Is the server running?';
        console.error(err);
    } finally {
        btn.disabled = false;
        btn.textContent = originalText;
    }
});
</script>
