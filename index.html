<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RootDonate AI • Realm of Words</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Cinzel:wght@400;700&display=swap');

    body {
      background: linear-gradient(135deg, #1a0f08, #3a2a1f);
      font-family: 'Cinzel', serif;
      color: #e6d5b8;
      margin: 0;
      padding: 0;
    }

    .chat-container {
      max-width: 860px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat;
      box-shadow: 0 0 80px rgba(139, 69, 19, 0.7);
      border: 14px solid #4a2c0f;
      border-image: linear-gradient(#d4af37, #8b5a2b) 1;
      border-radius: 12px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(to right, #3a2a1f, #5c4033);
      border-bottom: 6px solid #d4af37;
      padding: 16px 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.7);
    }

    .message {
      animation: fadeIn 0.5s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(25px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .scroll-bg {
      background: rgba(26, 15, 8, 0.93);
      backdrop-filter: blur(6px);
    }

    .user-bubble {
      background: linear-gradient(#4a2c0f, #3a2210);
      border: 3px solid #d4af37;
      box-shadow: 0 0 15px #d4af37;
    }

    .bot-bubble {
      background: linear-gradient(#2c1f14, #1f150f);
      border: 3px solid #8b5a2b;
      position: relative;
    }

    .bot-bubble::before {
      content: '✦';
      position: absolute;
      top: -14px;
      left: 24px;
      background: #2c1f14;
      padding: 0 12px;
      color: #d4af37;
      font-size: 22px;
    }

    .input-area {
      background: linear-gradient(#3a2a1f, #2c1f14);
      border-top: 6px solid #d4af37;
    }

    .rune {
      font-family: 'UnifrakturCook', cursive;
      color: #ffd700;
      text-shadow: 0 0 12px #ffd700;
    }

    .custom-scroll::-webkit-scrollbar {
      width: 8px;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background-color: #d4af37;
      border-radius: 20px;
    }

    /* IP Nodes Overlay */
    #ip-nodes-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 15, 8, 0.98);
      z-index: 1000;
      display: none;
      flex-direction: column;
    }

    #ip-canvas {
      flex: 1;
      background: radial-gradient(circle at center, #2c1f14, #0f0a05);
    }

    .node-info {
      position: absolute;
      background: rgba(58, 42, 31, 0.95);
      border: 3px solid #d4af37;
      padding: 12px 20px;
      border-radius: 12px;
      pointer-events: none;
      box-shadow: 0 0 20px #d4af37;
      font-size: 0.95rem;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-[#0f0a05]">

<div class="chat-container flex flex-col">

  <!-- Header -->
  <div class="header flex items-center gap-4">
    <div class="w-14 h-14 bg-gradient-to-br from-amber-400 via-yellow-600 to-amber-800 rounded-full flex items-center justify-center text-4xl border-4 border-amber-300 shadow-inner rune">📜</div>
    <div class="flex-1">
      <h1 class="text-3xl font-bold tracking-widest rune">ROOTDONATE AI</h1>
      <p class="text-amber-300 text-sm flex items-center gap-2">
        <span id="status-dot" class="w-3 h-3 bg-emerald-400 rounded-full animate-pulse"></span>
        <span id="status-text">Ancient Dictionary Runes Active</span>
      </p>
    </div>
    
    <div class="flex gap-3">
      <button id="ip-nodes-btn" class="flex items-center gap-2 bg-amber-900 hover:bg-amber-800 px-5 py-2.5 rounded-xl text-sm font-medium border border-amber-400 transition-all">
        <i class="fa-solid fa-share-nodes"></i> View IP Nodes
      </button>
      <button id="share-btn" class="flex items-center gap-2 bg-amber-900 hover:bg-amber-800 px-5 py-2.5 rounded-xl text-sm font-medium border border-amber-400 transition-all">
        <i class="fa-solid fa-share-nodes"></i> Share Quest
      </button>
      <button id="new-btn" class="flex items-center gap-2 bg-amber-900 hover:bg-amber-800 px-5 py-2.5 rounded-xl text-sm font-medium border border-amber-400 transition-all">
        <i class="fa-solid fa-dungeon"></i> New Adventure
      </button>
    </div>
  </div>

  <!-- Chat Area -->
  <div id="chat" class="flex-1 overflow-y-auto p-8 space-y-10 custom-scroll scroll-bg"></div>

  <!-- Input Area -->
  <div class="input-area p-6">
    <div class="max-w-3xl mx-auto">
      <form id="chat-form" class="relative">
        <textarea id="user-input" rows="1"
          class="w-full bg-[#2c1f14] border-4 border-amber-700 rounded-2xl px-7 py-5 pr-20 text-[#e6d5b8] placeholder-amber-400 focus:outline-none focus:border-amber-400 resize-none text-lg leading-relaxed font-medium"
          placeholder="Speak thy query, noble adventurer..."></textarea>
        
        <button type="submit"
          class="absolute right-5 bottom-5 w-12 h-12 bg-gradient-to-br from-amber-500 to-yellow-600 rounded-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all border-2 border-amber-300">
          <i class="fa-solid fa-scroll text-2xl text-[#1a0f08]"></i>
        </button>
      </form>
      
      <p class="text-center text-amber-400 text-xs mt-4 tracking-widest">
        Real-time Dictionary API • Offline Runes • Grok Spirit
      </p>
    </div>
  </div>
</div>

<!-- IP Nodes Overlay -->
<div id="ip-nodes-overlay" class="flex flex-col">
  <div class="header flex items-center justify-between px-8 py-5 border-b border-amber-700">
    <div class="flex items-center gap-4">
      <span class="text-3xl rune">🌐</span>
      <div>
        <h2 class="text-2xl font-bold rune tracking-widest">Internet IP Address Nodes</h2>
        <p class="text-amber-300 text-sm">The Great Web of Realms • Live Connections</p>
      </div>
    </div>
    <button id="close-nodes-btn" class="text-amber-400 hover:text-white text-3xl leading-none">✕</button>
  </div>
  
  <canvas id="ip-canvas" width="1200" height="700"></canvas>
  
  <div id="node-info" class="node-info hidden"></div>
  
  <div class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-[#2c1f14] border border-amber-600 rounded-2xl px-6 py-3 text-sm text-amber-300 flex items-center gap-6">
    <div><strong>Your IP:</strong> <span id="user-ip-display" class="font-mono text-amber-400"></span></div>
    <div id="user-location-display" class="text-amber-200"></div>
  </div>
</div>

<script>
  // ==================== Existing Chat Code (unchanged) ====================
  let conversation = [];
  let isOnline = true;

  const offlineDictionary = {
    "hello": "A sacred greeting used by wanderers across the realms.",
    "ai": "Artificial Intelligence — forged by mortals to mimic divine wisdom.",
    "grok": "To understand something intuitively or by deep empathy.",
    "universe": "All existing matter, space, and energy, considered as a whole.",
    "love": "A powerful force of deep affection that binds souls together.",
    "elon": "A legendary inventor and explorer of our age.",
    "xai": "A fellowship dedicated to understanding the true nature of the universe.",
    "quantum": "Relating to the mysterious realm of the very small."
  };

  const wittyResponses = {
    greetings: ["Hail, brave soul!", "Well met, adventurer!"],
    howareyou: ["My runes are strong today!", "Energized by the spirits of knowledge!"],
    jokes: ["Why do wizards never play hide and seek? Because good luck hiding when you're always spotted!"],
    facts: ["Dragons have been known to hoard knowledge as fiercely as gold."],
    thanks: ["The pleasure is mine, hero."]
  };

  async function fetchOnlineDefinition(word) {
    try {
      const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
      if (!res.ok) return null;
      const data = await res.json();
      if (!Array.isArray(data) || data.length === 0) return null;

      const entry = data[0];
      let html = `<strong class="text-2xl text-amber-300">${entry.word}</strong>`;

      if (entry.phonetic || (entry.phonetics && entry.phonetics.length > 0)) {
        const phonetic = entry.phonetic || entry.phonetics[0].text || '';
        const audioUrl = entry.phonetics?.find(p => p.audio)?.audio || '';
        html += `<br><span class="text-amber-400">${phonetic}</span>`;
        if (audioUrl) {
          html += ` <span class="audio-btn text-yellow-400" onclick="new Audio('${audioUrl}').play()">🔊 Play Pronunciation</span>`;
        }
      }

      html += `<br><br>`;

      entry.meanings.forEach((meaning, idx) => {
        html += `<span class="text-amber-400 font-bold">${meaning.partOfSpeech}</span><br>`;
        meaning.definitions.forEach((def, i) => {
          html += `<span class="block">${i + 1}. ${def.definition}</span>`;
          if (def.example) html += `<span class="text-amber-200 italic block pl-4">"${def.example}"</span>`;
        });
        if (idx < entry.meanings.length - 1) html += `<br>`;
      });

      return html;
    } catch (err) {
      isOnline = false;
      updateStatus();
      return null;
    }
  }

  function updateStatus() {
    const dot = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    if (isOnline) {
      dot.className = 'w-3 h-3 bg-emerald-400 rounded-full animate-pulse';
      text.textContent = 'Ancient Dictionary Runes Active';
    } else {
      dot.className = 'w-3 h-3 bg-amber-400 rounded-full';
      text.textContent = 'Offline Rune Mode';
    }
  }

  function getOfflineResponse(word) {
    return offlineDictionary[word.toLowerCase()] || null;
  }

  function getWittyResponse(msg) {
    const lower = msg.toLowerCase();
    if (/(hello|hi|hey|greetings|hail)/.test(lower)) return wittyResponses.greetings[Math.floor(Math.random() * wittyResponses.greetings.length)];
    if (/(how are you|hru|how r u)/.test(lower)) return wittyResponses.howareyou[Math.floor(Math.random() * wittyResponses.howareyou.length)];
    if (/(joke|funny|make me laugh)/.test(lower)) return wittyResponses.jokes[Math.floor(Math.random() * wittyResponses.jokes.length)];
    if (/(fact|tell me something)/.test(lower)) return wittyResponses.facts[Math.floor(Math.random() * wittyResponses.facts.length)];
    if (/(thank|thanks|thx)/.test(lower)) return wittyResponses.thanks[Math.floor(Math.random() * wittyResponses.thanks.length)];
    return null;
  }

  async function getAIResponse(userMessage) {
    const lowerMsg = userMessage.toLowerCase().trim();
    const words = lowerMsg.split(/\s+/).map(w => w.replace(/[^a-z]/g, '')).filter(w => w.length > 2);

    const witty = getWittyResponse(userMessage);
    if (witty) return witty;

    if (/^\d+\s*[\+\-\*\/]\s*\d+$/.test(lowerMsg)) {
      try { return `The ancient calculation yields <strong>${eval(lowerMsg)}</strong>.`; } catch (e) {}
    }

    const sortedWords = [...new Set(words)].sort((a, b) => b.length - a.length);

    for (let word of sortedWords) {
      const onlineDef = await fetchOnlineDefinition(word);
      if (onlineDef) return onlineDef + `<br><br><span class="text-xs text-emerald-400">✓ Drawn from the living dictionary</span>`;

      const offlineDef = getOfflineResponse(word);
      if (offlineDef) return `<strong>${word}</strong><br><br>${offlineDef}<br><br><span class="text-xs text-amber-400">● Ancient offline rune</span>`;
    }

    const fallbacks = [
      "The scrolls do not reveal this directly. What facet of this mystery intrigues thee most?",
      "A worthy quest! Try rephrasing or ask about a related word.",
      "My tomes did not catch that one. Shall we try another incantation?"
    ];
    return fallbacks[Math.floor(Math.random() * fallbacks.length)];
  }

  function saveToURL() {
    if (conversation.length === 0) { window.location.hash = ''; return; }
    try {
      const encoded = btoa(encodeURIComponent(JSON.stringify(conversation)));
      window.location.hash = `/quest/${encoded}`;
    } catch (e) {}
  }

  function loadFromURL() {
    const hash = window.location.hash.substring(1);
    if (!hash || !hash.startsWith('/quest/')) return false;
    try {
      const encoded = hash.substring(7);
      conversation = JSON.parse(decodeURIComponent(atob(encoded)));
      return true;
    } catch (e) {
      window.location.hash = '';
      return false;
    }
  }

  const chat = document.getElementById('chat');

  function renderConversation() {
    chat.innerHTML = '';
    conversation.forEach(msg => {
      const div = document.createElement('div');
      div.className = `message max-w-3xl mx-auto ${msg.role === 'user' ? 'ml-auto' : ''}`;
      if (msg.role === 'user') {
        div.innerHTML = `<div class="flex justify-end"><div class="user-bubble text-amber-100 rounded-3xl rounded-tr-none px-7 py-5 max-w-[85%]"><p class="whitespace-pre-wrap">${msg.content}</p></div></div>`;
      } else {
        div.innerHTML = `<div class="flex gap-5"><div class="w-12 h-12 bg-gradient-to-br from-amber-400 to-yellow-700 rounded-2xl flex items-center justify-center text-3xl flex-shrink-0 border-4 border-amber-300">📜</div><div class="bot-bubble text-[#e6d5b8] rounded-3xl rounded-tl-none px-7 py-5 max-w-[85%] definition"><p class="whitespace-pre-wrap">${msg.content}</p></div></div>`;
      }
      chat.appendChild(div);
    });
    chat.scrollTop = chat.scrollHeight;
  }

  function addMessage(content, role) {
    if (!content?.trim()) return;
    conversation.push({ role, content: content.trim() });
    renderConversation();
    saveToURL();
  }

  function showWelcome() {
    if (conversation.length > 0) return;
    chat.innerHTML = `<div class="message max-w-3xl mx-auto"><div class="flex gap-5"><div class="w-12 h-12 bg-gradient-to-br from-amber-400 to-yellow-700 rounded-2xl flex items-center justify-center text-4xl flex-shrink-0 border-4 border-amber-300">📜</div><div class="bot-bubble rounded-3xl rounded-tl-none px-8 py-6 max-w-[85%]"><p class="text-2xl">Hail, brave adventurer!</p><p class="text-amber-300 mt-3">I am RootDonate, Keeper of the Eternal Dictionary. Speak thy query and the ancient tomes shall reveal their secrets.</p><p class="text-amber-400 text-sm mt-6">Try: "What is love?" • "Define quantum" • "Tell me a joke"</p></div></div></div>`;
  }

  // Event Listeners for chat (same as before)
  const form = document.getElementById('chat-form');
  const input = document.getElementById('user-input');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const question = input.value.trim();
    if (!question) return;
    addMessage(question, 'user');
    input.value = '';
    input.style.height = 'auto';

    const thinkingDiv = document.createElement('div');
    thinkingDiv.className = 'message max-w-3xl mx-auto';
    thinkingDiv.innerHTML = `<div class="flex gap-5"><div class="w-12 h-12 bg-gradient-to-br from-amber-400 to-yellow-700 rounded-2xl flex items-center justify-center text-3xl flex-shrink-0 border-4 border-amber-300">📜</div><div class="bot-bubble rounded-3xl rounded-tl-none px-7 py-5"><div class="flex items-center gap-3 text-amber-300"><i class="fa-solid fa-circle animate-pulse"></i><span>Consulting the ancient scrolls...</span></div></div></div>`;
    chat.appendChild(thinkingDiv);
    chat.scrollTop = chat.scrollHeight;

    const reply = await getAIResponse(question);
    thinkingDiv.remove();
    addMessage(reply, 'bot');
  });

  input.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 180) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.dispatchEvent(new Event('submit'));
    }
  });

  document.getElementById('share-btn').addEventListener('click', () => {
    if (conversation.length === 0) { alert("No quest recorded yet!"); return; }
    saveToURL();
    navigator.clipboard.writeText(window.location.href)
      .then(() => alert("📜 Quest link copied to thy spellbook!\n\nShare this link with fellow adventurers."))
      .catch(() => alert("Copy the URL manually, adventurer."));
  });

  document.getElementById('new-btn').addEventListener('click', () => {
    if (confirm("Begin a new adventure?")) {
      conversation = [];
      window.location.hash = '';
      chat.innerHTML = '';
      showWelcome();
      input.focus();
    }
  });

  // ==================== NEW: IP Nodes Visualization ====================
  let nodes = [];
  let edges = [];
  let userNode = null;
  let canvas, ctx, animationFrame;

  async function loadIPData() {
    try {
      // Get public IP + geo
      const ipRes = await fetch('https://api.ipify.org?format=json');
      const ipData = await ipRes.json();
      const ip = ipData.ip;

      const geoRes = await fetch(`https://ip-api.com/json/${ip}`);
      const geo = await geoRes.json();

      document.getElementById('user-ip-display').textContent = ip;
      document.getElementById('user-location-display').innerHTML = `${geo.city || 'Unknown'}, ${geo.country || ''} <span class="text-amber-400">(${geo.lat?.toFixed(1) || '?'}°, ${geo.lon?.toFixed(1) || '?'}°)</span>`;

      userNode = {
        id: 0,
        ip: ip,
        label: "You",
        x: 600,
        y: 350,
        size: 18,
        color: "#fcd34d",
        city: geo.city || "Your Realm",
        country: geo.country || ""
      };

      // Generate fake connected nodes
      nodes = [userNode];
      for (let i = 1; i < 28; i++) {
        const fakeIP = `${Math.floor(Math.random()*256)}.${Math.floor(Math.random()*256)}.${Math.floor(Math.random()*256)}.${Math.floor(Math.random()*256)}`;
        nodes.push({
          id: i,
          ip: fakeIP,
          label: `Node ${i}`,
          x: Math.random() * 1100 + 50,
          y: Math.random() * 600 + 50,
          size: 8 + Math.random() * 10,
          color: "#8b5a2b",
          city: ["Eldoria", "Shadowfen", "Ironspire", "Mistvale", "Dragonhold", "Runeport"][Math.floor(Math.random()*6)],
          country: ["Realm of Light", "Dark Dominion", "Crystal Isles", "Void Lands"][Math.floor(Math.random()*4)]
        });
      }

      // Generate edges (connections)
      edges = [];
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          if (Math.random() > 0.7) {
            edges.push({ from: i, to: j });
          }
        }
      }
    } catch (e) {
      console.error("IP fetch failed", e);
      // Fallback dummy data
      userNode = { id: 0, ip: "192.168.1.1", label: "You (Demo)", x: 600, y: 350, size: 18, color: "#fcd34d", city: "Mystic Tower", country: "Eternal Realm" };
      nodes = [userNode];
      for (let i = 1; i < 20; i++) {
        nodes.push({ id: i, ip: `10.${i}.42.${i*3}`, label: `Node ${i}`, x: Math.random()*1100+50, y: Math.random()*600+50, size: 9, color: "#8b5a2b", city: "Unknown", country: "" });
      }
    }
  }

  function drawNetwork() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw edges with glow
    ctx.strokeStyle = "rgba(212, 175, 55, 0.25)";
    ctx.lineWidth = 1.5;
    edges.forEach(edge => {
      const from = nodes[edge.from];
      const to = nodes[edge.to];
      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.stroke();

      // Pulse effect on some edges
      if (Math.random() > 0.95) {
        ctx.strokeStyle = "#fcd34d";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(from.x, from.y);
        ctx.lineTo(to.x, to.y);
        ctx.stroke();
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = "rgba(212, 175, 55, 0.25)";
      }
    });

    // Draw nodes
    nodes.forEach(node => {
      // Glow
      ctx.shadowBlur = 25;
      ctx.shadowColor = node.color;

      ctx.fillStyle = node.color;
      ctx.beginPath();
      ctx.arc(node.x, node.y, node.size, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;

      // Rune border
      ctx.strokeStyle = "#d4af37";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(node.x, node.y, node.size + 4, 0, Math.PI * 2);
      ctx.stroke();

      // Label
      ctx.fillStyle = "#e6d5b8";
      ctx.font = "12px Cinzel";
      ctx.textAlign = "center";
      ctx.fillText(node.label, node.x, node.y + node.size + 18);
    });

    // Gentle node movement (breathing effect)
    nodes.forEach(node => {
      node.x += (Math.random() - 0.5) * 0.6;
      node.y += (Math.random() - 0.5) * 0.6;
      // Keep in bounds
      node.x = Math.max(40, Math.min(canvas.width - 40, node.x));
      node.y = Math.max(40, Math.min(canvas.height - 80, node.y));
    });
  }

  function animateNetwork() {
    drawNetwork();
    animationFrame = requestAnimationFrame(animateNetwork);
  }

  // Mouse hover info
  function showNodeInfo(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const infoEl = document.getElementById('node-info');
    let found = false;

    for (let node of nodes) {
      const dx = node.x - mx;
      const dy = node.y - my;
      if (dx*dx + dy*dy < (node.size + 10)**2) {
        infoEl.innerHTML = `
          <strong class="text-amber-300">${node.label}</strong><br>
          <span class="font-mono text-xs">${node.ip}</span><br>
          ${node.city}, ${node.country}
        `;
        infoEl.style.left = `${e.clientX + 15}px`;
        infoEl.style.top = `${e.clientY + 10}px`;
        infoEl.classList.remove('hidden');
        found = true;
        break;
      }
    }
    if (!found) infoEl.classList.add('hidden');
  }

  // IP Nodes Button
  document.getElementById('ip-nodes-btn').addEventListener('click', async () => {
    document.getElementById('ip-nodes-overlay').style.display = 'flex';
    canvas = document.getElementById('ip-canvas');
    ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth - 40;
    canvas.height = window.innerHeight - 180;

    await loadIPData();
    if (animationFrame) cancelAnimationFrame(animationFrame);
    animateNetwork();

    canvas.addEventListener('mousemove', showNodeInfo);
  });

  document.getElementById('close-nodes-btn').addEventListener('click', () => {
    document.getElementById('ip-nodes-overlay').style.display = 'none';
    if (animationFrame) cancelAnimationFrame(animationFrame);
  });

  // Initialize
  window.addEventListener('load', () => {
    const loaded = loadFromURL();
    if (loaded) {
      renderConversation();
    } else {
      showWelcome();
    }
    updateStatus();
    input.focus();
  });
</script>
</body>
</html>
