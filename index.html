<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok • Apple Intelligence Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Mono:wght@400;500&family=SF+Pro+Display:wght@400;500;600&display=swap');
        
        body {
            font-family: 'SF Pro Display', system-ui, sans-serif;
            background: #0a0a0a;
            color: #f5f5f7;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 820px;
            margin: 0 auto;
            background: #1c1c1e;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        .header {
            background: linear-gradient(135deg, #1f1f23, #0f0f11);
            padding: 35px 40px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        .logo { font-size: 42px; margin-bottom: 8px; }
        h1 { margin: 0; font-size: 28px; font-weight: 600; }
        .subtitle { color: #86868b; margin-top: 8px; font-size: 17px; }

        .chat-area {
            min-height: 520px;
            padding: 30px;
            overflow-y: auto;
            background: #161618;
            font-family: 'SF Mono', monospace;
            font-size: 15.5px;
            line-height: 1.65;
        }
        .message { 
            margin-bottom: 32px; 
            scroll-margin-top: 100px;
        }
        .user { color: #0a84ff; }
        .grok { color: #30d158; }

        .action-links {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            font-size: 13.8px;
        }
        .action-link {
            color: #0a84ff;
            cursor: pointer;
            text-decoration: underline;
        }
        .action-link:hover { color: #4da3ff; }

        .reply-to-btn {
            background: #2c2c2e;
            color: #30d158;
            border: 1px solid #30d158;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            margin-top: 8px;
        }
        .reply-to-btn:hover {
            background: #30d158;
            color: #000;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo"></div>
        <h1>Grok • Apple Intelligence</h1>
        <p class="subtitle">Type to Grok like the original cleverbot.py</p>
    </div>

    <div class="chat-area" id="chat"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="> Type your message here..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');
    let messageCounter = 0;
    let conversationHistory = [];

    function addMessage(text, type, isFromShare = false) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        
        let html = `<div>${text}</div>`;
        
        if (type === 'grok') {
            messageCounter++;
            const replyId = `reply-${messageCounter}`;
            const shareUrl = `${window.location.origin}${window.location.pathname}#${replyId}`;

            div.id = replyId;

            html += `
                <div class="action-links">
                    <span class="action-link" onclick="copyShareLink('${shareUrl}')">🔗 Share Link</span>
                    <span class="action-link" onclick="emailThisReply('${replyId}')">✉️ Email This Reply</span>
                </div>
                <button class="reply-to-btn" onclick="replyToThis('${text.replace(/'/g, "\\'").replace(/"/g, '\\"')}')">
                    ↩️ Reply to this conversation
                </button>
            `;

            conversationHistory.push({ type: 'grok', text: text, id: replyId });
        } else {
            conversationHistory.push({ type: 'user', text: text });
        }
        
        div.innerHTML = html;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function replyToThis(grokText) {
        const quoted = grokText.length > 120 ? grokText.substring(0, 117) + "..." : grokText;
        input.value = `> ${quoted}\n\n`;
        input.focus();
    }

    function copyShareLink(url) {
        navigator.clipboard.writeText(url).then(() => {
            showNotification("✅ Share link copied!");
        }).catch(() => prompt("Copy this link:", url));
    }

    function emailThisReply(replyId) {
        const shareUrl = `${window.location.origin}${window.location.pathname}#${replyId}`;

        let historyText = "📜 Conversation History:\n\n";
        conversationHistory.forEach(msg => {
            const prefix = msg.type === 'user' ? "You:" : "Grok:";
            historyText += `${prefix} ${msg.text}\n\n`;
        });

        const subject = encodeURIComponent("Grok Reply - Apple Intelligence Chat");
        const body = encodeURIComponent(
            `Grok replied:\n\n` +
            `${conversationHistory[conversationHistory.length-1].text}\n\n` +
            `🔗 Open this exact reply in the chat:\n${shareUrl}\n\n` +
            `─`.repeat(50) + `\n\n` +
            historyText +
            `\nShared via Grok • Apple Intelligence`
        );

        window.location.href = `mailto:?subject=${subject}&body=${body}`;
    }

    function showNotification(message) {
        const notif = document.createElement('div');
        notif.style.cssText = `position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
            background:#30d158;color:#000;padding:14px 26px;border-radius:12px;
            font-weight:600;z-index:10000;`;
        notif.textContent = message;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 2500);
    }

    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        addMessage(`> ${text}`, 'user');
        input.value = '';

        setTimeout(() => {
            let reply = "That's an interesting point.";

            const lower = text.toLowerCase();
            if (lower.includes("hello") || lower.includes("hi")) reply = "Hello there! Nice to see you again.";
            else if (lower.includes("how are you")) reply = "I'm doing great, thanks for asking.";
            else if (lower.includes("cleverbot") || lower.includes("code")) reply = "The original cleverbot.py was quite clever.";
            else if (lower.includes("thank")) reply = "You're very welcome!";
            else reply = "I'm here in the spirit of the classic cleverbot library.";

            addMessage(reply, 'grok');
        }, 650);
    }

    // Handle share link deep linking
    function handleDeepLink() {
        const hash = window.location.hash;
        if (hash) {
            const target = document.querySelector(hash);
            if (target) {
                setTimeout(() => {
                    target.scrollIntoView({ behavior: "smooth", block: "center" });
                }, 700);
            }
        }
    }

    input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    window.onload = () => {
        setTimeout(() => {
            addMessage("Hello! I'm Grok.<br>Welcome to this Apple Intelligence styled chat.<br><br>Try using Share Link or Email, then open from email to continue the conversation.", 'grok');
        }, 600);

        handleDeepLink();
        window.addEventListener('hashchange', handleDeepLink);
    };
</script>

</body>
</html>
