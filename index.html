<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Root — Walk to Earn Real Money">
    <title>Root • Walk & Earn</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        .nature-gradient {
            background: linear-gradient(135deg, #10b981, #14b8a6, #22d3ee);
        }
        
        .card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover {
            transform: translateY(-4px);
        }

        .living-ring {
            transition: stroke-dashoffset 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .tracking-active {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.75; }
        }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen overflow-x-hidden">

<!-- MAIN APP (directly visible) -->
<div id="mainApp" class="min-h-screen bg-gray-950">
    <div class="max-w-7xl mx-auto p-6 lg:p-10">
        
        <!-- Header -->
        <div class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-3">
                <span class="text-4xl">🌱</span>
                <h1 class="title-font text-4xl font-bold">Root Donate</h1>
            </div>
        
        </div>

        <!-- Balance -->
        <div class="nature-gradient rounded-3xl p-10 mb-12 relative overflow-hidden card">
            <div class="absolute -right-10 -top-10 text-[180px] opacity-10">🌱</div>
            <p class="text-emerald-100 text-lg">Your Living Balance</p>
            <p id="balance" class="text-7xl font-bold mt-2 mb-6">$0.00</p>
            <div class="flex justify-between text-emerald-100">
                <p>Total Steps: <span id="totalStepsBig" class="font-bold text-white">0</span></p>
                <p class="flex items-center gap-2">Keep walking to grow your balance</p>
            </div>
        </div>

        <!-- Life in Motion -->
        <div class="bg-white/5 border border-white/10 rounded-3xl p-8 card">
            <div class="flex justify-between items-center mb-8">
                <h2 class="flex items-center gap-3 text-2xl font-semibold">
                    <span class="text-3xl">🌿</span> Life in Motion
                </h2>
                <button onclick="togglePedometer()" id="connectBtn"
                        class="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-700 rounded-2xl text-sm font-medium flex items-center gap-2 transition-all">
                    <i class="fas fa-walking"></i>
                    <span id="connectText">Start Tracking</span>
                </button>
            </div>

            <div class="relative w-56 h-56 mx-auto mb-8">
                <svg class="w-full h-full -rotate-12" viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="52" fill="none" stroke="#1f2937" stroke-width="16"/>
                    <circle id="stepsProgress" cx="60" cy="60" r="52" fill="none" 
                            stroke="#10b981" stroke-width="16" stroke-dasharray="326.73"
                            stroke-dashoffset="326.73" stroke-linecap="round" class="living-ring"/>
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <p id="stepsCount" class="text-6xl font-bold">0</p>
                    <p class="text-emerald-400">steps today</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6 text-center">
                <div class="bg-white/5 rounded-2xl p-6">
                    <p class="text-gray-400 text-sm">Distance</p>
                    <p id="distance" class="text-4xl font-semibold text-emerald-400">0.0 km</p>
                </div>
                <div class="bg-white/5 rounded-2xl p-6">
                    <p class="text-gray-400 text-sm">Earned Today</p>
                    <p id="earnedToday" class="text-4xl font-semibold text-cyan-400">$0.00</p>
                </div>
            </div>

            <p id="sensorStatus" class="text-center text-xs text-gray-400 mt-6 leading-relaxed"></p>
        </div>

        <!-- Claim Button -->
        <button onclick="claimStepsReward()" id="claimBtn"
                class="mt-10 w-full nature-gradient py-6 rounded-3xl text-xl font-semibold disabled:opacity-50 flex items-center justify-center gap-2">
            <span>🌱</span> Claim & Plant Earnings
        </button>
    </div>
</div>

<script>
// Local storage keys
const STORAGE_KEY = 'rootWalkData';
let todaySteps = 0;
let totalLifetimeSteps = 0;
let isSensorConnected = false;
let lastAcceleration = 0;
let motionListener = null;
const stepThreshold = 13;

// Load saved data
function loadData() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        const data = JSON.parse(saved);
        totalLifetimeSteps = data.totalSteps || 0;
    }
    updateUI();
}

function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
        totalSteps: totalLifetimeSteps
    }));
}

function updateUI() {
    const progress = Math.min(todaySteps / 10000, 1);
    const offset = 326.73 * (1 - progress);

    document.getElementById('stepsCount').textContent = todaySteps.toLocaleString();
    document.getElementById('stepsProgress').setAttribute('stroke-dashoffset', offset);
    document.getElementById('distance').textContent = (todaySteps / 1312).toFixed(1) + " km";
    document.getElementById('earnedToday').textContent = "$" + (todaySteps / 10000).toFixed(2);
    document.getElementById('balance').textContent = '$' + (totalLifetimeSteps / 10000).toFixed(2);
    document.getElementById('totalStepsBig').textContent = totalLifetimeSteps.toLocaleString();
    document.getElementById('claimBtn').disabled = todaySteps < 3000;
}

// ====================== PEDOMETER ======================
function togglePedometer() {
    if (isSensorConnected) {
        stopPedometer();
    } else {
        startPedometer();
    }
}

function startPedometer() {
    if (typeof DeviceMotionEvent === 'undefined') {
        return alert("Step tracking is not supported on this browser.");
    }

    const btn = document.getElementById('connectBtn');
    
    if (typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission()
            .then(permission => {
                if (permission === 'granted') initSensor();
                else alert("Motion permission denied.");
            })
            .catch(() => initSensor());
    } else {
        initSensor();
    }
}

function initSensor() {
    isSensorConnected = true;
    const btn = document.getElementById('connectBtn');
    btn.classList.add('tracking-active', 'bg-teal-600');
    document.getElementById('connectText').textContent = 'Tracking Active';

    document.getElementById('sensorStatus').innerHTML = `
        🟢 Tracking active<br>
        <span class="text-amber-400">Keep this tab open for best results.</span>
    `;

    motionListener = function(event) {
        const acc = event.accelerationIncludingGravity;
        if (!acc) return;

        const totalAcc = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
        const delta = Math.abs(totalAcc - lastAcceleration);

        if (delta > stepThreshold && delta < 35) {
            todaySteps++;
            updateUI();
        }
        lastAcceleration = totalAcc;
    };

    window.addEventListener('devicemotion', motionListener, { passive: true });
}

function stopPedometer() {
    if (motionListener) {
        window.removeEventListener('devicemotion', motionListener);
        motionListener = null;
    }
    isSensorConnected = false;
    const btn = document.getElementById('connectBtn');
    btn.classList.remove('tracking-active', 'bg-teal-600');
    document.getElementById('connectText').textContent = 'Start Tracking';
    document.getElementById('sensorStatus').textContent = 'Tracking stopped';
}

function claimStepsReward() {
    if (todaySteps < 3000) return alert("You need at least 3,000 steps to claim.");

    const reward = todaySteps / 10000;
    totalLifetimeSteps += todaySteps;

    alert(`🎉 $${reward.toFixed(2)} added to your balance!`);

    todaySteps = 0;
    saveData();
    updateUI();
}

// Initialize
loadData();
updateUI();
</script>
</body>
</html>
