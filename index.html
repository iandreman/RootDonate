<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sugar Realms • Global Candy Empire</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='72' font-size='68'%3E🍭%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; margin:0; padding:20px 12px; min-height:100vh;
      background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); background-attachment:fixed; color:#2d2d2d; }
    .candy-bg { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; overflow:hidden; pointer-events:none; }
    .floating-candy { position:absolute; font-size:2.8em; opacity:0.75; animation:floatCandy linear infinite; user-select:none; }
    @keyframes floatCandy { 0% { transform:translateY(100vh) rotate(0deg); } 100% { transform:translateY(-120vh) rotate(360deg); } }

    .container { max-width:1100px; margin:0 auto; background:rgba(255,255,255,0.96); border-radius:24px;
      padding:32px 28px; box-shadow:0 20px 60px rgba(0,0,0,0.22); backdrop-filter:blur(8px); }

    h1 { color:#d63031; text-align:center; margin:0 0 6px; font-size:2.7em; }
    .subtitle { text-align:center; color:#636e72; font-style:italic; margin-bottom:28px; }

    .stats { display:flex; flex-wrap:wrap; justify-content:center; gap:24px; background:#fff3d1; padding:20px;
      border-radius:18px; margin-bottom:26px; }
    .stat { text-align:center; min-width:110px; }
    .stat strong { font-size:2.1em; color:#e84393; }
    .stat small { font-size:0.95em; color:#636e72; }

    .tabs { display:flex; justify-content:center; gap:12px; margin:28px 0 32px; flex-wrap:wrap; }
    .tab { padding:14px 32px; background:#ff7675; color:white; border:none; border-radius:50px;
      cursor:pointer; font-weight:600; font-size:1.05em; }
    .tab.active { background:#e84393; box-shadow:0 8px 20px rgba(232,67,147,0.35); }

    .log { background:#2d3436; color:#dfe6e9; padding:20px; border-radius:16px; height:220px;
      overflow-y:auto; margin-bottom:24px; font-family:monospace; font-size:0.97em; line-height:1.55; }

    button { background:#ff7675; color:white; border:none; padding:15px 34px; font-size:1.1em;
      border-radius:50px; cursor:pointer; margin:8px 6px; font-weight:600; transition:all 0.25s; }
    button:hover { background:#e84393; transform:translateY(-4px); }

    #map { height:520px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.15); margin:20px 0; }
  </style>
</head>
<body>

  <div class="candy-bg" id="candyBg"></div>

  <div class="container">
    <h1>🍬 Sugar Realms</h1>
    <p class="subtitle">Your Realistic Global Candy Empire • Earth Map</p>

    <div class="stats">
      <div class="stat"><strong id="level">1</strong><small>Level</small></div>
      <div class="stat"><strong><span id="candies">142</span></strong><small>🍬 Candies</small></div>
      <div class="stat"><strong><span id="shards">27</span></strong><small>✨ Shards</small></div>
      <div class="stat"><strong><span id="shops">1</span></strong><small>Shops</small></div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab(0)">My Empire</button>
      <button class="tab" onclick="switchTab(1)">World Map</button>
      <button class="tab" onclick="switchTab(2)">Buy Stock (£)</button>
      <button class="tab" onclick="switchTab(3)">Gummy Market</button>
    </div>

    <!-- Tab 0: Empire -->
    <div id="tab0" class="tab-content active">
      <div class="log" id="log"></div>
      <div style="text-align:center; margin:20px 0;">
        <button onclick="serveCustomer('normal')">Serve Regular Customer</button>
        <button onclick="serveCustomer('premium')">Serve Premium Customer</button>
        <button onclick="serveCustomer('wild')">Flash Sale!</button>
      </div>
      <p style="text-align:center; color:#636e72; font-size:0.95em;">
        Tip: More shops = higher total upkeep but bigger potential sales!
      </p>
    </div>

    <!-- Tab 1: Map -->
    <div id="tab1" class="tab-content">
      <h2 style="text-align:center;">🌍 Your Shops on the Real Map</h2>
      <div id="map"></div>
      <div style="text-align:center; margin-top:20px;">
        <button onclick="expandEmpire()">🌟 Open New Shop (£12 via Monzo)</button>
      </div>
    </div>

    <!-- Tab 2 & 3: keep your original Buy Stock and Gummy Market content here if you want -->
    <div id="tab2" class="tab-content"></div>
    <div id="tab3" class="tab-content"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const MONZO_LINK = "https://monzo.me/iandreme";

    let state = {
      level: 1,
      candies: 142,
      shards: 27,
      shops: 1,
      bankrupt: false,
      lastUpkeep: Date.now(),
      shopLocations: [
        {
          id: 1,
          name: "London Flagship",
          lat: 51.5074,
          lng: -0.1278,
          salesBonus: 1.12,     // realistic moderate-high traffic
          upkeepCost: 38        // £38 per "day" in game (scaled from real monthly rent ~£3000-8000)
        }
      ]
    };

    let mapInstance;
    let markers = [];

    // Realistic city data (salesBonus & upkeep based on real rent/foot-traffic)
    const expansionCities = [
      {name:"New York", lat:40.7128, lng:-74.0060, salesBonus:1.28, upkeepCost:52},
      {name:"Tokyo", lat:35.6762, lng:139.6503, salesBonus:1.35, upkeepCost:48},
      {name:"Paris", lat:48.8566, lng:2.3522, salesBonus:1.22, upkeepCost:45},
      {name:"Sydney", lat:-33.8688, lng:151.2093, salesBonus:1.15, upkeepCost:35},
      {name:"Dubai", lat:25.2048, lng:55.2708, salesBonus:1.30, upkeepCost:42},
      {name:"Los Angeles", lat:34.0522, lng:-118.2437, salesBonus:1.18, upkeepCost:44},
      {name:"Mumbai", lat:19.0760, lng:72.8777, salesBonus:1.08, upkeepCost:22},
      {name:"Rio de Janeiro", lat:-22.9068, lng:-43.1729, salesBonus:1.10, upkeepCost:25}
    ];

    function initMap() {
      mapInstance = L.map('map').setView([20, 0], 2);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
      }).addTo(mapInstance);
      renderShopsOnMap();
    }

    function renderShopsOnMap() {
      markers.forEach(m => m.remove());
      markers = [];
      state.shopLocations.forEach(shop => {
        const popup = `<b>${shop.name}</b><br>
                       Sales Bonus: +${Math.round((shop.salesBonus-1)*100)}%<br>
                       Daily Upkeep: ${shop.upkeepCost} 🍬`;
        const marker = L.marker([shop.lat, shop.lng]).addTo(mapInstance)
          .bindPopup(popup);
        markers.push(marker);
      });
    }

    function expandEmpire() {
      if (state.shopLocations.length >= 10) {
        alert("Your empire is already massive! (Max 10 shops in this version)");
        return;
      }
      const note = encodeURIComponent("Sugar Realms - New Shop Expansion");
      window.open(`${MONZO_LINK}/12?d=${note}`, '_blank');

      setTimeout(() => {
        const city = expansionCities[Math.floor(Math.random() * expansionCities.length)];
        const newShop = {
          id: state.shopLocations.length + 1,
          name: city.name + " Candy Store",
          lat: city.lat,
          lng: city.lng,
          salesBonus: city.salesBonus,
          upkeepCost: city.upkeepCost
        };
        state.shopLocations.push(newShop);
        state.shops = state.shopLocations.length;
        state.candies += 380; // opening stock bonus

        addLog(`🎉 New shop opened in <strong>${city.name}</strong>!<br>
                Sales bonus: +${Math.round((city.salesBonus-1)*100)}% | Upkeep: ${city.upkeepCost} 🍬/day`);
        renderShopsOnMap();
        updateUI();
      }, 800);
    }

    function calculateTotalUpkeep() {
      return state.shopLocations.reduce((total, shop) => total + shop.upkeepCost, 0);
    }

    function applyUpkeep() {
      if (state.bankrupt) return;
      const totalUpkeep = calculateTotalUpkeep();
      if (state.candies >= totalUpkeep) {
        state.candies -= totalUpkeep;
        addLog(`🧾 Upkeep paid for all ${state.shops} shops: -${totalUpkeep} 🍬`);
      } else {
        state.candies = 0;
        state.bankrupt = true;
        addLog(`<strong style="color:#ff7675;">💸 BANKRUPT! Total upkeep (${totalUpkeep} 🍬) exceeded your stock.</strong>`);
        // show rescue panel (reuse your original rescue code)
      }
      updateUI();
    }

    function serveCustomer(type) {
      if (state.bankrupt) return;

      let baseGain = type === 'premium' ? 48 : type === 'wild' ? 67 : 22;

      // Total sales multiplier from all shops
      const totalBonus = state.shopLocations.reduce((sum, s) => sum + (s.salesBonus - 1), 0);
      const finalGain = Math.floor(baseGain * (1 + totalBonus * 0.7)); // slightly dampened for realism

      state.candies += finalGain;
      addLog(`💰 Worldwide sales! <strong>+${finalGain} 🍬</strong> (from ${state.shops} shops)`);
      updateUI();
      checkBankruptcy();
    }

    function updateUI() {
      document.getElementById('level').textContent = state.level;
      document.getElementById('candies').textContent = Math.floor(state.candies);
      document.getElementById('shards').textContent = state.shards;
      document.getElementById('shops').textContent = state.shops;
    }

    function addLog(html) {
      const logEl = document.getElementById('log');
      const p = document.createElement('p');
      p.innerHTML = html;
      logEl.appendChild(p);
      logEl.scrollTop = logEl.scrollHeight;
      if (logEl.children.length > 60) logEl.removeChild(logEl.children[0]);
    }

    function checkBankruptcy() {
      if (state.candies < 20 && !state.bankrupt) {
        state.bankrupt = true;
        // You can add your original rescuePanel and overlay logic here
        addLog(`<strong style="color:#ff7675;">💸 Your empire is at risk of bankruptcy!</strong>`);
      }
    }

    function switchTab(n) {
      document.querySelectorAll('.tab-content').forEach((el, i) => el.classList.toggle('active', i === n));
      document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', i === n));
      if (n === 1 && !mapInstance) setTimeout(initMap, 50);
    }

    function createFloatingCandies() {
      const bg = document.getElementById('candyBg');
      const emojis = ['🍭','🍬','🍫','🍩','🧁','🍪','🌈','✨'];
      for (let i = 0; i < 18; i++) {
        const candy = document.createElement('div');
        candy.className = 'floating-candy';
        candy.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        candy.style.left = Math.random() * 100 + 'vw';
        candy.style.animationDuration = (Math.random() * 12 + 15) + 's';
        candy.style.animationDelay = '-' + (Math.random() * 30) + 's';
        bg.appendChild(candy);
      }
    }

    // Upkeep timer (every ~60s = one game day)
    setInterval(() => {
      applyUpkeep();
    }, 60000);

    // Init
    window.onload = () => {
      updateUI();
      addLog("<em>🍭 Welcome back to your realistic global candy empire!</em>");
      addLog("Each shop now has its own rent & sales potential based on real cities.");
      createFloatingCandies();
      switchTab(0);
    };
  </script>
</body>
</html>
