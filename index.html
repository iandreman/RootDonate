<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Terminal - URL + Commands</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #00ff9d;
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #header {
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }
    #terminal {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #0d1117;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    #input-area {
      padding: 14px 20px;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      align-items: center;
    }
    .prompt {
      color: #00ff9d;
      margin-right: 8px;
      user-select: none;
    }
    input {
      background: transparent;
      border: none;
      color: #00ff9d;
      font-family: inherit;
      font-size: 16px;
      outline: none;
      flex: 1;
    }
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(13, 17, 23, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      text-align: center;
      padding: 20px;
    }
  </style>
</head>
<body>

  <div id="header">
    <span class="prompt">$</span> Smart Terminal — Type URL or command (Up/Down for history)
  </div>

  <div id="terminal">
    <div id="overlay">
      <div><span class="prompt">$</span> Ready.</div>
      <div style="margin-top: 10px; color: #888;">Type a URL or command and press Enter</div>
      <div style="margin-top: 20px; color: #666;">Examples: google.com  clear  x.com</div>
    </div>
    <iframe id="iframe" src="about:blank"></iframe>
  </div>

  <div id="input-area">
    <span class="prompt">$</span>
    <input type="text" id="input" placeholder="type url or command..." autofocus autocomplete="off">
  </div>

  <script>
    const input = document.getElementById('input');
    const iframe = document.getElementById('iframe');
    const overlay = document.getElementById('overlay');

    let history = [];
    let historyIndex = -1;

    function processCommand(cmd) {
      const trimmed = cmd.trim();
      if (!trimmed) return;

      // Add to history
      history.unshift(trimmed);
      if (history.length > 50) history.pop(); // keep last 50 commands
      historyIndex = -1;

      if (trimmed.toLowerCase() === 'clear') {
        overlay.style.display = 'flex';
        iframe.src = 'about:blank';
        return;
      }

      // Check if it looks like a URL
      let isUrl = false;
      let url = trimmed;
      if (/^https?:\/\//i.test(trimmed) || 
          trimmed.includes('.') && !trimmed.includes(' ') && 
          !trimmed.startsWith('http')) {
        isUrl = true;
        if (!/^https?:\/\//i.test(trimmed)) {
          url = 'https://' + trimmed;
        }
      }

      if (isUrl) {
        overlay.style.display = 'none';
        iframe.src = url;
      } else {
        // For non-URL commands, just echo (you can add more commands later)
        console.log(`Command executed: ${trimmed}`);
        // Optionally show feedback in overlay if you want
      }
    }

    // Enter key
    input.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        const cmd = input.value;
        processCommand(cmd);
        input.value = '';
      }
    });

    // Arrow keys for history
    input.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (history.length === 0) return;
        historyIndex = Math.min(historyIndex + 1, history.length - 1);
        input.value = history[historyIndex];
      } 
      else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIndex <= 0) {
          historyIndex = -1;
          input.value = '';
        } else {
          historyIndex--;
          input.value = history[historyIndex];
        }
      }
    });

    // Click anywhere focuses the input line
    document.addEventListener('click', () => input.focus());

    // Focus on load
    window.onload = () => input.focus();
  </script>

</body>
</html>
