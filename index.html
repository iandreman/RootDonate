<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Root • Walk & Earn</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .card { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1); }
        .balance-amount { font-size: 2.75rem; line-height: 1; font-weight: 700; }
        .progress-ring { transition: stroke-dashoffset 0.6s ease; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- AUTH SCREEN (simplified) -->
<div id="authScreen" class="fixed inset-0 bg-white flex items-center justify-center z-50">
    <div class="max-w-md w-full px-6 py-8">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-emerald-600 to-teal-600 rounded-3xl text-white text-5xl mb-6">🌱</div>
            <h1 class="text-4xl font-bold text-gray-900">Root</h1>
            <p class="text-gray-500 mt-2">Walk • Earn Real Money</p>
        </div>

        <div class="bg-white border border-gray-200 rounded-3xl p-8 card">
            <div class="flex bg-gray-100 rounded-2xl p-1 mb-8">
                <button onclick="toggleAuthMode('signin')" id="signinTab" class="flex-1 py-3 text-sm font-medium rounded-xl tab-button active">Sign In</button>
                <button onclick="toggleAuthMode('signup')" id="signupTab" class="flex-1 py-3 text-sm font-medium rounded-xl">Sign Up</button>
            </div>

            <div id="signinForm">
                <input id="email" type="email" placeholder="you@example.com" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-4">
                <input id="password" type="password" placeholder="••••••••" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6">
                <button onclick="signIn()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-semibold">Sign In</button>
            </div>

            <div id="signupForm" class="hidden">
                <input id="fullName" type="text" placeholder="Alex Rivera" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-4">
                <input id="signupEmail" type="email" placeholder="you@example.com" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-4">
                <input id="signupPassword" type="password" placeholder="••••••••" class="w-full px-5 py-4 border border-gray-300 rounded-2xl mb-6">
                <button onclick="signUp()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-semibold">Create Account</button>
            </div>
        </div>
    </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="hidden min-h-screen bg-gray-50">
    <div class="max-w-7xl mx-auto p-6 lg:p-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-10">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-gradient-to-br from-emerald-600 to-teal-600 rounded-3xl flex items-center justify-center text-white text-3xl">🌱</div>
                <h1 class="text-4xl font-bold text-gray-900">Root</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-white px-5 py-3 rounded-3xl border flex items-center gap-3">
                    <div>
                        <p class="text-sm font-semibold" id="userName"></p>
                        <p class="text-xs text-gray-500" id="userEmail"></p>
                    </div>
                    <div id="userAvatar" class="w-10 h-10 bg-emerald-600 rounded-2xl flex items-center justify-center text-white font-bold text-lg"></div>
                </div>
                <button onclick="logout()" class="p-3 text-gray-400 hover:text-red-500">
                    <i class="fas fa-sign-out-alt text-2xl"></i>
                </button>
            </div>
        </div>

        <!-- Balance -->
        <div class="bg-gradient-to-br from-emerald-600 to-teal-600 text-white rounded-3xl p-8 mb-10 card">
            <p class="text-emerald-100">Total Balance</p>
            <p id="balance" class="balance-amount mt-1">$0.00</p>
            <div class="flex justify-between text-sm mt-4">
                <p class="text-emerald-100">Total Steps: <span id="totalStepsBig" class="font-semibold">0</span></p>
                <p class="text-emerald-100">10k steps = $1</p>
            </div>
        </div>

        <!-- Walk to Earn -->
        <div class="bg-white rounded-3xl p-8 card mb-10">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-semibold flex items-center gap-2">
                    <i class="fas fa-walking text-emerald-600"></i> Live Steps
                </h2>
                <button onclick="connectPedometer()" id="connectBtn"
                        class="px-5 py-2 bg-emerald-100 hover:bg-emerald-200 text-emerald-700 rounded-2xl text-sm font-medium">
                    Connect Sensor
                </button>
            </div>

            <div class="flex flex-col md:flex-row gap-8 items-center">
                <div class="relative w-48 h-48 flex-shrink-0">
                    <svg class="w-full h-full -rotate-12" viewBox="0 0 120 120">
                        <circle cx="60" cy="60" r="52" fill="none" stroke="#e5e7eb" stroke-width="14"/>
                        <circle id="stepsProgress" cx="60" cy="60" r="52" fill="none" 
                                stroke="#10b981" stroke-width="14" stroke-dasharray="326.73"
                                stroke-dashoffset="326.73" stroke-linecap="round"/>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center text-center">
                        <p id="stepsCount" class="text-6xl font-bold text-gray-900">0</p>
                        <p class="text-sm text-gray-500">steps today</p>
                    </div>
                </div>

                <div class="flex-1">
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-gray-50 rounded-2xl p-5">
                            <p class="text-gray-500 text-sm">Distance</p>
                            <p id="distance" class="text-3xl font-semibold">0.0 km</p>
                        </div>
                        <div class="bg-gray-50 rounded-2xl p-5">
                            <p class="text-gray-500 text-sm">Earned Today</p>
                            <p id="earnedToday" class="text-3xl font-semibold text-emerald-600">$0.00</p>
                        </div>
                    </div>

                    <button onclick="claimStepsReward()" id="claimBtn"
                            class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-4 rounded-2xl text-lg disabled:opacity-50">
                        Claim & Add to Bank
                    </button>
                </div>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class="bg-white rounded-3xl p-8 card">
            <h2 class="text-xl font-semibold mb-6">Recent Activity</h2>
            <div id="transactions" class="space-y-4"></div>
        </div>
    </div>
</div>

<script>
// Firebase Config (yours)
const firebaseConfig = { const firebaseConfig = {
  apiKey: "AIzaSyAJpd9btTi5DEq5B7NsDLD4G_pddVQi43Q",
  authDomain: "rootdonate.firebaseapp.com",
  projectId: "rootdonate",
  storageBucket: "rootdonate.firebasestorage.app",
  messagingSenderId: "838665513781",
  appId: "1:838665513781:web:308983a5b2713f20977a7c"
}; };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let todaySteps = 0;
let totalLifetimeSteps = 0;
let pedometerInterval = null;

// Real Device Motion Step Counter
let lastAcceleration = 0;
let stepThreshold = 12;

function connectPedometer() {
    const btn = document.getElementById('connectBtn');
    
    if (typeof DeviceMotionEvent.requestPermission === 'function') {
        // iOS 13+
        DeviceMotionEvent.requestPermission()
            .then(permission => {
                if (permission === 'granted') startPedometer();
                else alert("Permission denied");
            });
    } else {
        // Android / others
        startPedometer();
    }
}

function startPedometer() {
    document.getElementById('connectBtn').innerHTML = '✅ Connected';
    document.getElementById('connectBtn').disabled = true;

    window.addEventListener('devicemotion', handleMotion);
}

function handleMotion(event) {
    const acc = event.accelerationIncludingGravity;
    if (!acc) return;

    const totalAcc = Math.sqrt(acc.x*acc.x + acc.y*acc.y + acc.z*acc.z);
    const delta = Math.abs(totalAcc - lastAcceleration);

    if (delta > stepThreshold) {
        todaySteps++;
        updateWalkUI();
    }

    lastAcceleration = totalAcc;
}

// UI Update
function updateWalkUI() {
    const progress = Math.min(todaySteps / 10000, 1);
    const offset = 326.73 * (1 - progress);

    document.getElementById('stepsCount').textContent = todaySteps.toLocaleString();
    document.getElementById('stepsProgress').setAttribute('stroke-dashoffset', offset);
    document.getElementById('distance').textContent = (todaySteps / 1312).toFixed(1) + " km";
    document.getElementById('earnedToday').textContent = "$" + (todaySteps / 10000).toFixed(2);
    
    document.getElementById('claimBtn').disabled = todaySteps < 3000;
}

async function loadUserData(uid) {
    const doc = await db.collection('users').doc(uid).get();
    const data = doc.exists ? doc.data() : {};

    totalLifetimeSteps = data.totalSteps || 0;
    const balance = (totalLifetimeSteps / 10000).toFixed(2);

    document.getElementById('balance').textContent = '$' + balance;
    document.getElementById('totalStepsBig').textContent = totalLifetimeSteps.toLocaleString();
}

async function claimStepsReward() {
    if (todaySteps < 3000 || !currentUser) return;

    const reward = todaySteps / 10000;
    const newTotal = totalLifetimeSteps + todaySteps;

    try {
        await db.collection('users').doc(currentUser.uid).update({
            totalSteps: newTotal,
            balance: firebase.firestore.FieldValue.increment(reward)
        });

        totalLifetimeSteps = newTotal;
        alert(`✅ $${reward.toFixed(2)} added to your balance!`);

        todaySteps = 0; // Reset daily
        updateWalkUI();
        await loadUserData(currentUser.uid);
    } catch (e) {
        alert("Error: " + e.message);
    }
}

// Auth State
auth.onAuthStateChanged(async (user) => {
    if (user) {
        currentUser = user;
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');

        document.getElementById('userName').textContent = user.displayName || user.email.split('@')[0];
        document.getElementById('userEmail').textContent = user.email;
        document.getElementById('userAvatar').textContent = (user.displayName || user.email[0]).toUpperCase();

        await loadUserData(user.uid);
        updateWalkUI();
    } else {
        document.getElementById('authScreen').classList.remove('hidden');
        document.getElementById('mainApp').classList.add('hidden');
    }
});

// Keep your existing auth functions
function toggleAuthMode(mode) { /* your original code */ }
async function signIn() { /* your original code */ }
async function signUp() { /* your original code */ }
function logout() { auth.signOut(); }
</script>
</body>
</html>
