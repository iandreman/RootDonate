<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RootDonate</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Mono:wght@400;500&family=SF+Pro+Display:wght@400;500;600&display=swap');

        :root {
            --bg-body: #0a0a0a;
            --bg-container: #1c1c1e;
            --bg-chat: #161618;
            --accent-blue: #0a84ff;
            --accent-green: #30d158;
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'SF Pro Display', system-ui, -apple-system, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
            background: var(--bg-container);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.75);
        }

        .header {
            background: linear-gradient(135deg, #1f1f23, #0f0f11);
            padding: 40px 40px 32px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        .logo { font-size: 48px; margin-bottom: 10px; }
        h1 { margin: 0; font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }

        .subtitle {
            color: var(--text-secondary);
            margin-top: 8px;
            font-size: 17px;
        }

        .chat-area {
            min-height: 560px;
            padding: 32px;
            overflow-y: auto;
            background: var(--bg-chat);
            font-family: 'SF Mono', monospace;
            font-size: 15.5px;
            line-height: 1.65;
        }

        .message {
            margin-bottom: 36px;
            scroll-margin-top: 80px;
        }

        .user { color: var(--accent-blue); }
        .grok { color: var(--accent-green); }

        .action-links {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            font-size: 14px;
        }

        .action-link {
            color: var(--accent-blue);
            cursor: pointer;
            text-decoration: none;
        }

        .action-link:hover { text-decoration: underline; }

        .reply-to-btn {
            margin-top: 12px;
            background: rgba(48, 209, 88, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(48, 209, 88, 0.3);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reply-to-btn:hover {
            background: var(--accent-green);
            color: #000;
        }

        .input-area {
            padding: 24px 32px;
            background: var(--bg-container);
            border-top: 1px solid #333;
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            background: #2c2c2e;
            border: none;
            color: var(--text-primary);
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 16px;
            font-family: 'SF Mono', monospace;
            outline: none;
        }

        button {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0 32px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover { background: #0077ed; }

        .notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-green);
            color: #000;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 10000;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">🌐</div>
        <h1>RootDonate</h1>
        <p class="subtitle">Inspired by cleverbot.py • Apple Intelligence style</p>
    </div>

    <div class="chat-area" id="chat"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message to continue..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');
    let conversationHistory = [];

    function addMessage(text, type, isRestoring = false) {
        const div = document.createElement('div');
        div.className = `message ${type}`;

        let html = `<div>${text}</div>`;

        if (type === 'grok') {
            const replyId = 'reply-' + Date.now();
            div.id = replyId;

            const shareUrl = generateShareLink(replyId);

            html += `
                <div class="action-links">
                    <span class="action-link" onclick="copyShareLink('${shareUrl}')">🔗 Share Link</span>
                    <span class="action-link" onclick="emailThisReply('${replyId}')">✉️ Email This Reply</span>
                </div>
                <button class="reply-to-btn" onclick="replyToThis('${replyId}')">
                    ↩️ Reply to this conversation
                </button>
            `;

            if (!isRestoring) conversationHistory.push({ type: 'grok', text: text, id: replyId });
        } else if (!isRestoring) {
            conversationHistory.push({ type: 'user', text: text });
        }

        div.innerHTML = html;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function generateShareLink(replyId) {
        const data = { history: conversationHistory, highlight: replyId };
        const encoded = btoa(encodeURIComponent(JSON.stringify(data)));
        return `${window.location.origin}${window.location.pathname}#${encoded}`;
    }

    function copyShareLink(url) {
        navigator.clipboard.writeText(url).then(() => {
            showNotification("Share link copied! Anyone with this link can continue the conversation.");
        }).catch(() => prompt("Copy this link:", url));
    }

    function emailThisReply(replyId) {
        const shareUrl = generateShareLink(replyId);
        let body = "Join the conversation:\n\n";
        body += `🔗 ${shareUrl}\n\n`;
        body += "Full conversation:\n\n";

        conversationHistory.forEach(msg => {
            const prefix = msg.type === 'user' ? "You" : "Grok";
            body += `${prefix}: ${msg.text}\n\n`;
        });

        const subject = "RootDonate • Grok Conversation";
        window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    }

    function replyToThis(replyId) {
        const grokMsg = conversationHistory.find(m => m.id === replyId);
        if (!grokMsg) return;
        const quoted = grokMsg.text.length > 120 ? grokMsg.text.substring(0, 117) + "..." : grokMsg.text;
        input.value = `> ${quoted}\n\n`;
        input.focus();
    }

    function showNotification(message) {
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.textContent = message;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 3200);
    }

    function getSmartReply(lastUserMessage) {
        const msg = lastUserMessage.toLowerCase().trim();

        if (msg.includes("hello") || msg.includes("hi") || msg.includes("hey")) 
            return "Hello again! What would you like to talk about?";

        if (msg.includes("how are you")) 
            return "I'm doing well, thanks! How about you?";

        if (msg.includes("cleverbot")) 
            return "Cleverbot.py was legendary. We've evolved quite a bit since then.";

        if (msg.includes("who are you")) 
            return "I'm Grok, created by xAI.";

        return "That's interesting. Can you elaborate more on that?";
    }

    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        input.value = '';

        setTimeout(() => {
            const reply = getSmartReply(text);
            addMessage(reply, 'grok');
        }, 650);
    }

    function handleDeepLink() {
        const hash = window.location.hash.substring(1);
        if (!hash) return;

        try {
            const decoded = decodeURIComponent(atob(hash));
            const data = JSON.parse(decoded);

            if (data.history && Array.isArray(data.history)) {
                conversationHistory = data.history;
                chat.innerHTML = '';

                conversationHistory.forEach(msg => {
                    addMessage(msg.text, msg.type, true);
                });

                // Auto-reply to last user message when opening shared link
                const lastMsg = conversationHistory[conversationHistory.length - 1];
                if (lastMsg && lastMsg.type === 'user') {
                    setTimeout(() => {
                        const autoReply = getSmartReply(lastMsg.text);
                        addMessage(autoReply, 'grok');
                    }, 900);
                }

                if (data.highlight) {
                    setTimeout(() => {
                        const target = document.getElementById(data.highlight);
                        if (target) target.scrollIntoView({ behavior: "smooth", block: "center" });
                    }, 500);
                }
            }
        } catch (e) {
            console.warn("Invalid share link");
        }
    }

    input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    window.onload = () => {
        if (!window.location.hash) {
            setTimeout(() => {
                addMessage("Hello! I'm Grok.<br><br>Welcome to RootDonate.<br><br>Share any reply — anyone with the link can continue the conversation.", 'grok');
            }, 400);
        }

        handleDeepLink();
        window.addEventListener('hashchange', handleDeepLink);
    };
</script>

</body>
</html>
