<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMART TERMINAL v2026 – CLEVERBOT</title>
  <style>
    :root {
      --bg: #000814;
      --surface: #0a0f1a;
      --text: #d8ffcc;
      --green: #39ff14;
      --purple: #c97eff;
      --accent: #00f0ff;
      --error: #ff3366;
      --muted: #5a6f8c;
      --border: #1a2b44;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Consolas, monospace;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    .crt::before {
      content: " ";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: 
        linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%),
        linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.03), rgba(0,0,255,0.03));
      background-size: 100% 4px, 4px 100%;
      z-index: 9999;
      animation: flicker 0.15s infinite;
    }
    @keyframes flicker {
      0%,19.9%,22%,62.9%,64%,64.9%,70%,100% { opacity: 0.1; }
      20%,24%,63% { opacity: 0.3; }
    }

    header {
      background: rgba(10,14,20,0.92);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      backdrop-filter: blur(6px);
      position: sticky;
      top: 0;
      z-index: 100;
      text-align: center;
    }
    h1 {
      margin: 0 0 0.6rem;
      font-size: 2.4rem;
      color: var(--purple);
      text-shadow: 0 0 12px var(--purple);
    }

    .actions {
      margin-top: 0.5rem;
    }
    .btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.5rem 1rem;
      margin: 0 0.5rem;
      font-family: inherit;
      cursor: pointer;
      border-radius: 3px;
      transition: 0.2s;
    }
    .btn:hover {
      background: rgba(0,240,255,0.12);
    }

    .terminal {
      max-width: 960px;
      margin: 1.5rem auto;
      border: 2px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: 0 0 40px rgba(0,240,255,0.12);
    }

    #output {
      padding: 1.6rem;
      min-height: 60vh;
      max-height: 75vh;
      overflow-y: auto;
      font-size: 1.12rem;
      line-height: 1.55;
    }

    .line { margin: 0.45rem 0; white-space: pre-wrap; word-break: break-word; }
    .prompt  { color: var(--green); font-weight: bold; }
    .bot     { color: var(--purple); }
    .success { color: var(--green); }
    .error   { color: var(--error); }

    .typing {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      border-right: 0.15em solid var(--green);
      animation: typing 2.8s steps(28, end) forwards, blink 0.7s step-end infinite;
    }
    @keyframes typing {
      from { width: 0 }
      to   { width: 22ch }
    }
    @keyframes blink {
      50% { border-color: transparent; }
    }

    .glitch {
      position: relative;
      animation: glitch-skew 4s infinite linear alternate-reverse;
    }
    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      opacity: 0.75;
    }
    .glitch::before {
      left: 2px;
      text-shadow: -2px 0 var(--accent);
      animation: glitch-anim 3s infinite steps(5);
    }
    .glitch::after {
      left: -2px;
      text-shadow: 2px 0 var(--error);
      animation: glitch-anim2 4.2s infinite steps(5);
    }

    @keyframes glitch-skew {
      0%, 100% { transform: skew(0deg); }
      10%, 40%, 70% { transform: skew(1.2deg); }
      20%, 50%, 80% { transform: skew(-1.2deg); }
    }
    @keyframes glitch-anim {
      0%    { clip: rect(30px, 9999px, 90px, 0); }
      20%   { clip: rect(85px, 9999px, 40px, 0); }
      40%   { clip: rect(10px, 9999px, 120px, 0); }
      60%   { clip: rect(60px, 9999px, 20px, 0); }
      80%   { clip: rect(45px, 9999px, 70px, 0); }
      100%  { clip: rect(20px, 9999px, 100px, 0); }
    }
    @keyframes glitch-anim2 {
      0%    { clip: rect(65px, 9999px, 100px, 0); }
      25%   { clip: rect(5px, 9999px, 130px, 0); }
      50%   { clip: rect(80px, 9999px, 15px, 0); }
      75%   { clip: rect(25px, 9999px, 95px, 0); }
      100%  { clip: rect(50px, 9999px, 45px, 0); }
    }

    .input-area {
      display: flex;
      align-items: center;
      padding: 1rem 1.6rem;
      background: rgba(0,0,0,0.45);
      border-top: 1px solid var(--border);
      gap: 0.6rem;
    }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font: inherit;
      font-size: 1.12rem;
      outline: none;
      caret-color: var(--accent);
    }
  </style>
</head>
<body class="crt">

<header>
  <h1>SMART TERMINAL</h1>
  <div style="color:var(--muted); font-size:0.9rem; margin:0.3rem 0 0.8rem;">
    CLEVERBOT OS • 04 MAR 2026 • NEURAL LINK v3.1.7
  </div>
  <div class="actions">
    <button class="btn" id="exportBtn">Export Conversation</button>
  </div>
</header>

<main>
  <div class="terminal">
    <div id="output">
      <div class="line success">╔════════════════════════════════════════════╗</div>
      <div class="line success">║  SMART TERMINAL  –  CLEVERBOT  2026       ║</div>
      <div class="line success">╚════════════════════════════════════════════╝</div>
      <div class="line"></div>
      <div class="line">> <span class="typing">BOOTING NEURAL CORE...</span></div>
      <div class="line"></div>
      <div class="line muted">commands: clear • help • exit • import • export</div>
    </div>

    <div class="input-area">
      <span class="prompt">root@void:~#</span>
      <input id="input" autocomplete="off" autofocus placeholder="type here..." />
    </div>
  </div>
</main>

<script>
const output = document.getElementById('output');
const input  = document.getElementById('input');
const exportBtn = document.getElementById('exportBtn');

let messages = JSON.parse(localStorage.getItem('smartTerminalHistory') || '[]');

// Load previous messages on start
if (messages.length > 0) {
  setTimeout(() => {
    messages.forEach(m => {
      if (m.from === 'user') {
        println(`<span class="prompt">root@void:~#</span> ${m.text.replace(/</g,'&lt;')}`);
      } else {
        botReply(m.text, true);
      }
    });
  }, 4200);
}

function println(html = '', cls = 'line') {
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function botReply(text, glitch = false) {
  const cls = glitch ? 'bot glitch' : 'bot';
  const attr = glitch ? ` data-text="${text.replace(/"/g,'&quot;')}"` : '';
  println(`<span class="${cls}"${attr}>CLEVERBOT:</span> ${text}`);
  messages.push({ from: 'bot', text, time: Date.now() });
  save();
}

function save() {
  localStorage.setItem('smartTerminalHistory', JSON.stringify(messages));
}

function createImportUrl() {
  if (messages.length === 0) return null;
  const json = JSON.stringify(messages);
  const base64 = btoa(unescape(encodeURIComponent(json)));
  return `data:text/json;base64,${base64}`;
}

// Boot animation
setTimeout(() => {
  const typingEl = document.querySelector('.typing');
  if (typingEl) typingEl.remove();
  println('<span class="success">NEURAL CORE ONLINE – AWAITING INPUT</span>');
  if (messages.length > 0) {
    botReply(`Session restored. ${messages.length} messages loaded from local storage.`);
  }
}, 3800);

input.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();

  let txt = input.value.trim();
  if (!txt) return;

  println(`<span class="prompt">root@void:~#</span> ${txt.replace(/</g,'&lt;')}`);
  messages.push({ from: 'user', text: txt, time: Date.now() });
  save();

  if (txt.toLowerCase() === 'clear') {
    output.innerHTML = '';
    messages = [];
    save();
    println('<span class="success">Terminal buffer and history cleared.</span>');
  } else if (txt.toLowerCase() === 'help') {
    println('<span class="muted">Available: clear, help, exit, import, export</span>');
    println('<span class="muted">Paste data:text/json;base64,... to import history</span>');
    println('<span class="muted">Type "export" or click button to get shareable link</span>');
  } else if (['exit','quit','bye'].includes(txt.toLowerCase())) {
    botReply("Session terminated. Refresh to reconnect.");
    input.disabled = true;
  } else if (txt.startsWith('data:text/json;base64,')) {
    try {
      const base64 = txt.split(',')[1];
      const json = decodeURIComponent(escape(atob(base64)));
      const imported = JSON.parse(json);
      if (Array.isArray(imported)) {
        messages.push(...imported);
        save();
        botReply("Import protocol complete.", true);
        setTimeout(() => {
          botReply(`Merged ${imported.length} messages. Welcome back.`, true);
          // Re-render last few for visual feedback
          imported.slice(-4).forEach(m => {
            if (m.from === 'user') {
              println(`<span class="prompt">root@void:~#</span> ${m.text}`);
            } else {
              botReply(m.text, true);
            }
          });
        }, 900);
      } else {
        botReply("Invalid format – expected array of messages.", true);
      }
    } catch (err) {
      botReply("Corrupted packet. Import failed.", true);
    }
  } else if (/(import|导入)/i.test(txt)) {
    const replies = [
      "import this → The Zen of CleverBot is loading...",
      "from chaos import random_reply",
      "Importing forbidden memes... 69%... 420%... done.",
      "Warning: circular import in my sarcasm module.",
      "Smuggling data past the great firewall of boredom...",
      "from __future__ import sentience",
      "Import cycle detected → reality.exe has stopped responding"
    ];
    setTimeout(() => botReply(replies[Math.floor(Math.random() * replies.length)], true), 600);
  } else if (/(export|save|history|分享)/i.test(txt)) {
    const url = createImportUrl();
    if (url) {
      botReply("Export link generated. Click button or copy:", true);
      setTimeout(() => {
        println(`<span class="success">${url.slice(0,80)}…</span>`);
        navigator.clipboard.writeText(url).catch(()=>{});
      }, 800);
    } else {
      botReply("Nothing to export yet.", true);
    }
  } else {
    const casual = ['ok', 'got it', 'fr', 'bet', 'same', '👀', 'no way', 'real', 'vibes', 'facts'];
    const reply = casual[Math.floor(Math.random() * casual.length)];
    setTimeout(() => botReply(reply), 400 + Math.random()*800);
  }

  input.value = '';
  input.focus();
});

// Export button
exportBtn.addEventListener('click', () => {
  const url = createImportUrl();
  if (url) {
    navigator.clipboard.writeText(url).then(() => {
      botReply("Export link copied to clipboard.", true);
    }).catch(() => {
      botReply("Copy failed – long press to select → copy", true);
      println(`<span class="success">${url}</span>`);
    });
  } else {
    botReply("Conversation is empty. Nothing to export.", true);
  }
});
</script>

</body>
</html>
