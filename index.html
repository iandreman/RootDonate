<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Root • Lost & Found</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

    body {
      font-family: 'Inter', system-ui, sans-serif;
    }
    .title-font {
      font-family: 'Space Grotesk', sans-serif;
    }

    .monzo-pink {
      background: linear-gradient(135deg, #FF4E6C, #FF6B85);
    }

    .glass {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(24px);
    }
    .dark .glass {
      background: rgba(24, 24, 27, 0.92);
    }

    .card {
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 30px 40px -15px rgb(255 78 108 / 0.2);
    }

    .gear {
      animation: spin 25s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .tab-active {
      border-bottom: 4px solid #FF4E6C;
      color: #FF4E6C;
      font-weight: 600;
    }
  </style>
</head>
<body class="bg-zinc-100 dark:bg-zinc-950 min-h-screen py-8 px-4 transition-colors duration-300">
  <div class="max-w-2xl mx-auto">

    <!-- MAIN APP -->
    <div id="main-app" class="glass rounded-3xl shadow-2xl overflow-hidden border border-white/60 dark:border-zinc-700">
      <div class="h-2 monzo-pink"></div>

      <div class="px-8 pt-10 pb-6 text-center relative">
        <div class="absolute right-8 top-6 text-7xl opacity-10 gear">⚙️</div>
        <div class="mx-auto w-24 h-24 bg-gradient-to-br from-pink-100 to-rose-100 dark:from-zinc-800 dark:to-rose-900 rounded-3xl flex items-center justify-center mb-6 shadow-inner">
          <span class="text-6xl">🔍</span>
        </div>
        <h1 class="title-font text-4xl font-semibold tracking-tighter text-zinc-900 dark:text-white">Root • Lost & Found</h1>
        <p class="text-zinc-500 dark:text-zinc-400 mt-1">Precision community archive • Saved locally</p>
      </div>

      <!-- Tabs -->
      <div class="flex border-b border-zinc-100 dark:border-zinc-800 px-8">
        <button onclick="switchTab(0)" id="tab-0" class="tab-active flex-1 py-5 text-center">Search</button>
        <button onclick="switchTab(1)" id="tab-1" class="flex-1 py-5 text-center text-zinc-500 dark:text-zinc-400">Report New</button>
      </div>

      <div class="p-8">
        <!-- SEARCH TAB -->
        <div id="search-tab">
          <div class="relative mb-6">
            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400">
              <i class="fa-solid fa-magnifying-glass"></i>
            </span>
            <input type="text" id="search-input" placeholder="Search lost or found items..." 
                   class="w-full pl-12 pr-6 py-5 border border-zinc-200 dark:border-zinc-700 rounded-3xl focus:outline-none focus:border-pink-500 focus:ring-4 focus:ring-pink-100 dark:focus:ring-pink-900 text-lg"
                   oninput="handleSearchInput()">
            <div id="suggestions" class="hidden absolute z-50 w-full mt-2 bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-700 rounded-3xl shadow-2xl py-3 max-h-96 overflow-auto"></div>
          </div>

          <div class="grid grid-cols-3 gap-4 mb-8">
            <select id="type-filter" onchange="filterResults()" class="px-5 py-4 border border-zinc-200 dark:border-zinc-700 rounded-3xl focus:outline-none focus:border-pink-500">
              <option value="">All Types</option>
              <option value="lost">Lost</option>
              <option value="found">Found</option>
            </select>
            <input type="text" id="location-filter" placeholder="Location" oninput="filterResults()" 
                   class="px-5 py-4 border border-zinc-200 dark:border-zinc-700 rounded-3xl focus:outline-none focus:border-pink-500">
            <input type="date" id="date-filter" onchange="filterResults()" 
                   class="px-5 py-4 border border-zinc-200 dark:border-zinc-700 rounded-3xl focus:outline-none focus:border-pink-500">
          </div>

          <div class="space-y-4" id="results-container"></div>
        </div>

        <!-- REPORT TAB -->
        <div id="add-tab" class="hidden space-y-6">
          <div>
            <label class="block text-sm font-semibold text-zinc-700 dark:text-zinc-300 mb-2">Type</label>
            <div class="flex gap-3">
              <button onclick="setType('lost')" id="btn-lost" class="flex-1 py-5 rounded-3xl border-2 border-red-500 text-red-600 font-semibold active:scale-95 transition">Lost</button>
              <button onclick="setType('found')" id="btn-found" class="flex-1 py-5 rounded-3xl border-2 border-emerald-500 text-emerald-600 font-semibold active:scale-95 transition">Found</button>
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-zinc-700 dark:text-zinc-300 mb-2">Item Name <span class="text-red-500">*</span></label>
            <input type="text" id="item-name" placeholder="e.g. Black leather wallet" class="w-full px-6 py-5 border border-zinc-200 dark:border-zinc-700 rounded-3xl focus:outline-none focus:border-pink-500">
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-semibold text-zinc-700 dark:text-zinc-300 mb-2">Location <span class="text-red-500">*</span></label>
              <input type="text" id="item-location" placeholder="e.g. Oxford Street" class="w-full px-6 py-5 border border-zinc-200 dark:border-zinc-700 rounded-3xl focus:outline-none focus:border-pink-500">
            </div>
            <div>
              <label class="block text-sm font-semibold text-zinc-700 dark:text-zinc-300 mb-2">Image URL (optional)</label>
              <input type="text" id="item-image" placeholder="https://picsum.photos/id/237/800/600" class="w-full px-6 py-5 border border-zinc-200 dark:border-zinc-700 rounded-3xl focus:outline-none focus:border-pink-500">
            </div>
          </div>

          <div>
            <label class="block text-sm font-semibold text-zinc-700 dark:text-zinc-300 mb-2">Description</label>
            <textarea id="item-desc" rows="4" placeholder="Color, brand, special features..." class="w-full px-6 py-5 border border-zinc-200 dark:border-zinc-700 rounded-3xl focus:outline-none focus:border-pink-500 resize-none"></textarea>
          </div>

          <div>
            <label class="block text-sm font-semibold text-zinc-700 dark:text-zinc-300 mb-2">Contact Email <span class="text-red-500">*</span></label>
            <input type="email" id="item-contact" placeholder="your@email.com" class="w-full px-6 py-5 border border-zinc-200 dark:border-zinc-700 rounded-3xl focus:outline-none focus:border-pink-500">
          </div>

          <button onclick="addReport()" class="monzo-pink w-full py-6 rounded-3xl text-white font-semibold text-lg active:scale-95 transition-all shadow-lg">
            Submit Report
          </button>
        </div>
      </div>

      <div class="border-t border-zinc-100 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-900/50 px-8 py-6 text-center text-xs text-zinc-400 flex items-center justify-between">
        <span>🔒 Private • Saved in your browser only</span>
        <button onclick="toggleDarkMode()" class="hover:text-zinc-600 dark:hover:text-zinc-200 transition">
          <i class="fa-solid fa-moon text-lg"></i>
        </button>
      </div>
    </div>

    <!-- DETAIL PAGE -->
    <div id="detail-page" class="hidden">
      <div class="glass rounded-3xl shadow-2xl overflow-hidden border border-white/60 dark:border-zinc-700">
        <div class="h-2 monzo-pink"></div>
        <div class="p-8">
          <button onclick="backToMain()" class="flex items-center gap-2 text-zinc-500 hover:text-zinc-700 dark:text-zinc-400 mb-6">
            <i class="fa-solid fa-arrow-left"></i> Back
          </button>
          <div id="detail-content"></div>
        </div>
      </div>
    </div>

    <!-- NOT FOUND -->
    <div id="not-found-page" class="hidden">
      <div class="glass rounded-3xl shadow-2xl overflow-hidden border border-white/60 dark:border-zinc-700">
        <div class="h-2 monzo-pink"></div>
        <div class="p-12 text-center">
          <div class="text-7xl mb-6">😕</div>
          <h2 class="text-3xl font-semibold text-zinc-900 dark:text-white">Report Not Found</h2>
          <p class="text-zinc-600 dark:text-zinc-400 mt-4">This report may have been removed or the link is invalid.</p>
          <button onclick="backToMain()" class="mt-10 monzo-pink w-full py-5 rounded-3xl text-white font-semibold text-lg">
            Return Home
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let itemsDB = [];

    function loadData() {
      const saved = localStorage.getItem('lostFoundReports');
      if (saved) {
        itemsDB = JSON.parse(saved);
      } else {
        itemsDB = [
          { id: 1, type: "lost", item: "Black leather wallet", location: "Oxford Street", date: "2025-06-10", description: "Contains cards and ID. Monzo card visible.", contact: "lost@ex.com", image: "https://picsum.photos/id/201/800/600" },
          { id: 2, type: "found", item: "iPhone 14 Pro", location: "King's Cross Station", date: "2025-06-11", description: "Blue case, locked. Found near platform 4.", contact: "found@ex.com", image: "https://picsum.photos/id/180/800/600" },
          { id: 3, type: "lost", item: "Car keys with keychain", location: "Westfield Mall", date: "2025-06-09", description: "Toyota fob with red keychain", contact: "lost@ex.com" }
        ];
        saveData();
      }
    }

    function saveData() {
      localStorage.setItem('lostFoundReports', JSON.stringify(itemsDB));
    }

    function switchTab(tab) {
      document.getElementById('search-tab').classList.toggle('hidden', tab === 1);
      document.getElementById('add-tab').classList.toggle('hidden', tab === 0);
      document.getElementById('tab-0').classList.toggle('tab-active', tab === 0);
      document.getElementById('tab-1').classList.toggle('tab-active', tab === 1);
    }

    function setType(type) {
      const lost = document.getElementById('btn-lost');
      const found = document.getElementById('btn-found');
      if (type === 'lost') {
        lost.classList.add('border-red-500', 'text-red-600');
        found.classList.remove('border-emerald-500', 'text-emerald-600');
      } else {
        found.classList.add('border-emerald-500', 'text-emerald-600');
        lost.classList.remove('border-red-500', 'text-red-600');
      }
    }

    function addReport() {
      const item = document.getElementById('item-name').value.trim();
      const location = document.getElementById('item-location').value.trim();
      const contact = document.getElementById('item-contact').value.trim();

      if (!item || !location || !contact) {
        alert("Please fill all required fields.");
        return;
      }

      const newReport = {
        id: Date.now(),
        type: document.getElementById('btn-lost').classList.contains('border-red-500') ? 'lost' : 'found',
        item: item,
        location: location,
        date: new Date().toISOString().split('T')[0],
        description: document.getElementById('item-desc').value.trim() || "No description provided.",
        contact: contact,
        image: document.getElementById('item-image').value.trim() || null
      };

      itemsDB.unshift(newReport);
      saveData();
      alert("✅ Report submitted successfully!");
      clearForm();
      switchTab(0);
      showDetail(newReport.id);
    }

    function clearForm() {
      document.getElementById('item-name').value = '';
      document.getElementById('item-location').value = '';
      document.getElementById('item-desc').value = '';
      document.getElementById('item-contact').value = '';
      document.getElementById('item-image').value = '';
    }

    function renderResults(filtered) {
      const container = document.getElementById('results-container');
      container.innerHTML = '';

      if (filtered.length === 0) {
        container.innerHTML = `<div class="text-center py-20 text-zinc-500"><span class="text-6xl mb-4 block">😕</span><p>No matching reports found</p></div>`;
        return;
      }

      filtered.forEach(item => {
        const card = document.createElement('div');
        card.className = `card bg-white dark:bg-zinc-900 border border-zinc-100 dark:border-zinc-700 rounded-3xl p-6 cursor-pointer`;
        card.innerHTML = `
          <div class="flex justify-between items-start">
            <div>
              <span class="inline-block px-4 py-1 text-xs font-bold rounded-full ${item.type === 'lost' ? 'bg-red-100 text-red-600' : 'bg-emerald-100 text-emerald-600'}">${item.type.toUpperCase()}</span>
              <h3 class="text-2xl font-semibold mt-3">${item.item}</h3>
              <p class="text-zinc-600 dark:text-zinc-400 mt-1 line-clamp-2">${item.description}</p>
            </div>
            ${item.image ? `<img src="${item.image}" class="w-20 h-20 object-cover rounded-2xl ml-4" alt="">` : ''}
          </div>
          <div class="mt-6 pt-5 border-t flex justify-between items-center">
            <div>
              <p class="font-medium">${item.location}</p>
              <p class="text-xs text-zinc-500">${item.date}</p>
            </div>
            <div class="flex gap-3">
              <button onclick="event.stopImmediatePropagation(); shareReport(${item.id});" class="px-5 py-2.5 text-sm font-medium border rounded-2xl hover:bg-zinc-50">Share</button>
              <button onclick="event.stopImmediatePropagation(); deleteReport(${item.id});" class="px-5 py-2.5 text-sm font-medium border border-red-200 text-red-600 rounded-2xl hover:bg-red-50">Delete</button>
            </div>
          </div>
        `;
        card.onclick = () => showDetail(item.id);
        container.appendChild(card);
      });
    }

    function filterResults() {
      const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
      const typeFilter = document.getElementById('type-filter').value;
      const locationFilter = document.getElementById('location-filter').value.toLowerCase().trim();
      const dateFilter = document.getElementById('date-filter').value;

      const filtered = itemsDB.filter(item => {
        const matchesSearch = !searchTerm || 
          item.item.toLowerCase().includes(searchTerm) || 
          item.description.toLowerCase().includes(searchTerm);
        const matchesType = !typeFilter || item.type === typeFilter;
        const matchesLocation = !locationFilter || item.location.toLowerCase().includes(locationFilter);
        const matchesDate = !dateFilter || item.date === dateFilter;
        return matchesSearch && matchesType && matchesLocation && matchesDate;
      });

      renderResults(filtered);
    }

    function handleSearchInput() {
      const query = document.getElementById('search-input').value.toLowerCase().trim();
      const box = document.getElementById('suggestions');

      if (query.length < 2) {
        box.classList.add('hidden');
        return;
      }

      const matches = itemsDB.filter(item => item.item.toLowerCase().includes(query)).slice(0, 6);
      if (matches.length === 0) {
        box.classList.add('hidden');
        return;
      }

      box.innerHTML = matches.map(item => `
        <div class="px-6 py-4 hover:bg-zinc-50 dark:hover:bg-zinc-800 flex gap-4 cursor-pointer" onclick="selectSuggestion(${item.id})">
          <span class="px-3 py-1 text-xs font-bold rounded-full ${item.type === 'lost' ? 'bg-red-100 text-red-600' : 'bg-emerald-100 text-emerald-600'}">${item.type.toUpperCase()}</span>
          <div>
            <div class="font-medium">${item.item}</div>
            <div class="text-xs text-zinc-500">${item.location} • ${item.date}</div>
          </div>
        </div>
      `).join('');
      box.classList.remove('hidden');
    }

    function selectSuggestion(id) {
      document.getElementById('suggestions').classList.add('hidden');
      showDetail(id);
      document.getElementById('search-input').value = '';
    }

    function showDetail(id) {
      const report = itemsDB.find(r => r.id === id);
      if (!report) return showNotFound();

      document.getElementById('main-app').classList.add('hidden');
      document.getElementById('detail-page').classList.remove('hidden');

      document.getElementById('detail-content').innerHTML = `
        ${report.image ? `<img src="${report.image}" class="w-full h-64 object-cover rounded-3xl mb-8" alt="">` : ''}
        <span class="inline-block px-5 py-2 text-sm font-bold rounded-full ${report.type === 'lost' ? 'bg-red-100 text-red-600' : 'bg-emerald-100 text-emerald-600'}">${report.type.toUpperCase()}</span>
        <h1 class="text-4xl font-bold mt-4">${report.item}</h1>
        <p class="text-xl text-zinc-600 dark:text-zinc-400 mt-1">${report.location} • ${report.date}</p>

        <div class="mt-8 bg-zinc-50 dark:bg-zinc-900 rounded-3xl p-7">
          <p class="leading-relaxed text-zinc-700 dark:text-zinc-300">${report.description}</p>
        </div>

        <div class="mt-8 p-7 border border-zinc-100 dark:border-zinc-700 rounded-3xl">
          <p class="text-sm text-zinc-500 mb-3">Contact</p>
          <a href="mailto:${report.contact}" class="text-2xl font-semibold text-pink-600 hover:text-pink-700">${report.contact}</a>
        </div>

        <div class="mt-10 flex gap-4">
          <button onclick="shareReport(${report.id})" class="flex-1 py-6 border rounded-3xl font-semibold hover:bg-zinc-50">Share Link</button>
          <button onclick="backToMain()" class="flex-1 py-6 border rounded-3xl font-semibold hover:bg-zinc-50">Close</button>
        </div>
      `;
    }

    function showNotFound() {
      document.getElementById('main-app').classList.add('hidden');
      document.getElementById('detail-page').classList.add('hidden');
      document.getElementById('not-found-page').classList.remove('hidden');
    }

    function backToMain() {
      document.getElementById('detail-page').classList.add('hidden');
      document.getElementById('not-found-page').classList.add('hidden');
      document.getElementById('main-app').classList.remove('hidden');
      filterResults();
    }

    function shareReport(id) {
      const url = `${window.location.origin}${window.location.pathname}?report=${id}`;
      navigator.clipboard.writeText(url).then(() => {
        alert(`✅ Link copied!\n\n${url}`);
      });
    }

    function deleteReport(id) {
      if (confirm("Delete this report permanently?")) {
        itemsDB = itemsDB.filter(i => i.id !== id);
        saveData();
        backToMain();
      }
    }

    function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
    }

    function handleSharedLink() {
      const params = new URLSearchParams(window.location.search);
      const reportId = params.get('report');
      if (reportId) {
        const id = parseInt(reportId);
        const report = itemsDB.find(r => r.id === id);
        if (report) showDetail(id);
        else showNotFound();
      }
    }

    window.onload = () => {
      loadData();
      switchTab(0);
      setType('lost');
      filterResults();
      handleSharedLink();
      console.log('%cRoot Lost & Found — Clockwork Masterpiece Ready ⚙️', 'color:#FF4E6C; font-size:14px; font-weight:600');
    };
  </script>
</body>
</html>
