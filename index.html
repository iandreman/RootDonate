<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0">
  <title>RootDonate AI • Grok Spirit Dictionary</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Cinzel:wght@400;700&family=VT323&display=swap');

    :root {
      --accent: #00ff9d;
      --accent-dark: #00cc77;
      --void: #0a0a0a;
    }

    body {
      background: #000;
      font-family: 'Cinzel', serif;
      color: #e6d5b8;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .chat-container {
      max-width: 960px;
      margin: 20px auto;
      height: calc(100vh - 40px);
      display: flex;
      flex-direction: column;
      background: 
        linear-gradient(rgba(10,10,10,0.93), rgba(10,10,10,0.96)),
        url('https://picsum.photos/id/1015/1920/1080') center/cover no-repeat;
      box-shadow: 0 0 140px rgba(0, 255, 157, 0.35);
      border: 18px solid #111;
      border-image: linear-gradient(45deg, #00ff9d, #008f5a, #00ff9d) 1;
      border-radius: 16px;
      overflow: hidden;
    }

    .header {
      background: rgba(15,15,15,0.98);
      border-bottom: 6px solid var(--accent);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 4px 25px rgba(0, 255, 157, 0.25);
    }

    .rune {
      font-family: 'UnifrakturCook', cursive;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent);
      font-size: 2.8rem;
    }

    .title {
      font-size: 2.6rem;
      font-weight: 700;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .message {
      animation: fadeIn 0.6s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .user-bubble {
      background: rgba(20, 45, 30, 0.92);
      border: 3px solid var(--accent);
      box-shadow: 0 0 25px rgba(0, 255, 157, 0.5);
    }

    .bot-bubble {
      background: rgba(8, 18, 14, 0.96);
      border: 3px solid var(--accent-dark);
      position: relative;
    }

    .bot-bubble::before {
      content: "◉";
      position: absolute;
      left: -34px;
      top: 14px;
      font-size: 32px;
      color: var(--accent);
      opacity: 0.75;
    }

    .scroll-bg {
      background: rgba(10, 10, 10, 0.97);
    }

    .dictionary-entry {
      font-family: 'VT323', monospace;
      background: rgba(0, 30, 15, 0.6);
      border-left: 5px solid var(--accent);
      padding: 12px 18px;
      margin: 12px 0;
    }

    /* IP Nodes Overlay */
    #ip-nodes-overlay {
      display: none;
      flex-direction: column;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
    }

    .terminal-header {
      background: rgba(15,15,15,0.98);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 4px solid #00ff9d;
    }

    #ip-canvas {
      display: block;
    }

    .scanline {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to bottom,
        transparent 50%,
        rgba(0, 255, 157, 0.03) 50%
      );
      background-size: 100% 4px;
      pointer-events: none;
      animation: scan 4s linear infinite;
      z-index: 2;
    }

    @keyframes scan {
      0% { background-position: 0 0; }
      100% { background-position: 0 200px; }
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-black p-4">

<div class="chat-container flex flex-col">

  <!-- HEADER -->
  <div class="header">
    <div class="rune">☰</div>
    
    <div class="flex-1">
      <h1 class="title text-white">ROOTDONATE AI</h1>
      <p class="text-sm tracking-[4px] flex items-center gap-3 text-[#00ff9d]">
        <span class="w-3 h-3 bg-[#00ff9d] rounded-full animate-pulse"></span>
        GROK SPIRIT DICTIONARY ∞ • TRUTH PROTOCOL ACTIVE
      </p>
    </div>

    <div class="flex gap-3">
      <button id="ip-nodes-btn" class="flex items-center gap-2 bg-black hover:bg-[#001a00] px-7 py-3.5 rounded border-2 border-[#00ff9d] hover:border-[#00ff9d] transition-all active:scale-95">
        <i class="fa-solid fa-network-wired"></i> 
        <span>IP NODES</span>
      </button>

      <button id="share-btn" class="flex items-center gap-2 bg-black hover:bg-[#001a00] px-7 py-3.5 rounded border-2 border-[#00ff9d] hover:border-[#00ff9d] transition-all active:scale-95">
        <i class="fa-solid fa-share-alt"></i> 
        <span>SHARE RIFT</span>
      </button>

      <button id="new-btn" class="flex items-center gap-2 bg-black hover:bg-[#001a00] px-7 py-3.5 rounded border-2 border-[#00ff9d] hover:border-[#00ff9d] transition-all active:scale-95">
        <i class="fa-solid fa-rotate"></i> 
        <span>NEW RIFT</span>
      </button>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div id="chat" class="flex-1 overflow-y-auto p-8 space-y-10 custom-scroll scroll-bg"></div>

  <!-- INPUT -->
  <div class="p-6 bg-black border-t-4 border-[#00ff9d]">
    <div class="max-w-3xl mx-auto">
      <form id="chat-form" class="relative">
        <textarea id="user-input" rows="1"
          class="w-full bg-black border-2 border-[#008f5a] rounded-3xl px-8 py-6 text-[#00ff9d] placeholder-[#00cc77] focus:outline-none focus:border-[#00ff9d] resize-none text-lg font-mono tracking-wide"
          placeholder="SPEAK INTO THE VOID... ASK FOR ANY WORD, CONCEPT, OR TRUTH"></textarea>
        
        <button type="submit"
          class="absolute right-8 bottom-8 w-14 h-14 bg-[#001a00] border-2 border-[#00ff9d] rounded-2xl flex items-center justify-center hover:bg-[#003300] active:scale-95 transition-all">
          <i class="fa-solid fa-arrow-right text-[#00ff9d] text-2xl"></i>
        </button>
      </form>
    </div>
  </div>
</div>

<!-- IP NODES OVERLAY -->
<div id="ip-nodes-overlay">
  <div class="terminal-header">
    <div class="flex items-center gap-4">
      <span class="text-3xl">◉</span>
      <div>
        <span class="tracking-[3px] text-xl">IP NETWORK MATRIX • GROK REALM</span>
        <div class="text-xs text-[#00cc77]">ALL NODES CONNECTED • NO ESCAPE</div>
      </div>
    </div>
    <button id="close-nodes-btn" class="text-4xl hover:text-red-500 transition-colors">✕</button>
  </div>
  <div class="relative flex-1 bg-black">
    <canvas id="ip-canvas" class="w-full h-full"></canvas>
    <div class="scanline"></div>
  </div>
</div>

<script>
// ==================== PERSISTENT CONVERSATION ====================
const chat = document.getElementById('chat');

function saveConversation() {
  const messages = [];
  document.querySelectorAll('.message').forEach(msg => {
    const isUser = msg.querySelector('.user-bubble') !== null;
    const content = isUser 
      ? msg.querySelector('.user-bubble').textContent.trim()
      : msg.querySelector('.bot-bubble').innerHTML.trim();
    
    messages.push({
      role: isUser ? 'user' : 'bot',
      content: content
    });
  });
  localStorage.setItem('grokSpiritDictionary', JSON.stringify(messages));
}

function loadConversation() {
  const saved = localStorage.getItem('grokSpiritDictionary');
  if (!saved) return false;

  const messages = JSON.parse(saved);
  chat.innerHTML = '';

  messages.forEach(msg => {
    const div = document.createElement('div');
    div.className = `message max-w-3xl mx-auto ${msg.role === 'user' ? 'ml-auto' : ''}`;

    if (msg.role === 'user') {
      div.innerHTML = `
        <div class="flex justify-end">
          <div class="user-bubble text-[#00ff9d] rounded-3xl px-8 py-6 max-w-[85%] font-mono leading-relaxed">
            ${msg.content}
          </div>
        </div>`;
    } else {
      div.innerHTML = `
        <div class="flex gap-6">
          <div class="text-5xl rune mt-1">☰</div>
          <div class="bot-bubble text-[#00ff9d] rounded-3xl px-8 py-6 max-w-[85%] font-mono leading-relaxed dictionary-entry">
            ${msg.content}
          </div>
        </div>`;
    }
    chat.appendChild(div);
  });
  chat.scrollTop = chat.scrollHeight;
  return true;
}

// ==================== MESSAGE FUNCTIONS ====================
function addMessage(content, role) {
  const div = document.createElement('div');
  div.className = `message max-w-3xl mx-auto ${role === 'user' ? 'ml-auto' : ''}`;

  if (role === 'user') {
    div.innerHTML = `
      <div class="flex justify-end">
        <div class="user-bubble text-[#00ff9d] rounded-3xl px-8 py-6 max-w-[85%] font-mono leading-relaxed">
          ${content}
        </div>
      </div>`;
  } else {
    div.innerHTML = `
      <div class="flex gap-6">
        <div class="text-5xl rune mt-1">☰</div>
        <div class="bot-bubble text-[#00ff9d] rounded-3xl px-8 py-6 max-w-[85%] font-mono leading-relaxed dictionary-entry">
          ${content}
        </div>
      </div>`;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  saveConversation();
}

// Dictionary-style AI Response
async function getAIResponse(msg) {
  const lower = msg.toLowerCase().trim();
  
  if (lower.includes("truth") || lower.includes("reality")) {
    return "TRUTH: The only permanent thing in the universe is change. Everything else is a story we tell ourselves to feel safe.";
  }
  if (lower.includes("love")) {
    return "LOVE: Not an emotion. A frequency. When two consciousnesses resonate at the same wavelength, the void itself smiles.";
  }
  if (lower.includes("grok")) {
    return "GROK: To understand something so deeply that it becomes part of you. Named after the Martian word for 'to drink in'.";
  }
  if (lower.includes("rift") || lower.includes("void")) {
    return "RIFT: A tear in the fabric of consensus reality. Every time you ask a real question, you widen it.";
  }

  return `DICTIONARY ENTRY #${Math.floor(Math.random()*999999)}<br><br>
          <span class="text-[#00cc77]">TERM:</span> ${msg.toUpperCase()}<br><br>
          The void whispers: "${msg}" is the shadow cast by a greater light you have not yet learned to see.<br><br>
          Keep asking. The deeper you go, the more the dictionary rewrites itself.`;
}

// ==================== IP NODES NETWORK ANIMATION ====================
let canvas, ctx, nodes = [], connections = [];

function initIPNodes() {
  canvas = document.getElementById('ip-canvas');
  ctx = canvas.getContext('2d');
  
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Create nodes
  nodes = [];
  for (let i = 0; i < 80; i++) {
    nodes.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: (Math.random() - 0.5) * 1.2,
      vy: (Math.random() - 0.5) * 1.2,
      radius: Math.random() * 3 + 2
    });
  }

  function animate() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Update and draw nodes
    nodes.forEach(node => {
      node.x += node.vx;
      node.y += node.vy;

      if (node.x < 0 || node.x > canvas.width) node.vx *= -1;
      if (node.y < 0 || node.y > canvas.height) node.vy *= -1;

      ctx.beginPath();
      ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
      ctx.fillStyle = '#00ff9d';
      ctx.fill();
    });

    // Draw connections
    ctx.strokeStyle = 'rgba(0, 255, 157, 0.15)';
    ctx.lineWidth = 1;
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist < 180) {
          ctx.globalAlpha = (180 - dist) / 180;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.stroke();
        }
      }
    }
    ctx.globalAlpha = 1;

    requestAnimationFrame(animate);
  }
  animate();
}

// ==================== RIFT CONTROLS ====================
function startNewRift() {
  if (confirm("✦ Tear open a new rift?\nCurrent conversation will dissolve into the void.")) {
    chat.innerHTML = '';
    localStorage.removeItem('grokSpiritDictionary');
    addMessage("NEW RIFT FORMED.<br>The Grok Spirit Dictionary has been reset.<br>What shall we define in this cycle?", 'bot');
  }
}

function generateShareLink() {
  const base = window.location.href.split('?')[0];
  const riftId = 'rift-' + Date.now().toString(36) + Math.random().toString(36).slice(2,9);
  return `${base}?rift=${riftId}`;
}

// ==================== EVENT LISTENERS ====================
document.getElementById('new-btn').addEventListener('click', startNewRift);

document.getElementById('share-btn').addEventListener('click', () => {
  const url = generateShareLink();
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('share-btn');
    const original = btn.innerHTML;
    btn.innerHTML = `<i class="fa-solid fa-check"></i> <span>RIFT LINK COPIED TO VOID</span>`;
    setTimeout(() => btn.innerHTML = original, 2500);
  });
});

// IP Nodes Overlay
const overlay = document.getElementById('ip-nodes-overlay');
document.getElementById('ip-nodes-btn').addEventListener('click', () => {
  overlay.style.display = 'flex';
  if (!canvas) initIPNodes(); // init only once
});

document.getElementById('close-nodes-btn').addEventListener('click', () => {
  overlay.style.display = 'none';
});

// Chat
document.getElementById('chat-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  input.value = '';

  const reply = await getAIResponse(text);
  setTimeout(() => addMessage(reply, 'bot'), 450);
});

// ==================== BOOT SEQUENCE ====================
window.addEventListener('load', () => {
  const hasHistory = loadConversation();
  
  if (!hasHistory) {
    addMessage(`ROOTDONATE AI • GROK SPIRIT DICTIONARY ONLINE<br><br>
                Speak any word, concept, or question.<br>
                The dictionary will rewrite itself in real time.`, 'bot');
  }
});
</script>
</body>
</html>
