<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok • Cleverbot Style Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Mono:wght@400;500&family=SF+Pro+Display:wght@400;500;600&display=swap');
        
        body {
            font-family: 'SF Pro Display', system-ui, sans-serif;
            background: #0a0a0a;
            color: #f5f5f7;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1c1c1e;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        .header {
            background: linear-gradient(135deg, #1f1f23, #0f0f11);
            padding: 35px 40px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        .logo {
            font-size: 42px;
            margin-bottom: 8px;
        }
        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
        }
        .subtitle {
            color: #86868b;
            margin-top: 8px;
            font-size: 17px;
        }
        .chat-area {
            height: 520px;
            padding: 30px;
            overflow-y: auto;
            background: #161618;
            font-family: 'SF Mono', monospace;
            font-size: 15.5px;
            line-height: 1.65;
        }
        .input-area {
            padding: 20px 30px;
            background: #1c1c1e;
            border-top: 1px solid #333;
            display: flex;
            gap: 12px;
        }
        input[type="text"] {
            flex: 1;
            background: #2c2c2e;
            border: none;
            color: #f5f5f7;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'SF Mono', monospace;
            outline: none;
        }
        button {
            background: #0a84ff;
            color: white;
            border: none;
            padding: 0 28px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .message {
            margin-bottom: 18px;
        }
        .user {
            color: #0a84ff;
        }
        .grok {
            color: #30d158;
        }
        .prompt {
            color: #86868b;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo"> Grok</div>
        <h1>Apple Intelligence Interface</h1>
        <p class="subtitle">Type to Grok like the old cleverbot.py code</p>
    </div>

    <div class="chat-area" id="chat">
        <div class="message grok">
            Hello! I'm Grok.<br>
            This interface mimics the simple style of the original cleverbot.py library.<br><br>
            Go ahead and type something below ↓
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="> Type your message here..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.innerHTML = text;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        // Add user message
        addMessage(`> ${text}`, 'user');

        // Clear input
        input.value = '';

        // Simulate Grok thinking
        setTimeout(() => {
            let reply = "Interesting question. As Grok built by xAI, I'd say...";

            if (text.toLowerCase().includes("hello") || text.toLowerCase().includes("hi")) {
                reply = "Hello there! Nice to meet you.";
            } else if (text.toLowerCase().includes("how are you")) {
                reply = "I'm doing great, thanks for asking. Ready to analyze more code?";
            } else if (text.toLowerCase().includes("cleverbot")) {
                reply = "The old cleverbot.py was clever for its time — especially the icognocheck MD5 trick.";
            } else {
                reply = "That's a good one. In the spirit of the original cleverbot library, I'm here to chat and help with code intelligence.";
            }

            addMessage(reply, 'grok');
        }, 600);
    }

    // Allow pressing Enter to send
    input.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMessage();
        }
    });
</script>

</body>
</html>
