<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok Dictionary • Truth-Seeking</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Mono:wght@400;500&family=SF+Pro+Display:wght@400;500;600&display=swap');

        :root {
            --bg-body: #0a0a0a;
            --bg-container: #1c1c1e;
            --bg-chat: #161618;
            --accent: #0a84ff;
            --grok-green: #30d158;
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'SF Pro Display', system-ui, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            padding: 40px 20px;
            line-height: 1.75;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
            background: var(--bg-container);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 40px 120px rgba(0, 0, 0, 0.95);
        }

        .header {
            background: linear-gradient(135deg, #1f1f23, #0f0f11);
            padding: 60px 40px 36px;
            text-align: center;
        }

        .logo { font-size: 82px; margin-bottom: 12px; }
        h1 { font-size: 42px; font-weight: 600; letter-spacing: -1.4px; }
        .subtitle { color: var(--text-secondary); font-size: 19px; margin-top: 10px; }

        .chat-area {
            min-height: 680px;
            padding: 48px;
            background: var(--bg-chat);
            font-family: 'SF Mono', monospace;
            font-size: 16.5px;
            line-height: 1.82;
            overflow-y: auto;
        }

        .message { margin-bottom: 52px; }
        .message-header {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }
        .user { color: var(--accent); }
        .grok { color: var(--grok-green); }

        .quoted {
            border-left: 4px solid var(--grok-green);
            padding-left: 20px;
            margin: 16px 0 20px 0;
            color: #a0a0a8;
            font-style: italic;
        }

        .definition {
            background: rgba(48, 209, 88, 0.07);
            border-left: 5px solid var(--grok-green);
            padding: 26px 30px;
            border-radius: 16px;
            margin: 12px 0;
        }

        .word {
            font-size: 29px;
            font-weight: 600;
            color: var(--grok-green);
            margin-bottom: 12px;
        }

        .action-links {
            margin-top: 24px;
            display: flex;
            gap: 28px;
            font-size: 15px;
        }
        .action-link {
            color: var(--accent);
            cursor: pointer;
        }
        .action-link:hover { text-decoration: underline; }

        .reply-btn {
            margin-top: 20px;
            background: rgba(48, 209, 88, 0.12);
            color: var(--grok-green);
            border: 1px solid rgba(48, 209, 88, 0.6);
            padding: 14px 34px;
            border-radius: 14px;
            font-size: 15.5px;
            cursor: pointer;
        }

        .input-area {
            padding: 32px 48px;
            background: var(--bg-container);
            border-top: 1px solid #333;
            display: flex;
            gap: 14px;
        }

        input[type="text"] {
            flex: 1;
            background: #2c2c2e;
            border: none;
            color: white;
            padding: 18px 26px;
            border-radius: 18px;
            font-size: 17px;
            font-family: 'SF Mono', monospace;
            outline: none;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0 48px;
            border-radius: 18px;
            font-weight: 600;
            cursor: pointer;
        }

        .notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--grok-green);
            color: #000;
            padding: 14px 36px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
            opacity: 0;
            transition: all 0.4s;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">📖</div>
        <h1>Grok Dictionary</h1>
        <p class="subtitle">Dynamic • Intelligent • Truth-Seeking</p>
    </div>

    <div class="chat-area" id="chat"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask about any word, phrase, or concept..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
// === Main Script ===
const chat = document.getElementById('chat');
const input = document.getElementById('userInput');
let conversationHistory = [];

function addMessage(text, type, quotedText = null, isRestoring = false) {
    const div = document.createElement('div');
    div.className = `message ${type}`;

    let html = `<div class="message-header">${type === 'grok' ? 'Grok' : 'You'}</div>`;

    if (quotedText) html += `<div class="quoted">“${quotedText}”</div>`;

    html += `<div>${text}</div>`;

    if (type === 'grok') {
        const replyId = 'grok-' + Date.now();
        div.id = replyId;

        html += `
            <div class="action-links">
                <span class="action-link" onclick="copyShareLink('${replyId}')">🔗 Share via URL</span>
            </div>
            <button class="reply-btn" onclick="replyToThis('${replyId}')">↩️ Reply to this</button>
        `;

        if (!isRestoring) conversationHistory.push({ type: 'grok', text: text, id: replyId });
    } else if (!isRestoring) {
        conversationHistory.push({ type: 'user', text: text });
    }

    div.innerHTML = html;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// Real dictionary + Grok-style intelligence
async function getGrokReply(input) {
    const query = input.toLowerCase().trim();
    const original = input.trim();

    // 1. Try Free Dictionary API
    try {
        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(query)}`);
        if (res.ok) {
            const data = await res.json();
            const entry = data[0];

            let phonetic = entry.phonetic ? `/${entry.phonetic}/` : '';
            let meaningHTML = entry.meanings.map(m => `
                <strong>${m.partOfSpeech}</strong><br>
                ${m.definitions[0].definition}
                ${m.definitions[0].example ? `<br><em>"${m.definitions[0].example}"</em>` : ''}
            `).join('<br><br>');

            return `<div class="definition">
                        <div class="word">${original}</div>
                        <p style="color:#999; margin-bottom:12px;">${phonetic}</p>
                        ${meaningHTML}
                    </div>`;
        }
    } catch (e) {}

    // 2. Grok-style smart fallback
    if (/^(hi|hello|hey|sup|yo)/.test(query)) {
        return "Hello! I'm your intelligent dictionary companion.<br><br>Ask me about any word, concept, or philosophical idea.";
    }

    return `<div class="definition">
                <div class="word">${original}</div>
                <p>I don't have a pre-written entry for this, but I can reason with you about it.</p>
                <p>What aspect interests you most — etymology, philosophical implications, modern usage, or related concepts?</p>
            </div>`;
}

async function sendMessage() {
    let text = input.value.trim();
    if (!text) return;

    let quotedText = null;
    if (text.startsWith('>')) {
        const lines = text.split('\n');
        quotedText = lines[0].substring(1).trim();
        text = lines.slice(1).join('\n').trim() || quotedText;
    }

    addMessage(text, 'user', null);
    input.value = '';

    setTimeout(async () => {
        const reply = await getGrokReply(text || quotedText || "");
        addMessage(reply, 'grok', quotedText);
    }, 600);
}

// URL Sharing Functions
function generateShareLink(replyId) {
    const data = { history: conversationHistory, highlight: replyId };
    const encoded = btoa(encodeURIComponent(JSON.stringify(data)));
    return `${window.location.origin}${window.location.pathname}#${encoded}`;
}

function copyShareLink(replyId) {
    const url = generateShareLink(replyId);
    navigator.clipboard.writeText(url).then(() => {
        showNotification("✅ Shareable URL copied!");
    });
}

function replyToThis(replyId) {
    const grokMsg = conversationHistory.find(m => m.id === replyId);
    if (!grokMsg) return;
    const quoted = grokMsg.text.replace(/<[^>]*>/g, '').substring(0, 140) + "...";
    input.value = `> ${quoted}\n\n`;
    input.focus();
}

function showNotification(msg) {
    const notif = document.createElement('div');
    notif.className = 'notification';
    notif.textContent = msg;
    document.body.appendChild(notif);
    setTimeout(() => notif.style.opacity = '1', 50);
    setTimeout(() => notif.remove(), 3200);
}

// Deep link support
function handleDeepLink() {
    const hash = window.location.hash.substring(1);
    if (!hash) return;

    try {
        const decoded = decodeURIComponent(atob(hash));
        const data = JSON.parse(decoded);

        if (data.history) {
            conversationHistory = data.history;
            chat.innerHTML = '';

            conversationHistory.forEach(msg => {
                if (msg.type === 'user') {
                    addMessage(msg.text, 'user', null, true);
                } else {
                    addMessage(msg.text, 'grok', null, true);
                }
            });

            if (data.highlight) {
                setTimeout(() => {
                    const el = document.getElementById(data.highlight);
                    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
                }, 600);
            }
        }
    } catch (e) {
        console.warn("Invalid deep link");
    }
}

// Event listeners
input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") sendMessage();
});

window.onload = () => {
    if (!window.location.hash) {
        addMessage("Welcome to <strong>Grok Dictionary</strong>.<br><br>Ask me anything — words, concepts, philosophy, science, or abstract ideas. I'll try to give you clear, thoughtful answers.", 'grok');
    }
    handleDeepLink();
    window.addEventListener('hashchange', handleDeepLink);
};
</script>
</body>
</html>
