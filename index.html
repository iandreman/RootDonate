<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Cleverbot Chat</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);

            flex-direction: column;
        }
        .container {
            max-width: 800px;

            background: rgba(255,255,255,0.1);

            flex: 1;
            display: flex;
            flex-direction: column;
        }
        header {
            background: rgba(0,0,0,0.3);
            padding: 15px 20px;
            text-align: center;
            font-size: 24px;

        }
        .chat {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {

            padding: 12px 18px;
            border-radius: 18px;

        }
        .user {
            align-self: flex-end;

            border-bottom-right-radius: 4px;

        .bot {

            background: #2c3e50;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            padding: 15px;
            background: rgba(0,0,0,0.3);
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            background: rgba(255,255,255,0.9);
            color: #333;
        }
        button {
            padding: 0 28px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #357abd;
        }
        .status {
            text-align: center;
            padding: 8px;
            font-size: 14px;
            color: #aaa;
        }
        .thinking {
            font-style: italic;
            color: #bbb;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>💬 Cleverbot Chat (Standalone)</header>
        
        <div id="chat" class="chat"></div>
        
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message here..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>
        </div>
        
        <div class="status" id="status">Ready • No server connection needed</div>
    </div>

    <script>
        // This is a pure HTML/JS version that works entirely in the browser
        // No CORS issues, no external connections, no Python backend required

        let conversationHistory = [];
        let isThinking = false;

        const chatDiv = document.getElementById('chat');
        const inputField = document.getElementById('userInput');

        // Simple local "Cleverbot-like" response system (rule-based + randomness)
        function getBotResponse(userMessage) {
            const msg = userMessage.toLowerCase().trim();
            
            // Very basic intelligent responses
            if (msg === "hello" || msg === "hi" || msg === "hey") {
                return "Hello there! How are you today?";
            }
            if (msg.includes("how are you")) {
                return "I'm doing great, thanks for asking! How about you?";
            }
            if (msg.includes("your name") || msg.includes("who are you")) {
                return "I'm Cleverbot! Well... a browser version of it :)";
            }
            if (msg.includes("bye") || msg.includes("goodbye")) {
                return "Goodbye! Come back anytime!";
            }
            if (msg.includes("joke")) {
                const jokes = [
                    "Why don't programmers prefer dark mode? Because light attracts bugs!",
                    "Why did the scarecrow win an award? Because he was outstanding in his field!",
                    "Parallel lines have so much in common... It's a shame they'll never meet."
                ];
                return jokes[Math.floor(Math.random() * jokes.length)];
            }
            if (msg.includes("weather")) {
                return "I'm just a chatbot in your browser — I don't have real-time weather. But I hope it's sunny where you are!";
            }

            // Echo with twist
            const responses = [
                `Interesting point about "${userMessage}". Tell me more!`,
                `Hmm... ${userMessage}. What made you say that?`,
                `That's a cool thought! My take: I agree, but maybe there's more to it.`,
                `You said "${userMessage}". Reminds me of something... but I forgot! 😂`,
                `Wow, "${userMessage}" — you're keeping me on my toes!`,
            ];

            return responses[Math.floor(Math.random() * responses.length)];
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.textContent = text;
            chatDiv.appendChild(messageDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        async function sendMessage() {
            const userText = inputField.value.trim();
            if (!userText || isThinking) return;

            // Add user message
            addMessage(userText, 'user');
            conversationHistory.push({ role: "user", content: userText });
            
            inputField.value = '';
            isThinking = true;

            // Show thinking indicator
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message bot thinking';
            thinkingDiv.textContent = 'Cleverbot is thinking...';
            chatDiv.appendChild(thinkingDiv);
            chatDiv.scrollTop = chatDiv.scrollHeight;

            // Simulate network delay for realism
            await new Promise(resolve => setTimeout(resolve, 800 + Math.random() * 700));

            // Remove thinking indicator
            chatDiv.removeChild(thinkingDiv);

                self.arglist[self.keylist.index('icognocheck')]=hash

                req=urllib2.Request("http://www.cleverbot.com/webservicemin",data,self.headers)
                f=urllib2.urlopen(req)
                reply=f.read()

        def Ask(self,q):
                self.arglist[self.keylist.index('stimulus')]=q
                if self.MsgList: self.arglist[self.keylist.index('lineref')]='!0'+str(len(self.MsgList)/2)
                asw=self.Send()
                self.MsgList.append(q)
                answer = parseAnswers(asw)
                for k,v in answer.iteritems():
                        try:
                                self.arglist[self.keylist.index(k)] = v
                        except ValueError:
                                pass
                self.arglist[self.keylist.index('emotionaloutput')]=''
                text = answer['ttsText']
                self.MsgList.append(text)
                return text

def parseAnswers(text):
        d = {}
        keys = ["text", "sessionid", "logurl", "vText8", "vText7", "vText6", "vText5", "vText4", "vText3",
                        "vText2", "prevref", "foo", "emotionalhistory", "ttsLocMP3", "ttsLocTXT",
                        "ttsLocTXT3", "ttsText", "lineRef", "lineURL", "linePOST", "lineChoices",
                        "lineChoicesAbbrev", "typingData", "divert"]
        values = text.split("\r")
        i = 0
        for key in keys:
                d[key] = values[i]
                i += 1
        return d

def encode(keylist,arglist):
        text=''
        for i in range(len(keylist)):
                k=keylist[i]; v=quote(arglist[i])
                text+='&'+k+'='+v
        text=text[1:]
        return text

always_safe = ('ABCDEFGHIJKLMNOPQRSTUVWXYZ'
               'abcdefghijklmnopqrstuvwxyz'
               '0123456789' '_.-')
def quote(s, safe = '/'):   #quote('abc def') -> 'abc%20def'
        safe += always_safe
        safe_map = {}
        for i in range(256):
                c = chr(i)
                safe_map[c] = (c in safe) and c or  ('%%%02X' % i)
        res = map(safe_map.__getitem__, s)
        return ''.join(res)
