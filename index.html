<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }
    .chatbox {
      width: 100%;
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .messages {
      height: 300px;
      overflow-y: scroll;
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
    }
    .input-area {
      display: flex;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px;
      font-size: 16px;
    }
  </style>
<script>
        function displayDateTime() {
            const now = new Date();
            document.getElementById("datetime").innerText = now.toLocaleString();
        }
        setInterval(displayDateTime);
</script>
</head>
<body onload="displayDateTime()">
    <script>
    function sendMessage() {
      const input = document.getElementById('userInput');
      const messages = document.getElementById('messages');
      const userText = input.value;
      if (userText.trim() === '') return;

      const userMessage = document.createElement('div');
      userMessage.textContent = 'You: ' + userText;
      messages.appendChild(userMessage);

      const aiMessage = document.createElement('div');
      aiMessage.textContent = 'AI: ' + generateAIResponse(userText);
      messages.appendChild(aiMessage);

      input.value = '';
      messages.scrollTop = messages.scrollHeight;
    }

    function generateAIResponse(text) {
      // Simple mock response logic
      if (text.toLowerCase().includes('hello')) {
        return 'Hi there! How can I assist you today?';
      } else if (text.toLowerCase().includes('weather')) {
        return 'I can’t check the weather right now, but it’s always a good day to code!';
      } else {
        return matchDonation(text);
      }
    }
  </script>
  <script>
  // Grok-powered donation matcher
        async function matchDonation(query) {
            const apiKey = '19e92147-4ed9-4b64-b40d-3bb0186a112a'; // Replace with your xAI API key from x.ai/api
            const prompt = `As a tech donation conductor, match this query to open-source AI/tech projects: "${query}". Suggest 3 GitHub repos with why they fit (keep it concise, fun).`;
            
            try {
                const response = await fetch('https://api.x.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${19e92147-4ed9-4b64-b40d-3bb0186a112a}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'grok-3', // Free tier model
                        messages: [{ role: 'user', content: prompt }],
                        max_tokens: 200,
                    }),
                });
                const data = await response.json();
                const suggestions = data.choices[0].message.content || 'No matches yet—try another query!';
                document.getElementById('matches').innerHTML = `<pre>${suggestions}</pre>`;
            } catch (error) {
                console.error('Conductor hiccup:', error);
                document.getElementById('matches').innerHTML = 'Oops, something broke. Check your API key or try again!';
            }
        }

        // Real-time input listener
        document.getElementById('matches').addEventListener('input', (e) => {
            const query = e.target.value.trim();
            if (query.length > 5) { // Wait for meaningful input
                matchDonation(query);
            } else {
                document.getElementById('matches').innerHTML = 'Enter a cause to see AI suggestions...';
            }
        });
    }
    </script>

    <div id="matches" onload="matchDonation(displayDateTime)"></div>

    <h1>Welcome to Root Donate</h1>
    <p>The current date and time is:</p>
    <p id="datetime"></p>
    
      <div class="chatbox">
    <h2>AI Chatbot</h2>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</body>
</html>
