<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMART TERMINAL v2026 – CLEVERBOT</title>
  <style>
    :root {
      --bg: #000814;
      --surface: #0a0f1a;
      --text: #d8ffcc;
      --green: #39ff14;
      --purple: #c97eff;
      --accent: #00f0ff;
      --error: #ff3366;
      --muted: #5a6f8c;
      --border: #1a2b44;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Consolas, monospace;
      min-height: 100dvh;
      overflow-x: hidden;
      image-rendering: pixelated;
    }

    /* CRT overlay */
    .crt::before {
      content: " ";
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      background: 
        linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%),
        linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.03), rgba(0,0,255,0.03));
      background-size: 100% 4px, 4px 100%;
      z-index: 9999;
      animation: flicker 0.15s infinite;
    }
    @keyframes flicker {
      0%,19%,21%,23%,25%,54%,56%,100% { opacity: 0.1; }
      20%,24%,55% { opacity: 0.3; }
    }

    header {
      background: rgba(10,14,20,0.9);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      backdrop-filter: blur(6px);
      position: sticky;
      top: 0;
      z-index: 100;
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: 2.4rem;
      color: var(--purple);
      text-shadow: 0 0 10px var(--purple);
      letter-spacing: -1px;
    }

    .terminal {
      max-width: 960px;
      margin: 1.5rem auto;
      border: 2px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: 0 0 40px rgba(0,240,255,0.15);
      position: relative;
    }

    #output {
      padding: 1.5rem;
      min-height: 60vh;
      max-height: 75vh;
      overflow-y: auto;
      font-size: 1.1rem;
      line-height: 1.5;
    }

    .line { margin: 0.4rem 0; white-space: pre-wrap; word-break: break-word; }
    .prompt  { color: var(--green); font-weight: bold; }
    .bot     { color: var(--purple); }
    .success { color: var(--green); }
    .error   { color: var(--error); }

    .glitch {
      position: relative;
      color: var(--purple);
      animation: glitch-skew 1s infinite linear alternate-reverse;
    }
    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0.8;
    }
    .glitch::before { 
      left: 2px; 
      text-shadow: -2px 0 var(--accent); 
      clip: rect(0,900px,0,0); 
      animation: glitch-anim 2s infinite linear alternate-reverse; 
    }
    .glitch::after { 
      left: -2px; 
      text-shadow: 2px 0 var(--error); 
      clip: rect(0,900px,0,0); 
      animation: glitch-anim2 3s infinite linear alternate-reverse; 
    }

    @keyframes glitch-skew {
      0%,100% { transform: skew(0deg); }
      10%,30%,50%,70% { transform: skew(2deg); }
      20%,40%,60%,80% { transform: skew(-2deg); }
    }
    @keyframes glitch-anim {
      0%   { clip: rect(42px, 9999px, 44px, 0); }
      5%   { clip: rect(17px, 9999px, 53px, 0); }
      /* ... you can add more random keyframes if you want */
      100% { clip: rect(68px, 9999px, 29px, 0); }
    }
    @keyframes glitch-anim2 {
      0%   { clip: rect(65px, 9999px, 100px, 0); }
      5%   { clip: rect(76px, 9999px, 3px, 0); }
      100% { clip: rect(33px, 9999px, 91px, 0); }
    }

    .input-area {
      display: flex;
      align-items: center;
      padding: 1rem 1.5rem;
      background: rgba(0,0,0,0.4);
      border-top: 1px solid var(--border);
    }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font: inherit;
      font-size: 1.1rem;
      outline: none;
      caret-color: var(--accent);
    }

    .typing {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      border-right: 0.15em solid var(--green);
      animation: typing 3.5s steps(40, end), blink-caret 0.75s step-end infinite;
    }
    @keyframes typing {
      from { width: 0 }
      to { width: 18ch }
    }
    @keyframes blink-caret {
      from, to { border-color: transparent }
      50% { border-color: var(--green); }
    }
  </style>
</head>
<body class="crt">

<header>
  <h1>SMART TERMINAL</h1>
  <div style="color:var(--muted); font-size:0.9rem; margin-top:0.5rem;">
    CLEVERBOT OS • 04 MAR 2026 • NEURAL LINK v3.1.7
  </div>
</header>

<main>
  <div class="terminal">
    <div id="output">
      <div class="line success">╔════════════════════════════════════════════╗</div>
      <div class="line success">║  SMART TERMINAL  –  CLEVERBOT  2026       ║</div>
      <div class="line success">╚════════════════════════════════════════════╝</div>
      <div class="line"></div>
      <div class="line">> <span class="typing">INITIALIZING NEURAL CORE...</span></div>
      <div class="line"></div>
      <div class="line muted">commands: clear • help • exit • import</div>
    </div>

    <div class="input-area">
      <span class="prompt">root@void:~#</span> 
      <input id="input" autocomplete="off" autofocus placeholder="..." />
    </div>
  </div>
</main>

<script>
// Just a tiny script to remove the fake typing after 4 seconds
setTimeout(() => {
  document.querySelector('.typing')?.remove();
  document.querySelector('#output').innerHTML += 
    '<div class="line success">NEURAL CORE ONLINE – AWAITING INPUT</div>';
}, 4200);
</script>

</body>
</html>
