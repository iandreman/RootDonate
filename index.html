<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPS Pins – Private Markers & Share Links</title>
  <meta name="description" content="Save GPS locations and URLs privately — 100% local, works offline."/>

  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #79c0ff;
      --purple: #bc8cff;
      --danger: #f85149;
      --border: rgba(88,166,255,0.18);
      --shadow: 0 6px 24px rgba(0,0,0,0.55);
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --text: #1f2328;
      --muted: #57606a;
      --accent: #0969da;
      --accent-dim: #1f6feb;
      --purple: #8250df;
      --danger: #d1242f;
      --border: rgba(9,105,218,0.2);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.1rem 1.5rem;
      background: color-mix(in srgb, var(--bg) 92%, black);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    h1 {
      font-size: clamp(2.2rem, 8vw, 3rem);
      background: linear-gradient(90deg, var(--purple), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
    }

    .subtitle {
      color: var(--muted);
      text-align: center;
      font-size: 0.96rem;
      margin-top: 0.4rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 0.9rem;
      margin: 1.2rem 0;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.68rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      color: var(--accent);
      transition: all 0.22s ease;
    }

    .btn:hover    { background: color-mix(in srgb, var(--accent) 24%, transparent); }
    .btn.active   { background: var(--accent); color: #000; }

    .tab-content {
      display: none;
      flex: 1;
      flex-direction: column;
    }

    .tab-content.active {
      display: flex;
    }

    #terminal-tab { flex: 1; display: flex; flex-direction: column; }

    #terminal {
      flex: 1;
      padding: 1.6rem 1.8rem;
      overflow-y: auto;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: clamp(1.02rem, 3.2vw, 1.12rem);
      line-height: 1.65;
    }

    .line { margin: 0.48rem 0; white-space: pre-wrap; word-break: break-word; }

    .prompt       { color: var(--accent-dim); font-weight: bold; }
    .info         { color: var(--accent-dim); }
    .success      { color: #56d364; font-weight: 600; }
    .error        { color: var(--danger); font-weight: 600; }
    .system       { color: var(--muted); font-style: italic; }

    .input-line {
      display: flex;
      align-items: center;
      padding: 1.1rem 1.8rem;
      background: rgba(0,0,0,0.35);
      border-top: 1px solid var(--border);
      gap: 0.9rem;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--accent-dim);
      font: inherit;
      outline: none;
      caret-color: var(--accent);
    }

    #pins-tab { padding: 1.6rem; overflow-y: auto; }

    #search {
      width: 100%;
      max-width: 680px;
      margin: 0 auto 1.6rem;
      padding: 1rem 1.4rem;
      background: color-mix(in srgb, var(--surface) 60%, var(--bg));
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1.03rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin: 1.3rem 0;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease;
    }

    .card:hover { transform: translateY(-4px); }

    .pin-title {
      font-size: 1.38rem;
      margin-bottom: 0.7rem;
      color: var(--accent);
      word-break: break-all;
    }

    .url-pin .pin-title { color: var(--purple); }

    .share-line {
      margin-top: 0.9rem;
      font-size: 0.96rem;
      color: var(--muted);
      word-break: break-all;
    }

    .copy-share {
      margin-left: 1rem;
      background: color-mix(in srgb, var(--purple) 18%, transparent);
      border: 1px solid var(--purple);
      color: var(--purple);
      padding: 0.48rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-share.copied {
      background: rgba(86,212,100,0.28) !important;
      color: #56d364 !important;
      border-color: #56d364 !important;
    }

    #fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, var(--purple), var(--accent));
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 2.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      cursor: pointer;
      z-index: 999;
      transition: all 0.24s ease;
    }

    #fab:hover  { transform: scale(1.14); }
    #fab:active { transform: scale(0.92); }
  </style>
</head>
<body data-theme="dark">

<header>
  <h1>GPS Pins</h1>
  <div class="subtitle">private offline locations • URLs • share links</div>

  <div class="controls">
    <button class="btn active" data-tab="terminal">Terminal</button>
    <button class="btn" data-tab="pins">Pins <span id="pins-count">0</span></button>
    <button class="btn" id="theme-toggle">☀️ Light</button>
  </div>
</header>

<div id="terminal-tab" class="tab-content active">
  <div id="terminal" role="log" aria-live="polite"></div>
  <div class="input-line">
    <span class="prompt">></span>
    <input id="input" type="text" autocomplete="off" spellcheck="false" autofocus placeholder="paste url or type command…"/>
  </div>
</div>

<div id="pins-tab" class="tab-content">
  <input type="search" id="search" placeholder="Search name, url, coordinates, share links…"/>
  <div id="pins-container"></div>
</div>

<button id="fab">+</button>

<script>
const STORAGE_KEY = 'gps-pins-v15';
let pins = loadPins();
let lastUsedName = localStorage.getItem('gps-pins-lastname') || '';

const terminal   = document.getElementById('terminal');
const input      = document.getElementById('input');
const pinsList   = document.getElementById('pins-container');
const search     = document.getElementById('search');
const count      = document.getElementById('pins-count');
const themeBtn   = document.getElementById('theme-toggle');
const body       = document.body;

function loadPins() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function savePins() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(pins));
    count.textContent = pins.length;
    return true;
  } catch {
    alert("Save failed — storage may be full or blocked.");
    return false;
  }
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,10);
}

function escape(s = '') {
  return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
}

function getShareUrl(pin) {
  const data = {id:pin.id, n:pin.name, u:pin.url||null, la:pin.lat??null, lo:pin.lng??null, acc:pin.accuracy??null, t:pin.time};
  return `${location.origin}${location.pathname}#p=${btoa(JSON.stringify(data))}`;
}

async function copyToClipboard(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');

    // Auto-save valid URL if copied
    let copiedUrl;
    try {
      copiedUrl = new URL(text);
      if (!['http:','https:'].includes(copiedUrl.protocol)) copiedUrl = null;
    } catch {}

    if (copiedUrl) {
      const href = copiedUrl.href;
      if (pins.some(p => p.url === href)) {
        println(`<span class="info">This URL is already saved.</span>`, 'info');
      } else {
        let autoName = copiedUrl.hostname.replace(/^www\./, '');
        if (copiedUrl.pathname && copiedUrl.pathname !== '/') {
          const seg = copiedUrl.pathname.split('/')[1];
          if (seg) autoName += ` / ${seg}`;
        }
        autoName = autoName.slice(0, 60) || 'Copied link';

        pins.push({
          id: generateId(),
          name: autoName,
          url: href,
          time: Date.now()
        });

        if (savePins()) {
          println(`<span class="success">URL auto-saved as "${escape(autoName)}"</span>`, 'success');
          refreshPinsIfVisible();
        }
      }
    }

    setTimeout(() => {
      btn.textContent = orig;
      btn.classList.remove('copied');
    }, 1600);
  } catch {
    alert('Copy failed — please copy manually.');
  }
}

function println(html, cls = 'line') {
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

const print = {
  success: m => println(m, 'success'),
  error:   m => println(m, 'error'),
  info:    m => println(m, 'info'),
  system:  m => println(m, 'system')
};

function refreshPinsIfVisible() {
  if (document.querySelector('[data-tab="pins"].active')) {
    renderPins(search.value);
  }
}

// ── Theme Toggle ───────────────────────────────────────
function toggleTheme() {
  const current = body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  body.setAttribute('data-theme', next);
  themeBtn.textContent = next === 'light' ? '🌙 Dark' : '☀️ Light';
  localStorage.setItem('gps-pins-theme', next);
}

themeBtn.addEventListener('click', toggleTheme);

// Restore saved theme
const savedTheme = localStorage.getItem('gps-pins-theme');
if (savedTheme) {
  body.setAttribute('data-theme', savedTheme);
  themeBtn.textContent = savedTheme === 'light' ? '🌙 Dark' : '☀️ Light';
}

// ── Tab switching ──────────────────────────────────────
document.querySelectorAll('[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(`${btn.dataset.tab}-tab`).classList.add('active');

    if (btn.dataset.tab === 'pins') {
      renderPins(search.value);
    }
  });
});

function renderPins(query = '') {
  pinsList.innerHTML = '';
  const q = query.toLowerCase().trim();

  const filtered = pins.filter(p =>
    !q ||
    p.name?.toLowerCase().includes(q) ||
    p.url?.toLowerCase().includes(q) ||
    (p.lat && `${p.lat},${p.lng}`.includes(q)) ||
    getShareUrl(p).toLowerCase().includes(q)
  );

  if (!filtered.length) {
    pinsList.innerHTML = '<div style="text-align:center;padding:4rem;color:var(--muted);">No pins found.</div>';
    return;
  }

  filtered.forEach(p => {
    const card = document.createElement('div');
    card.className = `card${p.url && !p.lat ? ' url-pin' : ''}`;

    let html = `<div class="pin-title">${escape(p.name)}</div>`;

    if (p.url) {
      html += `<a href="${escape(p.url)}" target="_blank" style="color:var(--purple);word-break:break-all;">${escape(p.url)}</a>`;
    } else if (p.lat != null) {
      html += `<div style="font-family:monospace;margin:0.5rem 0;">
        ${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}${p.accuracy ? ` (±${p.accuracy.toFixed(0)}m)` : ''}
      </div>
      <div style="color:var(--muted);font-size:0.94rem;">
        ${new Date(p.time).toLocaleString()}
      </div>`;
    }

    const share = getShareUrl(p);
    html += `
      <div class="share-line">
        Share: ${escape(share)}
        <button class="copy-share" data-url="${escape(share)}">Copy</button>
      </div>`;

    card.innerHTML = html;
    pinsList.appendChild(card);
  });

  // Attach copy listeners (only once per button)
  pinsList.querySelectorAll('.copy-share:not([data-listener])').forEach(btn => {
    btn.addEventListener('click', () => copyToClipboard(btn.dataset.url, btn));
    btn.dataset.listener = '1';
  });
}

// ── Boot screen ────────────────────────────────────────
terminal.innerHTML = '';
print.system('<span style="font-size:1.25rem;font-weight:700;">GPS Pins</span>');
print.system('100% local • offline • private');
println('─'.repeat(50), 'system');
println('');
print.info('Paste URL → saves + creates share link');
print.info('Copy any URL or share-link → <b>auto-saves as new pin</b>');
print.info('Tap + → save location (double/long-press to name)');
print.info('<b>help</b> → commands');
println('');
print.info('Ready.');
println('');

// Init
count.textContent = pins.length;
renderPins();
input.focus();
</script>
</body>
</html>
