<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPS Pins – Private Markers & URLs</title>
  <meta name="description" content="Save GPS locations & URLs privately. 100% local, offline."/>

  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #79c0ff;
      --purple: #bc8cff;
      --danger: #f85149;
      --border: rgba(88,166,255,0.2);
      --shadow: 0 6px 24px rgba(0,0,0,0.5);
    }
    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --text: #24292f;
      --muted: #57606a;
      --accent: #0969da;
      --accent-dim: #1f6feb;
      --purple: #8250df;
      --danger: #cf222e;
      --border: rgba(9,105,218,0.15);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 1.5rem;
      background: rgba(13,17,23,0.85);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    h1 {
      font-size: clamp(2rem, 7vw, 2.6rem);
      background: linear-gradient(90deg, var(--purple), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
      margin: 0;
    }

    .subtitle { color: var(--muted); text-align:center; font-size:0.95rem; margin-top:0.4rem; }

    .controls {
      display: flex;
      justify-content: center;
      gap: 0.9rem;
      margin: 1.2rem 0;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.65rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: rgba(88,166,255,0.12);
      color: var(--accent);
      transition: all 0.18s;
    }
    .btn:hover { background: rgba(88,166,255,0.28); }
    .btn.active { background: var(--accent); color: #000; }

    .tab-content { display: none; flex: 1; flex-direction: column; }
    .tab-content.active { display: flex; }

    #terminal-tab { flex: 1; display: flex; flex-direction: column; }
    #terminal {
      flex: 1;
      padding: 1.6rem;
      overflow-y: auto;
      font-family: 'Consolas', monospace;
      line-height: 1.65;
      font-size: 1.05rem;
    }

    .line { margin: 0.45rem 0; white-space: pre-wrap; word-break: break-word; }
    .prompt { color: var(--accent-dim); }
    .info    { color: #79c0ff; }
    .success { color: #56d364; font-weight: 600; }
    .error   { color: var(--danger); }
    .system  { color: var(--muted); }

    .input-line {
      display: flex;
      align-items: center;
      padding: 1.1rem 1.6rem;
      background: rgba(0,0,0,0.35);
      border-top: 1px solid var(--border);
      gap: 0.9rem;
    }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--accent-dim);
      font: inherit;
      outline: none;
      caret-color: var(--accent);
    }

    #pins-tab { padding: 1.6rem; overflow-y: auto; }
    #search {
      width: 100%;
      max-width: 620px;
      padding: 1rem 1.3rem;
      margin: 0 auto 1.6rem;
      display: block;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1.2rem 0;
      box-shadow: var(--shadow);
      transition: transform 0.16s;
    }
    .card:hover { transform: translateY(-4px); }

    .pin-title {
      font-size: 1.4rem;
      margin-bottom: 0.7rem;
      color: var(--accent);
      word-break: break-all;
    }
    .url-pin .pin-title { color: var(--purple); }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1.4rem 2rem;
      color: var(--muted);
      font-size: 0.97rem;
      margin: 0.7rem 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      margin-top: 1.1rem;
    }

    .small-btn {
      padding: 0.55rem 1.1rem;
      font-size: 0.92rem;
      border-radius: 6px;
      cursor: pointer;
    }

    .copy-btn.copied {
      background: rgba(86,212,100,0.25) !important;
      color: #56d364 !important;
    }

    .share-line {
      margin-top: 0.6rem;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .share-line button {
      margin-left: 0.8rem;
      background: rgba(187,134,252,0.15);
      border: 1px solid var(--purple);
      color: var(--purple);
    }

    #fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, var(--purple), var(--accent));
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 2.4rem;
      box-shadow: 0 8px 28px rgba(0,0,0,0.55);
      cursor: pointer;
      z-index: 999;
      transition: all 0.2s;
    }
    #fab:hover { transform: scale(1.14); }
    #fab:active { transform: scale(0.92); }

    @media (max-width: 620px) {
      .actions { flex-direction: column; gap: 0.7rem; }
      .small-btn { width: 100%; text-align: center; }
      #fab { bottom: 20px; right: 20px; width: 60px; height: 60px; font-size: 2.2rem; }
    }
  </style>
</head>
<body data-theme="dark">

<header>
  <h1>GPS Pins</h1>
  <div class="subtitle">Autosave URLs • GPS pins • 100% offline</div>

  <div class="controls">
    <button class="btn active" data-tab="terminal">Terminal</button>
    <button class="btn" data-tab="pins">My Pins <span id="pins-count">0</span></button>
    <button class="btn" id="theme-toggle">☀️ Light</button>
  </div>
</header>

<div id="terminal-tab" class="tab-content active">
  <div id="terminal"></div>
  <div class="input-line">
    <span class="prompt">></span>
    <input id="input" type="text" autocomplete="off" spellcheck="false" autofocus/>
  </div>
</div>

<div id="pins-tab" class="tab-content">
  <input type="text" id="search" placeholder="Search name, url, coordinates…"/>
  <div id="pins-container"></div>
</div>

<button id="fab" title="Quick-save current location (double-tap / long-press for name)">+</button>

<script>
// ────────────────────────────────────────────────
// Core
// ────────────────────────────────────────────────
const STORAGE_KEY = 'gps-pins-v11';
let pins = getPins();
let lastName = localStorage.getItem('gps-pins-lastname') || '';
let trackingWatchId = null;
let lastFabClick = 0;

const terminal = document.getElementById('terminal');
const input = document.getElementById('input');
const pinsContainer = document.getElementById('pins-container');
const searchInput = document.getElementById('search');

function getPins() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function savePins() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(pins));
    document.getElementById('pins-count').textContent = pins.length;
    return true;
  } catch (e) {
    alert('Cannot save — storage may be full or blocked.');
    return false;
  }
}

function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,9); }

function escape(s='') { return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }

function getShareUrl(pin) {
  const data = {
    id: pin.id,
    name: pin.name,
    url: pin.url || null,
    lat: pin.lat ?? null,
    lng: pin.lng ?? null,
    accuracy: pin.accuracy ?? null,
    time: pin.time
  };
  return `${location.origin}${location.pathname}#p=${btoa(JSON.stringify(data))}`;
}

async function copyToClipboard(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = orig;
      btn.classList.remove('copied');
    }, 1800);
  } catch {
    alert('Copy failed – please copy manually.');
  }
}

function println(html, cls='line') {
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

function printSuccess(msg) { println(msg, 'success'); }
function printError(msg)   { println(msg, 'error'); }
function printInfo(msg)    { println(msg, 'info'); }
function printSystem(msg)  { println(msg, 'system'); }

// ────────────────────────────────────────────────
// Boot
// ────────────────────────────────────────────────
println('<span class="system">GPS Pins v11 • autosave URLs & GPS • ' + new Date().toLocaleDateString() + '</span>');
println('<span class="system">──────────────────────────────────────────────</span>');
printInfo('Paste/type URL → autosaves to My Pins + shows share link');
printInfo('Click + → quick autosave GPS + shows share link');
printInfo('Double-tap/long-press + → custom name');
printInfo('Type <b>track on</b> → continuous GPS autosave');
printInfo('Type <b>help</b> for commands');
println('');
if (lastName) printSystem(`Last name: ${escape(lastName)}`);

// ────────────────────────────────────────────────
// Tabs & Theme (unchanged)
// ────────────────────────────────────────────────
document.querySelectorAll('[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
    if (btn.dataset.tab === 'pins') renderPins();
  });
});

const themeToggle = document.getElementById('theme-toggle');
themeToggle.addEventListener('click', () => {
  const cur = document.body.dataset.theme;
  const nxt = cur === 'dark' ? 'light' : 'dark';
  document.body.dataset.theme = nxt;
  themeToggle.textContent = nxt === 'dark' ? '☀️ Light' : '🌙 Dark';
  localStorage.setItem('gps-pins-theme', nxt);
});
if (localStorage.getItem('gps-pins-theme') === 'light') {
  document.body.dataset.theme = 'light';
  themeToggle.textContent = '🌙 Dark';
}

// ────────────────────────────────────────────────
// Render My Pins (unchanged)
// ────────────────────────────────────────────────
function renderPins(filter = '') {
  const term = (filter || '').toLowerCase().trim();
  pinsContainer.innerHTML = '';

  const shown = pins.filter(p =>
    (p.name||'').toLowerCase().includes(term) ||
    (p.url||'').toLowerCase().includes(term) ||
    String(p.lat||'').includes(term) ||
    String(p.lng||'').includes(term)
  );

  if (!shown.length) {
    pinsContainer.innerHTML = '<div style="text-align:center; padding:7rem 1rem; color:var(--muted);">No pins saved yet.<br>Paste URL or tap + to begin</div>';
    return;
  }

  shown.forEach(p => {
    const isUrl = !!p.url;
    const coords = p.lat && p.lng ? `${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}` : null;
    const acc = p.accuracy ? `±${Math.round(p.accuracy)} m` : '';
    const shareUrl = getShareUrl(p);

    let bodyText = `${p.name || (isUrl ? 'Saved URL' : 'Pin')}\n\n`;
    if (isUrl) bodyText += `URL: ${p.url}\n\n`;
    if (coords) bodyText += `Location: ${coords}\n${acc ? 'Accuracy: ' + acc + '\n' : ''}`;
    bodyText += `Saved: ${new Date(p.time).toLocaleString()}\n\nOpen/share: ${shareUrl}`;

    const emailHref = `mailto:?subject=${encodeURIComponent('Check out: ' + (p.name || (isUrl ? 'URL' : 'Pin')))}&body=${encodeURIComponent(bodyText)}`;

    const card = document.createElement('div');
    card.className = `card ${isUrl ? 'url-pin' : ''}`;
    card.innerHTML = `
      <div class="pin-title">${isUrl ? '🔗 ' : '📍 '}${escape(p.name || (isUrl ? 'URL' : 'Pin'))}</div>
      <div class="meta">
        ${coords ? `<span>${coords}</span>` : '<span>No location</span>'}
        ${acc ? `<span>${acc}</span>` : ''}
        <span>${new Date(p.time).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
      </div>
      ${isUrl ? `<div style="margin:0.9rem 0;"><a href="${escape(p.url)}" target="_blank" style="color:var(--purple); font-weight:500;">→ Open URL</a></div>` : ''}
      <div class="actions">
        <button class="btn small-btn copy-share" data-url="${escape(shareUrl)}">Copy share URL</button>
        <a href="${emailHref}" target="_blank" class="btn small-btn email-share">Share via Email</a>
      </div>
    `;

    card.querySelector('.copy-share')?.addEventListener('click', e => {
      copyToClipboard(e.target.dataset.url, e.target);
    });

    pinsContainer.appendChild(card);
  });
}

searchInput.addEventListener('input', e => renderPins(e.target.value));

// ────────────────────────────────────────────────
// Quick GPS save – now prints share URL + copy button
// ────────────────────────────────────────────────
document.getElementById('fab').addEventListener('click', async e => {
  const now = Date.now();
  if (now - lastFabClick < 600) return;
  lastFabClick = now;

  let name = lastName || `Pin ${pins.length + 1}`;

  if (e.detail === 2 || (now - (window.lastFabDown || 0) > 600)) {
    const custom = prompt("Name this location?", name);
    if (custom === null) return;
    name = custom.trim() || name;
  }

  if (name && name !== lastName) {
    lastName = name;
    localStorage.setItem('gps-pins-lastname', lastName);
  }

  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, {enableHighAccuracy:true, timeout:12000})
    );

    const pin = {
      id: generateId(),
      name,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      accuracy: Math.round(pos.coords.accuracy),
      time: Date.now()
    };

    pins.push(pin);
    if (savePins()) {
      const shareUrl = getShareUrl(pin);
      printSuccess(`GPS pin saved → ${escape(name)} @ ${pin.lat.toFixed(6)}, ${pin.lng.toFixed(6)}`);
      println(`<span class="share-line">Share link: ${escape(shareUrl.slice(0,80))}${shareUrl.length > 80 ? '...' : ''} <button class="small-btn copy-share" data-url="${escape(shareUrl)}">Copy</button></span>`, 'info');

      // Attach listener to the new button in terminal
      const newBtn = terminal.querySelector('.copy-share:last-child');
      if (newBtn) newBtn.addEventListener('click', ev => copyToClipboard(ev.target.dataset.url, ev.target));

      if (document.querySelector('[data-tab="pins"].active')) renderPins();
    }
  } catch (err) {
    printError("Location error: " + (err.code === 1 ? "permission denied" : err.message));
  }
});

document.getElementById('fab').addEventListener('mousedown', () => window.lastFabDown = Date.now());
document.getElementById('fab').addEventListener('touchstart', () => window.lastFabDown = Date.now());

// ────────────────────────────────────────────────
// Continuous tracking – also shows share URL per point
// ────────────────────────────────────────────────
function startTracking() {
  if (trackingWatchId) return;
  printInfo("Tracking started — autosaving GPS points every ~15 seconds");
  trackingWatchId = navigator.geolocation.watchPosition(pos => {
    const name = `Track ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;
    const pin = {
      id: generateId(),
      name,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      accuracy: Math.round(pos.coords.accuracy),
      time: Date.now()
    };
    pins.push(pin);
    savePins();

    const shareUrl = getShareUrl(pin);
    println(`→ Saved ${name} @ ${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`, 'info');
    println(`<span class="share-line">Share: ${escape(shareUrl.slice(0,80))}${shareUrl.length > 80 ? '...' : ''} <button class="small-btn copy-share" data-url="${escape(shareUrl)}">Copy</button></span>`, 'info');

    // Listener for new copy button
    const newBtn = terminal.querySelector('.copy-share:last-child');
    if (newBtn) newBtn.addEventListener('click', ev => copyToClipboard(ev.target.dataset.url, ev.target));
  }, err => {
    printError("Tracking error: " + err.message);
    stopTracking();
  }, {enableHighAccuracy:true, timeout:15000, maximumAge:0});
}

function stopTracking() {
  if (trackingWatchId) {
    navigator.geolocation.clearWatch(trackingWatchId);
    trackingWatchId = null;
    printInfo("Tracking stopped.");
  }
}

// ────────────────────────────────────────────────
// URL autosave – already shows success (you can add share URL here too if wanted)
// ────────────────────────────────────────────────
input.addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();

  const text = input.value.trim();
  if (!text) return;

  println(`<span class="prompt">> ${escape(text)}</span>`);

  let url;
  try {
    url = new URL(text.match(/^https?:\/\//) ? text : 'https://' + text);
  } catch {}

  if (url) {
    if (pins.some(p => p.url === url.href)) {
      printInfo("Already saved.");
    } else {
      let name = url.hostname.replace(/^www\./, '');
      if (url.pathname && url.pathname !== '/') {
        const seg = url.pathname.split('/')[1];
        if (seg) name += ` / ${seg}`;
      }
      name = name.slice(0, 70);

      const pin = {
        id: generateId(),
        name,
        url: url.href,
        time: Date.now()
      };
      pins.push(pin);
      if (savePins()) {
        const shareUrl = getShareUrl(pin);
        printSuccess(`URL saved to My Pins → ${escape(name)}`);
        println(`<span class="share-line">Share link: ${escape(shareUrl.slice(0,80))}${shareUrl.length > 80 ? '...' : ''} <button class="small-btn copy-share" data-url="${escape(shareUrl)}">Copy</button></span>`, 'info');

        const newBtn = terminal.querySelector('.copy-share:last-child');
        if (newBtn) newBtn.addEventListener('click', ev => copyToClipboard(ev.target.dataset.url, ev.target));

        if (document.querySelector('[data-tab="pins"].active')) renderPins();
      }
    }
    input.value = '';
    input.focus();
    return;
  }

  // Commands (unchanged) ...
  const [cmd, ...args] = text.toLowerCase().split(/\s+/);
  const arg = args.join(' ');

  if (cmd === 'help') {
    printInfo("track on/off   → continuous GPS save");
    printInfo("clear          → clear terminal");
    printInfo("clear all      → delete everything");
    printInfo("list           → show all pins");
  } else if (cmd === 'track') {
    if (arg === 'on') startTracking();
    else if (arg === 'off') stopTracking();
    else printInfo("Use: track on / track off");
  } else if (cmd === 'clear' && arg === 'all') {
    if (confirm("Delete ALL pins & URLs?")) {
      pins = [];
      savePins();
      printSystem("Everything deleted.");
      if (document.querySelector('[data-tab="pins"].active')) renderPins();
    }
  } else if (cmd === 'clear') {
    terminal.innerHTML = '';
    println('<span class="system">Terminal cleared</span>');
  } else if (cmd === 'list') {
    if (!pins.length) printInfo("No pins yet.");
    else {
      printInfo(`Total: ${pins.length}`);
      pins.forEach(p => {
        let line = `• ${escape(p.name || '(no name)')} `;
        if (p.url) line += `[URL] `;
        if (p.lat != null) line += `${p.lat.toFixed(5)}, ${p.lng.toFixed(5)} `;
        line += `(${new Date(p.time).toLocaleDateString()})`;
        println(line, 'info');
      });
    }
  } else {
    printError(`Unknown command: ${escape(cmd)}`);
    printInfo("Type help for commands");
  }

  input.value = '';
  input.focus();
});

// Init
document.getElementById('pins-count').textContent = pins.length;
input.focus();
</script>
</body>
</html>
