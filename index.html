<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleverbot - Free (via CORS Proxy)</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f0f;
            color: #ddd;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #1a1a1a;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 { margin: 0; font-size: 1.6em; }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .message {
            padding: 13px 18px;
            border-radius: 20px;
            max-width: 78%;
            line-height: 1.45;
            word-wrap: break-word;
        }
        .user {
            background: #0078d4;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            color: white;
        }
        .bot {
            background: #2a2a2a;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        .input-area {
            background: #1a1a1a;
            padding: 15px 20px;
            border-top: 1px solid #333;
        }
        form {
            display: flex;
            max-width: 800px;
            margin: 0 auto;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 30px;
            background: #333;
            color: #fff;
            font-size: 16px;
        }
        button {
            padding: 0 26px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background: #106ebe; }
        .typing {
            font-style: italic;
            color: #888;
            align-self: flex-start;
            padding: 13px 18px;
        }
        .warning {
            font-size: 0.85em;
            color: #ffcc00;
            text-align: center;
            margin-top: 8px;
        }
        .clear-btn {
            background: #444;
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 20px;
        }
        .clear-btn:hover { background: #555; }
        .retry-btn {
            background: #d32f2f;
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 20px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Cleverbot</h1>
        <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
    </header>

    <div class="chat-container" id="chat"></div>

    <div class="input-area">
        <form id="chat-form">
            <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off" autofocus>
            <button type="submit">Send</button>
        </form>
        <div class="warning">
            ⚠️ Using public CORS proxy + unofficial endpoint.<br>
            This may still be slow/unreliable. For best results, get an official API key.
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const form = document.getElementById('chat-form');
        const input = document.getElementById('user-input');

        // Public CORS proxy (try different ones if one fails)
        const CORS_PROXY = "https://api.codetabs.com/v1/proxy?quest=";
        const CLEVERBOT_URL = "https://www.cleverbot.com/webservicemin";

        let conversationState = {
            sessionid: "", vText2: "", prevref: "", emotionalhistory: ""
        };

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'bot'}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function showTyping() {
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'message bot typing';
            div.textContent = "Cleverbot is thinking...";
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return id;
        }

        async function askCleverbot(message) {
            const thinkingId = showTyping();

            try {
                const formData = new URLSearchParams();
                formData.append('stimulus', message);
                formData.append('start', 'y');
                formData.append('sessionid', conversationState.sessionid || '');
                formData.append('vText2', conversationState.vText2 || '');
                formData.append('prevref', conversationState.prevref || '');
                formData.append('emotionalhistory', conversationState.emotionalhistory || '');
                formData.append('icognoid', 'wsf');
                formData.append('icognocheck', '');
                formData.append('emotionaloutput', '');
                formData.append('asbotname', '');
                formData.append('ttsvoice', '');
                formData.append('typing', '0');
                formData.append('lineref', '');
                formData.append('fno', '0');
                formData.append('sub', 'Say');
                formData.append('islearning', '1');
                formData.append('cleanslate', 'false');

                // Proxy the request
                const targetUrl = CLEVERBOT_URL + "?" + formData.toString();
                const proxyUrl = CORS_PROXY + encodeURIComponent(targetUrl);

                const response = await fetch(proxyUrl, {
                    method: 'GET',   // AllOrigins usually converts POST to GET for simplicity
                    headers: {
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    }
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const text = await response.text();
                if (!text || text.trim() === '') throw new Error("Empty response");

                const parts = text.split('\r');
                const reply = parts[0] ? parts[0].trim() : "Sorry, I didn't get that.";

                // Update state
                if (parts.length > 1) conversationState.sessionid = parts[1];
                if (parts.length > 9) conversationState.vText2 = parts[9];
                if (parts.length > 10) conversationState.prevref = parts[10];
                if (parts.length > 12) conversationState.emotionalhistory = parts[12];

                const typingEl = document.getElementById(thinkingId);
                if (typingEl) typingEl.remove();

                return reply;

            } catch (err) {
                console.error(err);
                const typingEl = document.getElementById(thinkingId);
                if (typingEl) typingEl.remove();
                return "❌ Failed to connect (proxy or Cleverbot issue).\nTry again or switch to official API key version.";
            }
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, true);
            input.value = '';

            const reply = await askCleverbot(msg);
            addMessage(reply, false);

            input.focus();
        }

        function clearChat() {
            if (confirm("Clear the chat?")) {
                chat.innerHTML = '';
                conversationState = { sessionid: "", vText2: "", prevref: "", emotionalhistory: "" };
                addMessage("Hi! I'm Cleverbot (free via proxy). What would you like to talk about?", false);
            }
        }

        form.addEventListener('submit', handleSubmit);

        window.onload = () => {
            addMessage("Hi! I'm Cleverbot (free unofficial version via CORS proxy).\n\nIt may still fail sometimes. If it does, the most reliable option is the official paid API.", false);
        };
    </script>
</body>
</html>
