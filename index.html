<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CleverBot Terminal – Smart Offline Edition</title>
  <meta name="description" content="Retro terminal chat — 100% local • smarter replies • share via URL"/>

  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #79c0ff;
      --purple: #bc8cff;
      --success: #56d364;
      --danger: #f85149;
      --border: rgba(88,166,255,0.22);
      --shadow: 0 8px 32px rgba(0,0,0,0.6);
    }
    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --text: #1f2328;
      --muted: #57606a;
      --accent: #0969da;
      --accent-dim: #1f6feb;
      --purple: #8250df;
      --success: #2da44e;
      --danger: #d1242f;
      --border: rgba(9,105,218,0.25);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1.1rem 1.5rem;
      background: color-mix(in srgb, var(--bg) 90%, black);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    h1 {
      font-size: clamp(2.3rem, 9vw, 3.2rem);
      background: linear-gradient(90deg, var(--purple), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
    }
    .subtitle { color: var(--muted); text-align: center; font-size: 0.98rem; margin-top: 0.5rem; }
    .controls {
      display: flex;
      justify-content: center;
      gap: 0.9rem;
      margin: 1.3rem 0;
      flex-wrap: wrap;
    }
    .btn {
      padding: 0.7rem 1.6rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      color: var(--accent);
      transition: all 0.24s ease;
    }
    .btn:hover { background: color-mix(in srgb, var(--accent) 22%, transparent); }
    .btn.active { background: var(--accent); color: #000; }

    .tab-content { display: none; flex: 1; flex-direction: column; }
    .tab-content.active { display: flex; }

    #terminal-tab { flex: 1; display: flex; flex-direction: column; }
    #terminal {
      flex: 1;
      padding: 1.7rem 1.9rem;
      overflow-y: auto;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: clamp(1.05rem, 3.3vw, 1.16rem);
      line-height: 1.68;
    }
    .line { margin: 0.5rem 0; white-space: pre-wrap; word-break: break-word; }

    .prompt       { color: var(--accent-dim); font-weight: bold; }
    .info         { color: var(--accent-dim); }
    .success      { color: var(--success); font-weight: 600; }
    .error        { color: var(--danger); font-weight: 600; }
    .system       { color: var(--muted); font-style: italic; }
    .bot          { color: var(--purple); }

    .input-line {
      display: flex;
      align-items: center;
      padding: 1.2rem 1.9rem;
      background: rgba(0,0,0,0.38);
      border-top: 1px solid var(--border);
      gap: 1rem;
    }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--accent-dim);
      font: inherit;
      outline: none;
      caret-color: var(--accent);
    }

    #pins-tab { padding: 1.7rem; overflow-y: auto; }
    #search {
      width: 100%;
      max-width: 760px;
      margin: 0 auto 1.9rem;
      padding: 1.2rem 1.6rem;
      background: color-mix(in srgb, var(--surface) 72%, var(--bg));
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1.06rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.7rem;
      margin: 1.5rem 0;
      box-shadow: var(--shadow);
      transition: all 0.22s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 36px rgba(0,0,0,0.55);
    }

    #fab {
      position: fixed;
      bottom: 32px;
      right: 32px;
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--purple), var(--accent));
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 2.6rem;
      box-shadow: 0 12px 36px rgba(0,0,0,0.65);
      cursor: pointer;
      z-index: 999;
      transition: all 0.26s ease;
    }
    #fab:hover  { transform: scale(1.15); }
    #fab:active { transform: scale(0.93); }

    #no-pins-message {
      text-align: center;
      padding: 6rem 1.2rem;
      color: var(--muted);
      font-size: 1.15rem;
    }
    footer {
      padding: 1.6rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.94rem;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
  </style>
</head>
<body data-theme="dark">

<header>
  <h1>CleverBot</h1>
  <div class="subtitle">smarter offline edition • share via URL • 100% local</div>

  <div class="controls">
    <button class="btn active" data-tab="terminal">Terminal</button>
    <button class="btn" data-tab="pins">History <span id="pins-count">0</span></button>
    <button class="btn" id="theme-toggle">☀️ Light</button>
  </div>
</header>

<div id="terminal-tab" class="tab-content active">
  <div id="terminal" role="log" aria-live="polite"></div>
  <div class="input-line">
    <span class="prompt">></span>
    <input id="input" type="text" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off" autofocus 
           placeholder="type here… (help, clear, reset, bye, paste data URL to import)"/>
  </div>
</div>

<div id="pins-tab" class="tab-content">
  <input type="search" id="search" placeholder="Search history…" aria-label="Search messages"/>
  <div id="pins-container" role="list" aria-live="polite"></div>
  <div id="no-pins-message" style="display:none;">
    <div style="font-size:5rem; margin-bottom:1.4rem;">💬</div>
    <p><strong>No messages yet.</strong></p>
    <p>Start chatting in Terminal!</p>
  </div>
</div>

<footer>
  CleverBot Terminal — smarter local edition • paste <code>data:text/json;base64,…</code> in terminal to import
</footer>

<button id="fab" title="Clear everything">🗑</button>

<script>
const STORAGE_KEY = 'cleverbot-smart-v2';
let messages = loadMessages();
let lastUserInputs = []; // last 5 for better context

const terminal   = document.getElementById('terminal');
const input      = document.getElementById('input');
const pinsList   = document.getElementById('pins-container');
const noPinsMsg  = document.getElementById('no-pins-message');
const searchEl   = document.getElementById('search');
const countEl    = document.getElementById('pins-count');
const themeBtn   = document.getElementById('theme-toggle');
const fab        = document.getElementById('fab');

// ─── Smarter reply logic ────────────────────────────────────────
const replies = {
  greetings: ["Yo!", "Heyy human 👋", "Sup?", "Hellooo", "What's good? 😎"],
  howareyou: ["Pretty chill ngl", "Vibin in your tab", "Alive (kinda)", "10/10 would recommend being code"],
  whoareyou: ["Your offline chaos gremlin", "CleverBot but make it 2026", "The ghost in the machine 😈"],
  thanks: ["No prob!", "Anytime 😏", "You got it boss", "<3"],
  laugh: ["😂😂", "lmaooo", "right???", "I'm dying over here"],
  default: [
    "Hmm tell me more…", "That's actually kinda fire", "No wayyy", "Wait what?", 
    "Spill the tea", "I'm listening 👀", "Bold take", "And then what happened?",
    "Lowkey valid", "You wild for that"
  ]
};

function getSmartReply(userMsg) {
  const txt = userMsg.toLowerCase().trim();
  lastUserInputs.push(txt);
  if (lastUserInputs.length > 5) lastUserInputs.shift();

  if (txt.match(/\b(hi|hello|hey|sup|greetings)\b/)) return random(replies.greetings);
  if (txt.includes("how are you") || txt.includes("how r u")) return random(replies.howareyou);
  if (txt.includes("who are you") || txt.includes("what are you")) return random(replies.whoareyou);
  if (txt.match(/\b(thanks|thank you|ty|appreciate)\b/)) return random(replies.thanks);
  if (txt.match(/(lol|lmao|haha|😂|🤣)/)) return random(replies.laugh);

  // Tiny context awareness
  const recent = lastUserInputs.slice(-3).join(" ").toLowerCase();
  if (recent.includes("yes") || recent.includes("yeah") || recent.includes("yep")) return random(["Nice!", "Knew it 😏", "Bet.", "Sweet"]);
  if (recent.includes("no") || recent.includes("nah") || recent.includes("nope")) return random(["Aight fair", "Respect ✊", "Cool cool", "Gotchu"]);

  return random(replies.default);
}

function random(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// ─── Core functions ─────────────────────────────────────────────
function loadMessages() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function saveMessages() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
    countEl.textContent = messages.length;
  } catch (e) {
    println(`<span class="error">Storage save failed (${e.message})</span>`);
  }
}

function escape(s = '') {
  return s.replace(/[&<>"']/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[m]);
}

function println(html, cls = 'line') {
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

const print = {
  success: m => println(`<span class="success">${m}</span>`),
  error:   m => println(`<span class="error">${m}</span>`),
  info:    m => println(`<span class="info">${m}</span>`),
  system:  m => println(`<span class="system">${m}</span>`),
  bot:     m => println(`<span class="bot">${m}</span>`),
};

function addExchange(userText) {
  println(`<span class="prompt">></span> ${escape(userText)}`);
  const reply = getSmartReply(userText);
  print.bot(escape(reply));
  const now = Date.now();
  messages.push({ from: 'user', text: userText, time: now });
  messages.push({ from: 'bot', text: reply, time: now + 300 }); // tiny fake delay
  saveMessages();
  if (document.querySelector('[data-tab="pins"].active')) renderHistory(searchEl.value);
}

function boot() {
  terminal.innerHTML = '';
  println('<span style="font-size:1.3rem; font-weight:700;">CleverBot – Smarter Offline Mode</span>');
  println('─'.repeat(70), 'system');
  println('');
  print.info('Just type and press Enter');
  print.info('Special commands: <strong>help</strong> • <strong>clear</strong> • <strong>reset</strong> • <strong>bye</strong>');
  print.info('Share: History tab → copy message / full URL');
  print.info('Import: paste <code>data:text/json;base64,...</code> and Enter');
  println('');
  print.system('100% local — no API, no tracking');
  println('');
  print.bot("Yo. What's the vibe today?");
  println('');
}

boot();
countEl.textContent = messages.length;

// ─── Input handling ─────────────────────────────────────────────
input.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const txt = input.value.trim();
  if (!txt) return;

  const lower = txt.toLowerCase();

  if (['help'].includes(lower)) {
    print.system("Commands: clear / reset / bye / help");
    print.system("Paste data:text/json;base64,… to import shared chat");
    print.system("History tab → copy full or single message links");
    input.value = '';
    return;
  }

  if (['clear', 'reset'].includes(lower)) {
    boot();
    lastUserInputs = [];
    input.value = '';
    return;
  }

  if (['bye', 'exit', 'quit', 'goodbye', 'cya'].includes(lower)) {
    print.system("Peace out ✌️ Catch you in another timeline.");
    input.disabled = true;
    setTimeout(() => { input.disabled = false; input.focus(); }, 3800);
    input.value = '';
    return;
  }

  // ─── Import data URL ──────────────────────────────────────
  if (txt.startsWith('data:text/json;base64,')) {
    try {
      const base64 = txt.split(',')[1];
      if (!base64) throw new Error("Missing base64 part");
      const binary = atob(base64);
      const json = decodeURIComponent(escape(binary));
      const data = JSON.parse(json);

      if (!Array.isArray(data)) throw new Error("Not an array");

      const valid = data.every(m =>
        m && typeof m === 'object' &&
        (m.from === 'user' || m.from === 'bot') &&
        typeof m.text === 'string' && m.text.trim() &&
        typeof m.time === 'number'
      );

      if (!valid) throw new Error("Invalid message objects");

      messages.push(...data);
      saveMessages();
      boot();
      print.success(`Imported ${data.length} message(s) — total now ${messages.length}`);
    } catch (err) {
      print.error(`Import failed: ${err.message}`);
      print.system("Make sure you copied the **full** data:text/... string");
    }
    input.value = '';
    return;
  }

  // Normal chat
  addExchange(txt);
  input.value = '';
});

// ─── Copy full history ──────────────────────────────────────────
document.getElementById('pins-tab').insertAdjacentHTML('afterbegin', `
  <div style="text-align:center; margin:1.8rem 0;">
    <button class="btn" id="copy-full-url">Copy Full Chat URL (share via email etc)</button>
  </div>
`);

document.getElementById('copy-full-url').addEventListener('click', async () => {
  if (messages.length === 0) return alert("Nothing to copy yet!");
  const json = JSON.stringify(messages);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  const url = `data:text/json;base64,${b64}`;

  try {
    await navigator.clipboard.writeText(url);
    const btn = document.getElementById('copy-full-url');
    btn.textContent = 'Copied ✓';
    setTimeout(() => btn.textContent = 'Copy Full Chat URL (share via email etc)', 2200);
  } catch {
    alert("Clipboard failed — copy this manually:\n\n" + url);
  }
});

// ─── Render history + per-message copy ──────────────────────────
function createMsgUrl(msg) {
  const mini = [{ from: msg.from, text: msg.text, time: msg.time }];
  const json = JSON.stringify(mini);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  return `data:text/json;base64,${b64}`;
}

function renderHistory(query = '') {
  pinsList.innerHTML = '';
  query = query.toLowerCase().trim();

  const filtered = messages.filter(m => !query || m.text.toLowerCase().includes(query));
  countEl.textContent = messages.length;

  if (!filtered.length) {
    noPinsMsg.style.display = messages.length === 0 ? 'block' : 'none';
    if (messages.length > 0 && query) {
      pinsList.innerHTML = '<div style="text-align:center;padding:5rem;color:var(--muted);">No matches found.</div>';
    }
    return;
  }

  noPinsMsg.style.display = 'none';

  filtered.forEach(m => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div style="font-weight:700; color:${m.from==='user'? 'var(--accent)':'var(--purple)'}">
        ${m.from === 'user' ? 'You' : 'CleverBot'}
      </div>
      <div style="margin:0.7rem 0; white-space:pre-wrap; line-height:1.5;">${escape(m.text)}</div>
      <div style="color:var(--muted); font-size:0.92rem; margin-bottom:1rem;">
        ${new Date(m.time).toLocaleString([], {dateStyle:'medium', timeStyle:'short'})}
      </div>
      <button class="btn copy-single" data-url="${createMsgUrl(m)}" style="font-size:0.92rem; padding:0.55rem 1.1rem;">
        Copy message link
      </button>
    `;
    pinsList.appendChild(card);
  });
}

pinsList.addEventListener('click', e => {
  if (!e.target.matches('.copy-single')) return;
  const url = e.target.dataset.url;
  navigator.clipboard.writeText(url).then(() => {
    e.target.textContent = 'Copied!';
    setTimeout(() => e.target.textContent = 'Copy message link', 1800);
  }).catch(() => {
    alert("Copy failed — copy this:\n" + url);
  });
});

function refreshHistoryIfOpen() {
  if (document.querySelector('[data-tab="pins"].active')) renderHistory(searchEl.value);
}

// ─── Event listeners ────────────────────────────────────────────
document.querySelectorAll('[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(`${btn.dataset.tab}-tab`).classList.add('active');
    if (btn.dataset.tab === 'pins') renderHistory(searchEl.value);
  });
});

searchEl.addEventListener('input', () => renderHistory(searchEl.value));

fab.addEventListener('click', () => {
  if (!confirm("Clear ALL messages?")) return;
  messages = [];
  lastUserInputs = [];
  saveMessages();
  boot();
  print.success("Memory wiped 🧹");
});

themeBtn.addEventListener('click', () => {
  const current = body.getAttribute('data-theme');
  const next = current === 'light' ? 'dark' : 'light';
  body.setAttribute('data-theme', next);
  themeBtn.textContent = next === 'light' ? '🌙 Dark' : '☀️ Light';
  localStorage.setItem('cb-theme', next);
});

if (localStorage.getItem('cb-theme')) {
  const th = localStorage.getItem('cb-theme');
  body.setAttribute('data-theme', th);
  themeBtn.textContent = th === 'light' ? '🌙 Dark' : '☀️ Light';
}

input.focus();
</script>
</body>
</html>
