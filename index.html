<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERRA-001 // EARTH NODE TERMINAL v1.7</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --green: #00ff9d;
            --cyan: #00f0ff;
            --dark: #0a0f1c;
            --bg: #05080f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'VT323', monospace;
            background: var(--bg);
            color: var(--green);
            height: 100vh;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(0,255,150,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,150,0.04) 1px, transparent 1px);
            background-size: 45px 45px;
            user-select: none;
        }

        .header {
            background: rgba(5, 15, 25, 0.98);
            border-bottom: 3px solid var(--green);
            padding: 14px 30px;
            font-size: 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 25px rgba(0, 255, 157, 0.5);
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .stats {
            display: flex;
            gap: 45px;
            font-size: 1.45rem;
        }

        .main {
            display: flex;
            height: calc(100vh - 72px);
            padding: 20px;
            gap: 20px;
        }

        .panel {
            flex: 1;
            background: rgba(10, 20, 35, 0.96);
            border: 2px solid var(--cyan);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 204, 255, 0.35);
        }

        .panel-header {
            background: #001122;
            padding: 15px 25px;
            font-size: 1.7rem;
            color: var(--cyan);
            border-bottom: 2px solid var(--green);
            letter-spacing: 1px;
        }

        .content {
            flex: 1;
            padding: 22px;
            overflow-y: auto;
            font-size: 1.55rem;
            line-height: 1.75;
            scrollbar-width: thin;
            scrollbar-color: var(--green) #001a22;
        }

        .content::-webkit-scrollbar {
            width: 8px;
        }

        .content::-webkit-scrollbar-thumb {
            background: var(--green);
        }

        input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.65rem;
            background: #000;
            border: 2px solid #004433;
            color: var(--green);
            font-family: 'VT323', monospace;
            outline: none;
        }

        input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
        }

        button {
            padding: 14px 20px;
            margin: 6px 0;
            font-size: 1.45rem;
            background: #001a11;
            color: var(--green);
            border: 2px solid var(--green);
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        button:hover {
            background: #003322;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.7);
        }

        .donate {
            background: linear-gradient(45deg, #ff3366, #ff8800);
            color: #000;
            border: 2px solid #ffcc00;
            font-weight: bold;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(transparent 50%, rgba(0, 255, 120, 0.06) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            animation: scan 10s linear infinite;
            z-index: 200;
            opacity: 0.35;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .log p {
            margin-bottom: 8px;
        }

        .success { color: #00ff9d; }
        .warning { color: #ffcc00; }
        .error   { color: #ff4444; }

        .footer {
            position: fixed;
            bottom: 14px;
            right: 28px;
            font-size: 1.15rem;
            color: #00aaff;
            opacity: 0.75;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            🌍 <strong>TERRA-001</strong> • EARTH NODE TERMINAL <span style="color:var(--cyan);">v1.7</span>
        </div>
        <div class="stats">
            <span>LVL <span id="level">1</span></span>
            <span>🔋 <span id="resonance">420</span></span>
            <span>ALIGN <span id="alignment">67%</span></span>
        </div>
        <div id="time" style="color:var(--cyan); font-size:1.5rem;"></div>
    </div>

    <div class="main">

        <!-- LEFT PANEL -->
        <div class="panel">
            <div class="panel-header">📡 EARTH NODE STATUS</div>
            <div class="content" id="status-panel"></div>
            <div style="padding:18px; background:#001a22; display:flex; flex-direction:column; gap:8px;">
                <button onclick="injectResonance('bio')">INJECT BIO FIELD 🌱</button>
                <button onclick="injectResonance('mag')">STABILIZE MAG FIELD 🌀</button>
                <button onclick="injectResonance('noo')">AWAKEN NOOSPHERE 🧬</button>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="panel">
            <div class="panel-header">☰ COMMAND TERMINAL • LEXICON INTERFACE</div>
            <div style="padding:18px 22px; background:#000;">
                <input type="text" id="command" placeholder="ENTER WORD • IP • CONCEPT..." 
                       onkeypress="if(event.key==='Enter') runCommand()">
            </div>
            <div style="padding:0 22px 15px;">
                <button onclick="runCommand()">EXECUTE QUERY →</button>
                <button onclick="donateEnergy()" class="donate">DONATE ENERGY • CHARGE THE CORE</button>
                <button onclick="clearScreen()" style="background:#220000; border-color:#ff5555;">CLEAR TERMINAL</button>
            </div>
            <div class="content log" id="output">
                <p class="success">>> TERRA-001 ONLINE • EARTH NODE ACTIVE</p>
                <p class="success">>> AWAITING OPERATOR INPUT...</p>
            </div>
        </div>

    </div>

    <div class="scanline"></div>
    <div class="footer">GLOBAL NOOSPHERE CONNECTION • STABLE</div>

<script>
// Game State
let state = {
    level: 1,
    resonance: 420,
    alignment: 67,
    earthHealth: { bio: 85, mag: 72, noo: 91 }
};

function loadSave() {
    const saved = localStorage.getItem('terraTerminal');
    if (saved) Object.assign(state, JSON.parse(saved));
}

function saveGame() {
    localStorage.setItem('terraTerminal', JSON.stringify(state));
}

function updateUI() {
    document.getElementById('level').textContent = state.level;
    document.getElementById('resonance').textContent = Math.floor(state.resonance);
    document.getElementById('alignment').textContent = Math.floor(state.alignment) + "%";
}

function addOutput(text, className = "success") {
    const output = document.getElementById('output');
    const line = document.createElement('p');
    line.innerHTML = `>> ${text}`;
    if (className) line.className = className;
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
}

// Live UTC Clock
function updateTime() {
    const now = new Date();
    document.getElementById('time').textContent = 
        now.toLocaleTimeString('en-GB', { timeZone: 'UTC' }) + " UTC";
}
setInterval(updateTime, 1000);
updateTime();

function updateEarthStatus() {
    const panel = document.getElementById('status-panel');
    panel.innerHTML = `
        <strong style="color:#00ccff;">PLANETARY CORE VITALS</strong><br><br>
        BIO FIELD  : ${state.earthHealth.bio}%<br>
        MAG FIELD  : ${state.earthHealth.mag}%<br>
        NOO FIELD  : ${state.earthHealth.noo}%<br><br>
        SCHUMANN   : ${(7.83 + Math.random()*2.5).toFixed(2)} Hz<br>
        CORE TEMP  : ${(14.8 + Math.random()*3).toFixed(1)}°C<br>
        STATUS     : <span style="color:#00ff9d;">STABLE</span>
    `;
}

function injectResonance(type) {
    const cost = 130 + state.level * 18;
    if (state.resonance < cost) {
        addOutput("INSUFFICIENT RESONANCE ENERGY", "warning");
        return;
    }

    state.resonance -= cost;

    if (type === 'bio') state.earthHealth.bio = Math.min(100, state.earthHealth.bio + 18);
    if (type === 'mag') state.earthHealth.mag = Math.min(100, state.earthHealth.mag + 22);
    if (type === 'noo') state.earthHealth.noo = Math.min(100, state.earthHealth.noo + 26);

    addOutput(`${type.toUpperCase()} FIELD STRENGTHENED [+40]`, "success");
    state.resonance += 40;
    
    updateEarthStatus();
    updateUI();
    saveGame();
}

function runCommand() {
    const input = document.getElementById('command').value.trim();
    if (!input) return;

    addOutput(`QUERYING: ${input.toUpperCase()}`);

    setTimeout(() => {
        const reward = Math.floor(input.length * 22 + Math.random() * 85);
        addOutput(`ENTRY REGISTERED IN THE NOOSPHERE`, "success");
        addOutput(`RESONANCE GAINED: +${reward}`, "success");
        
        state.resonance += reward;

        if (state.resonance >= state.level * 1200) {
            state.level++;
            addOutput(`NODE ASCENSION COMPLETE — LEVEL ${state.level}`, "success");
        }

        updateUI();
        saveGame();
    }, 650);

    document.getElementById('command').value = '';
}

function donateEnergy() {
    window.open('https://monzo.me/iandreme', '_blank');
    const reward = 150 + state.level * 30;
    state.resonance += reward;
    addOutput(`ENERGY DONATION RECEIVED • +${reward} RESONANCE`, "success");
    updateUI();
    saveGame();
}

function clearScreen() {
    document.getElementById('output').innerHTML = `<p class="success">>> TERMINAL BUFFER CLEARED</p>`;
}

// Initialize
window.onload = () => {
    loadSave();
    updateUI();
    updateEarthStatus();

    setTimeout(() => {
        addOutput("PERSONAL EARTH NODE CONNECTED", "success");
        addOutput("THE NOOSPHERE IS LISTENING...", "success");
    }, 800);
};
</script>

</body>
</html>
