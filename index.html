<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Terminal • Live Type</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d1117;
      color: #00ff9d;
      font-family: 'Courier New', Consolas, monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      user-select: none;
    }

    #terminal {
      flex: 1;
      position: relative;
      background: #0d1117;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #ffffff;
    }

    #input-area {
      padding: 16px 20px;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .prompt {
      color: #00ff9d;
      user-select: none;
      pointer-events: none;
    }

    #input {
      background: transparent;
      border: none;
      color: #00ff9d;
      font-family: inherit;
      font-size: 16px;
      outline: none;
      flex: 1;
      caret-color: #00ff9d;
    }

    #input::placeholder {
      color: #555;
    }

    #typing {
      position: absolute;
      bottom: 80px;
      left: 20px;
      color: #00cc77;
      font-size: 15px;
      opacity: 0.85;
      pointer-events: none;
      white-space: pre;
      z-index: 5;
    }

    button {
      background: #21262d;
      color: #00ff9d;
      border: 1px solid #30363d;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }

    button:hover {
      background: #30363d;
      border-color: #00ff9d;
    }
  </style>
</head>
<body>

  <div id="header">
    <span><span class="prompt">$</span> Smart Terminal — Type to Load</span>
    <button onclick="shareTerminal()">Share Link</button>
  </div>

  <div id="terminal">
    <div id="typing"></div>
    <iframe id="iframe" src="https://rootdonate.co.uk"></iframe>
  </div>

  <div id="input-area">
    <span class="prompt">$</span>
    <input 
      type="text" 
      id="input" 
      placeholder="Type anything... (google, youtube, wikipedia, or a domain)"
      autofocus 
      autocomplete="off"
      spellcheck="false">
  </div>

  <script>
    const input = document.getElementById('input');
    const iframe = document.getElementById('iframe');
    const typingEl = document.getElementById('typing');

    let history = [];
    let historyIndex = -1;
    let typingTimeout = null;

    // Live typing animation
    function typeText(text) {
      typingEl.textContent = '';
      let i = 0;
      clearTimeout(typingTimeout);

      function type() {
        if (i < text.length) {
          typingEl.textContent += text[i];
          i++;
          typingTimeout = setTimeout(type, 35);
        } else {
          setTimeout(() => {
            typingEl.textContent = '';
          }, 1400);
        }
      }
      type();
    }

    // Smart URL handler
    function smartOpen(cmd) {
      let trimmed = cmd.trim();
      if (!trimmed) return;

      // Save command to history
      history.unshift(trimmed);
      if (history.length > 50) history.pop();
      historyIndex = -1;

      let url = trimmed;

      // Smart URL detection and conversion
      if (!/^https?:\/\//i.test(trimmed)) {
        const lower = trimmed.toLowerCase();

        if (/\.[a-z]{2,}/.test(lower) && !lower.includes(' ')) {
          // Looks like a domain
          url = lower.startsWith('www.') ? 'https://' + lower : 'https://' + lower;
        } 
        else if (lower === 'youtube' || lower === 'yt') {
          url = 'https://youtube.com';
        } 
        else if (lower === 'github' || lower === 'gh') {
          url = 'https://github.com';
        } 
        else if (lower === 'reddit') {
          url = 'https://reddit.com';
        } 
        else if (lower === 'google') {
          url = 'https://google.com';
        }
        else {
          // Default: Google search
          url = 'https://www.google.com/search?q=' + encodeURIComponent(trimmed);
        }
      }

      // Show live typing animation
      typeText(`Opening → ${trimmed}`);

      // Load the URL after a short delay
      setTimeout(() => {
        iframe.src = url;
      }, 800);

      // Clear input
      input.value = '';
    }

    // Enter key handler
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        smartOpen(input.value);
      }
    });

    // History navigation (Arrow Up / Down)
    input.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (history.length === 0) return;
        historyIndex = Math.min(historyIndex + 1, history.length - 1);
        input.value = history[historyIndex];
      } 
      else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIndex <= 0) {
          historyIndex = -1;
          input.value = '';
        } else {
          historyIndex--;
          input.value = history[historyIndex];
        }
      }
    });

    // Focus input when clicking anywhere on the page
    document.addEventListener('click', () => input.focus());

    // Initial focus on load
    window.onload = () => {
      input.focus();
    };

    // Share current page link
    function shareTerminal() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.querySelector('button');
        const originalText = btn.textContent;
        btn.textContent = '✅ Copied!';
        setTimeout(() => {
          btn.textContent = originalText;
        }, 2000);
      }).catch(() => {
        alert('Failed to copy link:\n' + window.location.href);
      });
    }
  </script>
</body>
</html>
