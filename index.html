i<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Terminal - rootdonate.co.uk</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #00ff9d;
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #header {
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }
    #terminal {
      flex: 1;
      position: relative;
      background: #0d1117;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    #input-area {
      padding: 14px 20px;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      align-items: center;
    }
    .prompt {
      color: #00ff9d;
      margin-right: 10px;
      user-select: none;
    }
    input {
      background: transparent;
      border: none;
      color: #00ff9d;
      font-family: inherit;
      font-size: 16px;
      outline: none;
      flex: 1;
    }
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(13, 17, 23, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      text-align: center;
      color: #888;
    }
  </style>
</head>
<body>

  <div id="header">
    <span class="prompt">$</span> Smart Terminal — Type anything and press Enter to load rootdonate.co.uk
  </div>

  <div id="terminal">
    <div id="overlay">
      <div><span class="prompt">$</span> Ready.</div>
      <div style="margin-top: 10px;">Type any text and press Enter</div>
    </div>
    <iframe id="iframe" src="https://rootdonate.co.uk"></iframe>
  </div>

  <div id="input-area">
    <span class="prompt">$</span>
    <input type="text" id="input" placeholder="type anything → loads rootdonate.co.uk" autofocus autocomplete="off">
  </div>

  <script>
    const input = document.getElementById('input');
    const iframe = document.getElementById('iframe');
    const overlay = document.getElementById('overlay');

    let history = [];
    let historyIndex = -1;

    function loadRootDonate(cmd) {
      const trimmed = cmd.trim();
      if (!trimmed) return;

      // Add to history (Up/Down arrows)
      history.unshift(trimmed);
      if (history.length > 50) history.pop();
      historyIndex = -1;

      // Always load rootdonate.co.uk no matter what you type
      overlay.style.display = 'none';
      iframe.src = "https://rootdonate.co.uk";

      // Optional: clear the input after loading
      input.value = "";
    }

    // Press Enter
    input.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        loadRootDonate(input.value);
      }
    });

    // History with Up / Down arrows
    input.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (history.length === 0) return;
        historyIndex = Math.min(historyIndex + 1, history.length - 1);
        input.value = history[historyIndex];
      } 
      else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIndex <= 0) {
          historyIndex = -1;
          input.value = '';
        } else {
          historyIndex--;
          input.value = history[historyIndex];
        }
      }
    });

    // Click anywhere focuses the input
    document.addEventListener('click', () => input.focus());

    // Initial focus
    window.onload = () => input.focus();
  </script>

</body>
</html>
