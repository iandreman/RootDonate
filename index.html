<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RootDonate - Step. Donate. Change Lives.</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        /* Same beautiful styles as before */
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0f172a, #1e2937); color: #e2e8f0; margin: 0; padding: 0; min-height: 100vh; }
        .container { max-width: 600px; margin: 40px auto; padding: 30px; background: rgba(15, 23, 42, 0.95); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h1 { color: #22d3ee; }
        .tagline { color: #94a3b8; font-size: 1.1rem; margin-bottom: 30px; }
        form { text-align: left; }
        label { display: block; margin: 15px 0 8px; font-weight: 600; color: #cbd5e1; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #334155; background: #1e2937; color: #e2e8f0; border-radius: 8px; }
        button { margin-top: 25px; width: 100%; padding: 16px; font-size: 1.2rem; font-weight: bold; background: #22d3ee; color: #0f172a; border: none; border-radius: 12px; cursor: pointer; }
        button:hover { background: #67e8f9; }
        #response { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .success { background: #166534; color: #86efac; }
        .error { background: #7f1d1d; color: #fda4af; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 RootDonate</h1>
        <p class="tagline">Turn your steps into real impact</p>

        <form id="donateForm">
            <label>Donation Amount (£)</label>
            <input type="number" id="amount" step="0.01" min="1" value="10" required>

            <label>Your Name</label>
            <input type="text" id="name" value="Anonymous">

            <label>Email (for receipt)</label>
            <input type="email" id="email" required>

            <label>Message (optional)</label>
            <textarea id="message" rows="3"></textarea>

            <label>Steps Walked (optional)</label>
            <input type="number" id="steps" value="0">

            <button type="submit">Donate Now • Secure</button>
        </form>

        <div id="response"></div>
    </div>

    <script>
        const stripe = Stripe('ppk_live_51TeUTKAYd3hJ6fUDdNumw6y435NBguXNZRNkqM2d4Te1kKOYLn25XceMG9qr1M6z0GzARRs2L7SJ8ZqmHW39c5Qe00clIRkuCL'); // Replace with your real key

        document.getElementById('donateForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Redirecting to secure payment...';

            const amount = parseFloat(document.getElementById('amount').value) * 100; // pence

            try {
                const response = await fetch('https://www.rootdonate.co.uk', {  // You'll need a small backend
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        amount: amount,
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        message: document.getElementById('message').value,
                        steps: document.getElementById('steps').value
                    })
                });

                const { clientSecret } = await response.json();

                const { error } = await stripe.confirmPayment({
                    clientSecret,
                    confirmParams: {
                        return_url: window.location.href + '?success=true',
                    },
                    // This automatically shows card + Pay by Bank options
                });

                if (error) {
                    showMessage('error', error.message);
                }
            } catch (err) {
                showMessage('error', 'Something went wrong. Please try again.');
            }

            btn.disabled = false;
            btn.textContent = 'Donate Now • Secure';
        });

        function showMessage(type, text) {
            const div = document.getElementById('response');
            div.style.display = 'block';
            div.className = type;
            div.textContent = text;
        }
    </script>
</body>
</html>
