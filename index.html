<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Terminal - Type to URL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #00ff9d;
      font-family: 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #header {
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }
    #terminal {
      flex: 1;
      position: relative;
      background: #0d1117;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #ffffff;
    }
    #input-area {
      padding: 16px 20px;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      align-items: center;
    }
    .prompt {
      color: #00ff9d;
      margin-right: 10px;
      user-select: none;
    }
    input {
      background: transparent;
      border: none;
      color: #00ff9d;
      font-family: inherit;
      font-size: 16px;
      outline: none;
      flex: 1;
    }
    input::placeholder {
      color: #666;
    }
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(13, 17, 23, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      text-align: center;
      color: #888;
    }
    button {
      background: #21262d;
      color: #00ff9d;
      border: 1px solid #30363d;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      border-radius: 4px;
    }
    button:hover {
      background: #30363d;
    }
  </style>
</head>
<body>

  <div id="header">
    <span><span class="prompt">$</span> Smart Terminal — Type text to import URL</span>
    <button onclick="shareTerminal()">Share Link</button>
  </div>

  <div id="terminal">
    <div id="overlay">
      <div><span class="prompt">$</span> Ready.</div>
      <div style="margin-top: 8px;">Type any text or URL and press Enter</div>
    </div>
    <iframe id="iframe" src="https://rootdonate.co.uk"></iframe>
  </div>

  <div id="input-area">
    <span class="prompt">$</span>
    <input type="text" id="input" placeholder="type text or url here..." autofocus autocomplete="off">
  </div>

  <script>
    const input = document.getElementById('input');
    const iframe = document.getElementById('iframe');
    const overlay = document.getElementById('overlay');

    let history = [];
    let historyIndex = -1;

    function smartURLImport(cmd) {
      let trimmed = cmd.trim();
      if (!trimmed) return;

      // Save typed text to history for Up/Down arrows
      history.unshift(trimmed);
      if (history.length > 50) history.pop();
      historyIndex = -1;

      let url = trimmed;

      // Smart text → URL conversion
      if (!/^https?:\/\//i.test(trimmed)) {
        if (trimmed.includes('.')) {
          url = 'https://' + trimmed;
        } else {
          url = 'https://' + trimmed + '.com';
        }
      }

      // Load the URL
      overlay.style.display = 'none';
      iframe.src = url;

      // Clear input for clean typing
      input.value = '';
    }

    // Press Enter to import URL from typed text
    input.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        smartURLImport(input.value);
      }
    });

    // History navigation with Up / Down arrows
    input.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (history.length === 0) return;
        historyIndex = Math.min(historyIndex + 1, history.length - 1);
        input.value = history[historyIndex];
      } 
      else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIndex <= 0) {
          historyIndex = -1;
          input.value = '';
        } else {
          historyIndex--;
          input.value = history[historyIndex];
        }
      }
    });

    // Click anywhere focuses the input
    document.addEventListener('click', () => input.focus());

    // Initial focus
    window.onload = () => input.focus();

    // Share Link function
    function shareTerminal() {
      const shareUrl = window.location.href;
      navigator.clipboard.writeText(shareUrl).then(() => {
        const btn = document.querySelector('button');
        const original = btn.textContent;
        btn.textContent = '✅ Link Copied!';
        setTimeout(() => { btn.textContent = original; }, 2000);
      }).catch(() => {
        alert('Copy failed. Manually share this URL: ' + shareUrl);
      });
    }
  </script>

</body>
</html>
