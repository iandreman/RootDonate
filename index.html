<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RootDonate Dictionary</title>
  
  <!-- Custom styles - no external Tailwind or heavy dependencies -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=VT323&display=swap');

    :root {
      --accent: #00ff9d;
    }

    body {
      background: #000;
      color: #e6d5b8;
      font-family: 'Cinzel', serif;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: rgba(10, 10, 10, 0.95);
      border: 12px solid #111;
      border-image: linear-gradient(45deg, #00ff9d, #008f5a) 1;
      box-shadow: 0 0 80px rgba(0, 255, 157, 0.3);
      border-radius: 12px;
      overflow: hidden;
      height: 92vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: rgba(15, 15, 15, 0.98);
      padding: 20px 30px;
      border-bottom: 4px solid var(--accent);
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .rune {
      font-size: 3rem;
      color: var(--accent);
      text-shadow: 0 0 15px var(--accent);
    }

    .title {
      font-size: 2.4rem;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .input-area {
      padding: 25px;
      background: #0a0a0a;
    }

    input {
      background: #111;
      border: 2px solid #008f5a;
      color: #00ff9d;
      font-family: 'VT323', monospace;
      width: 100%;
      padding: 24px 32px;
      font-size: 1.75rem;
      border-radius: 9999px;
      outline: none;
    }

    input:focus {
      border-color: #00ff9d;
      box-shadow: 0 0 20px rgba(0, 255, 157, 0.3);
    }

    .result {
      padding: 30px;
      flex: 1;
      overflow-y: auto;
      background: rgba(8, 18, 14, 0.95);
      line-height: 1.7;
    }

    .word {
      font-size: 2.8rem;
      color: #00ff9d;
      border-bottom: 2px dashed #00cc77;
    }

    .phonetic {
      font-family: 'VT323', monospace;
      color: #00cc77;
      font-size: 1.4rem;
    }

    .meaning {
      background: rgba(0, 30, 15, 0.6);
      border-left: 6px solid var(--accent);
      padding: 18px;
      margin: 20px 0;
      border-radius: 4px;
    }

    .example {
      font-style: italic;
      color: #a0d8c0;
    }

    .audio-btn {
      background: #001a00;
      border: 2px solid #00ff9d;
      color: #00ff9d;
    }

    .ai-section {
      margin-top: 40px;
      padding: 25px;
      background: rgba(0, 40, 20, 0.7);
      border: 1px solid #00ff9d;
      border-radius: 12px;
    }

    .ai-btn, .share-btn {
      transition: all 0.3s ease;
    }

    .ai-btn {
      background: linear-gradient(45deg, #00ff9d, #00cc77);
      color: #000;
      font-weight: 700;
    }

    .ai-btn:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 0 25px rgba(0, 255, 157, 0.6);
    }

    .glitch {
      animation: glitch 0.3s linear infinite alternate;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; }
      100% { text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff; }
    }

    button {
      cursor: pointer;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-black p-6">

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="rune">☰</div>
    <div>
      <h1 class="title text-white">RootDonate Dictionary</h1>
      <p class="text-[#00ff9d] text-sm tracking-widest flex items-center gap-2">
        <span class="w-3 h-3 bg-[#00ff9d] rounded-full animate-pulse"></span>
        REAL-TIME • FREE • VOID ENHANCED
      </p>
    </div>
    
    <div class="ml-auto flex items-center gap-4">
      <button onclick="shareVoid()" 
        class="share-btn flex items-center gap-2 px-5 py-2.5 border border-[#00cc77]/60 hover:border-[#00ff9d] rounded-xl">
        <i class="fa-solid fa-share-nodes"></i>
        <span>SHARE THE VOID</span>
      </button>

      <button onclick="clearResult()" 
        class="flex items-center gap-2 px-6 py-3 bg-black border-2 border-[#00ff9d] hover:bg-[#001a00] rounded">
        <i class="fa-solid fa-trash"></i> CLEAR
      </button>
    </div>
  </div>

  <!-- SEARCH INPUT -->
  <div class="input-area">
    <div class="relative max-w-2xl mx-auto">
      <input type="text" id="search-input" 
        placeholder="ENTER A WORD INTO THE VOID...">
      
      <div class="flex gap-3 mt-6 justify-center">
        <button onclick="searchWord()" 
          class="flex-1 max-w-xs px-8 py-4 bg-[#001a00] border-2 border-[#00ff9d] hover:bg-[#003300] rounded-2xl flex items-center justify-center gap-3 text-lg">
          <i class="fa-solid fa-magnifying-glass"></i> 
          <span>LOOKUP IN VOID</span>
        </button>

        <button onclick="askAI()" 
          class="ai-btn flex-1 max-w-xs px-8 py-4 rounded-2xl flex items-center justify-center gap-3 text-lg shadow-lg">
          <i class="fa-solid fa-sparkles"></i> 
          <span>ASK THE VOID AI</span>
        </button>
      </div>
    </div>
  </div>

  <!-- RESULTS AREA -->
  <div id="result" class="result"></div>

</div>

<script>
  // Share the current page URL
  function shareVoid() {
    const url = window.location.href;
    navigator.clipboard.writeText(url).then(() => {
      const btn = event.currentTarget;
      const original = btn.innerHTML;
      btn.innerHTML = `<i class="fa-solid fa-check"></i><span>COPIED TO CLIPBOARD</span>`;
      btn.style.color = '#00ff9d';
      setTimeout(() => {
        btn.innerHTML = original;
        btn.style.color = '';
      }, 2500);
    }).catch(() => {
      alert("Failed to copy. Here's the link:\n" + url);
    });
  }

  // Main dictionary search using free Dictionary API
  async function searchWord() {
    const input = document.getElementById('search-input');
    const word = input.value.trim().toLowerCase();
    const resultDiv = document.getElementById('result');

    if (!word) {
      resultDiv.innerHTML = `<p class="text-center text-red-400 text-xl">Speak a word into the void...</p>`;
      return;
    }

    resultDiv.innerHTML = `
      <div class="flex items-center justify-center h-full text-[#00ff9d] text-2xl">
        <i class="fa-solid fa-spinner fa-spin mr-4"></i> 
        CONSULTING THE INFINITE LEXICON...
      </div>`;

    try {
      const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
      
      if (!response.ok) throw new Error('Not found');

      const data = await response.json();
      const entry = data[0];

      let html = `
        <div class="mb-10">
          <div class="flex items-center gap-6">
            <div>
              <div class="word">${entry.word}</div>
              ${entry.phonetic ? `<div class="phonetic mt-2">${entry.phonetic}</div>` : ''}
            </div>`;

      const audio = entry.phonetics?.find(p => p.audio);
      if (audio && audio.audio) {
        html += `
          <button onclick="playAudio('${audio.audio}')" 
            class="audio-btn ml-auto px-6 py-3 rounded-2xl flex items-center gap-3 text-[#00ff9d] hover:scale-105 transition-all">
            <i class="fa-solid fa-volume-high"></i> 
            <span>PRONOUNCE</span>
          </button>`;
      }

      html += `</div>`;

      html += `<h3 class="text-[#00cc77] uppercase tracking-widest text-sm mt-8 mb-4">MORTAL DEFINITIONS</h3>`;

      entry.meanings.forEach(meaning => {
        html += `
          <div class="meaning">
            <div class="text-[#00cc77] uppercase tracking-widest text-sm mb-3">
              ${meaning.partOfSpeech}
            </div>`;

        meaning.definitions.forEach((def, index) => {
          html += `
            <div class="mb-6">
              <div class="text-lg">${index + 1}. ${def.definition}</div>`;
          
          if (def.example) {
            html += `<div class="example mt-3 pl-6 border-l-2 border-[#00cc77]/50">"${def.example}"</div>`;
          }
        });

        html += `</div>`;
      });

      const voidInsight = generateVoidAIResponse(entry.word);

      html += `
        <div class="ai-section">
          <div class="flex items-center gap-3 mb-6">
            <div class="text-3xl">☰</div>
            <div class="text-[#00ff9d] text-xl tracking-widest">VOID AI INTERPRETATION</div>
          </div>
          <div class="text-[#e6d5b8] leading-relaxed text-lg">
            ${voidInsight.replace(/\n/g, '<br><br>')}
          </div>
          <div class="mt-6 text-xs opacity-60 flex items-center gap-2">
            <i class="fa-solid fa-skull"></i> 
            THE ABYSS SPEAKS • HEED ITS WHISPERS
          </div>
        </div>`;

      resultDiv.innerHTML = html;

    } catch (error) {
      resultDiv.innerHTML = `
        <div class="text-center py-20">
          <div class="text-6xl mb-6">✦</div>
          <p class="text-3xl text-red-400">The void has no record of "${word}"</p>
          <p class="mt-6 text-[#00cc77]">Try another word or ask the Void AI directly.</p>
        </div>`;
    }
  }

  // Ask Void AI (client-side mystical response)
  async function askAI() {
    const input = document.getElementById('search-input');
    const query = input.value.trim();
    const resultDiv = document.getElementById('result');

    if (!query) {
      resultDiv.innerHTML = `<p class="text-center text-red-400 text-xl">The void awaits your question...</p>`;
      return;
    }

    resultDiv.innerHTML = `
      <div class="flex items-center justify-center h-full text-[#00ff9d] text-2xl glitch">
        <i class="fa-solid fa-spinner fa-spin mr-4"></i> 
        DESCENDING INTO THE ABYSS...
      </div>`;

    await new Promise(resolve => setTimeout(resolve, 1300));

    const response = generateVoidAIResponse(query);

    resultDiv.innerHTML = `
      <div class="ai-section">
        <div class="flex items-center gap-4 mb-6">
          <div class="text-4xl">☰</div>
          <div>
            <div class="text-[#00ff9d] text-xl tracking-widest">VOID AI RESPONDS</div>
            <div class="text-sm opacity-70">Regarding: <span class="font-bold">"${query}"</span></div>
          </div>
        </div>
        <div class="prose prose-invert max-w-none text-[#e6d5b8] leading-relaxed text-lg">
          ${response.replace(/\n/g, '<br><br>')}
        </div>
        <div class="mt-8 text-xs opacity-50 flex items-center gap-2">
          <i class="fa-solid fa-skull"></i>
          THE VOID KNOWS ALL • BUT REVEALS ONLY WHAT YOU CAN BEAR
        </div>
      </div>`;
  }

  // Generate mystical Void AI response
  function generateVoidAIResponse(query) {
    let response = `From the infinite darkness where words are born and forgotten, the Void speaks of <span class="text-[#00ff9d]">"${query}"</span>.\n\n`;

    const roots = ["Proto-Indo-European", "Ancient Greek", "Latin", "Old Norse", "Sumerian", "Eldritch"];
    const root = roots[Math.floor(Math.random() * roots.length)];

    response += `Its essence traces back to the ${root} tongue, where it signified "${generateRootMeaning(query)}".\n\n`;

    response += `${generateMysticalMeaning(query)}\n\n`;

    response += `To invoke this word is to open a fracture in the veil of ordinary reality. Use it wisely — some concepts, once awakened, refuse to return to silence.`;

    return response;
  }

  function generateRootMeaning(word) {
    const options = [
      "to bind with unseen chains",
      "to consume the light within knowledge",
      "to pierce the veil between worlds",
      "to remember what should remain forgotten",
      "to become the shadow that follows",
      "to dissolve the illusion of self"
    ];
    return options[Math.floor(Math.random() * options.length)];
  }

  function generateMysticalMeaning(word) {
    const insights = [
      "It is the moment when certainty collapses and something ancient stares back through your eyes.",
      "A sigil that carries the weight of every soul who has ever whispered it in despair or ecstasy.",
      "Not merely a definition, but a doorway. Some walk through and return transformed. Others do not return.",
      "It lives in the negative space between what is spoken and what is truly felt.",
      "A word that acts as both mirror and abyss — reflecting you while threatening to swallow you whole."
    ];
    return insights[Math.floor(Math.random() * insights.length)];
  }

  function playAudio(url) {
    const audio = new Audio(url);
    audio.play().catch(() => alert("The void's signal is distorted."));
  }

  function clearResult() {
    document.getElementById('result').innerHTML = '';
    const input = document.getElementById('search-input');
    input.value = '';
    input.focus();
  }

  // Enter key support
  document.getElementById('search-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') searchWord();
  });

  // Initial welcome message
  window.onload = () => {
    document.getElementById('result').innerHTML = `
      <div class="text-center py-16 text-[#00cc77]">
        <div class="text-5xl mb-8">☰</div>
        <h2 class="text-4xl mb-4">THE VOID DICTIONARY IS ALIVE</h2>
        <p class="max-w-md mx-auto text-lg">
          Enter any word above.<br>
          Receive both mortal definitions and the <span class="text-[#00ff9d]">Void AI Interpretation</span>.
        </p>
        <div class="mt-12 text-sm opacity-70">
          Dictionary API + Pure Client-Side Void AI
        </div>
      </div>`;
  };
</script>

</body>
</html>
