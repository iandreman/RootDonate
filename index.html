<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Terminal - Accounts & Nodes Manager</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.css" />
  <style>
    body { margin: 0; background: #0d1117; color: #c9d1d9; font-family: 'Courier New', monospace; overflow: hidden; }
    #terminal { width: 100vw; height: 100vh; }
    .header {
      position: absolute; top: 10px; left: 15px; z-index: 10; font-size: 14px;
      color: #58a6ff; pointer-events: none; user-select: none;
    }
  </style>
</head>
<body>
  <div class="header">Smart Terminal v1.7 — Accounts & Nodes + Smart IP Lookup (Autosuggest)</div>
  <div id="terminal"></div>

  <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
  <script>
    const term = new Terminal({
      cursorBlink: true,
      theme: { background: '#0d1117', foreground: '#c9d1d9', cursor: '#58a6ff' },
      fontFamily: 'Courier New, monospace',
      fontSize: 15,
      scrollback: 1000,
      convertEol: true
    });

    term.open(document.getElementById('terminal'));

    term.writeln('\x1b[1;32mSmart Terminal v1.7 initialized\x1b[0m');
    term.writeln('Accounts • Nodes • Smart IP ↔ Address Lookup');
    term.writeln('Type \x1b[1;34mhelp\x1b[0m for commands\r\n');

    let commandHistory = [];
    let historyIndex = -1;
    let currentLine = '';

    let accounts = [
      'user1@example.com', 'admin@company.com', 'test@demo.local', 'support@internal.net'
    ];

    let nodes = [
      { name: 'node-01', ip: '192.168.1.101', status: 'online' },
      { name: 'node-02', ip: '192.168.1.102', status: 'online' },
      { name: 'k8s-worker-3', ip: '10.0.0.45', status: 'maintenance' },
      { name: 'db-node-prod', ip: '172.16.0.10', status: 'online' },
      { name: 'edge-node-7', ip: '203.0.113.45', status: 'online' }
    ];

    const commonTargets = [
      'google.com', 'cloudflare.com', 'github.com', 'microsoft.com', 'amazon.com',
      '8.8.8.8', '8.8.4.4', '1.1.1.1', '1.0.0.1', '9.9.9.9'
    ];

    let currentSuggestions = [];
    let suggestionIndex = -1;

    const prompt = () => {
      term.write('\r\n\x1b[1;34madmin@smart-terminal\x1b[0m:\x1b[1;32m~\x1b[0m$ ');
    };

    // ====================== IP Lookup Functions ======================
    async function dnsLookup(domain) {
      try {
        const res = await fetch(`https://dns.google/resolve?name=${encodeURIComponent(domain)}&type=A`);
        const data = await res.json();
        return data.Answer ? data.Answer.map(a => a.data) : null;
      } catch (e) { return null; }
    }

    async function ipGeoLookup(ip) {
      try {
        const res = await fetch(`https://ip-api.com/json/${encodeURIComponent(ip)}?fields=status,message,country,countryCode,regionName,city,isp,org,as,query`);
        const data = await res.json();
        return data.status === 'success' ? data : null;
      } catch (e) { return null; }
    }

    async function lookupCommand(arg) {
      if (!arg) {
        term.writeln('\r\nUsage: lookup <domain | IP | node-name>');
        return;
      }

      term.writeln(`\r\n\x1b[33mResolving ${arg}...\x1b[0m`);

      const isIp = /^(\d{1,3}\.){3}\d{1,3}$/.test(arg);
      let ips = isIp ? [arg] : await dnsLookup(arg);

      if (!ips || ips.length === 0) {
        term.writeln(`\x1b[31mCould not resolve ${arg}\x1b[0m`);
        return;
      }

      term.writeln(`\x1b[32m✓ Resolved IP(s):\x1b[0m`);
      ips.forEach(ip => term.writeln(`   • ${ip}`));

      // Show geolocation (address info) for the first IP
      const geo = await ipGeoLookup(ips[0]);
      if (geo) {
        term.writeln(`\r\n\x1b[32mLocation / Address Info for ${ips[0]}:\x1b[0m`);
        term.writeln(`  Country     : ${geo.country || 'N/A'} (${geo.countryCode || ''})`);
        term.writeln(`  City        : ${geo.city || 'N/A'}`);
        term.writeln(`  Region      : ${geo.regionName || 'N/A'}`);
        term.writeln(`  ISP         : ${geo.isp || 'N/A'}`);
        term.writeln(`  Organization: ${geo.org || 'N/A'}`);
      } else {
        term.writeln(`\r\n\x1b[33mGeolocation data unavailable (rate limit or error)\x1b[0m`);
      }
    }

    async function myIpCommand() {
      term.writeln('\r\n\x1b[33mFetching your public IP and location...\x1b[0m');
      const geo = await ipGeoLookup('');
      if (geo && geo.query) {
        term.writeln(`\x1b[32mYour Public IP : ${geo.query}\x1b[0m`);
        term.writeln(`  Country : ${geo.country || 'N/A'}`);
        term.writeln(`  City    : ${geo.city || 'N/A'}`);
        term.writeln(`  ISP     : ${geo.isp || 'N/A'}`);
      } else {
        term.writeln(`\x1b[31mFailed to fetch public IP\x1b[0m`);
      }
    }

    // ====================== Autosuggestion ======================
    function getSuggestions(partial) {
      if (!partial) return [];
      const lower = partial.toLowerCase();

      const suggestions = [];

      // Node names and IPs (best for IP ↔ address)
      nodes.forEach(node => {
        if (node.name.toLowerCase().startsWith(lower)) suggestions.push(node.name);
        if (node.ip.startsWith(lower)) suggestions.push(node.ip);
      });

      // Common targets
      commonTargets.forEach(target => {
        if (target.toLowerCase().startsWith(lower)) suggestions.push(target);
      });

      // Remove duplicates and limit
      return [...new Set(suggestions)].slice(0, 10);
    }

    const commands = {
      help: () => {
        term.writeln('\r\nAvailable Commands:');
        term.writeln('  help                  - Show this help');
        term.writeln('  clear                 - Clear screen');
        term.writeln('  list accounts         - List accounts');
        term.writeln('  list nodes            - List nodes');
        term.writeln('  lookup <target>       - Smart lookup (domain/IP/node) + location');
        term.writeln('  myip                  - Show your public IP + address info');
        term.writeln('  exit                  - Close terminal\r\n');
        term.writeln('\x1b[33mTip:\x1b[0m Type "lookup " then press Tab for smart suggestions (nodes, IPs, domains)');
      },

      // Account commands (shortened for brevity - you can expand if needed)
      'list accounts': () => {
        term.writeln('\r\nUser Accounts:');
        accounts.forEach(a => term.writeln(`  • ${a}`));
        term.writeln(`\r\nTotal: ${accounts.length}`);
      },

      // Node commands
      'list nodes': () => {
        term.writeln('\r\nManaged Nodes:');
        nodes.forEach(n => {
          const color = n.status === 'online' ? '\x1b[32m' : '\x1b[33m';
          term.writeln(`  • ${n.name.padEnd(18)} ${n.ip.padEnd(18)} ${color}[${n.status}]\x1b[0m`);
        });
      },

      // Core new commands
      lookup: (arg) => lookupCommand(arg),
      myip: () => myIpCommand(),
      clear: () => term.clear(),
      exit: () => { term.writeln('\r\nGoodbye!'); setTimeout(() => window.close(), 600); }
    };

    // ====================== Input Handler with Tab Autosuggest ======================
    term.onData((data) => {
      if (data === '\t') { // Tab = autosuggest
        const parts = currentLine.trim().split(/\s+/);
        if (parts[0].toLowerCase() === 'lookup') {
          const partial = parts.slice(1).join(' ') || '';
          currentSuggestions = getSuggestions(partial);

          if (currentSuggestions.length > 0) {
            suggestionIndex = (suggestionIndex + 1) % currentSuggestions.length;
            const suggested = currentSuggestions[suggestionIndex];

            const newLine = `lookup ${suggested}`;
            term.write('\r' + ' '.repeat(120) + '\r'); // clear current line
            prompt();
            term.write(newLine);
            currentLine = newLine;
          }
        }
        return;
      }

      // Reset suggestion index when user types
      if (data.length === 1 && data >= ' ') {
        suggestionIndex = -1;
      }

      switch (data) {
        case '\r': // Enter
          term.writeln('');
          if (currentLine.trim()) {
            commandHistory.unshift(currentLine);
            historyIndex = -1;

            const parts = currentLine.trim().split(/\s+/);
            const cmd = parts[0].toLowerCase();
            const arg = parts.slice(1).join(' ');

            if (commands[cmd]) {
              commands[cmd](arg);
            } else {
              term.writeln(`\x1b[31mUnknown command: ${cmd}\x1b[0m`);
            }
          }
          currentLine = '';
          currentSuggestions = [];
          suggestionIndex = -1;
          prompt();
          break;

        case '\u007f': // Backspace
          if (currentLine.length > 0) {
            currentLine = currentLine.slice(0, -1);
            term.write('\b \b');
          }
          break;

        case '\u001b[A': // Up
          if (historyIndex < commandHistory.length - 1) {
            historyIndex++;
            term.write('\r' + ' '.repeat(120) + '\r');
            prompt();
            currentLine = commandHistory[historyIndex];
            term.write(currentLine);
          }
          break;

        case '\u001b[B': // Down
          if (historyIndex > 0) {
            historyIndex--;
            term.write('\r' + ' '.repeat(120) + '\r');
            prompt();
            currentLine = commandHistory[historyIndex];
            term.write(currentLine);
          } else if (historyIndex === 0) {
            historyIndex = -1;
            term.write('\r' + ' '.repeat(120) + '\r');
            prompt();
            currentLine = '';
          }
          break;

        default:
          if (data.length === 1 && data >= ' ') {
            currentLine += data;
            term.write(data);
          }
      }
    });

    prompt();
    setTimeout(() => term.focus(), 100);
  </script>
</body>
</html>
