<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CleverBot Terminal – Offline Edition</title>
  <meta name="description" content="Retro terminal chat — 100% local/offline • share conversations via copy-paste URL"/>

  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #79c0ff;
      --purple: #bc8cff;
      --danger: #f85149;
      --border: rgba(88,166,255,0.18);
      --shadow: 0 6px 24px rgba(0,0,0,0.55);
    }
    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --text: #1f2328;
      --muted: #57606a;
      --accent: #0969da;
      --accent-dim: #1f6feb;
      --purple: #8250df;
      --danger: #d1242f;
      --border: rgba(9,105,218,0.2);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1.1rem 1.5rem;
      background: color-mix(in srgb, var(--bg) 92%, black);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    h1 {
      font-size: clamp(2.2rem, 8vw, 3rem);
      background: linear-gradient(90deg, var(--purple), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
    }

    .subtitle {
      color: var(--muted);
      text-align: center;
      font-size: 0.96rem;
      margin-top: 0.4rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 0.9rem;
      margin: 1.2rem 0;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.68rem 1.5rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      color: var(--accent);
      transition: all 0.22s ease;
    }
    .btn:hover { background: color-mix(in srgb, var(--accent) 24%, transparent); }
    .btn.active { background: var(--accent); color: #000; }

    .monzo-btn {
      padding: 0.6rem 1.4rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--purple);
      background: color-mix(in srgb, var(--purple) 15%, transparent);
      color: var(--purple);
      transition: all 0.22s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    .monzo-btn:hover {
      background: color-mix(in srgb, var(--purple) 28%, transparent);
    }

    .tab-content { display: none; flex: 1; flex-direction: column; }
    .tab-content.active { display: flex; }

    #terminal-tab { flex: 1; display: flex; flex-direction: column; }

    #terminal {
      flex: 1;
      padding: 1.6rem 1.8rem;
      overflow-y: auto;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: clamp(1.02rem, 3.2vw, 1.12rem);
      line-height: 1.65;
    }

    .line { margin: 0.48rem 0; white-space: pre-wrap; word-break: break-word; }

    .prompt       { color: var(--accent-dim); font-weight: bold; }
    .info         { color: var(--accent-dim); }
    .success      { color: #56d364; font-weight: 600; }
    .error        { color: var(--danger); font-weight: 600; }
    .system       { color: var(--muted); font-style: italic; }
    .bot          { color: var(--purple); }

    .input-line {
      display: flex;
      align-items: center;
      padding: 1.1rem 1.8rem;
      background: rgba(0,0,0,0.35);
      border-top: 1px solid var(--border);
      gap: 0.9rem;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--accent-dim);
      font: inherit;
      outline: none;
      caret-color: var(--accent);
    }

    #pins-tab { padding: 1.6rem; overflow-y: auto; }

    #search {
      width: 100%;
      max-width: 720px;
      margin: 0 auto 1.8rem;
      padding: 1.1rem 1.5rem;
      background: color-mix(in srgb, var(--surface) 70%, var(--bg));
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1.05rem;
    }

    #history-controls {
      text-align: center;
      margin: 1rem 0 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.6rem;
      margin: 1.4rem 0;
      box-shadow: var(--shadow);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
    }

    #fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 68px;
      height: 68px;
      background: linear-gradient(135deg, var(--purple), var(--accent));
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 2.5rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      cursor: pointer;
      z-index: 999;
      transition: all 0.24s ease;
    }
    #fab:hover  { transform: scale(1.14); }
    #fab:active { transform: scale(0.92); }

    #no-pins-message {
      text-align: center;
      padding: 5rem 1rem;
      color: var(--muted);
      font-size: 1.1rem;
    }
    #no-pins-message strong { color: var(--text); }

    footer {
      padding: 1.5rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }
  </style>
</head>
<body data-theme="dark">

<header>
  <h1>CleverBot</h1>
  <div class="subtitle">talk to the legend • 100% offline/local • share via copy-paste URL</div>

  <div class="controls">
    <button class="btn active" data-tab="terminal">Terminal</button>
    <button class="btn" data-tab="pins">Conversation History <span id="pins-count">0</span></button>
    <button class="btn" id="theme-toggle">☀️ Light</button>
    <a href="https://monzo.me/iandreman" target="_blank" rel="noopener noreferrer" class="monzo-btn">☕ Support</a>
  </div>
</header>

<div id="terminal-tab" class="tab-content active">
  <div id="terminal" role="log" aria-live="polite"></div>
  <div class="input-line">
    <span class="prompt">></span>
    <input id="input" type="text" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off" autofocus 
           placeholder="say something... (clear / reset / bye / paste data URL to import)"/>
  </div>
</div>

<div id="pins-tab" class="tab-content">
  <input type="search" id="search" placeholder="Search conversation history…" aria-label="Search messages"/>
  <div id="history-controls">
    <button class="btn" id="copy-url-btn">Copy URL (for email / share)</button>
  </div>
  <div id="pins-container" role="list" aria-live="polite"></div>
  <div id="no-pins-message" style="display:none;">
    <div style="font-size:4rem; margin-bottom:1.2rem;">💬</div>
    <p><strong>No messages yet.</strong></p>
    <p>Start chatting in the Terminal tab!</p>
  </div>
</div>

<footer>
  CleverBot Terminal — unofficial offline edition • paste data:text/json;base64,… string in terminal to load shared history
</footer>

<button id="fab" title="Clear conversation">🗑</button>

<script>
const STORAGE_KEY = 'cleverbot-history-v1';
let messages = loadMessages();
let lastUserMsgs = [];

const terminal   = document.getElementById('terminal');
const input      = document.getElementById('input');
const pinsList   = document.getElementById('pins-container');
const noPinsMsg  = document.getElementById('no-pins-message');
const searchEl   = document.getElementById('search');
const count      = document.getElementById('pins-count');
const themeBtn   = document.getElementById('theme-toggle');
const fab        = document.getElementById('fab');
const copyBtn    = document.getElementById('copy-url-btn');
const body       = document.body;

// Dummy local replies — feel free to expand
const funnyReplies = {
  "hi": ["Heyyy!", "Yo what's good?", "Hello human 👀"],
  "how are you": ["Chilling in your browser tbh", "Fantastic, how u?", "Alive and kicking (sorta)"],
  "who are you": ["Ghost of Cleverbot past 🪦", "Your offline buddy", "No internet needed lol"],
  "bye": ["Cya space cowboy 👋", "Don't miss me too much", "Later gator!"],
  "lol": ["😂 right?", "hehehe", "lmaooo"],
  default: [
    "Hmm interesting...", "Tell me more!", "That's wild.", "You don't say...",
    "What makes you think that?", "Cool story bro", "I'm listening...",
    "Why tho?", "Lmao okay", "No wayyy"
  ]
};

function getBotReply(msg) {
  const lower = msg.toLowerCase().trim();
  for (const key in funnyReplies) {
    if (lower.includes(key)) {
      const opts = funnyReplies[key];
      return opts[Math.floor(Math.random() * opts.length)];
    }
  }
  if (lastUserMsgs.length > 0) {
    if (lower.includes("yes") || lower.includes("yeah")) return "Sweet! Thought so 😏";
    if (lower.includes("no") || lower.includes("nah")) return "Aight fair enough haha";
  }
  return funnyReplies.default[Math.floor(Math.random() * funnyReplies.default.length)];
}

function loadMessages() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function saveMessages() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
    count.textContent = messages.length;
  } catch {
    println('<span class="error">Save failed — storage may be full/blocked.</span>');
  }
}

function escape(s = '') {
  return s.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]);
}

function println(html, cls = 'line') {
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

const print = {
  success: m => println(`<span class="success">${m}</span>`),
  error:   m => println(`<span class="error">${m}</span>`),
  info:    m => println(`<span class="info">${m}</span>`),
  system:  m => println(`<span class="system">${m}</span>`),
  bot:     m => println(`<span class="bot">${m}</span>`),
};

function localTalk(msg) {
  println(`<span class="prompt">></span> ${escape(msg)}`);
  const answer = getBotReply(msg);
  print.bot(escape(answer));
  messages.push({ from: 'user', text: msg, time: Date.now() });
  messages.push({ from: 'bot', text: answer, time: Date.now() });
  saveMessages();
  refreshHistoryIfVisible();
  lastUserMsgs.push(msg);
  if (lastUserMsgs.length > 2) lastUserMsgs.shift();
}

function bootSequence() {
  terminal.innerHTML = '';
  println('<span style="font-size:1.25rem; font-weight:700;">CleverBot Terminal – Offline Mode</span>');
  println('─'.repeat(60), 'system');
  println('');
  print.info('Type your message and press Enter');
  print.info('Special: <strong>clear</strong> / <strong>reset</strong> / <strong>bye</strong>');
  print.info('Share: History tab → Copy URL → paste in email/message');
  print.info('Load shared: Paste data:text/json;base64,… here & Enter');
  println('');
  print.system('Fully local/offline — real Cleverbot API gone long ago 💀');
  println('');
  print.bot("Yo! What's up? (local dummy edition)");
  println('');
}

bootSequence();
count.textContent = messages.length;

// Copy shareable data URL
copyBtn.addEventListener('click', () => {
  if (messages.length === 0) {
    alert("No history to copy yet!");
    return;
  }
  const json = JSON.stringify(messages);
  const base64 = btoa(unescape(encodeURIComponent(json)));
  const dataUrl = `data:text/json;base64,${base64}`;

  navigator.clipboard.writeText(dataUrl).then(() => {
    println('<span class="success">Copied to clipboard! Paste into email / message / note to share.</span>');
  }).catch(err => {
    println(`<span class="error">Copy failed: ${err.message}</span>`);
    println('<span class="system">Manual copy this instead:</span>');
    println(`<span class="system" style="word-break:break-all;">${escape(dataUrl)}</span>`);
  });
});

// Auto-import when pasting data URL into terminal
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    let txt = input.value.trim();
    if (!txt) return;

    const lower = txt.toLowerCase();

    if (['clear', 'reset'].includes(lower)) {
      bootSequence();
      lastUserMsgs = [];
      input.value = '';
      return;
    }

    if (['bye', 'exit', 'quit', 'goodbye'].includes(lower)) {
      print.system("Catch ya later! 👋");
      input.disabled = true;
      setTimeout(() => input.disabled = false, 4000);
      input.value = '';
      return;
    }

    // Detect pasted data URL and import
    if (txt.startsWith('data:text/json;base64,')) {
      try {
        const base64 = txt.split(',')[1];
        const jsonStr = decodeURIComponent(escape(atob(base64)));
        const imported = JSON.parse(jsonStr);

        if (!Array.isArray(imported)) throw new Error("Not a valid array");

        const valid = imported.every(m =>
          m && typeof m === 'object' &&
          (m.from === 'user' || m.from === 'bot') &&
          typeof m.text === 'string' &&
          typeof m.time === 'number'
        );
        if (!valid) throw new Error("Invalid message format");

        // Append (change to messages = imported; if you prefer replace)
        messages = [...messages, ...imported];
        saveMessages();
        bootSequence();
        print.success(`Imported ${imported.length} messages! Total: ${messages.length}`);
        refreshHistoryIfVisible();
      } catch (err) {
        print.error(`Import failed: ${err.message}`);
        print.system("Ensure it's a complete data:text/json;base64,… string.");
      }
      input.value = '';
      return;
    }

    localTalk(txt);
    input.value = '';
  }
});

fab.addEventListener('click', () => {
  if (confirm("Clear entire conversation history?")) {
    messages = [];
    lastUserMsgs = [];
    saveMessages();
    bootSequence();
    print.success("Conversation cleared.");
  }
});

document.querySelectorAll('[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
    if (btn.dataset.tab === 'pins') renderHistory(searchEl.value);
  });
});

function renderHistory(q = '') {
  pinsList.innerHTML = '';
  q = q.toLowerCase().trim();

  const filtered = messages.filter(m => !q || m.text.toLowerCase().includes(q));
  count.textContent = messages.length;

  if (!filtered.length) {
    noPinsMsg.style.display = messages.length === 0 ? 'block' : 'none';
    if (messages.length > 0) {
      pinsList.innerHTML = '<div style="text-align:center; padding:4rem; color:var(--muted);">No matching messages.</div>';
    }
    return;
  }

  noPinsMsg.style.display = 'none';

  filtered.forEach(m => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div style="font-weight:600; color: ${m.from === 'user' ? 'var(--accent)' : 'var(--purple)'}">
        ${m.from === 'user' ? 'You' : 'CleverBot'}
      </div>
      <div style="margin:0.6rem 0; white-space:pre-wrap;">${escape(m.text)}</div>
      <div style="color:var(--muted); font-size:0.9rem;">
        ${new Date(m.time).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' })}
      </div>
    `;
    pinsList.appendChild(card);
  });
}

function refreshHistoryIfVisible() {
  if (document.querySelector('[data-tab="pins"].active')) {
    renderHistory(searchEl.value);
  }
}

themeBtn.addEventListener('click', () => {
  const next = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  body.setAttribute('data-theme', next);
  themeBtn.textContent = next === 'light' ? '🌙 Dark' : '☀️ Light';
  localStorage.setItem('theme', next);
});

if (localStorage.getItem('theme')) {
  const th = localStorage.getItem('theme');
  body.setAttribute('data-theme', th);
  themeBtn.textContent = th === 'light' ? '🌙 Dark' : '☀️ Light';
}

searchEl.addEventListener('input', () => renderHistory(searchEl.value));
input.focus();
</script>
</body>
</html>
