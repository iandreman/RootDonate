<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPS Pins – Private Markers</title>
  <meta name="description" content="Save private GPS locations. 100% local storage, offline, no account needed." />

  <style>
    :root {
      --bg:        #0a0e1a;
      --surface:   #141822;
      --text:      #e0e7ff;
      --muted:     #8899aa;
      --accent:    #00d4ff;
      --accent-dim:#00ff9d;
      --purple:    #bb86fc;
      --danger:    #ff5555;
      --border:    rgba(0,212,255,0.18);
      --shadow:    0 4px 20px rgba(0,0,0,0.4);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.4rem;
      background: rgba(0,0,0,0.6);
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    h1 {
      font-size: 2.1rem;
      background: linear-gradient(90deg, var(--purple), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .subtitle { color: var(--muted); font-size: 0.95rem; margin-top: 0.5rem; }
    .tabs {
      margin: 1.2rem 0 0.8rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 0.7rem 1.6rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-weight: bold;
      transition: all 0.18s ease;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--purple), var(--accent));
      color: #000;
      border-color: transparent;
    }
    .tab-content {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .tab-content.active { display: flex; }

    #terminal-tab .terminal {
      flex: 1;
      padding: 1.3rem 1.8rem;
      overflow-y: auto;
      line-height: 1.55;
      font-size: 1rem;
    }
    .line { margin: 0.5rem 0; white-space: pre-wrap; word-break: break-word; }
    .prompt    { color: var(--accent-dim); }
    .info      { color: #00ffea; }
    .system    { color: #778899; }
    .error     { color: var(--danger); }

    .input-line {
      display: flex;
      align-items: flex-start;
      padding: 1rem 1.8rem;
      background: rgba(0,0,0,0.4);
      border-top: 1px solid var(--border);
    }
    .input-line .prompt { margin-right: 1rem; flex-shrink: 0; }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--accent);
      font: inherit;
      outline: none;
      caret-color: var(--accent);
    }
    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.3em;
      background: var(--accent);
      animation: blink 1.2s step-end infinite;
      margin-left: 5px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #pins-tab {
      padding: 1.5rem;
      overflow-y: auto;
    }
    .collection-header {
      text-align: center;
      margin: 0 0 1.6rem;
      color: var(--accent);
      font-size: 1.5rem;
    }
    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 6rem 1.5rem;
      font-size: 1.15rem;
      line-height: 1.7;
    }
    .card {
      background: rgba(20,24,34,0.97);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1.3rem 0;
      box-shadow: var(--shadow);
    }
    .pin-title { color: var(--accent); font-size: 1.4rem; margin-bottom: 0.7rem; }
    .meta {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0.8rem 0;
      display: flex;
      flex-wrap: wrap;
      gap: 1.6rem;
    }
    #search {
      width: 100%;
      max-width: 500px;
      padding: 0.9rem;
      margin: 0 auto 1.8rem;
      display: block;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
    }
    .share-row {
      margin-top: 1.2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
    }
    .action-btn, .copy-btn, .email-btn {
      padding: 0.6rem 1.1rem;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-block;
      border: 1px solid;
      font-size: 0.9rem;
    }
    .action-btn {
      background: rgba(0,212,255,0.18);
      border-color: var(--accent-dim);
      color: var(--accent);
    }
    .action-btn:hover { background: rgba(0,212,255,0.35); }
    .copy-btn {
      background: rgba(187,134,252,0.18);
      border-color: var(--purple);
      color: var(--purple);
    }
    .copy-btn:hover { background: rgba(187,134,252,0.35); }
    .copy-btn.copied {
      background: rgba(0,255,157,0.3);
      color: #00ff9d;
      border-color: #00ff9d;
    }
    .email-btn {
      background: rgba(187,134,252,0.25);
      border-color: var(--purple);
      color: var(--purple);
    }
    .email-btn:hover { background: rgba(187,134,252,0.45); }

    #fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--purple), var(--accent));
      color: #000;
      border: none;
      border-radius: 50%;
      font-size: 2.2rem;
      font-weight: bold;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      cursor: pointer;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease;
    }
    #fab:hover { transform: scale(1.1); }
    #fab:active { transform: scale(0.95); }

    @media (max-width: 560px) {
      .tabs { flex-direction: column; gap: 0.6rem; }
      .tab-btn { width: 100%; }
      .share-row { flex-direction: column; align-items: stretch; }
      .action-btn, .copy-btn, .email-btn { width: 100%; text-align: center; }
      #fab { bottom: 16px; right: 16px; width: 56px; height: 56px; font-size: 2rem; }
    }
    .line.system.live {
      background: rgba(0, 180, 120, 0.15);
      border-left: 4px solid #00ff9d;
      padding-left: 1rem;
      margin: 0.6rem 0;
    }
  </style>
</head>
<body>

<header>
  <h1>GPS Pins</h1>
  <div class="subtitle">Private markers • 100% offline • No account</div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="terminal">Terminal</button>
    <button class="tab-btn" data-tab="pins">My Pins</button>
  </div>
</header>

<div id="terminal-tab" class="tab-content active">
  <div class="terminal" id="terminal"></div>
  <div class="input-line">
    <span class="prompt">></span>
    <input id="input" type="text" autocomplete="off" spellcheck="false" autofocus>
    <span class="cursor"></span>
  </div>
</div>

<div id="pins-tab" class="tab-content">
  <div class="collection-header">My Saved Pins</div>
  <input type="text" id="search" placeholder="Search name or coordinates…">
  <div id="pins-container"></div>
</div>

<button id="fab" title="Drop pin at current location">+</button>

<script>
// ────────────────────────────────────────────────
// Utilities
// ────────────────────────────────────────────────
const STORAGE_KEY = 'gps-pins-v4';
let lastUsedName = localStorage.getItem('gps-pins-last-name') || '';

function escapeHTML(str = '') {
  const map = { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' };
  return str.replace(/[&<>"']/g, m => map[m]);
}

function getPins() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function savePins(pins) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(pins));
}

function getPinShareUrl(pin) {
  const publicPin = { id: pin.id, lat: pin.lat, lng: pin.lng, name: pin.name, time: pin.time };
  return `${location.origin}${location.pathname}#p=${btoa(JSON.stringify(publicPin))}`;
}

async function copyToClipboard(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
    const original = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = original;
      btn.classList.remove('copied');
    }, 1800);
  } catch (err) {
    console.error('Clipboard copy failed', err);
    alert('Could not copy — please select manually.');
  }
}

// ────────────────────────────────────────────────
// Terminal helpers
// ────────────────────────────────────────────────
const terminal = document.getElementById('terminal');
const inputEl  = document.getElementById('input');

function println(html, cls = 'line') {
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

function printInfo(html)  { println(html, 'line info'); }
function printError(html) { println(html, 'line error'); }
function printSystem(html){ println(html, 'line system'); }
function clearScreen()    { terminal.innerHTML = ''; }

// ────────────────────────────────────────────────
// Paste URL detection → log with current position
// ────────────────────────────────────────────────
inputEl.addEventListener('paste', function(e) {
  // We let the paste happen first, then check on Enter
  // But we can also check immediately if we want to be more proactive
});

inputEl.addEventListener('keydown', async function(e) {
  if (e.key !== 'Enter') return;

  const text = inputEl.value.trim();
  if (!text) return;

  // Very simple URL pattern (http, https, no spaces)
  const urlPattern = /^https?:\/\/[^\s/$.?#].[^\s]*$/i;

  if (urlPattern.test(text)) {
    e.preventDefault(); // stop normal command processing

    const confirmed = confirm(`Log this URL with current position?\n\n${text}`);

    if (!confirmed) {
      // User said no → treat as normal command / text
      println('> ' + escapeHTML(text), 'line prompt');
      printError("URL logging cancelled.");
      inputEl.value = '';
      inputEl.focus();
      return;
    }

    println('> ' + escapeHTML(text), 'line prompt');
    printSystem("Logging URL with current position...");

    try {
      const pos = await new Promise((resolve, reject) => {
        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: false,  // faster lookup
          timeout: 7000,
          maximumAge: 30000
        });
      });

      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);
      const acc  = Math.round(pos.coords.accuracy);

      printInfo(`URL logged with location:`);
      println(`  ${text}`, 'line info');
      println(`  ${lat}, ${lng}  (±${acc}m)`, 'line info');
      println(`  ${new Date().toLocaleString()}`, 'line system');

    } catch (err) {
      // GPS not available / denied / timeout
      printInfo(`URL logged (location unavailable):`);
      println(`  ${text}`, 'line info');
      println(`  ${new Date().toLocaleString()}`, 'line system');

      if (err.code === 1) {
        printError("→ Location permission denied");
      } else if (err.code === 3) {
        printError("→ Location timeout");
      }
    }

    inputEl.value = '';
    inputEl.focus();
    return;
  }

  // Normal command flow if not a URL
  e.preventDefault();
  println('> ' + escapeHTML(text), 'line prompt');
  handleCommand(text);
  inputEl.value = '';
  inputEl.focus();
});

// ────────────────────────────────────────────────
// (rest of your original script remains here)
// ────────────────────────────────────────────────
// Live GPS, commands, save pin, render pins, hashchange handler, boot messages...
// ... paste the rest of your <script> content here (from // Live GPS tracking down to the end)

</script>
</body>
</html>
