<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Terminal v2026 – Cleverbot</title>
  <style>
    :root {
      --bg: #000814;
      --surface: #0a0f1a;
      --text: #d8ffcc;
      --green: #39ff14;
      --purple: #c97eff;
      --accent: #00f0ff;
      --error: #ff3366;
      --muted: #5a6f8c;
      --border: #1a2b44;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Consolas, monospace;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    .crt::before {
      content: " ";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: 
        linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%),
        linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.03), rgba(0,0,255,0.03));
      background-size: 100% 4px, 4px 100%;
      z-index: 9999;
      animation: flicker 0.15s infinite;
    }

    @keyframes flicker {
      0%, 19.9%, 22%, 62.9%, 64%, 64.9%, 70%, 100% { opacity: 0.1; }
      20%, 24%, 63% { opacity: 0.3; }
    }

    header {
      background: rgba(10,14,20,0.94);
      border-bottom: 1px solid var(--border);
      padding: 1.1rem 2rem;
      backdrop-filter: blur(6px);
      position: sticky;
      top: 0;
      z-index: 100;
      text-align: center;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(2rem, 5vw, 2.5rem);
      color: var(--purple);
      text-shadow: 0 0 12px var(--purple);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.92rem;
      margin: 0.2rem 0 0.8rem;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
      margin-top: 0.4rem;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.55rem 1.1rem;
      font: inherit;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.18s;
    }

    .btn:hover, .btn:focus-visible {
      background: rgba(0,240,255,0.14);
      box-shadow: 0 0 0 3px rgba(0,240,255,0.18);
      outline: none;
    }

    .terminal {
      max-width: 980px;
      margin: 1.6rem auto;
      border: 2px solid var(--border);
      border-radius: 9px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: 0 0 44px rgba(0,240,255,0.11);
    }

    #output {
      padding: 1.7rem;
      min-height: 58vh;
      max-height: 76vh;
      overflow-y: auto;
      font-size: 1.14rem;
      line-height: 1.58;
    }

    .line {
      margin: 0.55rem 0;
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
      padding-right: 150px;
      display: flex;
      align-items: flex-start;
      gap: 0.9rem;
    }

    .line:hover .msg-actions,
    .line:focus-within .msg-actions {
      opacity: 1;
      pointer-events: auto;
    }

    .msg-actions {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
      position: absolute;
      right: 1.7rem;
      top: 0.35rem;
      display: flex;
      gap: 0.7rem;
    }

    .msg-btn {
      background: rgba(0,240,255,0.09);
      border: 1px solid var(--muted);
      color: var(--muted);
      padding: 0.28rem 0.65rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.84rem;
      transition: all 0.16s;
    }

    .msg-btn:hover {
      background: rgba(0,240,255,0.24);
      color: var(--accent);
      border-color: var(--accent);
    }

    .prompt  { color: var(--green); font-weight: bold; min-width: 120px; flex-shrink: 0; }
    .bot     { color: var(--purple); }
    .success { color: var(--green); }
    .error   { color: var(--error); }
    .muted   { color: var(--muted); }

    .typing {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      border-right: 0.16em solid var(--green);
      animation: typing 2.6s steps(26, end) forwards, blink 0.68s step-end infinite;
    }

    @keyframes typing { from { width: 0 } to { width: 21ch } }
    @keyframes blink  { 50% { border-color: transparent; } }

    .glitch {
      position: relative;
      animation: glitch-skew 4s infinite linear alternate-reverse;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      opacity: 0.75;
    }

    .glitch::before {
      left: 2px;
      text-shadow: -2px 0 var(--accent);
      animation: glitch-anim 3s infinite steps(5);
    }

    .glitch::after {
      left: -2px;
      text-shadow: 2px 0 var(--error);
      animation: glitch-anim2 4.2s infinite steps(5);
    }

    /* keep your original glitch keyframes */

    .input-area {
      display: flex;
      align-items: center;
      padding: 1.1rem 1.7rem;
      background: rgba(0,0,0,0.5);
      border-top: 1px solid var(--border);
      gap: 0.7rem;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font: inherit;
      font-size: 1.14rem;
      outline: none;
      caret-color: var(--accent);
    }

    #input::placeholder { color: var(--muted); opacity: 0.65; }
  </style>
</head>
<body class="crt">

<header>
  <h1>Smart Terminal</h1>
  <div class="subtitle">
    Cleverbot OS • March 2026 • Neural Link v3.1.7
  </div>
  <div class="actions">
    <button class="btn" id="exportBtn" aria-label="Copy full conversation link">Copy Full Link</button>
    <button class="btn" id="emailBtn"  aria-label="Email full conversation link">Email Full Conversation</button>
  </div>
</header>

<main>
  <div class="terminal" role="log" aria-live="polite">
    <div id="output">
      <div class="line success">╔════════════════════════════════════════════╗</div>
      <div class="line success">║        SMART TERMINAL  –  CLEVERBOT        ║</div>
      <div class="line success">╚════════════════════════════════════════════╝</div>
      <div class="line"></div>
      <div class="line">> <span class="typing">INITIALIZING NEURAL CORE...</span></div>
      <div class="line"></div>
      <div class="line muted">commands: clear • help • exit • import • export</div>
    </div>

    <div class="input-area">
      <label for="input" class="prompt">root@void:~#</label>
      <input id="input" autocomplete="off" autofocus placeholder="Enter message or command..." />
    </div>
  </div>
</main>

<script>
const output = document.getElementById('output');
const input  = document.getElementById('input');
const exportBtn = document.getElementById('exportBtn');
const emailBtn  = document.getElementById('emailBtn');

let messages = JSON.parse(localStorage.getItem('smartTerminalHistory') || '[]');

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[m]);
}

function println(html, cls = 'line') {
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
  return div;
}

function addMessageActions(lineEl, rawContent) {
  if (!rawContent?.trim()) return;

  const actions = document.createElement('div');
  actions.className = 'msg-actions';
  actions.setAttribute('aria-label', 'Message actions');

  const copyBtn = document.createElement('button');
  copyBtn.className = 'msg-btn';
  copyBtn.textContent = 'Copy';
  copyBtn.type = 'button';
  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(rawContent).then(() => {
      const orig = copyBtn.textContent;
      copyBtn.textContent = 'Copied!';
      setTimeout(() => copyBtn.textContent = orig, 1800);
    }).catch(() => {
      copyBtn.textContent = 'Failed';
      setTimeout(() => copyBtn.textContent = 'Copy', 2000);
    });
  });

  const emailBtn = document.createElement('button');
  emailBtn.className = 'msg-btn';
  emailBtn.textContent = 'Email';
  emailBtn.type = 'button';
  emailBtn.addEventListener('click', () => {
    const subject = "Smart Terminal Message – March 2026";
    const body = `Message from session:\n\n${rawContent}\n\n`;
    window.open(`mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`, '_blank');
  });

  actions.append(copyBtn, emailBtn);
  lineEl.appendChild(actions);
}

function botReply(text, glitch = false) {
  const cls = glitch ? 'bot glitch' : 'bot';
  const attr = glitch ? ` data-text="${escapeHtml(text)}"` : '';
  const line = println(`<span class="${cls}"${attr}>CLEVERBOT:</span> ${escapeHtml(text)}`);
  addMessageActions(line, text);
  messages.push({ from: 'bot', text, glitch, time: Date.now() });
  save();
}

function save() {
  localStorage.setItem('smartTerminalHistory', JSON.stringify(messages));
}

function createImportUrl() {
  if (!messages.length) return null;
  const json = JSON.stringify(messages);
  const base64 = btoa(unescape(encodeURIComponent(json)));
  return `data:text/json;base64,${base64}`;
}

// Boot animation
setTimeout(() => {
  document.querySelector('.typing')?.remove();
  println('<span class="success">NEURAL CORE ONLINE – READY</span>');
}, 3600);

// Restore previous messages (with actions + glitch support)
if (messages.length) {
  setTimeout(() => {
    messages.forEach(m => {
      let line;
      if (m.from === 'user') {
        line = println(`<span class="prompt">root@void:~#</span> ${escapeHtml(m.text)}`);
      } else {
        const cls = m.glitch ? 'bot glitch' : 'bot';
        const attr = m.glitch ? ` data-text="${escapeHtml(m.text)}"` : '';
        line = println(`<span class="${cls}"${attr}>CLEVERBOT:</span> ${escapeHtml(m.text)}`);
      }
      addMessageActions(line, m.text);
    });
    botReply(`Session restored (${messages.length} messages loaded).`);
  }, 4200);
}

// Full export / email
function handleExport(isCopy = true) {
  const url = createImportUrl();
  if (!url) {
    botReply("No messages to share yet.");
    return;
  }
  if (isCopy) {
    navigator.clipboard.writeText(url).then(() => {
      botReply("Full conversation link copied.");
    }).catch(() => {
      botReply("Copy failed. Link:");
      println(`<span class="success">${url}</span>`);
    });
  } else {
    const subject = "Smart Terminal Conversation – March 2026";
    const body = `My Cleverbot session:\n\n${url}\n\nPaste into terminal to restore.`;
    window.open(`mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`, '_blank');
    botReply("Opening email with link…");
  }
}

exportBtn.addEventListener('click', () => handleExport(true));
emailBtn.addEventListener('click', () => handleExport(false));

// Input handling
input.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();

  const txt = input.value.trim();
  if (!txt) return;

  const line = println(`<span class="prompt">root@void:~#</span> ${escapeHtml(txt)}`);
  addMessageActions(line, txt);
  messages.push({ from: 'user', text: txt, time: Date.now() });
  save();

  const cmd = txt.toLowerCase();

  if (cmd === 'clear') {
    output.innerHTML = '';
    messages = [];
    save();
    println('<span class="success">Terminal cleared.</span>');
  }
  else if (cmd === 'help') {
    println('<span class="muted">Commands: clear • help • exit • import • export</span>');
    println('<span class="muted">Paste data:text/json;base64,… link to import session</span>');
    println('<span class="muted">Hover any message → copy or email that single entry</span>');
  }
  else if (['exit','quit','bye'].includes(cmd)) {
    botReply("Goodbye. Refresh to begin new session.");
    input.disabled = true;
  }
  else if (cmd.includes('export') || cmd.includes('save') || cmd.includes('分享')) {
    handleExport(true);
  }
  else if (txt.startsWith('data:text/json;base64,')) {
    try {
      const base64 = txt.split(',')[1];
      const json = decodeURIComponent(escape(atob(base64)));
      const imported = JSON.parse(json);
      if (Array.isArray(imported)) {
        messages.push(...imported);
        save();
        botReply("Manual import successful.", true);
        botReply(`Added ${imported.length} messages.`, true);
        // Re-render last imported messages with actions
        setTimeout(() => {
          imported.slice(-6).forEach(m => {
            let line;
            if (m.from === 'user') {
              line = println(`<span class="prompt">root@void:~#</span> ${escapeHtml(m.text)}`);
            } else {
              const cls = m.glitch ? 'bot glitch' : 'bot';
              const attr = m.glitch ? ` data-text="${escapeHtml(m.text)}"` : '';
              line = println(`<span class="${cls}"${attr}>CLEVERBOT:</span> ${escapeHtml(m.text)}`);
            }
            addMessageActions(line, m.text);
          });
        }, 600);
      }
    } catch (err) {
      botReply("Import failed – invalid data.", true);
    }
  }
  else {
    const casual = ['ok', 'got it', 'understood', 'noted', 'cool', 'nice', 'same', '👀'];
    botReply(casual[Math.floor(Math.random() * casual.length)]);
  }

  input.value = '';
  input.focus();
});
</script>
</body>
</html>
