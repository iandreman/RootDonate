<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GPS Pins – Private Markers + URLs</title>
  <meta name="description" content="Save private GPS locations & URLs. 100% local, offline, no account." />

  <style>
    :root {
      --bg:        #0a0e1a;
      --surface:   #141822;
      --text:      #e0e7ff;
      --muted:     #8899aa;
      --accent:    #00d4ff;
      --accent-dim:#00ff9d;
      --purple:    #bb86fc;
      --danger:    #ff5555;
      --border:    rgba(0,212,255,0.18);
      --shadow:    0 4px 20px rgba(0,0,0,0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 1.4rem;
      background: rgba(0,0,0,0.6);
      border-bottom: 1px solid var(--border);
      text-align: center;
    }

    h1 {
      font-size: 2.1rem;
      background: linear-gradient(90deg, var(--purple), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-top: 0.5rem;
    }

    .tabs {
      margin: 1.2rem 0 0.8rem;
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 0.7rem 1.6rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-weight: bold;
      transition: all 0.18s ease;
      position: relative;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--purple), var(--accent));
      color: #000;
      border-color: transparent;
    }

    .tab-btn .badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: var(--accent-dim);
      color: #000;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 10px;
      min-width: 16px;
      text-align: center;
      box-shadow: 0 0 6px rgba(0,255,157,0.5);
      display: none;
    }

    .tab-content {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .tab-content.active {
      display: flex;
    }

    #terminal-tab .terminal {
      flex: 1;
      padding: 1.3rem 1.8rem;
      overflow-y: auto;
      line-height: 1.55;
      font-size: 1rem;
    }

    .line {
      margin: 0.4rem 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .prompt    { color: var(--accent-dim); }
    .info      { color: #00ffea; }
    .system    { color: #778899; }
    .error     { color: var(--danger); }
    .success   { color: var(--accent-dim); font-weight: bold; }

    .storage-warning {
      background: rgba(255,85,85,0.15);
      border: 1px solid var(--danger);
      color: #ffaaaa;
      padding: 1rem;
      margin: 1.2rem;
      border-radius: 8px;
      text-align: center;
    }

    .input-line {
      display: flex;
      align-items: center;
      padding: 1rem 1.8rem;
      background: rgba(0,0,0,0.4);
      border-top: 1px solid var(--border);
      gap: 0.8rem;
    }

    .input-line .prompt { flex-shrink: 0; }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--accent);
      font: inherit;
      outline: none;
      caret-color: var(--accent);
      min-width: 0;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 1.3em;
      background: var(--accent);
      animation: blink 1.2s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    #pins-tab {
      padding: 1.5rem;
      overflow-y: auto;
    }

    .collection-header {
      text-align: center;
      margin: 0 0 1.6rem;
      color: var(--accent);
      font-size: 1.5rem;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 8rem 1.5rem;
      font-size: 1.2rem;
      line-height: 1.6;
    }

    .card {
      background: rgba(20,24,34,0.97);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1.3rem 0;
      box-shadow: var(--shadow);
      transition: transform 0.15s ease;
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .pin-title {
      color: var(--accent);
      font-size: 1.4rem;
      margin-bottom: 0.7rem;
      word-break: break-all;
    }

    .url-pin .pin-title {
      color: var(--purple);
    }

    .meta {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0.8rem 0;
      display: flex;
      flex-wrap: wrap;
      gap: 1.6rem;
    }

    #search {
      width: 100%;
      max-width: 500px;
      padding: 0.9rem;
      margin: 0 auto 1.8rem;
      display: block;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
    }

    .share-row {
      margin-top: 1.2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      align-items: center;
    }

    .action-btn,
    .copy-btn,
    .email-btn,
    .open-url-btn,
    .refresh-btn {
      padding: 0.6rem 1.3rem;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-block;
      border: 1px solid;
      font-size: 0.9rem;
    }

    .action-btn {
      background: rgba(0,212,255,0.18);
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    .action-btn:hover {
      background: rgba(0,212,255,0.35);
    }

    .copy-btn {
      background: rgba(187,134,252,0.18);
      border-color: var(--purple);
      color: var(--purple);
    }

    .copy-btn:hover {
      background: rgba(187,134,252,0.35);
    }

    .copy-btn.copied {
      background: rgba(0,255,157,0.3);
      color: #00ff9d;
      border-color: #00ff9d;
    }

    .email-btn,
    .open-url-btn {
      background: rgba(187,134,252,0.25);
      border-color: var(--purple);
      color: var(--purple);
    }

    .email-btn:hover,
    .open-url-btn:hover {
      background: rgba(187,134,252,0.45);
    }

    .refresh-btn {
      background: rgba(0,255,157,0.18);
      border-color: var(--accent-dim);
      color: var(--accent-dim);
      margin: 1rem auto;
      display: block;
    }

    #fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--purple), var(--accent));
      color: #000;
      border: none;
      border-radius: 50%;
      font-size: 2.2rem;
      font-weight: bold;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
      cursor: pointer;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease;
    }

    #fab:hover { transform: scale(1.1); }
    #fab:active { transform: scale(0.95); }

    @media (max-width: 560px) {
      .tabs { flex-direction: column; gap: 0.6rem; }
      .tab-btn { width: 100%; }
      .share-row { flex-direction: column; align-items: stretch; }
      .action-btn, .copy-btn, .email-btn, .open-url-btn { width: 100%; text-align: center; }
      #fab { bottom: 16px; right: 16px; width: 56px; height: 56px; font-size: 2rem; }
      .input-line { flex-direction: column; align-items: flex-start; padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>GPS Pins</h1>
  <div class="subtitle">Private markers + URLs • 100% offline • local only</div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="terminal">Terminal</button>
    <button class="tab-btn" data-tab="pins">
      My Pins <span class="badge" id="pins-count">0</span>
    </button>
  </div>
</header>

<div id="terminal-tab" class="tab-content active">
  <div class="terminal" id="terminal"></div>
  <div class="input-line">
    <span class="prompt">></span>
    <input id="input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus />
    <span class="cursor"></span>
  </div>
</div>

<div id="pins-tab" class="tab-content">
  <div class="collection-header">My Saved Pins & URLs</div>

  <div id="storage-error" class="storage-warning" style="display:none;">
    <strong>⚠️ Storage access failed</strong><br />
    May be full, blocked, or you're in private/incognito mode.<br />
    Try a normal tab or free up some space.
  </div>

  <input type="text" id="search" placeholder="Search name, URL or coordinates…" />

  <button class="refresh-btn">↻ Refresh list</button>

  <div id="pins-container"></div>
</div>

<button id="fab" title="Save current location">+</button>

<script>
// ────────────────────────────────────────────────
// Core utilities
// ────────────────────────────────────────────────
const STORAGE_KEY = 'gps-pins-v7';
let lastUsedName = localStorage.getItem('gps-pins-last-name') || '';

function escapeHTML(str = '') {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
  return str.replace(/[&<>"']/g, m => map[m]);
}

function getPins() {
  try {
    const data = localStorage.getItem(STORAGE_KEY);
    if (!data) return [];
    const parsed = JSON.parse(data);
    return Array.isArray(parsed) ? parsed : [];
  } catch (err) {
    console.error('localStorage read failed:', err);
    document.getElementById('storage-error').style.display = 'block';
    return [];
  }
}

function savePins(pins) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(pins));
    updatePinsCount();
    document.getElementById('storage-error')?.style.display = 'none';
    return true;
  } catch (err) {
    console.error('localStorage write failed:', err);
    alert('Save failed — storage may be full, blocked, or in private mode.\nTry removing old pins or using normal mode.');
    return false;
  }
}

function updatePinsCount() {
  const count = getPins().length;
  const badge = document.getElementById('pins-count');
  badge.textContent = count;
  badge.style.display = count > 0 ? 'inline' : 'none';
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
}

function getPinShareUrl(pin) {
  const publicPin = {
    id: pin.id,
    lat: pin.lat,
    lng: pin.lng,
    name: pin.name,
    url: pin.url || null,
    time: pin.time,
  };
  return `${location.origin}${location.pathname}#p=${btoa(JSON.stringify(publicPin))}`;
}

async function copyToClipboard(text, button) {
  try {
    await navigator.clipboard.writeText(text);
    const original = button.textContent;
    button.textContent = 'Copied!';
    button.classList.add('copied');
    setTimeout(() => {
      button.textContent = original;
      button.classList.remove('copied');
    }, 1800);
  } catch {
    alert('Clipboard access failed — copy manually.');
  }
}

// ────────────────────────────────────────────────
// Auto-import from #p=... hash
// ────────────────────────────────────────────────
function tryImportSharedPin() {
  const hash = location.hash;
  if (!hash.startsWith('#p=')) return;

  try {
    const encoded = hash.slice(3);
    const json = atob(encoded);
    const data = JSON.parse(json);

    if (!data.id || !data.time || data.lat == null || data.lng == null) return;

    const pins = getPins();
    if (pins.some(p => p.id === data.id)) {
      history.replaceState(null, null, location.pathname);
      return;
    }

    const newPin = {
      id: data.id,
      name: data.name || `Shared pin ${new Date(data.time).toLocaleDateString()}`,
      lat: Number(data.lat),
      lng: Number(data.lng),
      accuracy: data.accuracy ?? null,
      time: data.time,
      url: data.url || null,
      imported: true,
    };

    pins.push(newPin);
    if (savePins(pins)) {
      printSuccess(`Imported shared pin → ${escapeHTML(newPin.name)}`);
      document.querySelector('.tab-btn[data-tab="pins"]').click();
      history.replaceState(null, null, location.pathname);
    }
  } catch (err) {
    console.warn('Failed to import shared pin:', err);
    printError('Failed to import shared pin (invalid or corrupted link)');
  }
}

window.addEventListener('hashchange', tryImportSharedPin);

// ────────────────────────────────────────────────
// Terminal helpers
// ────────────────────────────────────────────────
const terminal = document.getElementById('terminal');
const inputEl  = document.getElementById('input');

function println(html, className = 'line') {
  const div = document.createElement('div');
  div.className = className;
  div.innerHTML = html;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

function printInfo(msg)    { println(msg, 'line info');    }
function printError(msg)   { println(msg, 'line error');   }
function printSystem(msg)  { println(msg, 'line system');  }
function printSuccess(msg) { println(msg, 'line success'); }
function clearScreen()     { terminal.innerHTML = ''; }

function showBootMessages() {
  printSystem('GPS Pins  •  local storage only');
  printSystem('────────────────────────────────────────');
  printInfo('Paste https:// URL           → auto-save as pin');
  printInfo('Click + button                → save current location');
  printInfo('Open shared #p=... link       → auto-import');
  printInfo("Type 'help'                   → show commands");
  println('');
  printSystem(`Last used name: ${lastUsedName || '(none)'}`);
}

showBootMessages();

// ────────────────────────────────────────────────
// Tab switching
// ────────────────────────────────────────────────
function switchTab(tabId) {
  document.querySelectorAll('.tab-btn, .tab-content').forEach(el => el.classList.remove('active'));

  document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
  document.getElementById(`${tabId}-tab`).classList.add('active');

  if (tabId === 'pins') {
    renderPins(searchInput.value);
  }
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

// ────────────────────────────────────────────────
// Pins rendering
// ────────────────────────────────────────────────
const pinsContainer = document.getElementById('pins-container');
const searchInput   = document.getElementById('search');

function renderPins(filter = '') {
  const pins = getPins();
  pinsContainer.innerHTML = '';

  const term = filter.toLowerCase().trim();
  const filtered = pins.filter(p =>
    (p.name || '').toLowerCase().includes(term) ||
    (p.url  || '').toLowerCase().includes(term) ||
    String(p.lat || '').includes(term) ||
    String(p.lng || '').includes(term)
  );

  if (!filtered.length) {
    pinsContainer.innerHTML = `
      <div class="empty-state">
        📍 No pins saved yet<br><br>
        • Paste a https:// URL in the terminal<br>
        • Click the + button to save your current location<br>
        • Open a shared #p=... link to import
      </div>`;
    return;
  }

  filtered.forEach(pin => {
    const isUrlPin = !!pin.url;
    const shareUrl = getPinShareUrl(pin);
    const mapsUrl = pin.lat && pin.lng
      ? `https://www.google.com/maps/search/?api=1&query=${pin.lat},${pin.lng}`
      : null;

    const subject = encodeURIComponent(`Check out: ${pin.name || (isUrlPin ? 'Saved URL' : '(Unnamed)')}`);
    let body = `${pin.name || (isUrlPin ? 'Saved URL' : '(Unnamed pin)')}\n\n`;
    if (isUrlPin) body += `🔗 URL: ${pin.url}\n\n`;
    if (pin.lat && pin.lng) {
      body += `📍 ${pin.lat.toFixed(6)}, ${pin.lng.toFixed(6)}\n`;
      body += `View: ${mapsUrl}\nAccuracy: ±${Math.round(pin.accuracy || 0)} m\n`;
    }
    body += `Saved: ${new Date(pin.time).toLocaleString()}\n\nOpen: ${shareUrl}`;

    const mailto = `mailto:?subject=${subject}&body=${encodeURIComponent(body)}`;

    const card = document.createElement('div');
    card.className = `card ${isUrlPin ? 'url-pin' : ''} ${pin.imported ? 'imported' : ''}`;

    let title = escapeHTML(pin.name || (isUrlPin ? 'URL Pin' : '(Unnamed)'));
    if (isUrlPin) {
      title = `<a href="${escapeHTML(pin.url)}" target="_blank" style="color:var(--purple); text-decoration:underline;">${title}</a>`;
    }

    card.innerHTML = `
      <div class="pin-title">${isUrlPin ? '🔗 ' : '📍 '}${title}${pin.imported ? ' <small>(imported)</small>' : ''}</div>
      <div class="meta">
        ${pin.lat && pin.lng ? `<span>📍 ${pin.lat.toFixed(6)}, ${pin.lng.toFixed(6)}</span>` : '<span>🌐 No location</span>'}
        ${pin.lat && pin.lng ? `<span>±${Math.round(pin.accuracy || 0)} m</span>` : ''}
        <span>${new Date(pin.time).toLocaleString()}</span>
      </div>
      ${isUrlPin ? `
        <div style="margin:1rem 0 0.8rem;">
          <a href="${escapeHTML(pin.url)}" target="_blank" class="open-url-btn">→ Open URL</a>
        </div>` : ''}
      <div class="share-row">
        <button class="action-btn copy-btn" data-copy="${shareUrl}">Copy share link</button>
        <a href="${mailto}" class="action-btn email-btn" target="_blank">Share via Email</a>
      </div>
    `;

    card.querySelector('.copy-btn')?.addEventListener('click', e => {
      copyToClipboard(e.target.dataset.copy, e.target);
    });

    pinsContainer.appendChild(card);
  });
}

searchInput.addEventListener('input', e => renderPins(e.target.value));
document.querySelector('.refresh-btn').addEventListener('click', () => renderPins(searchInput.value));

// ────────────────────────────────────────────────
// Save current location (FAB)
// ────────────────────────────────────────────────
document.getElementById('fab').addEventListener('click', async () => {
  const defaultName = lastUsedName || `Pin ${getPins().length + 1}`;
  const name = prompt('Name for this pin?', defaultName);
  if (name === null) return;

  const trimmed = name.trim();
  if (trimmed) {
    lastUsedName = trimmed;
    localStorage.setItem('gps-pins-last-name', lastUsedName);
  }

  try {
    const pos = await new Promise((resolve, reject) =>
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: true,
        timeout: 12000,
        maximumAge: 0,
      })
    );

    const pin = {
      id: generateId(),
      name: trimmed || `Pin ${Date.now()}`,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      accuracy: Math.round(pos.coords.accuracy),
      time: Date.now(),
    };

    const pins = getPins();
    pins.push(pin);

    if (savePins(pins)) {
      printSuccess(`Saved → ${escapeHTML(pin.name)} @ ${pin.lat.toFixed(6)}, ${pin.lng.toFixed(6)}`);
      switchTab('pins');
    }
  } catch (err) {
    printError('Location access failed.');
    if (err.code === 1) printError('→ Permission denied');
    if (err.code === 3) printError('→ Timeout — try again');
    console.error(err);
  }
});

// ────────────────────────────────────────────────
// Terminal command handler
// ────────────────────────────────────────────────
function handleCommand(input) {
  const parts = input.trim().split(/\s+/);
  const cmd = parts[0]?.toLowerCase();
  const arg = parts.slice(1).join(' ').trim();

  if (cmd === 'help') {
    printInfo('Available commands:');
    printInfo('  help       → this help');
    printInfo('  list       → show all saved pins');
    printInfo('  clear      → clear terminal screen');
    printInfo('  clear all  → delete ALL pins (with confirmation)');
    println('');
    printInfo('Other ways to save:');
    printInfo('  • Paste https:// URL directly');
    printInfo('  • Click + button to save location');
    printInfo('  • Open #p=... shared link to import');
    return;
  }

  if (cmd === 'list') {
    const pins = getPins();
    if (!pins.length) return printInfo('No pins saved yet.');
    printInfo(`Total pins: ${pins.length}`);
    pins.forEach(p => {
      let line = `• ${escapeHTML(p.name || '(Unnamed)')} `;
      if (p.url) line += '[URL] ';
      if (p.lat && p.lng) line += `${p.lat.toFixed(6)}, ${p.lng.toFixed(6)} `;
      line += `(${new Date(p.time).toLocaleDateString()})`;
      if (p.imported) line += ' [imported]';
      println(line, 'line info');
    });
    return;
  }

  if (cmd === 'clear' && arg === 'all') {
    if (confirm('Delete ALL saved pins & URLs?\nThis cannot be undone.')) {
      savePins([]);
      renderPins();
      printSystem('All pins cleared.');
    }
    return;
  }

  if (cmd === 'clear') {
    clearScreen();
    showBootMessages();
    return;
  }

  printError(`Unknown command: ${escapeHTML(cmd)}`);
  printInfo("Type 'help' for commands.");
}

// ────────────────────────────────────────────────
// Terminal input
// ────────────────────────────────────────────────
inputEl.addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  const text = inputEl.value.trim();
  if (!text) return;

  const urlPattern = /^https?:\/\/[^\s/$.?#].[^\s]*$/i;

  if (urlPattern.test(text)) {
    e.preventDefault();
    println('> ' + escapeHTML(text), 'line prompt');

    const pin = {
      id: generateId(),
      name: text.substring(0, 80) + (text.length > 80 ? '…' : ''),
      url: text,
      lat: null,
      lng: null,
      accuracy: null,
      time: Date.now(),
    };

    const pins = getPins();
    pins.push(pin);

    if (savePins(pins)) {
      printSuccess(`URL saved → ${escapeHTML(pin.name)}`);
      println(`  ${pin.url}`, 'line info');
      switchTab('pins');
    }

    inputEl.value = '';
    inputEl.focus();
    return;
  }

  // Command mode
  e.preventDefault();
  println('> ' + escapeHTML(text), 'line prompt');
  handleCommand(text);

  inputEl.value = '';
  inputEl.focus();
});

// ────────────────────────────────────────────────
// Init
// ────────────────────────────────────────────────
updatePinsCount();
tryImportSharedPin();
inputEl.focus();
</script>
</body>
</html>
