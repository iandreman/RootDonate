<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok - Free Version</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f0f23, #1a1a2e);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .chat-container {
      max-width: 800px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .message {
      animation: fadeIn 0.3s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .grok-bubble {
      background: linear-gradient(135deg, #00f5ff, #7209b7);
      color: white;
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<div class="chat-container mx-auto">

  <!-- Header -->
  <div class="bg-zinc-900 border-b border-zinc-800 p-4 flex items-center gap-3">
    <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-2xl flex items-center justify-center text-2xl font-bold">
      G
    </div>
    <div>
      <h1 class="text-2xl font-bold tracking-tight">Grok</h1>
      <p class="text-xs text-emerald-400 flex items-center gap-1">
        <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
        Free Version • Always Ready
      </p>
    </div>
  </div>

  <!-- Chat Area -->
  <div id="chat" class="flex-1 overflow-y-auto p-6 space-y-8 bg-zinc-950">
    
    <!-- Welcome Message -->
    <div class="message max-w-3xl mx-auto">
      <div class="flex gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-2xl font-bold">
          G
        </div>
        <div class="bg-zinc-900 rounded-3xl rounded-tl-none px-6 py-4">
          <p class="text-lg">Hello! I'm Grok — built by xAI.</p>
          <p class="text-zinc-400 mt-2">How can I help you today? Ask me anything.</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Input Area -->
  <div class="p-6 bg-zinc-900 border-t border-zinc-800">
    <div class="max-w-3xl mx-auto">
      <form id="chat-form" class="relative">
        <textarea 
          id="user-input"
          rows="1"
          class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-4 pr-16 text-white placeholder-zinc-500 focus:outline-none focus:border-purple-500 resize-none"
          placeholder="Ask Grok anything..."></textarea>
        
        <button 
          type="submit"
          class="absolute right-4 bottom-4 w-10 h-10 bg-gradient-to-br from-cyan-400 to-purple-600 hover:from-cyan-500 hover:to-purple-700 rounded-2xl flex items-center justify-center transition-all active:scale-90">
          <i class="fa-solid fa-paper-plane text-white"></i>
        </button>
      </form>
      
      <p class="text-center text-zinc-500 text-xs mt-3">
        This is a free HTML demo • No real AI backend connected
      </p>
    </div>
  </div>

</div>

<script>
const chat = document.getElementById('chat');
const form = document.getElementById('chat-form');
const input = document.getElementById('user-input');

function addMessage(text, isUser) {
  const messageDiv = document.createElement('div');
  messageDiv.className = `message max-w-3xl mx-auto ${isUser ? 'ml-auto' : ''}`;
  
  if (isUser) {
    messageDiv.innerHTML = `
      <div class="flex justify-end gap-4">
        <div class="bg-violet-600 text-white rounded-3xl rounded-tr-none px-6 py-4 max-w-[80%]">
          <p>${text}</p>
        </div>
      </div>
    `;
  } else {
    messageDiv.innerHTML = `
      <div class="flex gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-2xl font-bold">
          G
        </div>
        <div class="bg-zinc-900 rounded-3xl rounded-tl-none px-6 py-4 max-w-[80%]">
          <p>${text}</p>
        </div>
      </div>
    `;
  }
  
  chat.appendChild(messageDiv);
  chat.scrollTop = chat.scrollHeight;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const question = input.value.trim();
  if (!question) return;

  // Add user message
  addMessage(question, true);
  input.value = '';

  // Simulate Grok thinking
  const thinkingDiv = document.createElement('div');
  thinkingDiv.id = 'thinking';
  thinkingDiv.className = 'message max-w-3xl mx-auto';
  thinkingDiv.innerHTML = `
    <div class="flex gap-4">
      <div class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-purple-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-2xl font-bold">
        G
      </div>
      <div class="bg-zinc-900 rounded-3xl rounded-tl-none px-6 py-4">
        <div class="flex items-center gap-2 text-zinc-400">
          <i class="fa-solid fa-circle animate-pulse"></i>
          <span>Grok is thinking...</span>
        </div>
      </div>
    </div>
  `;
  chat.appendChild(thinkingDiv);
  chat.scrollTop = chat.scrollHeight;

  // Simulate response delay
  setTimeout(() => {
    thinkingDiv.remove();
    
    const responses = [
      "That's an interesting question! Here's my take...",
      "Great question. Let me explain...",
      "I love questions like this. Here's what I think:",
      "Fascinating! Here's my response:"
    ];
    
    const randomResponse = responses[Math.floor(Math.random() * responses.length)];
    
    addMessage(`${randomResponse}<br><br>This is a static HTML demo. In the real Grok, this would be a proper AI response from xAI's models.`, false);
  }, 1200);
});

// Auto-resize textarea
input.addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});

// Allow sending with Enter (but Shift+Enter for new line)
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    form.dispatchEvent(new Event('submit'));
  }
});
</script>

</body>
</html>
