<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPS Pins – Private Markers & URLs</title>
  <meta name="description" content="Save GPS locations & URLs privately. 100% local, offline."/>

  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent-dim: #79c0ff;
      --purple: #bc8cff;
      --danger: #f85149;
      --border: rgba(88,166,255,0.2);
      --shadow: 0 6px 24px rgba(0,0,0,0.5);
    }
    [data-theme="light"] {
      --bg: #ffffff;
      --surface: #f6f8fa;
      --text: #24292f;
      --muted: #57606a;
      --accent: #0969da;
      --accent-dim: #1f6feb;
      --purple: #8250df;
      --danger: #cf222e;
      --border: rgba(9,105,218,0.15);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 1rem 1.5rem;
      background: rgba(13,17,23,0.7);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    h1 {
      font-size: clamp(1.9rem, 6vw, 2.4rem);
      background: linear-gradient(90deg, var(--purple), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
    }

    .subtitle { color: var(--muted); text-align:center; font-size:0.95rem; margin-top:0.3rem; }

    .controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 1rem 0;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: rgba(88,166,255,0.1);
      color: var(--accent);
      transition: all 0.2s;
    }
    .btn:hover { background: rgba(88,166,255,0.25); }
    .btn.active { background: var(--accent); color: #000; }

    .tab-content { display: none; flex: 1; flex-direction: column; }
    .tab-content.active { display: flex; }

    #terminal-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    #terminal {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
      font-family: 'Consolas', 'Courier New', monospace;
      line-height: 1.6;
      font-size: 1.05rem;
    }

    .line { margin: 0.4rem 0; white-space: pre-wrap; word-break: break-word; }
    .prompt { color: var(--accent-dim); }
    .info    { color: #79c0ff; }
    .success { color: #56d364; font-weight: 600; }
    .error   { color: var(--danger); }
    .system  { color: var(--muted); }

    .input-line {
      display: flex;
      align-items: center;
      padding: 1rem 1.5rem;
      background: rgba(0,0,0,0.3);
      border-top: 1px solid var(--border);
      gap: 0.8rem;
    }
    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--accent-dim);
      font: inherit;
      outline: none;
      caret-color: var(--accent);
    }

    #pins-tab { padding: 1.5rem; overflow-y: auto; }
    #search {
      width: 100%;
      max-width: 600px;
      padding: 0.9rem 1.2rem;
      margin: 0 auto 1.5rem;
      display: block;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem;
      margin: 1rem 0;
      box-shadow: var(--shadow);
      transition: transform 0.15s;
    }
    .card:hover { transform: translateY(-3px); }

    .pin-title {
      font-size: 1.35rem;
      margin-bottom: 0.6rem;
      color: var(--accent);
      word-break: break-all;
    }
    .url-pin .pin-title { color: var(--purple); }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem 1.8rem;
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0.6rem 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 1rem;
    }

    .small-btn {
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      border-radius: 6px;
    }

    #fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--purple), var(--accent));
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 2.2rem;
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
      cursor: pointer;
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s;
    }
    #fab:hover { transform: scale(1.12); }
    #fab:active { transform: scale(0.94); }

    @media (max-width: 600px) {
      .actions { flex-direction: column; }
      .small-btn { width: 100%; text-align: center; }
      #fab { bottom: 16px; right: 16px; width: 56px; height: 56px; font-size: 2rem; }
    }
  </style>
</head>
<body data-theme="dark">

<header>
  <h1>GPS Pins</h1>
  <div class="subtitle">Private markers • URLs • 100% offline</div>

  <div class="controls">
    <button class="btn active" data-tab="terminal">Terminal</button>
    <button class="btn" data-tab="pins">My Pins <span id="pins-count">0</span></button>
    <button class="btn" id="theme-toggle">☀️ Light</button>
    <button class="btn" id="export-btn">Export JSON</button>
    <label class="btn">
      Import JSON
      <input type="file" id="import-file" accept=".json" style="display:none"/>
    </label>
  </div>
</header>

<div id="terminal-tab" class="tab-content active">
  <div id="terminal"></div>
  <div class="input-line">
    <span class="prompt">></span>
    <input id="input" type="text" autocomplete="off" spellcheck="false" autofocus/>
  </div>
</div>

<div id="pins-tab" class="tab-content">
  <input type="text" id="search" placeholder="Search name, url, coordinates…"/>
  <div id="pins-container"></div>
</div>

<button id="fab" title="Quick-save current location (hold for name)">+</button>

<script>
// ────────────────────────────────────────────────
// Core
// ────────────────────────────────────────────────
const STORAGE_KEY = 'gps-pins-v8';
let pins = getPins();
let lastName = localStorage.getItem('gps-pins-lastname') || '';
let trackingWatchId = null;
let lastFabClick = 0;

const terminal = document.getElementById('terminal');
const input = document.getElementById('input');
const pinsContainer = document.getElementById('pins-container');
const searchInput = document.getElementById('search');

function getPins() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function savePins() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(pins));
    document.getElementById('pins-count').textContent = pins.length;
    return true;
  } catch (e) {
    alert('Save failed — storage may be full or blocked.');
    return false;
  }
}

function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,9); }

function escape(s='') { return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }

function println(html, cls='line') {
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
}

function printSuccess(msg) { println(msg, 'success'); }
function printError(msg)   { println(msg, 'error'); }
function printInfo(msg)    { println(msg, 'info'); }
function printSystem(msg)  { println(msg, 'system'); }

// ────────────────────────────────────────────────
// Boot
// ────────────────────────────────────────────────
println('<span class="system">GPS Pins v8 • local only • ' + new Date().toLocaleDateString() + '</span>');
println('<span class="system">─'.repeat(40) + '</span>');
printInfo('Paste URL → auto-save');
printInfo('Type <b>track on</b> → start GPS trail');
printInfo('Click + → quick save location');
printInfo('Type <b>help</b> for commands');
println('');
if (lastName) printSystem(`Last used name: ${escape(lastName)}`);

// ────────────────────────────────────────────────
// Tabs
// ────────────────────────────────────────────────
document.querySelectorAll('[data-tab]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab + '-tab').classList.add('active');
    if (btn.dataset.tab === 'pins') renderPins();
  });
});

// ────────────────────────────────────────────────
// Theme
// ────────────────────────────────────────────────
const themeToggle = document.getElementById('theme-toggle');
themeToggle.addEventListener('click', () => {
  const current = document.body.dataset.theme;
  const next = current === 'dark' ? 'light' : 'dark';
  document.body.dataset.theme = next;
  themeToggle.textContent = next === 'dark' ? '☀️ Light' : '🌙 Dark';
  localStorage.setItem('gps-pins-theme', next);
});
if (localStorage.getItem('gps-pins-theme') === 'light') {
  document.body.dataset.theme = 'light';
  themeToggle.textContent = '🌙 Dark';
}

// ────────────────────────────────────────────────
// Render Pins
// ────────────────────────────────────────────────
function renderPins(filter = '') {
  const term = (filter || '').toLowerCase().trim();
  pinsContainer.innerHTML = '';

  const shown = pins.filter(p =>
    (p.name||'').toLowerCase().includes(term) ||
    (p.url||'').toLowerCase().includes(term) ||
    String(p.lat||'').includes(term) ||
    String(p.lng||'').includes(term)
  );

  if (!shown.length) {
    pinsContainer.innerHTML = '<div style="text-align:center;padding:6rem 1rem;color:var(--muted);">No pins match your search yet.<br>Try dropping one with the + button!</div>';
    return;
  }

  shown.forEach(p => {
    const isUrl = !!p.url;
    const mapsLink = p.lat && p.lng ? `https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}` : '';
    const coords = p.lat && p.lng ? `${p.lat.toFixed(6)}, ${p.lng.toFixed(6)}` : '—';
    const acc = p.accuracy ? `±${Math.round(p.accuracy)} m` : '';

    const card = document.createElement('div');
    card.className = `card ${isUrl ? 'url-pin' : ''}`;
    card.innerHTML = `
      <div class="pin-title">${isUrl ? '🔗 ' : '📍 '}${escape(p.name || (isUrl ? 'URL' : 'Pin'))}</div>
      <div class="meta">
        <span>${coords}</span>
        ${acc ? `<span>${acc}</span>` : ''}
        <span>${new Date(p.time).toLocaleString([], {month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</span>
      </div>
      ${isUrl ? `<div style="margin:0.8rem 0;"><a href="${escape(p.url)}" target="_blank" style="color:var(--purple);">→ Open link</a></div>` : ''}
      <div class="actions">
        ${mapsLink ? `<a href="${mapsLink}" target="_blank" class="btn small-btn">Map</a>` : ''}
        <button class="btn small-btn copy-coords" data-coords="${coords}">Copy coords</button>
        <button class="btn small-btn copy-name" data-name="${escape(p.name||'')||'(no name)'}">Copy name</button>
      </div>
    `;

    card.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', async e => {
        const t = e.target;
        if (t.classList.contains('copy-coords') || t.classList.contains('copy-name')) {
          const text = t.dataset.coords || t.dataset.name;
          await navigator.clipboard.writeText(text);
          const orig = t.textContent;
          t.textContent = 'Copied!';
          setTimeout(() => t.textContent = orig, 1400);
        }
      });
    });

    pinsContainer.appendChild(card);
  });
}

searchInput.addEventListener('input', e => renderPins(e.target.value));

// ────────────────────────────────────────────────
// Quick Save (FAB)
// ────────────────────────────────────────────────
document.getElementById('fab').addEventListener('click', async e => {
  const now = Date.now();
  if (now - lastFabClick < 600) return; // debounce
  lastFabClick = now;

  let name = lastName || `Pin ${pins.length + 1}`;

  // Hold/long-press detection for custom name
  if (e.detail === 2 || (now - (window.lastFabDown || 0) > 600)) {
    const custom = prompt("Name for this pin?", name);
    if (custom === null) return;
    name = custom.trim() || name;
  }

  if (name && name !== lastName) {
    lastName = name;
    localStorage.setItem('gps-pins-lastname', lastName);
  }

  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, {enableHighAccuracy:true, timeout:12000})
    );

    const pin = {
      id: generateId(),
      name,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      accuracy: Math.round(pos.coords.accuracy),
      time: Date.now()
    };

    pins.push(pin);
    if (savePins()) {
      printSuccess(`Saved → ${escape(name)} @ ${pin.lat.toFixed(6)}, ${pin.lng.toFixed(6)}`);
      if (document.querySelector('[data-tab="pins"].active')) renderPins();
    }
  } catch (err) {
    printError("Location failed: " + (err.code === 1 ? "permission denied" : err.message));
  }
});

// Long-press detection helper
document.getElementById('fab').addEventListener('mousedown', () => window.lastFabDown = Date.now());
document.getElementById('fab').addEventListener('touchstart', () => window.lastFabDown = Date.now());

// ────────────────────────────────────────────────
// Track mode (continuous logging)
// ────────────────────────────────────────────────
function startTracking() {
  if (trackingWatchId) return;
  printInfo("Tracking started — saving position ~every 15s");
  trackingWatchId = navigator.geolocation.watchPosition(pos => {
    const name = `Track ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
    pins.push({
      id: generateId(),
      name,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude,
      accuracy: Math.round(pos.coords.accuracy),
      time: Date.now()
    });
    savePins();
    println(`→ ${name} ${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`, 'info');
  }, err => {
    printError("Tracking error: " + err.message);
    stopTracking();
  }, {enableHighAccuracy:true, timeout:15000, maximumAge:0});
}

function stopTracking() {
  if (trackingWatchId) {
    navigator.geolocation.clearWatch(trackingWatchId);
    trackingWatchId = null;
    printInfo("Tracking stopped.");
  }
}

// ────────────────────────────────────────────────
// Export / Import
// ────────────────────────────────────────────────
document.getElementById('export-btn').onclick = () => {
  const data = JSON.stringify(pins, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gps-pins-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
};

document.getElementById('import-file').onchange = e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported)) throw new Error("Not an array");
      const before = pins.length;
      pins = [...pins, ...imported.filter(p => p.id && !pins.some(ex => ex.id === p.id))];
      savePins();
      printSuccess(`Imported ${pins.length - before} new pins`);
      if (document.querySelector('[data-tab="pins"].active')) renderPins();
    } catch (err) {
      printError("Import failed: " + err.message);
    }
  };
  reader.readAsText(file);
};

// ────────────────────────────────────────────────
// Commands & Input
// ────────────────────────────────────────────────
input.addEventListener('keydown', async e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();

  const text = input.value.trim();
  if (!text) return;

  println(`<span class="prompt">> ${escape(text)}</span>`);

  // URL detection
  let url;
  try {
    url = new URL(text.match(/^https?:\/\//) ? text : 'https://' + text);
  } catch {}

  if (url) {
    const existing = pins.some(p => p.url === url.href);
    if (existing) {
      printInfo("→ Already saved.");
    } else {
      let name = url.hostname.replace(/^www\./, '');
      if (url.pathname && url.pathname !== '/') {
        const seg = url.pathname.split('/')[1];
        if (seg) name += ` / ${seg}`;
      }
      name = name.slice(0, 70);

      pins.push({
        id: generateId(),
        name,
        url: url.href,
        time: Date.now()
      });
      if (savePins()) {
        printSuccess(`URL saved → ${escape(name)}`);
        if (document.querySelector('[data-tab="pins"].active')) renderPins();
      }
    }
    input.value = '';
    input.focus();
    return;
  }

  // Commands
  const [cmd, ...args] = text.toLowerCase().split(/\s+/);
  const arg = args.join(' ');

  if (cmd === 'help') {
    printInfo("track on/off → GPS trail mode");
    printInfo("clear      → clear terminal");
    printInfo("clear all  → delete all pins (!)");
    printInfo("list       → show all pins");
  }
  else if (cmd === 'track') {
    if (arg === 'on') startTracking();
    else if (arg === 'off') stopTracking();
    else printInfo("Usage: track on / track off");
  }
  else if (cmd === 'clear' && arg === 'all') {
    if (confirm("Delete ALL saved pins forever?")) {
      pins = [];
      savePins();
      printSystem("All pins deleted.");
      if (document.querySelector('[data-tab="pins"].active')) renderPins();
    }
  }
  else if (cmd === 'clear') {
    terminal.innerHTML = '';
    println('<span class="system">Terminal cleared</span>');
  }
  else if (cmd === 'list') {
    if (!pins.length) printInfo("No pins yet.");
    else {
      printInfo(`Total: ${pins.length}`);
      pins.forEach(p => {
        let line = `• ${escape(p.name || '(no name)')} `;
        if (p.url) line += `[URL] `;
        if (p.lat != null) line += `${p.lat.toFixed(5)}, ${p.lng.toFixed(5)} `;
        line += `(${new Date(p.time).toLocaleDateString()})`;
        println(line, 'info');
      });
    }
  }
  else {
    printError(`Unknown command: ${escape(cmd)}`);
    printInfo("Type help for commands");
  }

  input.value = '';
  input.focus();
});

// Init
document.getElementById('pins-count').textContent = pins.length;
input.focus();
</script>
</body>
</html>
