<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOID DICTIONARY • Online AI Lexicon</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=VT323&display=swap');

    :root {
      --accent: #00ff9d;
    }

    body {
      background: #000;
      color: #e6d5b8;
      font-family: 'Cinzel', serif;
      overflow: hidden;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      background: rgba(10,10,10,0.95);
      border: 12px solid #111;
      border-image: linear-gradient(45deg, #00ff9d, #008f5a) 1;
      box-shadow: 0 0 80px rgba(0, 255, 157, 0.3);
      border-radius: 12px;
      overflow: hidden;
    }

    .header {
      background: rgba(15,15,15,0.98);
      padding: 20px 30px;
      border-bottom: 4px solid var(--accent);
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .rune {
      font-size: 3rem;
      color: var(--accent);
      text-shadow: 0 0 15px var(--accent);
    }

    .title {
      font-size: 2.4rem;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .input-area {
      padding: 25px;
      background: #0a0a0a;
    }

    textarea, input {
      background: #111;
      border: 2px solid #008f5a;
      color: #00ff9d;
      font-family: 'VT323', monospace;
    }

    .result {
      padding: 30px;
      max-height: 65vh;
      overflow-y: auto;
      background: rgba(8, 18, 14, 0.95);
    }

    .word {
      font-size: 2.8rem;
      color: #00ff9d;
      border-bottom: 2px dashed #00cc77;
    }

    .phonetic {
      font-family: 'VT323', monospace;
      color: #00cc77;
      font-size: 1.4rem;
    }

    .meaning {
      background: rgba(0, 30, 15, 0.6);
      border-left: 6px solid var(--accent);
      padding: 18px;
      margin: 20px 0;
    }

    .example {
      font-style: italic;
      color: #a0d8c0;
    }

    .audio-btn {
      background: #001a00;
      border: 2px solid #00ff9d;
    }

    /* AI Button Styling */
    .ai-btn {
      background: linear-gradient(45deg, #00ff9d, #00cc77);
      color: #000;
      font-weight: 700;
      transition: all 0.3s ease;
    }

    .ai-btn:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 0 25px rgba(0, 255, 157, 0.6);
    }

    .ai-response {
      background: rgba(0, 40, 20, 0.7);
      border: 1px solid #00ff9d;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-black p-6">

<div class="container flex flex-col h-[92vh]">

  <!-- HEADER -->
  <div class="header">
    <div class="rune">☰</div>
    <div>
      <h1 class="title text-white">VOID DICTIONARY</h1>
      <p class="text-[#00ff9d] text-sm tracking-widest flex items-center gap-2">
        <span class="w-3 h-3 bg-[#00ff9d] rounded-full animate-pulse"></span>
        REAL-TIME • FREE • AI ENHANCED
      </p>
    </div>
    <div class="ml-auto flex gap-4">
      <button onclick="clearResult()" 
        class="flex items-center gap-2 px-6 py-3 bg-black border-2 border-[#00ff9d] hover:bg-[#001a00] rounded transition-all">
        <i class="fa-solid fa-trash"></i> CLEAR
      </button>
      <a href="https://github.com" target="_blank"
        class="flex items-center gap-2 px-6 py-3 bg-black border-2 border-[#00ff9d] hover:bg-[#001a00] rounded transition-all text-sm">
        <i class="fa-solid fa-share-nodes"></i> SHARE
      </a>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="input-area">
    <div class="relative max-w-2xl mx-auto">
      <input type="text" id="search-input" 
        class="w-full px-8 py-6 text-2xl rounded-3xl focus:outline-none focus:border-[#00ff9d] placeholder-[#00cc77]"
        placeholder="ENTER A WORD INTO THE VOID...">
      
      <div class="flex gap-3 mt-4 justify-center">
        <button onclick="searchWord()" 
          class="flex-1 max-w-xs px-8 py-4 bg-[#001a00] border-2 border-[#00ff9d] hover:bg-[#003300] rounded-2xl flex items-center justify-center gap-3 transition-all text-lg">
          <i class="fa-solid fa-magnifying-glass"></i> 
          <span>LOOKUP IN VOID</span>
        </button>

        <button onclick="askAI()" 
          class="ai-btn flex-1 max-w-xs px-8 py-4 rounded-2xl flex items-center justify-center gap-3 text-lg shadow-lg">
          <i class="fa-solid fa-sparkles"></i> 
          <span>ASK THE VOID AI</span>
        </button>
      </div>
    </div>
  </div>

  <!-- RESULTS AREA -->
  <div id="result" class="result flex-1 p-8 overflow-y-auto text-[#e6d5b8] leading-relaxed"></div>

</div>

<script>
// Main dictionary search (original functionality preserved)
async function searchWord() {
  const input = document.getElementById('search-input');
  const word = input.value.trim().toLowerCase();
  const resultDiv = document.getElementById('result');

  if (!word) {
    resultDiv.innerHTML = `<p class="text-center text-red-400 text-xl">Speak a word into the void...</p>`;
    return;
  }

  resultDiv.innerHTML = `
    <div class="flex items-center justify-center h-full text-[#00ff9d] text-2xl">
      <i class="fa-solid fa-spinner fa-spin mr-4"></i> 
      Consulting the infinite lexicon...
    </div>`;

  try {
    const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
    
    if (!response.ok) throw new Error('Not found');

    const data = await response.json();
    const entry = data[0];

    let html = `
      <div class="mb-8">
        <div class="flex items-center gap-6">
          <div>
            <div class="word">${entry.word}</div>
            ${entry.phonetic ? `<div class="phonetic mt-2">${entry.phonetic}</div>` : ''}
          </div>`;

    const audio = entry.phonetics?.find(p => p.audio);
    if (audio && audio.audio) {
      html += `
        <button onclick="playAudio('${audio.audio}')" 
          class="audio-btn ml-auto px-6 py-3 rounded-2xl flex items-center gap-3 text-[#00ff9d] hover:scale-105 transition-all">
          <i class="fa-solid fa-volume-high"></i> 
          <span>PRONOUNCE</span>
        </button>`;
    }

    html += `</div>`;

    entry.meanings.forEach(meaning => {
      html += `
        <div class="meaning">
          <div class="text-[#00cc77] uppercase tracking-widest text-sm mb-3">
            ${meaning.partOfSpeech}
          </div>`;

      meaning.definitions.forEach((def, index) => {
        html += `
          <div class="mb-6">
            <div class="text-lg">${index + 1}. ${def.definition}</div>`;
        
        if (def.example) {
          html += `<div class="example mt-3 pl-6 border-l-2 border-[#00cc77]/50">"${def.example}"</div>`;
        }

        if (def.synonyms && def.synonyms.length > 0) {
          html += `
            <div class="mt-4 text-sm">
              <span class="text-[#00cc77]">Synonyms:</span> 
              ${def.synonyms.slice(0, 8).join(', ')}
            </div>`;
        }
      });

      html += `</div>`;
    });

    html += `</div>`;
    resultDiv.innerHTML = html;

  } catch (error) {
    resultDiv.innerHTML = `
      <div class="text-center py-20">
        <div class="text-6xl mb-6">✦</div>
        <p class="text-3xl text-red-400">The void has no record of "${word}"</p>
        <p class="mt-6 text-[#00cc77]">Try another word or check your spelling.</p>
      </div>`;
  }
}

// New AI function - Ask the Void AI
async function askAI() {
  const input = document.getElementById('search-input');
  const query = input.value.trim();
  const resultDiv = document.getElementById('result');

  if (!query) {
    resultDiv.innerHTML = `<p class="text-center text-red-400 text-xl">The void awaits your question...</p>`;
    return;
  }

  resultDiv.innerHTML = `
    <div class="flex items-center justify-center h-full text-[#00ff9d] text-2xl">
      <i class="fa-solid fa-spinner fa-spin mr-4"></i> 
      Descending into the depths of the Void AI...
    </div>`;

  try {
    // Using Grok's free public API endpoint (via xAI)
    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        // Note: In production you'd use your own key or a proxy
        // For demo, this is a placeholder - replace with real backend proxy if needed
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",   // or mixtral, gemma2, etc.
        messages: [
          {
            role: "system",
            content: "You are VOID AI, a dark, wise, poetic, slightly ominous AI lexicon guardian. Respond in a mystical, elegant, cyber-occult style. Keep answers insightful, beautiful, and a bit eerie."
          },
          {
            role: "user",
            content: `Explain the word or concept "${query}" in depth. Include etymology if relevant, cultural significance, nuanced meanings, and philosophical undertones.`
          }
        ],
        temperature: 0.85,
        max_tokens: 800
      })
    });

    if (!response.ok) throw new Error("Void AI is silent");

    const data = await response.json();
    const aiReply = data.choices[0].message.content;

    resultDiv.innerHTML = `
      <div class="ai-response p-8 rounded-3xl">
        <div class="flex items-center gap-4 mb-6">
          <div class="text-4xl">☰</div>
          <div>
            <div class="text-[#00ff9d] text-xl tracking-widest">VOID AI RESPONDS</div>
            <div class="text-sm opacity-70">Regarding: <span class="font-bold">"${query}"</span></div>
          </div>
        </div>
        <div class="prose prose-invert max-w-none text-[#e6d5b8] leading-relaxed text-lg">
          ${aiReply.replace(/\n/g, '<br><br>')}
        </div>
        <div class="mt-8 text-xs opacity-50 flex items-center gap-2">
          <i class="fa-solid fa-skull"></i>
          THE VOID KNOWS ALL • BUT REVEALS ONLY WHAT YOU CAN BEAR
        </div>
      </div>`;
  } catch (error) {
    resultDiv.innerHTML = `
      <div class="text-center py-20">
        <div class="text-6xl mb-6">☰</div>
        <p class="text-3xl text-red-400">The Void AI remains silent...</p>
        <p class="mt-6 text-[#00cc77]">The connection to the abyss is unstable right now.<br>Try again or use the classic lookup.</p>
      </div>`;
  }
}

// Play audio pronunciation
function playAudio(url) {
  const audio = new Audio(url);
  audio.play().catch(() => alert("Audio playback failed. The signal may be distorted."));
}

// Clear results
function clearResult() {
  document.getElementById('result').innerHTML = '';
  document.getElementById('search-input').value = '';
  document.getElementById('search-input').focus();
}

// Enter key support
document.getElementById('search-input').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    searchWord();
  }
});

// Initial welcome message
window.onload = () => {
  document.getElementById('result').innerHTML = `
    <div class="text-center py-16 text-[#00cc77]">
      <div class="text-5xl mb-8">☰</div>
      <h2 class="text-4xl mb-4">THE VOID DICTIONARY IS ONLINE</h2>
      <p class="max-w-md mx-auto text-lg">
        Enter any English word above.<br>
        Classic definitions or <span class="text-[#00ff9d]">ask the Void AI</span>
      </p>
      <div class="mt-12 text-sm opacity-70">
        Powered by Free Dictionary API + AI • No keys required for basic use
      </div>
    </div>`;
};
</script>

</body>
</html>
