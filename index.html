<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }
    .chatbox {
      width: 100%;
      max-width: 600px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .messages {
      height: 300px;
      overflow-y: scroll;
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
    }
    .input-area {
      display: flex;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px;
      font-size: 16px;
    }
  </style>
<script>
        function displayDateTime() {
            const now = new Date();
            document.getElementById("datetime").innerText = now.toLocaleString();
        }
        setInterval(displayDateTime);
</script>
</head>
<body onload="displayDateTime()">
    <script>
    function sendMessage() {
      const input = document.getElementById('userInput');
      const messages = document.getElementById('messages');
      const userText = input.value;
      if (userText.trim() === '') return;

      const userMessage = document.createElement('div');
      userMessage.textContent = 'You: ' + userText;
      messages.appendChild(userMessage);

      const aiMessage = document.createElement('div');
      aiMessage.textContent = 'AI: ' + generateAIResponse(userText);
      messages.appendChild(aiMessage);

      input.value = '';
      messages.scrollTop = messages.scrollHeight;
    }

    function generateAIResponse(text) {
      // Simple mock response logic
      if (text.toLowerCase().includes('hello')) {
        return 'Hi there! How can I assist you today?';
      } else if (text.toLowerCase().includes('weather')) {
        return 'I can’t check the weather right now, but it’s always a good day to code!';
      } else {
        return displayDateTime(text.value == userMessage.value) = 'Read loud and clear!';
      }
    }
  </script>

    <h1>Welcome to Root Donate</h1>
    <p>The current date and time is:</p>
    <p id="datetime"></p>
    
      <div class="chatbox">
    <h2>AI Chatbot</h2>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

</body>
</html>
