<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cleverbot • Grok Style</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <style>
    body {
      background: linear-gradient(135deg, #0f0f23, #1a1a2e);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    
    .chat-container {
      max-width: 820px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .message {
      animation: fadeIn 0.35s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .custom-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background-color: #4b5563;
      border-radius: 20px;
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<div class="chat-container mx-auto">

  <!-- Header -->
  <div class="bg-zinc-900 border-b border-zinc-800 p-4 flex items-center gap-3 shadow-sm">
    <div class="w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex items-center justify-center text-2xl font-bold shadow-inner">
      C
    </div>
    <div>
      <h1 class="text-2xl font-bold tracking-tight">Cleverbot</h1>
      <p class="text-xs text-emerald-400 flex items-center gap-1.5">
        <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
        Connected • Learning from you
      </p>
    </div>
    
    <div class="ml-auto flex items-center gap-3">
      <button id="share-btn"
        class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-2xl text-sm font-medium transition-colors">
        <i class="fa-solid fa-share-nodes"></i>
        <span>Share</span>
      </button>
      <button id="new-btn"
        class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-2xl text-sm font-medium transition-colors">
        <i class="fa-solid fa-plus"></i>
        <span>New</span>
      </button>
    </div>
  </div>

  <!-- Chat Area -->
  <div id="chat" class="flex-1 overflow-y-auto p-6 space-y-8 bg-zinc-950 custom-scroll"></div>

  <!-- Input Area -->
  <div class="p-6 bg-zinc-900 border-t border-zinc-800">
    <div class="max-w-3xl mx-auto">
      <form id="chat-form" class="relative">
        <textarea 
          id="user-input"
          rows="1"
          class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-4 pr-16 text-white placeholder-zinc-500 focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 resize-none text-base"
          placeholder="Talk to Cleverbot..."></textarea>
        
        <button 
          type="submit"
          class="absolute right-4 bottom-4 w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 hover:brightness-110 rounded-2xl flex items-center justify-center transition-all active:scale-95 shadow-lg">
          <i class="fa-solid fa-paper-plane text-white"></i>
        </button>
      </form>
      
      <p class="text-center text-zinc-500 text-xs mt-4">
        Unofficial free integration • Conversations saved in URL
      </p>
    </div>
  </div>

</div>

<script>
// ====================== Cleverbot API ======================
async function getCleverbotResponse(message) {
  try {
    const url = `https://www.cleverbot.com/getreply?input=${encodeURIComponent(message)}&key=free`;
    const response = await fetch(url, { method: 'GET', headers: { 'Accept': 'application/json' } });

    if (!response.ok) throw new Error('Request failed');
    const data = await response.json();
    return data.output || "Hmm... I don't know what to say right now.";
  } catch (err) {
    console.warn("Cleverbot API error:", err);
    return "I'm having trouble connecting right now. Try again in a moment!";
  }
}

// ====================== Storage & URL ======================
let conversation = []; // array of {role: "user"|"bot", content: string}

function saveToURL() {
  if (conversation.length === 0) {
    history.replaceState(null, '', window.location.pathname);
    return;
  }
  const json = JSON.stringify(conversation);
  const encoded = btoa(encodeURIComponent(json));   // safe for URL
  window.location.hash = 'conv=' + encoded;
}

function loadFromURL() {
  const hash = window.location.hash.substring(1);
  if (!hash) return false;

  const params = new URLSearchParams(hash);
  const encoded = params.get('conv');
  if (!encoded) return false;

  try {
    const decoded = decodeURIComponent(atob(encoded));
    conversation = JSON.parse(decoded);
    return true;
  } catch (e) {
    console.error("Failed to load conversation from URL");
    return false;
  }
}

// ====================== Rendering ======================
const chat = document.getElementById('chat');

function renderConversation() {
  chat.innerHTML = '';

  conversation.forEach(msg => {
    const div = document.createElement('div');
    div.className = `message max-w-3xl mx-auto ${msg.role === 'user' ? 'ml-auto' : ''}`;
    
    if (msg.role === 'user') {
      div.innerHTML = `
        <div class="flex justify-end gap-4">
          <div class="bg-violet-600 text-white rounded-3xl rounded-tr-none px-6 py-4 max-w-[85%]">
            <p class="whitespace-pre-wrap">${msg.content}</p>
          </div>
        </div>
      `;
    } else {
      div.innerHTML = `
        <div class="flex gap-4">
          <div class="w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-2xl font-bold">
            C
          </div>
          <div class="bg-zinc-900 rounded-3xl rounded-tl-none px-6 py-4 max-w-[85%]">
            <p class="whitespace-pre-wrap">${msg.content}</p>
          </div>
        </div>
      `;
    }
    chat.appendChild(div);
  });
  
  chat.scrollTop = chat.scrollHeight;
}

function addMessage(content, role) {
  conversation.push({ role, content });
  renderConversation();
  saveToURL();
}

// ====================== Welcome Message ======================
function showWelcome() {
  if (conversation.length > 0) return;
  
  const welcomeHTML = `
    <div class="message max-w-3xl mx-auto">
      <div class="flex gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-2xl font-bold">
          C
        </div>
        <div class="bg-zinc-900 rounded-3xl rounded-tl-none px-6 py-5 max-w-[85%]">
          <p class="text-lg">Hi! I'm Cleverbot.</p>
          <p class="text-zinc-400 mt-2">Say anything! I learn as we chat.</p>
        </div>
      </div>
    </div>
  `;
  chat.innerHTML = welcomeHTML;
}

// ====================== Main Chat Logic ======================
const form = document.getElementById('chat-form');
const input = document.getElementById('user-input');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const question = input.value.trim();
  if (!question) return;

  addMessage(question, 'user');
  input.value = '';

  // Thinking indicator
  const thinking = document.createElement('div');
  thinking.id = 'thinking';
  thinking.className = 'message max-w-3xl mx-auto';
  thinking.innerHTML = `
    <div class="flex gap-4">
      <div class="w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-2xl font-bold">
        C
      </div>
      <div class="bg-zinc-900 rounded-3xl rounded-tl-none px-6 py-4">
        <div class="flex items-center gap-3 text-zinc-400">
          <i class="fa-solid fa-circle animate-pulse"></i>
          <span>Cleverbot is thinking...</span>
        </div>
      </div>
    </div>
  `;
  chat.appendChild(thinking);
  chat.scrollTop = chat.scrollHeight;

  const reply = await getCleverbotResponse(question);
  
  thinking.remove();
  addMessage(reply, 'bot');
});

// Auto-resize textarea
input.addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 180) + 'px';
});

// Send with Enter
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    form.dispatchEvent(new Event('submit'));
  }
});

// ====================== Share & New Buttons ======================
document.getElementById('share-btn').addEventListener('click', () => {
  if (conversation.length === 0) {
    alert("Nothing to share yet!");
    return;
  }
  saveToURL();
  const shareURL = window.location.href;
  navigator.clipboard.writeText(shareURL).then(() => {
    alert("✅ Conversation link copied to clipboard!\n\nAnyone with this link can view the chat.");
  });
});

document.getElementById('new-btn').addEventListener('click', () => {
  if (confirm("Start a new conversation? Current chat will be lost.")) {
    conversation = [];
    window.location.hash = '';
    chat.innerHTML = '';
    showWelcome();
    input.focus();
  }
});

// ====================== Initialize ======================
window.addEventListener('load', () => {
  const loaded = loadFromURL();
  if (loaded) {
    renderConversation();
  } else {
    showWelcome();
  }
  input.focus();
});

// Optional: save on page unload (in case user closes tab)
window.addEventListener('beforeunload', saveToURL);
</script>

</body>
</html>
