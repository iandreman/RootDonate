<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Root • Grow Time</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
        }
        .title-font { 
            font-family: 'Space Grotesk', sans-serif; 
        }

        .nature-gradient {
            background: linear-gradient(135deg, #10b981, #14b8a6, #22d3ee);
        }
        
        .card { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .card:hover { 
            transform: translateY(-6px); 
        }

        .living-ring { 
            transition: stroke-dashoffset 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); 
        }

        .step-flash { 
            animation: stepFlash 0.4s ease-out; 
        }
        @keyframes stepFlash { 
            0% { transform: scale(1.15); } 
            100% { transform: scale(1); } 
        }

        .tab-btn.active {
            background-color: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .sensor-active {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .live-badge {
            animation: livePulse 2s infinite;
        }
        @keyframes livePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen pb-12">

<div class="max-w-7xl mx-auto p-6 lg:p-10">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-12">
        <div class="flex items-center gap-3">
            <span class="text-4xl">🌱</span>
            <h1 class="title-font text-4xl font-bold tracking-tight">Root</h1>
        </div>
        
        <div class="flex items-center gap-4 text-sm">
            <div class="flex items-center gap-2 bg-emerald-900/50 border border-emerald-500/30 px-4 py-2 rounded-2xl">
                <div class="w-2 h-2 bg-emerald-400 rounded-full live-badge"></div>
                <span class="text-emerald-400 font-medium">Full Service Live</span>
                <span class="text-white/70 mx-1">•</span>
                <div id="currentDate" class="text-emerald-400 font-medium"></div>
            </div>

            <button onclick="showTab(0)" id="tabBtn0" class="tab-btn active px-6 py-3 rounded-2xl transition-all">Walk</button>
            <button onclick="showTab(1)" id="tabBtn1" class="tab-btn px-6 py-3 rounded-2xl transition-all">Nodes</button>
        </div>
    </div>

    <!-- WALK TAB -->
    <div id="tab-0" class="tab-content">
        <!-- Balance -->
        <div class="nature-gradient rounded-3xl p-10 mb-12 relative overflow-hidden card">
            <div class="absolute -right-12 -top-12 text-[220px] opacity-10 pointer-events-none">🌱</div>
            <p class="text-emerald-100 text-lg">Your Growth Time</p>
            <p id="balance" class="text-7xl font-bold mt-1 mb-6">0.0h</p>
            <div class="flex justify-between items-center text-emerald-100">
                <p>Streak: <span id="streak" class="font-bold text-white">0 days 🔥</span></p>
                <p id="sensorStatus" class="text-sm font-medium">Sensor: Inactive</p>
            </div>
        </div>

        <!-- Step Tracker -->
        <div class="bg-white/5 border border-white/10 rounded-3xl p-8 card">
            <div class="flex justify-between items-center mb-8">
                <h2 class="flex items-center gap-3 text-2xl font-semibold">
                    <span class="text-3xl">🌿</span> Life in Motion
                </h2>
                <button onclick="togglePedometer()" id="connectBtn"
                        class="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-medium flex items-center gap-2 transition-all">
                    <i class="fas fa-walking"></i>
                    <span id="connectText">Start Sensor</span>
                </button>
            </div>

            <div class="relative w-64 h-64 mx-auto mb-10">
                <svg class="w-full h-full -rotate-12" viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="52" fill="none" stroke="#1f2937" stroke-width="18"/>
                    <circle id="stepsProgress" cx="60" cy="60" r="52" fill="none" 
                            stroke="#10b981" stroke-width="18" stroke-dasharray="326.73"
                            stroke-dashoffset="326.73" stroke-linecap="round" class="living-ring"/>
                </svg>
                <div id="stepsContainer" class="absolute inset-0 flex flex-col items-center justify-center">
                    <p id="stepsCount" class="text-6xl font-bold">0</p>
                    <p class="text-emerald-400 text-sm">steps today</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6 text-center">
                <div class="bg-white/5 rounded-2xl p-6">
                    <p class="text-gray-400 text-sm">Distance</p>
                    <p id="distance" class="text-4xl font-semibold text-emerald-400">0.0 km</p>
                </div>
                <div class="bg-white/5 rounded-2xl p-6">
                    <p class="text-gray-400 text-sm">Time Earned Today</p>
                    <p id="earnedToday" class="text-4xl font-semibold text-cyan-400">0.0h</p>
                </div>
            </div>

            <button onclick="manualStep()" 
                    class="mt-6 w-full py-3 bg-white/10 hover:bg-white/20 rounded-2xl text-sm font-medium transition">
                +1 Manual Step (Test)
            </button>
        </div>

        <button onclick="claimStepsReward()" id="claimBtn"
                class="mt-12 w-full nature-gradient py-7 rounded-3xl text-xl font-semibold flex items-center justify-center gap-3 disabled:opacity-60 disabled:cursor-not-allowed">
            <span>🌱</span> 
            <span id="claimText">Claim Today's Growth Time</span>
        </button>
    </div>

    <!-- NODES TAB -->
    <div id="tab-1" class="tab-content hidden">
        <div class="bg-white/5 border border-white/10 rounded-3xl p-8 card">
            <h2 class="text-3xl font-semibold mb-8 flex items-center gap-3">
                <span>🌳</span> Your Living Nodes
            </h2>
            <div id="nodesList" class="space-y-4 min-h-[300px]"></div>
            
            <button onclick="plantNode()" 
                    class="mt-10 w-full py-7 bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-3xl text-xl font-semibold flex items-center justify-center gap-2 hover:brightness-110 transition">
                🌱 Plant New Node <span class="text-sm opacity-75">— 8.0h</span>
            </button>
        </div>
    </div>
</div>

<script>
// ==================== CONFIG ====================
const APP_VERSION = "1.0.1";
const MIN_STEPS_FOR_CLAIM = 3000;
const STEPS_PER_HOUR = 10000;

// ==================== STATE ====================
let todaySteps = 0;
let totalLifetimeSteps = 0;
let growthTime = 0;
let nodes = [];
let streak = 0;
let lastClaimDate = null;
let isSensorConnected = false;
let motionListener = null;
let lastStepTime = 0;
let lastAccel = { x: 0, y: 0, z: 0 };
let stepThreshold = 12;

// Load data
function loadData() {
    const saved = localStorage.getItem('rootTimeData');
    const today = new Date().toISOString().split('T')[0];
    
    if (saved) {
        const data = JSON.parse(saved);
        totalLifetimeSteps = data.totalSteps || 0;
        growthTime = data.growthTime || 0;
        nodes = data.nodes || [];
        streak = data.streak || 0;
        lastClaimDate = data.lastClaimDate || null;
        
        // Restore today's steps if same day
        if (data.lastDate === today) {
            todaySteps = data.todaySteps || 0;
        }
    }
    
    checkDailyReset();
    updateAllUI();
}

function saveData() {
    const today = new Date().toISOString().split('T')[0];
    localStorage.setItem('rootTimeData', JSON.stringify({
        totalSteps: totalLifetimeSteps,
        growthTime: growthTime,
        nodes: nodes,
        streak: streak,
        lastClaimDate: lastClaimDate,
        todaySteps: todaySteps,
        lastDate: today,
        version: APP_VERSION
    }));
}

// Daily reset
function checkDailyReset() {
    const today = new Date().toISOString().split('T')[0];
    const lastDate = localStorage.getItem('rootLastDate');

    if (lastDate !== today) {
        todaySteps = 0;
        localStorage.setItem('rootLastDate', today);
    }
}

// ==================== UI ====================
function updateAllUI() {
    const progress = Math.min(todaySteps / STEPS_PER_HOUR, 1);
    const offset = 326.73 * (1 - progress);

    document.getElementById('stepsCount').textContent = todaySteps.toLocaleString();
    document.getElementById('stepsProgress').setAttribute('stroke-dashoffset', offset);
    document.getElementById('distance').textContent = (todaySteps / 1312).toFixed(1) + " km";
    document.getElementById('earnedToday').textContent = (todaySteps / STEPS_PER_HOUR).toFixed(1) + "h";
    document.getElementById('balance').textContent = growthTime.toFixed(1) + "h";
    document.getElementById('streak').textContent = `${streak} days 🔥`;

    // Live date
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
    });

    const canClaim = todaySteps >= MIN_STEPS_FOR_CLAIM && !isClaimedToday();
    const claimBtn = document.getElementById('claimBtn');
    claimBtn.disabled = !canClaim;
    document.getElementById('claimText').textContent = 
        canClaim ? "Claim Today's Growth Time" :
        isClaimedToday() ? "Already Claimed Today" : "Need 3,000+ steps";

    renderNodes();
}

function isClaimedToday() {
    const today = new Date().toISOString().split('T')[0];
    return lastClaimDate === today;
}

function flashSteps() {
    const container = document.getElementById('stepsContainer');
    container.classList.add('step-flash');
    setTimeout(() => container.classList.remove('step-flash'), 400);
}

// Tab system
function showTab(n) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.getElementById(`tab-${n}`).classList.remove('hidden');
    
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === n);
    });
}

function renderNodes() {
    const container = document.getElementById('nodesList');
    container.innerHTML = '';

    if (nodes.length === 0) {
        container.innerHTML = `
            <div class="text-center py-16 text-gray-400">
                <p class="text-5xl mb-4">🌱</p>
                <p>No living nodes yet</p>
            </div>`;
        return;
    }

    nodes.forEach((node, i) => {
        const hourly = (node.level * 0.6).toFixed(2);
        const div = document.createElement('div');
        div.className = "bg-white/5 rounded-2xl p-6 flex justify-between items-center";
        div.innerHTML = `
            <div>
                <p class="font-semibold">Node #${i+1} <span class="text-emerald-400">(Lv.${node.level})</span></p>
                <p class="text-sm text-gray-400">+${hourly} h/hour</p>
            </div>
            <button onclick="upgradeNode(${i})" 
                    class="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-xl text-sm transition">
                Upgrade • 4.0h
            </button>
        `;
        container.appendChild(div);
    });
}

// ==================== PEDOMETER ====================
async function togglePedometer() {
    if (!isSensorConnected) {
        await startPedometer();
    } else {
        stopPedometer();
    }
}

async function startPedometer() {
    if (typeof DeviceMotionEvent === 'undefined') {
        alert("Motion sensors not supported on this device.");
        return;
    }

    if (typeof DeviceMotionEvent.requestPermission === 'function') {
        try {
            const permission = await DeviceMotionEvent.requestPermission();
            if (permission !== 'granted') {
                alert("Motion permission denied.");
                return;
            }
        } catch (e) {
            console.error(e);
        }
    }

    motionListener = (event) => {
        const acc = event.accelerationIncludingGravity;
        if (!acc) return;

        const deltaX = Math.abs(acc.x - lastAccel.x);
        const deltaY = Math.abs(acc.y - lastAccel.y);
        const deltaZ = Math.abs(acc.z - lastAccel.z);
        const totalDelta = deltaX + deltaY + deltaZ;

        const now = Date.now();
        
        if (totalDelta > stepThreshold && now - lastStepTime > 220) {
            todaySteps++;
            lastStepTime = now;
            flashSteps();
            updateAllUI();
            saveData(); // Save on every step
        }

        lastAccel = { x: acc.x, y: acc.y, z: acc.z };
    };

    window.addEventListener('devicemotion', motionListener, true);
    isSensorConnected = true;

    document.getElementById('connectText').textContent = "Stop Sensor";
    document.getElementById('connectBtn').classList.add('bg-red-600', 'hover:bg-red-700', 'sensor-active');
    document.getElementById('sensorStatus').textContent = "Sensor: Active";
    document.getElementById('sensorStatus').classList.add('text-emerald-400');
}

function stopPedometer() {
    if (motionListener) {
        window.removeEventListener('devicemotion', motionListener, true);
    }
    isSensorConnected = false;

    document.getElementById('connectText').textContent = "Start Sensor";
    document.getElementById('connectBtn').classList.remove('bg-red-600', 'hover:bg-red-700', 'sensor-active');
    document.getElementById('sensorStatus').textContent = "Sensor: Inactive";
    document.getElementById('sensorStatus').classList.remove('text-emerald-400');
}

function manualStep() {
    todaySteps++;
    flashSteps();
    updateAllUI();
    saveData();
}

// ==================== ACTIONS ====================
function claimStepsReward() {
    if (todaySteps < MIN_STEPS_FOR_CLAIM || isClaimedToday()) {
        alert("Not enough steps or already claimed today!");
        return;
    }

    const earned = todaySteps / STEPS_PER_HOUR;
    growthTime += earned;
    totalLifetimeSteps += todaySteps;
    streak = Math.max(streak + 1, 1);
    lastClaimDate = new Date().toISOString().split('T')[0];

    alert(`🌟 Claimed +${earned.toFixed(1)} hours!\nStreak: ${streak} days 🔥`);

    todaySteps = 0;
    saveData();
    updateAllUI();
}

function plantNode() {
    if (growthTime < 8) {
        alert("Need at least 8.0h to plant a node.");
        return;
    }
    growthTime -= 8;
    nodes.push({ level: 1, lastClaim: Date.now() });
    saveData();
    updateAllUI();
}

function upgradeNode(i) {
    if (growthTime < 4) {
        alert("Need 4.0h to upgrade this node.");
        return;
    }
    growthTime -= 4;
    nodes[i].level++;
    saveData();
    updateAllUI();
}

// Passive node income
function processPassiveTime() {
    const now = Date.now();
    let added = 0;

    nodes.forEach(node => {
        const hoursPassed = (now - (node.lastClaim || now)) / 3600000;
        added += hoursPassed * node.level * 0.6;
        node.lastClaim = now;
    });

    if (added > 0.001) {
        growthTime += added;
        saveData();
        updateAllUI();
    }
}

// ==================== INIT ====================
loadData();
updateAllUI();
showTab(0);

setInterval(processPassiveTime, 8000);
setTimeout(processPassiveTime, 600);
setInterval(saveData, 30000);

window.addEventListener('beforeunload', () => {
    if (isSensorConnected) stopPedometer();
    saveData();
});

console.log(`%cRoot • Grow Time v${APP_VERSION} — Ready 🌱`, 'color:#10b981; font-weight:bold');
</script>
</body>
</html>
