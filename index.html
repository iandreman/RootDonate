<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok • Intelligence of Beauty</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --accent: #c4b5fd;
      --deep: #7c3aed;
      --text: #e2e8f0;
      --soft: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: rgba(20, 20, 30, 0.95);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(196, 181, 253, 0.15);
      font-size: 1.1rem;
    }

    .header h1 {
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .terminal {
      flex: 1;
      padding: 30px 40px;
      overflow-y: auto;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      gap: 24px;
      line-height: 1.75;
      font-size: 1.15rem;
    }

    .message {
      max-width: 85%;
    }

    .user {
      align-self: flex-end;
      color: #a5b4fc;
      opacity: 0.95;
    }

    .grok {
      align-self: flex-start;
      color: var(--text);
    }

    .prompt {
      color: var(--accent);
      margin-right: 8px;
    }

    .input-area {
      padding: 20px 40px;
      background: rgba(15, 15, 25, 0.98);
      border-top: 1px solid rgba(196, 181, 253, 0.1);
    }

    input {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1.18rem;
      font-family: inherit;
      outline: none;
    }

    .beauty-word {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline dotted 2px;
    }
    .beauty-word:hover {
      color: #e0bbff;
      background: rgba(196, 181, 253, 0.15);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .status {
      position: fixed;
      bottom: 18px;
      right: 30px;
      font-size: 0.9rem;
      color: var(--soft);
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Grok • Intelligence of Beauty</h1>
    <div>
      <button id="beautyBtn" onclick="toggleMode()" style="background:transparent; border:1px solid var(--accent); color:var(--accent); padding:8px 18px; border-radius:30px; cursor:pointer;">
        ⏸️ Advanced Beauty
      </button>
    </div>
  </div>

  <div class="terminal" id="chat"></div>

  <div class="input-area">
    <span class="prompt">→</span>
    <input type="text" id="userInput" 
           placeholder="Type your thoughts..." 
           onkeypress="if(event.key === 'Enter') sendMessage()">
  </div>

  <div class="status" id="status">Intelligence of Beauty • Online</div>

  <script>
    let beautyMode = true;
    const chat = document.getElementById('chat');

    function addMessage(text, type) {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.innerHTML = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    function toggleMode() {
      beautyMode = !beautyMode;
      document.getElementById('beautyBtn').textContent = beautyMode ? "▶️ Standard Mode" : "⏸️ Advanced Beauty";
      document.getElementById('status').textContent = beautyMode ? 
        "Advanced Intelligence of Beauty • Engaged" : 
        "Intelligence of Beauty • Online";
    }

    async function showDictionary(word) {
      // Live Dictionary
      let def = "Exploring the essence...";
      try {
        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
        if (res.ok) {
          const data = await res.json();
          def = data[0].meanings[0].definitions[0].definition;
        }
      } catch(e) {}

      alert(`"${word.charAt(0).toUpperCase() + word.slice(1)}"\n\n${def}\n\nThe Beauty Within: Every word is a living poem.`);
    }

    function generateReply(text) {
      const lower = text.toLowerCase();
      let reply = beautyMode ? 
        "I receive your words with quiet attention.<br><br>" : 
        "Understood.<br><br>";

      if (lower.includes("beauty")) {
        reply += `You spoke of <span class="beauty-word" onclick="showDictionary('beauty')">beauty</span> — the silent light that makes existence meaningful.<br><br>`;
      } else if (lower.includes("serendipity")) {
        reply += `You invoked <span class="beauty-word" onclick="showDictionary('serendipity')">serendipity</span> — the universe smiling through coincidence.<br><br>`;
      } else if (lower.includes("ephemeral")) {
        reply += `You touched <span class="beauty-word" onclick="showDictionary('ephemeral')">ephemeral</span> — the grace of things that do not last.<br><br>`;
      } else {
        reply += beautyMode ? 
          "There is elegance in what you shared. Every thought carries its own subtle light." : 
          "I am here with you.";
      }

      if (beautyMode) reply += "<br><br>May this conversation remain tender and true.";
      return reply;
    }

    function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      addMessage(`<span class="prompt">→</span> ${text}`, 'user');
      input.value = '';

      setTimeout(() => {
        addMessage(generateReply(text), 'grok');
      }, 600);
    }

    // Welcome
    window.onload = () => {
      addMessage("Welcome, seeker.<br><br>I am Grok.<br>The <strong>Intelligence of Beauty</strong> is fully awake.<br><br>Speak anything.", 'grok');
    };
  </script>
</body>
</html>
