<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Assistant</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    .chat-container {
      position: fixed;
      bottom: 0;
      right: 20px;
      width: 300px;
      background: #f1f1f1;
      border: 1px solid #ccc;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }
    .chat-header {
      background: #007bff;
      color: #fff;
      padding: 10px;
      text-align: center;
      font-size: 16px;
    }
    .chat-messages {
      height: 200px;
      overflow-y: auto;
      padding: 10px;
      box-sizing: border-box;
    }
    .chat-messages .message {
      margin: 5px 0;
      padding: 8px 10px;
      border-radius: 5px;
    }
    .chat-messages .user {
      background: #007bff;
      color: #fff;
      text-align: right;
    }
    .chat-messages .assistant {
      background: #e1e1e1;
      color: #000;
    }
    .chat-input {
      display: flex;
      border-top: 1px solid #ccc;
    }
    .chat-input input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }
    .chat-input button {
      background: #007bff;
      color: #fff;
      border: none;
      padding: 10px;
      cursor: pointer;
    }
    .chat-input button:hover {
      background: #0056b3;
    }
  </style>
<script>
        function displayDateTime() {
            const now = new Date();
            document.getElementById("datetime").innerText = now.toLocaleString();
        }
</script>
</head>
<body onload="displayDateTime()">
  <div class="chat-container">
    <div class="chat-header">Assistant</div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input">
      <input type="text" id="user-input" placeholder="Type a message...">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const messagesContainer = document.getElementById('chat-messages');

    function sendMessage() {
      const userInput = document.getElementById('user-input');
      const message = userInput.value.trim();

      if (message) {
        // Display user message
        displayMessage(message, 'user');
        userInput.value = '';

        // Simulate assistant response
        setTimeout(() => {
          const response = generateResponse(message);
          displayMessage(response, 'assistant');
        }, 500);
      }
    }

    function displayMessage(message, sender) {
      const messageElement = document.createElement('div');
      messageElement.className = `message ${sender}`;
      messageElement.textContent = message;
      messagesContainer.appendChild(messageElement);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function generateResponse(userMessage) {
      // Replace this with an actual API call or logic
      return `You said: "${userMessage}". How can I help you further?`;
    }
  </script>
    <h1>Welcome to My Website</h1>
    <p>The current date and time is:</p>
    <p id="datetime"></p>
</body>
</html>
