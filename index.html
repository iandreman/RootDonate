<script>
    const MONZO_LINK = "https://monzo.me/iandreme";

    let state = {
      level: 1,
      candies: 142,
      shards: 27,
      shops: 1,
      bankrupt: false,
      shopLocations: [
        { id: 1, name: "London Flagship", lat: 51.5074, lng: -0.1278, salesBonus: 1.12, upkeepCost: 38 }
      ]
    };

    let mapInstance;
    let markers = [];
    let marketItems = [
      { id: "dragonToffee", name: "Dragonfire Toffee", avgPrice: 24, supply: 42 },
      { id: "moonSugar", name: "Moon Sugar Crystals", avgPrice: 41, supply: 18 },
      { id: "gummyHydra", name: "Rainbow Gummy Hydra", avgPrice: 79, supply: 5 }
    ];

    const expansionCities = [
      {name:"New York", lat:40.7128, lng:-74.0060, salesBonus:1.28, upkeepCost:52},
      {name:"Tokyo", lat:35.6762, lng:139.6503, salesBonus:1.35, upkeepCost:48},
      {name:"Paris", lat:48.8566, lng:2.3522, salesBonus:1.22, upkeepCost:45},
      {name:"Sydney", lat:-33.8688, lng:151.2093, salesBonus:1.15, upkeepCost:35},
      {name:"Dubai", lat:25.2048, lng:55.2708, salesBonus:1.30, upkeepCost:42},
      {name:"Los Angeles", lat:34.0522, lng:-118.2437, salesBonus:1.18, upkeepCost:44},
      {name:"Mumbai", lat:19.0760, lng:72.8777, salesBonus:1.08, upkeepCost:22},
      {name:"Rio de Janeiro", lat:-22.9068, lng:-43.1729, salesBonus:1.10, upkeepCost:25}
    ];

    // ====================== GLOBAL URL SAVE / LOAD ======================
    function saveToURL() {
      const compressed = btoa(JSON.stringify(state));
      const newURL = window.location.origin + window.location.pathname + '?global=' + compressed;
      window.history.replaceState({}, '', newURL);
    }

    function loadFromURL() {
      const params = new URLSearchParams(window.location.search);
      const saved = params.get('global');
      if (saved) {
        try {
          const loadedState = JSON.parse(atob(saved));
          Object.assign(state, loadedState);
        } catch(e) {}
      }
    }

    function copyGlobalLink() {
      saveToURL();
      navigator.clipboard.writeText(window.location.href).then(() => {
        alert("✅ Global Empire link copied!\n\nShare this link with friends — everyone will play in the SAME candy empire!");
      });
    }

    function saveGame() { saveToURL(); }

    function addLog(html) {
      const logEl = document.getElementById('log');
      const p = document.createElement('p');
      p.innerHTML = html;
      logEl.appendChild(p);
      logEl.scrollTop = logEl.scrollHeight;
      if (logEl.children.length > 60) logEl.removeChild(logEl.children[0]);
    }

    function updateUI() {
      document.getElementById('level').textContent = state.level;
      document.getElementById('candies').textContent = Math.floor(state.candies);
      document.getElementById('shards').textContent = state.shards;
      document.getElementById('shops').textContent = state.shops;
      saveGame();

      const rescueBtn = document.getElementById('rescueBtn');
      if (rescueBtn) rescueBtn.style.display = state.bankrupt ? 'inline-block' : 'none';
    }

    function calculateTotalUpkeep() {
      return state.shopLocations.reduce((total, shop) => total + shop.upkeepCost, 0);
    }

    function applyUpkeep() {
      if (state.bankrupt) return;
      const totalUpkeep = calculateTotalUpkeep();
      if (state.candies >= totalUpkeep) {
        state.candies -= totalUpkeep;
        addLog(`🧾 Upkeep paid for ${state.shops} shops: -${totalUpkeep} 🍬`);
      } else {
        state.candies = 0;
        state.bankrupt = true;
        addLog(`<strong style="color:#ff7675;">💸 BANKRUPT! Total upkeep (${totalUpkeep} 🍬) exceeded stock.</strong>`);
        addLog(`<span style="color:#e84393;">You must pay to rescue your empire!</span>`);
      }
      updateUI();
    }

    // ==================== COMPULSORY RESCUE FROM BANKRUPTCY ====================
    function rescueFromBankruptcy() {
      if (!state.bankrupt) {
        addLog("✅ Your empire is not bankrupt.");
        return;
      }

      const costCandies = 180;
      const costShards = 45;

      if (state.candies >= costCandies) {
        state.candies -= costCandies;
        state.bankrupt = false;
        state.candies += 100; // recovery boost
        addLog(`🚨 <strong style="color:#00b894;">EMPIRE RESCUED!</strong> Paid ${costCandies} 🍬. +100 🍬 recovery boost!`);
      } 
      else if (state.shards >= costShards) {
        state.shards -= costShards;
        state.bankrupt = false;
        state.candies += 130; // bigger boost when paying with shards
        addLog(`🚨 <strong style="color:#00b894;">EMPIRE RESCUED!</strong> Paid ${costShards} ✨ shards. +130 🍬 recovery boost!`);
      } 
      else {
        addLog(`❌ <strong>Cannot rescue yet.</strong> You need either <b>${costCandies} 🍬</b> or <b>${costShards} ✨</b>`);
        return;
      }

      updateUI();
    }

    function serveCustomer(type) {
      if (state.bankrupt) {
        addLog(`<span style="color:#ff7675;">Your empire is bankrupt! You must rescue it first by paying the fee.</span>`);
        return;
      }
      let baseGain = type === 'premium' ? 48 : type === 'wild' ? 67 : 22;
      const totalBonus = state.shopLocations.reduce((sum, s) => sum + (s.salesBonus - 1), 0);
      const finalGain = Math.floor(baseGain * (1 + totalBonus * 0.7));

      state.candies += finalGain;
      addLog(`💰 Worldwide sales! <strong>+${finalGain} 🍬</strong>`);
      updateUI();
    }

    function renderMarket() {
      const container = document.getElementById('marketList');
      container.innerHTML = '';
      marketItems.forEach(item => {
        const div = document.createElement('div');
        div.className = 'market-item';
        div.innerHTML = `
          <div><strong>${item.name}</strong><br><small>Avg price: <b>${item.avgPrice} 🍬</b></small></div>
          <div>
            <button onclick="tradeMarket('${item.id}', 'buy')">Buy</button>
            <button onclick="tradeMarket('${item.id}', 'sell')">Sell</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function tradeMarket(id, action) {
      if (state.bankrupt) {
        addLog(`<span style="color:#ff7675;">Empire is bankrupt — rescue first.</span>`);
        return;
      }
      const item = marketItems.find(i => i.id === id);
      if (!item) return;

      if (action === 'buy') {
        if (state.candies >= item.avgPrice) {
          state.candies -= item.avgPrice;
          item.avgPrice = Math.floor(item.avgPrice * 1.07);
          addLog(`📈 Bought 1x <strong>${item.name}</strong>`);
        } else {
          addLog(`❌ Not enough candies.`);
        }
      } else {
        const sellPrice = Math.floor(item.avgPrice * 0.89);
        state.candies += sellPrice;
        item.avgPrice = Math.max(12, Math.floor(item.avgPrice * 0.94));
        addLog(`📉 Sold 1x <strong>${item.name}</strong> for ${sellPrice} 🍬`);
      }
      updateUI();
      renderMarket();
    }

    function buyPack(candiesAmount, shardsAmount, priceGBP, packName) {
      const note = encodeURIComponent(`Sugar Realms - ${packName}`);
      window.open(`${MONZO_LINK}/${priceGBP}?d=${note}`, '_blank');
      addLog(`🔗 Opened Monzo for <strong>${packName}</strong> (£${priceGBP})`);
      window.pendingDelivery = {candies: candiesAmount, shards: shardsAmount};
    }

    function expandEmpire() {
      if (state.shopLocations.length >= 10) {
        alert("Your empire is already massive! (Max 10 shops)");
        return;
      }
      const note = encodeURIComponent("Sugar Realms - New Shop Expansion");
      window.open(`${MONZO_LINK}/12?d=${note}`, '_blank');

      setTimeout(() => {
        const city = expansionCities[Math.floor(Math.random() * expansionCities.length)];
        const newShop = {
          id: state.shopLocations.length + 1,
          name: city.name + " Candy Store",
          lat: city.lat, lng: city.lng,
          salesBonus: city.salesBonus,
          upkeepCost: city.upkeepCost
        };
        state.shopLocations.push(newShop);
        state.shops = state.shopLocations.length;
        state.candies += 380;

        addLog(`🎉 New shop opened in <strong>${city.name}</strong>! (+${Math.round((city.salesBonus-1)*100)}% sales | ${city.upkeepCost} 🍬 upkeep)`);
        if (mapInstance) renderShopsOnMap();
        updateUI();
      }, 800);
    }

    function initMap() {
      mapInstance = L.map('map').setView([20, 0], 2);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(mapInstance);
      renderShopsOnMap();

      L.easyButton({
        position: 'bottomright',
        states: [{
          stateName: 'terminal',
          icon: '🍬',
          title: 'Open Sugar Terminal',
          onClick: toggleTerminal
        }]
      }).addTo(mapInstance);
    }

    function renderShopsOnMap() {
      markers.forEach(m => m.remove());
      markers = [];
      state.shopLocations.forEach(shop => {
        const popup = `<b>${shop.name}</b><br>Sales Bonus: +${Math.round((shop.salesBonus-1)*100)}%<br>Daily Upkeep: ${shop.upkeepCost} 🍬`;
        const marker = L.marker([shop.lat, shop.lng]).addTo(mapInstance).bindPopup(popup);
        markers.push(marker);
      });
    }

    function switchTab(n) {
      document.querySelectorAll('.tab-content').forEach((el, i) => el.classList.toggle('active', i === n));
      document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', i === n));

      if (n === 1 && !mapInstance) setTimeout(initMap, 100);
      if (n === 3) renderMarket();
    }

    function createFloatingCandies() {
      const bg = document.getElementById('candyBg');
      const emojis = ['🍭','🍬','🍫','🍩','🧁','🍪','🌈','✨'];
      for (let i = 0; i < 18; i++) {
        const candy = document.createElement('div');
        candy.className = 'floating-candy';
        candy.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        candy.style.left = Math.random() * 100 + 'vw';
        candy.style.animationDuration = (Math.random() * 12 + 15) + 's';
        candy.style.animationDelay = '-' + (Math.random() * 30) + 's';
        bg.appendChild(candy);
      }
    }

    // ====================== TERMINAL ======================
    function toggleTerminal() {
      const term = document.getElementById('terminal');
      term.style.display = (term.style.display === 'flex') ? 'none' : 'flex';
      if (term.style.display === 'flex') document.getElementById('terminal-input').focus();
    }

    function terminalPrint(text, color = '#0f0') {
      const output = document.getElementById('terminal-output');
      const line = document.createElement('div');
      line.style.color = color;
      line.textContent = text;
      output.appendChild(line);
      output.scrollTop = output.scrollHeight;
    }

    function runTerminalCommand() {
      const input = document.getElementById('terminal-input');
      const cmd = input.value.trim().toLowerCase();
      if (!cmd) return;

      terminalPrint('> ' + cmd, '#aaa');

      if (cmd === 'help') {
        terminalPrint('Commands:', '#ff0');
        terminalPrint('  add candies <number>');
        terminalPrint('  add shards <number>');
        terminalPrint('  rescue          ← Pay to rescue empire from bankruptcy');
        terminalPrint('  clear');
        terminalPrint('  help');
      } else if (cmd.startsWith('add candies')) {
        const num = parseInt(cmd.split(' ')[2]) || 100;
        state.candies += num;
        terminalPrint(`+${num} 🍬 added!`, '#0f0');
        updateUI();
      } else if (cmd.startsWith('add shards')) {
        const num = parseInt(cmd.split(' ')[2]) || 10;
        state.shards += num;
        terminalPrint(`+${num} ✨ added!`, '#0f0');
        updateUI();
      } else if (cmd === 'rescue' || cmd === 'rescue empire') {
        rescueFromBankruptcy();
      } else if (cmd === 'clear') {
        document.getElementById('terminal-output').innerHTML = '';
      } else {
        terminalPrint('Unknown command. Type "help"', '#f66');
      }

      input.value = '';
    }

    // ====================== AUTO TIMERS ======================
    setInterval(() => {
      if (!state.bankrupt) {
        const bonus = Math.floor(Math.random() * 6) + 1;
        state.candies += bonus;
        addLog(`💾 Auto-saved! +${bonus} 🍬 bonus`);
        updateUI();
      }
    }, 60000);

    setInterval(applyUpkeep, 60000);

    // ====================== INIT ======================
    window.onload = () => {
      loadFromURL();
      updateUI();
      addLog("<em>🍭 Welcome to the Global Sugar Realms!</em>");
      addLog("Everyone who uses this link shares the same empire!");

      // Add compulsory rescue button
      const empireTab = document.getElementById('tab0');
      const rescueHTML = `
        <div style="text-align:center; margin:18px 0 10px;">
          <button id="rescueBtn" onclick="rescueFromBankruptcy()" 
                  style="background:#e84393; display:none; padding:16px 32px; font-size:1.2em; box-shadow:0 8px 20px rgba(232,67,147,0.4);">
            🚨 PAY TO RESCUE EMPIRE (180 🍬 or 45 ✨)
          </button>
        </div>`;
      empireTab.insertAdjacentHTML('beforeend', rescueHTML);

      createFloatingCandies();
      switchTab(0);

      if (window.pendingDelivery) {
        state.candies += window.pendingDelivery.candies || 0;
        state.shards += window.pendingDelivery.shards || 0;
        addLog(`📦 Stock delivered! +${window.pendingDelivery.candies} 🍬`);
        window.pendingDelivery = null;
        updateUI();
      }
    };
  </script>
