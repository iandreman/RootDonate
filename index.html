<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERRA-001 // EARTH NODE TERMINAL v1.4</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --green: #00ff9d;
            --cyan: #00f0ff;
            --dark: #0a0f1c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'VT323', monospace;
            background: #05080f;
            color: var(--green);
            height: 100vh;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(0,255,150,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,150,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .header {
            background: rgba(0, 20, 30, 0.98);
            border-bottom: 4px solid var(--green);
            padding: 10px 25px;
            font-size: 1.6rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.4);
        }

        .stats {
            display: flex;
            gap: 35px;
            font-size: 1.35rem;
        }

        .main {
            display: flex;
            height: calc(100vh - 68px);
            padding: 15px;
            gap: 15px;
        }

        .panel {
            flex: 1;
            background: rgba(10, 20, 35, 0.95);
            border: 2px solid var(--cyan);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 25px rgba(0, 204, 255, 0.25);
        }

        .panel-header {
            background: #001122;
            padding: 12px 20px;
            font-size: 1.55rem;
            color: var(--cyan);
            border-bottom: 2px solid var(--green);
        }

        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 1.45rem;
            line-height: 1.65;
        }

        input {
            width: 100%;
            padding: 18px;
            font-size: 1.6rem;
            background: #000;
            border: 2px solid #004422;
            color: var(--green);
            font-family: 'VT323', monospace;
            outline: none;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 8px;
            font-size: 1.45rem;
            background: #001a11;
            color: var(--green);
            border: 2px solid var(--green);
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #003322;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.6);
        }

        .donate {
            background: linear-gradient(45deg, #ff3366, #ffaa00);
            color: #000;
            border: 2px solid #ffcc00;
            font-weight: bold;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(transparent 50%, rgba(0, 255, 100, 0.08) 50%);
            background-size: 100% 6px;
            pointer-events: none;
            animation: scan 12s linear infinite;
            z-index: 100;
            opacity: 0.4;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .log { font-size: 1.3rem; }
        .success { color: #00ff9d; }
        .warning { color: #ffcc00; }
    </style>
</head>
<body>

    <div class="header">
        <div>🌍 TERRA-001 • EARTH NODE TERMINAL v1.4</div>
        <div class="stats">
            <span>LVL <span id="level">1</span></span>
            <span>🔋 <span id="resonance">420</span></span>
            <span>ALIGN <span id="alignment">67%</span></span>
        </div>
        <div id="time" style="color:var(--cyan);"></div>
    </div>

    <div class="main">

        <!-- LEFT PANEL: NODE STATUS -->
        <div class="panel">
            <div class="panel-header">📡 EARTH NODE STATUS</div>
            <div class="content" id="status-panel">
                <p>Synchronizing with planetary core...</p>
            </div>
            <div style="padding:15px; background:#001a22; display:flex; gap:10px; flex-wrap:wrap;">
                <button onclick="injectResonance('bio')">INJECT BIO 🌱</button>
                <button onclick="injectResonance('mag')">STABILIZE MAG 🌀</button>
                <button onclick="injectResonance('noo')">AWAKEN NOO 🧬</button>
            </div>
        </div>

        <!-- RIGHT PANEL: COMMAND TERMINAL -->
        <div class="panel">
            <div class="panel-header">☰ COMMAND TERMINAL • LEXICON QUERY</div>
            <div style="padding:15px 20px; background:#000;">
                <input type="text" id="command" placeholder="ENTER WORD / IP / COMMAND..." onkeypress="if(event.key==='Enter') runCommand()">
            </div>
            <div style="padding:0 20px 15px;">
                <button onclick="runCommand()">EXECUTE QUERY →</button>
                <button onclick="donateEnergy()" class="donate">DONATE ENERGY & CHARGE NODE</button>
                <button onclick="clearScreen()" style="background:#220000; border-color:#ff4444;">CLEAR TERMINAL</button>
            </div>
            <div class="content log" id="output">
                <p class="success">>> TERRA-001 ONLINE</p>
                <p class="success">>> AWAITING OPERATOR INPUT...</p>
            </div>
        </div>

    </div>

    <div class="scanline"></div>

<script>
// Game State
let state = {
    level: 1,
    resonance: 420,
    alignment: 67,
    earthHealth: { bio: 85, mag: 72, noo: 91 }
};

function loadSave() {
    const saved = localStorage.getItem('terraTerminal');
    if (saved) Object.assign(state, JSON.parse(saved));
}

function saveGame() {
    localStorage.setItem('terraTerminal', JSON.stringify(state));
}

function updateUI() {
    document.getElementById('level').textContent = state.level;
    document.getElementById('resonance').textContent = Math.floor(state.resonance);
    document.getElementById('alignment').textContent = Math.floor(state.alignment) + "%";
}

function addOutput(text, className = "") {
    const output = document.getElementById('output');
    const line = document.createElement('div');
    line.innerHTML = `>> ${text}`;
    if (className) line.className = className;
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
}

// Live Clock
function updateTime() {
    const now = new Date();
    document.getElementById('time').textContent = now.toLocaleTimeString('en-GB', {timeZone: 'UTC'}) + " UTC";
}
setInterval(updateTime, 1000);
updateTime();

// Earth Status
function updateEarthStatus() {
    const panel = document.getElementById('status-panel');
    panel.innerHTML = `
        <strong style="color:#00ccff;">PLANETARY CORE VITALS</strong><br><br>
        BIO FIELD : ${state.earthHealth.bio}%<br>
        MAG FIELD : ${state.earthHealth.mag}%<br>
        NOO FIELD : ${state.earthHealth.noo}%<br><br>
        SCHUMANN : ${(7.8 + Math.random()*3).toFixed(2)} Hz<br>
        TEMP      : 15.3°C
    `;
}

// Inject Resonance
function injectResonance(type) {
    const cost = 130 + state.level * 15;
    if (state.resonance < cost) {
        addOutput("INSUFFICIENT RESONANCE", "warning");
        return;
    }

    state.resonance -= cost;

    if (type === 'bio') state.earthHealth.bio = Math.min(100, state.earthHealth.bio + 16);
    if (type === 'mag') state.earthHealth.mag = Math.min(100, state.earthHealth.mag + 20);
    if (type === 'noo') state.earthHealth.noo = Math.min(100, state.earthHealth.noo + 24);

    addOutput(`${type.toUpperCase()} RESONANCE INJECTED [+35]`, "success");
    state.resonance += 35;
    updateEarthStatus();
    updateUI();
    saveGame();
}

// Run Command (Search)
function runCommand() {
    const input = document.getElementById('command').value.trim();
    if (!input) return;

    addOutput(`QUERYING: ${input.toUpperCase()}`);

    setTimeout(() => {
        const reward = Math.floor(input.length * 18 + Math.random() * 70);
        addOutput(`WORD REGISTERED IN NOOSPHERE`, "success");
        addOutput(`CORE RESONANCE GAINED: +${reward}`, "success");
        
        state.resonance += reward;
        if (state.resonance >= state.level * 1100) {
            state.level++;
            addOutput(`NODE LEVEL UP! NOW LEVEL ${state.level}`, "success");
        }
        updateUI();
        saveGame();
    }, 700);

    document.getElementById('command').value = '';
}

// Donate
function donateEnergy() {
    window.open('https://monzo.me/iandreme', '_blank');
    const reward = 120 + state.level * 25;
    state.resonance += reward;
    addOutput(`THANK YOU FOR CHARGING THE CORE [+${reward} RESONANCE]`, "success");
    updateUI();
    saveGame();
}

function clearScreen() {
    document.getElementById('output').innerHTML = `<p class="success">>> TERMINAL CLEARED</p>`;
}

// Initialize
window.onload = () => {
    loadSave();
    updateUI();
    updateEarthStatus();
    
    // Welcome message
    setTimeout(() => {
        addOutput("PERSONAL EARTH NODE ONLINE", "success");
        addOutput("TYPE A WORD OR IP TO BEGIN QUERY", "success");
    }, 600);
};
</script>

</body>
</html>
