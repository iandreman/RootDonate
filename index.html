<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Terminal • Type to URL</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d1117;
      color: #00ff9d;
      font-family: 'Courier New', Consolas, monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      user-select: none;
    }

    #terminal {
      flex: 1;
      position: relative;
      background: #0d1117;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: #ffffff;
    }

    #input-area {
      padding: 16px 20px;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .prompt {
      color: #00ff9d;
      user-select: none;
      pointer-events: none;
    }

    input {
      background: transparent;
      border: none;
      color: #00ff9d;
      font-family: inherit;
      font-size: 16px;
      outline: none;
      flex: 1;
      caret-color: #00ff9d;
    }

    input::placeholder {
      color: #555;
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(13, 17, 23, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      text-align: center;
      color: #888;
      pointer-events: none;
    }

    button {
      background: #21262d;
      color: #00ff9d;
      border: 1px solid #30363d;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }

    button:hover {
      background: #30363d;
      border-color: #00ff9d;
    }

    .status {
      font-size: 13px;
      color: #666;
      margin-top: 6px;
    }
  </style>
</head>
<body>

  <div id="header">
    <span><span class="prompt">$</span> Smart Terminal — Type anything → Open URL</span>
    <button onclick="shareTerminal()">Share Link</button>
  </div>

  <div id="terminal">
    <div id="overlay">
      <div><span class="prompt">$</span> Ready to go</div>
      <div class="status">Type text, domain, or full URL and press <strong>Enter</strong></div>
    </div>
    <iframe id="iframe" src="https://rootdonate.co.uk"></iframe>
  </div>

  <div id="input-area">
    <span class="prompt">$</span>
    <input 
      type="text" 
      id="input" 
      placeholder="google.com or just type 'youtube'..." 
      autofocus 
      autocomplete="off"
      spellcheck="false">
  </div>

  <script>
    const input = document.getElementById('input');
    const iframe = document.getElementById('iframe');
    const overlay = document.getElementById('overlay');

    let history = [];
    let historyIndex = -1;

    // Smart URL conversion with better logic
    function smartURLImport(cmd) {
      let trimmed = cmd.trim();
      if (!trimmed) return;

      // Save to history
      history.unshift(trimmed);
      if (history.length > 50) history.pop();
      historyIndex = -1;

      let url = trimmed;

      // Smart conversion logic
      if (!/^https?:\/\//i.test(trimmed)) {
        trimmed = trimmed.toLowerCase();

        // If it looks like a domain (has dot and no spaces)
        if (/\.[a-z]{2,}/.test(trimmed) && !trimmed.includes(' ')) {
          url = trimmed.startsWith('www.') ? 'https://' + trimmed : 'https://' + trimmed;
        }
        // Search query fallback
        else {
          url = 'https://www.google.com/search?q=' + encodeURIComponent(trimmed);
        }
      }

      // Hide overlay and load URL
      overlay.style.display = 'none';
      iframe.src = url;

      // Clear input
      input.value = '';
    }

    // Enter key handler
    input.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        smartURLImport(input.value);
      }
    });

    // History navigation (Up / Down arrows)
    input.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (history.length === 0) return;
        historyIndex = Math.min(historyIndex + 1, history.length - 1);
        input.value = history[historyIndex];
      } 
      else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIndex <= 0) {
          historyIndex = -1;
          input.value = '';
        } else {
          historyIndex--;
          input.value = history[historyIndex];
        }
      }
    });

    // Focus input when clicking anywhere
    document.addEventListener('click', () => input.focus());

    // Initial focus
    window.onload = () => {
      input.focus();
    };

    // Share current terminal link
    function shareTerminal() {
      const shareUrl = window.location.href;
      navigator.clipboard.writeText(shareUrl).then(() => {
        const btn = document.querySelector('button');
        const originalText = btn.textContent;
        btn.textContent = '✅ Copied!';
        setTimeout(() => {
          btn.textContent = originalText;
        }, 2000);
      }).catch(() => {
        alert('Failed to copy. Here is the link:\n' + shareUrl);
      });
    }
  </script>

</body>
</html>
