<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RootDonate • The Abyss Speaks</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=VT323&display=swap');

    :root {
      --accent: #00ff9d;
      --void: #0a0a0a;
      --deep: #001a0f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #e6d5b8;
      font-family: 'Cinzel', serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(0, 255, 157, 0.03) 0%, transparent 70%);
    }

    .container {
      width: 100%;
      max-width: 920px;
      height: 94vh;
      margin: 20px;
      background: rgba(8, 12, 10, 0.97);
      border: 14px solid #111;
      border-image: linear-gradient(45deg, #00ff9d, #004d33) 1;
      box-shadow: 0 0 90px rgba(0, 255, 157, 0.25),
                  inset 0 0 60px rgba(0, 0, 0, 0.8);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: rgba(5, 5, 5, 0.98);
      padding: 22px 32px;
      border-bottom: 5px solid var(--accent);
      display: flex;
      align-items: center;
      gap: 18px;
      flex-shrink: 0;
    }

    .rune {
      font-size: 3.2rem;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent),
                   0 0 40px rgba(0, 255, 157, 0.4);
      animation: pulse 4s infinite alternate ease-in-out;
    }

    .title {
      font-size: 2.6rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .subtitle {
      font-family: 'VT323', monospace;
      color: #00cc77;
      font-size: 1.05rem;
      letter-spacing: 3px;
      margin-top: -4px;
    }

    .input-area {
      padding: 28px 32px;
      background: var(--void);
      flex-shrink: 0;
    }

    input {
      background: #0f0f0f;
      border: 3px solid #004d33;
      color: #00ff9d;
      font-family: 'VT323', monospace;
      width: 100%;
      padding: 22px 30px;
      font-size: 1.85rem;
      border-radius: 9999px;
      outline: none;
      transition: all 0.3s ease;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 30px rgba(0, 255, 157, 0.4);
      background: #111;
    }

    .button-group {
      display: flex;
      gap: 14px;
      margin-top: 20px;
      justify-content: center;
    }

    button {
      cursor: pointer;
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      padding: 14px 28px;
      border-radius: 9999px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .lookup-btn {
      background: #001a00;
      border: 3px solid var(--accent);
      color: var(--accent);
      flex: 1;
      max-width: 260px;
    }

    .lookup-btn:hover {
      background: #003300;
      box-shadow: 0 0 25px rgba(0, 255, 157, 0.5);
    }

    .ai-btn {
      background: linear-gradient(90deg, #00ff9d, #00cc77);
      color: #000;
      font-weight: 700;
      flex: 1;
      max-width: 260px;
      box-shadow: 0 0 20px rgba(0, 255, 157, 0.6);
    }

    .ai-btn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 0 35px rgba(0, 255, 157, 0.8);
    }

    .result {
      padding: 32px;
      flex: 1;
      overflow-y: auto;
      background: rgba(6, 14, 10, 0.96);
      line-height: 1.75;
      font-size: 1.15rem;
    }

    .word {
      font-size: 3.2rem;
      color: var(--accent);
      text-shadow: 0 0 15px var(--accent);
      border-bottom: 3px dashed #00cc77;
      padding-bottom: 8px;
    }

    .phonetic {
      font-family: 'VT323', monospace;
      color: #00cc77;
      font-size: 1.55rem;
      margin-top: 6px;
    }

    .meaning {
      background: rgba(0, 35, 20, 0.65);
      border-left: 7px solid var(--accent);
      padding: 22px;
      margin: 24px 0;
      border-radius: 6px;
    }

    .example {
      font-style: italic;
      color: #a0d8c0;
      margin-top: 12px;
      padding-left: 18px;
      border-left: 3px solid #00cc77;
    }

    .ai-section {
      margin-top: 48px;
      padding: 28px;
      background: rgba(0, 40, 25, 0.75);
      border: 2px solid var(--accent);
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0, 255, 157, 0.2);
    }

    .void-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }

    .glitch {
      animation: glitch 0.4s linear infinite alternate;
    }

    @keyframes glitch {
      0% { text-shadow: 3px 0 #ff00ff, -3px 0 #00ffff; }
      100% { text-shadow: -3px 0 #ff00ff, 3px 0 #00ffff; }
    }

    .pulse {
      animation: pulse 3s infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 0.85; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="rune">☰</div>
    <div>
      <h1 class="title">RootDonate</h1>
      <p class="subtitle">THE ABYSS DICTIONARY • REAL-TIME • ETERNAL</p>
    </div>
    
    <div class="ml-auto flex items-center gap-4">
      <button onclick="shareVoid()" 
        class="px-6 py-3 border border-[#00cc77]/70 hover:border-[#00ff9d] hover:bg-black/50 rounded-2xl flex items-center gap-3 text-sm uppercase tracking-widest">
        <span>SHARE THE VOID</span>
      </button>

      <button onclick="clearResult()" 
        class="px-6 py-3 bg-black border-2 border-[#00ff9d] hover:bg-[#001a00] rounded-2xl flex items-center gap-2">
        CLEAR
      </button>
    </div>
  </div>

  <!-- SEARCH INPUT -->
  <div class="input-area">
    <div class="max-w-3xl mx-auto">
      <input type="text" id="search-input" 
        placeholder="ENTER WORD INTO THE ABYSS...">
      
      <div class="button-group">
        <button onclick="searchWord()" class="lookup-btn">
          <span>LOOKUP IN THE VOID</span>
        </button>
        <button onclick="askAI()" class="ai-btn">
          ASK THE VOID AI
        </button>
      </div>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="result" class="result"></div>

</div>

<script>
  // Share current URL
  function shareVoid() {
    const url = window.location.href;
    navigator.clipboard.writeText(url).then(() => {
      const btn = event.currentTarget;
      const originalHTML = btn.innerHTML;
      btn.innerHTML = `✓ COPIED TO CLIPBOARD`;
      btn.style.color = '#00ff9d';
      
      setTimeout(() => {
        btn.innerHTML = originalHTML;
        btn.style.color = '';
      }, 2200);
    }).catch(() => {
      alert("Could not copy automatically.\n\nLink: " + url);
    });
  }

  async function searchWord() {
    const input = document.getElementById('search-input');
    const word = input.value.trim().toLowerCase();
    const resultDiv = document.getElementById('result');

    if (!word) {
      resultDiv.innerHTML = `<p class="text-center text-red-400 text-2xl py-20">The void is silent... Speak a word.</p>`;
      return;
    }

    resultDiv.innerHTML = `
      <div class="flex items-center justify-center h-full text-[#00ff9d] text-2xl">
        <span class="animate-pulse">☰</span> 
        <span class="ml-4">DESCENDING INTO THE LEXICON...</span>
      </div>`;

    try {
      const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
      if (!response.ok) throw new Error('Not found');

      const data = await response.json();
      const entry = data[0];

      let html = `
        <div class="mb-12">
          <div class="flex items-center justify-between">
            <div>
              <div class="word">${entry.word}</div>
              ${entry.phonetic ? `<div class="phonetic">${entry.phonetic}</div>` : ''}
            </div>`;

      const audio = entry.phonetics?.find(p => p.audio);
      if (audio) {
        html += `
          <button onclick="playAudio('${audio.audio}')" 
            class="px-8 py-4 border-2 border-[#00ff9d] text-[#00ff9d] rounded-3xl hover:bg-[#001a00] transition-all">
            PRONOUNCE
          </button>`;
      }
      html += `</div>`;

      html += `<h3 class="uppercase tracking-[4px] text-[#00cc77] text-sm mb-6 mt-12">MORTAL DEFINITIONS</h3>`;

      entry.meanings.forEach(meaning => {
        html += `<div class="meaning">`;
        html += `<div class="uppercase text-[#00cc77] tracking-widest text-sm mb-4">${meaning.partOfSpeech}</div>`;

        meaning.definitions.forEach((def, i) => {
          html += `
            <div class="mb-8">
              <div>${i + 1}. ${def.definition}</div>
              ${def.example ? `<div class="example">"${def.example}"</div>` : ''}
            </div>`;
        });
        html += `</div>`;
      });

      // Void AI Interpretation
      const voidInsight = generateVoidAIResponse(entry.word);
      html += `
        <div class="ai-section">
          <div class="void-header">
            <div class="text-4xl">☰</div>
            <div class="text-[#00ff9d] text-2xl tracking-widest">VOID AI WHISPERS</div>
          </div>
          <div class="text-[#e6d5b8] text-[1.1rem] leading-relaxed">
            ${voidInsight.replace(/\n/g, '<br><br>')}
          </div>
          <div class="mt-8 text-xs opacity-60 flex items-center gap-2">
            THE ABYSS REMEMBERS • THE ABYSS REVEALS
          </div>
        </div>`;

      resultDiv.innerHTML = html;

    } catch (e) {
      resultDiv.innerHTML = `
        <div class="text-center py-24">
          <div class="text-7xl mb-8 opacity-50">✦</div>
          <p class="text-3xl text-red-400">"${word}" does not exist in any known realm.</p>
          <p class="mt-6 text-[#00cc77]">The void has no memory of this word.</p>
        </div>`;
    }
  }

  async function askAI() {
    const input = document.getElementById('search-input');
    const query = input.value.trim();
    const resultDiv = document.getElementById('result');

    if (!query) {
      resultDiv.innerHTML = `<p class="text-center text-red-400 text-2xl py-20">The void waits for your question...</p>`;
      return;
    }

    resultDiv.innerHTML = `
      <div class="flex items-center justify-center h-full text-[#00ff9d] text-2xl glitch">
        <span>☰</span> 
        <span class="ml-4">THE ABYSS IS LISTENING...</span>
      </div>`;

    await new Promise(r => setTimeout(r, 1400));

    const response = generateVoidAIResponse(query);

    resultDiv.innerHTML = `
      <div class="ai-section">
        <div class="void-header">
          <div class="text-4xl">☰</div>
          <div>
            <div class="text-[#00ff9d] text-2xl tracking-widest">VOID AI RESPONDS</div>
            <div class="text-sm opacity-70 mt-1">"${query}"</div>
          </div>
        </div>
        <div class="text-[#e6d5b8] leading-relaxed text-[1.1rem]">
          ${response.replace(/\n/g, '<br><br>')}
        </div>
        <div class="mt-10 text-xs opacity-60">
          HEED THE WHISPERS • THEY NEVER LIE
        </div>
      </div>`;
  }

  function generateVoidAIResponse(query) {
    const roots = ["Proto-Indo-European", "Eldritch", "Forgotten Sumerian", "Void Tongue", "Pre-Cosmic"];
    const root = roots[Math.floor(Math.random() * roots.length)];

    let response = `From the endless black where language first bled into existence, the Void reveals the true nature of <span class="text-[#00ff9d]">"${query}"</span>.\n\n`;

    response += `Its origin lies in the ${root} stratum, where it once meant "${generateRootMeaning()}".\n\n`;

    response += `${generateMysticalInsight()}\n\n`;

    response += `To speak this word is to tear a small hole in the fabric of consensus reality. Use with caution.`;

    return response;
  }

  function generateRootMeaning() {
    const opts = [
      "to unmake what was never meant to be made",
      "to drink the silence between stars",
      "to become the echo that outlives the voice",
      "to remember the names that gods tried to erase",
      "to walk willingly into the mouth of oblivion"
    ];
    return opts[Math.floor(Math.random() * opts.length)];
  }

  function generateMysticalInsight() {
    const insights = [
      "It is not a word. It is a fracture. A place where meaning bleeds into something older than thought.",
      "Those who truly understand it no longer speak it aloud. They carry it like a wound that never closes.",
      "In the right mouth, this word can end empires. In the wrong one, it ends the speaker.",
      "It exists most powerfully in the space between what you say and what you refuse to admit.",
      "Every time it is spoken, somewhere in the dark, something ancient opens one more eye."
    ];
    return insights[Math.floor(Math.random() * insights.length)];
  }

  function playAudio(url) {
    new Audio(url).play().catch(() => {
      alert("The void's voice could not be reached.");
    });
  }

  function clearResult() {
    document.getElementById('result').innerHTML = '';
    const input = document.getElementById('search-input');
    input.value = '';
    input.focus();
  }

  // Enter key support
  document.getElementById('search-input').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') searchWord();
  });

  // Welcome message
  window.onload = () => {
    document.getElementById('result').innerHTML = `
      <div class="text-center py-20 text-[#00cc77]">
        <div class="text-6xl mb-10 pulse">☰</div>
        <h2 class="text-4xl mb-6 tracking-widest">VOIDLEX AWAKENS</h2>
        <p class="max-w-lg mx-auto text-lg">
          Feed any word into the abyss.<br>
          Receive both the knowledge of mortals and the <span class="text-[#00ff9d]">truth from beyond</span>.
        </p>
        <div class="mt-16 text-xs opacity-60 tracking-widest">
          POWERED BY THE DICTIONARY API + THE ETERNAL VOID
        </div>
      </div>`;
  };
</script>

</body>
</html>
