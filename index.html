<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERRA-001 // PERSONAL EARTH NODE OS v1.2 • GAME MODE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        :root {
            --accent: #00ff9d;
            --node: #00ccff;
            --warning: #ffcc00;
            --danger: #ff3366;
            --deep: #0a0f1c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'VT323', monospace;
            background: #05080f;
            color: #00ffcc;
            overflow: hidden;
            height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 255, 157, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 157, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .scanline {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 100, 0.08) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            animation: scan 8s linear infinite;
            z-index: 9999;
            opacity: 0.6;
        }

        @keyframes scan { 
            0% { transform: translateY(-100%); } 
            100% { transform: translateY(100%); } 
        }

        .terminal-header {
            background: rgba(0, 20, 30, 0.95);
            border-bottom: 3px solid var(--accent);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 4px;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.4);
            font-size: 1.35rem;
            flex-wrap: wrap;
            gap: 10px;
        }

        .player-stats {
            display: flex;
            gap: 25px;
            font-size: 1.1rem;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 68px);
        }

        @media (max-width: 900px) {
            .main-container { grid-template-columns: 1fr; }
        }

        .panel {
            background: rgba(10, 20, 35, 0.94);
            border: 2px solid var(--node);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 35px rgba(0, 204, 255, 0.25);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: #001122;
            padding: 14px 20px;
            font-size: 1.45rem;
            color: var(--accent);
            border-bottom: 2px solid var(--node);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .content, .result {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 1.35rem;
            line-height: 1.55;
        }

        .data-row, .market-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed rgba(0, 255, 204, 0.2);
        }

        .label { color: #88ffdd; }
        .value { color: #00ff9d; font-size: 1.42rem; }

        .positive { color: #00ff9d; }
        .negative { color: #ff3366; }

        .alert { color: var(--warning); animation: pulse 2s infinite; }

        .health-bar {
            height: 18px;
            background: #001a22;
            border: 1px solid var(--node);
            border-radius: 4px;
            overflow: hidden;
            margin: 8px 0;
        }

        .health-fill {
            height: 100%;
            transition: width 1s ease;
        }

        #search-input {
            width: 100%;
            padding: 18px 20px;
            font-size: 1.6rem;
            background: #000;
            border: 2px solid #003322;
            color: #00ffcc;
            font-family: 'VT323', monospace;
            outline: none;
        }

        .lookup-btn, .action-btn {
            width: 100%;
            padding: 18px;
            background: #002211;
            color: var(--accent);
            border: 2px solid var(--accent);
            font-size: 1.4rem;
            cursor: pointer;
            margin-top: 2px;
            transition: all 0.2s;
        }

        .lookup-btn:hover, .action-btn:hover {
            background: #003322;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.5);
        }

        .donate-btn {
            background: linear-gradient(45deg, #ff3366, #ffcc00);
            color: #000;
            font-weight: bold;
            border: 2px solid #ffcc00;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.6);
        }

        .donate-btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.9);
        }

        .core-signature {
            background: rgba(0, 30, 40, 0.85);
            border: 1px solid #00ff9d;
            padding: 22px;
            margin: 25px 0 10px;
            border-radius: 4px;
        }

        .core-title {
            color: #ffcc00;
            font-size: 1.65rem;
            margin-bottom: 18px;
            text-align: center;
            text-shadow: 0 0 10px #ffcc00;
        }

        .glitch { animation: glitch 1.2s infinite; }
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.75; }
        }

        .log-entry {
            font-size: 1.2rem;
            padding: 8px 0;
            border-bottom: 1px dotted rgba(0, 255, 204, 0.15);
        }

        .reward {
            color: #ffcc00;
            animation: rewardPop 1s ease;
        }

        @keyframes rewardPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="terminal-header">
        <div>🌍 TERRA-001 • PERSONAL EARTH NODE OS • v1.2 GAME MODE</div>
        <div class="player-stats">
            <div class="stat">LVL <span id="player-level" class="value">1</span></div>
            <div class="stat">🔋 <span id="player-resonance" class="value">420</span></div>
            <div class="stat">ALIGN <span id="player-alignment" class="value">67%</span></div>
        </div>
        <div id="live-time" style="color:#00ccff;"></div>
    </div>

    <div class="main-container">

        <!-- LEFT PANEL: EARTH NODE GAME CORE -->
        <div class="panel">
            <div class="panel-header">
                <span>📡 YOUR EARTH NODE • LIVE STATUS</span>
                <span id="overall-status" class="glitch" style="margin-left:auto; color:#00ff88;">● AWAKENING</span>
            </div>
            
            <div class="content" id="earth-report"></div>

            <div style="padding:15px 20px; background:#001a22; border-top:2px solid var(--node); display:flex; flex-wrap:wrap; gap:8px;">
                <button onclick="injectResonance('bio')" class="action-btn" style="flex:1; min-width:140px;">INJECT BIO 🌱</button>
                <button onclick="injectResonance('mag')" class="action-btn" style="flex:1; min-width:140px;">STABILIZE MAG 🌀</button>
                <button onclick="injectResonance('noo')" class="action-btn" style="flex:1; min-width:140px;">AWAKEN NOO 🧬</button>
                <button onclick="refreshEarthData()" style="background:none; border:1px solid #00ff9d; color:#00ff9d; padding:6px 18px; cursor:pointer; font-family:inherit; flex:1;">PULSE NODE</button>
            </div>
        </div>

        <!-- RIGHT PANEL: LEXICON + DONATION -->
        <div class="panel">
            <div class="panel-header">
                <span>☰ ROOTDONATE • ETERNAL LEXICON NODE</span>
            </div>
            
            <input type="text" id="search-input" placeholder="ENTER WORD OR IP... QUERY THE EARTH">
            <button onclick="searchWord()" class="lookup-btn">QUERY THE VOID →</button>
            
            <div style="display:flex; gap:8px; padding:0 20px 10px; flex-wrap:wrap;">
                <button onclick="clearTerminal()" class="action-btn" style="flex:1;">CLEAR VOID</button>
                <button onclick="shareNode()" class="action-btn" style="flex:1;">SHARE NODE</button>
                <button onclick="donateAndCharge()" class="action-btn donate-btn" style="flex:1; min-width:180px;">
                    🌍 DONATE &amp; CHARGE CORE (FREE)
                </button>
            </div>
            
            <div id="result" class="result">
                <div style="text-align:center; opacity:0.6; padding:60px 20px; font-size:1.45rem;">
                    AWAITING YOUR COMMAND, NODE OPERATOR...<br>
                    <span style="font-size:3.2rem; margin-top:20px; display:block;">☰</span>
                    <div style="margin-top:40px; font-size:1.1rem;">Search words or donate energy to awaken Earth</div>
                </div>
            </div>
        </div>

    </div>

    <div class="scanline"></div>

<script>
// ====================== GAME STATE ======================
let gameState = {
    level: 1,
    resonance: 420,
    alignment: 67,
    queries: 0,
    donations: 0,
    earthHealth: { bio: 85, mag: 72, noo: 91 },
    lastTick: Date.now(),
    queryLog: []
};

function loadGame() {
    const saved = localStorage.getItem('terraNodeSave');
    if (saved) Object.assign(gameState, JSON.parse(saved));
}

function saveGame() {
    localStorage.setItem('terraNodeSave', JSON.stringify(gameState));
}

// ====================== LIVE CLOCK ======================
function updateClock() {
    const now = new Date();
    document.getElementById('live-time').textContent = 
        now.toLocaleString('en-GB', { timeZone: 'UTC', hour12: false }) + " UTC";
}
setInterval(updateClock, 1000);
updateClock();

// ====================== PLAYER UI ======================
function updatePlayerUI() {
    document.getElementById('player-level').textContent = gameState.level;
    document.getElementById('player-resonance').textContent = Math.floor(gameState.resonance);
    document.getElementById('player-alignment').textContent = Math.floor(gameState.alignment) + "%";
    
    if (gameState.resonance >= gameState.level * 1000) {
        gameState.level++;
        gameState.alignment = Math.min(100, gameState.alignment + 8);
        saveGame();
        showReward(`LEVEL UP! NODE ${gameState.level} UNLOCKED`, '#ffcc00');
    }
}

function showReward(text, color) {
    const div = document.getElementById('result');
    const rewardEl = document.createElement('div');
    rewardEl.className = 'reward';
    rewardEl.style.color = color;
    rewardEl.style.fontSize = '1.8rem';
    rewardEl.style.textAlign = 'center';
    rewardEl.style.margin = '15px 0';
    rewardEl.textContent = text;
    div.prepend(rewardEl);
    setTimeout(() => rewardEl.remove(), 2200);
}

function gainResonance(amount, source = "query") {
    gameState.resonance += amount;
    gameState.alignment = Math.min(100, gameState.alignment + (amount / 50));
    updatePlayerUI();
    saveGame();
    
    if (source === "donate") {
        showReward(`+${Math.floor(amount)} RESONANCE • THANK YOU`, '#ffcc00');
    } else if (source === "query") {
        showReward(`+${Math.floor(amount)} RESONANCE`, '#00ff9d');
    }
}

// ====================== DONATE & CHARGE ======================
function donateAndCharge() {
    window.open('https://monzo.me/iandreme', '_blank');
    
    const donationReward = 85 + Math.floor(gameState.level * 12) + Math.floor(Math.random() * 40);
    gameState.donations++;
    
    gainResonance(donationReward, "donate");
    
    const btn = document.querySelector('.donate-btn');
    const originalText = btn.textContent;
    btn.textContent = '🌍 ENERGY DONATED • THANK YOU';
    setTimeout(() => {
        btn.textContent = originalText;
    }, 2800);
    
    saveGame();
}

// ====================== WORD VALUE + SEARCH ======================
function calculateWordValue(word) {
    let base = word.length * 12;
    const rareLetters = 'qxzjv'.split('');
    let rareBonus = word.split('').filter(c => rareLetters.includes(c)).length * 18;
    const earthKeys = ['earth', 'terra', 'gaia', 'node', 'core', 'resonance', 'aether'];
    let keyBonus = earthKeys.some(k => word.includes(k)) ? 85 : 0;
    return Math.floor(base + rareBonus + keyBonus);
}

async function searchWord() {
    const input = document.getElementById('search-input').value.trim().toLowerCase();
    const resultDiv = document.getElementById('result');

    if (!input) {
        resultDiv.innerHTML = `<p style="color:#ff6666; text-align:center;">VOID REJECTS EMPTY QUERY.</p>`;
        return;
    }

    resultDiv.innerHTML = `<p style="text-align:center; color:#00ff9d;">DESCENDING INTO THE ABYSS...</p>`;

    const isIP = /^(\d{1,3}\.){3}\d{1,3}$/.test(input);
    let reward = isIP ? 65 : calculateWordValue(input);

    if (!isIP) {
        try {
            const dictCheck = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${input}`);
            if (dictCheck.ok) reward += 95;
        } catch(e) {}
        await lookupWord(input, resultDiv);
        addPlanetaryCore(input, resultDiv);
    } else {
        await lookupIP(input, resultDiv);
    }

    gameState.queries++;
    gainResonance(reward);
    
    gameState.queryLog.unshift(`[${new Date().toLocaleTimeString('en-GB',{hour12:false}).slice(0,5)}] ${input.toUpperCase()} → +${Math.floor(reward)}`);
    if (gameState.queryLog.length > 7) gameState.queryLog.pop();

    saveGame();
    updatePlayerUI();
}

async function lookupWord(word, div) {
    try {
        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        const entry = data[0];

        let html = `<div style="font-size:3.6rem; color:var(--accent); margin-bottom:15px;">${entry.word}</div>`;
        if (entry.phonetic) html += `<div style="color:#00ccff; margin-bottom:30px;">${entry.phonetic}</div>`;

        entry.meanings.forEach(m => {
            html += `<div style="margin:28px 0 15px;"><strong style="color:#00cc77;">${m.partOfSpeech}</strong><br>`;
            m.definitions.forEach((def, i) => html += `${i+1}. ${def.definition}<br>`);
            html += `</div>`;
        });

        div.innerHTML = html;
    } catch(e) {
        div.innerHTML = `<p style="color:#ff4444;">WORD NOT FOUND IN ANY KNOWN REALM.</p>`;
    }
}

async function lookupIP(ip, div) {
    try {
        const res = await fetch(`https://ipapi.co/${ip}/json/`);
        const data = await res.json();
        div.innerHTML = `
            <div style="font-size:3rem; color:#00eeff;">NODE ${ip}</div>
            <div style="margin:30px 0; color:#88ffdd; line-height:1.9;">
                ${data.city || '—'}, ${data.region || '—'}, ${data.country_name || '—'}<br>
                ISP: ${data.org || 'UNKNOWN NODE'}
            </div>
        `;
    } catch(e) {
        div.innerHTML = `<p style="color:#ff6666;">CONNECTION TO NODE ${ip} FAILED.</p>`;
    }
}

function addPlanetaryCore(word, div) {
    const coreElements = ["Quartz", "Zinc", "Graphene", "Hydrogen", "Diamond", "Ladite", "Aetherium", "Neon-Core", "Void-Crystal", "Solarite", "Gaia-Forged"];
    const frequencies = ["7.83", "8.12", "12.44", "14.77", "19.33", "33.01", "42.69", "55.55", "88.88"];
    const resources = ["Geometric Triptych", "Odd Stone", "Resonance Key", "Core Catalyst", "Morphic Seed", "Nexus Shard", "Earth Anchor"];
    const mantras = ["I AM THE STILL POINT OF THE TURNING WORLD","FREQUENCY ALIGNED • CORE AWAKENED","FROM THE ABYSS I RISE • UNBREAKABLE","THE WORD IS THE SEED • THE CORE IS THE TREE","NODE LOCKED • ETERNAL RESONANCE","I AM EARTH • EARTH IS ME"];

    const hash = word.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
    
    const coreHTML = `
        <div class="core-signature">
            <div class="core-title">🌌 YOUR PERSONAL EARTH CORE • ${word.toUpperCase()}</div>
            <div class="data-row"><span class="label">CORE ELEMENT</span><span class="value">${coreElements[hash % coreElements.length]}</span></div>
            <div class="data-row"><span class="label">RESONANCE FREQ</span><span class="value">${frequencies[hash % frequencies.length]} Hz</span></div>
            <div class="data-row"><span class="label">ACTIVATION RESOURCE</span><span class="value">${resources[hash % resources.length]}</span></div>
            <div style="margin-top:25px; color:#ffcc88; font-style:italic; text-align:center;">
                "${mantras[hash % mantras.length]}"
            </div>
        </div>
    `;

    setTimeout(() => { div.innerHTML += coreHTML; }, 700);
}

function injectResonance(type) {
    const cost = 120 + (gameState.level * 15);
    if (gameState.resonance < cost) {
        showReward("NOT ENOUGH RESONANCE", '#ff3366');
        return;
    }
    
    gameState.resonance -= cost;
    let bonus = 0;
    if (type === 'bio') { gameState.earthHealth.bio = Math.min(100, gameState.earthHealth.bio + 14); bonus = 35; }
    else if (type === 'mag') { gameState.earthHealth.mag = Math.min(100, gameState.earthHealth.mag + 18); bonus = 28; }
    else if (type === 'noo') { gameState.earthHealth.noo = Math.min(100, gameState.earthHealth.noo + 22); bonus = 42; }
    
    gameState.alignment = Math.min(100, gameState.alignment + 5);
    gainResonance(bonus);
    refreshEarthData();
    showReward(`EARTH ${type.toUpperCase()} BOOSTED`, '#00ffcc');
    saveGame();
}

async function refreshEarthData() {
    const reportDiv = document.getElementById('earth-report');
    reportDiv.innerHTML = `<div style="text-align:center; padding:80px 20px; color:#00cc77;"><div style="font-size:3.5rem; animation: pulse 2s infinite;">📡</div><p>SYNCHRONIZING...</p></div>`;

    try {
        // Global temp (approximate real value for demo)
        const globalTemp = "15.2"; // Current real-world approx ~15°C anomaly adjusted

        let marketHTML = `<div style="margin:20px 0 25px 0;"><strong style="color:#00ccff; font-size:1.55rem;">GLOBAL MARKET SNAPSHOT</strong></div>`;
        
        const markets = [
            {name:"BTC", price: "76485", change: (Math.random()*8 - 3).toFixed(2)},
            {name:"ETH", price: "2310", change: (Math.random()*10 - 4).toFixed(2)},
            {name:"GOLD", price: "2680", change: (Math.random()*3 - 1.5).toFixed(2)},
            {name:"NASDAQ", price: "17950", change: (Math.random()*6 - 2.5).toFixed(2)},
            {name:"OIL", price: "72.4", change: (Math.random()*7 - 3).toFixed(2)}
        ];
        
        markets.forEach(m => {
            const cls = parseFloat(m.change) >= 0 ? 'positive' : 'negative';
            marketHTML += `<div class="market-row"><span class="label">${m.name}</span><span><span class="value">$${m.price}</span> <span class="${cls}" style="margin-left:18px;">${parseFloat(m.change)>=0?'+':''}${m.change}%</span></span></div>`;
        });

        const healthHTML = `
            <div style="margin:25px 0 15px 0; font-size:1.4rem; color:#ffcc00;">YOUR EARTH VITALS</div>
            <div>Biosphere <span class="value">${gameState.earthHealth.bio}%</span></div><div class="health-bar"><div class="health-fill" style="width:${gameState.earthHealth.bio}%; background:#00ff88;"></div></div>
            <div>Magnetosphere <span class="value">${gameState.earthHealth.mag}%</span></div><div class="health-bar"><div class="health-fill" style="width:${gameState.earthHealth.mag}%; background:#00ccff;"></div></div>
            <div>Noosphere <span class="value">${gameState.earthHealth.noo}%</span></div><div class="health-bar"><div class="health-fill" style="width:${gameState.earthHealth.noo}%; background:#ff88cc;"></div></div>
        `;

        reportDiv.innerHTML = `
            <div class="data-row"><span class="label">GLOBAL AVG TEMP</span><span class="value">${globalTemp}°C</span></div>
            <div class="data-row"><span class="label">SCHUMANN RESONANCE</span><span class="value">${(7.83 + Math.random()*2.8).toFixed(2)} Hz</span></div>
            ${healthHTML}
            ${marketHTML}
            <div style="margin-top:25px; text-align:center; color:#ffcc00;">⚠️ YOUR DONATIONS HELP STABILIZE THE NODE</div>
        `;
    } catch(e) {
        reportDiv.innerHTML = `<p style="color:#ff6666; text-align:center;">NODE CONNECTION UNSTABLE</p>`;
    }
}

function clearTerminal() {
    const resultDiv = document.getElementById('result');
    resultDiv.style.transition = 'opacity 0.35s';
    resultDiv.style.opacity = '0';
    setTimeout(() => {
        resultDiv.innerHTML = `<div style="text-align:center; opacity:0.6; padding:80px 20px; font-size:1.45rem;">VOID CLEARED.<br><span style="font-size:3.2rem; display:block; margin-top:25px;">☰</span></div>`;
        resultDiv.style.opacity = '1';
    }, 350);
}

function shareNode() {
    const input = document.getElementById('search-input').value.trim();
    if (!input) return alert("ENTER A WORD FIRST");
    const url = new URL(window.location.href);
    url.searchParams.set('q', input);
    navigator.clipboard.writeText(url.toString()).then(() => alert(`NODE LINK COPIED:\n${url}`));
}

// ====================== GAME LOOP ======================
function gameTick() {
    const now = Date.now();
    if ((now - gameState.lastTick) / 1000 > 8) {
        const passive = Math.floor(gameState.level * 1.8 + gameState.earthHealth.noo / 10);
        if (passive > 0) gameState.resonance += passive;
        gameState.lastTick = now;
        updatePlayerUI();
        saveGame();
    }
}
setInterval(gameTick, 4200);

// ====================== INIT ======================
window.onload = () => {
    loadGame();
    updatePlayerUI();
    refreshEarthData();
    setInterval(refreshEarthData, 180000); // refresh every 3 minutes

    const params = new URLSearchParams(window.location.search);
    const q = params.get('q');
    if (q) {
        document.getElementById('search-input').value = q;
        searchWord();
    }
};
</script>

</body>
</html>
