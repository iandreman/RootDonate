<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERRA-001 // EARTH NODE OS v0.9.7</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        :root {
            --accent: #00ff9d;
            --node: #00ccff;
            --warning: #ffcc00;
            --danger: #ff3366;
            --deep: #0a0f1c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'VT323', monospace;
            background: #05080f;
            color: #00ffcc;
            overflow: hidden;
            height: 100vh;
            background-image: 
                linear-gradient(rgba(0, 255, 157, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 157, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .scanline {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 100, 0.08) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            animation: scan 8s linear infinite;
            z-index: 9999;
            opacity: 0.6;
        }

        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

        .terminal-header {
            background: rgba(0, 20, 30, 0.95);
            border-bottom: 3px solid var(--accent);
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 4px;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.4);
            font-size: 1.3rem;
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 68px);
        }

        .panel {
            background: rgba(10, 20, 35, 0.92);
            border: 2px solid var(--node);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 35px rgba(0, 204, 255, 0.25);
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: #001122;
            padding: 14px 20px;
            font-size: 1.45rem;
            color: var(--accent);
            border-bottom: 2px solid var(--node);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 1.35rem;
            line-height: 1.5;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed rgba(0, 255, 204, 0.2);
        }

        .label { color: #88ffdd; }
        .value { color: #00ff9d; font-size: 1.4rem; }

        .market-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 255, 204, 0.15);
        }

        .positive { color: #00ff9d; }
        .negative { color: #ff3366; }

        .alert { color: var(--warning); animation: pulse 2s infinite; }

        #search-input {
            width: 100%;
            padding: 18px;
            font-size: 1.55rem;
            background: #000;
            border: 2px solid #003322;
            color: #00ffcc;
            font-family: 'VT323', monospace;
            outline: none;
        }

        .lookup-btn {
            width: 100%;
            padding: 18px;
            background: #002211;
            color: var(--accent);
            border: 2px solid var(--accent);
            font-size: 1.35rem;
            cursor: pointer;
            margin-top: 2px;
        }

        .result {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .glitch {
            animation: glitch 1.5s infinite;
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        .pulse { animation: pulse 2s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>

    <div class="terminal-header">
        <div>🌍 TERRA-001 • EARTH NODE OS • ROOT ACCESS GRANTED v0.9.7</div>
        <div id="live-time" style="color:#00ccff;"></div>
    </div>

    <div class="main-container">

        <!-- LEFT PANEL: PLANETARY + MARKET -->
        <div class="panel">
            <div class="panel-header">
                <span>📡 PLANETARY CORE + MARKET MONITOR</span>
                <span id="overall-status" class="glitch" style="margin-left:auto; color:#00ff88;">● NOMINAL</span>
            </div>
            
            <div class="content" id="earth-report">
                <!-- Populated by JS -->
            </div>

            <div style="padding:12px 20px; background:#001a22; border-top:2px solid var(--node); font-size:1.3rem; display:flex; justify-content:space-between;">
                <span>SOLAR CYCLE 25 • ACTIVE</span>
                <button onclick="refreshEarthData()" style="background:none; border:1px solid #00ff9d; color:#00ff9d; padding:4px 16px; cursor:pointer;">
                    REFRESH NODE
                </button>
            </div>
        </div>

        <!-- RIGHT PANEL: LEXICON + SEARCH -->
        <div class="panel">
            <div class="panel-header">
                <span>☰ ROOTDONATE • ETERNAL LEXICON NODE</span>
            </div>
            
            <input type="text" id="search-input" placeholder="ENTER WORD OR IP ADDRESS...">
            <button onclick="searchWord()" class="lookup-btn">QUERY THE VOID →</button>
            
            <div id="result" class="result">
                <div style="text-align:center; opacity:0.6; padding:80px 20px; font-size:1.4rem;">
                    AWAITING INPUT...<br>
                    <span style="font-size:3rem;">☰</span>
                </div>
            </div>
        </div>

    </div>

    <div class="scanline"></div>

<script>
// Live UTC Clock
function updateClock() {
    const now = new Date();
    document.getElementById('live-time').textContent = 
        now.toLocaleString('en-GB', { timeZone: 'UTC' }) + " UTC";
}
setInterval(updateClock, 1000);
updateClock();

// Refresh Earth + Market Data
async function refreshEarthData() {
    const reportDiv = document.getElementById('earth-report');
    
    reportDiv.innerHTML = `
        <div style="text-align:center; padding:80px 20px; color:#00cc77;">
            <div style="font-size:3rem; animation: pulse 2s infinite;">📡</div>
            <p>SYNCHRONIZING WITH TERRA-001...</p>
        </div>`;

    try {
        // Global temperature (real API)
        const tempRes = await fetch('https://api.open-meteo.com/v1/forecast?latitude=0&longitude=0&current=temperature_2m');
        const tempData = await tempRes.json();
        const globalTemp = tempData.current.temperature_2m || "—";

        // Simulated realistic values
        const saa = (Math.random() * 8 + 12).toFixed(1) + "%";
        const schumann = (7.83 + Math.random() * 2.2).toFixed(2);
        const co2 = (Math.random() * 3 + 426).toFixed(1);

        // Market simulation
        const markets = [
            { name: "BTC", price: (Math.random()*12000 + 62000).toFixed(0), change: (Math.random()*8 - 3).toFixed(2) },
            { name: "ETH", price: (Math.random()*800 + 2400).toFixed(0), change: (Math.random()*10 - 4).toFixed(2) },
            { name: "GOLD", price: (Math.random()*80 + 2650).toFixed(0), change: (Math.random()*2 - 1).toFixed(2) },
            { name: "NASDAQ", price: (Math.random()*1200 + 17800).toFixed(0), change: (Math.random()*4 - 1.5).toFixed(2) },
            { name: "OIL", price: (Math.random()*15 + 68).toFixed(2), change: (Math.random()*6 - 2.5).toFixed(2) }
        ];

        let marketHTML = `<div style="margin:20px 0 30px 0;"><strong style="color:#00ccff; font-size:1.5rem;">GLOBAL MARKET SNAPSHOT</strong></div>`;

        markets.forEach(m => {
            const changeClass = parseFloat(m.change) >= 0 ? 'positive' : 'negative';
            const sign = parseFloat(m.change) >= 0 ? '+' : '';
            marketHTML += `
                <div class="market-row">
                    <span class="label">${m.name}</span>
                    <span>
                        <span class="value">$${m.price}</span>
                        <span class="${changeClass}" style="margin-left:15px;">${sign}${m.change}%</span>
                    </span>
                </div>`;
        });

        reportDiv.innerHTML = `
            <div class="data-row"><span class="label">GLOBAL AVG TEMP (2m)</span><span class="value">${globalTemp}°C</span></div>
            <div class="data-row"><span class="label">SOUTH ATLANTIC ANOMALY</span><span class="value alert">${saa}</span></div>
            <div class="data-row"><span class="label">SCHUMANN RESONANCE</span><span class="value">${schumann} Hz</span></div>
            <div class="data-row"><span class="label">ATMOSPHERIC CO₂</span><span class="value">${co2} ppm</span></div>
            <div class="data-row"><span class="label">GEOMAGNETIC ACTIVITY</span><span class="value">G1 • UNSETTLED</span></div>
            
            ${marketHTML}
            
            <div style="margin-top:30px; text-align:center; color:#ffcc00; font-size:1.25rem;">
                ⚠️ SOLAR CYCLE 25 PEAK • INCOMING CME ACTIVITY DETECTED
            </div>
        `;
    } catch(e) {
        reportDiv.innerHTML = `<p style="color:#ff6666;">NODE CONNECTION UNSTABLE • RETRYING...</p>`;
    }
}

// Dictionary + IP lookup
async function searchWord() {
    const input = document.getElementById('search-input').value.trim().toLowerCase();
    const resultDiv = document.getElementById('result');

    if (!input) {
        resultDiv.innerHTML = `<p style="color:#ff6666; text-align:center;">VOID REJECTS EMPTY QUERY.</p>`;
        return;
    }

    resultDiv.innerHTML = `<p style="text-align:center; color:#00ff9d;">DESCENDING INTO THE ABYSS...</p>`;

    const isIP = /^(\d{1,3}\.){3}\d{1,3}$/.test(input);

    if (isIP) {
        await lookupIP(input, resultDiv);
    } else {
        await lookupWord(input, resultDiv);
    }
}

async function lookupWord(word, div) {
    try {
        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        const entry = data[0];

        let html = `<div style="font-size:3.4rem; color:var(--accent); margin-bottom:15px;">${entry.word}</div>`;
        if (entry.phonetic) html += `<div style="color:#00ccff; margin-bottom:30px;">${entry.phonetic}</div>`;

        entry.meanings.forEach(m => {
            html += `<div style="margin:25px 0;"><strong style="color:#00cc77;">${m.partOfSpeech}</strong><br>`;
            m.definitions.forEach((def, i) => {
                html += `${i+1}. ${def.definition}<br>`;
            });
            html += `</div>`;
        });

        div.innerHTML = html;
    } catch(e) {
        div.innerHTML = `<p style="color:#ff4444;">WORD NOT FOUND IN ANY KNOWN REALM.</p>`;
    }
}

async function lookupIP(ip, div) {
    try {
        const res = await fetch(`https://ipapi.co/${ip}/json/`);
        const data = await res.json();

        div.innerHTML = `
            <div style="font-size:2.9rem; color:#00eeff;">NODE ${ip}</div>
            <div style="margin:25px 0; color:#88ffdd; line-height:1.8;">
                ${data.city || '—'}, ${data.region || '—'}, ${data.country_name || '—'}<br>
                ISP: ${data.org || 'UNKNOWN NODE'}<br>
                LAT: ${data.latitude} • LON: ${data.longitude}
            </div>
        `;
    } catch(e) {
        div.innerHTML = `<p style="color:#ff6666;">CONNECTION TO NODE ${ip} FAILED.</p>`;
    }
}

// Initialize
window.onload = () => {
    refreshEarthData();
    setInterval(refreshEarthData, 150000); // Refresh every 2.5 minutes
};
</script>

</body>
</html>
