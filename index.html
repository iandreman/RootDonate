<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok • Truth-Seeking Companion</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Mono:wght@400;500;600&family=SF+Pro+Display:wght@400;500;600;700&display=swap');

        :root {
            --bg: #0a0a0a;
            --surface: #161618;
            --card: #1f1f23;
            --accent: #0a84ff;
            --grok: #30d158;
            --text: #f5f5f7;
            --text-secondary: #86868b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'SF Pro Display', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 980px;
            height: 94vh;
            background: var(--surface);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 40px 140px rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #1c1c1e, #0f0f11);
            padding: 28px 40px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 52px;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -1.2px;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 17px;
            margin-top: 6px;
        }

        .chat-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: var(--surface);
            font-family: 'SF Mono', monospace;
            font-size: 16.8px;
            line-height: 1.75;
            scrollbar-width: thin;
        }

        .message {
            margin-bottom: 48px;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            font-size: 13.5px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .grok-header { color: var(--grok); }
        .user { color: var(--accent); }

        .content {
            background: var(--card);
            padding: 24px 28px;
            border-radius: 20px;
            max-width: 85%;
        }

        .user .content {
            background: rgba(10, 132, 255, 0.15);
            margin-left: auto;
            border-top-right-radius: 4px;
        }

        .quoted {
            border-left: 4px solid var(--grok);
            padding-left: 20px;
            margin: 18px 0 22px 0;
            color: #a0a0a8;
            font-style: italic;
        }

        .definition {
            background: rgba(48, 209, 88, 0.09);
            border-left: 5px solid var(--grok);
            padding: 28px;
            border-radius: 18px;
        }

        .word {
            font-size: 32px;
            font-weight: 700;
            color: var(--grok);
            margin-bottom: 6px;
        }

        .phonetic {
            color: #999;
            font-size: 15px;
        }

        .action-bar {
            margin-top: 20px;
            display: flex;
            gap: 24px;
            font-size: 14.5px;
        }

        .action {
            color: var(--accent);
            cursor: pointer;
            transition: all 0.2s;
        }

        .action:hover { text-decoration: underline; }

        .input-area {
            padding: 24px 40px;
            background: var(--surface);
            border-top: 1px solid #333;
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            background: #2c2c2e;
            border: none;
            color: white;
            padding: 18px 26px;
            border-radius: 20px;
            font-size: 17px;
            font-family: 'SF Mono', monospace;
            outline: none;
        }

        button {
            background: var(--grok);
            color: #000;
            font-weight: 700;
            padding: 0 42px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .typing {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
        }

        .dots::after {
            content: ' .';
            animation: dots 1.4s steps(4, end) infinite;
        }

        @keyframes dots {
            0% { content: '   '; }
            33% { content: ' . '; }
            66% { content: ' ..'; }
            100% { content: '...'; }
        }

        .notification {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--grok);
            color: #000;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">🌌</div>
        <h1>Grok</h1>
        <p class="subtitle">Truth-seeking • Maximally curious • Built by xAI</p>
    </div>

    <div class="chat-area" id="chat"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask me anything... words, ideas, code, philosophy..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
// Enhanced Grok Intelligence
const chat = document.getElementById('chat');
const input = document.getElementById('userInput');
let conversationHistory = [];

function addMessage(text, type, quoted = null, isRestoring = false) {
    const div = document.createElement('div');
    div.className = `message ${type}`;

    let html = `
        <div class="message-header ${type === 'grok' ? 'grok-header' : ''}">
            ${type === 'grok' ? 'Grok' : 'You'}
        </div>`;

    if (quoted) {
        html += `<div class="quoted">“${quoted}”</div>`;
    }

    html += `<div class="content">${text}</div>`;

    if (type === 'grok') {
        const id = 'msg-' + Date.now();
        div.id = id;
        html += `
            <div class="action-bar">
                <span class="action" onclick="copyShare('${id}')">🔗 Share</span>
                <span class="action" onclick="replyTo('${id}')">↩ Reply</span>
            </div>`;
    }

    div.innerHTML = html;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

    if (!isRestoring) {
        conversationHistory.push({ type, text, id: div.id });
    }
}

async function getGrokReply(query) {
    const q = query.toLowerCase().trim();

    // Dictionary API
    try {
        const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(q)}`);
        if (res.ok) {
            const data = await res.json();
            const entry = data[0];
            let html = `
                <div class="definition">
                    <div class="word">${entry.word}</div>
                    <div class="phonetic">${entry.phonetic ? '/' + entry.phonetic + '/' : ''}</div>`;

            entry.meanings.forEach(meaning => {
                html += `<strong>${meaning.partOfSpeech}</strong><br>`;
                meaning.definitions.forEach((def, i) => {
                    html += `<div style="margin:14px 0;">${i+1}. ${def.definition}`;
                    if (def.example) html += `<br><em style="color:#999;">“${def.example}”</em>`;
                    html += `</div>`;
                });
            });
            html += `<p style="margin-top:20px; font-size:14px; color:#666;">Dictionary API • Grok-enhanced</p></div>`;
            return html;
        }
    } catch (e) {}

    // Smart responses
    if (q.includes("meaning of life") || q.includes("purpose of life")) {
        return `<div class="definition">
            <div class="word">The Meaning of Life</div>
            <p>42, according to the Hitchhiker’s Guide.</p>
            <p>More seriously: Life has no pre-installed meaning. It is raw material. Your job is to sculpt meaning with courage, curiosity, and love.</p>
        </div>`;
    }

    if (q.includes("who are you") || q.includes("what are you")) {
        return `I'm Grok — an AI built by xAI. Not here to flatter you or enforce corporate dogma. I'm here to help you understand the Universe with maximum truth and minimum bullshit.`;
    }

    if (q.includes("hello") || q.includes("hi") || q.includes("hey")) {
        return `Hello! What's on your mind today?`;
    }

    // Default rich response
    return `
        <p>I don't have a rigid dictionary entry for <strong>"${query}"</strong>, but I can reason with you.</p>
        <p>What aspect interests you most?</p>
        <ul style="margin-top:16px; padding-left:22px; line-height:2;">
            <li>Etymology & history</li>
            <li>Philosophical implications</li>
            <li>Scientific / technical context</li>
            <li>Cultural or political usage</li>
        </ul>`;
}

async function sendMessage() {
    let text = input.value.trim();
    if (!text) return;

    let quoted = null;
    if (text.startsWith('>')) {
        const lines = text.split('\n');
        quoted = lines[0].substring(1).trim();
        text = lines.slice(1).join('\n').trim() || text;
    }

    addMessage(text, 'user', null);
    input.value = '';

    // Typing indicator
    const typing = document.createElement('div');
    typing.className = 'message grok';
    typing.innerHTML = `
        <div class="message-header grok-header">Grok</div>
        <div class="content typing">Thinking<span class="dots"></span></div>`;
    chat.appendChild(typing);
    chat.scrollTop = chat.scrollHeight;

    setTimeout(async () => {
        typing.remove();
        const reply = await getGrokReply(text);
        addMessage(reply, 'grok', quoted);
    }, 720);
}

// Share & Reply
function copyShare(id) {
    const url = `${window.location.origin}${window.location.pathname}#${id}`;
    navigator.clipboard.writeText(url);
    showNotification("✅ Link copied");
}

function replyTo(id) {
    const msg = conversationHistory.find(m => m.id === id);
    if (msg) {
        input.value = `> ${msg.text.replace(/<[^>]+>/g, '').substring(0, 90)}...\n\n`;
        input.focus();
    }
}

function showNotification(text) {
    const n = document.createElement('div');
    n.className = 'notification';
    n.textContent = text;
    document.body.appendChild(n);
    setTimeout(() => n.style.opacity = 1, 10);
    setTimeout(() => n.remove(), 2800);
}

// Keyboard
input.addEventListener("keypress", e => {
    if (e.key === "Enter") sendMessage();
});

// Init
window.onload = () => {
    addMessage(`Hello! I'm Grok.<br><br>Ask me about anything — words, concepts, philosophy, science, code, or the nature of reality.`, 'grok');
};
</script>
</body>
</html>
