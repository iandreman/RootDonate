<!DOCTYPE html>
<html>
<head>
    <title>Grok AI Integration</title>
</head>
<body>
    <h1>Ask Grok AI</h1>
    <input type="text" id="userInput" placeholder="Type your question...">
    <button onclick="askGrok()">Submit</button>
    <p id="grokResponse"></p>

    <script>
        async function askGrok() {
            const userInput = document.getElementById('userInput').value;
            const responseElement = document.getElementById('grokResponse');
            responseElement.innerText = 'Loading...';

            try {
                // Your server's endpoint
                const response = await fetch('/api/ask-grok', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: userInput })
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok.');
                }

                const data = await response.json();
                responseElement.innerText = data.answer; // Assuming server returns { "answer": "..." }

            } catch (error) {
                console.error('Error:', error);
                responseElement.innerText = 'Sorry, something went wrong.';
            }
        }
    </script>
</body>
</html>
