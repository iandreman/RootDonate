<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleverbot Terminal</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #00ff41;
            --text: #00ff41;
            --panel: rgba(15, 15, 15, 0.95);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', 'Consolas', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #111;
            padding: 14px 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent);
            font-size: 17px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 2px 10px rgba(0, 255, 65, 0.2);
        }

        #container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: 2px solid var(--accent);
            background: #111;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.25);
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--panel);
            padding: 14px 18px;
            font-size: 14px;
            color: #aaffaa;
            border: 1px solid var(--accent);
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }

        .info {
            line-height: 1.5;
        }

        .status {
            color: var(--accent);
            font-weight: bold;
        }

        .instructions {
            background: rgba(0, 255, 65, 0.08);
            padding: 10px 12px;
            border-left: 4px solid var(--accent);
            margin-top: 6px;
            font-size: 13.5px;
        }

        .btn {
            background: transparent;
            color: #88ff88;
            border: 1px solid var(--accent);
            padding: 8px 16px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            border-radius: 4px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .btn:hover {
            background: var(--accent);
            color: #000;
            transform: translateY(-1px);
        }

        a {
            color: #88ff88;
            text-decoration: underline;
        }

        a:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="header">CLEVERBOT OFFICIAL TERMINAL</div>
    
    <div id="container">
        <iframe 
            src="https://www.cleverbot.com/cleverbotif" 
            allowtransparency="true" 
            frameborder="0" 
            scrolling="yes"
            sandbox="allow-scripts allow-same-origin allow-popups allow-forms">
        </iframe>
        
        <div class="controls">
            <div class="info">
                ✅ Connected to the official Cleverbot<br>
                <span class="status">How to chat:</span>
                <div class="instructions">
                    1. Click inside the chat area below<br>
                    2. Type your message and press <strong>Enter</strong> or click <strong>Send</strong><br>
                    3. Wait for Cleverbot to reply
                </div>
            </div>
            
            <div>
                <button class="btn" onclick="saveAndShare()">💾 Save & Share Conversation</button>
                <button class="btn" onclick="window.location.reload()">⟳ Reset Terminal</button>
                <a href="https://www.cleverbot.com" target="_blank">Open Full Site →</a>
            </div>
        </div>
    </div>

    <script>
        let chatHistory = [];

        function addToHistory(role, text) {
            chatHistory.push({
                role,
                text,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
        }

        function saveAndShare() {
            if (chatHistory.length === 0) {
                alert("No conversation recorded yet.\n\nYou can still enjoy chatting!\n\nTip: Manually note important messages if you want to save them.");
                return;
            }

            const data = {
                version: "2.1",
                timestamp: new Date().toISOString(),
                history: chatHistory
            };

            const jsonStr = JSON.stringify(data, null, 2);
            const encoded = encodeURIComponent(jsonStr);
            const shareUrl = `data:application/json;charset=utf-8,${encoded}`;

            const newWin = window.open('', '_blank', 'width=820,height=720');
            if (!newWin) {
                alert("Please allow pop-ups to view the shared conversation.");
                return;
            }

            newWin.document.write(`
                <!DOCTYPE html>
                <html lang="en">
                <head>
                    <meta charset="UTF-8">
                    <title>Cleverbot Conversation Share</title>
                    <style>
                        body { 
                            background:#000; 
                            color:#0f0; 
                            font-family:'Courier New', monospace; 
                            padding:25px; 
                            line-height:1.6;
                        }
                        pre { 
                            background:#111; 
                            padding:20px; 
                            overflow:auto; 
                            border:1px solid #0f0;
                            white-space: pre-wrap;
                        }
                        a { color:#0ff; text-decoration: underline; }
                        button { 
                            background: #0f0; 
                            color: #000; 
                            border: none; 
                            padding: 10px 16px; 
                            cursor: pointer;
                            font-family: inherit;
                        }
                    </style>
                </head>
                <body>
                    <h2>Cleverbot Conversation Share</h2>
                    <p><strong>Shareable Link:</strong></p>
                    <a href="${shareUrl}" target="_blank" style="word-break:break-all; font-size:15px;">[Open this conversation in a new tab]</a><br><br>
                    <button onclick="navigator.clipboard.writeText('${shareUrl}').then(() => alert('Link copied to clipboard!'))">Copy Share Link</button>
                    <hr>
                    <pre>${jsonStr}</pre>
                </body>
                </html>
            `);
        }

        console.log("%c✅ Cleverbot Terminal loaded successfully", 
                   "color: #00ff41; font-family: monospace; font-size: 14px;");
    </script>
</body>
</html>
