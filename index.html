<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok Style AI • Real Chat (Guest)</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://js.puter.com/v2/"></script>

  <style>
    body {
      background: linear-gradient(135deg, #0f0f23, #1a1a2e);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .chat-container {
      max-width: 820px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .message {
      animation: fadeIn 0.35s ease forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .custom-scroll::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scroll::-webkit-scrollbar-thumb {
      background-color: #4b5563;
      border-radius: 20px;
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<div class="chat-container mx-auto">
  <!-- Header -->
  <div class="bg-zinc-900 border-b border-zinc-800 p-4 flex items-center gap-3">
    <div class="w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex items-center justify-center text-2xl font-bold">✨</div>
    <div>
      <h1 class="text-2xl font-bold">RootDonate</h1>
      <p class="text-xs text-emerald-400 flex items-center gap-1.5">
        <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
        Real AI • Guest Friendly
      </p>
    </div>
    
    <div class="ml-auto flex gap-3">
      <button id="share-btn" class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-2xl text-sm font-medium transition-colors">
        <i class="fa-solid fa-share-nodes"></i> Share
      </button>
      <button id="new-btn" class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-2xl text-sm font-medium transition-colors">
        <i class="fa-solid fa-plus"></i> New
      </button>
    </div>
  </div>

  <!-- Chat Area -->
  <div id="chat" class="flex-1 overflow-y-auto p-6 space-y-8 bg-zinc-950 custom-scroll"></div>

  <!-- Input Area -->
  <div class="p-6 bg-zinc-900 border-t border-zinc-800">
    <div class="max-w-3xl mx-auto">
      <form id="chat-form" class="relative">
        <textarea id="user-input" rows="1"
          class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-4 pr-16 text-white placeholder-zinc-500 focus:outline-none focus:border-pink-500 resize-none text-base leading-relaxed"
          placeholder="Ask the AI anything..."></textarea>
        
        <button type="submit"
          class="absolute right-4 bottom-4 w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex items-center justify-center hover:brightness-110 transition-all active:scale-95">
          <i class="fa-solid fa-paper-plane text-white"></i>
        </button>
      </form>
      
      <p class="text-center text-zinc-500 text-xs mt-4">
        Free real AI • Guest mode supported • Conversations saved in URL
      </p>
    </div>
  </div>
</div>

<script>
  let conversation = [];

  // Get AI response using Puter AI
  async function getRealAIResponse(message) {
    try {
      const response = await puter.ai.chat(message, {
        model: "gpt-4.1-nano",
        stream: false
      });
      return response || "Sorry, I didn't receive a response.";
    } catch (err) {
      console.error("AI Response Error:", err);
      return "Guest session is being prepared. Please try again in a few seconds.";
    }
  }

  // Save conversation to URL hash
  function saveToURL() {
    if (conversation.length === 0) return;
    const encoded = btoa(encodeURIComponent(JSON.stringify(conversation)));
    window.location.hash = `conv=${encoded}`;
  }

  // Load conversation from URL hash
  function loadFromURL() {
    const hash = window.location.hash.substring(1);
    if (!hash) return false;

    const params = new URLSearchParams(hash);
    const encoded = params.get('conv');
    if (!encoded) return false;

    try {
      conversation = JSON.parse(decodeURIComponent(atob(encoded)));
      return true;
    } catch (e) {
      console.error("Failed to load conversation from URL");
      return false;
    }
  }

  const chat = document.getElementById('chat');

  // Render entire conversation
  function renderConversation() {
    chat.innerHTML = '';
    
    conversation.forEach(msg => {
      const div = document.createElement('div');
      div.className = `message max-w-3xl mx-auto ${msg.role === 'user' ? 'ml-auto' : ''}`;

      if (msg.role === 'user') {
        div.innerHTML = `
          <div class="flex justify-end">
            <div class="bg-violet-600 text-white rounded-3xl rounded-tr-none px-6 py-4 max-w-[85%]">
              <p>${msg.content}</p>
            </div>
          </div>`;
      } else {
        div.innerHTML = `
          <div class="flex gap-4">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex items-center justify-center text-2xl font-bold">✨</div>
            <div class="bg-zinc-900 rounded-3xl rounded-tl-none px-6 py-4 max-w-[85%]">
              <p>${msg.content}</p>
            </div>
          </div>`;
      }
      chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
  }

  // Add message to conversation
  function addMessage(content, role) {
    conversation.push({ role, content });
    renderConversation();
    saveToURL();
  }

  // Show welcome message
  function showWelcome() {
    if (conversation.length > 0) return;

    chat.innerHTML = `
      <div class="message max-w-3xl mx-auto">
        <div class="flex gap-4">
          <div class="w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex items-center justify-center text-2xl font-bold">✨</div>
          <div class="bg-zinc-900 rounded-3xl rounded-tl-none px-6 py-5 max-w-[85%]">
            <p class="text-lg">Hello! I'm a real AI running in Grok style.</p>
            <p class="text-zinc-400 mt-2">Ask me anything. Guest mode works automatically in most browsers.</p>
            <p class="text-amber-400 text-xs mt-3">The first message may take a moment while the guest session starts.</p>
          </div>
        </div>
      </div>
    `;
  }

  // Event Listeners
  const form = document.getElementById('chat-form');
  const input = document.getElementById('user-input');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const question = input.value.trim();
    if (!question) return;

    addMessage(question, 'user');
    input.value = '';

    // Show thinking indicator
    const thinking = document.createElement('div');
    thinking.className = 'message max-w-3xl mx-auto';
    thinking.innerHTML = `
      <div class="flex gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex items-center justify-center text-2xl font-bold">✨</div>
        <div class="bg-zinc-900 rounded-3xl rounded-tl-none px-6 py-4">
          <div class="flex items-center gap-3 text-zinc-400">
            <i class="fa-solid fa-circle animate-pulse"></i>
            <span>Thinking...</span>
          </div>
        </div>
      </div>
    `;
    chat.appendChild(thinking);
    chat.scrollTop = chat.scrollHeight;

    const reply = await getRealAIResponse(question);
    thinking.remove();
    addMessage(reply, 'bot');
  });

  // Auto-resize textarea
  input.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 180) + 'px';
  });

  // Enter key support (Shift+Enter for new line)
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.dispatchEvent(new Event('submit'));
    }
  });

  // Share button
  document.getElementById('share-btn').addEventListener('click', () => {
    if (conversation.length === 0) {
      alert("Nothing to share yet!");
      return;
    }
    saveToURL();
    navigator.clipboard.writeText(window.location.href)
      .then(() => alert("✅ Link copied to clipboard!"))
      .catch(() => alert("Failed to copy link."));
  });

  // New conversation button
  document.getElementById('new-btn').addEventListener('click', () => {
    if (confirm("Start a fresh conversation?")) {
      conversation = [];
      window.location.hash = '';
      chat.innerHTML = '';
      showWelcome();
      input.focus();
    }
  });

  // Initialize on load
  window.addEventListener('load', () => {
    if (!loadFromURL()) {
      showWelcome();
    } else {
      renderConversation();
    }
    input.focus();
  });

  // Save before leaving
  window.addEventListener('beforeunload', saveToURL);
</script>
</body>
</html>
