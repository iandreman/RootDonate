<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Root Donate • Lost & Found</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body { font-family: 'Inter', system-ui, sans-serif; }
    
    .monzo-pink {
      background: linear-gradient(135deg, #FF4E6C, #FF6B85);
    }

    .amount-btn {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .amount-btn.active {
      background-color: #FF4E6C;
      color: white;
      border-color: #FF4E6C;
      transform: scale(1.08);
    }

    .result-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .result-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgb(255 78 108 / 0.15);
    }
  </style>
</head>
<body class="bg-zinc-50 min-h-screen py-12 px-4">
  <div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-zinc-100">
      
      <!-- Header -->
      <div class="h-2 monzo-pink"></div>
      
      <div class="px-8 pt-8 pb-6 text-center">
        <div class="mx-auto w-20 h-20 bg-gradient-to-br from-pink-100 to-rose-100 rounded-3xl flex items-center justify-center mb-6 shadow-inner">
          <span class="text-5xl">🔍</span>
        </div>
        <h1 class="text-3xl font-semibold tracking-tight text-zinc-900">Root Donate Lost & Found</h1>
        <p class="text-zinc-600 mt-1">Instant search • Community powered</p>
      </div>

      <div class="px-8 pb-8">
        <!-- Search Bar with Auto-Suggest -->
        <div class="relative mb-6">
          <div class="relative">
            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400">
              <i class="fa-solid fa-magnifying-glass"></i>
            </span>
            <input 
              type="text" 
              id="search-input"
              placeholder="Search lost or found items..."
              class="w-full pl-12 pr-5 py-5 border border-zinc-200 rounded-2xl focus:outline-none focus:border-pink-500 focus:ring-4 focus:ring-pink-100 text-lg font-medium"
              autocomplete="off"
              oninput="handleSearchInput()"
            >
          </div>
          
          <!-- Suggestions Dropdown -->
          <div id="suggestions" class="hidden absolute z-20 w-full mt-2 bg-white border border-zinc-200 rounded-2xl shadow-2xl py-2 max-h-80 overflow-auto"></div>
        </div>

        <!-- Filters -->
        <div class="grid grid-cols-3 gap-4 mb-8">
          <div>
            <select id="type-filter" onchange="filterResults()" 
              class="w-full px-4 py-3 border border-zinc-200 rounded-2xl focus:outline-none focus:border-pink-500">
              <option value="">All Reports</option>
              <option value="lost">Lost Only</option>
              <option value="found">Found Only</option>
            </select>
          </div>
          <div>
            <input type="text" id="location-filter" placeholder="Location" 
              class="w-full px-4 py-3 border border-zinc-200 rounded-2xl focus:outline-none focus:border-pink-500"
              oninput="filterResults()">
          </div>
          <div>
            <input type="date" id="date-filter" onchange="filterResults()"
              class="w-full px-4 py-3 border border-zinc-200 rounded-2xl focus:outline-none focus:border-pink-500">
          </div>
        </div>

        <!-- Results -->
        <div class="space-y-4" id="results-container">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Footer -->
      <div class="border-t border-zinc-100 bg-zinc-50 px-8 py-6 text-center">
        <div class="flex justify-center items-center gap-5 text-xs text-zinc-400">
          <div>🔒 Private & Secure</div>
          <div>•</div>
          <div>Community Powered</div>
        </div>
        <p class="text-[10px] text-zinc-400 mt-3">
          No data stored • Real-time reports
        </p>
      </div>
    </div>
  </div>

  <script>
    const itemsDB = [
      { id: 1, type: "lost", item: "Black leather wallet", location: "Oxford Street", date: "2025-06-10", description: "Contains cards and ID", contact: "lost@ex.com" },
      { id: 2, type: "found", item: "iPhone 14 Pro", location: "King's Cross Station", date: "2025-06-11", description: "Blue case, locked", contact: "found@ex.com" },
      { id: 3, type: "lost", item: "Car keys with keychain", location: "Westfield Mall", date: "2025-06-09", description: "Toyota fob", contact: "lost@ex.com" },
      { id: 4, type: "found", item: "Silver MacBook Air", location: "Cafe Nero", date: "2025-06-12", description: "M2 chip, stickers", contact: "found@ex.com" },
      { id: 5, type: "lost", item: "Red backpack", location: "University Campus", date: "2025-06-08", description: "Laptop + notebooks", contact: "lost@ex.com" },
      { id: 6, type: "found", item: "AirPods Pro", location: "Gym", date: "2025-06-11", description: "White charging case", contact: "found@ex.com" }
    ];

    function renderResults(filteredItems) {
      const container = document.getElementById('results-container');
      container.innerHTML = '';

      if (filteredItems.length === 0) {
        container.innerHTML = `<div class="text-center py-16 text-zinc-500"><span class="text-5xl mb-4 block">😕</span><p class="font-medium">No matching reports found</p></div>`;
        return;
      }

      filteredItems.forEach(item => {
        const card = document.createElement('div');
        card.className = `result-card bg-white border border-zinc-100 rounded-2xl p-6`;
        card.innerHTML = `
          <div class="flex justify-between">
            <div>
              <span class="inline-block px-3.5 py-1 text-xs font-semibold rounded-full ${item.type === 'lost' ? 'bg-red-100 text-red-600' : 'bg-emerald-100 text-emerald-600'}">
                ${item.type.toUpperCase()}
              </span>
              <h3 class="text-2xl font-semibold mt-3 tracking-tight">${item.item}</h3>
              <p class="text-zinc-600 mt-1">${item.description}</p>
            </div>
            <div class="text-right text-sm pt-1">
              <p class="font-medium text-zinc-700">${item.location}</p>
              <p class="text-zinc-500">${item.date}</p>
            </div>
          </div>
          <div class="mt-6 pt-5 border-t flex justify-between items-center">
            <span class="text-sm text-zinc-500">Contact: <span class="font-medium text-zinc-700">${item.contact}</span></span>
            <button onclick="contactOwner(${item.id})" 
              class="monzo-pink px-6 py-3 text-white font-semibold rounded-2xl text-sm active:scale-95 transition-all">
              Get in touch
            </button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function handleSearchInput() {
      const query = document.getElementById('search-input').value.toLowerCase().trim();
      const suggestionsDiv = document.getElementById('suggestions');

      if (query.length < 1) {
        suggestionsDiv.classList.add('hidden');
        filterResults();
        return;
      }

      const suggestions = [...new Set(itemsDB.map(i => i.item))]
        .filter(item => item.toLowerCase().includes(query));

      if (suggestions.length === 0) {
        suggestionsDiv.classList.add('hidden');
        return;
      }

      let html = '';
      suggestions.forEach(s => {
        html += `
          <div onclick="selectSuggestion('${s}')" 
               class="px-6 py-4 hover:bg-zinc-50 cursor-pointer flex items-center gap-3 border-b border-zinc-100 last:border-0">
            <i class="fa-solid fa-magnifying-glass text-pink-400"></i>
            <span class="font-medium">${s}</span>
          </div>`;
      });

      suggestionsDiv.innerHTML = html;
      suggestionsDiv.classList.remove('hidden');
    }

    function selectSuggestion(item) {
      document.getElementById('search-input').value = item;
      document.getElementById('suggestions').classList.add('hidden');
      filterResults();
    }

    function filterResults() {
      const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
      const typeFilter = document.getElementById('type-filter').value;
      const locationFilter = document.getElementById('location-filter').value.toLowerCase().trim();

      const filtered = itemsDB.filter(item => {
        const matchesSearch = !searchTerm || 
          item.item.toLowerCase().includes(searchTerm) ||
          item.description.toLowerCase().includes(searchTerm);
        const matchesType = !typeFilter || item.type === typeFilter;
        const matchesLocation = !locationFilter || item.location.toLowerCase().includes(locationFilter);
        return matchesSearch && matchesType && matchesLocation;
      });

      renderResults(filtered);
    }

    function contactOwner(id) {
      alert(`✅ Message sent to the reporter of item #${id}\n\nThey will contact you soon.`);
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('#search-input')) {
        document.getElementById('suggestions').classList.add('hidden');
      }
    });

    // Initial load
    renderResults(itemsDB);
  </script>
</body>
</html>
