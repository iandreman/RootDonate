<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RootDonate • Pay Rico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <!-- Firebase SDK (Compat version) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .card { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .tab-button.active { 
            background-color: rgb(219 234 254);
            color: rgb(29 78 216);
            font-weight: 600;
        }
        .modal { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Auth Screen -->
<div id="authScreen" class="fixed inset-0 bg-white flex items-center justify-center z-50">
    <div class="max-w-md w-full px-6">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-3xl text-white text-5xl mb-6">
                🌱
            </div>
            <h1 class="text-4xl font-bold text-gray-900">RootDonate</h1>
            <p class="text-gray-500 mt-2">Send money • Track finances • Grow wealth</p>
        </div>

        <div class="bg-white border border-gray-200 rounded-3xl p-8 shadow-xl">
            <!-- Toggle -->
            <div class="flex bg-gray-100 rounded-2xl p-1 mb-8">
                <button onclick="toggleAuthMode('signin')" 
                        id="signinTab"
                        class="flex-1 py-3 text-sm font-medium rounded-xl tab-button active">
                    Sign In
                </button>
                <button onclick="toggleAuthMode('signup')" 
                        id="signupTab"
                        class="flex-1 py-3 text-sm font-medium rounded-xl">
                    Sign Up
                </button>
            </div>

            <!-- Sign In Form -->
            <div id="signinForm">
                <h2 class="text-2xl font-semibold text-center mb-8">Welcome back</h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input id="email" type="email" placeholder="you@example.com" 
                               class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input id="password" type="password" placeholder="••••••••" 
                               class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 transition">
                    </div>

                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" class="w-4 h-4 accent-blue-600">
                            <span class="text-gray-600">Remember me</span>
                        </label>
                        <a href="#" onclick="forgotPassword()" class="text-blue-600 hover:underline">Forgot password?</a>
                    </div>

                    <button onclick="signInWithEmail()" 
                            class="w-full bg-blue-600 hover:bg-blue-700 transition text-white font-semibold py-4 rounded-2xl text-lg">
                        Sign In
                    </button>
                </div>
            </div>

            <!-- Sign Up Form -->
            <div id="signupForm" class="hidden">
                <h2 class="text-2xl font-semibold text-center mb-8">Create an account</h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                        <input id="fullName" type="text" placeholder="Alex Rivera" 
                               class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input id="signupEmail" type="email" placeholder="you@example.com" 
                               class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input id="signupPassword" type="password" placeholder="••••••••" 
                               class="w-full px-5 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 transition">
                    </div>

                    <button onclick="signUpWithEmail()" 
                            class="w-full bg-blue-600 hover:bg-blue-700 transition text-white font-semibold py-4 rounded-2xl text-lg">
                        Create Account
                    </button>
                </div>
            </div>

            <div class="text-center text-sm text-gray-500 mt-6">
                By continuing, you agree to our <a href="#" class="text-blue-600 hover:underline">Terms</a> and <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a>.
            </div>
        </div>
    </div>
</div>

<!-- Main App -->
<div id="mainApp" class="hidden max-w-5xl mx-auto p-4">
    <div class="flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center text-white text-2xl">🌱</div>
            <h1 class="text-3xl font-bold text-gray-900">RootDonate</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="cursor-pointer flex items-center gap-3 bg-white px-4 py-2 rounded-2xl border border-gray-100">
                <div class="text-right">
                    <p class="text-sm font-medium" id="userName">User</p>
                    <p class="text-xs text-gray-500" id="userEmail"></p>
                </div>
                <div class="w-9 h-9 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-2xl flex items-center justify-center text-white font-semibold">AR</div>
            </div>
            
            <button onclick="logout()" class="text-gray-400 hover:text-gray-600 transition">
                <i class="fas fa-sign-out-alt text-xl"></i>
            </button>
        </div>
    </div>

    <!-- Paste your full main app content (tabs, dashboard, etc.) here -->
    <!-- ... -->
</div>

<script>
// ==================== Firebase Config ====================
const firebaseConfig = {
  apiKey: "AIzaSyAJpd9btTi5DEq5B7NsDLD4G_pddVQi43Q",
  authDomain: "rootdonate.firebaseapp.com",
  projectId: "rootdonate",
  storageBucket: "rootdonate.firebasestorage.app",
  messagingSenderId: "838665513781",
  appId: "1:838665513781:web:308983a5b2713f20977a7c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// ==================== Auth Mode Toggle ====================
let currentMode = 'signin';

function toggleAuthMode(mode) {
    currentMode = mode;
    
    document.getElementById('signinForm').classList.toggle('hidden', mode === 'signup');
    document.getElementById('signupForm').classList.toggle('hidden', mode === 'signin');
    
    document.getElementById('signinTab').classList.toggle('active', mode === 'signin');
    document.getElementById('signupTab').classList.toggle('active', mode === 'signup');
}

// ==================== Auth Functions ====================
async function signInWithEmail() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
        alert("Please enter email and password");
        return;
    }

    try {
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        showMainApp(userCredential.user);
    } catch (error) {
        console.error(error);
        alert(getErrorMessage(error.code));
    }
}

async function signUpWithEmail() {
    const name = document.getElementById('fullName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;

    if (!email || !password || !name) {
        alert("Please fill in all fields");
        return;
    }

    if (password.length < 6) {
        alert("Password must be at least 6 characters");
        return;
    }

    try {
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        // Update profile with name
        await userCredential.user.updateProfile({ displayName: name });
        showMainApp(userCredential.user);
    } catch (error) {
        console.error(error);
        alert(getErrorMessage(error.code));
    }
}

function forgotPassword() {
    const email = document.getElementById('email').value.trim();
    if (!email) {
        alert("Enter your email first");
        return;
    }
    auth.sendPasswordResetEmail(email)
        .then(() => alert("Password reset link sent to your email!"))
        .catch(err => alert(getErrorMessage(err.code)));
}

function getErrorMessage(code) {
    switch(code) {
        case 'auth/user-not-found':
        case 'auth/wrong-password': return "Invalid email or password";
        case 'auth/invalid-email': return "Invalid email address";
        case 'auth/email-already-in-use': return "This email is already registered";
        case 'auth/weak-password': return "Password is too weak";
        case 'auth/too-many-requests': return "Too many attempts. Try again later";
        default: return "Authentication failed. Please try again.";
    }
}

function showMainApp(user) {
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');

    document.getElementById('userName').textContent = user.displayName || "User";
    document.getElementById('userEmail').textContent = user.email;

    // Initialize your app
    renderBankAccounts?.();
    calculate?.();
}

// Logout
function logout() {
    if (confirm("Sign out of RootDonate?")) {
        auth.signOut().then(() => {
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('authScreen').classList.remove('hidden');
            toggleAuthMode('signin'); // Reset to sign in
        });
    }
}

// Auto-login check
auth.onAuthStateChanged(user => {
    if (user) {
        showMainApp(user);
    }
});

// Placeholder functions (add your real ones here)
function renderBankAccounts() { /* your code */ }
function calculate() { /* your code */ }
</script>

</body>
</html>
