<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok-style Cleverbot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  
  <style>
    body {
      background: linear-gradient(135deg, #0f0f23, #1a1a2e);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .chat-container {
      max-width: 820px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .message {
      animation: fadeIn 0.3s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .cleverbot-bubble {
      background: linear-gradient(135deg, #ff00cc, #3333ff);
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<div class="chat-container mx-auto">

  <!-- Header -->
  <div class="bg-zinc-900 border-b border-zinc-800 p-4 flex items-center gap-3">
    <div class="w-10 h-10 bg-gradient-to-br from-pink-500 to-blue-600 rounded-2xl flex items-center justify-center text-2xl font-bold">
      C
    </div>
    <div>
      <h1 class="text-2xl font-bold tracking-tight">Cleverbot</h1>
      <p class="text-xs text-emerald-400 flex items-center gap-1">
        <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
        Connected • Learning from you
      </p>
    </div>
    <div class="ml-auto text-xs text-zinc-500">Grok-style UI</div>
  </div>

  <!-- Chat Area -->
  <div id="chat" class="flex-1 overflow-y-auto p-6 space-y-8 bg-zinc-950">
    <!-- Welcome -->
    <div class="message max-w-3xl mx-auto">
      <div class="flex gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-pink-500 to-blue-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-2xl font-bold">
          C
        </div>
        <div class="bg-zinc-900 rounded-3xl rounded-tl-none px-6 py-5 max-w-[85%]">
          <p class="text-lg">Hi! I'm Cleverbot.</p>
          <p class="text-zinc-400 mt-2">Say anything! I learn as we chat.</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="p-6 bg-zinc-900 border-t border-zinc-800">
    <div class="max-w-3xl mx-auto">
      <form id="chat-form" class="relative">
        <textarea 
          id="user-input"
          rows="1"
          class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-4 pr-16 text-white placeholder-zinc-500 focus:outline-none focus:border-pink-500 resize-none"
          placeholder="Talk to Cleverbot..."></textarea>
        
        <button 
          type="submit"
          class="absolute right-4 bottom-4 w-10 h-10 bg-gradient-to-br from-pink-500 to-blue-600 hover:from-pink-600 hover:to-blue-700 rounded-2xl flex items-center justify-center transition-all active:scale-95">
          <i class="fa-solid fa-paper-plane text-white"></i>
        </button>
      </form>
      
      <p class="text-center text-zinc-500 text-xs mt-3">
        Unofficial free Cleverbot integration • Pure HTML + JS
      </p>
    </div>
  </div>

</div>

<script>
// Simple Cleverbot free endpoint (unofficial but works in browser)
async function getCleverbotResponse(message) {
  try {
    const response = await fetch(`https://www.cleverbot.com/getreply?input=${encodeURIComponent(message)}&key=free`, {
      method: 'GET',
      headers: { 'Accept': 'application/json' }
    });
    
    if (!response.ok) throw new Error('Failed');
    
    const data = await response.json();
    return data.output || "Hmm... I don't know what to say.";
  } catch (err) {
    // Fallback if the free endpoint is blocked or slow
    return "I'm a bit confused right now... Try again?";
  }
}

const chat = document.getElementById('chat');
const form = document.getElementById('chat-form');
const input = document.getElementById('user-input');

function addMessage(text, isUser) {
  const div = document.createElement('div');
  div.className = `message max-w-3xl mx-auto ${isUser ? 'ml-auto' : ''}`;
  
  if (isUser) {
    div.innerHTML = `
      <div class="flex justify-end gap-4">
        <div class="bg-violet-600 text-white rounded-3xl rounded-tr-none px-6 py-4 max-w-[85%]">
          <p class="whitespace-pre-wrap">${text}</p>
        </div>
      </div>
    `;
  } else {
    div.innerHTML = `
      <div class="flex gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-pink-500 to-blue-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-2xl font-bold">
          C
        </div>
        <div class="bg-zinc-900 rounded-3xl rounded-tl-none px-6 py-4 max-w-[85%]">
          <p class="whitespace-pre-wrap">${text}</p>
        </div>
      </div>
    `;
  }
  
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const question = input.value.trim();
  if (!question) return;

  addMessage(question, true);
  input.value = '';

  // Thinking indicator
  const thinking = document.createElement('div');
  thinking.id = 'thinking';
  thinking.className = 'message max-w-3xl mx-auto';
  thinking.innerHTML = `
    <div class="flex gap-4">
      <div class="w-10 h-10 bg-gradient-to-br from-pink-500 to-blue-600 rounded-2xl flex-shrink-0 flex items-center justify-center text-2xl font-bold">
        C
      </div>
      <div class="bg-zinc-900 rounded-3xl rounded-tl-none px-6 py-4">
        <div class="flex items-center gap-2 text-zinc-400">
          <i class="fa-solid fa-circle animate-pulse"></i>
          <span>Cleverbot is thinking...</span>
        </div>
      </div>
    </div>
  `;
  chat.appendChild(thinking);
  chat.scrollTop = chat.scrollHeight;

  // Get real response from Cleverbot
  const reply = await getCleverbotResponse(question);
  
  thinking.remove();
  addMessage(reply, false);
});

// Auto resize textarea
input.addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});

// Enter to send
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    form.dispatchEvent(new Event('submit'));
  }
});

input.focus();
</script>

</body>
</html>
