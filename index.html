<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Time Echoes – Abstract Temporal Field</title>

  <!-- Helps with PWA / fullscreen feeling -->
  <meta name="theme-color" content="#050814">
  <link rel="manifest" href="data:application/manifest+json,{
    &quot;name&quot;: &quot;Time Echoes&quot;,
    &quot;short_name&quot;: &quot;TimeEcho&quot;,
    &quot;start_url&quot;: &quot;.&quot;,
    &quot;display&quot;: &quot;standalone&quot;,
    &quot;background_color&quot;: &quot;#000814&quot;,
    &quot;theme_color&quot;: &quot;#6080ff&quot;
  }">

  <style>
    :root {
      --bg-dark: #050814;
      --accent: #6080ff;
      --text: #d0d8ff;
      --card-bg: rgba(20,25,60,0.65);
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    h1 {
      text-align: center;
      font-size: clamp(1.9rem, 5vw, 2.5rem);
      margin: 0.6rem 0 0.2rem;
      color: #a0b4ff;
      text-shadow: 0 0 20px #6080ff80;
      letter-spacing: 1.8px;
      z-index: 10;
    }

    .stats {
      text-align: center;
      font-size: clamp(0.95rem, 3.2vw, 1.2rem);
      margin: 0.4rem 0 1.1rem;
      z-index: 10;
    }

    .stats span {
      margin: 0 0.9rem;
      padding: 0.35rem 0.9rem;
      background: rgba(40,50,100,0.5);
      border-radius: 12px;
      backdrop-filter: blur(6px);
      border: 1px solid #6080ff30;
    }

    #world {
      flex: 1;
      background: #000814;
      touch-action: none;
    }

    #sidebar {
      position: absolute;
      right: 16px;
      top: 86px;
      width: 340px;
      max-height: 76vh;
      overflow-y: auto;
      padding: 12px;
      background: rgba(10,15,40,0.78);
      border-radius: 14px;
      border: 1px solid #5060ff40;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 40px #000c;
      z-index: 5;
    }

    .clock-card {
      background: var(--card-bg);
      border: 1px solid #7080ff30;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
    }

    .city { font-size: 1.2rem; font-weight: 600; color: #c0d0ff; margin-bottom: 0.15rem; }
    .time { font-size: 2.2rem; letter-spacing: 2.8px; font-weight: 300; }
    .date { font-size: 0.92rem; opacity: 0.78; }
    .weather { margin-top: 0.5rem; font-size: 0.96rem; }
    .temp { color: #ffd070; font-weight: 500; }

    footer {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.82rem;
      opacity: 0.68;
      pointer-events: none;
      text-align: center;
      max-width: 92%;
    }

    .save-load, .wake-control {
      position: absolute;
      z-index: 15;
      display: flex;
      gap: 10px;
    }

    .save-load {
      top: 12px;
      right: 16px;
    }

    .wake-control {
      top: 12px;
      left: 16px;
    }

    button, label {
      padding: 8px 14px;
      background: rgba(60,80,160,0.7);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      backdrop-filter: blur(4px);
    }

    button:hover, label:hover {
      background: rgba(80,100,180,0.9);
    }

    button.active {
      background: rgba(60,140,80,0.9) !important;
    }

    input[type="file"] { display: none; }

    @media (max-width: 820px) {
      #sidebar {
        width: 92%;
        right: 4%;
        top: auto;
        bottom: 68px;
        max-height: 42vh;
      }
      .save-load, .wake-control {
        top: auto;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        flex-direction: row;
        gap: 12px;
        width: auto;
        justify-content: center;
      }
      .wake-control { left: 50%; }
      .save-load { bottom: 54px; }
    }
  </style>
</head>
<body>

<h1>Time Echoes</h1>

<div class="stats">
  <span>Echoes: <b id="pop">—</b></span>
  <span>Nodes: <b id="builds">—</b></span>
  <span>Harmony: <b id="happy">—</b>%</span>
</div>

<canvas id="world"></canvas>

<div class="save-load">
  <button id="saveFile">Save to file</button>
  <label for="loadFile">Load file</label>
  <input type="file" id="loadFile" accept=".json">
</div>

<div class="wake-control">
  <button id="wakeToggle">Keep Screen On</button>
</div>

<footer>Tap/click → drift • Long-press / shift+click → place node • WASD / arrows • Auto-saves to browser</footer>

<div id="sidebar">
  <div id="clocks"></div>
</div>

<script>
// ───────────────────────────────────────────────
//  Core Setup
// ───────────────────────────────────────────────

const canvas = document.getElementById('world');
const ctx = canvas.getContext('2d');

let nodes = [];
let player = { x: 0, y: 0, tx: null, ty: null, trail: [] };
let echoes = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  player.x = canvas.width / 2;
  player.y = canvas.height / 2;
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ───────────────────────────────────────────────
//  Screen Wake Lock (keep screen always on)
// ───────────────────────────────────────────────

let wakeLock = null;
let wakeLockActive = false;
const wakeToggle = document.getElementById('wakeToggle');

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) {
    wakeToggle.textContent = "Screen Keep-On not supported";
    wakeToggle.disabled = true;
    return;
  }

  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLockActive = true;
    wakeToggle.textContent = "Screen Always On (tap to disable)";
    wakeToggle.classList.add('active');
    console.log("Screen wake lock active");

    wakeLock.addEventListener('release', () => {
      wakeLockActive = false;
      wakeToggle.textContent = "Keep Screen On";
      wakeToggle.classList.remove('active');
      console.log("Wake lock released");
    });
  } catch (err) {
    console.error("Wake lock failed:", err);
    wakeToggle.textContent = "Could not keep screen on";
  }
}

async function releaseWakeLock() {
  if (wakeLock && wakeLockActive) {
    try {
      await wakeLock.release();
      wakeLockActive = false;
      wakeToggle.textContent = "Keep Screen On";
      wakeToggle.classList.remove('active');
    } catch (err) {
      console.error("Release failed:", err);
    }
    wakeLock = null;
  }
}

wakeToggle.addEventListener('click', async () => {
  if (wakeLockActive) {
    await releaseWakeLock();
  } else {
    await requestWakeLock();
  }
});

// Try to activate after first real interaction (mobile requirement)
canvas.addEventListener('touchstart', () => {
  if (!wakeLockActive) requestWakeLock();
}, { once: true });

// Re-request when tab becomes visible again
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && !wakeLockActive) {
    await requestWakeLock();
  }
});

// ───────────────────────────────────────────────
//  Save / Load (localStorage + file)
// ───────────────────────────────────────────────

function saveToLocal() {
  const state = { nodes, player: { x: player.x, y: player.y } };
  localStorage.setItem('timeEchoes', JSON.stringify(state));
}

function loadFromLocal() {
  const data = localStorage.getItem('timeEchoes');
  if (!data) return;
  try {
    const s = JSON.parse(data);
    nodes = Array.isArray(s.nodes) ? s.nodes : [];
    if (s.player) {
      player.x = s.player.x ?? canvas.width/2;
      player.y = s.player.y ?? canvas.height/2;
    }
  } catch {}
}

function downloadAsFile() {
  const state = {
    nodes,
    player: { x: player.x, y: player.y },
    timestamp: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(state, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `time-echoes-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function loadFromFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      nodes = Array.isArray(data.nodes) ? data.nodes : [];
      if (data.player) {
        player.x = data.player.x ?? canvas.width/2;
        player.y = data.player.y ?? canvas.height/2;
      }
      saveToLocal();
      updateStats();
    } catch {
      alert("Invalid file");
    }
  };
  reader.readAsText(file);
}

loadFromLocal();

// ───────────────────────────────────────────────
//  Echoes & Nodes
// ───────────────────────────────────────────────

function initEchoes() {
  echoes = [
    {x: canvas.width*0.3, y: canvas.height*0.4, color:'#ff80a0', tx:null, ty:null, timer:0},
    {x: canvas.width*0.7, y: canvas.height*0.6, color:'#ffd080', tx:null, ty:null, timer:0},
    {x: canvas.width*0.6, y: canvas.height*0.2, color:'#c0a0ff', tx:null, ty:null, timer:0}
  ];
}
initEchoes();

function placeNode(mx, my) {
  const snap = 35;
  const gx = Math.round(mx / snap) * snap;
  const gy = Math.round(my / snap) * snap;
  if (nodes.some(n => Math.hypot(n.x - gx, n.y - gy) < snap * 1.35)) return;

  const types = ['melt', 'flow', 'warp'];
  nodes.push({ x: gx, y: gy, type: types[Math.floor(Math.random()*3)], age: 0 });

  saveToLocal();
  updateStats();
}

// ───────────────────────────────────────────────
//  Input
// ───────────────────────────────────────────────

const keys = {};
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup',   e => keys[e.key.toLowerCase()] = false);

let tsX=0, tsY=0, tsTime=0;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  tsX = t.clientX; tsY = t.clientY; tsTime = Date.now();
});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const dur = Date.now() - tsTime;
  const dist = Math.hypot(t.clientX-tsX, t.clientY-tsY);

  if (dur > 400 || dist < 20) {
    placeNode(t.clientX, t.clientY);
  } else {
    player.tx = t.clientX;
    player.ty = t.clientY;
  }
});

canvas.addEventListener('click', e => {
  if (e.shiftKey) placeNode(e.clientX, e.clientY);
  else { player.tx = e.clientX; player.ty = e.clientY; }
});

// ───────────────────────────────────────────────
//  Game Update & Draw
// ───────────────────────────────────────────────

function updatePlayer() {
  let speed = 2.8, dx=0, dy=0;
  if (keys['w']||keys['arrowup']) dy -= speed;
  if (keys['s']||keys['arrowdown']) dy += speed;
  if (keys['a']||keys['arrowleft']) dx -= speed;
  if (keys['d']||keys['arrowright']) dx += speed;

  if (player.tx != null) {
    const pdx = player.tx - player.x;
    const pdy = player.ty - player.y;
    const dist = Math.hypot(pdx, pdy);
    if (dist > 6) {
      player.x += pdx / dist * speed * 1.5;
      player.y += pdy / dist * speed * 1.5;
    } else player.tx = player.ty = null;
  }

  player.x += dx;
  player.y += dy;
  player.x = Math.max(40, Math.min(canvas.width-40, player.x));
  player.y = Math.max(40, Math.min(canvas.height-40, player.y));

  player.trail.push({x:player.x, y:player.y});
  if (player.trail.length > 40) player.trail.shift();
}

function updateEchoes() {
  echoes.forEach(e => {
    if (Math.random() < 0.007) {
      e.tx = Math.random() * canvas.width;
      e.ty = Math.random() * canvas.height;
    }
    if (e.tx != null) {
      const dx = e.tx - e.x, dy = e.ty - e.y;
      const d = Math.hypot(dx, dy);
      if (d > 5) {
        e.x += dx/d * 1.3;
        e.y += dy/d * 1.3;
      } else e.tx = e.ty = null;
    }
    e.timer++;
    if (e.timer > 320 + Math.random()*700) {
      placeNode(e.x, e.y);
      e.timer = 0;
    }
  });
}

function draw() {
  const t = Date.now() * 0.0003;
  const hour = new Date().getHours();
  const isNight = hour < 6 || hour > 21;
  const globalHue = (t * 10 + hour * 15) % 360;

  ctx.fillStyle = isNight ? '#00040f' : `hsl(${globalHue}, 12%, 6%)`;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.globalAlpha = 0.07;
  for (let i = 0; i < 8; i++) {
    ctx.fillStyle = `hsla(${(globalHue + i*45)%360}, 40%, 60%, 0.08)`;
    ctx.fillRect(Math.sin(t+i)*canvas.width*0.4 + canvas.width/2 - 300, 0, 600, canvas.height);
  }
  ctx.globalAlpha = 1;

  nodes.forEach(n => {
    const age = n.age++ * 0.0008;
    const pulse = Math.sin(age*4 + globalHue*0.1) * 0.5 + 0.5;

    ctx.save();
    ctx.translate(n.x, n.y);

    if (n.type === 'melt') {
      ctx.rotate(age * 0.3);
      ctx.fillStyle = `rgba(180,220,255,${0.6 + pulse*0.3})`;
      ctx.beginPath();
      ctx.ellipse(0, 0, 28 + pulse*12, 42 - pulse*18, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#ffffff60';
      ctx.lineWidth = 2;
      ctx.stroke();
    } else if (n.type === 'flow') {
      for (let i = 0; i < 12; i++) {
        const a = age + i*0.6;
        const r = 18 + Math.sin(a*5)*8;
        ctx.fillStyle = `hsla(${(globalHue + i*30)%360}, 80%, 70%, ${0.4 + Math.sin(a*3)*0.3})`;
        ctx.beginPath();
        ctx.arc(Math.cos(a*2)*r, Math.sin(a*2)*r*1.6 - 20, 3.5, 0, Math.PI*2);
        ctx.fill();
      }
    } else {
      ctx.shadowColor = '#80c0ff';
      ctx.shadowBlur = 30 + pulse*20;
      ctx.fillStyle = `hsla(${globalHue}, 70%, 65%, ${0.45 + pulse*0.35})`;
      ctx.beginPath();
      ctx.arc(0, 0, 32 + pulse*16, 0, Math.PI*2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  });

  [player, ...echoes].forEach(e => {
    const trail = e.trail || [];
    for (let i = 0; i < trail.length; i++) {
      const a = i / trail.length;
      ctx.fillStyle = `hsla(${globalHue + 40}, 90%, 70%, ${a*0.6})`;
      ctx.beginPath();
      ctx.arc(trail[i].x, trail[i].y, 5 + a*12, 0, Math.PI*2);
      ctx.fill();
    }

    ctx.shadowColor = e.color || '#a0d0ff';
    ctx.shadowBlur = 24;
    ctx.fillStyle = e.color || '#80e0ff';
    ctx.beginPath();
    ctx.arc(e.x, e.y, 16 + Math.sin(t*6 + e.x*0.01)*4, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  requestAnimationFrame(draw);
}

function updateStats() {
  const melt = nodes.filter(n=>n.type==='melt').length;
  const flow = nodes.filter(n=>n.type==='flow').length;
  const warp = nodes.filter(n=>n.type==='warp').length;

  const echoesCount = Math.round(nodes.length * 2.4 + 30 + Math.sin(Date.now()*0.0004)*8);
  const harmony = Math.min(100, Math.round(38 + flow*9 + melt*4 - warp*6 + nodes.length*1.2));

  document.getElementById('pop').textContent   = echoesCount;
  document.getElementById('builds').textContent = nodes.length;
  document.getElementById('happy').textContent = harmony;
}

// ───────────────────────────────────────────────
//  Clocks & Weather
// ───────────────────────────────────────────────

const locations = [
  {tz:"UTC",name:"UTC",search:"UTC"},
  {tz:"America/New_York",name:"New York",search:"New York"},
  {tz:"Europe/London",name:"London",search:"London"},
  {tz:"Europe/Berlin",name:"Berlin",search:"Berlin"},
  {tz:"Asia/Tokyo",name:"Tokyo",search:"Tokyo"},
  {tz:"Australia/Sydney",name:"Sydney",search:"Sydney"}
];

async function getCoords(n) {
  try {
    const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(n)}&count=1`);
    const d = await r.json();
    return d.results?.[0] ? {lat:d.results[0].latitude, lon:d.results[0].longitude} : null;
  } catch { return null; }
}

async function getWeather(lat,lon) {
  try {
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code`);
    const d = await r.json();
    if (!d.current) return {t:"—",c:"—"};
    const code = d.current.weather_code;
    const map = {0:"Clear",1:"Mostly clear",2:"Partly cloudy",3:"Overcast",45:"Fog",61:"Rain",71:"Snow",95:"Thunder"};
    return {t:d.current.temperature_2m.toFixed(1), c:map[code]||"Unknown"};
  } catch { return {t:"—",c:"—"}; }
}

async function initClocks() {
  const div = document.getElementById('clocks');
  div.innerHTML = '';
  for (const loc of locations) {
    const card = document.createElement('div');
    card.className = 'clock-card';
    card.innerHTML = `
      <div class="city">${loc.name}</div>
      <div class="time" id="t-${loc.tz}">--:--:--</div>
      <div class="date" id="d-${loc.tz}">---</div>
      <div class="weather">
        <span class="temp" id="tmp-${loc.tz}">— °C</span> •
        <span id="c-${loc.tz}">Loading...</span>
      </div>`;
    div.appendChild(card);

    const c = await getCoords(loc.search);
    if (c) {
      const w = await getWeather(c.lat, c.lon);
      document.getElementById(`tmp-${loc.tz}`).textContent = `${w.t} °C`;
      document.getElementById(`c-${loc.tz}`).textContent = w.c;
    } else {
      document.getElementById(`c-${loc.tz}`).textContent = "n/a";
    }
  }
}

function updateClocks() {
  const now = new Date();
  locations.forEach(l => {
    const tz = l.tz === "UTC" ? "UTC" : l.tz;
    document.getElementById(`t-${l.tz}`).textContent =
      new Intl.DateTimeFormat('en-US',{timeZone:tz,hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}).format(now);
    document.getElementById(`d-${l.tz}`).textContent =
      new Intl.DateTimeFormat('en-GB',{timeZone:tz,weekday:'short',month:'short',day:'numeric'}).format(now);
  });
}

// ───────────────────────────────────────────────
//  Start
// ───────────────────────────────────────────────

initClocks();
setInterval(updateClocks, 1000);
setInterval(initClocks, 15*60*1000);

setInterval(updatePlayer, 1000/80);
setInterval(updateEchoes, 1000/25);
setInterval(updateStats, 2800);
setInterval(saveToLocal, 10000);

draw();
updateStats();

// Buttons
document.getElementById('saveFile').onclick = downloadAsFile;
document.getElementById('loadFile').onchange = e => {
  loadFromFile(e.target.files[0]);
  e.target.value = '';
};

</script>
</body>
</html>
