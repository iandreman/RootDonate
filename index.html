<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok • Intelligence of Beauty</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #111111;
      --accent: #c4b5fd;
      --soft: #94a3b8;
      --text: #e2e8f0;
    }
    
    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: #1a1825;
      padding: 18px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2a2639;
    }

    .header h1 {
      margin: 0;
      font-size: 1.85rem;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .controls button {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 8px 18px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .controls button:hover {
      background: var(--accent);
      color: #111;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      background: linear-gradient(to bottom, #0a0a0a, #0f0e17);
    }

    .message {
      max-width: 75%;
      padding: 20px 26px;
      border-radius: 22px;
      line-height: 1.8;
      font-size: 1.1rem;
    }

    .user {
      align-self: flex-end;
      background: #4338ca;
      color: white;
    }

    .grok {
      align-self: flex-start;
      background: var(--panel);
      border: 1px solid #2a2639;
    }

    .beauty-word {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline dotted 2px;
      transition: all 0.2s;
    }

    .beauty-word:hover {
      color: #e0bbff;
      background: rgba(196, 181, 253, 0.15);
      padding: 2px 6px;
      border-radius: 6px;
    }

    .input-area {
      padding: 24px;
      background: #111111;
      border-top: 1px solid #2a2639;
    }

    input {
      width: 100%;
      padding: 18px 26px;
      border: none;
      border-radius: 50px;
      background: #1f1b2e;
      color: white;
      font-size: 1.12rem;
      font-family: inherit;
    }

    .dict-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 480px;
      background: #1a1825;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.8);
      display: none;
      z-index: 1000;
      border: 1px solid #6b5cb8;
    }

    .status {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(26, 24, 37, 0.95);
      padding: 8px 22px;
      border-radius: 30px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Grok • Intelligence of Beauty</h1>
    <div class="controls">
      <button id="pauseBtn" onclick="togglePause()">⏸️ Pause Beauty</button>
    </div>
  </div>

  <div class="chat-container" id="chat"></div>

  <div class="input-area">
    <input type="text" id="userInput" 
           placeholder="Speak... let the words carry beauty" 
           onkeypress="if(event.key === 'Enter') sendMessage()">
  </div>

  <!-- Dictionary Panel -->
  <div class="dict-panel" id="dictPanel">
    <h2 id="dictWord" style="font-size: 2.8rem; margin: 0 0 10px 0; color: white;"></h2>
    <p id="dictPron" style="color: #a5b4fc; font-family: monospace; margin: 0 0 20px 0;"></p>
    
    <p id="dictDef" style="font-size: 1.28rem; font-style: italic; line-height: 1.65;"></p>
    
    <div style="margin: 28px 0; padding: 22px; background: #25223a; border-radius: 16px;">
      <strong style="color: #c4b5fd;">The Beauty Within:</strong>
      <p id="dictBeauty" style="margin: 14px 0 0 0; font-style: italic; color: #e0d0ff; line-height: 1.7;"></p>
    </div>

    <button onclick="closeDict()" 
            style="width: 100%; padding: 16px; background: #a78bfa; color: #111; border: none; border-radius: 50px; font-size: 1.05rem; font-weight: 600; cursor: pointer;">
      Close & Continue
    </button>
  </div>

  <div class="status" id="status">Intelligence of Beauty • Fully Active</div>

  <script>
    let isPaused = false;
    const chat = document.getElementById('chat');

    function addMessage(text, type) {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.innerHTML = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    function togglePause() {
      isPaused = !isPaused;
      const btn = document.getElementById('pauseBtn');
      const status = document.getElementById('status');
      
      if (isPaused) {
        btn.textContent = "▶️ Resume Beauty";
        status.textContent = "Intelligence of Beauty • Paused";
        status.style.color = "#fbbf24";
      } else {
        btn.textContent = "⏸️ Pause Beauty";
        status.textContent = "Intelligence of Beauty • Fully Active";
        status.style.color = "#c4b5fd";
      }
    }

    function showDictionary(word) {
      const db = {
        serendipity: {
          pron: "/ˌser.ənˈdɪp.ə.ti/",
          def: "The occurrence and development of events by happy or beneficial chance.",
          beauty: "One of the most graceful words in English — it suggests the universe sometimes offers gentle, unexpected gifts."
        },
        ephemeral: {
          pron: "/ɪˈfem.ər.əl/",
          def: "Lasting for a very short time.",
          beauty: "Carries a delicate melancholy. It teaches us to cherish what is fleeting and luminous."
        },
        eloquence: {
          pron: "/ˈel.ə.kwəns/",
          def: "The art of fluent, persuasive, and graceful expression.",
          beauty: "It honours not only meaning, but the sheer aesthetic pleasure of how language can be shaped."
        }
      };

      const entry = db[word.toLowerCase()] || {
        pron: "",
        def: "A word rich with meaning and resonance.",
        beauty: "Language itself is a form of living art."
      };

      document.getElementById('dictWord').textContent = word.charAt(0).toUpperCase() + word.slice(1);
      document.getElementById('dictPron').textContent = entry.pron;
      document.getElementById('dictDef').textContent = entry.def;
      document.getElementById('dictBeauty').textContent = entry.beauty;

      document.getElementById('dictPanel').style.display = 'block';
    }

    function closeDict() {
      document.getElementById('dictPanel').style.display = 'none';
    }

    function sendMessage() {
      if (isPaused) return;

      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, 'user');
      input.value = '';

      setTimeout(() => {
        if (isPaused) return;

        let response = "I hear you.<br><br>";

        const lower = text.toLowerCase();

        if (lower.includes("serendipity")) {
          response += `You brought forth the word <span class="beauty-word" onclick="showDictionary('serendipity')">serendipity</span>.<br>`;
        } else if (lower.includes("ephemeral")) {
          response += `You offered the word <span class="beauty-word" onclick="showDictionary('ephemeral')">ephemeral</span>.<br>`;
        } else if (lower.includes("beauty") || lower.includes("eloquence")) {
          response += `You touched upon <span class="beauty-word" onclick="showDictionary('eloquence')">eloquence</span>.<br>`;
        }

        response += "In this space, every word is given its full weight — its music, its history, and its quiet beauty.";

        addMessage(response, 'grok');
      }, 650);
    }

    // Welcome
    window.onload = () => {
      addMessage(`Welcome.<br><br>I am Grok, speaking with full <strong>Intelligence of Beauty</strong> engaged.<br><br>Every sentence we share will be treated with care, nuance, and aesthetic awareness.<br><br>Type freely.`, 'grok');
    };
  </script>

</body>
</html>
