<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cleverbot Official Terminal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            background: #111;
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #0f0;
            font-weight: bold;
        }
        #terminal {
            flex: 1;
            padding: 10px;
            overflow: hidden;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 1px solid #0f0;
            background: #111;
        }
        .info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 8px;
            font-size: 13px;
            color: #88f;
            border: 1px solid #0f0;
        }
        .share {
            color: #88f;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">CLEVERBOT OFFICIAL TERMINAL — Powered by cleverbot.com</div>
    <div id="terminal">
        <iframe src="https://www.cleverbot.com/cleverbotif" 
                allowtransparency="true" 
                frameborder="0" 
                scrolling="no">
        </iframe>
        
        <div class="info">
            This is the official Cleverbot embedded directly.<br>
            It has full memory and learning capabilities.<br><br>
            <span class="share" onclick="window.location.reload()">Reset Conversation</span> | 
            <a href="https://www.cleverbot.com" target="_blank" class="share">Open Full Site</a>
        </div>
    </div>

    <script>
        // Optional: Auto-refresh iframe if needed (rarely required)
        console.log("%cCleverbot Official Terminal loaded successfully!", "color: #0f0; font-family: monospace;");
    </script>
</body>
</html>
