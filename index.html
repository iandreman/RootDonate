<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RootDonate • The Abyss Speaks</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=VT323&display=swap');

    :root {
      --accent: #00ff9d;
      --void: #0a0a0a;
      --deep: #001a0f;
      --node: #00ccff;
    }

    * { box-sizing: border-box; }

    body {
      background: #000;
      color: #e6d5b8;
      font-family: 'Cinzel', serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(0, 255, 157, 0.03) 0%, transparent 70%);
    }

    .container {
      width: 100%;
      max-width: 920px;
      height: 94vh;
      margin: 20px;
      background: rgba(8, 12, 10, 0.97);
      border: 14px solid #111;
      border-image: linear-gradient(45deg, #00ff9d, #004d33) 1;
      box-shadow: 0 0 90px rgba(0, 255, 157, 0.25),
                  inset 0 0 60px rgba(0, 0, 0, 0.8);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ... (keeping all your original styles) ... */
    .header, .input-area, .result, .word, .phonetic, .meaning, .ai-section { /* your original styles */ }

    .ip-node {
      background: rgba(0, 40, 60, 0.7);
      border: 2px solid var(--node);
      padding: 20px;
      border-radius: 8px;
      margin: 20px 0;
    }

    .node-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .node {
      background: rgba(0, 20, 30, 0.8);
      padding: 12px;
      border: 1px solid #00ccff;
      border-radius: 6px;
      text-align: center;
      font-family: 'VT323', monospace;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="rune">☰</div>
    <div>
      <h1 class="title">RootDonate</h1>
      <p class="subtitle">THE ABYSS DICTIONARY • NODES • ETERNAL</p>
    </div>
    
    <div class="ml-auto flex items-center gap-4">
      <button onclick="shareVoid()" class="px-6 py-3 border border-[#00cc77]/70 hover:border-[#00ff9d] hover:bg-black/50 rounded-2xl flex items-center gap-3 text-sm uppercase tracking-widest">
        <span>SHARE THE VOID</span>
      </button>
      <button onclick="clearResult()" class="px-6 py-3 bg-black border-2 border-[#00ff9d] hover:bg-[#001a00] rounded-2xl flex items-center gap-2">
        CLEAR
      </button>
    </div>
  </div>

  <!-- SEARCH INPUT -->
  <div class="input-area">
    <div class="max-w-3xl mx-auto">
      <input type="text" id="search-input" 
        placeholder="ENTER WORD OR IP INTO THE ABYSS... (e.g. 8.8.8.8)">
      
      <div class="button-group">
        <button onclick="searchWord()" class="lookup-btn">
          LOOKUP IN THE VOID
        </button>
        <button onclick="askAI()" class="ai-btn">
          ASK THE VOID AI
        </button>
      </div>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="result" class="result"></div>

</div>

<script>
  // ================== IP DETECTION ==================
  function isIP(str) {
    const ipv4 = /^(\d{1,3}\.){3}\d{1,3}$/;
    const ipv6 = /^([0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}$|^::|([0-9a-fA-F]{1,4}:){1,7}:$/;
    return ipv4.test(str) || ipv6.test(str);
  }

  // ================== MAIN SEARCH ==================
  async function searchWord() {
    const input = document.getElementById('search-input');
    const query = input.value.trim();
    const resultDiv = document.getElementById('result');

    if (!query) {
      resultDiv.innerHTML = `<p class="text-center text-red-400 text-2xl py-20">The void is silent...</p>`;
      return;
    }

    resultDiv.innerHTML = `<div class="flex items-center justify-center h-full text-[#00ff9d] text-2xl"><span class="animate-pulse">☰</span><span class="ml-4">DESCENDING INTO THE ABYSS...</span></div>`;

    if (isIP(query)) {
      await lookupIP(query, resultDiv);
    } else {
      await lookupWord(query, resultDiv);
    }
  }

  // ================== WORD LOOKUP (your original) ==================
  async function lookupWord(word, resultDiv) {
    try {
      const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      const entry = data[0];

      let html = `<div class="mb-12"><div class="flex items-center justify-between"><div><div class="word">${entry.word}</div>`;
      if (entry.phonetic) html += `<div class="phonetic">${entry.phonetic}</div>`;
      html += `</div>`;

      const audio = entry.phonetics?.find(p => p.audio);
      if (audio) html += `<button onclick="playAudio('${audio.audio}')" class="px-8 py-4 border-2 border-[#00ff9d] text-[#00ff9d] rounded-3xl hover:bg-[#001a00]">PRONOUNCE</button>`;

      html += `</div><h3 class="uppercase tracking-[4px] text-[#00cc77] text-sm mb-6 mt-12">MORTAL DEFINITIONS</h3>`;

      entry.meanings.forEach(meaning => {
        html += `<div class="meaning"><div class="uppercase text-[#00cc77] tracking-widest text-sm mb-4">${meaning.partOfSpeech}</div>`;
        meaning.definitions.forEach((def, i) => {
          html += `<div class="mb-8">${i+1}. ${def.definition}${def.example ? `<div class="example">"${def.example}"</div>` : ''}</div>`;
        });
        html += `</div>`;
      });

      html += `<div class="ai-section">...VOID AI WHISPERS...${generateVoidAIResponse(entry.word)}</div>`;
      resultDiv.innerHTML = html;

    } catch (e) {
      resultDiv.innerHTML = `<div class="text-center py-24"><div class="text-7xl mb-8 opacity-50">✦</div><p class="text-3xl text-red-400">"${word}" does not exist in any known realm.</p></div>`;
    }
  }

  // ================== IP / NODE LOOKUP ==================
  async function lookupIP(ip, resultDiv) {
    try {
      const res = await fetch(`https://ipapi.co/${ip}/json/`);
      if (!res.ok) throw new Error();
      const data = await res.json();

      let html = `
        <div class="mb-12">
          <div class="word">NODE ${ip}</div>
          <div class="phonetic" style="color:#00ccff">LIVE CONNECTION • ${data.org || 'Unknown ASN'}</div>
        </div>

        <div class="ip-node">
          <h3 class="uppercase tracking-widest text-[#00ccff] mb-6">NETWORK NODE DATA</h3>
          <div class="node-grid">
            <div class="node"><strong>City</strong><br>${data.city || '—'}</div>
            <div class="node"><strong>Region</strong><br>${data.region || '—'}</div>
            <div class="node"><strong>Country</strong><br>${data.country_name || '—'} (${data.country})</div>
            <div class="node"><strong>ISP</strong><br>${data.org || '—'}</div>
            <div class="node"><strong>ASN</strong><br>${data.asn || '—'}</div>
            <div class="node"><strong>Latitude</strong><br>${data.latitude || '—'}</div>
            <div class="node"><strong>Longitude</strong><br>${data.longitude || '—'}</div>
          </div>
        </div>`;

      html += `
        <div class="ai-section">
          <div class="void-header">
            <div class="text-4xl">☰</div>
            <div class="text-[#00ff9d] text-2xl tracking-widest">VOID AI NODE INTERPRETATION</div>
          </div>
          <div class="text-[#e6d5b8] text-[1.1rem] leading-relaxed">
            ${generateIPVoidResponse(ip, data)}
          </div>
        </div>`;

      resultDiv.innerHTML = html;

    } catch (e) {
      resultDiv.innerHTML = `<div class="text-center py-24"><p class="text-3xl text-red-400">Cannot reach node ${ip}</p><p class="text-[#00cc77]">The abyss cannot see this address.</p></div>`;
    }
  }

  function generateIPVoidResponse(ip, data) {
    return `This node pulses in the digital dark at <span class="text-[#00ff9d]">${ip}</span>.<br><br>
            It routes through ${data.org || 'unknown carriers'} in ${data.city || 'the ether'}, ${data.country_name}.<br><br>
            Every packet that touches it leaves a scar on the membrane between worlds. This IP has seen secrets. It remembers.`;
  }

  // ================== VOID AI (unchanged + IP support) ==================
  function generateVoidAIResponse(query) {
    // your original mystical generator...
    const roots = ["Proto-Indo-European", "Eldritch", "Forgotten Sumerian", "Void Tongue", "Pre-Cosmic"];
    const root = roots[Math.floor(Math.random() * roots.length)];
    return `From the endless black... ${query} ... ${generateRootMeaning()}<br><br>${generateMysticalInsight()}`;
  }

  function generateRootMeaning() { /* your original */ return ["to unmake...", "to drink the silence..."][Math.floor(Math.random()*2)]; }
  function generateMysticalInsight() { /* your original */ return ["It is not a word...", "Those who truly understand..."][Math.floor(Math.random()*2)]; }

  function playAudio(url) { new Audio(url).play().catch(()=>{}); }

  function clearResult() {
    document.getElementById('result').innerHTML = '';
    document.getElementById('search-input').value = '';
  }

  function shareVoid() { /* your original */ }

  document.getElementById('search-input').addEventListener('keypress', e => { if(e.key==='Enter') searchWord(); });

  window.onload = () => {
    document.getElementById('result').innerHTML = `
      <div class="text-center py-20 text-[#00cc77]">
        <div class="text-6xl mb-10 pulse">☰</div>
        <h2 class="text-4xl mb-6 tracking-widest">VOIDLEX + NODES AWAKEN</h2>
        <p class="max-w-lg mx-auto text-lg">Words or IPs.<br>The abyss accepts both.</p>
      </div>`;
  };
</script>
</body>
</html>
