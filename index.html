<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Root Donate • Lost & Found</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    
    .monzo-pink { background: linear-gradient(135deg, #FF4E6C, #FF6B85); }
    
    .tab-active {
      border-bottom: 3px solid #FF4E6C;
      color: #FF4E6C;
      font-weight: 600;
    }
    
    .result-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .result-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgb(255 78 108 / 0.15);
    }
  </style>
</head>
<body class="bg-zinc-50 min-h-screen py-12 px-4">
  <div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-zinc-100">
      
      <!-- Header -->
      <div class="h-2 monzo-pink"></div>
      
      <div class="px-8 pt-8 pb-6 text-center">
        <div class="mx-auto w-20 h-20 bg-gradient-to-br from-pink-100 to-rose-100 rounded-3xl flex items-center justify-center mb-6 shadow-inner">
          <span class="text-5xl">🔍</span>
        </div>
        <h1 class="text-3xl font-semibold tracking-tight text-zinc-900">Lost & Found</h1>
        <p class="text-zinc-600 mt-1">Community powered • Data saved automatically</p>
      </div>

      <!-- Tabs -->
      <div class="flex border-b border-zinc-100 px-8">
        <button onclick="switchTab(0)" id="tab-0" class="tab-active flex-1 py-4 text-center">Search</button>
        <button onclick="switchTab(1)" id="tab-1" class="flex-1 py-4 text-center text-zinc-500">Report New</button>
      </div>

      <div class="p-8">
        <!-- SEARCH TAB -->
        <div id="search-tab">
          <div class="relative mb-6">
            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400">
              <i class="fa-solid fa-magnifying-glass"></i>
            </span>
            <input 
              type="text" 
              id="search-input"
              placeholder="Search lost or found items..."
              class="w-full pl-12 pr-5 py-5 border border-zinc-200 rounded-2xl focus:outline-none focus:border-pink-500 focus:ring-4 focus:ring-pink-100 text-lg font-medium"
              oninput="handleSearchInput()"
            >
            <div id="suggestions" class="hidden absolute z-20 w-full mt-2 bg-white border border-zinc-200 rounded-2xl shadow-2xl py-2 max-h-80 overflow-auto"></div>
          </div>

          <div class="grid grid-cols-3 gap-4 mb-8">
            <select id="type-filter" onchange="filterResults()" class="px-4 py-3 border border-zinc-200 rounded-2xl focus:outline-none focus:border-pink-500">
              <option value="">All</option>
              <option value="lost">Lost</option>
              <option value="found">Found</option>
            </select>
            <input type="text" id="location-filter" placeholder="Location" oninput="filterResults()" class="px-4 py-3 border border-zinc-200 rounded-2xl focus:outline-none focus:border-pink-500">
            <input type="date" id="date-filter" onchange="filterResults()" class="px-4 py-3 border border-zinc-200 rounded-2xl focus:outline-none focus:border-pink-500">
          </div>

          <div class="space-y-4" id="results-container"></div>
        </div>

        <!-- ADD REPORT TAB -->
        <div id="add-tab" class="hidden">
          <div class="space-y-6">
            <div>
              <label class="block text-sm font-semibold text-zinc-700 mb-2">Type</label>
              <div class="flex gap-3">
                <button onclick="setType('lost')" id="btn-lost" class="flex-1 py-4 rounded-2xl border-2 border-red-500 text-red-600 font-semibold">Lost</button>
                <button onclick="setType('found')" id="btn-found" class="flex-1 py-4 rounded-2xl border-2 border-emerald-200 text-emerald-600 font-semibold">Found</button>
              </div>
            </div>

            <div>
              <label class="block text-sm font-semibold text-zinc-700 mb-2">Item</label>
              <input type="text" id="item-name" placeholder="e.g. Black leather wallet" class="w-full px-5 py-4 border border-zinc-200 rounded-2xl focus:outline-none focus:border-pink-500">
            </div>

            <div>
              <label class="block text-sm font-semibold text-zinc-700 mb-2">Location</label>
              <input type="text" id="item-location" placeholder="e.g. Oxford Street" class="w-full px-5 py-4 border border-zinc-200 rounded-2xl focus:outline-none focus:border-pink-500">
            </div>

            <div>
              <label class="block text-sm font-semibold text-zinc-700 mb-2">Description</label>
              <textarea id="item-desc" rows="3" placeholder="Color, brand, special features..." class="w-full px-5 py-4 border border-zinc-200 rounded-2xl focus:outline-none focus:border-pink-500 resize-none"></textarea>
            </div>

            <div>
              <label class="block text-sm font-semibold text-zinc-700 mb-2">Your Contact</label>
              <input type="text" id="item-contact" placeholder="Phone or Email" class="w-full px-5 py-4 border border-zinc-200 rounded-2xl focus:outline-none focus:border-pink-500">
            </div>

            <button onclick="addReport()" class="monzo-pink w-full py-5 rounded-2xl text-white font-semibold text-lg active:scale-95 transition-all">
              Submit Report
            </button>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="border-t border-zinc-100 bg-zinc-50 px-8 py-6 text-center">
        <div class="flex justify-center items-center gap-5 text-xs text-zinc-400">
          <div>🔒 Private & Secure</div>
          <div>•</div>
          <div>Data saved in browser</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let itemsDB = [];

    // Load from localStorage
    function loadData() {
      const saved = localStorage.getItem('lostFoundReports');
      if (saved) {
        itemsDB = JSON.parse(saved);
      } else {
        // Default items
        itemsDB = [
          { id: 1, type: "lost", item: "Black leather wallet", location: "Oxford Street", date: "2025-06-10", description: "Contains cards and ID", contact: "lost@ex.com" },
          { id: 2, type: "found", item: "iPhone 14 Pro", location: "King's Cross Station", date: "2025-06-11", description: "Blue case, locked", contact: "found@ex.com" },
          { id: 3, type: "lost", item: "Car keys with keychain", location: "Westfield Mall", date: "2025-06-09", description: "Toyota fob", contact: "lost@ex.com" }
        ];
        saveData();
      }
    }

    function saveData() {
      localStorage.setItem('lostFoundReports', JSON.stringify(itemsDB));
    }

    let currentTab = 0;
    let currentType = 'lost';

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('search-tab').classList.toggle('hidden', tab === 1);
      document.getElementById('add-tab').classList.toggle('hidden', tab === 0);
      
      document.getElementById('tab-0').classList.toggle('tab-active', tab === 0);
      document.getElementById('tab-1').classList.toggle('tab-active', tab === 1);
      
      if (tab === 0) filterResults();
    }

    function setType(type) {
      currentType = type;
      document.getElementById('btn-lost').classList.toggle('border-red-500', type === 'lost');
      document.getElementById('btn-found').classList.toggle('border-emerald-500', type === 'found');
    }

    function addReport() {
      const item = document.getElementById('item-name').value.trim();
      const location = document.getElementById('item-location').value.trim();
      const desc = document.getElementById('item-desc').value.trim();
      const contact = document.getElementById('item-contact').value.trim();

      if (!item || !location || !contact) {
        alert("Please fill in all required fields.");
        return;
      }

      const newReport = {
        id: Date.now(),
        type: currentType,
        item: item,
        location: location,
        date: new Date().toISOString().split('T')[0],
        description: desc || "No additional description",
        contact: contact
      };

      itemsDB.unshift(newReport);
      saveData();

      alert("✅ Report added successfully!");
      
      // Clear form
      document.getElementById('item-name').value = '';
      document.getElementById('item-location').value = '';
      document.getElementById('item-desc').value = '';
      document.getElementById('item-contact').value = '';
      
      switchTab(0);
      filterResults();
    }

    function deleteReport(id) {
      if (confirm("Delete this report permanently?")) {
        itemsDB = itemsDB.filter(item => item.id !== id);
        saveData();
        filterResults();
      }
    }

    function shareReport(id) {
      const url = `${window.location.origin}${window.location.pathname}?report=${id}`;
      navigator.clipboard.writeText(url).then(() => {
        alert(`✅ Shareable link copied!\n\n${url}`);
      });
    }

    function renderResults(filteredItems) {
      const container = document.getElementById('results-container');
      container.innerHTML = '';

      if (filteredItems.length === 0) {
        container.innerHTML = `<div class="text-center py-16 text-zinc-500"><span class="text-5xl mb-4 block">😕</span><p>No matching reports</p></div>`;
        return;
      }

      filteredItems.forEach(item => {
        const card = document.createElement('div');
        card.className = `result-card bg-white border border-zinc-100 rounded-2xl p-6`;
        card.innerHTML = `
          <div class="flex justify-between">
            <div>
              <span class="inline-block px-3.5 py-1 text-xs font-semibold rounded-full ${item.type === 'lost' ? 'bg-red-100 text-red-600' : 'bg-emerald-100 text-emerald-600'}">
                ${item.type.toUpperCase()}
              </span>
              <h3 class="text-2xl font-semibold mt-3">${item.item}</h3>
              <p class="text-zinc-600 mt-1">${item.description}</p>
            </div>
            <div class="text-right text-sm">
              <p class="font-medium">${item.location}</p>
              <p class="text-zinc-500">${item.date}</p>
            </div>
          </div>
          <div class="mt-6 pt-5 border-t flex justify-between items-center">
            <span class="text-sm text-zinc-500">Contact: <span class="font-medium">${item.contact}</span></span>
            <div class="flex gap-3">
              <button onclick="contactOwner(${item.id})" class="monzo-pink px-5 py-2.5 text-white text-sm font-semibold rounded-2xl">Contact</button>
              <button onclick="shareReport(${item.id})" class="px-5 py-2.5 border border-zinc-300 hover:border-pink-300 text-zinc-700 text-sm font-semibold rounded-2xl">Share</button>
              <button onclick="deleteReport(${item.id})" class="px-5 py-2.5 border border-red-200 text-red-600 text-sm font-semibold rounded-2xl hover:bg-red-50">Remove</button>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // Search & Filter functions (same as before)
    function handleSearchInput() {
      const query = document.getElementById('search-input').value.toLowerCase().trim();
      const suggestionsDiv = document.getElementById('suggestions');

      if (query.length < 1) {
        suggestionsDiv.classList.add('hidden');
        filterResults();
        return;
      }

      const suggestions = [...new Set(itemsDB.map(i => i.item))]
        .filter(item => item.toLowerCase().includes(query));

      let html = '';
      suggestions.forEach(s => {
        html += `<div onclick="selectSuggestion('${s}')" class="px-6 py-4 hover:bg-zinc-50 cursor-pointer">${s}</div>`;
      });

      suggestionsDiv.innerHTML = html;
      suggestionsDiv.classList.toggle('hidden', suggestions.length === 0);
    }

    function selectSuggestion(item) {
      document.getElementById('search-input').value = item;
      document.getElementById('suggestions').classList.add('hidden');
      filterResults();
    }

    function filterResults() {
      const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
      const typeFilter = document.getElementById('type-filter').value;
      const locationFilter = document.getElementById('location-filter').value.toLowerCase().trim();

      const filtered = itemsDB.filter(item => {
        const matchesSearch = !searchTerm || 
          item.item.toLowerCase().includes(searchTerm) ||
          item.description.toLowerCase().includes(searchTerm);
        const matchesType = !typeFilter || item.type === typeFilter;
        const matchesLocation = !locationFilter || item.location.toLowerCase().includes(locationFilter);
        return matchesSearch && matchesType && matchesLocation;
      });

      renderResults(filtered);
    }

    function contactOwner(id) {
      alert(`✅ Contact request sent for item #${id}`);
    }

    // Handle shared link on load
    function handleSharedLink() {
      const params = new URLSearchParams(window.location.search);
      const reportId = params.get('report');
      
      if (reportId) {
        const report = itemsDB.find(r => r.id == reportId);
        if (report) {
          alert(`🔗 Opened shared report:\n\n${report.item}\n${report.location} • ${report.date}`);
          // You can also auto-scroll or highlight the card if needed
        }
      }
    }

    // Close suggestions
    document.addEventListener('click', e => {
      if (!e.target.closest('#search-input')) {
        document.getElementById('suggestions').classList.add('hidden');
      }
    });

    // Initialize
    loadData();
    switchTab(0);
    filterResults();
    handleSharedLink();
  </script>
</body>
</html>
