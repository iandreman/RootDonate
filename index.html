// Updated: isGpsLike now returns strings
function isGpsLike(text) {
  const patterns = [
    /([-+]?\d{1,3}(?:\.\d{1,12})?)[°\s,;d]*([-+]?\d{1,3}(?:\.\d{1,12})?)/i,
    /\(?\s*([-+]?\d{1,3}(?:\.\d{1,12})?)\s*[,;]?\s*([-+]?\d{1,3}(?:\.\d{1,12})?)\s*\)?/i
  ];
  for (const re of patterns) {
    const m = text.match(re);
    if (m) {
      const latStr = m[1].trim();
      const lngStr = m[2].trim();
      const lat = parseFloat(latStr);
      const lng = parseFloat(lngStr);
      if (!isNaN(lat) && !isNaN(lng) && lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180) {
        return { lat: latStr, lng: lngStr }; // ← strings!
      }
    }
  }
  return false;
}

// Updated importContent – store strings for GPS
function importContent(content, source = 'short link') {
  let added = false;
  const gps = isGpsLike(content);
  if (gps) {
    const exists = pins.some(p => 
      p.type === 'gps' && 
      p.lat === gps.lat && 
      p.lng === gps.lng
    );
    if (!exists) {
      pins.push({ type: 'gps', lat: gps.lat, lng: gps.lng });
      added = true;
    }
    println(`<span class="success">Imported GPS from ${source}: ${parseFloat(gps.lat).toFixed(6)}, ${parseFloat(gps.lng).toFixed(6)}</span>`);
  } else {
    // URL handling unchanged
    const url = extractUrl(content);
    if (url) {
      const clean = cleanUrl(url);
      const exists = pins.some(p => p.type === 'url' && cleanUrl(p.url) === clean);
      if (!exists) {
        pins.push({ type: 'url', url });
        added = true;
      }
      println(`<span class="success">Imported clean URL from ${source}</span>`);
    } else {
      println(`<span class="success">Imported text from ${source}</span>`);
    }
  }
  if (added) {
    saveData();
    if (pinsView.classList.contains('active')) renderPins();
  }
  return added;
}

// Updated renderPins – parseFloat only for display
function renderPins() {
  pinsList.innerHTML = '';
  if (pins.length === 0) {
    pinsList.innerHTML = '<div class="line muted">No pins saved yet.</div>';
    return;
  }

  pins.forEach(pin => {
    const item = document.createElement('div');
    item.className = 'pin-item';
    let display = '';
    let shareContent = '';

    if (pin.type === 'gps') {
      const latNum = parseFloat(pin.lat);
      const lngNum = parseFloat(pin.lng);
      const lat = latNum.toFixed(7);
      const lng = lngNum.toFixed(7);
      const maps = `https://www.google.com/maps/search/?api=1&query=${latNum.toFixed(8)},${lngNum.toFixed(8)}`;
      display = `<span class="pin-type">[GPS]</span> ${lat}, ${lng} <a href="${maps}" target="_blank" style="color:var(--accent)">→ Maps</a>`;
      shareContent = `${pin.lat}, ${pin.lng}`; // ← full precision in share
    } else {
      // URL unchanged
      const clean = cleanUrl(pin.url);
      display = `<span class="pin-type">[URL]</span> <a href="${clean}" target="_blank" style="color:var(--accent);word-break:break-all;">${escapeHtml(clean)}</a>`;
      shareContent = clean;
    }

    item.innerHTML = display;
    addActions(item, shareContent);
    pinsList.appendChild(item);
  });
}
