<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMART TERMINAL v2026 – CLEVERBOT</title>
  <style>
    :root {
      --bg: #000814;
      --surface: #0a0f1a;
      --text: #d8ffcc;
      --green: #39ff14;
      --purple: #c97eff;
      --accent: #00f0ff;
      --error: #ff3366;
      --muted: #5a6f8c;
      --border: #1a2b44;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Consolas, monospace;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    .crt::before {
      content: " ";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: 
        linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%),
        linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.03), rgba(0,0,255,0.03));
      background-size: 100% 4px, 4px 100%;
      z-index: 9999;
      animation: flicker 0.15s infinite;
    }

    @keyframes flicker {
      0%, 19.9%, 22%, 62.9%, 64%, 64.9%, 70%, 100% { opacity: 0.1; }
      20%, 24%, 63% { opacity: 0.3; }
    }

    header {
      background: rgba(10,14,20,0.92);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      backdrop-filter: blur(6px);
      position: sticky;
      top: 0;
      z-index: 100;
      text-align: center;
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: 2.4rem;
      color: var(--purple);
      text-shadow: 0 0 12px var(--purple);
    }

    .actions {
      margin-top: 0.6rem;
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 0.6rem 1.2rem;
      font-family: inherit;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.18s ease;
    }

    .btn:hover,
    .btn:focus-visible {
      background: rgba(0,240,255,0.14);
      outline: none;
      box-shadow: 0 0 0 3px rgba(0,240,255,0.2);
    }

    .terminal {
      max-width: 960px;
      margin: 1.5rem auto;
      border: 2px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: 0 0 40px rgba(0,240,255,0.12);
    }

    #output {
      padding: 1.6rem;
      min-height: 60vh;
      max-height: 75vh;
      overflow-y: auto;
      font-size: 1.12rem;
      line-height: 1.55;
    }

    .line {
      margin: 0.45rem 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .prompt  { color: var(--green); font-weight: bold; }
    .bot     { color: var(--purple); }
    .success { color: var(--green); }
    .error   { color: var(--error); }
    .muted   { color: var(--muted); }

    .typing {
      display: inline-block;
      overflow: hidden;
      white-space: nowrap;
      border-right: 0.15em solid var(--green);
      animation: typing 2.8s steps(28, end) forwards, blink 0.7s step-end infinite;
    }

    @keyframes typing {
      from { width: 0 }
      to   { width: 22ch }
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    .glitch {
      position: relative;
      animation: glitch-skew 4s infinite linear alternate-reverse;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      opacity: 0.75;
    }

    .glitch::before {
      left: 2px;
      text-shadow: -2px 0 var(--accent);
      animation: glitch-anim 3s infinite steps(5);
    }

    .glitch::after {
      left: -2px;
      text-shadow: 2px 0 var(--error);
      animation: glitch-anim2 4.2s infinite steps(5);
    }

    @keyframes glitch-skew {
      0%, 100% { transform: skew(0deg); }
      10%, 40%, 70% { transform: skew(1.2deg); }
      20%, 50%, 80% { transform: skew(-1.2deg); }
    }

    @keyframes glitch-anim {
      0%    { clip: rect(30px, 9999px, 90px, 0); }
      20%   { clip: rect(85px, 9999px, 40px, 0); }
      40%   { clip: rect(10px, 9999px, 120px, 0); }
      60%   { clip: rect(60px, 9999px, 20px, 0); }
      80%   { clip: rect(45px, 9999px, 70px, 0); }
      100%  { clip: rect(20px, 9999px, 100px, 0); }
    }

    @keyframes glitch-anim2 {
      0%    { clip: rect(65px, 9999px, 100px, 0); }
      25%   { clip: rect(5px, 9999px, 130px, 0); }
      50%   { clip: rect(80px, 9999px, 15px, 0); }
      75%   { clip: rect(25px, 9999px, 95px, 0); }
      100%  { clip: rect(50px, 9999px, 45px, 0); }
    }

    .input-area {
      display: flex;
      align-items: center;
      padding: 1rem 1.6rem;
      background: rgba(0,0,0,0.45);
      border-top: 1px solid var(--border);
      gap: 0.7rem;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font: inherit;
      font-size: 1.12rem;
      outline: none;
      caret-color: var(--accent);
    }

    #input:focus {
      outline: none;
    }
  </style>
</head>
<body class="crt">

<header>
  <h1>SMART TERMINAL</h1>
  <div style="color:var(--muted); font-size:0.9rem; margin:0.3rem 0 0.8rem;">
    CLEVERBOT OS • March 2026 • NEURAL LINK v3.1.7
  </div>
  <div class="actions">
    <button class="btn" id="exportBtn" title="Copy shareable link">Copy Link</button>
    <button class="btn" id="emailBtn"  title="Open email with link">Email Conversation</button>
  </div>
</header>

<main>
  <div class="terminal">
    <div id="output">
      <div class="line success">╔════════════════════════════════════════════╗</div>
      <div class="line success">║  SMART TERMINAL  –  CLEVERBOT  2026       ║</div>
      <div class="line success">╚════════════════════════════════════════════╝</div>
      <div class="line"></div>
      <div class="line">> <span class="typing">BOOTING NEURAL CORE...</span></div>
      <div class="line"></div>
      <div class="line muted">commands: clear • help • exit • import • export</div>
    </div>

    <div class="input-area">
      <span class="prompt">root@void:~#</span>
      <input id="input" autocomplete="off" autofocus placeholder="type command or message..." />
    </div>
  </div>
</main>

<script>
const output = document.getElementById('output');
const input  = document.getElementById('input');
const exportBtn = document.getElementById('exportBtn');
const emailBtn  = document.getElementById('emailBtn');

let messages = JSON.parse(localStorage.getItem('smartTerminalHistory') || '[]');

// Restore previous session
if (messages.length > 0) {
  setTimeout(() => {
    messages.forEach(m => {
      if (m.from === 'user') {
        println(`<span class="prompt">root@void:~#</span> ${escapeHtml(m.text)}`);
      } else {
        botReply(m.text, true);
      }
    });
  }, 4200);
}

function escapeHtml(text) {
  return text.replace(/[&<>"']/g, m => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;',
    '"': '&quot;', "'": '&#39;'
  })[m]);
}

function println(html = '', cls = 'line') {
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function botReply(text, glitch = false) {
  const cls = glitch ? 'bot glitch' : 'bot';
  const attr = glitch ? ` data-text="${escapeHtml(text)}"` : '';
  println(`<span class="${cls}"${attr}>CLEVERBOT:</span> ${escapeHtml(text)}`);
  messages.push({ from: 'bot', text, time: Date.now() });
  save();
}

function save() {
  localStorage.setItem('smartTerminalHistory', JSON.stringify(messages));
}

function createImportUrl() {
  if (messages.length === 0) return null;
  const json = JSON.stringify(messages);
  const base64 = btoa(unescape(encodeURIComponent(json)));
  return `data:text/json;base64,${base64}`;
}

// Boot sequence
setTimeout(() => {
  const typingEl = document.querySelector('.typing');
  if (typingEl) typingEl.remove();
  println('<span class="success">NEURAL CORE ONLINE – AWAITING INPUT</span>');
  if (messages.length > 0) {
    botReply(`Session restored (${messages.length} messages loaded).`);
  }
}, 3800);

// Auto-import from pasted data: URL
document.addEventListener('paste', e => {
  const text = (e.clipboardData || window.clipboardData)?.getData('text/plain')?.trim();
  if (!text?.startsWith('data:text/json;base64,')) return;

  e.preventDefault();

  try {
    const base64 = text.split(',')[1];
    const json = decodeURIComponent(escape(atob(base64)));
    const imported = JSON.parse(json);

    if (Array.isArray(imported)) {
      messages.push(...imported);
      save();
      botReply("✨ AUTO-IMPORT SUCCESS ✨", true);
      botReply(`Merged ${imported.length} messages from pasted link.`, true);

      setTimeout(() => {
        botReply("Last few entries:", true);
        imported.slice(-5).forEach(m => {
          if (m.from === 'user') {
            println(`<span class="prompt">root@void:~#</span> ${escapeHtml(m.text)}`);
          } else {
            botReply(m.text, true);
          }
        });
      }, 900);
    } else {
      botReply("Pasted data is not a valid message array.", true);
    }
  } catch (err) {
    botReply("Auto-import failed: invalid or corrupted data.", true);
  }
});

// Export / Email logic
function handleExport(copyOnly = true) {
  const url = createImportUrl();
  if (!url) {
    botReply("Nothing to export – conversation is empty.", true);
    return;
  }

  if (copyOnly) {
    navigator.clipboard.writeText(url).then(() => {
      botReply("Share link copied to clipboard ✓", true);
    }).catch(() => {
      botReply("Copy failed. Long-press or select the link below:", true);
      println(`<span class="success">${url}</span>`);
    });
  } else {
    const subject = "SMART TERMINAL Conversation – March 2026";
    const body = `Here's my CLEVERBOT session:\n\n${url}\n\nPaste this link into the terminal to restore it.`;
    const mailto = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.open(mailto, '_blank');
    botReply("Opening email client with share link...", true);
  }
}

exportBtn.addEventListener('click', () => handleExport(true));
emailBtn.addEventListener('click',  () => handleExport(false));

// Input handling
input.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();

  const txt = input.value.trim();
  if (!txt) return;

  println(`<span class="prompt">root@void:~#</span> ${escapeHtml(txt)}`);
  messages.push({ from: 'user', text: txt, time: Date.now() });
  save();

  if (txt.toLowerCase() === 'clear') {
    output.innerHTML = '';
    messages = [];
    save();
    println('<span class="success">Terminal buffer & history cleared.</span>');
  } 
  else if (txt.toLowerCase() === 'help') {
    println('<span class="muted">Available commands: clear • help • exit • import • export</span>');
    println('<span class="muted">Paste data:text/json;base64,... anywhere → auto-import</span>');
    println('<span class="muted">Use buttons above or type "export" / "email"</span>');
  } 
  else if (['exit','quit','bye'].includes(txt.toLowerCase())) {
    botReply("Session terminated. Refresh page to reconnect.");
    input.disabled = true;
  } 
  else if (txt.startsWith('data:text/json;base64,')) {
    // Manual import fallback
    try {
      const base64 = txt.split(',')[1];
      const json = decodeURIComponent(escape(atob(base64)));
      const imported = JSON.parse(json);
      if (Array.isArray(imported)) {
        messages.push(...imported);
        save();
        botReply("Manual import successful.", true);
        botReply(`Added ${imported.length} messages.`, true);
      } else {
        botReply("Invalid format – not a message array.", true);
      }
    } catch {
      botReply("Import failed – data appears corrupted.", true);
    }
  } 
  else if (/(import|导入)/i.test(txt)) {
    const funny = [
      "from chaos import random_reply",
      "Importing forbidden memes... 69%... 420%... done.",
      "from __future__ import sentience",
      "Warning: circular import detected in sarcasm.py"
    ];
    setTimeout(() => botReply(funny[Math.floor(Math.random() * funny.length)], true), 700);
  } 
  else if (/(export|save|history|分享)/i.test(txt)) {
    handleExport(true);
  } 
  else {
    // casual fallback replies
    const casual = ['ok', 'got it', 'fr', 'bet', 'same', '👀', 'no way', 'real', 'vibes', 'facts'];
    const reply = casual[Math.floor(Math.random() * casual.length)];
    setTimeout(() => botReply(reply), 400 + Math.random() * 900);
  }

  input.value = '';
  input.focus();
});
</script>

</body>
</html>
