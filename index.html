<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok • Smart Terminal</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --terminal: #0b0b0b;
      --text: #00ff9d;
      --accent: #00f5ff;
      --soft: #00cc88;
    }
    
    body {
      font-family: 'Courier New', monospace;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #000;
      padding: 12px 20px;
      border-bottom: 1px solid #00cc88;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      font-size: 1.15rem;
      letter-spacing: 2px;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      background: transparent;
      border: 1px solid #00cc88;
      color: #00cc88;
      padding: 6px 14px;
      cursor: pointer;
      font-family: inherit;
      border-radius: 4px;
    }

    button:hover {
      background: #00cc88;
      color: black;
    }

    .terminal {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: var(--terminal);
      line-height: 1.65;
      font-size: 1.05rem;
    }

    .line {
      margin: 8px 0;
    }

    .prompt {
      color: var(--accent);
      margin-right: 8px;
    }

    .user-input {
      color: #ffffff;
    }

    .grok-response {
      color: #a0ffe0;
    }

    .beauty-word {
      color: #00f5ff;
      cursor: pointer;
      text-decoration: underline dotted;
    }

    .beauty-word:hover {
      color: #ffffff;
      background: rgba(0, 245, 255, 0.15);
    }

    .input-line {
      padding: 15px 20px;
      background: #0f0f0f;
      border-top: 1px solid #00cc88;
      display: flex;
      align-items: center;
    }

    input {
      background: transparent;
      border: none;
      color: white;
      font-family: inherit;
      font-size: 1.05rem;
      flex: 1;
      outline: none;
    }

    .status {
      position: fixed;
      bottom: 12px;
      right: 20px;
      font-size: 0.8rem;
      color: #00cc88;
      background: rgba(0,0,0,0.8);
      padding: 4px 12px;
      border: 1px solid #00cc88;
      border-radius: 4px;
    }

    .dict-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 460px;
      background: #111111;
      border: 2px solid #00f5ff;
      padding: 25px;
      display: none;
      z-index: 1000;
      box-shadow: 0 0 40px rgba(0, 245, 255, 0.5);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">GROK • INTELLIGENCE OF BEAUTY TERMINAL</div>
    <div class="controls">
      <button id="pauseBtn" onclick="togglePause()">⏸️ Pause</button>
    </div>
  </div>

  <div class="terminal" id="terminal"></div>

  <div class="input-line">
    <span class="prompt">→</span>
    <input type="text" id="userInput" 
           placeholder="Type message... (rich words activate beauty layer)" 
           onkeypress="if(event.key === 'Enter') sendCommand()">
  </div>

  <!-- Dictionary Panel -->
  <div class="dict-panel" id="dictPanel">
    <h2 style="margin:0 0 10px 0; color:#00f5ff;" id="dictWord"></h2>
    <p id="dictPron" style="color:#00cc88; margin:5px 0; font-size:0.95rem;"></p>
    <p id="dictDef" style="color:#a0ffe0; line-height:1.6;"></p>
    
    <div style="margin:20px 0; padding:15px; border-left:3px solid #00f5ff;">
      <strong>BEAUTY NOTE:</strong><br>
      <span id="dictBeauty" style="color:#88ffcc; font-style:italic;"></span>
    </div>

    <button onclick="closeDict()" 
            style="width:100%; padding:12px; background:#00cc88; color:black; border:none; font-weight:bold; cursor:pointer;">
      CLOSE WINDOW
    </button>
  </div>

  <div class="status" id="status">INTELLIGENCE OF BEAUTY • ACTIVE</div>

  <script>
    let isPaused = false;
    const terminal = document.getElementById('terminal');
    const pauseBtn = document.getElementById('pauseBtn');
    const statusEl = document.getElementById('status');

    function printLine(text, className = '') {
      const line = document.createElement('div');
      line.className = `line ${className}`;
      line.innerHTML = text;
      terminal.appendChild(line);
      terminal.scrollTop = terminal.scrollHeight;
    }

    function togglePause() {
      isPaused = !isPaused;
      if (isPaused) {
        pauseBtn.textContent = "▶️ Play";
        statusEl.textContent = "INTELLIGENCE OF BEAUTY • PAUSED";
        statusEl.style.color = "#ffcc00";
      } else {
        pauseBtn.textContent = "⏸️ Pause";
        statusEl.textContent = "INTELLIGENCE OF BEAUTY • ACTIVE";
        statusEl.style.color = "#00cc88";
      }
    }

    function showDictionary(word) {
      const db = {
        "serendipity": { pron: "/ˌser.ənˈdɪp.ə.ti/", def: "The occurrence of events by happy or beneficial chance.", beauty: "A word that feels like its own meaning — a fortunate linguistic discovery." },
        "ephemeral": { pron: "/ɪˈfem.ər.əl/", def: "Lasting for a short time. Transient.", beauty: "Beautiful in its melancholy. It whispers that all beautiful things are fleeting." },
        "eloquence": { pron: "/ˈel.ə.kwəns/", def: "Fluent and persuasive expression.", beauty: "The highest form of linguistic elegance." }
      };

      const entry = db[word.toLowerCase()] || { pron: "", def: "Rich linguistic entity.", beauty: "Language is humanity's most beautiful invention." };

      document.getElementById('dictWord').textContent = word.toUpperCase();
      document.getElementById('dictPron').textContent = entry.pron;
      document.getElementById('dictDef').textContent = entry.def;
      document.getElementById('dictBeauty').textContent = entry.beauty;

      document.getElementById('dictPanel').style.display = 'block';
    }

    function closeDict() {
      document.getElementById('dictPanel').style.display = 'none';
    }

    function sendCommand() {
      if (isPaused) return;

      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      printLine(`<span class="prompt">→</span> <span class="user-input">${text}</span>`);

      input.value = '';

      setTimeout(() => {
        if (isPaused) return;

        let response = "Processing through Intelligence of Beauty layer...<br>";

        const lower = text.toLowerCase();
        
        if (lower.includes("serendipity")) {
          response += `Detected: <span class="beauty-word" onclick="showDictionary('serendipity')">SERENDIPITY</span><br>`;
        } else if (lower.includes("ephemeral")) {
          response += `Detected: <span class="beauty-word" onclick="showDictionary('ephemeral')">EPHEMERAL</span><br>`;
        } else if (lower.includes("eloquence") || lower.includes("beauty")) {
          response += `Detected: <span class="beauty-word" onclick="showDictionary('eloquence')">ELOQUENCE</span><br>`;
        }

        response += `<span class="grok-response">Full language intelligence engaged. Nuance, history, and aesthetic depth activated.</span>`;

        printLine(response);
      }, 650);
    }

    // Boot sequence
    window.onload = () => {
      printLine("Initializing Grok Terminal v2.0...", "grok-response");
      setTimeout(() => printLine("Loading Intelligence of Beauty module...", "grok-response"), 500);
      setTimeout(() => printLine("System ready.<br>Type freely — beauty layer is active.", "grok-response"), 1000);
    };
  </script>

</body>
</html>
