<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERRA-001 // EARTH NODE TERMINAL v1.8</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --green: #00ff9d;
            --cyan: #00f0ff;
            --accent: #00ccff;
            --bg: #02050c;
            --panel: rgba(10, 18, 32, 0.97);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'VT323', monospace;
            background: var(--bg);
            color: var(--green);
            height: 100vh;
            overflow: hidden;
            background-image: 
                linear-gradient(rgba(0,255,150,0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,150,0.035) 1px, transparent 1px);
            background-size: 50px 50px;
            user-select: none;
            position: relative;
        }

        .crt {
            position: relative;
        }

        .crt::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                transparent 0px,
                transparent 2px,
                rgba(0, 255, 120, 0.03) 2px,
                rgba(0, 255, 120, 0.03) 4px
            );
            pointer-events: none;
            z-index: 10;
            animation: flicker 0.15s infinite alternate;
        }

        @keyframes flicker {
            0% { opacity: 0.95; }
            100% { opacity: 1; }
        }

        .header {
            background: rgba(5, 12, 25, 0.98);
            border-bottom: 4px solid var(--green);
            padding: 16px 32px;
            font-size: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.6);
            z-index: 100;
            letter-spacing: 2px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stats {
            display: flex;
            gap: 50px;
            font-size: 1.55rem;
        }

        .main {
            display: flex;
            height: calc(100vh - 78px);
            padding: 22px;
            gap: 22px;
        }

        .panel {
            flex: 1;
            background: var(--panel);
            border: 2px solid var(--cyan);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 204, 255, 0.4);
            transition: all 0.3s ease;
        }

        .panel:hover {
            box-shadow: 0 0 55px rgba(0, 204, 255, 0.55);
        }

        .panel-header {
            background: linear-gradient(to right, #001122, #002b44);
            padding: 16px 28px;
            font-size: 1.8rem;
            color: var(--cyan);
            border-bottom: 3px solid var(--green);
            letter-spacing: 2px;
            text-shadow: 0 0 12px var(--cyan);
        }

        .content {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            font-size: 1.6rem;
            line-height: 1.8;
            scrollbar-width: thin;
            scrollbar-color: var(--green) #001a22;
        }

        .content::-webkit-scrollbar {
            width: 10px;
        }

        .content::-webkit-scrollbar-thumb {
            background: var(--green);
            border-radius: 4px;
        }

        input {
            width: 100%;
            padding: 18px 22px;
            font-size: 1.75rem;
            background: #000;
            border: 2px solid #004433;
            color: var(--green);
            font-family: 'VT323', monospace;
            outline: none;
            transition: all 0.3s;
        }

        input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.7);
        }

        button {
            padding: 15px 20px;
            margin: 6px 0;
            font-size: 1.5rem;
            background: #001a11;
            color: var(--green);
            border: 2px solid var(--green);
            cursor: pointer;
            transition: all 0.25s;
            width: 100%;
        }

        button:hover {
            background: #003322;
            box-shadow: 0 0 25px rgba(0, 255, 157, 0.8);
            transform: translateY(-2px);
        }

        .donate {
            background: linear-gradient(45deg, #ff3366, #ffaa00);
            color: #111;
            border: 2px solid #ffdd00;
            font-weight: bold;
            margin-top: 8px;
        }

        .scanline {
            position: fixed;
            inset: 0;
            background: linear-gradient(transparent 50%, rgba(0, 255, 120, 0.08) 50%);
            background-size: 100% 6px;
            pointer-events: none;
            animation: scan 11s linear infinite;
            z-index: 200;
            opacity: 0.4;
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .log p {
            margin-bottom: 10px;
            text-shadow: 0 0 8px currentColor;
        }

        .success { color: #00ff9d; }
        .warning { color: #ffcc00; }
        .error   { color: #ff5555; }
        .info    { color: var(--cyan); }

        .footer {
            position: fixed;
            bottom: 16px;
            right: 32px;
            font-size: 1.2rem;
            color: var(--accent);
            opacity: 0.8;
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body class="crt">

    <div class="header">
        <div class="header-left">
            🌍 <strong>TERRA-001</strong> • EARTH NODE TERMINAL <span style="color:var(--cyan);">v1.8</span>
        </div>
        <div class="stats">
            <span>LVL <span id="level">01</span></span>
            <span>🔋 <span id="resonance">420</span></span>
            <span>ALIGN <span id="alignment">67%</span></span>
        </div>
        <div id="time" style="color:var(--cyan); font-size:1.6rem;"></div>
    </div>

    <div class="main">

        <!-- LEFT PANEL: STATUS -->
        <div class="panel">
            <div class="panel-header">📡 EARTH NODE STATUS</div>
            <div class="content" id="status-panel"></div>
            <div style="padding:20px; background:#001522; display:flex; flex-direction:column; gap:10px;">
                <button onclick="injectResonance('bio')">INJECT BIO FIELD 🌱</button>
                <button onclick="injectResonance('mag')">STABILIZE MAG FIELD 🌀</button>
                <button onclick="injectResonance('noo')">AWAKEN NOOSPHERE 🧬</button>
            </div>
        </div>

        <!-- RIGHT PANEL: COMMAND TERMINAL -->
        <div class="panel">
            <div class="panel-header">☰ LEXICON INTERFACE • GLOBAL NOOSPHERE</div>
            <div style="padding:20px 24px; background:#000;">
                <input type="text" id="command" placeholder="ENTER WORD • CONCEPT • IP • QUERY..." 
                       onkeypress="if(event.key==='Enter') runCommand()">
            </div>
            <div style="padding:0 24px 18px;">
                <button onclick="runCommand()">EXECUTE QUERY →</button>
                <button onclick="donateEnergy()" class="donate">DONATE ENERGY • CHARGE THE CORE</button>
                <button onclick="clearScreen()" style="background:#2a0000; border-color:#ff6666;">CLEAR TERMINAL</button>
            </div>
            <div class="content log" id="output">
                <p class="success">>> TERRA-001 ONLINE • EARTH NODE ACTIVE</p>
                <p class="success">>> AWAITING OPERATOR INPUT...</p>
            </div>
        </div>

    </div>

    <div class="scanline"></div>
    <div class="footer">GLOBAL NOOSPHERE CONNECTION • STABLE • 2026</div>

<script>
// Game State
let state = {
    level: 1,
    resonance: 420,
    alignment: 67,
    earthHealth: { bio: 85, mag: 72, noo: 91 }
};

function loadSave() {
    const saved = localStorage.getItem('terraTerminal');
    if (saved) Object.assign(state, JSON.parse(saved));
}

function saveGame() {
    localStorage.setItem('terraTerminal', JSON.stringify(state));
}

function updateUI() {
    document.getElementById('level').textContent = String(state.level).padStart(2, '0');
    document.getElementById('resonance').textContent = Math.floor(state.resonance);
    document.getElementById('alignment').textContent = Math.floor(state.alignment) + "%";
}

function addOutput(text, className = "success") {
    const output = document.getElementById('output');
    const line = document.createElement('p');
    line.innerHTML = `>> ${text}`;
    if (className) line.className = className;
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
}

// Live UTC Clock
function updateTime() {
    const now = new Date();
    document.getElementById('time').textContent = 
        now.toLocaleTimeString('en-GB', { timeZone: 'UTC' }) + " UTC";
}
setInterval(updateTime, 1000);
updateTime();

function updateEarthStatus() {
    const panel = document.getElementById('status-panel');
    panel.innerHTML = `
        <strong style="color:#00ddff; font-size:1.7rem;">PLANETARY CORE VITALS</strong><br><br>
        BIO FIELD  : ${state.earthHealth.bio}%<br>
        MAG FIELD  : ${state.earthHealth.mag}%<br>
        NOO FIELD  : ${state.earthHealth.noo}%<br><br>
        SCHUMANN   : ${(7.83 + Math.random()*2.7).toFixed(2)} Hz<br>
        CORE TEMP  : ${(14.5 + Math.random()*4.2).toFixed(1)}°C<br>
        STATUS     : <span style="color:#00ff9d;">STABLE • SYNCHRONIZED</span>
    `;
}

function injectResonance(type) {
    const cost = 130 + state.level * 20;
    if (state.resonance < cost) {
        addOutput("INSUFFICIENT RESONANCE ENERGY", "warning");
        return;
    }

    state.resonance -= cost;

    if (type === 'bio') state.earthHealth.bio = Math.min(100, state.earthHealth.bio + 18);
    if (type === 'mag') state.earthHealth.mag = Math.min(100, state.earthHealth.mag + 22);
    if (type === 'noo') state.earthHealth.noo = Math.min(100, state.earthHealth.noo + 26);

    addOutput(`${type.toUpperCase()} FIELD STRENGTHENED [+40]`, "success");
    state.resonance += 45;
    
    updateEarthStatus();
    updateUI();
    saveGame();
}

function runCommand() {
    const input = document.getElementById('command').value.trim();
    if (!input) return;

    addOutput(`QUERYING NOOSPHERE: <span style="color:var(--cyan)">${input.toUpperCase()}</span>`, "info");

    setTimeout(() => {
        const reward = Math.floor(input.length * 24 + Math.random() * 95);
        addOutput(`ENTRY SUCCESSFULLY INTEGRATED`, "success");
        addOutput(`RESONANCE GAINED: +${reward}`, "success");
        
        state.resonance += reward;

        if (state.resonance >= state.level * 1250) {
            state.level++;
            addOutput(`NODE ASCENSION COMPLETE — LEVEL ${state.level}`, "success");
        }

        updateUI();
        saveGame();
    }, 680);

    document.getElementById('command').value = '';
}

function donateEnergy() {
    window.open('https://monzo.me/iandreme', '_blank');
    const reward = 160 + state.level * 35;
    state.resonance += reward;
    addOutput(`ENERGY DONATION RECEIVED • +${reward} RESONANCE`, "success");
    updateUI();
    saveGame();
}

function clearScreen() {
    document.getElementById('output').innerHTML = `<p class="success">>> TERMINAL BUFFER CLEARED</p>`;
}

// Initialize
window.onload = () => {
    loadSave();
    updateUI();
    updateEarthStatus();

    setTimeout(() => {
        addOutput("PERSONAL EARTH NODE CONNECTED", "success");
        addOutput("THE NOOSPHERE IS LISTENING...", "success");
    }, 600);
};
</script>

</body>
</html>
