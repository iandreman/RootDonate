<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RootDonate - Step. Donate. Change Lives.</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #0f172a, #1e2937); color: #e2e8f0; margin: 0; padding: 0; min-height: 100vh; }
        .container { max-width: 600px; margin: 40px auto; padding: 30px; background: rgba(15, 23, 42, 0.95); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h1 { color: #22d3ee; }
        .tagline { color: #94a3b8; font-size: 1.1rem; margin-bottom: 30px; }
        form { text-align: left; }
        label { display: block; margin: 15px 0 8px; font-weight: 600; color: #cbd5e1; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #334155; background: #1e2937; color: #e2e8f0; border-radius: 8px; font-size: 1rem; }
        button { margin-top: 25px; width: 100%; padding: 16px; font-size: 1.2rem; font-weight: bold; background: #22d3ee; color: #0f172a; border: none; border-radius: 12px; cursor: pointer; }
        button:hover { background: #67e8f9; transform: translateY(-2px); }
        #response { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .success { background: #166534; color: #86efac; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 RootDonate</h1>
        <p class="tagline">Turn your steps into real impact</p>

        <form id="donateForm">
            <label>Donation Amount (£) — you can change this on the next page</label>
            <input type="number" id="amount" step="0.01" min="1" value="10" required>

            <label>Your Name</label>
            <input type="text" id="name" value="Anonymous">

            <label>Email (for receipt)</label>
            <input type="email" id="email" required>

            <label>Message (optional)</label>
            <textarea id="message" rows="3" placeholder="Thank you for making a difference!"></textarea>

            <label>Steps Walked (optional)</label>
            <input type="number" id="steps" value="0">

            <button type="submit">Donate Now • Secure</button>
        </form>

        <div id="response"></div>
    </div>

    <script>
        const PAYMENT_LINK = "https://buy.stripe.com/YOUR_PAYMENT_LINK_HERE";   // ← Paste your Stripe link here

        document.getElementById('donateForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const amount = document.getElementById('amount').value;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            const steps = document.getElementById('steps').value;

            // Build reference with donor info
            const reference = `Name:${name}|Steps:${steps}|Msg:${message.substring(0, 100)}`;

            let finalUrl = PAYMENT_LINK;

            // Append email if possible
            if (email) {
                finalUrl += (finalUrl.includes('?') ? '&' : '?') + 'prefilled_email=' + encodeURIComponent(email);
            }

            // Show success message and redirect
            const responseDiv = document.getElementById('response');
            responseDiv.style.display = 'block';
            responseDiv.className = 'success';
            responseDiv.innerHTML = `✅ Redirecting to secure payment...<br>Thank you, ${name}!`;

            // Redirect to Stripe
            setTimeout(() => {
                window.location.href = finalUrl;
            }, 1200);
        });
    </script>
</body>
</html>
