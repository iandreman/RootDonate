<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RootDonate - Personal Finance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <!-- Plaid Link -->
    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .card { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<div class="max-w-6xl mx-auto p-6">

    <!-- Auth Screen (same) -->
    <div id="authScreen" class="min-h-screen flex items-center justify-center">
        <div class="bg-white rounded-3xl shadow-2xl p-10 w-full max-w-md">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-bold text-blue-600">RootDonate</h1>
                <p class="text-gray-600 mt-2">Connect Real Banks • Track Debt</p>
            </div>
            <!-- Login / Register forms (same as previous) -->
            <div id="loginForm"> ... </div>
            <div id="registerForm" class="hidden"> ... </div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">RootDonate</h1>
            <div>
                <span id="userEmail" class="text-sm text-gray-600"></span>
                <button onclick="logout()" class="ml-4 text-red-600">Logout</button>
            </div>
        </div>

        <div class="flex gap-2 mb-8 border-b">
            <button onclick="showTab(0)" class="tab-button active px-6 py-3 rounded-2xl" id="tab0">Dashboard</button>
            <button onclick="showTab(1)" class="tab-button px-6 py-3 rounded-2xl" id="tab1">🏦 Connect Bank</button>
            <button onclick="showTab(2)" class="tab-button px-6 py-3 rounded-2xl" id="tab2">📊 DTI / LTI</button>
        </div>

        <!-- Connect Bank Tab -->
        <div id="tabContent1" class="hidden">
            <div class="bg-white rounded-3xl p-10 card text-center">
                <h2 class="text-3xl font-semibold mb-4">Connect Your Bank Account</h2>
                <p class="text-gray-600 mb-8">Securely connect to thousands of banks via Plaid</p>
                
                <button onclick="openPlaidLink()" 
                        class="bg-[#0A84FF] hover:bg-blue-700 text-white text-lg font-semibold px-12 py-5 rounded-2xl flex items-center gap-3 mx-auto">
                    <i class="fas fa-link"></i>
                    Connect Bank Account
                </button>

                <p class="text-xs text-gray-500 mt-8">
                    🔒 Bank-level 256-bit encryption • Read-only access
                </p>

                <div id="connectedAccountsList" class="mt-12 space-y-4"></div>
            </div>
        </div>

        <!-- Other tabs (Dashboard + DTI) remain the same -->
    </div>
</div>

<script>
// ==================== FIREBASE CONFIG ====================
const firebaseConfig = { /* Your config here */ };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ==================== PLAID INTEGRATION ====================
let handler = null;

async function openPlaidLink() {
    const user = auth.currentUser;
    if (!user) return alert("Please log in first");

    try {
        // Step 1: Get link_token from your backend (YOU NEED A BACKEND FOR THIS)
        const response = await fetch('https://YOUR-BACKEND.com/create_link_token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: user.uid })
        });
        const { link_token } = await response.json();

        handler = Plaid.create({
            token: link_token,
            onSuccess: async (public_token, metadata) => {
                // Send public_token to your backend to exchange for access_token
                await fetch('https://YOUR-BACKEND.com/exchange_token', {
                    method: 'POST',
                    body: JSON.stringify({ public_token, user_id: user.uid })
                });
                alert("✅ Bank connected successfully!");
                loadConnectedAccounts();
            },
            onExit: (err, metadata) => {
                if (err) console.error(err);
            }
        });

        handler.open();
    } catch (e) {
        alert("Backend not connected yet. Using simulation mode.");
        simulateBankConnection();
    }
}

// Simulation fallback
function simulateBankConnection() {
    const bankName = prompt("Simulated Bank Name:", "Chase Bank");
    if (bankName) {
        alert(`✅ Successfully connected to ${bankName} (Simulation)`);
        loadConnectedAccounts();
    }
}

function loadConnectedAccounts() {
    // Load from Firebase or display mock
    document.getElementById('connectedAccountsList').innerHTML = `
        <div class="bg-green-50 border border-green-200 p-6 rounded-2xl">
            <p class="font-semibold text-green-800">✅ Chase Checking •••• 4242</p>
            <p class="text-sm text-green-700">Balance synced just now</p>
        </div>
    `;
}

// Tab function, calculate(), saveProfile(), etc. (same as previous versions)

// Auth State
auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('userEmail').textContent = user.email;
        showTab(1); // Start on banking tab
    } else {
        document.getElementById('authScreen').classList.remove('hidden');
        document.getElementById('mainApp').classList.add('hidden');
    }
});
</script>
</body>
</html>
