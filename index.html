<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Root • Walk & Earn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        .nature-gradient {
            background: linear-gradient(135deg, #10b981, #14b8a6, #22d3ee);
        }
        
        .card { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); }

        .living-ring { transition: stroke-dashoffset 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .tracking-active { animation: pulse 2s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.75; } }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">

<div class="max-w-7xl mx-auto p-6 lg:p-10">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-12">
        <div class="flex items-center gap-3">
            <span class="text-4xl">🌱</span>
            <h1 class="title-font text-4xl font-bold">Root</h1>
        </div>
        <div class="flex items-center gap-6 text-sm">
            <button onclick="showTab(0)" class="tab-btn active px-5 py-2 rounded-2xl">Walk</button>
            <button onclick="showTab(1)" class="tab-btn px-5 py-2 rounded-2xl">Nodes</button>
        </div>
    </div>

    <!-- WALK TAB -->
    <div id="tab-0" class="tab-content">
        <div class="nature-gradient rounded-3xl p-10 mb-12 relative overflow-hidden card">
            <p class="text-emerald-100 text-lg">Your Living Balance</p>
            <p id="balance" class="text-7xl font-bold mt-2 mb-6">$0.00</p>
            <div class="flex justify-between text-emerald-100">
                <p>Total Steps: <span id="totalStepsBig" class="font-bold text-white">0</span></p>
            </div>
        </div>

        <div class="bg-white/5 border border-white/10 rounded-3xl p-8 card">
            <div class="flex justify-between items-center mb-8">
                <h2 class="flex items-center gap-3 text-2xl font-semibold">
                    <span class="text-3xl">🌿</span> Life in Motion
                </h2>
                <button onclick="togglePedometer()" id="connectBtn"
                        class="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-medium flex items-center gap-2">
                    <i class="fas fa-walking"></i>
                    <span id="connectText">Start Tracking</span>
                </button>
            </div>

            <div class="relative w-56 h-56 mx-auto mb-8">
                <svg class="w-full h-full -rotate-12" viewBox="0 0 120 120">
                    <circle cx="60" cy="60" r="52" fill="none" stroke="#1f2937" stroke-width="16"/>
                    <circle id="stepsProgress" cx="60" cy="60" r="52" fill="none" 
                            stroke="#10b981" stroke-width="16" stroke-dasharray="326.73"
                            stroke-dashoffset="326.73" stroke-linecap="round" class="living-ring"/>
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <p id="stepsCount" class="text-6xl font-bold">0</p>
                    <p class="text-emerald-400">steps today</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6 text-center">
                <div class="bg-white/5 rounded-2xl p-6">
                    <p class="text-gray-400 text-sm">Distance</p>
                    <p id="distance" class="text-4xl font-semibold text-emerald-400">0.0 km</p>
                </div>
                <div class="bg-white/5 rounded-2xl p-6">
                    <p class="text-gray-400 text-sm">Earned Today</p>
                    <p id="earnedToday" class="text-4xl font-semibold text-cyan-400">$0.00</p>
                </div>
            </div>
        </div>

        <button onclick="claimStepsReward()" id="claimBtn"
                class="mt-10 w-full nature-gradient py-6 rounded-3xl text-xl font-semibold flex items-center justify-center gap-2 disabled:opacity-50">
            <span>🌱</span> Claim Earnings
        </button>
    </div>

    <!-- NODES TAB -->
    <div id="tab-1" class="tab-content hidden">
        <div class="bg-white/5 border border-white/10 rounded-3xl p-8 card">
            <h2 class="text-3xl font-semibold mb-6 flex items-center gap-3">
                <span>🌳</span> Your Living Nodes
            </h2>
            <div id="nodesList" class="space-y-4"></div>
            
            <button onclick="plantNode()" 
                    class="mt-8 w-full py-6 bg-gradient-to-r from-emerald-500 to-cyan-500 rounded-3xl text-xl font-semibold flex items-center justify-center gap-2">
                🌱 Plant New Node <span class="text-sm opacity-75">($50)</span>
            </button>
        </div>
    </div>
</div>

<script>
// Data
let todaySteps = 0;
let totalLifetimeSteps = 0;
let balance = 0;
let nodes = [];
let isSensorConnected = false;
let motionListener = null;

// Load data
function loadData() {
    const saved = localStorage.getItem('rootWalkData');
    if (saved) {
        const data = JSON.parse(saved);
        totalLifetimeSteps = data.totalSteps || 0;
        balance = data.balance || 0;
        nodes = data.nodes || [];
    }
    updateAllUI();
}

function saveData() {
    localStorage.setItem('rootWalkData', JSON.stringify({
        totalSteps: totalLifetimeSteps,
        balance: balance,
        nodes: nodes
    }));
}

function updateAllUI() {
    // Walk tab
    const progress = Math.min(todaySteps / 10000, 1);
    document.getElementById('stepsCount').textContent = todaySteps.toLocaleString();
    document.getElementById('stepsProgress').setAttribute('stroke-dashoffset', 326.73 * (1 - progress));
    document.getElementById('distance').textContent = (todaySteps / 1312).toFixed(1) + " km";
    document.getElementById('earnedToday').textContent = "$" + (todaySteps / 10000).toFixed(2);
    document.getElementById('balance').textContent = '$' + balance.toFixed(2);
    document.getElementById('totalStepsBig').textContent = totalLifetimeSteps.toLocaleString();
    document.getElementById('claimBtn').disabled = todaySteps < 3000;

    // Nodes tab
    renderNodes();
}

function renderNodes() {
    const container = document.getElementById('nodesList');
    container.innerHTML = '';
    
    if (nodes.length === 0) {
        container.innerHTML = `<p class="text-gray-400 text-center py-12">No nodes yet. Plant your first one!</p>`;
        return;
    }

    nodes.forEach((node, i) => {
        const earning = (node.level * 0.8).toFixed(2);
        const div = document.createElement('div');
        div.className = "bg-white/5 rounded-2xl p-6 flex justify-between items-center";
        div.innerHTML = `
            <div>
                <p class="font-semibold">Node #${i+1} <span class="text-emerald-400">(Level ${node.level})</span></p>
                <p class="text-sm text-gray-400">≈ $${earning}/hour passive</p>
            </div>
            <button onclick="upgradeNode(${i})" class="px-6 py-2.5 bg-emerald-600 hover:bg-emerald-700 rounded-xl text-sm font-medium">Upgrade ($30)</button>
        `;
        container.appendChild(div);
    });
}

// Tab system
function showTab(n) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.getElementById(`tab-${n}`).classList.remove('hidden');
    
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === n);
        btn.classList.toggle('bg-white/10', i === n);
    });
}

// Pedometer (your original logic kept)
function togglePedometer() {
    if (isSensorConnected) {
        stopPedometer();
    } else {
        startPedometer();
    }
}

function startPedometer() {
    // ... (your original sensor code - kept intact)
    isSensorConnected = true;
    document.getElementById('connectBtn').classList.add('tracking-active', 'bg-teal-600');
    document.getElementById('connectText').textContent = 'Tracking Active';
    alert("🌿 Step tracking started! (Move your device to simulate steps)");
}

function stopPedometer() {
    isSensorConnected = false;
    document.getElementById('connectBtn').classList.remove('tracking-active', 'bg-teal-600');
    document.getElementById('connectText').textContent = 'Start Tracking';
}

// Claim → Add to balance
function claimStepsReward() {
    if (todaySteps < 3000) return alert("You need at least 3,000 steps to claim.");
    
    const reward = todaySteps / 10000;
    balance += reward;
    totalLifetimeSteps += todaySteps;
    
    alert(`🎉 $${reward.toFixed(2)} added to your balance!`);
    
    todaySteps = 0;
    saveData();
    updateAllUI();
}

// Plant Node
function plantNode() {
    if (balance < 50) return alert("Not enough balance. You need $50 to plant a node.");
    
    balance -= 50;
    nodes.push({ level: 1 });
    saveData();
    updateAllUI();
    alert("🌳 New Node planted successfully!");
}

// Upgrade Node
function upgradeNode(index) {
    if (balance < 30) return alert("Not enough balance. Need $30 to upgrade.");
    
    balance -= 30;
    nodes[index].level++;
    saveData();
    updateAllUI();
}

// Initialize
loadData();
updateAllUI();
showTab(0);
</script>
</body>
</html>
