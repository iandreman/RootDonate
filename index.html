<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok • Apple Intelligence</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SF+Mono:wght@400;500&family=SF+Pro+Display:wght@400;500;600&display=swap');

        :root {
            --bg-body: #0a0a0a;
            --bg-container: #1c1c1e;
            --bg-chat: #161618;
            --accent-blue: #0a84ff;
            --accent-green: #30d158;
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Pro Display', system-ui, -apple-system, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 820px;
            margin: 0 auto;
            background: var(--bg-container);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.75);
        }

        .header {
            background: linear-gradient(135deg, #1f1f23, #0f0f11);
            padding: 40px 40px 32px;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-top: 8px;
            font-size: 17px;
            font-weight: 400;
        }

        .chat-area {
            min-height: 560px;
            padding: 32px;
            overflow-y: auto;
            background: var(--bg-chat);
            font-family: 'SF Mono', monospace;
            font-size: 15.5px;
            line-height: 1.65;
        }

        .message {
            margin-bottom: 36px;
            scroll-margin-top: 110px;
        }

        .user {
            color: var(--accent-blue);
        }

        .grok {
            color: var(--accent-green);
        }

        .action-links {
            margin-top: 14px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            font-size: 14px;
        }

        .action-link {
            color: var(--accent-blue);
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .action-link:hover {
            color: #4da3ff;
            text-decoration: underline;
        }

        .reply-to-btn {
            margin-top: 12px;
            background: rgba(48, 209, 88, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(48, 209, 88, 0.3);
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reply-to-btn:hover {
            background: var(--accent-green);
            color: #000;
            border-color: var(--accent-green);
        }

        .input-area {
            padding: 24px 32px;
            background: var(--bg-container);
            border-top: 1px solid #333;
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            background: #2c2c2e;
            border: none;
            color: var(--text-primary);
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 16px;
            font-family: 'SF Mono', monospace;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: #6e6e73;
        }

        button {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0 32px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        button:hover {
            background: #0077ed;
        }

        /* Notification */
        .notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-green);
            color: #000;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 10000;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo"></div>
        <h1>Grok • Apple Intelligence</h1>
        <p class="subtitle">Inspired by the classic cleverbot.py</p>
    </div>

    <div class="chat-area" id="chat"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');
    let messageCounter = 0;
    let conversationHistory = [];

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `message ${type}`;

        let html = `<div>${text}</div>`;

        if (type === 'grok') {
            messageCounter++;
            const replyId = `reply-${messageCounter}`;
            const shareUrl = `${window.location.origin}${window.location.pathname}#${replyId}`;

            div.id = replyId;

            html += `
                <div class="action-links">
                    <span class="action-link" onclick="copyShareLink('${shareUrl}')">🔗 Share Link</span>
                    <span class="action-link" onclick="emailThisReply('${replyId}')">✉️ Email This Reply</span>
                </div>
                <button class="reply-to-btn" onclick="replyToThis('${text.replace(/'/g, "\\'").replace(/"/g, '\\"')}')">
                    ↩️ Reply to this conversation
                </button>
            `;

            conversationHistory.push({ type: 'grok', text: text, id: replyId });
        } else {
            conversationHistory.push({ type: 'user', text: text });
        }

        div.innerHTML = html;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }

    function replyToThis(grokText) {
        const quoted = grokText.length > 140 
            ? grokText.substring(0, 137) + "..." 
            : grokText;
        
        input.value = `> ${quoted}\n\n`;
        input.focus();
    }

    function copyShareLink(url) {
        navigator.clipboard.writeText(url).then(() => {
            showNotification("Share link copied to clipboard");
        }).catch(() => {
            prompt("Copy this share link:", url);
        });
    }

    function emailThisReply(replyId) {
        const shareUrl = `${window.location.origin}${window.location.pathname}#${replyId}`;

        let historyText = "Conversation History:\n\n";
        conversationHistory.forEach(msg => {
            const prefix = msg.type === 'user' ? "You:" : "Grok:";
            historyText += `${prefix} ${msg.text}\n\n`;
        });

        const subject = encodeURIComponent("Grok Reply — Apple Intelligence Chat");
        const body = encodeURIComponent(
            `Grok replied:\n\n` +
            `${conversationHistory[conversationHistory.length - 1].text}\n\n` +
            `🔗 View this exact reply:\n${shareUrl}\n\n` +
            `────────────────────────────\n\n` +
            historyText +
            `Shared via Grok • Apple Intelligence`
        );

        window.location.href = `mailto:?subject=${subject}&body=${body}`;
    }

    function showNotification(message) {
        const notif = document.createElement('div');
        notif.className = 'notification';
        notif.textContent = message;
        document.body.appendChild(notif);

        setTimeout(() => notif.remove(), 2800);
    }

    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        addMessage(`> ${text}`, 'user');
        input.value = '';

        setTimeout(() => {
            let reply = "That's an interesting point.";

            const lower = text.toLowerCase();
            if (lower.includes("hello") || lower.includes("hi")) {
                reply = "Hello there! Nice to see you again.";
            } else if (lower.includes("how are you")) {
                reply = "I'm doing great, thanks for asking.";
            } else if (lower.includes("cleverbot") || lower.includes("code")) {
                reply = "The original cleverbot.py was quite clever.";
            } else if (lower.includes("thank")) {
                reply = "You're very welcome!";
            }

            addMessage(reply, 'grok');
        }, 650);
    }

    function handleDeepLink() {
        const hash = window.location.hash;
        if (!hash) return;

        const target = document.querySelector(hash);
        if (target) {
            setTimeout(() => {
                target.scrollIntoView({ behavior: "smooth", block: "center" });
            }, 650);
        }
    }

    // Event Listeners
    input.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });

    window.onload = () => {
        // Welcome message
        setTimeout(() => {
            addMessage(
                "Hello! I'm Grok.<br><br>" +
                "Welcome to this clean Apple Intelligence styled interface.<br><br>" +
                "Use the Share Link or Email buttons on my replies to save or continue conversations.", 
                'grok'
            );
        }, 500);

        handleDeepLink();
        window.addEventListener('hashchange', handleDeepLink);
    };
</script>

</body>
</html>
