<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RootDonate - Step. Donate. Change Lives.</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e2937);
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 480px;
            width: 100%;
            padding: 40px 30px;
            background: rgba(15, 23, 42, 0.98);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            border: 1px solid #334155;
            text-align: center;
        }
        h1 {
            color: #22d3ee;
            margin: 0 0 8px 0;
            font-size: 2.4rem;
        }
        .tagline {
            color: #94a3b8;
            font-size: 1.2rem;
            margin-bottom: 35px;
        }
        label {
            display: block;
            margin: 18px 0 8px;
            font-weight: 600;
            color: #cbd5e1;
            text-align: left;
        }
        input, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #334155;
            background: #1e2937;
            color: #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
        }
        input:focus, textarea:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.2);
            outline: none;
        }
        button {
            margin-top: 30px;
            width: 100%;
            padding: 16px;
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(90deg, #22d3ee, #67e8f9);
            color: #0f172a;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(34, 211, 238, 0.3);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(34, 211, 238, 0.4);
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        #response {
            margin-top: 25px;
            padding: 16px;
            border-radius: 10px;
            font-weight: 500;
            display: none;
        }
        .success { background: #166534; color: #86efac; }
        .error { background: #7f1d1d; color: #fda4af; }
        .footer {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 RootDonate</h1>
        <p class="tagline">Turn your steps into real impact</p>

        <form id="donateForm">
            <label>Donation Amount (£)</label>
            <input type="number" id="amount" step="0.01" min="1" value="10" required>

            <label>Your Name (optional)</label>
            <input type="text" id="name" value="Anonymous">

            <label>Email (for receipt)</label>
            <input type="email" id="email" placeholder="you@example.com" required>

            <label>Message (optional)</label>
            <textarea id="message" rows="3" placeholder="Your message of support..."></textarea>

            <label>Steps Walked (optional)</label>
            <input type="number" id="steps" value="0" min="0">

            <button type="submit" id="submitBtn">Donate Now • Secure Checkout</button>
        </form>

        <div id="response"></div>

        <div class="footer">
            🔒 Powered by Stripe • Secure &amp; Encrypted
        </div>
    </div>

    <script>
        const stripe = Stripe('pk_live_51TeUTKAYd3hJ6fUDdNumw6y435NBguXNZRNkqM2d4Te1kKOYLn25XceMG9qr1M6z0GzARRs2L7SJ8ZqmHW39c5Qe00clIRkuCL');

        document.getElementById('donateForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const responseDiv = document.getElementById('response');

            btn.disabled = true;
            btn.textContent = 'Redirecting to secure checkout...';
            responseDiv.style.display = 'none';

            const amount = parseFloat(document.getElementById('amount').value);
            const email = document.getElementById('email').value.trim();

            if (!amount || amount < 1) {
                showMessage('Please enter a valid donation amount.', 'error');
                resetButton();
                return;
            }

            try {
                const { error } = await stripe.redirectToCheckout({
                    lineItems: [{
                        price_data: {
                            currency: 'gbp',
                            product_data: {
                                name: 'RootDonate Donation',
                                description: 'Thank you for making an impact 🌱',
                            },
                            unit_amount: Math.round(amount * 100), // Convert to pence
                        },
                        quantity: 1,
                    }],
                    mode: 'payment',
                    successUrl: window.location.origin + '?success=true',
                    cancelUrl: window.location.origin + '?canceled=true',
                    customerEmail: email || undefined,
                });

                if (error) {
                    showMessage(error.message, 'error');
                }
            } catch (err) {
                console.error(err);
                showMessage('Something went wrong. Please try again.', 'error');
            }

            resetButton();
        });

        function showMessage(text, type) {
            const div = document.getElementById('response');
            div.textContent = text;
            div.className = type;
            div.style.display = 'block';
        }

        function resetButton() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = false;
            btn.textContent = 'Donate Now • Secure Checkout';
        }

        // Handle success/canceled messages
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            if (params.has('success')) {
                showMessage('🎉 Thank you! Your donation was successful.', 'success');
            } else if (params.has('canceled')) {
                showMessage('Donation was canceled.', 'error');
            }
        });
    </script>
</body>
</html>
