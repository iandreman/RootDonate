<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RootDonate – Private Pin & Share Coordinates</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
  <style>
    :root {
      --bg:       #050a12;
      --surface:  #0b1422;
      --text:     #e0ffe0;
      --green:    #44ff66;
      --purple:   #d28aff;
      --accent:   #00eaff;
      --muted:    #92a2c0;
      --border:   #1e334d;
      --shadow:   rgba(0, 240, 255, 0.09);
    }

    * { box-sizing: border-box; margin:0; padding:0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100dvh;
      line-height: 1.6;
    }

    /* CRT scanline effect */
    .crt::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(transparent 50%, rgba(0,0,0,0.07) 50%);
      background-size: 100% 4px;
      z-index: 9999;
      animation: scan 14s linear infinite;
      mix-blend-mode: multiply;
      opacity: 0.4;
    }

    @keyframes scan {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(100%);  }
    }

    header {
      background: rgba(8, 16, 30, 0.94);
      border-bottom: 1px solid var(--border);
      padding: 1.3rem 1.6rem;
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
      text-align: center;
    }

    h1 {
      margin: 0 0 0.4rem;
      font-size: clamp(2.5rem, 9vw, 3.8rem);
      color: var(--purple);
      text-shadow: 0 0 20px rgba(210,140,255,0.45);
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.96rem;
      opacity: 0.88;
    }

    .tab-buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin: 1.2rem 0 0.6rem;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--muted);
      padding: 0.65rem 1.5rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.97rem;
      transition: all 0.2s ease;
      min-width: 108px;
    }

    .tab-btn.active,
    .tab-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(0,234,255,0.07);
    }

    .view {
      max-width: 1180px;
      margin: 1.6rem auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: 0 8px 44px var(--shadow);
      display: none;
    }

    .view.active { display: block; }

    #output, #pinsList {
      padding: 1.8rem 2.2rem;
      min-height: 48vh;
      max-height: 74vh;
      overflow-y: auto;
      font-size: 1.08rem;
      line-height: 1.65;
    }

    .line, .pin-item {
      margin: 1.1rem 0;
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
      padding-right: 300px;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .line:hover .msg-actions,
    .pin-item:hover .msg-actions { opacity: 1; }

    .msg-actions {
      opacity: 0;
      transition: opacity 0.2s;
      position: absolute;
      right: 1.4rem;
      top: 0.3rem;
      display: flex;
      gap: 0.9rem;
    }

    .msg-btn {
      background: rgba(0,234,255,0.05);
      border: 1px solid var(--muted);
      color: var(--muted);
      padding: 0.45rem 1.1rem;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.88rem;
      min-width: 88px;
      transition: all 0.16s;
    }

    .msg-btn:hover {
      background: rgba(0,234,255,0.2);
      color: var(--accent);
      border-color: var(--accent);
    }

    .prompt  { color: var(--green); font-weight: 600; min-width: 148px; flex-shrink: 0; }
    .bot     { color: var(--purple); }
    .success { color: var(--green); }
    .muted   { color: var(--muted); opacity: 0.82; }

    .pin-type {
      color: var(--accent);
      font-weight: 700;
      margin-right: 0.7rem;
    }

    .input-area {
      padding: 1.3rem 2.2rem;
      background: rgba(0,0,0,0.38);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .input-row {
      display: flex;
      align-items: center;
      width: 100%;
      gap: 1rem;
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font: inherit;
      font-size: 1.12rem;
      outline: none;
      caret-color: var(--accent);
    }

    #input::placeholder { color: var(--muted); opacity: 0.58; }

    #pinsSearch {
      padding: 0.9rem 2.2rem;
      background: rgba(0,234,255,0.04);
      border-bottom: 1px solid var(--border);
    }

    #pinsSearchInput {
      width: 100%;
      padding: 0.65rem 1.3rem;
      background: rgba(0,0,0,0.32);
      border: 1px solid var(--muted);
      border-radius: 6px;
      color: var(--text);
      font: inherit;
      font-size: 0.98rem;
      outline: none;
    }

    #pinsSearchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(0,234,255,0.14);
    }

    #google-search-header {
      padding: 1.2rem 2.2rem 0.5rem;
      font-size: 1.05rem;
      color: var(--muted);
      border-bottom: 1px dashed var(--border);
      background: rgba(0,0,0,0.18);
    }

    @media (max-width: 720px) {
      .line, .pin-item { padding-right: 220px; }
      .msg-actions { right: 1rem; gap: 0.7rem; }
      #output, #pinsList { padding: 1.4rem 1.7rem; }
    }

    @media (max-width: 480px) {
      .line, .pin-item { padding-right: 0; flex-direction: column; gap: 0.7rem; }
      .msg-actions { position: static; opacity: 1; margin-top: 0.5rem; flex-wrap: wrap; }
      .tab-buttons { gap: 0.7rem; }
      .tab-btn { min-width: 96px; padding: 0.55rem 1.1rem; }
    }
  </style>
</head>
<body class="crt">

<header>
  <h1>RootDonate</h1>
  <div class="subtitle">Private coordinate & link sharing • March 2026</div>
  <div class="tab-buttons">
    <button class="tab-btn active" data-tab="terminal">Terminal</button>
    <button class="tab-btn" data-tab="pins">My Pins</button>
  </div>
</header>

<main>
  <div id="terminalView" class="view active" role="log" aria-live="polite">
    <div id="output">
      <div class="line success">══════════════════════════════════════════════</div>
      <div class="line success">          ROOTDONATE – PIN & SHARE           </div>
      <div class="line success">══════════════════════════════════════════════</div>
      <div class="line"></div>
      <div class="line muted">Paste GPS • clean URL • or command (clear, clearpins, help)</div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <label for="input" class="prompt">root@donate:~#</label>
        <input id="input" type="text" autocomplete="off" autofocus placeholder="Paste coords / URL / command…" />
      </div>
    </div>
  </div>

  <div id="pinsView" class="view">
    <div id="pinsSearch">
      <input id="pinsSearchInput" placeholder="Filter pins…" autocomplete="off" />
    </div>

    <div id="google-search-header">Quick web search:</div>
    <div id="google-search-container" style="padding:0 2.2rem 1.6rem;">
      <script async src="https://cse.google.com/cse.js?cx=025fe0f2c9acb4389"></script>
      <div class="gcse-searchresults-only"></div>
    </div>

    <div id="pinsList">
      <div class="line muted">No pins saved yet.</div>
    </div>
  </div>
</main>

<script>
// ────────────────────────────────────────────────
//  RootDonate – Clean 2026 edition
// ────────────────────────────────────────────────

const els = {
  output:         document.getElementById('output'),
  input:          document.getElementById('input'),
  pinsList:       document.getElementById('pinsList'),
  terminalView:   document.getElementById('terminalView'),
  pinsView:       document.getElementById('pinsView'),
  pinsSearchInput: document.getElementById('pinsSearchInput'),
};

let messages = JSON.parse(localStorage.getItem('rootDonateHistory') || '[]');
let pins     = JSON.parse(localStorage.getItem('rootDonatePins')     || '[]');

const escapeHtml = str => str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);

function save() {
  localStorage.setItem('rootDonateHistory', JSON.stringify(messages));
  localStorage.setItem('rootDonatePins',     JSON.stringify(pins));
}

function cleanUrl(url) {
  try {
    const u = new URL(url);
    const trash = ['utm_','fbclid','gclid','gad_','mc_cid','mc_eid','igshid','_ga','twclid','li_fat_id','ref','source'];
    trash.forEach(k => { if (k.endsWith('_')) u.searchParams.forEach((v,p) => p.startsWith(k) && u.searchParams.delete(p)); else u.searchParams.delete(k); });
    let s = u.toString().replace(/[#?]$/, '');
    return s;
  } catch {
    return url.trim();
  }
}

function parseGps(text) {
  const re = /([-+]?\d{1,3}(?:\.\d{1,12})?)[°\s,;d]*([-+]?\d{1,3}(?:\.\d{1,12})?)/i;
  const m = text.match(re);
  if (!m) return null;
  const lat = parseFloat(m[1]), lng = parseFloat(m[2]);
  if (isNaN(lat) || isNaN(lng) || lat < -90 || lat > 90 || lng < -180 || lng > 180) return null;
  return { lat: m[1].trim(), lng: m[2].trim(), raw: `${m[1].trim()}, ${m[2].trim()}` };
}

function extractUrl(text) {
  const m = text.match(/https?:\/\/[^\s"')<>]+/i);
  return m ? m[0] : null;
}

function makeShortLink(content, isGps = false) {
  try {
    let data = content.trim();
    if (isGps) data = 'gps:' + data;
    const encoded = btoa(unescape(encodeURIComponent(data)));
    return `${location.origin}${location.pathname}#${encoded}`;
  } catch {
    return null;
  }
}

// ── Import from #hash ─────────────────────────────────────
function importFromHash() {
  const hash = location.hash.slice(1);
  if (!hash) return;

  try {
    const raw = decodeURIComponent(escape(atob(hash)));
    if (raw.startsWith('gps:')) {
      const gps = parseGps(raw.slice(4));
      if (gps && !pins.some(p => p.type==='gps' && p.lat===gps.lat && p.lng===gps.lng)) {
        pins.push({ type:'gps', ...gps });
        save();
        println(`<span class="success">Imported GPS: ${gps.raw}</span>`);
      }
    } else {
      importContent(raw, 'short-link');
      println('<span class="success">Imported from short link</span>');
    }
  } catch {
    println('<span class="muted">Short link decode failed</span>');
  }
}

// ── Process any content ───────────────────────────────────
function importContent(text, source = 'input') {
  let added = false;
  const gps = parseGps(text);

  if (gps) {
    if (!pins.some(p => p.type==='gps' && p.lat===gps.lat && p.lng===gps.lng)) {
      pins.push({ type:'gps', ...gps });
      added = true;
    }
    println(`<span class="success">GPS pinned from ${source}: ${gps.raw}</span>`);
  }
  else {
    const url = extractUrl(text);
    if (url) {
      const cleaned = cleanUrl(url);
      if (!pins.some(p => p.type==='url' && cleanUrl(p.url)===cleaned)) {
        pins.push({ type:'url', url:cleaned });
        added = true;
      }
      println(`<span class="success">Clean URL pinned from ${source}</span>`);
    }
    else if (text.trim()) {
      println(`<span class="muted">Text noted (not pinned): ${escapeHtml(text.slice(0,70))}${text.length>70?'…':''}</span>`);
    }
  }

  if (added) {
    save();
    if (els.pinsView.classList.contains('active')) renderPins();
  }
}

// ── UI helpers ────────────────────────────────────────────
function println(html) {
  const div = document.createElement('div');
  div.className = 'line';
  div.innerHTML = html;
  els.output.appendChild(div);
  els.output.scrollTop = els.output.scrollHeight;
  return div;
}

function addActions(container, content) {
  const gps = parseGps(content);
  const isGps = !!gps;

  const actions = document.createElement('div');
  actions.className = 'msg-actions';

  // Email button
  const emailBtn = document.createElement('button');
  emailBtn.className = 'msg-btn';
  emailBtn.textContent = 'Email';
  emailBtn.onclick = () => {
    const link = makeShortLink(content, isGps) || '(error)';
    let maps = isGps ? `Google Maps:\nhttps://www.google.com/maps/search/?api=1&query=${parseFloat(gps.lat).toFixed(8)},${parseFloat(gps.lng).toFixed(8)}\n\n` : '';
    const subject = encodeURIComponent(isGps ? 'RootDonate GPS' : 'RootDonate Link');
    const body = encodeURIComponent(`RootDonate ${isGps?'pin':'link'}:\n\n${content.trim()}\n\n${maps}${link}\n\n-- March 2026`);
    location.href = `mailto:?subject=${subject}&body=${body}`;
    const orig = emailBtn.textContent;
    emailBtn.textContent = 'Opened!';
    setTimeout(() => emailBtn.textContent = orig, 1400);
  };

  // Short link button
  const shortBtn = document.createElement('button');
  shortBtn.className = 'msg-btn';
  shortBtn.textContent = 'Short Link';
  shortBtn.onclick = () => {
    const link = makeShortLink(content, isGps);
    if (!link) {
      shortBtn.textContent = 'Error';
      setTimeout(() => shortBtn.textContent = 'Short Link', 1600);
      return;
    }
    navigator.clipboard.writeText(link).then(() => {
      shortBtn.textContent = isGps ? 'GPS link copied' : 'Copied';
      setTimeout(() => shortBtn.textContent = 'Short Link', 1400);
      println(`<span class="muted">${isGps?'GPS ':''}short link: <a href="${link}" target="_blank" style="color:var(--accent)">${link}</a></span>`);
    }).catch(() => {
      shortBtn.textContent = 'Copy failed';
      setTimeout(() => shortBtn.textContent = 'Short Link', 1800);
    });
  };

  actions.append(emailBtn, shortBtn);
  container.appendChild(actions);
}

function renderPins() {
  els.pinsList.innerHTML = pins.length ? '' : '<div class="line muted">No pins saved yet.</div>';

  pins.forEach(pin => {
    const item = document.createElement('div');
    item.className = 'pin-item';

    let html = '';
    let shareContent = '';

    if (pin.type === 'gps') {
      const maps = `https://www.google.com/maps/search/?api=1&query=${parseFloat(pin.lat).toFixed(11)},${parseFloat(pin.lng).toFixed(11)}`;
      html = `<span class="pin-type">[GPS]</span> ${pin.lat}, ${pin.lng} <a href="${maps}" target="_blank" style="color:var(--accent)">→ Maps</a>`;
      shareContent = pin.raw;
    } else {
      html = `<span class="pin-type">[URL]</span> <a href="${pin.url}" target="_blank" style="color:var(--accent); word-break:break-all;">${escapeHtml(pin.url)}</a>`;
      shareContent = pin.url;
    }

    item.innerHTML = html;
    addActions(item, shareContent);
    els.pinsList.appendChild(item);
  });
}

// ── Event listeners ───────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const isPins = btn.dataset.tab === 'pins';
    els.terminalView.classList.toggle('active', !isPins);
    els.pinsView.classList.toggle('active', isPins);

    if (isPins) {
      renderPins();
      els.pinsSearchInput.focus();
    } else {
      els.input.focus();
    }
  });
});

els.pinsSearchInput.addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  Array.from(els.pinsList.querySelectorAll('.pin-item')).forEach(el =>
    el.style.display = !q || el.textContent.toLowerCase().includes(q) ? '' : 'none'
  );
});

els.input.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const txt = els.input.value.trim();
  if (!txt) return;

  const line = println(`<span class="prompt">root@donate:~#</span> ${escapeHtml(txt)}`);
  addActions(line, txt);
  messages.push({ from:'user', text:txt });
  save();

  if (txt.toLowerCase() === 'clear') {
    els.output.innerHTML = '';
    println('<span class="success">Terminal cleared.</span>');
  } else if (txt.toLowerCase() === 'clearpins') {
    pins = [];
    save();
    if (els.pinsView.classList.contains('active')) renderPins();
    println('<span class="success">All pins cleared.</span>');
  } else if (txt.toLowerCase() === 'help') {
    println('<span class="muted">Commands: clear | clearpins | help</span>');
  } else {
    importContent(txt);
  }

  els.input.value = '';
});

// ── Init ──────────────────────────────────────────────────
setTimeout(() => {
  println('<span class="success">Ready. Paste coords, URL or command…</span>');
  if (messages.length) println(`<span class="muted">History loaded (${messages.length} entries)</span>`);

  // Restore history
  messages.forEach(m => {
    const isUser = m.from === 'user';
    const line = println(
      isUser
        ? `<span class="prompt">root@donate:~#</span> ${escapeHtml(m.text)}`
        : `<span class="bot">rootdonate:</span> ${escapeHtml(m.text)}`
    );
    addActions(line, m.text);
  });

  importFromHash();
}, 300);
</script>
</body>
</html>
