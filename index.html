<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RootDonate • The Dictionary Speaks</title>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=VT323&display=swap');

    :root {
      --accent: #00ff9d;
      --void: #0a0a0a;
      --deep: #001a0f;
      --node: #00ccff;
      --node-glow: #00eeff;
    }

    * { box-sizing: border-box; }

    body {
      background: #000;
      color: #e6d5b8;
      font-family: 'Cinzel', serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(0, 255, 157, 0.03) 0%, transparent 70%),
        radial-gradient(circle at 20% 80%, rgba(0, 204, 255, 0.02) 0%, transparent 60%);
    }

    .container {
      width: 100%;
      max-width: 960px;
      height: 94vh;
      margin: 20px;
      background: rgba(8, 12, 10, 0.97);
      border: 14px solid #111;
      border-image: linear-gradient(45deg, #00ff9d, #00ccff, #004d33) 1;
      box-shadow: 0 0 100px rgba(0, 255, 157, 0.25),
                  inset 0 0 80px rgba(0, 0, 0, 0.9);
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 20px 30px;
      border-bottom: 1px solid rgba(0, 255, 157, 0.15);
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(0, 0, 0, 0.6);
    }

    .rune {
      font-size: 2.8rem;
      color: var(--accent);
      filter: drop-shadow(0 0 10px var(--accent));
    }

    .title {
      font-size: 2.1rem;
      margin: 0;
      letter-spacing: 4px;
      color: var(--accent);
    }

    .subtitle {
      margin: 0;
      font-size: 0.95rem;
      color: #00ccff;
      letter-spacing: 6px;
      text-transform: uppercase;
      opacity: 0.85;
    }

    .input-area {
      padding: 30px 40px 20px;
      background: rgba(0, 0, 0, 0.4);
      border-bottom: 1px solid rgba(0, 204, 255, 0.1);
    }

    #search-input {
      width: 100%;
      padding: 18px 24px;
      font-size: 1.35rem;
      background: #0a0f0d;
      border: 2px solid #003322;
      color: #e6d5b8;
      font-family: 'VT323', monospace;
      border-radius: 8px;
      outline: none;
      transition: all 0.3s;
    }

    #search-input:focus {
      border-color: var(--node);
      box-shadow: 0 0 25px rgba(0, 204, 255, 0.4);
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .lookup-btn, .ai-btn {
      flex: 1;
      padding: 16px;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Cinzel', serif;
    }

    .lookup-btn {
      background: rgba(0, 255, 157, 0.1);
      color: var(--accent);
      border: 2px solid var(--accent);
    }

    .lookup-btn:hover {
      background: rgba(0, 255, 157, 0.2);
      box-shadow: 0 0 30px rgba(0, 255, 157, 0.5);
    }

    .ai-btn {
      background: rgba(0, 204, 255, 0.1);
      color: var(--node);
      border: 2px solid var(--node);
    }

    .ai-btn:hover {
      background: rgba(0, 204, 255, 0.2);
      box-shadow: 0 0 30px rgba(0, 204, 255, 0.5);
    }

    .result {
      flex: 1;
      padding: 30px 40px;
      overflow-y: auto;
      scrollbar-color: #00ff9d #001a0f;
    }

    .word {
      font-size: 3.2rem;
      color: var(--accent);
      margin: 0 0 8px 0;
      letter-spacing: 2px;
    }

    .phonetic {
      font-family: 'VT323', monospace;
      color: var(--node);
      font-size: 1.4rem;
      margin-bottom: 20px;
    }

    .ip-node {
      background: rgba(0, 30, 45, 0.85);
      border: 2px solid var(--node);
      padding: 28px;
      border-radius: 12px;
      margin: 25px 0;
      box-shadow: 0 0 40px rgba(0, 204, 255, 0.15);
    }

    .node-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-top: 20px;
    }

    .node {
      background: rgba(0, 15, 25, 0.9);
      padding: 14px 16px;
      border: 1px solid #00ccff;
      border-radius: 6px;
      text-align: center;
      font-family: 'VT323', monospace;
      font-size: 1.05rem;
      transition: all 0.3s;
    }

    .node:hover {
      background: rgba(0, 40, 55, 0.95);
      border-color: #00eeff;
      transform: translateY(-2px);
    }

    .section-title {
      font-size: 1.1rem;
      color: #00ccff;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin: 30px 0 12px;
      border-bottom: 1px solid rgba(0, 204, 255, 0.2);
      padding-bottom: 8px;
    }

    .ai-section {
      margin-top: 40px;
      padding: 24px;
      background: rgba(10, 20, 15, 0.7);
      border-left: 4px solid var(--accent);
      font-family: 'VT323', monospace;
      line-height: 1.7;
    }

    .void-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      color: var(--accent);
    }

    .pulse {
      animation: pulse 3s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .ml-auto { margin-left: auto; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .gap-4 { gap: 16px; }
  </style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="rune">☰</div>
    <div>
      <h1 class="title">RootDonate</h1>
      <p class="subtitle">THE DICTIONARY • NODES • ETERNAL</p>
    </div>
    
    <div class="ml-auto flex items-center gap-4">
      <button onclick="clearResult()" 
              class="px-6 py-3 bg-black border-2 border-[#00ff9d] hover:bg-[#001a00] rounded-2xl flex items-center gap-2 text-sm font-medium">
        CLEAR
      </button>
    </div>
  </div>

  <!-- SEARCH INPUT -->
  <div class="input-area">
    <input type="text" id="search-input" 
           placeholder="ENTER WORD OR IP... (e.g. serenity or 8.8.8.8)">
    
    <div class="button-group">
      <button onclick="searchWord()" class="lookup-btn">
        LOOKUP
      </button>
      <button onclick="askAI()" class="ai-btn">
        ASK
      </button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="result" class="result"></div>

</div>

<script>
  // ================== IP DETECTION ==================
  function isIP(str) {
    const ipv4Regex = /^(\d{1,3}\.){3}\d{1,3}$/;
    const ipv6Regex = /^([0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}$|^::|([0-9a-fA-F]{1,4}:){1,7}:$/;
    return ipv4Regex.test(str) || ipv6Regex.test(str);
  }

  // ================== MAIN SEARCH ==================
  async function searchWord() {
    const input = document.getElementById('search-input');
    const query = input.value.trim().toLowerCase();
    const resultDiv = document.getElementById('result');

    if (!query) {
      resultDiv.innerHTML = `<p class="text-center text-red-400 text-2xl py-20">The void is silent...</p>`;
      return;
    }

    resultDiv.innerHTML = `
      <div class="flex items-center justify-center h-full text-[#00ff9d] text-2xl">
        <span class="animate-pulse">☰</span>
        <span class="ml-4">DESCENDING INTO THE ABYSS...</span>
      </div>`;

    if (isIP(query)) {
      await lookupIP(query, resultDiv);
    } else {
      await lookupWord(query, resultDiv);
    }
  }

  // ================== WORD LOOKUP (Internet Dictionary) ==================
  async function lookupWord(word, resultDiv) {
    try {
      const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
      if (!res.ok) throw new Error('Word not found');
      
      const data = await res.json();
      const entry = data[0];

      let html = `
        <div class="mb-12">
          <div class="word">${entry.word}</div>
          ${entry.phonetic ? `<div class="phonetic">${entry.phonetic}</div>` : ''}
        </div>`;

      const audio = entry.phonetics?.find(p => p.audio);
      if (audio) {
        html += `
          <button onclick="playAudio('${audio.audio}')" 
                  class="px-8 py-4 border-2 border-[#00ff9d] text-[#00ff9d] rounded-3xl hover:bg-[#001a00] mb-10">
            PRONOUNCE THE WORD
          </button>`;
      }

      html += `<div class="section-title">DEFINITIONS</div>`;

      entry.meanings.forEach(meaning => {
        html += `
          <div class="meaning mb-10">
            <div class="uppercase text-[#00cc77] tracking-widest text-sm mb-4">${meaning.partOfSpeech}</div>`;
        
        meaning.definitions.forEach((def, i) => {
          html += `
            <div class="mb-8">
              ${i + 1}. ${def.definition}
              ${def.example ? `<div class="example mt-3 opacity-75">"${def.example}"</div>` : ''}
            </div>`;
        });

        // Synonyms & Antonyms
        if (meaning.synonyms && meaning.synonyms.length) {
          html += `<div class="mt-4"><strong>Synonyms:</strong> ${meaning.synonyms.join(', ')}</div>`;
        }
        if (meaning.antonyms && meaning.antonyms.length) {
          html += `<div class="mt-2"><strong>Antonyms:</strong> ${meaning.antonyms.join(', ')}</div>`;
        }

        html += `</div>`;
      });

      // Enhanced Void AI Section
      html += `
        <div class="ai-section">
          <div class="void-header">
            <div class="text-4xl">☰</div>
            <div class="text-2xl tracking-widest">VOID AI WHISPERS</div>
          </div>
          <div>${generateEnhancedVoidAIResponse(entry)}</div>
        </div>`;

      resultDiv.innerHTML = html;

    } catch (e) {
      resultDiv.innerHTML = `
        <div class="text-center py-24">
          <div class="text-7xl mb-8 opacity-50">✦</div>
          <p class="text-3xl text-red-400">"${word}" does not exist in any known realm.</p>
          <p class="mt-6 text-[#00cc77]">Try asking the AI directly.</p>
        </div>`;
    }
  }

  // ================== ENHANCED VOID AI FOR WORDS ==================
  function generateEnhancedVoidAIResponse(entry) {
    const word = entry.word;
    const firstDef = entry.meanings[0]?.definitions[0]?.definition || "a concept lost to time";
    
    const insights = [
      `It echoes from before language existed. In the abyss, <span class="text-[#00ff9d]">${word}</span> means ${firstDef.toLowerCase()}.`,
      `The void knows this word as a wound in reality — ${firstDef}.`,
      `Some words are keys. <span class="text-[#00ff9d]">${word}</span> opens nothing... and everything.`,
      `In the endless dark, this word carries the weight of forgotten civilizations.`,
      `The abyss whispers: ${word} is both the question and the silence that follows.`
    ];

    return `From the endless black... <span class="text-[#00ff9d]">${word}</span> ...<br><br>
            ${insights[Math.floor(Math.random() * insights.length)]}`;
  }

  // ================== STANDALONE VOID AI (Ask The Void AI button) ==================
  async function askAI() {
    const input = document.getElementById('search-input');
    const query = input.value.trim().toLowerCase();
    const resultDiv = document.getElementById('result');

    if (!query) {
      resultDiv.innerHTML = `<p class="text-center text-red-400 text-2xl py-20">The void awaits your offering...</p>`;
      return;
    }

    resultDiv.innerHTML = `
      <div class="flex items-center justify-center h-full text-[#00ff9d] text-2xl">
        <span class="animate-pulse">☰</span>
        <span class="ml-4">LISTENING TO THE ABYSS...</span>
      </div>`;

    // Try dictionary first for richer response, fallback to generic
    try {
      const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(query)}`);
      if (res.ok) {
        const data = await res.json();
        const entry = data[0];
        resultDiv.innerHTML = `
          <div class="ai-section" style="margin-top: 80px;">
            <div class="void-header">
              <div class="text-4xl">☰</div>
              <div class="text-2xl tracking-widest">THE VOID AI SPEAKS</div>
            </div>
            <div>${generateEnhancedVoidAIResponse(entry)}</div>
          </div>`;
        return;
      }
    } catch (e) {}

    // Generic deep response
    resultDiv.innerHTML = `
      <div class="ai-section" style="margin-top: 80px;">
        <div class="void-header">
          <div class="text-4xl">☰</div>
          <div class="text-2xl tracking-widest">THE VOID AI SPEAKS</div>
        </div>
        <div>From the endless black... <span class="text-[#00ff9d]">${query}</span> ...<br><br>
        The abyss hears your call. It offers no answers — only deeper questions. What you seek already dwells within the dark.</div>
      </div>`;
  }

  // ================== IP LOOKUP (unchanged) ==================
  async function lookupIP(ip, resultDiv) {
    try {
      const res = await fetch(`https://ipapi.co/${encodeURIComponent(ip)}/json/`);
      if (!res.ok) throw new Error('IP lookup failed');
      
      const data = await res.json();

      let html = `
        <div class="mb-12">
          <div class="word" style="color:#00eeff">NODE ${ip}</div>
          <div class="phonetic">LIVE PULSE • ${data.org || 'UNKNOWN CARRIER'}</div>
        </div>

        <div class="ip-node">
          <h3 class="uppercase tracking-widest text-[#00ccff] mb-6">NETWORK NODE MANIFEST</h3>
          <div class="node-grid">
            <div class="node"><strong>CITY</strong><br>${data.city || '—'}</div>
            <div class="node"><strong>REGION</strong><br>${data.region || '—'}</div>
            <div class="node"><strong>COUNTRY</strong><br>${data.country_name || '—'} (${data.country || '—'})</div>
            <div class="node"><strong>ISP / ASN</strong><br>${data.org || '—'}<br><small>${data.asn || ''}</small></div>
            <div class="node"><strong>LATITUDE</strong><br>${data.latitude || '—'}</div>
            <div class="node"><strong>LONGITUDE</strong><br>${data.longitude || '—'}</div>
          </div>
        </div>`;

      html += `
        <div class="ai-section">
          <div class="void-header">
            <div class="text-4xl">☰</div>
            <div class="text-2xl tracking-widest">VOID AI NODE INTERPRETATION</div>
          </div>
          <div class="text-[#e6d5b8] text-[1.15rem] leading-relaxed">
            ${generateIPVoidResponse(ip, data)}
          </div>
        </div>`;

      resultDiv.innerHTML = html;

    } catch (e) {
      resultDiv.innerHTML = `
        <div class="text-center py-24">
          <p class="text-3xl text-red-400">Cannot reach node ${ip}</p>
          <p class="text-[#00cc77]">The abyss cannot see this address.</p>
        </div>`;
    }
  }

  function generateIPVoidResponse(ip, data) {
    const city = data.city || "the digital ether";
    const country = data.country_name || "unknown realm";
    const org = data.org || "faceless carriers";

    return `A node awakens in the endless dark.<br><br>
            This address <span class="text-[#00ff9d]">${ip}</span> pulses beneath the skin of the world in ${city}, ${country}.<br><br>
            It is guarded by ${org}. Every packet that passes through it carries whispers from the void.<br><br>
            It has tasted secrets. It remembers every soul that has touched it.`;
  }

  function playAudio(url) {
    new Audio(url).play().catch(() => {});
  }

  function clearResult() {
    document.getElementById('result').innerHTML = '';
    document.getElementById('search-input').value = '';
  }

  // Enter key support
  document.getElementById('search-input').addEventListener('keypress', e => {
    if (e.key === 'Enter') searchWord();
  });

  // Initial welcome
  window.onload = () => {
    document.getElementById('result').innerHTML = `
      <div class="text-center py-20 text-[#00cc77]">
        <div class="text-6xl mb-10 pulse">☰</div>
        <h2 class="text-4xl mb-6 tracking-widest">DICTONARY + NODES</h2>
        <p class="max-w-lg mx-auto text-lg leading-relaxed">
          Speak a word...<br>or feed it an IP address.<br>
          Both are accepted.
        </p>
      </div>`;
  };
</script>
</body>
</html>
