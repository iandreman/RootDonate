<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RootDonate AI • Online + Offline Dictionary</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    body {
      background: linear-gradient(135deg, #0f0f23, #1a1a2e);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .chat-container {
      max-width: 820px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .message { animation: fadeIn 0.35s ease forwards; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .custom-scroll::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scroll::-webkit-scrollbar-thumb {
      background-color: #4b5563;
      border-radius: 20px;
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<div class="chat-container mx-auto">
  <!-- Header -->
  <div class="bg-zinc-900 border-b border-zinc-800 p-4 flex items-center gap-3">
    <div class="w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex items-center justify-center text-2xl font-bold">✨</div>
    <div>
      <h1 class="text-2xl font-bold tracking-tight">RootDonate AI</h1>
      <p class="text-xs text-emerald-400 flex items-center gap-1.5">
        <span id="status-dot" class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
        <span id="status-text">Online Dictionary + Offline Fallback</span>
      </p>
    </div>
    
    <div class="ml-auto flex gap-3">
      <button id="share-btn" class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-2xl text-sm font-medium transition-colors">
        <i class="fa-solid fa-share-nodes"></i> Share
      </button>
      <button id="new-btn" class="flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-2xl text-sm font-medium transition-colors">
        <i class="fa-solid fa-plus"></i> New Chat
      </button>
    </div>
  </div>

  <!-- Chat Area -->
  <div id="chat" class="flex-1 overflow-y-auto p-6 space-y-8 bg-zinc-950 custom-scroll"></div>

  <!-- Input Area -->
  <div class="p-6 bg-zinc-900 border-t border-zinc-800">
    <div class="max-w-3xl mx-auto">
      <form id="chat-form" class="relative">
        <textarea id="user-input" rows="1"
          class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-6 py-4 pr-16 text-white placeholder-zinc-500 focus:outline-none focus:border-pink-500 resize-none text-base leading-relaxed"
          placeholder="Ask anything (definitions, jokes, math...)"></textarea>
        
        <button type="submit"
          class="absolute right-4 bottom-4 w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex items-center justify-center hover:brightness-110 transition-all active:scale-95">
          <i class="fa-solid fa-paper-plane text-white"></i>
        </button>
      </form>
      
      <p class="text-center text-zinc-500 text-xs mt-4">
        Online Dictionary API + Offline Fallback • Grok-style personality • Conversations saved in URL
      </p>
    </div>
  </div>
</div>

<script>
  let conversation = [];

  // Built-in offline dictionary (fallback)
  const offlineDictionary = {
    "hello": "A greeting used to express friendliness or attract attention.",
    "ai": "Artificial Intelligence - the simulation of human intelligence in machines.",
    "grok": "To understand something intuitively or by empathy (from Heinlein's Stranger in a Strange Land).",
    "universe": "All existing matter, space, and energy, considered as a whole.",
    "love": "A strong feeling of affection, attachment, or deep care.",
    "elon": "Elon Musk - CEO of SpaceX, Tesla, and xAI.",
    "xai": "xAI - a company working on understanding the true nature of the universe.",
    "quantum": "Relating to quantum mechanics, the physics of very small scales.",
    // Add more words here if you want
  };

  const wittyResponses = {
    greetings: ["Hello! Ready to explore knowledge together?", "Hey there! What's on your mind today?"],
    howareyou: ["I'm powered by curiosity and code. How about you?", "Doing great in the digital cosmos!"],
    jokes: ["Why don't scientists trust atoms? Because they make up everything!"],
    facts: ["Octopuses have three hearts."],
    thanks: ["You're welcome! Always here to help."]
  };

  async function fetchOnlineDefinition(word) {
    try {
      const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
      if (!response.ok) return null;
      
      const data = await response.json();
      if (!Array.isArray(data) || data.length === 0) return null;

      const entry = data[0];
      let result = `<strong>${entry.word}</strong>`;

      if (entry.phonetic) result += ` <span class="text-zinc-400">/${entry.phonetic}/</span>`;

      result += `<br><br>`;

      entry.meanings.forEach((meaning, index) => {
        result += `<span class="text-purple-400">${meaning.partOfSpeech}</span><br>`;
        meaning.definitions.forEach((def, i) => {
          result += `${i+1}. ${def.definition}<br>`;
          if (def.example) result += `<span class="text-amber-300 italic">Example: "${def.example}"</span><br>`;
        });
        if (index < entry.meanings.length - 1) result += `<br>`;
      });

      return result;
    } catch (e) {
      return null; // Offline or error
    }
  }

  function getOfflineResponse(word) {
    const lower = word.toLowerCase();
    return offlineDictionary[lower] || null;
  }

  function getWittyResponse(msg) {
    const lower = msg.toLowerCase();
    if (/(hello|hi|hey|greetings)/.test(lower)) return wittyResponses.greetings[Math.floor(Math.random() * wittyResponses.greetings.length)];
    if (/(how are you|how r u|hru)/.test(lower)) return wittyResponses.howareyou[Math.floor(Math.random() * wittyResponses.howareyou.length)];
    if (/(joke|funny|laugh)/.test(lower)) return wittyResponses.jokes[Math.floor(Math.random() * wittyResponses.jokes.length)];
    if (/(fact|interesting)/.test(lower)) return wittyResponses.facts[Math.floor(Math.random() * wittyResponses.facts.length)];
    if (/(thank|thanks|thx)/.test(lower)) return wittyResponses.thanks[Math.floor(Math.random() * wittyResponses.thanks.length)];

    return null;
  }

  async function getAIResponse(userMessage) {
    const msg = userMessage.toLowerCase().trim();
    const words = msg.split(/\s+/).map(w => w.replace(/[^a-z]/g, ''));

    // Check for witty/greeting responses first
    const witty = getWittyResponse(userMessage);
    if (witty) return witty;

    // Simple math
    if (/(\d+)\s*([+\-*/])\s*(\d+)/.test(userMessage)) {
      try {
        const result = eval(userMessage);
        return `The answer is <strong>${result}</strong>. Math is the language of the universe.`;
      } catch (e) {}
    }

    // Try main words for dictionary lookup (prefer longest first)
    const sortedWords = words.filter(w => w.length > 2).sort((a,b) => b.length - a.length);

    for (let word of sortedWords) {
      // Try online first
      const onlineDef = await fetchOnlineDefinition(word);
      if (onlineDef) {
        return onlineDef + `<br><br><span class="text-emerald-400 text-xs">✓ Fetched from online dictionary</span>`;
      }

      // Fallback to offline
      const offlineDef = getOfflineResponse(word);
      if (offlineDef) {
        return `<strong>${word}</strong><br><br>${offlineDef}<br><br><span class="text-amber-400 text-xs">● Using offline dictionary</span>`;
      }
    }

    // Default fallback
    const fallbacks = [
      "Interesting question. I couldn't find an exact definition, but I'm happy to reason about it with you.",
      "That's a deep one. Want to explore related concepts or rephrase your question?",
      "Hmm... My dictionary doesn't have a direct match right now, but curiosity is the best starting point."
    ];
    return fallbacks[Math.floor(Math.random() * fallbacks.length)];
  }

  // ==================== UI & Conversation Handling (same as before) ====================
  function saveToURL() {
    if (conversation.length === 0) {
      window.location.hash = '';
      return;
    }
    try {
      const encoded = btoa(encodeURIComponent(JSON.stringify(conversation)));
      window.location.hash = `/c/${encoded}`;
    } catch (e) {}
  }

  function loadFromURL() {
    const hash = window.location.hash.substring(1);
    if (!hash) return false;
    let encoded = hash.startsWith('/c/') ? hash.substring(3) : null;
    if (!encoded) return false;
    try {
      conversation = JSON.parse(decodeURIComponent(atob(encoded)));
      return true;
    } catch (e) {
      window.location.hash = '';
      return false;
    }
  }

  const chat = document.getElementById('chat');

  function renderConversation() {
    chat.innerHTML = '';
    conversation.forEach(msg => {
      const div = document.createElement('div');
      div.className = `message max-w-3xl mx-auto ${msg.role === 'user' ? 'ml-auto' : ''}`;

      if (msg.role === 'user') {
        div.innerHTML = `<div class="flex justify-end"><div class="bg-violet-600 text-white rounded-3xl rounded-tr-none px-6 py-4 max-w-[85%]"><p class="whitespace-pre-wrap">${msg.content}</p></div></div>`;
      } else {
        div.innerHTML = `
          <div class="flex gap-4">
            <div class="w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex items-center justify-center text-2xl font-bold flex-shrink-0">✨</div>
            <div class="bg-zinc-900 rounded-3xl rounded-tl-none px-6 py-4 max-w-[85%]">
              <p class="whitespace-pre-wrap">${msg.content}</p>
            </div>
          </div>`;
      }
      chat.appendChild(div);
    });
    chat.scrollTop = chat.scrollHeight;
  }

  function addMessage(content, role) {
    if (!content?.trim()) return;
    conversation.push({ role, content });
    renderConversation();
    saveToURL();
  }

  function showWelcome() {
    if (conversation.length > 0) return;
    chat.innerHTML = `
      <div class="message max-w-3xl mx-auto">
        <div class="flex gap-4">
          <div class="w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex items-center justify-center text-2xl font-bold flex-shrink-0">✨</div>
          <div class="bg-zinc-900 rounded-3xl rounded-tl-none px-6 py-5 max-w-[85%]">
            <p class="text-lg">Hello! I'm RootDonate AI.</p>
            <p class="text-zinc-400 mt-2">I can look up real definitions online using a free dictionary API, and I also work completely offline.</p>
            <p class="text-amber-400 text-sm mt-4">Try words like: hello, universe, grok, quantum, love...</p>
          </div>
        </div>
      </div>
    `;
  }

  // Event Listeners
  const form = document.getElementById('chat-form');
  const input = document.getElementById('user-input');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const question = input.value.trim();
    if (!question) return;

    addMessage(question, 'user');
    input.value = '';
    input.style.height = 'auto';

    const thinking = document.createElement('div');
    thinking.className = 'message max-w-3xl mx-auto';
    thinking.innerHTML = `
      <div class="flex gap-4">
        <div class="w-10 h-10 bg-gradient-to-br from-pink-500 via-purple-500 to-blue-600 rounded-2xl flex items-center justify-center text-2xl font-bold flex-shrink-0">✨</div>
        <div class="bg-zinc-900 rounded-3xl rounded-tl-none px-6 py-4">
          <div class="flex items-center gap-3 text-zinc-400">
            <i class="fa-solid fa-circle animate-pulse"></i>
            <span>Looking up definition...</span>
          </div>
        </div>
      </div>
    `;
    chat.appendChild(thinking);
    chat.scrollTop = chat.scrollHeight;

    const reply = await getAIResponse(question);
    thinking.remove();
    addMessage(reply, 'bot');
  });

  input.addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 180) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.dispatchEvent(new Event('submit'));
    }
  });

  document.getElementById('share-btn').addEventListener('click', () => {
    if (conversation.length === 0) return alert("Send a message first!");
    saveToURL();
    navigator.clipboard.writeText(window.location.href)
      .then(() => alert("✅ Share link copied!"))
      .catch(() => alert("Copy the URL manually."));
  });

  document.getElementById('new-btn').addEventListener('click', () => {
    if (confirm("Start a fresh conversation?")) {
      conversation = [];
      window.location.hash = '';
      chat.innerHTML = '';
      showWelcome();
      input.focus();
    }
  });

  // Initialize
  window.addEventListener('load', () => {
    const loaded = loadFromURL();
    if (!loaded) showWelcome();
    else renderConversation();
    input.focus();
  });

  window.addEventListener('beforeunload', saveToURL);
</script>
</body>
</html>
