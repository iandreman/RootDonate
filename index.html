<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Terminal • Live Type</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #00ff9d;
      font-family: 'Courier New', Consolas, monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 12px 20px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    #terminal {
      flex: 1;
      position: relative;
      background: #0d1117;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    #input-area {
      padding: 16px 20px;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .prompt {
      color: #00ff9d;
      user-select: none;
      pointer-events: none;
    }

    #input {
      background: transparent;
      border: none;
      color: #00ff9d;
      font-family: inherit;
      font-size: 16px;
      outline: none;
      flex: 1;
      caret-color: #00ff9d;
    }

    #typing {
      position: absolute;
      bottom: 80px;
      left: 20px;
      color: #00cc77;
      font-size: 15px;
      opacity: 0.8;
      pointer-events: none;
      white-space: pre;
    }

    button {
      background: #21262d;
      color: #00ff9d;
      border: 1px solid #30363d;
      padding: 6px 14px;
      font-family: inherit;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      background: #30363d;
      border-color: #00ff9d;
    }
  </style>
</head>
<body>

  <div id="header">
    <span><span class="prompt">$</span> Smart Terminal — Type → Live Load</span>
    <button onclick="shareTerminal()">Share</button>
  </div>

  <div id="terminal">
    <div id="typing"></div>
    <iframe id="iframe" src="https://rootdonate.co.uk"></iframe>
  </div>

  <div id="input-area">
    <span class="prompt">$</span>
    <input 
      type="text" 
      id="input" 
      placeholder="Type anything... (google, youtube, wikipedia...)"
      autofocus 
      autocomplete="off"
      spellcheck="false">
  </div>

  <script>
    const input = document.getElementById('input');
    const iframe = document.getElementById('iframe');
    const typingEl = document.getElementById('typing');

    let history = [];
    let historyIndex = -1;
    let typingTimeout = null;

    // Live typing animation
    function typeText(text) {
      typingEl.textContent = '';
      let i = 0;
      
      clearTimeout(typingTimeout);
      
      function type() {
        if (i < text.length) {
          typingEl.textContent += text[i];
          i++;
          typingTimeout = setTimeout(type, 30); // typing speed
        } else {
          setTimeout(() => {
            typingEl.textContent = '';
          }, 1200);
        }
      }
      type();
    }

    // Smart URL logic
    function smartOpen(cmd) {
      let trimmed = cmd.trim();
      if (!trimmed) return;

      // Save to history
      history.unshift(trimmed);
      if (history.length > 50) history.pop();
      historyIndex = -1;

      let url = trimmed;

      if (!/^https?:\/\//i.test(trimmed)) {
        trimmed = trimmed.toLowerCase();

        if (/\.[a-z]{2,}/.test(trimmed) && !trimmed.includes(' ')) {
          // It's probably a domain
          url = trimmed.startsWith('www.') ? 'https://' + trimmed : 'https://' + trimmed;
        } 
        else if (trimmed === 'youtube' || trimmed === 'yt') {
          url = 'https://youtube.com';
        }
        else if (trimmed === 'github' || trimmed === 'gh') {
          url = 'https://github.com';
        }
        else if (trimmed === 'reddit') {
          url = 'https://reddit.com';
        }
        else {
          // Default to Google search
          url = 'https://www.google.com/search?q=' + encodeURIComponent(trimmed);
        }
      }

      // Show live typing effect
      typeText(`Opening → ${trimmed}`);

      // Load in iframe
      setTimeout(() => {
        iframe.src = url;
      }, 800);

      input.value = '';
    }

    // Event Listeners
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        smartOpen(input.value);
      }
    });

    // History with Arrow Up / Down
    input.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (history.length === 0) return;
        historyIndex = Math.min(historyIndex + 1, history.length - 1);
        input.value = history[historyIndex];
      } 
      else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIndex <= 0) {
          historyIndex = -1;
          input.value = '';
        } else {
          historyIndex--;
          input.value = history[historyIndex];
        }
      }
    });

    // Click anywhere to focus input
    document.addEventListener('click', () => input.focus());

    // Initial focus
    window.onload = () => input.focus();

    // Share function
    function shareTerminal() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.querySelector('button');
        const orig = btn.textContent;
        btn.textContent = '✅ Copied!';
        setTimeout(() => btn.textContent = orig, 2000);
      });
    }
  </script>
</body>
</html>
